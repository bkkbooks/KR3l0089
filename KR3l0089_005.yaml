body:
  text: 語林卷五明何良俊撰言語第二下蘓珍之小時隨父在邊嘗謁東荆州刺史曹芝芝戯問曰卿欲官不珍之答曰設官求人非人求官芝異其對北史曰蘓瓊字珍之長樂武強人父備魏衛尉瓊隨父在邊東荆州刺史曹芝署為長流叅軍齊文㐮引為刑獄叅軍每加勞勉魏愷辭青州長史魏帝放還家禁不復用沉廢積年後遇楊愔於路㣲自披陳楊曰發詔授官皆由聖㫖非選曹所悉公不勞見訴愷應聲曰雖復零雨自天終待雲興四岳公豈得言不知楊欣然曰此言極為簡要更不須多數日用為霍州刺史北史曰愷自散騎常侍遷青州長史固辭文宣大怒曰何物漢子與官不就時帝已失徳朝廷為之懼愷容色坦然帝曰死與長史任卿所擇答曰能殺臣者陛下不受長史者愚臣帝謂楊愔曰何慮無人苦用此漢放還永不須收由是沈廢積年盧子友情性恬和蕭然有閑放之致與瑯琊王衍隴西李夀之情好相得嘗語王曰昔太邱道廣許子將知而不顧嵇生性惰鍾士季過而絶言吾處季孟之間去其太甚王以為然魏書曰盧懐仁字子友渉學有辭性恬静蕭然有閑雅致歴𢎞農郡守不之任卜居陳留界所著詩賦銘頌二萬言撰中表實録二十卷劉獻之博觀衆籍人有從之學者輒曰人之立身雖百行殊塗凖以四科要惟徳行為首子若能入孝出悌忠信仁讓不待出户天下自知儻不能然雖復多聞博識不過為土龍乞雨眩惑將來其於立身之道何益乎由是學者髙其行義不敢造門北史曰劉獻之博陵饒陽人少孤貧雅好詩𫝊博觀衆籍逼舉孝亷至京稱病而還孝文幸中山徴典校書獻之喟然歎曰吾不如荘周散木逺矣因以疾辭魏佛助魏收小字己見盛譽盧思道以詢祖為不及詢祖曰見未能髙飛者借其羽毛知逸勢冲天者剪其翅翮北齊書曰盧思道字子行聰爽俊辯通侻不覊年十六中山劉松為人作碑以示思道思道讀之多所不解乃感激讀書師事邢子才後復為文示松松不能甚解乃喟然歎曰學之有益豈徒然哉因就魏收求異書數年間才學兼著然不持操行好輕侮人天保中魏史成思道多所非毁由是再被笞辱落泊不調楊遵彦薦於朝解褐司空行叅軍兼散騎侍郎盧詢祖甚有口辯好臧否人物嘗語人曰我昨東方未明過和氏門外見二陸兩潘森然與槐栁齊列當謂和士開言士開當權文士皆輻湊其門也盧詢祖才辯機敏邢子才嘗戯之曰卿少年才學富盛戴角者無上齒恐君不夀盧答曰詢祖初聞此言實懐恐懼見丈人蒼蒼在鬢差以自安邢大賞其敏贍李百藥齊書曰邢劭字子才河間鄴人魏太常貞之後十嵗能屬文雅有才思聰明強記日誦萬言少在洛陽與時名勝専以山水逰宴為娛嘗因霖雨讀漢書五日畧能遍記後飲謔既倦廣尋經史五行俱下一覽便記無所遺忘文章典麗既贍且速年未二十名動衣冠官至國子祭酒盧詢祖初拜大夏男有宿徳朝士戯之曰大夏初成盧即應聲曰且得燕雀相賀李百藥齊書曰盧詢祖范陽涿人祖父偉封大夏男父恭道早卒詢祖襲爵有術學文辭華美為後生之俊舉秀才官司徒記室北使李諧至南梁武與之遊歴偶至放生處帝問曰彼國亦放生否諧答曰不取亦不放帝大慙李諧别見潤郡國志曰州長命洲梁武帝放生處瑯琊王肅在南時好茗飲􅐜羔過北又好羊肉酪漿嘗云羊陸産之宗魚水族之長羊比齊魯大邦魚比邾莒小國唯茗飲不中與酪漿作奴北人呼茗飲為酪奴賈思伯至性謙和傾身禮士雖在街道停車下馬接誘恂恂曾無倦色客有調思伯曰公今貴重寧能不驕思伯曰衰至便驕何常之有當時以為雅言北史曰賈思伯字仕休齊郡益都人與弟思同師事北海隂鳯業竟無資酬之鳯質其衣物時人為之語曰隂生讀書不免癡不識雙鳳脱人衣思伯累遷中書侍郎為孝文所知杜之松在河中唐詩紀事曰杜之松貞觀中為河中刺史嘗請王無功講禮無功答曰吾不能揖讓邦君門談糟粕棄醇醪也劉昫唐書曰王績字無功絳州龍門人少與李播吕才為莫逆之交大業中授揚州六合縣丞棄官結廬河渚以琴酒自樂嘗躬耕東臯時人號東臯子或過酒肆動經數日往往題壁作詩多為好事者諷詠臨終遺命薄𦵏預自為墓誌王世充平後唐書曰王世充字行滿本姓支西域胡人頗涉經史尤好兵法開皇中拜儀同後僣位國號鄭建元開明蘓世長以漢南歸國髙祖責其後服世長頓首曰自古帝王受命為逐鹿之喻一人得之萬夫歛手豈有獲鹿之後忿同獵之徒問爭肉之罪唐書曰蘓世長雍州武功人祖肜後魏散騎常侍父振周宕州刺史世長十餘歳上書言事周武帝召問讀何書對曰讀孝經論語問何所言曰孝經云為國者不侮於鰥寡論語云為政以徳武帝善其對令于獸門舘讀書王世充僣號署行臺僕射與世充兄子𢎞烈鎮㐮陽洛陽平世長首勸𢎞烈歸降總章中髙宗將幸凉州時隴右虚耗議者以為非便髙宗語侍臣曰五載一廵此葢典禮朕欲幸凉州中外咸謂非宜何也衆未有對詳刑大夫來公敏曰陛下廵幸凉州式宣王略求之故實未虧令典但隨時度義臣下竊有所疑伏以髙麗雖平扶餘尚梗西道經略兵猶未停且隴右諸州人户寡少供待車駕備擬稍難臣聞中外實有竊議潘師正居嵩山逍遥谷髙宗召問所須師正對曰臣所須者茂松清泉山中不乏唐書曰潘師正趙州賛皇人少以孝聞大業中度為道士師事王知逺清浄寡欲居嵩山積二十年但服松葉飲水而已卒贈體元先生田游巖頻召不出髙宗幸嵩山親至其門游巖野服出拜儀止謹樸帝問先生比佳否游巖對曰臣所謂泉石膏肓煙霞痼疾唐書曰田游巖京兆三原人初補太學生後罷歸逰太白山遇林泉會意留連不能去母及妻子並有方外之志同遊山水二十餘年後入箕山就許由廟東築室而居帝後營奉天宫游巖先居宫側特令勿毁仍題曰處士田游巖宅天后嘗召徐有功責之曰公比斷獄多失出何耶有功答曰失出臣小過好生陛下大徳唐書曰徐有功國子博士文逺孫也舉明經除蒲州司法叅軍為政寛仁不行杖罰吏人感其恩信遞相約曰若犯徐司法杖者衆斥罰之由是終於代滿不戮一人魏元忠既復官因侍宴天后問曰卿累負謗鑠何耶對曰臣猶鹿也羅織之吏如獵者茍須臣肉作羔爾劉昫唐書曰魏元忠宋州宋城人本名真宰以避則天母號改焉志氣倜儻不以舉薦為意累年不調後上封事髙宗歎異之累官侍中為宗楚客所誣貶務州尉𤣥宗徴嵩山隱士盧鴻三詔乃至及謁見不拜但磬折而已帝問其故鴻對曰臣聞老子云禮者忠信之薄不足可依臣鴻敢不忠信奉見唐書曰盧鴻一字浩然范陽人徙家洛陽少有學業善籀楷𨽻𨼆於嵩山開元初備禮再徴不至後一赴召至東都將還山賜𨼆居之服并草堂一所恩禮甚厚蘓昌容拜僕射蘓瓌己見當時拜官例許進食名為燒尾昌容獨無所進將作大匠宗晉卿曰拜僕射竟不燒尾豈不喜耶宋祁唐書曰宗晉卿楚客弟其先南陽人兄弟並坐姦贓流嶺外昌容奏曰臣聞宰相主調隂陽代天理物今粒食踊貴百姓不足臣見宿衛兵至有三日不食者臣愚不稱職不敢燒尾封氏聞見記曰凡新羊入羣為諸羊所觸不相親附火燒其尾則定故初拜官朋僚合宴謂之燒尾貞觀中太宗嘗問朱子奢燒尾事子奢以此為對賀知章拜禮部侍郎兼集賢學士劉昫唐書曰賀知章會稽永興人太子洗馬徳仁族孫少以文詞知名陸象先在中書引為太常博士開元中張説為麗正殿修書使奏請知章及徐堅趙冬曦同撰六典累年不就後轉禮部侍郎加集賢院學士時源乾曜與張説同在政府張説己見孫唐書曰源乾曜相州臨漳人隋比部侍郎師之父直心髙宗時司刑太常伯坐事流嶺南乾曜開元中官至黄門侍郎乾曜問張曰賀公久著盛名今日一時兩加榮命足使學者光耀然學士與侍郎何者為美張曰侍郎自皇朝以來為衣冠之華選自非望實兼美無以居之然終是具貟之吏又非往賢所慕學士懐先王之道為縉紳軌儀藴揚班之詞彩兼游夏之文學始可處之無愧二美之中此實為最𤣥宗嘗問吳筠道法筠答曰道法之精無如老子五千文其諸枝辭蔓説徒喪筆札耳劉昫唐書曰吳筠魯中儒士少通經善屬文性髙潔不柰流俗入嵩山依潘師正為道士開元中南㳺金陵訪道茅山久之東逰天台在剡與文士為詩酒之會所著歌篇𫝊於京師𤣥宗遣使徴之既至與語甚悦令待詔翰林張曲江語人曰學者常想胷次吞雲夢筆頭湧若耶溪量既并包文亦浩瀚劉昫唐書曰張九齡字子夀一名博物曾祖君政韶州别駕因家始興九齡㓜聰敏善屬文十三以書干刺史王方慶大嗟賞之曰此子必能致逺𤣥宗在東宫舉文藻之士親加䇿問九齡對䇿髙第遷右拾遺累官中書令李揆致仕居東都杜司徒罷淮海入洛見之言及事事第一之説揆曰若道門戸門户自有所承官職遭遇爾今形骸凋悴看即下世一切為空何第一之有唐書曰李揆字端卿隴西成紀人秦府學士𤣥道𤣥孫秘書監成裕之子聰敏好學善屬文乾元初兼禮部侍郎揆以主司取士多不考實徒峻其隄防深昧求賢之意請於庭中設五經諸史及切韻本於床引貢士謂之曰大國選士但務得才經籍在此請恣尋檢由是數月之間美聲上聞未及畢事遷中書侍郎揆美風儀善奏對毎有敷陳皆符獻替肅宗賞歎之曰卿門地人物文章皆當代第一故時人有頭頭第一之説李約琴道酒徳詩調皆髙絶一時平生不近粉黛多蓄古器嘗得古鐡一片擊之清越養一猿名山公初至金陵於府主李錡坐屢賛招𨼆寺之勝一日錡宴於寺中明日謂曰十郎嘗誇招𨼆寺昨遊宴細看何殊州中約笑曰某所賞者踈野耳若逺山將翠幕遮古松用綵物褁腥膻涴鹿掊泉音樂亂山鳥聲實不如在叔父㕔也李約己見盧杞與馮盛相遇於道各携一囊杞發盛囊有墨一枚杞大笑盛正色曰天峯煤和針魚腦入金溪子手中録離騷古本如公止提綾紋刺三百為名利奴顧當孰勝已而搜杞囊果三百刺劉昫唐書曰盧杞字子良故相懐慎之孫父奕御史中丞安禄山䧟洛陽奕遇害杞以門䕃解褐率府兵曹徴為御史中丞時尚父子儀病百官造問皆不屏姬侍杞至子儀悉屏去獨𨼆几待之家人問故子儀曰杞形陋而心險左右見之必笑若此人得權即吾族無𩔖矣及居糺彈之地論奏稱㫖遷御史大夫旬日為門下侍郎憲宗嘗問趙相曰人言卿在荆州毬塲草生何也趙對曰死罪有之雖然草生不妨毬子往來上為之啟齒劉昫唐書曰趙宗儒字秉文父曅秘書少監宗儒授校書郎貞元中遷給事中與崔損同拜平章事罷為右庶子端居守道徳宗嘉之遷吏部侍郎召見勞之曰知卿閉闗六年故有此拜栁誠懸栁公權已見性曉音律不好奏樂人問之答曰聞樂令人驕怠白樂天語人曰吾已脱去利名枷鎻開清髙門户但連龕子母丹不知何日成耳劉昫唐書曰白居易字樂天太原人北齊五兵尚書建之仍孫祖鍠父季庚世敦儒業居易聰慧絶人貞元十四年髙郢擢昇甲科授校書郎元和中為集賢校理文辭富豔尤精詩筆所著歌詩意存諷賦箴時之病𥙷政之闕士君子多之往往流聞禁中章武納諫思理渇聞讜言召入翰林為學士陸羽問張志和孰與往來志和曰太虚為室明月為燭與四海諸公共處未嘗少别何有往來宋祁𨼆逸𫝊曰陸羽字鴻漸一名疾字季疵復州竟陵人不知所生有僧得諸水濵既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀乃以陸為氏名而字之𨼆苕溪自稱桑苧翁闔門著書或獨行野中誦詩擊木裴徊不得意或慟哭而歸時謂今接輿也而唐詩紀事曰張志和字子周婺州人母夢楓生腹上産志和十六擢明經肅宗時貶南浦尉不復仕居江湖自稱烟波釣徒著元真子兄鶴齡恐其遁世為築室越州東郭與陸羽往還李徳裕稱志和𨼆而有名顯而無事不窮不逹嚴光之比云文宗喜經術唐書曰文宗諱昴穆宗第二子寳厯二年敬宗遇害乙巳即位于宣政殿唐詩紀事曰帝嘗謂左右曰若不甲夜視事乙夜觀書何以為人君毎試進士多自出題所司進所試披覽吟詠終日忘倦常延學士於内庭討論經義較量古今令宫女侍茶湯飲饌李訓講周易時方盛夏命取水玉腰帶辟暑犀如意賜訓曰如意與卿為談柄讀髙郢無聲樂賦白居易求𤣥珠賦謂之𤣥祖宰相李石因言施士匄春秋可讀帝曰朕嘗見之穿鑿之學徒為異同學者如浚井得美泉而已何必勞苦旁求然後為得劉昫唐書曰李石字中玉隴西人機辯有方畧尤精吏術文宗自李徳裕宗閔朋黨相傾宿素大臣疑而不用意在新進孤立石自戸部侍郎平章事春李肇國史補曰大歴已後専學者有施士匄秋楊嗣復進門下侍郎建言宜省官屬文宗言無乃滯才乎嗣復對曰才者自異汰去粃滓菁華乃出唐書曰楊嗣復字繼之僕射於陵子也七嵗能為文與牛僧孺李宗閔權徳輿皆貢舉門生情義相得進退取捨多同開成二年以戸部侍郎平章事髙貞公郢在中書九年家無制草或問前輩皆有制集公何獨焚之答曰王言不可存於私室唐書曰髙郢字公楚渤海蓨人九嵗通春秋能屬文登茂才異行科授華隂尉嘗以魯不合用天子禮樂乃引公羊𫝊著魯議累官中書侍郎明宗不豫馮道己見入問疾道言寢膳之間尤宜調謹因指御前果實曰如食桃不康他日見李思戒周祖請馮道詣徐州冊湘隂公為漢嗣道曰侍中由𠂻乎周祖設誓道曰莫教老夫謬語令為謬語人江南李昪問道士王栖霞何道可致太平栖霞對曰王者治心治身乃治家國今陛下尚未能去饑嗔飽喜何論太平宋后自簾中稱歎以為至言司馬光通鑑曰凡唐主所賜予栖霞皆不受栖霞常為人奏章唐主欲為之築壇辭曰國用方乏何暇及此俟焚章不化乃當奏請耳宋太祖從周世宗南征有人譛於世宗言太祖有重車數乘世宗遣人伺之果有籠篋令引入行在開視唯書數千卷世宗召太祖諭之曰卿為朕將帥辟疆宇當堅甲利兵何用書為太祖謝曰臣無竒謀上賛聖徳濫膺寄任常恐不迨所以聚書觀覽欲廣聞見增智慮也世宗善其對太祖召見道士證𨼆王聖塗渑水燕談録曰鎮陽道士證𨼆博學多識道行清潔太祖北征時召見之𨼆年九十形氣不衰帝欲留居建隆觀𨼆曰帝都紛華非野人所宜處上訪以養生之術𨼆曰養生之術不過清心練氣耳帝王之道則異於此老子曰我無為而民自化我無欲而民自正軒轅帝堯享國延年率由此道帝甚嘉之宋祖草昧思求異人詔田徴君詣公車會父喪不赴皇朝𩔖苑曰田徴君名告字象宜篤學好文理致髙古嘗學詩於希夷平居寡薄志在經世太祖詔詣公車奔父喪不至淳化中韓丕言於天子召赴闕詔書入門而卒田東遊過濮止王元之舎元之勉進其道後得水𣗳於濟南明水將終焉司馬温公涑水紀聞曰王禹偁字元之濟州人少善屬文舉進士知長洲縣太宗召直史舘纔周歳遂知制誥禹偁性剛狷數忤權貴改翰林學士後落職知黃州致書徐常侍徐鉉己見質其去就徐答曰負鼎叩角顧廬築巖各由其時不失其道在我而已何常之有田遂决髙蹈之計真宗召陳摶至京師士大夫多求其言摶曰優游之所勿乆戀得意之所勿再往魏泰東軒筆録曰陳摶字圖南有經世之才生唐末厭五代之亂入武當山學神仙導養之術能辟穀或一睡三年後𨼆於華山㓂萊公鎮大名北使至語㓂曰相公望重何故不在中書㓂曰主上以朝廷無事北門鎻鑰非凖不可冦萊公遺事曰公諱凖字平仲華州人太宗幸魏公年十六以父陷蕃上書行在辭色激昻舉止無畏上壯之命有司記姓名後二年進士及第䆮以貴顯丁崖州雖險詐然亦有長者言真宗嘗怒一朝士再三語之丁輒退縮不答上作色曰如此叵耐問輒不應丁進曰雷霆之下臣更加一言則虀粉矣真宗欣然嘉納東都事畧曰丁謂字公言初字謂之蘓州人嘗以文謁王禹偁禹偁稱其文比之韓栁其名大振真宗朝拜相以擅移皇堂貶崖州司户及東軒筆録曰丁謂有才智然多希合天下以為姦邪稍進用即啟真宗以神仙之事作玉清昭應宫耗費國帑不可勝紀范文正已見一日見王沂公言宰相當顯㧞人物自丞相當國門下未見一人沂公曰司諫不思耶若恩盡歸已怨將誰歸范公恍若自失王沂公筆録曰公諱曾字孝先青城人自發解南省廷試皆為首冠中山劉子儀戯語之曰狀元試三塲一生喫着不盡公正色曰曾平生之志不在温飽仁宗朝為相封沂國公范文正嘗問琴理於崔遵度崔曰清麗而静和潤而逺琴書是也王君玉國老談苑曰遵度為太子諭徳方正清素尤精於琴著琴箋宋景文言為文是静中一業東都事畧曰宋祁字子京與兄庠同試禮部奏名第一章獻曰弟可先兄乎乃以郊為第一而祁為第十脩唐書成拜翰林學士承㫖謚景文歐陽公歸田録曰宋郊與弟祁自布衣時名動天下當時稱為二宋宋景文言莊周云送君者皆自厓而返君自兹逺毎讀至此令人蕭寥有遺世之意邵康節嘗言善人固可親未能知不可急合惡人固可踈未能逺不可急去道學名臣言行録曰邵雍字堯夫其先范陽人三十來遊于洛葬親伊川遂為河南人嘉祐中詔舉遺逸留守王拱辰薦授將作監簿熙寜初中丞吕誨復薦補頴州團練推官稱疾不之官卒贈秘書省著作謚康節歐陽公嘗問一僧曰古之髙僧有去來翛然者何今世之鮮也僧曰古人念念在定慧臨終安得而亂今人念念在散亂臨終安得而定公深然之司馬文正公云登山有道徐行則不困措足於實地則不危邵氏聞見録曰公不喜肩輿雖山行亦乘馬路險則杖䇿以行程正叔吕氏童䝉訓曰小程先生名頤字正叔舉進士不中不復試元祐初正獻公與司馬温公同薦遂召用侍講禁中旋又罷去貶涪州元符還洛卒于家學者謂之廣平先生後居伊陽又謚伊川先生語其兄明道曰道學名臣言行録曰程顥字伯淳河南人生而神氣秀異異於常兒踰冠舉進士吕公著薦授太子中允卒官宗正寺丞學者稱為明道先生吾兄弟近日説話太多明道曰使見吕晦叔則不得不少見司馬君實則不得不多王荆公謂吕晦叔吕公著己見曰漢元晚節劉向數上䟽切諫疑太犯分晦叔曰有貴戚之卿邵氏聞見録曰吕晦叔王介甫同為館職當時閣中皆名士毎評論古今人物治喪衆人之論必止於介甫介甫之論又為晦叔止也一日論劉向當漢末言天下事反復不休或以為知忠義或以為不逹時變議未决介甫來衆問之介甫卒對曰劉向強聒人耳衆意未滿晦叔來又問之則曰同姓之卿歟衆乃服王荆公作相裁損宗室恩數宗子相率馬首陳狀云均是宗廟子孫那得不看祖宗面荆公厲聲曰祖宗親盡亦須祧遷何况賢輩於是皆散去王荆公居鍾山日與金華俞秀老過故人家飲飲罷小憇水亭顧水際沙間有饌器數件皆黄白物意吏卒所竊使人問之乃小兒適聚於此食棗栗盡棄之而去荆公謂秀老曰士欲任大事閲富貴如羣兒作息乃可耳葉夢得石林詩話曰俞紫芝字秀老揚州人少有髙行不娶得浮屠心法所至翛然而工於詩王荆公居鍾山秀老數相往來公尤愛重之嘉祐初李仲昌議開六漯河荆公時為舘職頗右之既而功不成仲昌以贓敗劉侍讀戯荆公曰要當如宗人夷甫不與世事可也荆公答曰天下之事所以易壞而難合者正以諸賢無意如鄙宗夷甫也但仁聖在上故公家元海未敢䟦扈耳劉原父行狀曰公諱敞字原父𡊮州臨江人學問廣博無書不通自浮屠老子以及山經地誌隂陽卜筮醫藥天文畧皆究知嘗齋太乙宫與内弟王欽臣夜語曰嵗星往來虚危間色甚明盛以吾觀之當有興於齊者嵗餘英宗以齊州防禦入繼大統王荆公嘗問張文定孔子去世百年生孟子亞聖自後絶無人何也文定言豈無只有過孔子上者公問是誰文定言江南馬大師汾陽無業禪師雪峯岩頭丹霞雲門是也公暫聞意甚不解乃問何謂文定曰儒門淡薄收拾不住皆歸釋氏耳荆公欣然歎服後舉似張天覺天覺撫几歎以為佳濟南監鎮宋保國出觀荆公華嚴解東坡曰華嚴有八十一卷今獨其一何也保國云公言此佛語至深妙他皆菩薩語耳東坡曰予於藏經中取佛語數句雜菩薩語中復取菩薩語數句雜佛語中子能識其非是乎曰不能也東坡曰予昔在岐下聞河陽猪肉甚美使人往市之使者醉猪夜逸去貿他猪以償客皆大詫以為非他産所及既而事敗客皆大慙今荆公之猪未敗耳若一念清淨墻壁瓦礫皆説無上妙法而云佛語深妙菩薩不及豈非夢中語耶保國稱善陶朱新録元祐黨人碑有宋保國名姓東坡性不忍事嘗云如食中有蠅吐之乃已捫虱新話曰公嘗自言性不慎語言與人無親踈輒輸寫肝膽有所不盡如茹物不下必吐盡而已而世或記䟽以為怨咨葢實録也東坡在儋耳因試筆嘗自書云吾始至南海環視天水無際悽然傷之曰何時得出此島耶已而思之天地在積水中九州在大瀛海中中國在少海中有生孰不在島者覆盆水於地芥浮於水蟻附於芥茫然不知所濟少焉水涸蟻即徑去見其𩔖出涕曰幾不復與子相見豈知俯仰之間有方軌八逹之路乎念此可為一笑蘇長公自黄移汝道出金陵見介甫甚欵長公曰某欲有言於公介甫色動意長公辯前日事長公曰某所言天下事介甫色定長公曰大兵大獄漢唐滅亡之兆祖宗以仁厚治天下正欲革此今西方用兵東南數起大獄公獨無一言乎介甫舉兩指示長公曰二事皆恵卿啟之某在外安敢言長公曰在朝則言在外則不言事上之常禮耳上所以待公者非常禮公豈得以常禮自處介甫厲聲曰某須説又言出在安石口入在子瞻耳葢介甫畏恵卿恐長公泄之也介甫又語長公人須是知行一不義殺一不辜而得天下弗為乃可長公曰今之君子争减半年磨勘雖殺人亦為之介甫笑而不言楊次公留心釋教嘗因上殿神考頗問佛法楊並不詳答直云佛法實亦有助吾教既歸人言聖主難遇次公平日所學如此今乃唯唯何也楊曰朝廷端欵明辯吾懼度作導師文苑𫝊曰楊傑字次公無為人少有名于時元祐中為禮部貟外郎自號無為子王介甫嘗見舉燭因言佛書有日月燈光明佛燈光豈得以配日月吕吉甫曰日昱乎晝月昱乎夜燈光昱乎晝夜日月所不及其用無差别介甫大以為然東都事畧曰吕恵卿字吉甫泉州晉江人為集賢校勘王安石領制置三司條例司以恵卿為檢詳安石去位薦為叅知政事劉道原劉恕已見不信浮屠説以為必無是事嘗曰人如居逆旅一物不可乏去則盡棄之何得齎以自隨蔣之竒既貴項上大贅每忌人視之為六路大漕至金山寺僧了元即佛印與蔣相善一日見蔣即手捫其贅蔣心惡之了元徐曰冲卿在前頴叔在後蔣大喜朱彧可談曰慈聖后嘗夢神人語云太平宰相項安節神宗宻求諸朝臣無有此人乆之吴冲卿為上相瘰癤生頸間一日立朝項上腫如拳后見之告上曰此真項安節也公東都事畧曰蔣之竒字穎叔常州宜興人少游歐陽之門為部使者十二任六典會府所至以治辯稱官至觀文殿學士馮當世晚年好佛東都事畧曰馮京字當世鄂州江夏人初雋邁不羣舉進士自鄉選至廷對俱第一宰相富弼京之婦翁也京知制誥日韓琦為相京數月不一見琦謂其傲以語弼弼使往見之京曰公為宰相而京不妄詣公者乃所以重公也豈傲哉官叅知政事謚文簡知并州日以書寄王平甫曰并門歌舞妙麗閉目不窺日以談禪為上平甫答曰若如所論未逹禪理閉目不窺已是一重公案東坡與劉貢父㑹語及不獲已之事貢父曰充𩔖至義之盡也東坡曰貢父乃善讀孟子歟魏泰東軒筆録曰劉攽字貢父博學有俊才然滑稽喜謔玩亦屢以犯人蘓子瞻云嵗行盡矣風雨凄然紙窓竹屋燈青熒熒時於此間得少佳趣一日舉似劉貢父貢父曰前數句是夜行迷路誤入田螺精家中來李公擇云余嘗雪中過范堯夫已見于西府先有五客在坐予因衆人論説民間利害公甚喜書室中無火坐久寒甚公命温酒來與坐客各舉兩大白公曰説得通透後令人心神融暢東都事畧曰李常字公擇南康軍建昌人幼力學舉進士調宣州觀察推官方重自持人畏憚之東坡謂晨飲為澆書李黄門謂午睡為攤飯東坡嘗謂劉壯輿曰三國志注中好事甚多道原劉恕已見欲脩之而不果君不可辭也壯輿曰端明曷不為之坡曰某雖工於語言也不是當行家徐度却掃編曰劉羲仲字壯輿劉道原子也道原以史學自名羲仲世其家學劉壯輿常摘歐陽公五代史之訛誤為紏繆以示東坡東坡曰往嵗歐陽公著此書初成王荆公謂余曰歐陽公脩五代史而不脩三國志非也子盍為之余固辭不敢當夫為史者網羅數十百年之事以成一書其間豈能無小得失余所以不敢當荆公之託者正畏如公之徒掇拾其後耳元祐中北敵使劉霄入賀蘓公與狄詠舘伴錫燕囘始行公馬小蹶劉即前訊曰馬驚無苦否公應曰銜勒在御雖小失無傷也蘓長公云元豐六年十月二日夜解衣欲睡月色入户欣然起行念無與樂者遂至承天寺尋張懷民懷民亦未寐相與步於中庭庭中如積水空明水中藻荇交横葢竹栢影也何夜無月何處無竹栢但少閒人如吾兩人耳蘓長公云久在江湖不見偉人前在金山見滕元發乘小舟破巨浪來相訪出船巍然使人神聳文潞公帥長安五朝名臣言行録曰文彦博字寛夫汾州人位至丞相封潞國忠烈公趙萊公録曰寳元中河東闕漕使堂上議難得可任者章郇公言縉紳間説文彦博磊落有稱吕許公曰恨不識也可召來面詢之明日召至許公歎曰此大有福人何所任用不可自殿中侍御史遷待制不出十年出將入相見石才叔所蔵禇遂良聖教序墨蹟愛玩不已令子弟臨一本休日宴僚屬出二本令坐客别之客盛稱公臨本為真才叔不出一語以辯笑啟潞公云今日方知蒼舒孤寒王明清玉照新志曰石蒼舒字才叔雍人也與山谷逰從尤妙筆札家蓄圖書甚富黃太史云士大夫三日不讀書則理義不交於胷中便覺面貌可憎語言無味山谷年譜曰公諱庭堅字魯直分寧人治平丙午赴鄉舉詩題出野無遺賢廬陵李詢讀先生詩中兩句云渭水空藏月傅巖深鎻煙擊節稱賞云此人不惟文理冠塲異日當以詩名擅四海遂膺首選歴官著作佐郎兼史舘晏景初請一僧住院僧辭以窮陋不可為景初曰髙才固易耳僧曰巧婦安能作無麫湯餅乎景初曰有麫則拙婦亦辦矣僧慙而退宋史曰晏敦復字景初丞相殊之曽孫少學於程頤岳武穆嘗入見帝從容問曰卿得良馬不武穆答曰臣有二馬日啖芻豆數斗飲泉一斛然非精潔即不受介而馳初不甚疾比行百里始奮迅自午至酉猶可二百里禠鞍甲而不息不汗此其受大而不茍取力裕而不求逞致逺之材也不幸相繼以死今所乘者日不過數升而秣不擇粟飲不擇泉攬轡未安踊躍疾驅甫百里力竭汗喘殆欲斃然此其寡取易盈好逞易窮駑鈍之材也帝稱善曰卿今議論極進章頴南渡十將傳曰岳飛字鵬舉相州湯隂人少負氣節沈厚寡言性剛直天資敏悟強記書𫝊尤好左氏春秋及孫呉兵法生而有力未冠能引弓三百斤弩八石學射于周同能左右射同死朔望必鬻衣具而酒肉詣同塜奠而泣引同所贈弓發三矢乃酹父知義之虞雍公既却逆亮於采石還至金陵謁葉樞宻義問時張忠定燾及幕屬馮校書方洪檢詳邁在坐相與勞問畢天風欲雪因留夘飲酒方行警報沓至亮懲前䘐將改圖𤓰洲坐上皆恐葉四顧久之酌巵醪以前曰馮洪二君雖叅帷幄實未履行陣舍人威名方新士卒相望勉為國家卒此勲業雍公受之起立曰某去則不妨然記得一小話敢為都督誦之昔有人得一鼈欲烹而食之不忍當殺生之名乃熾火使釡水百沸横篠為橋與鼈約曰能渡此則活汝鼈知主人以計取之勉力爬沙僅能一渡主人曰汝能渡橋甚善更為我渡一遭我欲觀之僕之此行無乃𩔖是乎席上皆笑雍公竟如鎮江亮不克渡而弑自此簡上知馴致魁柄金國與西夏議和翰林待制馮延登為使時李獻甫以書表官從行夏使有口辯延登不能折往復數日至以嵗幣為言獻甫不能平從旁進曰夏國與我和好百年今易君臣之名為兄弟之國兄輸弟幣寜有據耶使者曰兄弟且不論宋嵗輸吾國幣二十五萬疋典故具在金朝必欲脩舊好非此例不可獻甫作色曰使者尚忍言耶宋以嵗幣餌君家而賜之姓岸然以君父自居夏國君臣無一悟者誠謂使者當以為諱乃今公言之使者果能主此議以從賜姓之例弊邑雖嵗捐五十萬獻甫請以身任之夏使語塞和議乃定金史曰李獻甫字欽用獻能從弟也博通書傳尤精左氏及地理學為人有幹局心所到則絶人逺甚時人稱其精神滿腹興定五年登進士第歴咸陽簿累官鎮南節度副使中統初許魯齋應召赴都曰元史曰許衡字平仲懐之河内人幼有異質七嵗入學授章句稍長嗜學如饑渇往來河洛間從姚樞得伊洛程氏之書益大有得中統元年世祖即位召至京師道謁劉静脩先生静脩言公一䀻而起無乃太速許答曰不如此則道不行後至元中徴静脩至以為賛善大夫未幾辭去及召為翰林學士復以疾辭或問之答曰不如此則道不尊元史曰劉因字夢吉保定容城人天資絶人三歳識書日記千百言七嵗能屬文落筆驚人及得程朱之書一見能發其㣲性不茍合家雖甚貧非其義一介不取家居教授師道尊嚴嘗愛諸葛孔明静以脩身之語表所居曰静脩元憲宗時以蒙克薩勒為㫁事官之長其位在三公之上猶漢之大將軍也既拜命出帳殿外欹槖坐熊席其僚列坐左右者四十人蒙克薩勒問曰主上以我長此官諸公其為我言當以何道守官衆皆黙然有夏人果斡居下坐進曰夫扎爾古齊之道猶宰之刲羊也解肩者不使傷其脊在持平而已䝉克薩勒聞之即起入帳内衆不知所為皆咎果斡失言既入乃為帝言之帝召果斡命之步曰是可用之才也果斡由是知名元史曰䝉克薩勒察罕扎拉爾氏祖綽鄂父諾海並事烈祖蒙克薩勒事睿宗恭謹過其父憲宗在藩邸深知之胡汲仲先生言終今之世無善治之日元明善嘗副一䝉古大臣出使交趾瀕還國王贐以兼金䝉古受之明善獨不受國王曰彼使臣已受矣公何固辭明善曰彼所以受者安小國之心我所以不受者全大國之體國王歎服吴定翁嘗言曰士無求用於世惟求無愧於世人以為名言元史曰吴定翁字仲谷臨川人其先宋初自金陵來徙定翁㓜嵗儼如成人清修文雅與孫轍齊名而最善為詩辟薦相望而終不起程鉅夫貽之書曰臨川士友及門者踵相接也何相望足下耿耿如玉人而不可得見乎富珠哩翀在翰林日嘗進講罷上顧問曰三教何者為最優翀對曰釋如黄金道如白璧儒如五穀上曰若爾則儒為賤耶翀對曰黄金白璧無亦何妨五穀於世其可一日闕哉上大説元史曰富珠哩翀字子翬其先隆安人狀貌魁梧不妄言笑其學一本於性命道徳而記問宏博異言僻語無不淹貫文章簡奥典雅學者仰為表儀論者謂許衡之後能以師道自任者惟耶律有尚及翀而已至正中徴處士托音巴延杜本張瑾為翰林待制或議以為擢用太峻左丞相特穆爾達實曰𨼆士無求於朝廷而朝廷有求於𨼆士當時以為名言語林卷五
