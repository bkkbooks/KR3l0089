body:
  text: 語林卷十八明何良俊撰品藻第十昔子貢万人夫子曰我則不暇蓋少之也及觀夫子之論管仲晏子銅鞮伯華程本子蘧伯玉子産孟公綽寧武子諸人其差次品列不遺毫髮此所謂方人者非耶而何獨少子貢也蓋夫子嘗曰不患人之不已知患不知人也則夫子何嘗不貴知人哉然所貴知人者為其能自考也不然知之雖明奚益哉漢晉以來喜人倫其品目率一二語皆微中足以槩人終身此其人豈必盡能自考有所益然足使後之欲論其世者宛然若親見其人則斯語又烏可少哉肅宗雅好崔駰文章范曄後漢書曰崔駰字亭伯涿郡安平人祖父毅並有文章駰十三能通詩易春秋博學有偉才盡通古今訓詁百家之言善屬文少遊太學與班固傅毅齊名嘗語竇憲曰卿知崔駰否憲曰班固數為臣說之然未見也范曄後漢書曰班固字孟堅北地人九歲能屬文長遂博貫載籍顯宗時除蘭臺令史大將軍竇憲出征胸奴以固為中護軍憲敗固坐免官帝曰卿好班固而忽崔駰此何異葉公之好龍莊子曰子張見魯哀公不禮焉去之曰君之好士也有似葉公子髙之好龍雕文畫之於是天龍聞而示之窺頭於牖拖尾於堂葉公見之失其魂魄五色無主是葉公非好龍也好夫似龍非龍也今君非好士也好夫似士者漢桓帝嘗問陳仲舉陳蕃己見徐稚己見𡊮閎己見曰謝承後漢書閎少修志節矯俗髙厲韋著范曄後漢書曰著字休明扶風平陵人六世祖賢漢丞相父豹廣都長著少以經行知名不應州郡之命京謝承後漢書曰著三輔冠族少修節操持氏易韓詩博通藝術三人孰為先後仲舉對曰閎生出公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕至於稚者爰自江南卑薄之域而角立傑出宜當為先或問汝南許章曰叔慈皇甫謐髙士傳曰荀靖字叔慈潁川潁隂人父淑朗陵侯相靖少有俊才動止以禮及卒學士製誄者二十六人潁隂令丘正追諡曰𤣥行先生慈明張璠漢紀曰荀爽字慈明荀靖之弟幼好學十三能通春秋論語太尉橋𤣥稱其可為人師長遂耽思經書慶弔不行徵命不應遂成大儒孰賢許曰二荀皆玉也慈明外朗叔慈內潤陳太丘范曄後漢書曰陳實字仲弓潁川許人除太丘長少著清德連辭徵命閉門懸車棲遲養老中平四年卒于家數𫝊子曰實亡天下致弔㑹葬者三萬人制衰麻者百先賢行狀曰大將軍遣官屬弔祠追諡文範先生子紀范曄後漢書曰紀字元方亦以至德稱兄弟孝養閨門雍和弟諶字季方海內先賢行狀曰實紀髙名並著而諶又配之世號三君每宰府辟命率皆同至羔鴈成群紀子群范曄後漢書曰群字長文為兒時祖父實竒之謂宗人曰此兒必興吾宗仕魏官至侍中魏志曰魯國孔融才髙倨傲年在群紀之間先與紀友後與群交更為紀拜由是顯名並有髙名天下以為公慚卿卿慚長郭林宗目汝南謝子微謝甄己見陳留邉文禮典略曰邉讓字文禮陳留浚儀人少博辨能屬文何進欲辟之恐不至詭以軍事徵既到署令史進以禮見之時賔客滿座莫不羡其風府掾孔融王朗修刺候焉二子英才有餘並不入道後甄以不拘細行為時所毁讓以輕侮曹操為鄉人所搆操告郡就殺之孔北海孔融己見與平原陶邱洪陳留邉讓並以俊秀為後進冠蓋孔持論經理不如洪讓逸才宏博過之邉文禮才辨俊逸孔北海嘗薦於曹公曹操己見曰邉讓為九州之被則不足為單衣襜褕則有餘范曄後漢書曰蔡中郎深重讓薦於何進曰伏惟幕府初開博選清英華髮舊德並為元龜雖振鷺之集西雍濟濟之在周庭無以或加竊見陳留邉讓天授逸才聰明賢智髫齔夙孤不盡家訓及就學廬便受大典初涉諸經見本知義授者不能對其問章句不能逮其意心通性達口辨辭長若處狐疑之論定嫌審之分經典交至檢括參合衆夫寂焉莫之能奪使讓生在唐虞則元凱之次運值仲尼則顔冉之亞豈徒俗之凡偶近器而已階級名位亦宜超然若復隨輩而進非所以章瓌偉之髙價昭知人之絶明也傳曰函牛之鼎以烹雞多汁則淡而不可食少汁則熬而不可熟此言大器之於小用固有所不宜也雍竊悁邑怪此寶鼎未受犧牛大羮之和久在煎熬臠割之間願明將軍回謀垂慮裁加少納貢之機密展之力用若以年齒為嫌則顔回不得貫德行之首子奇終無阿宰之功茍堪其事古今一也華子魚華歆己見與北海邴根矩邴原己見管幼安管寧己見游學相善時號三人為一龍華為龍頭邴為龍腹管為龍尾裴松之云邴根矩之徽猷懿望不必有愧華公管幼安含德髙蹈又恐弗當為尾魏略此言未可以定其優劣也何良俊曰華子魚輸心異代大肆戈鋋邴根矩避難殊方自露環頴較之幼安韜精戢羽終始令德者豈可同年而校其優劣哉篤而論之當以管為龍頭邴為龍腹華為龍尾王景興在會稽魏志曰王朗字景興東海郡人以通經拜郎中師太尉楊賜賜亡棄官行服陶謙察朗茂才為謙治中後謙奉章至長安天子嘉其意俱拜官朗為㑹稽太守孫策渡江舉兵迎策連戰敗績朗詣策曹公表徵之朗自曲阿展轉江海積年乃至思賢嘉善樂採賢俊問功曹虞仲翔虞翻己見曰聞玉出崑山珠生南海逺方異域各生珍寶且聞士人歎美貴邦舊多英俊徒以逺于京畿含香未越耳功曹雅好博古寧識其人耶虞對曰夫會稽上應牽牛之宿下當少陽之位東漸巨海西通五湖南暢無垠北渚浙江山有金玉鳥獸之殷水有魚鹽珠蚌之饒海嶽精液善生俊異是以忠臣係踵孝子連閭下及賢女靡不育焉景興笑曰地勢然矣士女之名可悉聞乎仲翔曰不敢及逺請略舉其近往者孝子句章董黯盡心色養喪致其哀單身林野鳥獸歸懷怨親之辱白日報讐海內聞名昭然光著太中大夫山隂陳囂漁則化盜居則讓鄰感侵退藩遂成義里攝養車嫗行足厲俗自揚子雲等上書薦之粲然傳世太尉山隂鄭公清亮質直不畏彊禦魯相山隂鍾離意禀殊特之姿孝家忠朝故取養有君子之謨魯國有丹書之信及陳宫費齊皆上契天心功德治狀記在漢籍有道山隂趙曄徵士上虞王充各洪才淵懿學究道源著書垂藻駱驛百篇釋經傳之宿疑解當世之槃結或上窮隂陽之奧祕下據人情之歸極交址刺史上虞綦母俊拔濟一郡讓爵土之封决曹掾上虞孟英三世死義主簿句章梁宏功曹史餘姚駟勳主簿句章鄭雲皆敦終始之義引罪免居門下督盜賊餘姚伍隆􅀈􅀈候主簿任光章安小吏黃他身當白刃濟君於難揚州從事句章王修委身授命垂聲來世河內太守上虞魏少英遭世迍蹇忘家憂國列在八俊為世英彥尚書烏傷楊喬桓帝妻以公主辭疾不納近故太尉上虞朱公天資聰亮欽明神武䇿無失謨征無遺慮是以天下義兵思以為首上虞女子曹娥父溺江流投水而死立石碑紀炳然著顯景興曰是既然矣潁川有巢許之逸軌吳有太伯之三讓貴郡雖士人紛紜於此足矣仲翔對曰故先言其近者耳若乃引上世之事及抗節之士亦有其人昔越王翳讓位逃於巫山之穴越人薰而出之斯非太伯之儔耶且太伯外來之君非其地人也若以外來言之則大禹亦巡於此而葬之矣鄞大里黃公潔已暴秦之世髙祖即阼不能一致惠帝恭讓出則濟難徵士餘姚嚴遵王莽數聘抗節不行光武中興然後俯就矯手不拜氣凌雲日皆著於傳籍較然彰明豈如巢許流俗遺談不見經傳者哉景興笑曰善哉話言也賢矣非君不著太守未之前聞也陳元龍陳登己見使功曹陳季弼詣許謂之曰許下論議待吾不足足下相為觀察還以見誨季弼還曰聞逺近之論頗謂明府驕而自矜元龍曰夫閨門雍穆有德有行吾敬陳元方兄弟淵清玉潔有禮有法吾敬華子魚清修疾惡有識有義吾敬趙元達博聞強記竒逸卓犖吾敬孔文舉雄姿傑出有王伯之略吾敬劉𤣥德所敬如此何驕之有餘子瑣瑣亦焉足録哉魏志曰陳矯字季弼廣陵東陽人初為陳登功曹太祖辟為司空掾歷官侍中司徒髙貴鄉公即位神明爽雋德音宣朗朝罷司馬景王私問鍾會曰上何如主會曰才同陳思武類太祖景王曰果如卿言社稷之福張惠恕少修節操容貌奇偉吳志曰張溫字惠恕吳郡吳人父允輕財重士名顯州郡溫少知名孫權徵到延見文辭占對觀者傾竦權改容加禮罷出張昭執其手曰老夫托意君宜明之吳主聞之後以問群臣曰溫當今與誰為比大司農劉基曰吳志曰劉基字敬輿劉繇子美姿容孫權甚敬嘗宴於船中值雷雨權以蓋自覆又命覆基餘人不得也卧吳書曰基遭多難潜處味道不以為戚與群弟常夜早起妻妾希見其面諸弟事之猶父不妄交游門無雜賔可與全琮為輩吳志曰全琮字子璜吳郡錢塘人江表傳曰琮治富春經過錢塘修祭墳墓請會平生知舊宗族施散惠與千有餘萬本土以為榮太常顧榮曰基未詳其為人也溫當今無輩張惠恕至蜀諸葛武侯甚知之吳志曰溫以輔義中郎使蜀權謂溫曰卿不宜逺出恐諸葛孔明不知吾所以與曹氏通意故屈卿行若山越都除便欲太搆於蜀行人之義受命不受辭也溫對曰臣入無腹心之規出無專對之用懼無張老延譽之功又無子産陳事之效然諸葛亮達見計數必知神慮屈申之宜加受朝廷天覆之惠惟亮之心必無疑二溫至蜀詣闕拜章曰昔髙宗以諒暗昌殷成王以幼冲隆周功冒溥天聲貫罔極今陛下以聰明之姿等契往古總百揆於良佐參列精之炳耀遐邇望風莫不欣賴吳國勤任旅力清澄江滸願與有道平一宇內委心協規有如河水軍事興煩使役乏少是以忍鄙倍之羞使下臣溫通致情好陛下敦崇禮義未便耻忽臣自入逺境及即近郊頻蒙勞來恩詔輒加以榮自懼悚怛若驚謹奉所齎函書一封蜀甚貴其才權既銜溫稱美蜀政又兼其聲名太盛衆庶眩惑因暨豔事廢溫及聞惠恕黜免未得其故思之數日曰吾今已了矣其人於清濁太明善惡太分㑹稽典録曰餘姚虞俊歎曰張惠恕才多智少華而不實怨之所聚有覆家之禍吾見其兆矣諸葛亮聞俊憂溫意未之信及溫放黜亮乃歎俊之先見有人言許子將褒貶不平以拔樊子昭而抑許文休劉子揚曰劉曄己見子昭拔自賈豎年至七十退能守靜進不茍競子將之拔夫亦宜爾蔣子通曰魏志曰蔣濟字子通楚國平阿人官領軍將軍著萬幾論宣世語曰濟隨司馬宣王屯洛水浮橋濟書與曹爽言王㫖唯免官而已爽誅滅濟病其言之失信發病卒子昭誠自幼至長容貌完潔然觀其插牙齒樹頰頦吐脣吻自非文休之敵王朗與許靖書曰武皇帝於江陵劉景升㕔事上共論足下至於通夜不寐饑渴無已崔琰從弟林嘗與陳群共論冀州人士稱琰為首群以智不存身貶之林曰大丈夫為有邂逅耳即如卿諸人良足貴乎張輔吳張昭己見官輔吳將軍在孫權坐嘗論劉子初𥚹厄不當拒張飛太甚零陵先賢傳曰張飛嘗就巴宿巴不與語足飛忿恚諸葛亮謂巴曰張飛雖武人敬慕下主公方收合文武以定大事足下雖天素髙亮宜少降意巴曰大丈夫處世當交四海英雄如何與兵子共語備聞之怒曰孤欲定天下而子初専亂之其欲還北假道於此豈欲成孤事耶備又曰子初才智絶人如孤可任用之非孤者難獨任也亮亦曰運籌策於幃幄之中吾不如子初若提枹鼓㑹軍門使百姓喜勇當與人議之耳權曰若令子初隨世沉浮容恱𤣥德交非其人何足稱髙士荀奉倩謂其父文若立德髙整軌儀以訓物從兄公達不治外形而愼密自居以公達為優晉陽秋曰諸兄大怒之而不能迥回也吳宣太子妙選官屬東宫號為多士吳志曰孫登字子髙權長子黃初二年立為太子好賢下士接待寮屬略用布衣之禮使侍中胡綜吳志曰胡綜字偉則汝南固始人有文才作賔客目曰英才卓越超踰倫匹則諸葛恪己見精識時機達幽究微則顧談己見凝辨宏達言能釋結則謝景吳歷曰謝景字叔發南陽宛人為豫章太守在郡有治迹吏民稱之以為前有顧劭其次即景究學甄微游夏同科則范愼己見十吳録曰愼著論二篇名曰矯非南陽羊道私駮綜曰羊道己見監吳書曰羊道初為中庶子年二十時廷尉𨼆蕃交結豪傑自衛將軍全琮等皆傾心敬待惟道及豫章楊迪拒絶不與通人咸怪之蕃後叛逆衆乃服之元遜才而踈子默精而狠叔發辨而浮孝敬深而狹所言皆有指趣然道竟以此言不為恪等所親後四人皆敗時以道為知言李令伯李密己見入洛見張茂先張言次問孔明言教何碎令伯曰昔舜禹臯陶相與語故得簡大雅誥與凡人語宜碎孔明與言者無已敵言教是以碎耳張公大善令伯對晉武與胡威語次因及其父胡質己見清德遂問威曰卿自謂孰與父清威曰威乃何敢望臣父帝又問卿父以何為勝耶威答曰臣父清常恐人知臣清常恐人不知王武子甚重荀松以方其外祖陳郡𡊮侃謂侃弟奧曰近見荀監子清虛名理當不及父德性純粹是賢兄輩人也王太尉王衍己見甚重其弟平子王澄己見與處仲王敦别見庾子嵩晉陽秋曰庾敳字子嵩潁川人侍中竣第三子恢廓有度量自謂是老莊之徒曰昔未讀此書意謂至理如此今見之正與人意暗同仕豫州長史嘗謂天下士人目曰阿平第一子嵩第二處仲第三王平子嘗行經陳留郡界陳留時為大郡名有人士太守遣吏迎王王問吏曰此郡人士為誰吏曰有蔡子尼江應元蔡克江統己見是時郡人多居大位者王以其姓名問曰甲乙等非君郡人耶何但稱此二人吏曰向謂君侯問人不謂問官位王笑而止到郡以語太守曰舊名此邦有風俗果然小吏亦復知此時人目王汝南鄧粲晉紀曰王湛字處冲太原人𨼆德人莫之知雖兄弟宗族亦以為癡唯父昶異焉上方山濤不足下比魏舒有餘王聞之曰欲處我於季孟之間山濤魏舒並己見衛洗馬衛玠穎識通達天韻標令論者以為出王眉子平子武子之右世人為之語曰諸王三子不如衛家一兒王澄王濟己見掾晉諸公贊曰王元字眉子夷甫子也東海王越辟為後除陳留太守大行威罰為塢人所害州里目陳留阮放為宏伯晉書曰阮放字思度祖略齊郡太守父顗淮南內史放與族弟孚並知名中興時為太子舍人雖戎車屢駕而常說老莊不及軍國明帝甚愛之素清約不營産業為吏部郎不免饑寒王導庾亮供給衣食髙平郤鑒為方伯泰山胡母輔之為達伯濟隂卞壼為裁伯陳留蔡謨為朗伯阮孚為誕伯上五人己見髙平劉綏為委伯晉諸公贊曰劉綏字萬安髙平人祖奧太祝令父武著作郎綏歷驃騎長史泰山羊曼為䵬伯羊曼别傳曰曼字延祖泰山南城人父暨陽平太守曼頽縱任俠飲酒誕節與陳留阮放等號兖州八達纍遷丹陽尹為蘇峻所害凡八人號兖州八伯以擬八雋解叔連在豫州晉書曰解結字叔連濟南著人與兄系齊名辟公府掾纍遷豫州刺史時孫秀亂關中結在都坐議秀罪應誅秀由是致憾及系被害結亦同戮嘗問從事陳頵曰河北白壤膏粱何故少人士晉書曰陳頵字延思陳國苦人少好學有文義陳曰英偉大賢多出山澤河北土地平均蓬蒿裁髙三尺不足成林故也叔連曰張彥真張升己見以為汝潁巧辨不及青徐儒雅陳曰張彥真與元禮李膺己見不協故設過言老子莊周生陳梁伏羲傅說師曠大項出陽夏漢魏二祖起於沛譙凖之衆州莫與為比叔連甚異之曰豫州人士常半天下此言非虛裴景思是裴叔則子晉書曰裴憲字景思少而頴悟好交輕俠及弱冠更折節嚴重修尚儒學足不踰閾者數年謝幼輿庾子躬名士傳曰子躬名琮子嵩兄也甚知之嘗曰裴憲鯁亮宏達通機識命不知其何如父至於深宏保素不以世物嬰心者其殆過之諸葛恢蔡謨二人並己見與荀闓晉書曰荀闓字道明有名稱京師語曰洛中英英荀道明齊王冏辟為掾冏敗暴尸三日莫敢收葬闓與冏故吏李述嵇含等露板請葬朝議聽之論者稱焉俱字道明並有名江左號為中興三明時人為之語曰京都三明各有名蔡氏儒雅荀葛清荀道元荀邃己見道明兄弟俱有名明帝嘗從容問王世將王廙己見曰二荀兄弟孰賢世將答以闓才明過邃帝以語庾太尉太尉曰邃真粹之地亦闓所不及庾赤玉赤玉庾統小字也晉中興書曰統字長仁穎川人衛將軍懌子少有令名仕至尋陽太守曾問殷洪喬殷羡己見王丞相治何似詎是所長殷曰其餘令績不復稱論然三捉三治三休三敗中朝人共論少正卯盜跖其惡孰深有人云少正卯雖姦不至剖人充膳盜跖為甚顔光祿顔含已見曰為惡彰露人思加戮隱伏之姦非聖不誅由此言之少正為甚衆莫能屈或問江左諸人優劣於顔光祿顔曰周伯仁周顗己見之正鄧伯道之清晉陽秋曰鄧攸字伯道平陽襄陵人七歲喪父母及祖父母持重九年性清愼平簡卞望之卞壼己見之節餘則吾不知支道林目會稽王曰有逺體而無逺神續晉陽秋曰簡文帝諱昱字道萬中宗少子初封會稽王仁聞有智度穆帝幼冲以撫軍輔政大司馬桓溫廢海西公而立帝在位三年而崩桓茂倫性通朗有人倫鑒識時人方之許郭雅為周侯所重周嘗歎曰茂倫嶔﨑歷落是可笑人劉尹謝鎮西共論中朝士人或問杜又可方衛洗馬不謝曰安得比中間可容數人顧長康在桓公大司馬府桓公曰長康體中癡黠各半合而論之正得平耳丘淵之文章録曰顧愷之字長康晉陵人父恱尚書左丞愷之義熙初為散騎常侍為晉中興書曰愷之博學有才氣為人遲鈍而自矜尚時所笑宋明帝文章志曰世云愷之有三絶畫絶文絶癡絶王季琰王珉别傳曰珉字季琰琅邪人丞相導孫中領軍洽少子有才藝善行書名出兄珣右纍遷侍中中書令有雋才與兄元琳王珣己見並有美稱季琰又出元琳右時人為之語曰法護非不佳法護王珣小字僧彌難為兄僧彌王珉小字羊𤣥保為司徒長史沈約宋書曰羊𤣥保太山南城人祖楷尚書都官郎父綏中書侍郎𤣥保起家楚臺太常博士至散騎常侍府公王𢎞甚知之謂左長史庾登之南史曰庾登之字元龍恱族弟也曾祖氷晉司空祖藴廣州刺史父廓東陽太守登之少以彊濟自立為宋武帝鎮軍參軍預討桓𤣥功封曲江縣男豫章太守吏部尚書王淮之己見曰卿二賢明美朗識會悟多通然𢎞懿之望故當共推羊也有蔡湛之者甚重謝𢎞微湛之猶及見謝安兄弟嘗語人曰𢎞微貌類中郎謝萬性似文靖謝安謝尚書謝混己見嘗云阿逺剛躁負氣謝瞻小字己見阿客博而無檢靈運小字阿多恃才而持操不篤謝曜己見宣明自知而納善不周謝晦己見設復功濟三才終亦以此為恨至如微子吾無間然謝密己見謝叔源嘗因酣宴之餘為韻語以奬訓靈運等曰康樂誕通度實有名家韻若加繩染功剖瑩乃瓊瑾宣明體逺識穎達乃沉雋若能去方執穆穆三才順阿多標獨解弱冠纂華允質勝誡無文其尚又能峻通逺懷清悟采采標蘭訊直轡鮮不躓抑用解偏吝微子基微尚無倦由慕藺勿輕一簣少進往將千仞數子勉之哉風流由爾振如不犯所知此外無所愼靈運等皆有誡厲之言惟𢎞微獨盡褒美世目謝宣明涉獵文義朗贍多通以方楊德祖微將不及宣明聞猶以為恨或人問沈休文王惠何如休文曰令明簡問王球何如曰蒨玉淡又次問謝𢎞微何如曰簡而不失淡而不流古之所謂名臣𢎞微當之矣王蒨玉王球居身簡貴不雜交游筵席虛靜門無異客從兄曇首常語云蒨玉亦是玉巵但無當耳齊太祖素竒愛張思光為太尉時與思光欵接見思光常笑曰此人不可無一不可有二王僕射王儉己見語人曰張緒過江所未有北士中可求之耳不知黃叔度陳仲弓能過之不到長史在天監中甚見知賞梁書曰到洽字茂沿彭城武原人宋驃騎將軍彥之曾孫祖仲度江夏王從事中郎父坦齊中書郎洽少清警有才行謝朓文章盛於一時見洽深相賞好日引與談論每謂洽曰君非直名人乃亦兼資文武除晉安國常侍後為雲麾長史時二兄沼溉與從弟沆一時俱有美名南史曰到溉字茂灌兄弟俱知名起家王國常侍樂安任昉大相賞好廣為聲價家門雍睦兄弟特相友愛與洽恆共居一齊洽卒後便捨為寺蔣山有延賢寺溉家世所立溉得祿俸皆充二寺因斷腥膻終身𬞞食朝夕從僧徒禮誦武帝每月三致淨饌性不好交游唯與朱异劉之遴張綰同志友密及卧疾門可羅雀三人恆鳴騶枉道以相存問置酒極歡而去梁書曰到沆字茂瀣父撝齊五兵尚書沆幼聰敏善屬文為人不自伐不論人長短樂安任昉南鄉范雲皆友善官北中郎咨議參軍髙祖嘗問丘待詔丘遲到洽何如沆溉丘對曰清正過於沆文章不減溉加以清言殆將難及梁元帝嘗自言我韜於文士愧於武夫論者以為得言元文若少有文學時譽甚美魏書曰元彧字文若大武皇帝之孫臨淮王談之子也與從兄安豐延明中山熙並是宗室以博古文學齊名時人莫能定其優劣范陽盧道將謂吏部清河崔休曰三人才學雖無髙下然安豐少於造次中山太多皂白未若濟南風流沉雅時人為之語曰三王楚琳琅未若濟南備貟方邢子廣目二盧云詢祖有規檢禰衡思道無氷稜文舉梁使至北與館伴李緯語次因問安平諸崔緯曰子玉以還雕龍絶矣崔暹聞之而怒後緯詣門謝暹暹不顧而出崔㥄端凝如神以簡貴自處齊神武言崔㥄應作令僕恨其神明太遒房𤣥齡在隋嘗校讐祕書省時吏部侍郎髙孝基名知人謂裴矩曰僕觀人多矣未有如此郎者當為國器但恨其不見聳壑昂霄耳太宗嘗因群臣侍宴語王圭曰卿識鑒精通尤善談論自房𤣥齡以下咸宜品藻又可自量孰與諸子賢劉昫唐書曰王圭字叔玠太原祁人祖僧辨梁太尉圭恬淡少欲志量沉深叔頗當世通儒有人倫之鑒謂所親曰門戶所寄惟在此兒貞觀中與房𤣥齡李靖溫彥博戴胄魏徵同知國政圭對曰孜孜奉國知無不為臣不如𤣥齡才兼文武出將入相臣不如李靖劉昫唐書曰李靖本名藥師雍州三原人姿貌瓌偉少有文武材略其舅韓擒虎號為名將每與論兵未嘗不稱善曰可與論孫吳之術者唯斯人矣王通中說曰靖也惠而斷敷奏詳明出納唯允臣不如溫彥博劉昫唐書曰溫大雅弟名彥博聰悟有口辨涉獵書記父友薛道衡李綱見彥博兄弟咸歎異曰皆卿相才也處繁理劇衆務必舉臣不如戴胄劉昫唐書曰戴胄字𤣥𦙍相州安陽人性貞正有幹局明習律令尤曉文簿貞觀中官尚書僕射房𤣥齡魏徵美胄才用俱與親善以諫諍為心耻君不及於堯舜臣不如魏徵房𤣥齡魏徵並己見至於激濁揚清嫉惡好善臣於數子亦有一日之長太宗深然其言諸人各以為盡已所懷謂之確論溫大雅在隋與顔思魯俱在東宫彥博與思魯弟愍楚同直內史省彥將與愍楚弟遊秦同典校祕閣二家兄弟各為一時人物之選世以為小時學業顔氏為優後來官位溫氏為盛太宗嘗語人曰人言魏徵舉動踈慢我但覺其嫵媚耳禇河南禇遂良己見一日問虞祕監虞世南己見某書何如永師虞曰聞彼一字直錢五萬官豈得若此又問何如歐陽詢虞曰聞詢不擇紙筆皆能如志官豈得若此禇恚曰若爾某何得更留意於此虞曰若手和筆調遇合作者亦深可貴尚禇喜而退李綱己見為詹事隱太子嘗至溫湯綱以小疾不從有獻生魚者太子召饔者鱠之時李檢趙元楷在坐各自贊能為鱠太子謂之曰飛刀鱠鯉調和鼎食公實有之至於審諭弼諧固屬李綱矣馬周雅善敷奏動無不中唐詩紀事曰馬周字賔王博州人嗜學天資曠邁𥙷州助教不治事刺史達奚怒數咎責周去客密州趙仁本髙其才厚以資使入關留汴為浚儀令崔賢所辱遂感激而西至長安客常何家太宗召之後為中書令岑文本謂人曰吾觀馬君論事多矣援引事類揚𣙜古今舉要刪蕪㑹文切理奇鋒髙論往往間出聽之靡靡令人忘倦昔之蘇張鍾賈正應此耳然鳶肩火色騰上必速恐不能久耳無何而卒如文本言唐詩紀事曰岑文本字景仁鄧州人中書侍郎顔師古以譴罷太宗曰朕自舉一人乃授文本侍郎專典機要來恆與其弟濟相次知政事時以為榮初濟父護兒在隋為將而恆濟俱以學行見稱虞世南子昶既無才術纍居工作之司濟初升相位許敬宗歎曰士之登庸不繫世業履道則為衣冠失緒則為匹庶來護兒兒作相虞世南兒作匠唐詩紀事曰來濟揚州人父護兒隋左翊衛將軍濟志好學有文詞善談論正觀中置太子司議郎髙其選以濟為之永徽中為相崔融李嶠張說俱重四傑之文崔嘗曰王勃文章宏放奔逸有絶塵之迹固非常流所及唯炯與照鄰可以企之盈川之言信矣說曰盈川文思如懸河注水酌之不竭既優於盧亦不減王耻居王後信然愧在盧前謙也世稱王楊盧駱謂之四傑炯聞之曰吾愧在盧前耻居王後世言楊盈川之文好以古人姓名連用號為㸃鬼簿駱賔王文好數對號算博士蘇味道髙爽唐詩紀事曰味道趙州人與里人李嶠同掌綸誥稱蘇李武后時為相世號模稜手王方慶别見魯鈍同時為鳳閣侍郎或問張元一二子孰賢元一答曰蘇如九月得霜鷹王如十月被凍蠅朝野僉載曰或人又問其故元一答曰得霜鷹俊健被凍蠅頑怯人伏其能體物中宗正月晦日幸昆明池賦詩群臣應制百餘篇帳殿前結綵樓命上官昭容選一首為新翻御製曲從臣悉集其下須臾紙落如飛各認其名而懷之唯沈宋二詩不下又移時一紙飛墜競取而觀乃沈詩也昭容評曰二詩工力悉敵沈詩落句云微臣雕朽質羞覩豫章材蓋辭氣已竭宋云不愁明月盡自有夜珠來猶陡健舉沈乃不敢復爭唐詩紀事曰昭容名婉兒西臺侍郎儀之孫父廷芝與儀死母鄭方妊夢巨人畀大稱曰持此稱量天下昭容生踰月母戲之曰稱量者豈爾耶輒啞然應後內秉機政符其夢云自通天來內掌詔命中宗立進昭容帝引名儒賜宴賦詩婉兒常代帝及后長寧安樂二公主衆篇並作采麗益新又差第群臣所賦賜金爵朝廷靡然成風當時屬辭大抵浮靡然皆可觀昭容力也韋后之敗斬闕下中宗嘗召宰相蘇瓌李嶠之子進見時皆童年帝謂曰汝等各以所通書取宜奏吾者言之頲應曰木從繩則正后從諫則聖嶠之子亦奏曰斫朝涉之脛剖賢人之心帝曰蘇瓌有子李嶠無兒蘇廷碩蘇頲己見與宋廣平同在政府廣平剛正多所裁斷蘇皆順從其美廣平甚恱之嘗謂人曰吾與蘇氏父子皆同時為宰相僕射長厚誠為國器然獻可替否罄盡臣節則頲實過之東明觀道士周彥雲欲為其師立碑謂蘇昌容曰成某志者不過煩相君諸子五郎文頲六郎書詵善八分書七郎致石瓌大笑口不言而心服其當張燕公徐元固張說徐堅並己見同在集賢十餘年好尚頗同情契相得諸學士凋落者衆燕公手疏諸人名與元固同觀之元固謂燕公曰諸公昔年皆擅一時之美敢問孰為先後燕公言李嶠崔融薛稷宋之問如良金美玉無施不可李嶠崔融宋之問並己見從劉昫唐書曰薛稷中書令元超之從子與兄曜俱以辭學知名同在兩省為時所稱富嘉謨之文如孤峯絶岸壁立萬仞叢雲鬱興震雷俱發誠可貴乎若施於廊廟則駭矣唐詩紀事曰富嘉謨武功人長安中為晉陽尉吳少微者亦尉晉陽有魏倚谷者為太原主簿稱北京三傑時天下文章尚徐庾浮俚嘉謨少微本經術雅厚雄邁人爭慕之號吳富體閻朝隱之文如麗色淨妝衣之綺繡燕歌趙舞觀者忘憂然類之風雅則罪人矣唐詩紀事曰閻朝𨼆字友情趙州欒城人性滑稽屬辭奇詭為武后所賞景龍時為祕書少監坐事貶通州别駕元固因問今之後進文辭孰賢燕公曰韓休之文如太羹𤣥酒雅有典則而薄於滋味劉昫唐書曰韓休京兆人早有詞學蕭嵩引為門下侍郎方直不務進趨甚允當時之望許景先己見之文如豐肌膩理穠華可愛而乏風骨張九齡己見之文如輕縑素練雖濟時用而窘於邉幅王翰之文如瓊杯玉斚爛然可珍而有玷缺唐詩紀事曰王翰字子羽晉陽人少豪健恃才張嘉正張說為并州長史厚禮之為駕部郎坐事貶道州司馬若能成其所闕濟其所長亦各一時之秀也齊浣善知今事唐詩紀事曰齊浣字洗心定州人開元間與蘇晉蘇頲賈曾韓休許景先孫逖典詔誥為代言最杜暹當國表宋璟為吏部尚書浣及蘇晉為侍郎世謂臺選嘗稱陳希烈苗晉卿之才後皆大顯髙仲舒善知古事劉昫唐書曰髙睿雍州萬年人子仲舒博通經史尤明三禮及詁訓之書神龍中為相王府文學王甚重之開元中授中書舍人宋璟蘇頲每詢訪故事焉姚崇每咨此兩人嘗曰欲知古事問仲舒欲知今事問齊浣一說今事問崔琳姚梁公與崔監同在中書梁公在假旬日政事委積崔處置皆不得自言於𤣥宗𤣥宗曰朕以天下事本付姚崇以卿坐鎮雅俗耳及梁公出頃刻間决遣盡畢時齊平陽見之梁公自以為能頗有得色因問平陽曰余之為相可是誰比平陽未及對梁公曰何如管晏曰不可比管晏管晏作法雖不及後猶及其身相公作相所立法令施未竟悉更之以此不及梁公曰然則竟何如曰相公可謂救時之相也梁公投筆曰救時之相豈易得乎平陽即齊幹張說為左丞相知京官考其子均任中書舍人說時注曰父教子忠古之善訓祁奚舉午義不勝私至如潤色王言章施帝載道參墳典例絶常功恭聞前烈尤難其任豈以嫌疑敢撓綱紀考上下人服其公劉昫唐書曰張均丞相說之子能文章自以才名為李林甫所抑意常鬱鬱祿山陷京師授僞中書令後免死流合浦盧藏用嘗謂李雍如干將莫邪難與爭鋒但虞傷缺耳唐詩紀事曰盧藏用字子潜幽州人初𨼆終南少室二山時有意當世人目為隨駕𨼆士晚乃狥權利官至黃門侍郎裴子餘𥙷鄠尉同舍李朝隱程行諶以文法稱而子餘以儒顯或問優劣於長史陳崇業陳答曰蘭菊異芬胡有廢者大唐傳載曰二子卒子餘諡孝行諶諡正張說歎曰二諡可無愧矣魚朝恩判國學日會釋菜執易升座百官在列朝恩言鼎有覆餗象以侵宰臣劉昫唐書曰魚朝恩天寶末以宦者入內侍省性黠惠善宣答通書計至德中為觀軍容使恃勳自伐乃引輕薄文士講授經籍自謂有文武才幹上優遇之加判國子監事時王縉大怒唐詩紀事曰王縉字夏卿河中人與兄維俱以名聞舉草澤文辭清麗科相肅宗元載己見怡然朝恩曰怒者常情笑者不可測劉蕡精於儒術嘗看文中子忿然言曰才非殆庶擬上聖述作不亦過乎客曰文中子於六籍何如蕡曰若以人望人文中子於六籍猶奴婢之於郎主也世遂以文中子為六籍奴婢宋祁唐書曰劉蕡字去華幽州昌平人文宗朝舉直言極諫對策切直第策官馮宿賈餗龎嚴見之嗟服以為過古朝董畏中官睚眦皆不敢取張𢎞靖三代掌書命皆在台座前此未有張嘉貞生延賞延賞生𢎞靖皆在中書時號三相張氏楊巨源贈詩曰伊陟無聞祖韋賢不到孫時稱其能與張家說門戶唐詩紀事曰巨源在元和間詩韻不為新語體律務實功夫頗深旦暮吟詠不輟年老頭搖人言吟詩所致穆祕監劉昫唐書曰穆寧河內人清愼剛正重交游以氣節自任官至祕書監四子贊質貟賞皆有令譽性又和粹世以滋味目之劉昫唐書曰穆贊字相明官至御史中丞與弟質貟賞以家行人材為搢紳所仰贊官達父母尚無恙家法清嚴兄弟奉指使笞責如僮僕贊最孝謹質強直應策其所條對至今𫝊之自𥙷闕至給事中貟工文辭尚節義士大夫言家法者以穆氏為首謂贊俗而有格為酪質美而多入為酥貟為醍醐言粹而少用賞為乳腐言最凡固貞元中楊氏劉昫唐書曰楊虞卿與弟漢公從兄汝士魯士並歷清貴鬱為昌族所居靖恭里人稱靖恭楊家穆氏兄弟皆有美名人物氣韻略相似人不能上下或言楊氏兄弟賔客皆同穆氏兄弟賔客各殊以此為優劣李觀作文不旁沿前人時謂與韓愈相上下及觀少夭而愈後文益工議者以為觀文未極愈老不休故卒擅名陸希聲以為觀尚辭故辭勝理愈尚質故理勝辭雖愈窮老不能加觀之辭觀後愈死亦不能逮愈之質李觀韓愈己見輕唐詩紀事曰陸希聲博學善屬文相昭宗在位無所重以太子太師罷李茂貞犯京師輿疾避難卒在選諸人擬以李珏為殿中御史宰相韋處厚曰清廟之器豈擊搏才耶除禮部貟外郎乾符中蔣凝應宏辭舉為賦止及四韻遂白而出試官逼請所試觀之歎息稱善頃刻之間播於人口時人語曰白頭花鈿滿面不若徐妃半籹托言曰蔣凝江東人工於八韻然形不稱名隨計途次襄陽謁徐商相公疑其假手因試峴山懷古一首凝賦成尤得意時溫飛卿居幕下大加稱譽後唐命相安重誨欲用崔協任圜欲用李琪圜曰朝廷有李琪者學際天人奕葉軒冕論才校藝可敵時輩百人必舍琪而相協如棄蘇合之丸取蜣蛣之轉也後唐張文禮素不知書亦無方略唯於懦兵之中萋菲上將言甲不知進退乙不識軍機以此軍人推為良將柳開己見少好任氣大言凌物應舉時以文章投主司於簾前多至千軸載以獨輪車引試日衣襴自擁車入欲以此駭衆取名時張景能文有名唯袖一書簾前獻之主司大稱賞擢景優等時人為之語曰柳開千軸不如張景一書張尚書張詠嘗曰吾榜中愼重有雅望無如李文靖李沆深沉有德素鎮服天下無如王子明王旦面折庭爭有風采無如冦萊公冦凖四人並已見當方面之寄則詠不敢辭張乖崖嘗稱使冦公治蜀未必如詠至於澶淵一擲詠不敢為夏英公言楊文公文如錦繡屏風但無骨耳議者謂英公之文譬諸泉水迅急湍悍至於浩蕩汪洋不如文公涑水記聞曰夏竦字子喬父故錢氏臣歸朝為禁侍竦幼學於姚鉉使為水賦限以萬字竦作三千字以示鉉鉉怒不視曰汝何不於水之前後左右廣言之竦又益之得六千字以示鉉鉉喜曰可教矣十七善屬文為時所稱世言宋宣獻公未嘗素談在河南聚㕔録囚公曰汝與某人素有何寃囚不能對坐上官更以俗語問之囚始能答宋元憲公近之和氣拂拂然襲人景文公則英采秀發三人者久視之無一㸃塵俗真神仙中人也宋郊宋祁己見為宋史曰宋綬字公垂趙州平棘人幼聰穎額有奇骨外祖楊徽之所器徽之藏書悉與綬綬母亦知書躬自訓教博通經史百家文章為一時所尚楊億稱其文曰沉壯淳麗吾不及也纍官參知政事卒諡宣憲世言歐陽永叔每誇政事不誇文章蔡君謨不誇書吕濟叔不誇棋何公不誇飲酒司馬君實不誇清絶大抵不足則誇也司馬溫公言昔與王介甫同為郡牧判官包孝肅為使時號清嚴一日牡丹盛開包公置酒賞之公舉酒相勸某素不喜酒亦強飲介甫終席不飲包公不能強也以此知其不屈曾子固與王荆公友善後神宗以問子固云卿與王安石相知最早安石果何如子固曰安石文章行誼不減揚雄以吝故不及神宗遽曰安石輕富貴似不吝也子固曰臣所謂吝者以安石勇於有為而吝於改過耳神宗頷之宋景文諸公在館中嘗評唐人之詩言李長吉才力奔放不驚衆絶俗不肯下筆因舉其鴈門太守詩云黑雲壓城城欲摧甲光向日金鱗開王介甫曰是兒言不相副也方黑雲如此安得向日之甲光乎王平甫己見閲韓退之送石洪溫造二處士詩序言退之善與處士作牙蘇子瞻云老杜自秦川赴成都所歷輒作一詩數千里山川在人目中古今詩人殆無其比獨明皇遣吳道子傳畫蜀道山川歸對大同殿索其畫無有曰在臣腹中請匹素寫之半日都畢明皇後幸蜀皆默識其處無不相合唯此可用為比蘇叔黨過嘗讀南史東坡卧聽之因語叔黨曰王僧䖍居建康禁中里馬糞巷子孫賢實謙和時人稱馬糞諸王為長者東漢贊論李固云觀胡廣趙戒如糞土糞之穢也一經僧䖍便為佳號而以比胡趙則糞有時而不幸汝可不知乎蘇子由嘗云在朝所見朝廷遺老數人如歐陽永叔張公安道皆一世偉人蘇子容劉貢父博學強識亦可以名世豫幸與之周旋聽其誦說放失舊聞多得其詳實其於天下事古今得失折衷典據甚多東都事略曰蘇頌字子容紳之子舉進士為南京留守推官杜衍居睢陽一見深器之天性仁厚宇量恢廓喜怒不形於色居必正冠危坐平生嗜學凡經史九流百家之說至於圖緯隂陽五行律吕星官算法山經本草無所不通官右僕射中書侍郎朝祕監朝美叔己見以集句示劉貢父貢父曰君髙明之識輔以家世文學何至作此等伎倆殊非我素所期也吾嘗謂集古人句譬如蓬蓽之士適有佳客既無自己庖厨而器皿肴蔌悉假貸於人收拾餖飣意欲強學豪奢而寒酸之氣終是不去非如貴公供帳不移水陸之珍咄嗟而辦陳瑩中題元祐黨籍碑云嗚呼漢世得人於斯為盛五朝名臣言行録曰陳瓘字瑩中南劒州人宣和中監察御史以論蔡京得罪卒諡忠肅徐師川曰宋史曰徐俯字師川洪州分寧人以父禧死事授通直郎張邦昌僣位遂致仕時工部侍郎何昌言與弟昌辰避邦昌諱皆改名俯買婢為昌奴客至即呼前驅使之髙宗朝胡直孺汪藻迭薦之召為諫議大夫東坡山谷瑩中三君皆余所畏然各有可笑東坡議論諫諍真能殺身成仁者夫死生旦夜爾而欲學長生不死山谷赴官姑孰既至未視事聞當罷不去竟俯就之七日符至乃去問其故曰不爾無舟吏可遷夫士之進退極欲分明豈可以舟吏為纍瑩中大節昭著是能必行其志者當視爵祿如糞土然猶時對日者說命唐子西在惠州名酒之和者曰養生主徑者曰齊物論宋史曰唐庚字子西眉州丹稜人為文精密通於世務張商英薦其才提舉京畿常平商英罷相庚亦坐貶安置惠州楊誠齊退居名酒之和者曰金盤露徑者曰椒花雨嘗言余愛椒花雨甚於金盤露湯伯紀以陶淵明述酒篇為零陵哀詩趙子固目姜堯章為書家申韓齊東野語云諸王孫趙孟堅字子固號彛齊居嘉禾之廣陳善筆札工詩文趙和仲嘗云知古者莫如洪景盧知今者莫如陳君舉宋世嘗目莊周為道家之儀秦王通孔門之王莽元仁宗極重趙孟俯嘗與侍臣論文學之士以孟俯比唐之李太白宋之蘇子瞻語林卷十八
