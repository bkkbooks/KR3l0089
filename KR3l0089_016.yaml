body:
  text: 語林卷十六明何良俊撰賞譽第九上孔子嘗曰吾之於人誰毁誰譽如有所譽者其有所試則孔子但不毁人耳亦何嘗不舉人哉然必試耳余觀東漢喜標樹晉世好加奬飾然一時雖門閥子弟皆賢可施於行列昔人以為名者摩世厲鈍之具豈不信哉善乎龎士元之言曰欲興風俗長道業不美其談即聲名不足企慕而為善者少今拔十失五猶得其半而可以崇邁世教使有志者自勵夫古多善俗或者用此道也後世欲以深文苛議激振頽風然一遭譏貶而賢者率多自棄嗚呼有世道之責者可無加之慮哉賈景伯與班固並校祕書景伯母常有疾帝欲加賜以校書例多特以錢二十萬使潁陽侯馬防與之語防曰賈逵母病此子無人事於外屢空則從孤竹之子於首陽山矣范曄後漢書曰賈逵字景伯扶風平陵人自為兒童常在太學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭賈偉節兄弟三人並有髙名偉節最優時人為之語曰賈氏三虎偉節最怒𡊮山松後漢書曰賈彪字偉節少遊京師與郭林宗為談論之首一言一行天下以為凖的黨事起彪謂同志曰吾不西行大難不解即入關設方略天子為之大赦或問汝南范孟博范滂已見郭林宗何如人范曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其他范曄後漢書曰郭泰字林宗太原介休人家貧早孤母使給事縣庭林宗曰大丈夫安能處斗筲之役乎就屈伯彥學三年博通墳籍遊洛陽見李膺膺大奇之遂相友善名震京師後歸鄉里諸儒送至河上車數千兩林宗與李膺同舟而濟衆賔望之以為神仙東國宗敬蔡中郎不言名咸稱蔡君兖州陳留並圖畫形像為之目曰文同三閭孝齊參騫世目陳仲舉陳蕃已見昻昻如千里驥周孟玉周璆已見瀏瀏如松下風世説作世目李元禮謖謖如徑松下風一云世目潁川李府君李膺已見頵頵如玉山汝南陳仲舉軒軒如千里馬南陽朱公叔朱穆己見􅀈􅀈如行松柏之下潁川為之目曰荀氏八龍慈明荀爽已見無雙范曄後漢書曰荀淑字季和為朗陵侯相蒞事明理稱為神君卒年六十七李膺自表師喪去官生八子儉鯤靖燾汪爽肅敷並有名稱時人謂之八龍初荀氏舊里名西豪潁隂令苑康以為昔髙陽氏有才子八人今荀氏亦有八子遂改曰髙陽里趙戩遭三輔喪亂客於荆州州牧劉表以為賔客典略曰趙戩字叔茂京兆長陵人質而好學言稱詩書愛恤於人不論踈密辟公府入為尚書選部郎董卓欲以所私並充臺閣戩拒不聽卓怒欲殺之戩引辭正色卓雖凶戾屈而謝之故將王允被害戩棄官收斂三輔亂戩客荆州劉表以為賔客曹公平荆州執戩手曰何相見之晚遂辟為掾爾時禰正平張隲文士傳曰禰衡字正平平原般人少有才辨氣尚剛傲好矯時慢物來遊京師范曄後漢書曰興平中衡避難荆州建安初來遊許下詆訾朝士謂無復人反南見戩歎曰所謂劒則干將莫邪木則椅桐梓漆人則顔冉仲弓也阮元瑜少有雋才應機捷麗嘗就蔡伯喈學蔡歎曰童子奇才朗朗無雙平原陶丘洪青州先賢傳曰陶丘洪字子休平原人清達博辨文冠當代舉孝亷不行辟太尉府年三十卒舉劉正禮為茂才范曄後漢書曰劉繇字正禮東萊牟平人父寵會稽太守繇為揚州牧時𡊮術據淮南繇移居曲阿值中國喪亂士友南奔攜接收養與同優劇甚得名稱𡊮術遣孫策攻破繇奔豫章是公山弟范曄後漢書曰劉岱字公山董卓入洛陽岱從侍中出為兖州刺史虛己愛物為士人所附初平三年黃巾轉入東平岱擊之戰死刺史曰前年舉公山奈何復舉正禮洪曰若使明君用公山於前擢正禮於後所謂御二龍於長途騁騏驥於千里何所復難陳長文陳群别見與孔文舉共論汝潁人士陳曰荀文若荀彧己見公達魏春秋曰荀攸字公達為尚書令從太祖征伐常謀謨幃幄時人及子弟莫知其所言太祖每稱之曰公達外愚內智外怯內勇外弱內強不伐善無施勞智可及愚不可及雖顔子寧武不能過與鍾繇善繇言我每有所行反覆思惟自謂無以易以咨公達輒復過人意休若荀氏家傳曰荀衍字休若彧第三兄也友若荀諶字友若彧第四兄𡊮紹在冀州以諶為謀主仲豫荀氏家傳曰荀恱字仲豫彧從父兄也父儉朗陵長祖淑朗陵侯相監張璠漢紀曰恱清虛沉靜善於著述建安初為祕書被詔刪漢書作漢紀三十篇因事以明臧否致有典要其書大行於世當今並無對脂元升以哭孔文舉尸魏太祖收欲治罪以其事直見原元升後見太祖陳謝前愆太祖呼其字曰元升卿故慷慨魚豢魏略曰脂習字元升京兆人公府辟舉髙第天子西遷及詣許昌習常隨從與少府孔融親善太祖為司空威德曰盛融書疏倨傲習常責融欲令改節融被誅時許中百官與融親善者莫敢收恤習獨撫而哭之曰文舉卿舍我死我當復與誰語者魏文帝初受漢禪群臣皆揚魏德衛臻獨稱漢美文帝曰天下之珍當與山陽共之曹子建七步成章世目為繡虎目王仲宣為泥下潛蛙龎德公目諸葛孔明為卧龍龎士元為鳯雛司馬德操為水鏡諸葛武侯甚知蔣琬用為長史常曰公琰托志忠雅當與吾共贊王業者也鍾士季鍾會己見入蜀甚知薑伯約謂長史杜元凱曰杜氏新書曰杜預字元凱司馬宣王女壻企王隱晉書曰預智謨淵博明於理亂常稱德者非所及立功立言所庶幾也著左氏集解又參考衆家謂之釋例作盟會圖春秋長歷成一家學摯虞甚重之曰左丘明本為春秋作傳而左傳遂自孤行釋例本為傳設而所發明何但左傳以伯約比中土名士公休太初諸葛誕夏侯玄並已見不能過也蜀志曰薑維字伯約天水冀人少與母居好鄭氏學盛傅子曰維好立功名隂養死士不修布衣之業當孫雜紀曰初薑維詣亮與母相失復得母書令求歸維曰良田百頃不在一畝但有逺志不在當歸也書蜀志曰亮辟維為奉義將軍與長史張裔參軍蔣琬曰薑伯約忠勤時事思慮精密考其所有永南季常諸人不如也郤正論曰薑伯約據上將之重處群臣之右宅舍敝薄資財無餘側室無妾媵之褻後庭無聲樂之娛衣服取供輿馬取備飲食節制不奢不約官給費用隨手消盡察其所以然者非激貪厲濁抑情自割也直謂如是為足不在多求凡人之談常譽成毁敗扶髙抑下咸以薑維投厝無所身死宗滅以是貶削不復料擲異乎春秋褒貶之義矣如薑維之樂學不倦清素節約自一時之儀表也張子綱張紘已見與孔北海書言虞仲翔前頗為論者所侵美寶為質雕磨益光不足以損管公明言與裴使君裴微己見何鄧二尚書何晏鄧揚並己見劉太常劉實己見兄弟語使人神思清發昏不假寐自此以還殆白日欲寢矣晉書曰劉實弟名智字子房貞素有兄風少貧負薪自給讀誦不輟以儒行稱或問焦先於皇甫士安士安曰曠然以天地為棟宇暗然合至道之前出群形之表入玄寂之幽一世之人不足以挂其意四海之廣不足以回其顧妙乎與三皇之先者同矣結繩己來未及其至也豈群言之所能髣佛常心之所能測量哉皇甫謐髙士傳曰世莫知焦先所出或言漢末無父母兄弟見漢衰乃不言常結草為廬冬夏袒露垢汚如泥後野火燒其廬先因露寢遭大雪袒卧不移人以為死就視如故陸士衡與弟士龍俱有雋才張司空張華己見見而恱之常曰伐吳之利在獲二雋山公目嵇叔夜巖巖如孤松之獨立嵇君道嵇含己見云吾在洛嘗與二陸談陸機陸雲並己見覺辭少理暢語約事舉莫不豁然若春日之判薄氷秋風之掃枯葉世目鄧士載為伏鸞陸士龍為隱鵠衛伯玉明識清允傅蘭碩傅嘏己見極貴重之比之寧武子晉書曰衛瓘字伯玉河東安邑人父覬魏尚書瓘十歲喪父至孝過人性貞靜有名理在位以任職稱鄧艾鍾會伐蜀瓘以侍中持節監艾會軍事張茂先甚重成公簡王隱晉書曰成公簡字宗舒東郡人世二千石性清素不求榮利潛心味道罔有干其志者由是默識過人嘗曰公簡清靜比揚子雲揚雄自敘曰雄為人簡易佚宕默而好深湛之思清淨無為不汲汲於富貴不戚戚於貧賤不修亷隅以徼名當世無擔石之儲晏如也自有大度非聖哲之書不好也非其意雖富貴不事也默識擬張安世班固漢書曰張安世字子孺少以父任為郎以善書給事尚書精力於職休沐未嘗出上幸河東亡書三篋詔問莫能知唯安世識之具述其事後以相校無所遺失上奇其才擢為尚書令顧彥先少有圭璋符采朗徹弱冠仕吳為黃門郎當時後進盡相推許稱為大才令望衛叔寶是樂彥輔壻衛玠樂廣並有海內之名裴叔道嘗稱之曰婦翁氷清女壻璧潤裴遐己見周中丞弼目裴逸民曰裴公若武庫五兵縱橫晉諸公贊曰裴頠字逸民談理與王夷甫不相推下嘗疾世俗尚虛無之理故著崇有論以折之才博喻廣學者不能究後樂廣與頠清談欲説理頠辭喻豐博廣自以體尚虛無笑而不言山季倫薦蔡克於王太尉曰蔡子尼今之正人太尉以書示衆曰山子以正字拔人然未易可稱後太尉聞克在選曰山子正人之言驗於今矣山簡王衍蔡克並己見王平子風韻邁達甚為從兄濬沖夷甫所知四海士人一為平子品目則二兄不復措意云已經平子晉諸公贊曰王澄字平子有達識仕至荆州刺史王大將軍甚重王太尉常稱之曰夷甫處衆中如珠玉在瓦石間王武子為本州大中正晉諸公贊曰王濟字武子太原晉陽人司徒渾第二子也有雋才能清言起家中書郎終太僕訪問關求孫子荆品狀張隲文士傳曰孫楚字子荆太原中都人太晉陽秋曰楚驃騎將軍資之孫南陽守宏之子仕至馮翊太守王曰此人非鄉評之所能名乃自為之目曰天才英博亮拔不群王東海清虗寡欲無所修尚言理辨物但明其指要而不飾文辭一時服其約而能通王太尉雅貴重之比之南陽樂廣王承王夷甫並己見世目杜𢎞治清標令上晉陽秋曰杜乂字𢎞治京兆人祖預父錫有譽前朝乂少有令名仕丹陽丞成帝納乂女為后世説曰有人目杜𢎞治標鮮清令盛德之風可樂詠也語林曰有人目杜𢎞治標鮮甚清令初若熙怡容無韻盛德之風可樂詠也二説與此並小異世目阮遙集風韻踈誕少有門風謝太傅云小時在殿廷會見王丞相便覺清風來拂人諸葛道明諸葛恢己見初過江名稱亞於王丞相庾太尉王導庾亮丞相甚知之嘗謂曰明府終為黑頭公王丞相拜司空時諸葛道明在坐丞相指所著冠語道明曰君當復著此蔡司徒甚重劉王喬劉疇己見常歎曰劉王喬若過江司徒公之美選也蔡司徒别傳曰謨字道明濟陽考城人博學有識避地江左歷左光祿録尚書事揚州刺史髙坐和尚天姿髙朗風韻遒邁甚為王丞相所知周僕射周顗己見領選撫其背曰若選得此賢令人無恨髙坐别傳曰和尚胡名尸黎密西域人傳云國王子以國讓弟遂為沙門永嘉中到中土止於大市中王丞相一見奇之以為吾之徒也周侯遇害和尚對其靈坐作胡祝數千言音聲髙暢既而揮涕收淚其哀樂廢興皆此類性髙簡不學晉語諸公與之言皆因傳譯神領意得頓在言前於塔寺記曰尸黎密冡曰髙坐在石子岡常行頭陀卒梅岡即葬焉晉明帝於冡邉立寺因名髙坐周僕射神彩秀徹正體嶷然儕輩不敢褻汝南賁泰淵通清操之士嘗歎曰汝潁固多賢士自頃陵遲雅道殆衰今復見周伯仁將復舊風清我邦族矣桓茂倫見謝太傅小時歎曰此兒風神秀徹後當不減王東海桓彛謝安王承並己見王世將髙朗豪率王丞相庾太尉遊于石頭會世將至爾日迅風飛帆世將倚船樓長嘯神氣甚逸丞相謂太尉曰世將為復識事太尉曰正足舒其逸耳王廙别傳曰廙字世將祖覽父正廙性倨傲不合己者面拒之故為物所疾加平南將軍李充言潘安仁之文如翔禽之羽毛衣被之綃縠庾公目王右軍清貴有鑒裁按世説云殷中軍道右軍清鑒貴要與此語復小異世人語曰大才槃槃謝家安江東獨步王文度盛德日新郤嘉賔世説作揚州獨步王文度後來出人郤嘉賔無上謝安一句支道林清談著名一時風流貴勝莫不崇敬以為造微之功足參正始然獨重郤嘉賔稱為一時之雋支道林談善標宗會而章句或有所遺時為守文者所陋謝太傅聞而善之曰此乃九方歅之相馬略其玄黃取其駿逸王長史王濛己見問孫興公中興書曰綽字興公太原中都人少以文稱歷太學博士大著作散騎常侍郭子玄定何如文士傳曰郭象字子玄河南人少有才理慕道好學託志老莊時人咸以為王弼之亞辟司空掾太傅主簿孫曰詞致清雅奕奕有餘吐章陳文如懸河瀉水注而不竭殷中軍識度清逺當時比之管葛屏居墓所幾將十年王濛謝尚伺其出處以卜江左興亡因相與省之知浩有確然之志既反因相謂曰淵源不起當如蒼生何庾翼貽浩書曰當今社稷安危內委何禇諸君外託庾桓數族恐不得百年無憂足下少標令名十數年間位經內外而欲潛居利貞斯理難全且夫濟一時之務須一時之勝何必德均古人韻齊先達耶王夷甫先朝風流士也然吾薄其立名非真而始終莫取若以道非虞夏自當超然獨往而不能謀始大合聲譽極致名位正當抑揚名教以靜亂源乃髙談莊老説空終日雖云談道實長華競及其末年人望猶存思安懼亂寄命推務而甫自申述徇小好名既身囚胡虜棄言非所此明德君子遇會處際寧可然乎而世皆然之益知名實未定弊風未革也浩固辭不起簡文帝始綜萬幾衛將軍禇裒薦浩徵為揚州刺史浩上疏陳讓并致箋於簡文簡文答之曰屬當厄運危弊理盡誠賴時有其才不復逺求版築足下沉識淹長思綜通練起而明之足以經濟若復深存挹退茍遂本懷吾恐天下之事於此去矣令紘領不振晉網不綱願蹈東海復可得耶由此言之足下去就即是時之廢興時之廢興則國家不異足下宏思之靜算之亦將有以深鑒可否望必廢本懷率群情也劉尹亡後孫興公為之誄曰居官無官官之事處事無事事之心當時以為名言孫興公目劉真長曰神猶淵鏡言必珠玉謝鎮西晉陽秋曰謝尚字仁祖陳郡人鯤之子也齠齔喪兄哀慟過人及遭父喪溫嶠唁之尚號呌極哀既而收淚告訴有異常童嶠奇之由是知名仕至鎮西將軍與羅君章為方外之友羅府君别傳曰含字君章桂陽棗陽人楚熊姓之後啓土羅國遂氏族焉後寓湘境為桂陽人含臨海太守彥曾孫滎陽太守綏少子也桓宣武辟為别駕遷散騎常侍門施行馬含自在官舍有一白雀棲集堂宇及致仕還家庭中忽蘭菊挺生此亦至行之徵也常稱之曰羅君章可謂湘中之琳琅或有人言羅君章可謂荆楚之杞梓桓大司馬曰此自江左之秀豈唯荆楚而已孫興公云庾太尉雅好所托常在塵埃之外雖柔心應世蠖屈其迹而方寸湛然固以玄對山水世目王茍子曰流奕清舉茍子王修小字原文字志曰王修字敬仁太晉陽人父濛司徒左長史修明秀有美稱桓南郡既誅司馬元顯見謝景仁甚知之謂四坐曰司馬庶人那得不敗遂令謝景仁年三十方作著作郎阮萬齡與𡊮豹江夷相係為孟昶司馬時人謂昶府有三素望南史曰阮萬齡陳留尉氏人祖思曠光祿大夫萬齡少知名為孟昶建威長史謝叔源與從子靈運並有美名時人謂叔源風韻為髙目望蔡肅肅如寒風振松謝叔源襲爵望蔡侯目康樂凜凛如霜臺籠日謝方明無他伎能自然有雅韻髙祖常稱之曰謝方明可謂名家駒直置便是台鼎人無論復有才用或云是劉穆之語沈約宋書曰謝方明陳郡陽夏人尚書僕射景仁從父弟父沖中書侍郎方明為髙祖中兵主簿事思忠益知無不為遷侍中丹陽尹王令明素不與謝靈運相識嘗得一交言靈運辨博辭義鋒起令明時然後言時荀伯子在坐退而告人曰靈運固自蕭散直上王郎如萬頃陂沈約宋書曰荀伯子潁川潁隂人祖羡驃騎將軍父猗祕書郎伯子少好學博覽經傳而通率好戲遨遊閭里故失清塗解褐駙馬都尉仕至東陽太守謝法曹惠連己見幼有才悟性至輕脫不為父方明所知靈運去永嘉還始寧時方明為會稽郡靈運嘗自始寧至會稽造方明過視惠連大相知賞時何長瑜教惠連讀書亦在郡內靈運又以為絶倫謂方明曰阿連才悟如此而尊常兒遇之何長瑜當今仲宣而給以下客之食尊既不能禮賢宜以長瑜還靈運靈運載之去謝宣逺謝瞻己見諸人才辭辨富𢎞微每以約言服之尚書謝混己見特所敬貴號曰微子嘗語諸人曰汝雖才義豐辨未必皆愜衆心至於領會機賞言約理要固當共推微子謝尚書目𢎞微曰微子異不傷物同不害正宋世為之語曰王光祿如屏風屈曲從俗能蔽風露南史曰王逺字景舒太保𢎞弟光祿大夫孺之子也仕至光祿勳王僧祐少便聰悟叔父景元撫其首曰兒神明意用當不作率爾人僧祐已見宋文帝見王征南王僧虔己見所書素扇歎曰非唯迹逾子敬方當器雅過之顔特進顔延年己見為徐羡之諸人所忌出為始安太守謝領軍謝晦己見謂顔曰昔荀朂忌阮咸斥為始平郡今卿又為始安可謂二始殷黃門殷景仁己見亦語之曰所謂人惡俊異世疵文雅王瓉之歷官五兵尚書未嘗詣一朝貴南史曰瓉之王敬𢎞子也官吏部尚書諡貞子江湛己見謂何偃曰王瓉之今便是朝隱宋書曰何偃字仲𢎞廬江灊人司空尚之中子舉秀才除中軍參軍歷官吏部尚書王智少簡貴有髙名南史曰王智琅琊人祖穆臨海太守司徒謐之兄宋武帝甚重之常云見王智使人思仲祖南史曰帝與劉穆之議討劉毅而智在焉他日穆之白帝曰伐國重事公言何乃使王智知武帝笑曰此人髙簡豈聞此輩議論吳郡陸法真歷官有清節為劉秀之安北録事參軍太山羊希南史曰羊希字泰聞太山南城人羊元保之從子少有才氣為尚書左丞與安北咨議孫詵書曰足下同僚似有陸録事者此生東南名地又張玄外孫治身清雅至有志節年髙官下秉操不衰冀當日夕相與申意南史曰孫詵字休群太原中都人愛文尤賞泉石官御史中丞張景山張岱己見與兄太子中舍演新安太守鏡征北將軍永弟廣州刺史辨俱知名時人謂之張氏五龍釋曇潁屬意宣唱天然獨絶張暢聞而歎曰吐辭流便足騰逺理髙僧傳曰曇潁會稽人少出家誦經十餘萬言止長干寺張永嘗請斌公開講釋曇斌己見永問斌京下復有卓越年少不斌言有沙彌道慧法安永即要請令道慧覆涅槃梁惠皎髙僧傳曰道慧姓王餘姚人十一出家為僧逺弟子嘗講成實張融搆難慧乘機挫鋭言必詣理法安述佛性髙僧傳曰釋法安姓畢東平人七歲出家年在息慈便精神秀出二人神色自若敘致無遺永問年幾慧言十九安言十八永歎曰昔扶風朱勃年十二能誦書詠詩時號才童今日二道士可稱義少王仲寶張思曼甚知孔廣仲寶嘗言廣來使人廢簿領思曼數巾車詣之每歎曰孔廣使吾成輕薄祭酒王儉張緒己見稽南史曰孔廣字淹源會人美容止善吐論宋文帝以王華劉湛王曇首殷景仁俱為侍中風力局幹冠冕一時上嘗與四人於合殿宴既罷出上目送良久歎曰此四賢一時之秀同管喉唇恐後世難繼也劉綽宋拾遺曰帝嘗召四人宴飲從朝至夕帝甚歡既出帝目送之歎美不已張思曼少知名清簡寡欲父鏡語人曰此兒今之樂廣劉悛之為益州獻蜀柳數株枝條甚長狀若絲縷武帝植於太昌雲和殿前常嗟賞之曰楊柳風流可愛似張緒當年𡊮吏部𡊮粲己見語人曰近見張思曼殊有正始遺風劉參軍劉璡己見至吳語人曰吾聞張思光與陸慧曉並宅中間有水此水必有異味遂命駕酌而飲之曰飲此則鄙吝之萌盡矣釋慧亮過江止何園寺梁慧皎髙僧傳曰慧亮姓董先為東阿靖公弟子後立寺於臨災講法華大小品十地等學徒雲集千里命駕顔延之張緒眷德留連每歎曰安汰吐珠玉於前釋道安竺法汰並己見斌亮振金聲於後清言妙緒將絶復興髙僧傳曰釋曇斌姓蘇南陽人十歲出家事道禕為師後住江陵辛寺𡊮粲請為母師張融陸慧曉二人宅間有池池上有二株楊柳何點見而歎曰此池便是醴泉此木便是交讓張思光年弱冠道士陸靜修以白鷺羽麈扇遺之曰此既異物以奉異人張思光清抗絶俗雖王公貴人視之傲如獨重衡陽王語從兄思曼曰衡陽王飄飄有凌雲氣其風情素韻彌足可懷融與之遊不知老之將至王仲寶王儉己見少便不凡𡊮司徒𡊮粲己見見之歎曰宰相之門栝柏豫章雖小已是棟梁器劉祭酒劉瓛己見少有至性母孔氏甚嚴明語親戚曰阿稱瓛小字便是今世曾子王僧達貴公子孫以才傲物為吳郡太守入昌門曰彼有人焉顧琛家一公兩掾英英門戶陸子真五世內侍我之流亞齊髙帝輔政百僚脫屣到席蔡長史躡屐不改南史曰蔡約字景撝濟陽考城人興宗子也尚宋孝武公主好飲酒夷淡不與世雜仕齊為司徒左長史卒官太子詹事帝謂江祏曰蔡郎是禮度之門故自可恱南史曰江祏字宏業濟陽考城人仕至侍中中書令受遺輔政為東昏所誅王瞻六歲時從師讀書有伎經門同業皆出觀瞻獨不視習業如初從父僧虔曰大宗不衰寄之此子南史曰王瞻字思範𢎞從孫也少逸遊為閭里患及長折節修士操涉獵書記仕齊至御史中丞梁臺建遷吏部尚書𡊮尹𡊮粲己見在郡嘗於後堂夜集劉祭酒在座劉是真長六世孫𡊮指庭中柳樹謂劉曰人謂此是劉尹時樹每想髙風今復見卿可謂清德不衰禇司徒禇淵己見嘗集𡊮粲舍初秋涼夕風月甚美彥回援琴奏别鵠之曲宫商既調風神諧暢王彧謝莊並在坐歎曰以無纍之神合有道之器宫商暫離不可得已𡊮尹見江叔文歎曰風流不墜政在江郎南史曰江斆字叔文濟陽考城人祖夷右僕射父湛吏部尚書斆母宋文帝女淮陽長公主幼以戚屬召見孝武謂謝莊曰此小兒方當為名器少有美譽尚孝武女臨汝公主拜駙馬都尉為丹陽丞庾杲之韶令和潤善於音吐蕭子顯齊書曰杲之字景行新野人祖深之雍州刺史父粲司空參軍杲之少貞立學涉文義起家奉朝請太子右衛率世祖令對魏使兼侍中上每歎其風器之美王儉在座曰杲之為蟬冕所照更生風采陸明霞是張思光外甥好學通博兼善書畫風韻舉動頗類於思光時人為之語曰無對日下惟舅與甥南史曰陸杲字明霞吳郡吳人祖徽宋建康令有清名父睿揚州中從事杲少好學歷官以清正稱仕至金紫光祿大夫謝參軍謝超宗己見一日詣東府門自通爾時風寒慘厲太祖謂四座曰此客至使人不衣自暖矣禇侍中禇炫己見小便清簡為舅王景文所知司徒淵謂人曰從弟亷勝獨立乃十倍於我徐孝嗣己見出為吳興王僕射儉贈四言詩曰方軌叔茂追清彥輔柔亦不吐剛亦不茹時人以比蔡子尼行狀禇中郎淹雅有器量風儀端麗眉目如點公庭就列為衆所瞻南史曰禇向字景政祖淵司空父蓁太子詹事向年數歲父母相繼亡沒毁若成人親表異之及長淹雅有器量仕梁卒於北中郎為廬陵王長史卒官謝舉銘其墓曰宏治推華杜乂子嵩慚量庾敳酒歸月下風清琴上論者以為擬得其人南史曰謝舉字言揚謝草瀹子也幼好學與兄覽齊名十四贈沈約詩為約所賞弱冠丁父憂幾致毁滅為太常博士與覽俱預元會江淹一見並相欽挹曰所謂馭二龍於長塗為太子家令掌管記深為昭明太子賞接世目何散騎曰人中爽爽何子朗何點嘗目陸慧曉心如明鏡遇形觸物無不朗然王思逺常如懷氷暑月亦有霜氣周彥倫目慧隆道人曰隆公蕭散森踈若霜下之松竹髙僧傳曰釋慧隆姓成陽平人學無師友卓然自悟劉孝標劉峻己見目劉訏超超越俗如半天朱霞何佟之梁典曰劉訏字彥度平原人與陳留阮孚李紳申金蘭之契築室鍾阜之傍共聽內義鑽尋典奧劉歊矯矯出塵如雲中白鶴梁書曰劉歊字士光劉懷慰之子生夕有香氣滿室幼有識慧十二讀莊子逍遙篇曰此可解耳客問之隨問而答皆有情理家人異之謂為神童及長博學有文不娶不仕與族弟訏隱居求志遨遊林澤以山水書籍相娛諡貞節處士皆儉歲之粱稷寒年之纎纊梁武帝欲為昭明太子納妃意在謝氏𡊮昻曰當今貞素簡勝唯有蔡撙南史曰蔡撙字景節興宗子也少方雅退默兄弟並知名為吳興太守不飲郡井齋前種白莧紫茄以為常膳詔褒其清宋世有嵇元榮羊蓋並善鼓琴云得戴安道之法柳吳興柳惲己見特盡其妙齊竟陵引為法曹參軍雅被賞狎王嘗置酒有謝太傅鳴琴在側以授吳興吳興彈為雅弄竟陵曰卿巧越嵇心妙臻羊體良質美手信在今辰豈止當世稱竒足可追蹤古烈劉璠梁典曰梁武帝嘗語周捨曰吾聞君子不可求備至如柳惲可謂具美分其才藝足了十人劉長史幼聰敏善屬文南史曰劉孝綽字孝綽本名冉幼聰敏七歲能屬文舅王融深賞異之與同載以適親友號曰神童起家著作郎左遷臨賀王長史王中書融深賞異之常歎曰天下文章若無我當歸阿士孝綽小字陸佐公少為外祖張岱所異岱語諸子曰此兒汝家陽元劉璠梁略曰陸倕字佐公吳郡人慧曉子也少篤學善屬文仕至太常卿梁武革命之事沈休文頗相匡贊後帝以語范尚書曰平日與沈休文群居不覺有異今日才智縱橫可稱明識尚書答曰公今知約不異約今知公梁昭明在東宫雅好文學嘗與王記室筠劉長史孝綽陸庶子倕到舍人洽四人並己見殷常侍遊宴玄圃太子獨執筠袖撫孝綽肩語曰所謂左挹浮丘袖右拍洪崖肩梁書曰殷藝字灌𬞞陳郡長平人性倜儻不拘細行不妄交遊門無雜客勵精勤學博洽群書廬江何憲見之深相歎賞仕至散騎常侍王詹事筠幼便警悟及長清靜好學沈尚書約每見其所著輒嗟咨吟咏以為不逮嘗語詹事曰昔蔡中郎一見王仲宣稱為王公孫曰吾家書籍悉當相與僕雖不敏請附斯言自謝朓諸賢零落已後平生意好殆將都絶不謂痿暮復逢於君張士簡張率已見與同郡陸佐公幼相友狎同載詣左衛將軍沈休文適值任彥升在坐沈謂任曰此二子後進才秀皆南金也卿可與定交簡文素重蕭景陽蕭子顯己見在東宫時引為促晏景陽起更衣簡文謂坐客曰嘗聞異人間出今日始知是蕭尚書到長史洽齊末覩世方亂築室巖阿幽居積歲樂安任昉與洽兄沼溉並善嘗訪洽於田舍見之歎曰此子日下無雙到茂灌與弟茂沿皆有文才兼善言理時人比之二陸世祖嘗贈詩云魏世重雙丁晉朝稱二陸何如今兩到復似凌寒竹庾彥寶庾詵己見子曼倩梁書曰曼倩字世華早有令譽元帝在荆州為中録事後轉咨議參軍早有令譽為世祖荆州主簿每出常目送之謂劉之遴曰梁書曰劉之遴字思貞南陽涅陽人父虬齊國子博士諡文範先生之遴八歲能屬文十五舉茂才對䇿沈約任昉見而異之荆南信多君子雖美歸田鳯摯虞三輔決録注曰田鳯字秀宗為郎端正入奏事靈帝郎目送題柱曰堂堂乎張京兆田清屬桓階桓階别傳曰階為尚書令文帝行幸見諸子無禈上搏手曰長者子無禈是日拜三子為黃門郎賞德標竒未過此子梁元帝嘗云余於諸僧重招提琰法師隱士重華陽陶貞白士人重汝南周宏正其於義理清轉無窮亦一時名士也王威明為黃門侍郎時湘東王梁元帝别見為丹陽尹與朝士宴集屬威明為酒令威明曰江左以來未有兹舉蕭琛傅昭在坐並謂知言南史曰王規字威明王儉之孫王騫子也十二略通五經及長博涉有口辨仕至太子中庶子衛尉趙知禮見𡊮德章少時歎曰𡊮生舉止詳中故有陳汝之風南史曰𡊮憲字德章幼聰敏好學梁武帝開五館其一館在憲宅西憲招引諸生與之談論新義出人意表同輩咸嗟服焉武帝撰孔子正言章句詔下國學憲十四被召為正言生祭酒到溉愛其神采博士周𢎞正謂憲父君正曰賢子欲策試不君正曰升講坐未敢令試居數日君正遣門客與憲候憲正會𢎞正將延憲入室授以麈尾令憲竪義時謝岐何妥在坐𢎞正曰二賢雖窮奧賾得無憚此後生何謝遞起義端深極理致憲酬對間敏𢎞正謂妥曰恣卿所問勿以童幼期之時觀者重沓憲神色自若辨論有餘𢎞正亦起數難終不能屈因告客曰卿還咨𡊮吳郡此郎已堪見代博士矣江揔持幼便聰慧神采英拔南史曰江揔字揔持濟陽考城人江斆之曽孫祖舊光祿大夫父紑南康王主簿揔七歲而孤聰敏有至性梁時為太子中舍人仕陳歷尚書令入隋拜上開府甚為琅邪王元禮王筠已見范陽張纘南史曰張纘字伯緒范陽方城人衛尉卿宏䇿子也長七尺四寸眉目踈朗神采爽發性好學兄緬有書萬卷晝夜披讀不去手歷官吏部郎南陽劉之遴所重之遴嘗酬揔詩其略曰上位居崇禮寺署鄰栖息忌聞曉騶唱每畏晨光赩髙談意未窮晤對賞無極探志共遨遊休沐忘退食曷用銷鄙吝枉趾遘顔色上下數千載揚榷吐胸臆其為通人欽挹如此陳後主在東宫時張譏為東宫學士有玉柄麈尾至佳後主親執之曰當今雖復多士如林堪執此者獨張譏耳即手授譏陳後主嘗幸鍾山召從臣於松林下共談敕張譏竪義時索麈尾未至後主取松枝手以屬譏曰此可代麈尾顧語群臣此即張譏後事陳永陽王臨吳郡聞陸慶名請與相見慶固辭以疾時慶宗人陸榮為郡五官掾慶嘗詣焉王乃微服往榮舍穿壁觀之後語榮曰慶風神凝峻殆不可測嚴君平鄭子真何以尚兹南史曰陸慶吳郡人少好學遍通五經尤明春秋左氏傳節操甚髙仕梁為婁令陳天嘉初徵散騎侍郎不就何妥少機警以技巧事湘東王後知其聰明召為誦書時蘭陵蕭愼亦有雋才住青楊巷妥住白楊頭時人為之語曰世有兩雋白楊何妥青楊蕭愼隋書曰何妥字栖鳯西城人為湘東王誦書江陵平入周為太學博士隋除散騎常侍終國子祭酒語林卷十六
