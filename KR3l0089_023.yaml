body:
  text: 語林卷二十三明何良俊撰自新第十九堯舜尚不能無過今之庸衆人乃曰我無過是果堯舜之弗若歟故人之遂其過乃至沒其身而不悔惜哉是以聖人重改過其稱顔子之好學曰不二過又曰丘也幸茍有過人必知之嗚呼後之人有過而能自知又不難於自新亦庶幾孔子之徒矣仇覽為陽遂亭長好行教化有陳元凶惡不孝其母詣覽言元覽呼元誚責以子道與一卷孝經使讀之元深改悔到母牀下謝罪曰元少孤為母所驕諺曰孤犢觸乳驕子罵母乞今自改母子更相向泣於是元遂修孝道後成佳士范曄後漢書曰仇覽字季智一名香陳留考城人少為書生淳默鄉里無知者年四十縣召補吏選為亭長朞年稱大化賈淑性至險害邑里患之林宗遭母喪淑來修弔既而孫威直後至見林宗受惡人弔不進而去林宗遽追謝曰賈子厚誠實凶德然洗心向善仲尼不逆互鄉故吾許其進也後淑感悟終成善士王藍田述性至狷急既躋重位每以柔克為用謝奕嘗忿藍田極言罵之藍田回靣著壁初不應之半日奕去始復坐蕭思話十許嵗時未知書好騎屋棟打細腰鼓侵暴鄰曲莫不患之自後折節數年中遂有令譽齊髙帝有故吏竺景秀嘗以過繫作部髙帝語荀伯玉卿比看景秀否答曰數往候之備加責誚景秀言若許某自新則吞刀刮腸飲灰洗胃帝善其言乃釋之到茂謙資籍豪富厚自奉養宅宇山池京師第一妓妾姿藝皆窮上品才調流贍善納交遊庖厨豐腆多致賔客愛姬陳玉珠眀帝遣求不與逼奪之以怨望下獄減死輸作尚方由是屏斥聲玩更以貶素自立南史曰到撝字茂謙彭城武原人彥之之孫襲爵建昌公宋明帝立欲收物情以撝功臣之後擢為太子洗馬仕齊至五兵尚書張延符張充別見少不拘檢肆意畋遊父思曼請假還吳始入西郭值延符正獵左手臂鷹右手牽犬遙望見思曼乃放鷹紲犬向舟而拜思曼曰一身兩役無乃勞乎延符跪對曰充聞三十而立今二十九矣請至來嵗終身折節思曼曰若過而能改乃顔子矣明年翻然易操尋師就學博覽古籍鬱為名士梁蕭恪為雍州刺史委政群下賄賂公行客有江仲舉蔡蘧一作薳王臺卿庾仲容皆有蓄積人間歌曰江千萬蔡五百王新車庾大宅武帝續之曰主人憒憒不如客帝以示恪恪大慙乃折節學問所歷以善政稱三國典略曰蕭恪字敬則南平元襄王偉之子官雍州刺史魏甄琛舉秀才入都頗以奕棊廢日至通夜不止令蒼頭執燭或時睡頓則杖之奴曰郎君辭父母仕宦若讀書執燭所不敢辭今乃圍棊日夜不息豈是向京之意乎琛悵然慙感遂詣赤彪許假書研習聞見日優北史曰甄琛字思伯中山無極人漢太保邯之後少敏悟閨門之內兄弟戲狎不以禮法自居拜中書博士遷諌議大夫時有所陳亦為孝文知賞南唐元宗嗣位之初留心內寵宴私擊鞠略無虛日常乘醉命樂工楊花飛奏水調詞進酒花飛唯歌南朝天子好風流一句如是者數四上悟覆杯大懌厚賜金帛以旌敢言上曰使孫陳二主得此一句固不當有銜璧之辱翌日罷諸歡宴留心庶事圗閩弔楚幾致治平術解第二十夫術小數也然觀其變幻詭異有不可以理推者嗚呼亦神矣况君子學道茍至於精義入神則其妙又曷可勝窮耶張平子作地動儀精銅以鑄其器圎徑八尺形似酒尊尊中有都柱旁行八道施關發機外有八龍首銜銅丸下設蟾蜍承之地或動則隨其方靣一龍吐丸其機關巧制皆在尊中范曄後漢書曰張衡字平子南陽西鄂人祖堪蜀都太守衡少善屬文後遊太學遂通五經善機巧尤致思于天文隂陽歷算之學蔡中郎蔡雍已見在陳留鄰人召中郎飲比往酒已酣客有彈琴於屏中郎至門潜聽之曰以樂召我而有殺心何也遂反將命者告主人以蔡君至門而去中郎素為鄉邦所宗主人自起追問其故中郎具以告莫不憮然彈琴者曰我見螳螂方向鳴蟬蟬將去而未飛螳螂為之一前一却吾心聳然唯恐螳螂之失蟬也此豈為殺心而形於聲者乎中郎笑曰此足以當之矣范曄後漢書曰吳人燒桐以㸑雍聞火烈聲知其良木因裁為琴果有美音而尾猶焦時人名焦尾琴蔡中郎告吳人曰吾昔嘗經㑹稽髙遷亭見屋椽竹東間第十六可以為笛取用果有異聲伏滔長笛賦序云柯亭之觀以竹為椽雍取為笛竒聲獨絶蔡文姬年六嵗時父中郎於夜中鼓琴絃絶文姬曰第二絃中郎復故斷一絃以問之文姬言是第四絃並不差謬中郎云偶得之耳文姬曰吳札觀風知興亡之國師曠吹律識南風之不競由此觀之何足不知蒲元性多竒思於斜谷口為諸葛武侯鑄刀三千口刀成自言漢水鈍弱不任淬用蜀江爽烈是謂大金之元精命人於成都取江水蒲以淬刀言雜涪水不可用取水者悍言不雜蒲以刀畫水言雜八升取水者叩頭云於涪津覆水遂以涪水八升益之以竹筒納鐡珠滿中舉刀斷之應手虛落因曰神刀管公眀管輅已見過清河時適大旱太守問何當有雨公眀曰今夕當大雨至日向暮了無雲氣衆人並歡嗤公眀公明言樹中已有少女微風樹間隂鳥和鳴若少女反風隂鳥亂翔其應至矣須臾雲氣四起大雨傾注嵇中散夜彈琴忽有一鬼著械來歎其手快曰君一絃不調中散與琴調之聲更清婉問其姓名不對當時疑其是伯喈後中散亡時亦被桎梏吳未亡時恆有紫氣見牛斗間張司空聞雷孔章雷煥妙達緯象乃要宿問天文孔章曰惟斗牛之間有異氣是寶物也精在豫章豐城張遂以孔章為豐城令至縣掘深二丈得玉匣長八尺開之得二劒其夕斗牛氣不復見孔章乃留其一以一進於張劒至光曜煒曄煥若電發後張遇害此劒飛入襄城水中孔章臨亡戒其子恆以自隨後其子為建安從事經淺瀨劒忽於腰間躍出忽見二龍相隨飛去魏帝殿前大鍾不叩自鳴人皆震駭衆以問張茂先茂先曰此蜀郡銅山崩故鍾鳴應之耳尋蜀都上事如茂先言葛稚川洪博聞深洽江左絶倫著述篇章富於班馬又精辨𤣥賾析理入微忽與廣州刺史鄧嶽疏云當逺行尋師剋期便發鄧得疏狼狽往别而葛坐至日中兀然若睡視其顔色如生體亦柔軟舉尸入棺輕如空衣世以為尸解仙去郭景純郭璞眀解卜筮永嘉中海內將亂郭投䇿歎曰黔黎將同異類矣便結親族十餘家南渡江居于暨陽㑹稽賀思令善彈琴嘗夜坐月中臨風鳴絃忽有一人形貌甚偉著械有慘色在中庭稱善便與交語自云是嵇中散謂賀云卿下手極快但於古法未備因授以廣陵散賀遂𫝊之于今不絶王大將軍王敦已見嘗坐武昌釣臺聞行船打鼓嗟稱其能俄而一槌小異王以扇柄撞几曰可恨時王應侍側曰不然此是回帆檛使視之云船人入夾口世云敦善識鼓節則應識鼓又善於敦也以晋陽秋曰王應字安期含子也敦無子養為嗣為武衛將軍用為副二伏誅于法開醫術眀解嘗旅行暮投主人其家妻産而兒積日不墮法開曰此易治耳殺一肥羊食十餘臠而針之須臾兒下羊膋裹兒出髙逸沙門傳曰法開初以義學著名後與支遁有競故遁居剡縣更學醫術佛圗澄初詣石勒勒試以道術澄取鉢盛水燒香呪之須臾鉢中生青蓮花光色曜日梁釋慧皎髙僧傳曰佛圗澄西域人本姓帛氏少出家清真務學誦經數百萬言善解文義與諸學士論辨疑滯皆暗若符契能役使鬼物以麻油雜燕脂塗掌千里外事皆徹見掌永嘉四年至東土欲立寺洛陽不果時石勒屯具葛陂杖策到軍門勒大信服佛圖澄妙通𤣥術常服氣自養能積日不食乳傍先有一孔圍四五寸通徹腹內有時腸從中出常以絮塞之夜欲讀書則拔去絮孔中出光一室洞眀鳩摩羅什已見嘗講經于草堂寺姚興及朝臣大德沙門千有餘人肅容觀聽羅什忽下髙坐謂興曰忽有二小兒登吾肩欲障須婦人興乃召宫女進之一交而生二子姚興謂鳩摩羅什曰大師聰眀超悟天下莫二何可使法種少嗣遂以伎女十人逼令受之爾後不住僧房別立解舍諸僧效之什乃聚針盈鉢引諸僧語之曰若能見效食此乃可畜室耳因舉匕進針無異常食諸僧愧服乃止庾道愍精于相木手板時山陽王休祐屢以言語忤顔色令人多愆以手板令道愍占之道愍曰此雖甚貴然令人多愆忤休祐以禇彥回詳密求換其板他日彥回侍眀帝自稱下官帝性多忌甚不恱休祐具以狀言帝意乃釋南史曰庾道愍潁川鄢陵人晋司空冰之𤣥孫有孝行頗能屬文少孤其母漂流交州及長求為廣州綏寧府佐負擔冒險僅得自達尋求經年日夜悲泣嘗入村雨驟寄止一家有嫗負薪而還道愍心動訪之乃其母也於是行伏號泣聞者莫不揮淚仕齊至射聲校尉禇澄善醫李道念有冷疾五年澄曰汝病是食白瀹雞子過多取蘇一升令煮服之吐一物如升涎裹之乃是雞雛羽翅爪距皆見凡十三頭而病愈南史曰禇澄字彥道禇彥回之弟也尚宋文帝女廬江公主拜駙馬都尉歷官清顯善醫術徐秋夫能醫嘗夜中有鬼呻吟聲甚悽愴秋夫問何須答言某家在東陽患腰痛死雖為鬼痛尤難忍請療之秋夫問云何厝法鬼請為芻人按孔穴針之秋夫如言為灸四處又針肩井三處設祭埋之眀日見一人來謝忽然不見宋文帝云天下有五絶而皆出錢唐謂杜道鞠彈棊范恱詩禇欣逺模書禇𦙍圍棊徐道度療疾道度是秋夫子徐之才善醫藥可稱神解嘗有一人患腳跟踵痛諸醫莫能識之才曰此蛤精疾也由乘船入海垂腳水中病者言實曽如此之才為剖得蛤子二枚大如榆莢張太素齊書曰徐之才字茂卿髙平金鄉人五葉祖仲融𨼆於秦望山有道士過之求飲因留瓠蘆遺之曰習此子孫當以道術救世開視乃扁鵲鏡經一卷習之遂為良醫父雄代傳其術號為神明之才幼而俊發尤為精敏仕梁為豫章王鎮東常侍隨綜鎮彭城綜降魏之才走至吕梁為魏所獲既羈旅以醫自業又諧𨼆滑稽王公貴人爭饋之稍遷散騎常侍齊梁間有薛伯宗善徙癰公孫泰嘗患背癰伯宗為氣封之徙置齊前栁樹上明旦癰消樹邊便起一瘤如拳稍稍長大二十餘日瘤大膿爛出黃赤汁斗餘𣗳為之痿損嘗有人以骨為刀子靶者五色紛錯文采異常徐之才見之曰此人瘤也問所得處云於古冡見髑髏額骨長數寸削視有文理遂用之其明悟如此隋文帝將遷都夜與髙熲蘇威二人定議庾季才旦日奏云臣仰觀𤣥象俯察圗記龜兆允襲必有遷都之議且漢營北城經今八百嵗水皆鹹鹵不甚宜人願為遷徙計帝愕然謂熲等曰是何神也遂發詔施行濟陽蔡仲熊禮樂博聞嘗謂人曰凡鍾律在南不容復得調平昔五音金石本在中土今既來南土氣偏陂音律乖矣人皆伏其言樂人王令言妙解音律大業末煬帝將幸江都令言子當從忽於戶外彈胡琵琶作翻調安公子曲令言時卧室中聞之大驚蹶然而起曰變變急呼其子問曰此曲興自早晚其子言頃來有之令言欷歔流涕謂其子曰汝慎無從行帝必不返子問其故令言曰此曲宫聲往而不返宫者君也吾是以知之帝果於江都遇害趙耶利善鼓琴貞觀初獨步上京嘗云吳聲清宛若長江廣流綿綿徐逝國士之風蜀聲躁急若激浪奔雷亦一時俊决樂纂曰趙師字耶利天水人以琴道見重海內帝王賢貴靡不欽風舊錯謬十五弄皆削凡歸雅述胡笳五弄譜弟子達者數人並當代翹楚卒于貞觀十年許𦙍宗仕陳為新蔡王外兵參軍王太后病風不能言醫家告術窮𦙍宗曰餌液不可進即以黃茋防風煮湯數十斛置牀下氣如霧重薄之是夕語𡊮客師𡊮天綱子名客師嘗渡江叩舟而言曰舟中人鼻氣皆黑不可以濟俄有一男子跛足負直就舟客師曰貴人在吾可以濟矣江中風果大起幾覆而免跛男子是婁師德太常缺黃鍾鑄不能成李嗣真居崇業里疑土中有之弗得其所道上逢一車有鐸聲甚厲嗣真曰宫聲也市以歸振於空地若有應者掘之得鍾衆樂遂和劉昫唐書曰李嗣真滑川匡城人博學曉音律兼善隂陽推算之術永昌中拜御史中丞為來俊臣所陷配流嶺南章懷太子嘗作寶慶曲閲於太清觀李嗣真謂道人劉槩輔儼曰宫不召商君臣乖也角與徴戾父子疑也死聲多且哀若國家無事太子任其咎俄而太子廢葉法善居𤣥真觀嘗有朝士詣之解𢃄淹留滿坐思酒忽有一美措傲睨直入稱麴秀才年二十餘肥白可觀笑揖諸公抗聲譁論良久暫起法善曰此子突入詞辨如此恐是􅂒魅俟其復至密以小劒擊之隨手墮於階下化為瓶榼一座驚懾遽視乃醲醖也衆笑飲之其味甚佳咸曰麴生風味不可忘也劉昫唐書曰葉法善括蒼人三代為道士皆有攝養之術法善少𫝊符籙尤能厭劾鬼神顯慶中徵詣京師先天中封越國公僧一行長於術數所善王生其子殺人繫獄求救於一行一行曰吾以數推之近當有赦遣其徒授以布囊戒令某處廢園伺之有物當來其數七共捕之以囊携來至晡時果有七豕入園盡獲之即置於大甕中密覆封以太一泥朱書梵字志之太史奏北斗忽不見帝以問一行曰莫若大赦帝從之其夕太史奏北斗復見如故劉昫唐書曰一行姓張氏魏州昌樂人都督公謹之孫少聰敏博覽經史尤精歷象五行之學時道士尹崇博學先達素多墳籍一行詣崇借太𤣥經讀之數日還其書崇曰此書意指稍深吾尋之積年尚不能曉吾子試更研求何遽見還一行曰究其義矣因出所撰大行𤣥圖及義决一卷示崇崇大驚因與談其奧賾甚嗟伏之謂人曰此後生顔子也由是大知名客以按樂圗示王右丞右丞徐曰此霓裳第二疊最初拍也客未然引工按曲乃信涼州獻新曲𤣥宗御便坐召諸王觀讓皇憲曰曲雖佳然宫麗而不屬商亂而暴君卑逼下臣僣犯上發於忽微形於音聲播之詠歌見於人事臣恐一日有播遷之禍帝默然及安史之亂乃思憲審音讓皇已見李龜年嘗至岐王宅聞琴曰此秦聲良久又曰此楚聲主人入問之則前彈者隴西沈妍後彈者楊州薛滿李翺守廬江有重囚當刑引録之此人哀鳴曰某有薄藝願於貴人前試之問之乃長嘯也因命釋械俄而清聲上徹雲漢公曰不謂蘇門之風出於赭衣之下可與孫阮同躅乎即赦其罪李贊皇李德裕已見作相日有親知奉使京口贊皇曰金山泉揚子江中泠水各置一壺其人舉棹醉而忘之至石頭城方憶乃汲一瓶歸獻之李飲之曰江南水味大異頃嵗此頗似建業石頭城下水其人謝過不敢𨼆劉禹錫為屯田貟外郎時一僧有術數極精禹錫邀之至省方欲問忽報韋生在外禹錫令僧坐簾下出接韋韋獻卷禹錫略省之意色殊倦韋去僧吁嗟良久曰某欲言貟外心必不愜如何禹錫曰但言之僧曰貟外後遷乃本行正郎然須待適來韋生知印處置禹錫大怒揖出不旬日貶官韋乃處厚相也後三十年在中書禹錫轉屯田郎中朝文元公迥少聞方士之術凡人耳有靈響目有神光其後聽於靜中若鈴聲逺聞耆年之後愈覺清徹公名之曰三妙音一曰幽泉潄玉二曰清聲搖空三曰秋蟬曵緒張僕射齊賢漕江南日以書薦王冀公王欽若已見於錢希白錢時以才名獨步館閣適延一術士以考休咎不容通謁王局踳門下厲聲詬閽人術者遙聞之謂錢曰此不知何人若聲形相稱世無此貴者但恐形不副聲爾願延入使某一見希白召之冀公單微逺人神貌踈瘦舉止山野希白蔑視之術者悚然側目􅀈視既退稽顙興歎曰人中之貴有此十全者希白戲曰都堂便有此等宰相乎術者正色曰公何言歟且宰相何時而無此君不作則已若作則天下富盛而君臣相得至死有慶而無弔不完者但無子而已希白曰他日當陶鑄吾輩乎術者曰恐不在他日願公無忽後希白方為翰林學士冀公已真拜東都事略曰錢易字希白吳越國王倧之子十七舉進士言者以其輕俊黜之太宗語蘇易簡曰朕恨不與李白同時易簡曰有錢易者李白才也太宗喜曰若然當用唐故事召入禁林㑹盜起劒南不果真宗朝擢知制誥遷翰林學士歐陽公嘗得一古畫牡丹叢下有一猫公未知其精粗以示吳正肅吳育已見正肅一見曰此正午牡丹也其花披哆而色燥此日中時花也猫眼黑睛如線此正午猫眼也凡帶露花則房斂而色澤猫眼早暮則睛圎正午則如一線耳人稱其善求古人之意蔡君謨善别茶建安能仁院有茶生石縫間寺僧采造得茶八餅號石巖白以四餅遺君謨以四餅密遣人走京師遺王內翰禹玉嵗餘君謨被召還闕訪禹玉禹玉命子弟於茶筒中選茶之精品碾待君謨君謨捧甌未嘗輒曰此極似能仁石巖白公何從得之禹玉未信索貼驗之乃服東都事略曰蔡襄字君謨興化軍仙遊人為著作佐郎時唐介以直言貶春州别駕襄言貶太重得改英州襄為政清明以端明殿學士知杭州性嗜茶第其品目以為譜賈師憲微時賈似道已見嘗出遊湖山小憩棲霞嶺一布裘道者瞪視曰官人好自愛將來功名不在韓魏公下賈意其見侮既而醉博平康偶破其靣他日復遇道者頓足驚歎曰可惜可惜天堂已破必不能令終其後悉驗紐勒歡尼嚕古善識馬嘗行郊野見數馬跡指其一曰此竒駿也以已馬易之果然遼史曰紐勒歡尼嚕古逸其氏族補積慶宫人應歷初為習馬實達爾以母憂去一日至雅布山見一巨人惶懼走巨人止之曰勿懼我地祗也葬爾母於斯當速詣闕必貴顯因從之纍遷馬羣侍中李國用自北來杭輟耕録曰國用登州人嘗為卒遇神仙教以觀日之法能洞見肺腑世稱神明傲岸陵物時貴咸敬之謝后諸孫有字退樂者設早饌延致國用至即據中位省幕官皆列坐不得其一言時趙文敏公在杭人稱為七司戶與謝姻戚屈來同飯文敏公風瘡滿靣李望見即起迎語坐客曰我過江僅見此人耳瘡愈即靣君異日官至一品名聞四海後皆如其言李國用兼能望氣襄陽未破時世祖命即其軍中望氣行踰兩三舍即還奏曰臣見卒伍中往往有台輔氣襄陽不破江南不平置此人於何地未幾果下襄陽吾子行吾衍已見妙解音律嘗有一人從豫章來以音律自髙聞子行造之子行遍扣所列鍾鐃問之客言其音所屬語皆符合子行最後取東柱下鎛鍾擊之鎛形弇其音涵沍客審聽之曰宫乎子行笑曰宫當渾以圜此鬱勃不發非宫也而不比他音當是古棄鎛耳客乃服巧藝第二十一夫德成而上藝成而下藝非君子所先也然孔子曰游於藝又曰吾不試故藝至以博奕為賢於無所用心則亦豈聖人之所廢哉余觀莊生言宋元君將畫圖一畫史後至儃儃然不趨受揖不立因之舍則解衣磐礴裸君曰是真畫者也後世稱王維之畫為天機所到嗚呼夫能遺人而後可以全於天是豈維藝哉進於道矣他如輪扁之輪郢人之斤庖丁之解牛皆所謂遺人以全天者也茍僅能執繩墨守途轍而不失者是工徒之厮役也曷足以言藝哉蔡中郎性沉審志好琴道嘉平中入清溪訪鬼谷先生故居山五曲曲有靈迹中郎每一曲制一弄三年曲成出呈馬季長王子師輩皆歎異之漢世安平崔瑗瑗子實張懷瓘書斷曰崔瑗字子玉安平人曽祖篆父駰子玉官至濟北相文章蓋世善章草書師於杜度㸃畫之間莫不調隂陽𡊮昂評其書如危峯阻日孤松一枝王𨼆謂之草賢字羊愔能書人姓名曰瑗子實子真官至尚書亦能草書𢎞農張芝芝弟昶羊愔能書人姓名曰𢎞農張芝字伯英髙尚不仕善草書精徑絶倫家之衣帛必先書而後練臨池學書池水盡墨每書云匆匆不暇草書人謂為草聖芝弟昶漢黃門侍郎亦能草今世云芝草者多是昶作也並善草書而魏武亞之桓君山桓談已見蔡伯喈蔡雍善音樂馮翊山子道王九真郭凱三人未詳諸人善圍棋魏武皆與埒能魏文帝善彈棋能盡其巧嘗云京師先工有馬合鄉侯東方安世張公子常恨不得與彼數子者對魏文帝善擊劒嘗與征虜將軍劉勳奮威將軍鄧展飲宴鄧自言善有手臂習兵能空手入白刃因求與魏文對時酒酣耳熱方食甘蔗便以為杖下殿數交三中其臂晋世羊曇善唱樂桓子野善挽歌二人已見及𡊮山松作行路難曲時人謂之三絶晋中興書曰山松陳郡人祖喬益州刺史父方平義興太守山松歷祕書監吳國內史孫恩亂見害羊敬元少便靜默美言笑善容止父不疑為烏程令王獻之為吳興太守羊時年十二王甚知愛之嘗夏月入縣羊著新絹裙晝寢獻之書裙數幅而去羊本工書因此彌善竇蒙述書賦注曰羊欣字敬元太山人不疑子宋中散大夫與丘道護同受獻之筆法張懷瓘書斷曰羊欣師資大令時多衆賢非無雲塵之逺若親承妙㫖入於室者唯獨此公亦猶顔回與夫子有步驟之近槭若嚴霜之材婉如流風之雪驚禽走獸駱驛飛馳可謂王之藎臣朝之元老沈約云敬元尤長於隸書子敬之後可以獨步時人云買王得羊不失所望衡陽王義季鎮京口戴顒衣野服為王鼓琴並新聲變曲其三調遊絃廣陵止息之流皆與世異太祖聞之嘗曰吾東巡之日當宴戴公山也以戴好音常給正聲伎一部宗敬微測善畫自圗阮籍遇蘇門於行障上坐臥對之又畫永業佛影臺皆為妙作羊𤣥保善奕棋何尚之亦雅好棋吳郡禇𦙍年七嵗入髙品及長冠絶當時𦙍父榮期與臧質同逆𦙍應從坐何尚之請曰𦙍奕棋之妙超古冠今魏犨犯令以才獲免父戮子宥其例甚多特乞與其微命使異術不絶上不許時人痛惜之江左能棊人琅琊王抗第一品吳郡禇思莊㑹稽夏赤松第二品赤松思速善於大行思莊思遲巧於鬭棋宋文帝世羊𤣥保為㑹稽太守帝遣思莊入東與𤣥保戲因製局圗還於帝前覆之齊太祖嘗使思莊與王抗交賭自食時至日暮一局始竟上倦遣還省至五更方决抗睡於局後思莊達曉不寐或云思莊所以品第致髙緣其用思深久人不能對自漢時已有佛像而形制未工宋戴顒父子特善其事宋世子鑄丈六銅像於瓦官寺既成靣恨瘦工人不能改顒曰非靣瘦乃臂胛肥耳及減臂胛瘦患遂除宋孝武賜何戢蟬雀扇乃顧景秀所畫同時吳郡陸探微顧彥先皆能畫歎其巧絶後齊髙帝好畫扇戢因王晏獻之上令晏厚酬其意劉瑱少有行業文藻隸丹青並為當世第一瑱妹為齊鄱陽王妃伉儷甚篤王為齊明帝所誅妃追傷成疾醫所不療有陳郡殷蒨善寫人靣與真不別瑱令蒨畫王形像并圗王平生所寵姬共照鏡狀如欲偶寢瑱乃密使媪奶示妃妃視仍唾之因罵云故宜早死於是恩情即歇病亦除差蕭子顯齊書曰瑱字士溫劉繪弟也善畫婦人時有滎陽毛惠逺善畫馬並為當世第一瑱仕齊至義興太守蕭賁是竟陵王子良之孫有文才善書畫嘗於扇上圗山水咫尺之內便覺萬里為遙矜慎不傳自娛而已梁宣城王於東府起齊令顧野王畫古賢陳書曰顧野王字希馮吳郡吳人祖子喬梁武陵王府參軍事父烜臨賀王記室以儒術知名野王七嵗讀五經略知大指九嵗能屬文嘗制賦領軍朱异見而竒之十二隨父之建安撰地記二篇長而遍觀經史精記默識天文地理蓍龜占候蟲竒字無所不通為臨賀王府記室宣城王為揚州野王及琅琊王褒並為賔客後仕陳至黃門侍郎王褒書贊周書曰王褒字子深琅琊臨沂人曽祖儉祖騫父規並仕南朝褒識量淹通博覽史傳除祕書郎蕭子雲特善草隸褒以姻戚去來其家遂相模範而名亞子雲並見重於時入周仕至開府儀同三司時人稱為二絶鄭述祖聰敏有風檢為先達所稱能鼓琴自造龍吟十弄云嘗夢人彈琴寤而寫得當時以為絶妙吳道𤣥傳神寫照如欲笑言吳道𤣥嘗畫殿內五龍鱗甲飛動每欲大雨即生烟霧𤣥宗忽思嘉陵江山水假吳生驛遞令往寫貌及回帝問之道𤣥云臣無粉本並記在心遣於大同殿圗之嘉陵江山水一日而就時有李將軍山水擅名亦畫大同殿數月方畢上曰李思訓數月之功吳道𤣥一日之跡各極其妙也朱景𤣥唐朝名畫録曰李思訓開元中除衛將軍善畫品格髙竒為國朝山水第一𤣥宗召李思訓圗大同殿壁兼畫掩障數日因奏對上曰卿所畫掩障夜聞水聲真通神之佳手也王右丞王維已見畫思入神其山水平逺雲勢石色繪工以為天機所到非學可及語林卷二十三
