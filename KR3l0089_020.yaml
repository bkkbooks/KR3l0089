body:
  text: 語林卷二十眀何良俊撰棲逸第十二余好觀荘生言見其輕詆舜至比之卷婁又言堯往見四子窅然喪其天下太過或者以為寓言也然太史公稱由光義至髙箕山有許由冡似誠有之世言隱士率多避世不然夫古有鑿坏築巖之徒漢興猶𫝊東園綺季東都有嚴光周黨斯其人豈必盡衰世哉蓋鍾鼎丘園亦各其性生也惟有道之君優顯異節隱士乃著若汙濁之世雖神龍威鳯猶隱鱗藏羽則隱士常數倍扵平世由不自見史𫝊所載什一耳余所取不必盡巖藪之士蓋達情任運𡨕心出䖏者庶幾孔子之所謂時古稱陸沉金馬門即藏史漆園皆遁世也其視後世以終南為捷徑既専一壑聞車馬而驚猜者相去何如哉昔謝萬作八賢論孫興公以為體公識逺則出䖏同歸世以興公理為得不誣也向子平讀易至損益卦喟然嘆曰吾已知富不如貧貴不如賤但不知死何如生耳為子嫁娶畢敇家事斷之云當如我已死與同好禽子夏俱逰五嶽名山不知所終魏𨽻髙士𫝊曰向長字子平禽慶字子夏二人相善慶隱避不仕王莽通老易安貧樂道好事者更饋遺輒受之自足還餘如有不取也舉措必扵中和司空王邑辟之連年乃欲薦之扵莽固辭乃止張仲蔚隱居平陵蓬蒿滿宅唯開一行徑三輔决録曰仲蔚扶風人少與同郡魏景卿隠身不仕眀天官博物好為詩賦所居蓬蒿沒人蔣元卿舎中三徑唯羊仲求仲從之逰二仲皆挫亷逃名之士司馬彪續漢書曰蔣詡字元卿父䘮弔者盈門後母疾之不得止舊廬自作小菴扵側往如舊鄭次都去吏隱居蟻陂之陽謝承後漢書曰鄭敬字次都釣扵大澤汝南先賢𫝊曰鄭敬𨼆蟻陂之陽以漁釣自娱彈琴詠詩常方坐扵陂側隨杞桞之䕃鋪茅蘼為席與同郡鄧敬折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娱謝承後漢書曰敬閒居不修人倫新遷都尉逼為功曹㕔事前樹時有清汁以為甘露敬曰明府政未能致甘露此青木汁耳辭病隠䖏精學蟻陂中隂就虞延並辟不行王君公邅亂不去儈牛自隠儈謂平㑹兩家賣買之價時人為之語曰避世墻東王君公嵇康髙士𫝊曰君公明易為郎數言事不用乃自汙與官婢通免歸詐狂儈牛口無二價也王仲子為大司徒司直以病免歸後徵至滎陽疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往来屑屑不憚煩也范曄後漢書曰王良字仲子東海蘭陵人在位恭儉妻子不入官舎布被瓦器時司徒史鮑恢以事到東海過候其家良妻曵柴從田中歸恢言我司徒史也故来受書欲見夫人妻曰妾是也苦掾無書恢乃下拜歎息而還范史雲學通三經常自賃灌園韓伯休采藥名山賣扵長安市口不二價三十餘年時女子從韓買藥守價不移女子怒曰公是韓伯休耶乃不二價伯休歎曰我本避名今女子皆知有我何用藥為乃遁入㶚陵山中范曄後漢書曰韓康字伯休京兆㶚陵人桓帝以安車聘之康辭安車自乗柴車冒晨先使者發至亭亭長以韓徴君當過方發人牛修道及見康柴車幅巾以為田叟也使奪其牛即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此自老子與之亭長何罪乃止康因道遁以夀終𡊮夏甫散髪絶世欲投迹深林以母老不宜逺遁乃築土室四周扵庭不復為户自牖納飲食旦扵室中東向拜母母思夏甫時往就視母去便自掩閉妻子莫得而見及母沒不制服設位時莫能名或以為狂生范曄後漢書曰𡊮閎字夏甫髙祖安司徒曽祖京侍中祖彭議郎父賀彭城相閎居䖏側陋以耕學為業從父逢隗並貴盛數饋之無所受閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不䏻以徳守之而競為驕奢與亂世爭權此即晉之三郤矣劉荆州劉表已見數請龎徳公徳公不為屈乃就候之劉曰夫保一身孰若保天下乎徳公笑曰鴻鵠巢扵髙林之上暮而得所棲黿鼉穴扵深淵之下夕而得所宿夫取舎行止亦人之巢穴也各得其棲宿而已天下非所保也管㓜安自越海及歸常坐一木榻積五十餘年未嘗箕股其榻上當膝䖏皆穿孫公和孫登已見清静無為好讀易彈琴頽然自放覩其風神若逰六合之外魏末居北山中以石窟為宇編草自覆阮歩兵見孫被髪端坐巖下遥見鼔琴自下趨進莫得與言阮因長嘯與琴音諧和公和嘯和之妙響動林谷王右軍既去官與東土人士營山水弋釣之娱又與道士許邁共修服食徧采名藥不逺千里游東中諸郡名山泛滄海歎曰我卒當以樂死道學傳曰許邁字叔𤣥清虚接真遐棲表志所在往而不返故改名逺逰與王右軍父子為世外之交王右軍雅好服食飬性不樂在京師初渡浙江便有終焉之志㑹稽有佳山水名士多居之時孫綽李充許詢支遁諸人皆以文義冠世並築室東土與王同好張廌隠居頥志家有苦竹數十頃張扵竹中為屋常居其中王右軍聞而造之張逃避竹中不與相見陶䖏静年十五便服食絶穀家累千金僮客百數䖏静終日端拱絶不婚宦居臨湘縣山中立小草屋裁足容身有時還家設小牀獨坐不與人共晉中興書曰陶淡字䖏静劉子驥虚退寡欲志在棲遁劉驎之已見桓車騎請為長史桓冲别𫝊曰冲字𤣥叔温弟也累遷車騎將軍都督七州諸軍事劉固辭車騎因到其家劉扵樹條桑使者致命劉曰使君既枉駕光臨宜先詣家君車騎乃造其父父命劉然後還拂短褐與車騎言話父使驎之扵内自持濁酒蔬菜供賔車騎敕人代驎之斟酌父辭曰若使從者便非野人之意車騎慨然稱美至暮乃退郭元瑜少有㧞俗之韻隱居巖谷晉書曰郭瑀字元瑜敦煌人隠于臨松薤谷張天錫遣使備禮徵之張資凉州記曰天錫字公純嘏安定烏氏人張耳後也祖軌凉州刺史值亂據凉土天錫簒位自立為凉州牧元瑜指翔鴻示使人曰此鳥安可籠哉天錫遺瑀書曰先生潜光九臯懐真獨逺心與至境𡨕符志與四時消息豈知蒼生倒懸四海待拯孔聖車不停軌墨子駕不俟旦皆以黔首之禍不可不救先生懐濟世之才故遣使者虚左授綏索偉祖虚靖好學不應州郡之命晉書曰索襲字偉祖敦煌人太守隂澹嘗造焉經日忘返退而歎曰世人之所有餘者富貴也而目好五色耳玩音聲先生棄衆人之所收收衆人之所棄味無味扵恍惚之際兼重𤣥扵衆妙之内宅不彌畝而志忘九州形居塵俗而棲心天外雖黔婁之髙逺荘生之不顧蔑以過也遂謚為𤣥居先生戴仲若戴顒已見以桐廬僻逺難以養疾乃出居吴下吴下士人共為築室聚石引水植林開澗少時繁宻有若自然宗少文好山水愛逺逰西陟荆巫南登衡嶽因結宇衡山欲懐尚平之志有疾還江陵歎曰老疾俱至名山恐難徧覩唯當澄懐觀道卧以逰之凡所逰履皆圗之扵室謂人曰撫琴動操欲令衆山皆響宗少文善琴書精扵言理每逰山水往輒忘歸王長史王敬𢎞已見每從之未嘗不彌日也周道祖閒居樂志好讀老易入廬山事沙門慧逺時彭城劉遺民遁迹廬山陶淵明亦不應徵命時人謂之尋陽三𨼆沈約宋書曰周續之字道祖鴈門人過江居豫章建昌縣徵太學博士不就常以嵇康髙士𫝊得出䖏之美因為之注江州刺史劉柳薦之髙祖曰臣聞恢燿和肆必在兼城之寳翼亮崇本宜紆髙世之逸是以渭濵佐周聖徳廣運商洛匡漢英業乃昌伏惟明公道邁振古應天繼期逰外暢扵冥内體逺形扵應近雖汾陽之舉輟駕扵時艱明揚之㫖潜感扵穹谷矣竊見䖏士鴈門周續之清真貞素思學鉤深弱冠獨往心無近事性之所遣榮華與饑寒俱落情之所慕巖澤與琴書共逺加以仁心内發義懐外亮留愛崑卉誠著桃李若升之宰府必鼎味斯和濯纓儒官亦王猷遐緝臧文不智失在降賢言偃得人功由升士願照其丹欵不以人廢言辟太尉掾不起王敬𢎞己見居舎亭山林澗環周備登臨之美時人謂之王東山周續之以身不可遺餘累可絶遂終身不娶布衣蔬食孔淳之居㑹稽剡縣性好山水每有所逰必窮其幽峻或旬日忘歸嘗逰山遇沙門釋法崇因留共止遂停三載法崇歎曰緬想人外三十年矣今乃傾蓋扵兹不覺老之將至淳之還反不告以姓宋書曰孔淳之字彦深魯郡人祖惔尚書祠部郎父粲秘書監徵不就淳之少髙尚愛好墳籍與徵士戴顒王𢎞之及王敬𢎞等共為人外之逰江湛舉王景𤣥為吏部郎江湛王微並已見王與湛書曰君平有言生我名者殺我身天爵猶滅名安用吏部郎哉其舉可陋其事不經非獨縉紳者不道僕妾皆笑之因與湛告絶足不踰閾十餘年棲遲環堵之室苔草沒堦王僧達禮致禇元璩停郡信宿裁交數言而退丘珍孫與王書曰聞禇先生出居貴館此子滅景雲棲不事王侯抗髙木食有年載矣自非折節好賢何以致之昔文舉棲冶城安道入閶門扵兹而三焉夫却粒之士飡霞之人乃可蹔致不宜久羈君當思遂其髙歩成其羽化望其還䇿之日蹔紆清塵亦願助為譬說王荅曰禇先生從白雲逰舊矣古之逸民或留慮兒女或使華隂成市而此子索然唯朋松石介扵孤嶺積數十年近故要其来此兾慰日夕比談討芝桂借訪薜蘿若已窺烟液臨滄洲矣知君欲見之輒當申譬蕭子顯齊書曰禇伯玉字元璩吴郡錢唐人少有隠操孝建中徵議曹從事不就齊太祖即位敕扵剡白石山立太平館居之禇元璩少有隠操寡嗜欲年十八父為婚婦入前門禇從後門出遂住剡居瀑布山性耐寒暑時人比之王仲都上清六甲經曰王仲都西漢人也少修道徳孝文以積寒之日令仲都單衣載四馬扵上林昆明環水而馳御者厚衣狐裘而寒凛垂死仲都色曽不變體和氣溢如㷔盛暑圍以烈火亦不汗後不知所之顔延之居身清約不營財利布衣蔬食獨酌郊野當其為適傍若無人劉靈預劉蚪己見詔徵不就竟陵王子良致書通意劉荅曰蚪四節卧病三時營灌暢餘情扵山澤託暮情扵魚鳥寜非唐虞重恩周召宏施蚪進不研幾入𤣥無洙泗稷館之辯退不凝心出累非冡間樹下之節逺澤既灑仁規先著謹收樵牧之嫌敬嘉軾鼃之義庾㓜簡志性恬隠不交外物臨川王映臨州獨重㓜簡餉麥百斛㓜簡謂使人曰民樵採麋鹿之伍終其解毛之衣馳騁日月之車得保自耕之禄扵大王之恩亦已深矣辭不受齊書曰庾易字㓜簡新野人徙居江陵永明中徴太子舎人不就以文義自樂顧長孺有隱操齊書曰顧黯字長孺吴郡人有𨼆操與顧景怡顧歡己見俱不就徵景怡晚節服食不與人通每旦出户山鳥集其掌取食宗敬微宗測己見嘗歎曰家貧親老不擇官而仕先哲以為美談余竊有惑誠不䏻潜感地金𡨕致江鯉但當用天道分地利孰䏻食人厚禄憂人重事乎豫章王辟宗敬微為參軍宗曰測性同鱗羽愛止山壑眷戀松筠輕迷人路縱宕巖流有若狂者忽不知老至今鬢已衰白豈容課虚責有限魚慕鳥哉魚復侯子響為江州厚餉遺宗敬微宗辭曰少有狂疾尋山采藥逺来至此量腹而進松术度形而衣薜蘿淡然已足豈容當此横施南史曰測居江陵欲㳺名山齎老子荘子自隨子孫拜辭悲泣測長嘯不視遂往廬山孫伯翳放情物外棲志丘壑與王令君范將軍王亮范雲並己見交好王范既相二朝欲以吏職相䖏孫曰人生百年有如風燭正可怡神養性琴酒寄情安䏻棲棲役曳若此此嵇康所不堪予亦未䏻也楊松介談藪曰孫康字伯翳太原人放情物外棲志丘壑與王亮范雲為莫逆之交不宋齊語曰孫康家貧常映雪讀書交㳺雜陶徵士嘗言五六月北窓下卧遇凉風暫至自謂是羲皇上人臧榮緒南齊書曰臧榮緒東莞莒人純篤好學惇愛五經常以宣尼生庚子日陳五經拜之自號被褐先生與關康之俱𨼆京口南齊書曰關康之字伯愉河東人世居丹徒以墳籍為務四十年不出門不應州府辟獨䖏一室稀與妻子相見不通賔客弟子以業傳受時號京口二隱明僧紹累徵不就嘗聞釋僧逺風徳僧紹往候扵定林寺太祖欲出寺見之南史曰明僧紹字休烈平原鬲人明經有儒術舉秀才鎮北府辟功曹並不就𨼆長廣郡嶗山聚徒立學僧逺問曰天子若来居士若何相對僧紹曰山藪之人政當鑿坏以遁若辭不獲命便當依戴公故事耳南史曰昔戴顒髙卧牖下以山人服加其身故云何子有清退少欲居吴波若寺足不踰户人莫見其面宋明帝召至都除永嘉太守子有時寄住南澗寺不肯詣臺乞扵野外拜受詔命見許忽一夜乗小船逃歸吴隱虎丘山何子晳棲遁不出豫章王蕭嶷己見命駕造之㸃從後門遁去竟陵王蕭子良己見欲就見之子晳時在法輪寺竟陵往請子晳遂角巾登席竟陵欣恱無已即遺子晳嵇叔夜酒杯徐景山酒鐺何子季何𦙍已見以㑹稽山多靈異特往逰覽遂家若耶雲門寺初子季二兄求㸃並棲遁至是子季又𨼆世號㸃為大山𦙍為小山亦曰東山兄弟發迹雖異克終皆𨼆世稱何氏三髙劉彦度劉訏己見少懐𨼆操兄為聘妻剋日成婚彦度聞而逃匿事息乃還本州刺史張稷辟為主簿彦度掛檄扵樹而逃陳留阮孝緒博學𨼆居不交當世時人造之未嘗見也彦度經一造孝緒即顧以神交彦度族兄士光劉歊己見又履髙操三人日夕招携都下謂之三𨼆劉彦度每進山澤留連忘反神理閒正姿貌甚華在山谷之間意氣彌逺或遇之者謂為神人陶隱居陶𢎞景己見始從東陽孫逰岳受符圗經法徧厯名山尋訪仙藥每經澗谷必坐卧其間吟詠盤桓不能巳巳梁昭明性愛山水扵𤣥圃大營亭館與朝士名素者逰䖏其中庾杲之清素自業食唯有韮𦵔卄瀹韮生韮雜菜或戲之曰誰謂庾郎貧食鮭常有二十七種卞士蔚卞彬已見飲酒以瓠壷瓢勺杬皮為肴著帛冠十二年不易以大瓠為火籠器物多諸詭異自稱卞田居婦為傅𧖟室阮孝緒㓜有至性與羣兒㳺戲便以穿池築山為樂及冠父誡之曰三加彌尊人倫之始宜思自朂以庇余躬孝緒荅曰願迹松子扵瀛海追許由扵窮谷庶保促生以免塵累自是屏居一室雖家人亦罕窺其面人遂呼為阮居士南史曰阮居士著髙𨼆𫝊分為三品言行超逸名氏弗𫝊為上篇始終不耗姓名可録為中篇挂冠人世棲心塵表為下篇阮居士所居唯有一鹿牀竹樹環繞劉慧斐張孝秀𨼆居東林寺慧斐扵山北構一園名離垢時人因稱為離垢先生論者謂自逺法師後將二百年方有張劉之盛南史曰劉慧斐字宣文彭城人張孝秀字文逸南陽宛人慧斐博學能屬文起家梁安成王參軍甞還都途經尋陽逰志扵匡山與張孝秀遇相得甚歡遂有終焉之侯景之亂邵陵王援臺留書二萬卷付馬要理馬樞己見馬肆志尋覽殆將周徧乃喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊吕為管庫束名實則蒭芥柱下之言翫清虚則糠粃席上之說稽之篤論亦各從其好也然支父有讓王之介嚴子有傲帝之規千載美談所不廢也比求志之士望塗而息豈天之不恵髙尚何山林之無聞甚乎乃𨼆居茅山有終焉之志梁書曰邵陵携王綸字世調髙祖第六子少聰頴博學善屬文尤工尺牘盧度𨼆居廬陵所居前有池養魚皆名呼之次第来取食食已即去南史曰盧度字孝章始興人有道術會稽山有一人姓蔡𨼆居山中養䑕數十頭呼来即来遣去即去言語狂易時人呼為謫仙馮靈通雅好山水兼有巧思結架巖林甚得棲逰之適頗以此聞世祖給其功力令與沙門統僧暹河南尹甄琛周視崧髙形勝之䖏造閒居寺林泉既竒營製又美曲盡山居之妙北史曰馮亮字靈通南陽人梁平北將軍蔡道恭之甥博覽諸書篤好佛理被虜入北遂𨼆居嵩髙世宗召令侍講十地諸經固辭不拜使衣幘入見馮苦求以幅巾至朝遂不強逼還山數年與僧徒禮誦為業蔬食飲水有終焉之志王沙彌王晞母終後遨逰鞏洛恱其山水與范陽盧元眀鉅鹿魏季景結侣同契往天陵山浩然有終焉之志王叔朗閒淡寡欲雖王事鞅掌而雅操不移良辰美景嘯詠逰遨登山臨水以談讌為事人士謂之物外司馬王晞韋敬逺韋夐己見志尚夷簡澹扵榮利所居之宅枕帶林泉對翫琴書蕭然自逸時人號為居士時有慕其閒素者載酒從之敬逺為之盡歡接對忘倦周眀帝敬禮韋敬逺嘗貽以詩敬逺願不時朝謁帝敇有司日給河東酒一斗號曰逍遥公周明帝貽敬逺詩曰六爻貞遯出三辰光少㣲頴陽讓逾逺滄洲去不歸香動秋蘭佩風飄蓮葉衣坐石窺仙洞乗槎下釣磯嶺松千仭直巖泉百丈飛聊登平樂觀遥望首陽薇詎能同四𨼆来㕘余萬㡬王無功有田十六頃在河渚間奴婢數人自課種黍春秋釀酒養鳬鴈蒔藥草自供與仲長子光服食養性欲見兄弟輒渡河還家逰北山東臯著書自號東臯子王績仲長先生𫝊曰先生諱子光字不曜自云洛陽人往来河東傭力自給無室廬絶妻子開皇末始菴河渚間以息身焉賣藥為業人莫知之也汾隂生㳺河渚一覩而伏曰東方朔管輅不如也由是顯重守令至者皆親謁先生辭以瘖疾未嘗交語著獨逰頌河渚先生𫝊以自喻識者知其懸解人也有請道者劒書老易二字示之彈琴餌藥以終其世謂王通中說曰薛收問仲長子光子曰天人也收曰何天人子曰眇然小乎所以屬扵人曠哉大乎獨能成其天朱桃椎澹泊無為隠居不仕披裘帶索沉浮人間竇軌為益州聞而召之遺以衣服逼為鄉正桃椎不言而退逃入山中夏則祼形冬則樹皮自覆凡所贈遺一無所受每織芒屩置之扵路人見者皆言朱居士屩也為鬻取米置之本䖏桃椎至夕取之終不見人髙士亷下車深加禮敬召至降階與語桃椎不荅直視而去士亷每加優異蜀人以為美談宋祁唐書曰桃椎益州成都人髙士亷在益州屢遣人存問見輒走林草自匿云孔極侍郎朝廻遇雨避扵一叟之廡下延入㕔事叟烏㡌紗巾逢迎甚恭因備酒饌一一精好孔公借油衣叟曰某寒不出熱不出風不出雨不出未嘗置油衣也孔公不覺頓忘宦情元魯山元徳秀己見南逰陸渾見佳山水乃定居屬嵗歉庖厨不充彈琴讀書怡然自得好事者載酒肴過之不擇賢不肖與之對酌陶陶然遺身物外琴觴之餘間以文詠率情而書語無雕刻所著季子聽樂論蹇士賦為髙人所稱賀知章請為道士還鄉里就求周宫湖數頃為放生池詔賜鏡湖剡川一曲田㳺巖己見愛夷陵青溪止廬其側田㳺巖入箕山居許由祠旁自號田東鄰逸人王休居太白山下每冬時取溪氷琢其清瑩者煮茗以供賔客李白與孔巢父韓凖裴政張叔眀陶沔同𨼆徂徕山每日沉飲號竹溪六逸王摩詰貯蕙蘭用黄磁斗養以綺石累年彌盛劉昫唐書曰王維字摩詰太原祁人與弟縉俱有俊才博學多藝閨門友悌兄弟奉佛居常蔬食不茹葷血晚年長齋不衣文綵得宋之問藍田别墅在輞口輞水周扵舎下竹洲花塢與道友裴迪浮舟往来彈琴賦詩嘯詠終日在京師日飯十數名僧以𤣥談為樂齋中無所有唯茶鐺酒臼經案繩牀而已退朝之後焚香獨坐以禅誦為事妻亡不再娶三十年孤居一室屏絶塵累邢和璞曽居終南好道者多卜築依之崔曙年少亦隨焉伐薪汲泉都是名士商山𨼆士髙太素所居曰清心亭每一時至則有猿啼扵庭下謂之報時猿學士許謹選放曠不拘小節多與親友結宴花圃中未嘗張幄設坐只使童僕聚落花鋪坐下曰吾自有花䄄郄純與元載不合退歸東洛自號伊川田父顔真卿為湖州刺史張志和来謁真卿以其舟敝漏請更之志和曰願為浮家泛宅往来苕霅間陸羽隠苕溪自稱桑苧翁闔門著書或獨行野中誦詩擊木徘徊不得意即慟哭而歸人謂今時接輿李兵部李約己見雅度𤣥機蕭蕭冲逺徳行既優又有山林之致琴道酒徳皆髙絶一時不近粉黛性喜接引人物不好俗談晨起裹頭對客蹙融便過一月多蓄古器在湖州嘗得古鐵一片擊之清越又養一猿名山公嘗以之隨逐月夜泛江登金山擊鐵鼔琴猿必嘯和傾壷連旦不俟外賔白傅分司東洛日以詩酒自娱盧尚書簡辭有别墅近伊水亭榭清峻方冬與羣從子姪同登眺望嵩洛既而霰雪微下因說鎮金陵時江南多山水見居人以葉舟浮泛就食菰米鱸魚念之不忘逡廵忽有二人衣簑笠循岸而来牽引篷艇船頭覆青幕中有白衣人與衲僧耦坐船後有小竈安銅甑而炊小僮烹煮泝流過扵檻前聞舟中吟笑方甚盧歎其髙逸不知何人問之言是白公與僧佛光自建春門往香山精舎劉昫唐書曰盧簡辭字子䇿范陽人父綸工詩有聲扵大厯間簡辭文雅之餘尤精法律累官檢校刑部尚書白樂天在東都居履道里宅有池水可泛舟樂天每命賔客繞舷以百十油囊懸炙沉水中隨舷而行一物盡則左右隨取之藏盤筵扵水底白氏長慶集池上篇序曰都城水木之勝在東南偏東南之勝在履道里里之勝在西北隅西閈北垣第一第即白氏叟退老之地地方十七畝屋室三之一水五之一竹九之一島樹橋道間之初樂天既為主喜且曰雖有臺無粟不䏻守也乃作池東粟廩又曰雖有子弟無書不能訓也乃作池北書庫又曰雖有賔朋無琴酒不能娱也乃作池西琴亭加石樽焉樂天罷杭州刺史時得天竺石一華亭鶴二以歸始作西平橋開環池路罷蘇州刺史時得太湖石白蓮折腰菱青板舫以歸又作中髙橋通三島徑罷刑部侍郎時有粟千斛書一車洎臧獲之習筦磬絃歌者指百以歸先是潁川陳孝山與釀法酒味甚佳博陵崔晦叔與琴韻甚清蜀客姜發授秋思聲甚淡𢎞農楊貞一與青石三方長平滑可坐卧太和三年樂天始得為太子賔客分秩扵洛下息躬扵池上凡三任所得四人所與洎吾不才身今率為池中物矣每至池風春池月秋水香蓮開之旦露清鶴唳之夕拂楊石舉陳酒援崔琴彈姜秋思頽然自適不知其他酒酣琴罷又命樂童登中島亭合奏霓裳散序聲随風飄或凝或散悠揚扵竹烟波月之際曲未竟而樂天陶然已醉睡扵石上矣睡起偶詠非詩非賦阿龜握筆因題石間視其麄成韻章命為池上篇云爾十畝之宅五畝之園有水一池有竹千竿勿謂土狭勿謂地偏足以容膝足以息肩有堂有亭有橋有船有書有酒有歌有絃有叟在中白鬚飄然識分知足外無求焉如鳥擇木姑務巢安如龜居坎不知海寛靈鶴怪石紫菱白蓮皆我所好盡在我前時飲一盃或吟一篇妻孥熈熈雞犬閒閒優哉㳺哉吾將終老乎其間白樂天方齋劉禹錫正病酒禹錫乃饋菊苖􅐽蘆菔鮓換取樂天六班茶二嚢以自醒酒盧簡求致仕還東都有園林别墅嵗時行樂子弟侍側公卿在席詩酒賞詠竟日忘歸劉昫唐書曰盧簡求即簡辭之弟辭翰縱横長扵應變仕至太原尹北都留守王涯别墅有佳木流泉劉昫唐書曰王涯字廣津太原人貞元中為相王龜簡淡瀟灑以琴書自適意在人外倦接朋逰扵永達里園林深僻䖏創書齋吟嘯其間目為半隠亭劉昫唐書曰王龜字大年父起翰林學士拜吏部尚書龜累官越州刺史王龜從父起在河中扵中條山山谷中起草堂與山人道士逰朔望一還府第後人目為郎君谷司空圗在中條山芟松枝為筆管人問之曰幽人筆當如是淳化中詔起种明逸其母恚曰常勸汝勿聚徒講學果為人知而不得安䖏身既隠矣何用文為我將棄汝深入窮山矣放稱疾不起母遂焚去筆研與放轉居窮僻人跡罕至荆南朱昻博學有清徳晚年乞歸文苑𫝊曰朱昻字舉之其先京兆人父葆光挈家南渡寓潭州昻真宗朝翰林學士拜章乞骸骨前後所得奉賜購竒書以諷誦為樂閒居自稱退叟弟協以純謹稱仕至主客郎中昻以書招之協亦告老歸昻頗好釋氏書晚嵗自為墓志門人謚曰正裕先生真宗寵詔留俟秋涼時吴淑贈行詩曰浴殿夜涼初閣筆渚宫秋晚得懸車比行錫宴玉津園昻弟協亦退居里中兄弟皆年八十人號渚宫二踈林逋隠居杭州孤山常蓄兩鶴縱之則飛入雲霄盤旋久之復入籠中逋常泛小艇西湖諸寺有客至逋所居則一童子應門延客坐為開籠縱鶴良久逋必棹小船而歸盖常以鶴飛為客至之驗歸田録曰林逋字君復居杭州西湖之孤山真宗聞其名賜號和靖䖏士詔長吏嵗時勞問逋工畫善為詩如草泥行郭索山木呌鈎輈頗為士夫所稱錢文僖留守西京時幕下有謝絳尹洙歐陽修皆一時名士每同㳺宴洛下多水竹竒花凡園囿之勝無䖏不到有郭延卿居水南少與張文定吕文穆逰累舉不第以文行稱扵鄉閭張吕作相更薦之得宫職然延卿未嘗出葺幽亭蓺花足跡不及城市時年八十餘一日文僖率僚屬往逰去其居一里外即屏騎從徒歩訪之延卿欣然延接道服對談數公踈爽闓眀天下之選延卿笑曰陋居罕有過從所接之人亦無若數君者老夫甚愜願少留對花小酌遂進陶尊果䔩文僖愛其野逸為引滿不辭既而吏報申牌府史牙兵列庭中延卿徐曰公等何官而從吏之多也尹洙指而告曰留守相公也延卿笑曰不圗相國肯顧野人相與大笑又曰尚能飲否文僖欣然從之又數杯禮數杯盤無少加扵前而談笑自若日入辭去延卿送之門顧曰老病不能造謝希勿訝也文僖登車茫然自失翊日語僚屬曰此真隠者彼視富貴為何物耶因稱歎累日東都事畧曰錢維演字希聖㓜有俊才父俶使賦逺山詩有髙為天一柱秀作海三峯之句俶異之咸平中獻所為文章擢知制誥惟演少富貴能志扵學文章與楊億劉筠齊名嘗曰學士備顧問不可不該博故其家聚書侔扵秘府又多藏古書畫後以平章事判許州卒謚文僖滕達道錢醇老孫莘老孫巨源同在館中花時各數京師花最盛䖏滕曰皆不足道約旬休日相率同逰三人如其言達道前行出封丘門入一小巷中行數歩至一門陋甚又數歩至大門特壮麗造㕔下馬主人戴道帽衣紫半臂徐歩而出達道素識之因曰今日風埃特甚主人曰此中不覺諸公宜往小㕔至則雜花盛開雕䦨畫楯樓觀甚麗水陸畢陳皆京師所未嘗見又頥指開後堂門坐上已聞樂聲矣莘老時在諒闇中辭之衆遂起去莘老常語人云平生看花只此一䖏滕元發孫覺孫洙别見宋史曰錢藻字醇老眀逸從子㓜孤刻厲為學累官樞宻直學士知開封府司馬温公優㳺洛中不屑世務棄物我一窮通自稱齊物子元豐中秋與樂令子訪親洛汭並轡過韓城抵登封憩峻極下院趨嵩陽造崇福宫至紫極觀尋㑹善寺過轘轅遽達西洛少留廣度寺厯龍門至伊陽訪奉先寺登華嚴閣觀千佛巖躡山徑瞻髙公真堂歩潜溪還保應觀文富二公之廣化寺拜邠陽堂下渉伊水登香山到白公影堂詣黄龕院倚石樓臨八節灘還伊口凡所經逰發為詠歌歸叙之以為逰録士大夫爭𫝊之范蜀公居許下扵所居造大堂以長嘯名之前有荼䕷架髙廣可容數十客每春季花繁盛時燕客其下約曰有飛花墮酒中者為余嚼一大白或語笑諠譁之際微風過之則滿坐無遺者當時號為飛英㑹傳之四逺無不以為美談田承君有廬在亂山中前有竹旁有溪溪畔有大石前後樹以梨棗日與弟穿竹渡溪倦則坐石上或藉以草葛巾草屨吟諷而歸以足遺老而忘憂蘇養直隠京口紹興間與徐師川同召養直不起師川造朝時便道過養直留飲甚歡二公平日對奕徐髙扵蘇是日養直拈一子笑視師川曰今日還須譲老夫下此一著師川有愧色車溪贇上人言嘗與其徒月夜登閣聽江貫道鼔琴貫道信手忘言曲盡其妙扵是據琴而拂彈坐客莫不自失超然得意扵絲桐之表鄧椿畫繼曰江㕘字貫道江南人長扵山水形貌清癯嗜香茶以為生隆茂宗乃畫為據琴圗夏文彦繪圗寳鑑曰僧梵隆字茂宗號無住吴興人善白描人物山水師伯時髙宗極重其畫松江一漁父每棹小舟往来長橋扣舷飲酒酣歌自得紹聖中閩人潘裕自京師調官過吴因就與語且曰先生澡身浴徳今聖明在上盍出而仕父笑曰君子之道或出或䖏吾雖不能棲隠巖穴追園綺之蹤竊慕老氏曲全之義且養志者忘形養形者忘利致道者忘心心形俱忘其視軒冕如糞土耳與子出䖏異趣無與吾事楊誠齋年未七十退休南溪之上老屋一區僅庇風雨聰眀強徤閒退十有六年寜皇初與朱文公同召公獨不起文公與公書云更能不以樂天知命之樂而忘與人同憂之憂毋過扵優㳺毋决扵遁思則區區猶有望扵斯世也公已决扵髙蹈遂自賛曰江風索我吟山月喚我飲醉倒落花前天地為衾枕又云青白不形眼底雌黄不出口中只有一罪不赦唐突明月清風張子偉少不婚宦得刁景純廢圃結茅齋居焉啜菽飲水嘯傲長松脩竹之下十有餘年一日聞湖湘山水之勝杖策獨行登廬阜汎彭蠡絶洞庭南至衡山數年而返所過雖兎迒鳥道人跡所不及必窮搜極覽以盡其意隨輒疏録名之曰山水漫逰紀硯北雜志曰張禕字子偉范陽人寓居京口耶律官努與烏哩特人蕭斡友善幹謂官努曰仕不能致主澤民成大功烈何屑屑為也吾與若居林下以枕簟自随觴詠自樂雖不官無慊焉官努然之時稱二逸遼史曰耶律官努字奚隠林牙斡魯之孫沉厚多學詳扵本朝世系嗜酒好佚初徵為宿直將軍重熈九年以疾去官趙景道隠居燕南教授為業金章宗逰春水過焉聞絃誦聲幸其齋舎見壁間所題詩諷詠久之賞其志趣不凡召至行殿命之官固辭曰臣僻性野逸志在長林豐草金鑣玉絡非所願也況聖眀在上可不容巢由為外臣乎上益竒之賜田千畝復之終身金史曰趙質字景道遼相思温之裔大定末舉進士不第隱居燕城南教授為業葉去文與鄧牧心硯北雜志曰葉朴字去文鄧牧字牧心俱錢塘人鄭徳明遂昌雜録曰鄧牧心葉本山兩先生皆髙節士宋亡隠大滌山鄧先生扵古文尤精覈不茍作俱隠大滌山或數日不食或一食兼人清夜放逰則不避豺虎白晝危坐雖客至亦不起去文扵大徳中忽馳書别親友云將他往且詣鄧言别即端坐而逝後十餘日鄧知去文仙去歎曰葉君出䖏與我同奈何紿我言别吾亦當長往耳乃為去文述墓志又扵燈下取其集讀畢而終趙子固趙孟堅己見脩雅博識酷嗜法書多藏三代以来金石名跡遇其會意輒傾囊易之善作梅竹往往得逃禪石室之妙扵山水尤竒時人珍之襟度瀟爽有六朝諸賢風氣時比之米南宫東西薄逰必挟所有自隨一舟横陳僅留一席為偃息之地隨意左右取之撫摩吟諷至忘寝食所至識不識望之而知為子固書畫船也尤平章嘗微服江浙探諜南士後除行省平章素慕褚雪巘髙節遂昌山人雜録曰杭髙士禇雪巘先生諱伯琇自宋以清苦節行聞雪巘時寓跡黄冠住天慶觀尤單騎從一童至天慶方丈語觀主王管轄曰我欲一見禇髙士觀主言其人孤僻士宰相何故欲見之尤意愈堅時雪巘方閉户讀書觀主扣門雪巘曰主首不㳺廊管轄何為至此觀主以實告雪巘曰某自来不識時貴人何忽有此時平章已拜扵地意雪巘延坐其室雪巘即鎻户偕行廊廡間尤執禮愈恭至前堂雪巘語尤曰三年前有一閬州王髙士嘗留此某非其人也長揖竟出尤顧瞻良久而去天台諸士人物色得吕䖏士吕徽之己見嘗共詣之值䖏士在溪上捕魚諸人告以特来候見之意䖏士隔溪語曰諸公先到舎我得魚當換酒飲諸公也少頃携酒與魚至因共飲盡歡而散明日復躡其蹤則䖏士已徙家矣倪雲林所居有清閟閣幽逈絶塵中有書數千卷皆手自校定經史諸子以及釋老之言盡日成誦古鼎彛名琴陳列左右松桂蘭竹之屬敷紓繚繞其外則髙木脩篁蔚然深秀每雨止風收杖屨自隨逍遥容與詠歌以娱望之者識其為世外人也顧仲瑛己見家富扵貲輕財好客購古法書名畫彛鼎秘翫别築墅扵茜涇西題曰玉山佳䖏日夕與客置酒賦詩其中四方文學之士若河東張翥會稽楊維禎天台柯九思永嘉李孝光方外若張伯雨于彦成琦元璞與一時名士咸主其家其園池之盛圗史之富與夫餼館聲伎並鼎甲一時才情妙麗與諸人略相酬對風流文雅著稱東南語林卷二十
