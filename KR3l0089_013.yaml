body:
  text: 語林卷十三明何良俊撰方正第六下李綱嘗乞骸骨髙祖謾罵曰卿昔為何潘仁長史今顧羞朕尚書耶綱頓首曰潘仁賊也志好殘殺然每諫輒止為其長史無愧陛下功成厚自伐臣言如持水內石何敢久為尚書劉昫唐書曰李綱字文紀觀州蓚人大業末屏居于鄠賊帥何潘仁以為長史義師至京城綱謁見髙祖授丞相司録貞觀四年拜太子少師每吐論發言辭色慷慨有不可奪之志蘇世長己見從獵於髙陵是日大獲陳禽於旌門髙宗顧謂羣臣曰今日畋樂乎蘇對曰陛下畋獵薄廢萬幾不滿十旬未為大樂髙宗色變既而笑曰狂態發耶對曰臣為私計則狂為陛下國計則忠劉仁軌己見既宦達其弟仁相在鄉曲升沈不同遂搆嫌恨與仁軌别籍每於縣祇奉巨課或謂之曰何不與給事同籍五品之家當免差科仁相曰誰能向狗尾底避隂涼楊德幹為萬年令髙宗朝有宦官恃寵放鷂不避人禾稼德幹杖之二十悉拔去鷂頭宦者涕泣袒背以示帝帝曰你情知此漢獰何須犯他百姓張文瓘在禁近同列以堂饌豐餘欲少損文瓘曰此天子所以重樞務待賢才也若不任職當自引避不宜節減以自取名宋祁唐書曰張文瓘字稚圭貝州武城人貞觀初第明經纍官黃門侍郎兼大理卿執法平恕時人比之戴胄則天時南海獻集翠裘珍麗異常后以賜張昌宗狄梁公時入奏事后命梁公與昌宗雙陸則天曰卿二人賭何物梁公對曰賭昌宗毛裘以臣紫絁袍為對則天笑曰此裘價逾千金卿袍安能敵此梁公起曰臣此袍乃大臣朝見奏對之衣昌宗乃嬖幸寵遇之服對臣之袍臣猶怏怏昌宗心赧神沮纍局連北梁公對御就褫其袍拜恩而出至光範門付家奴衣之促馬而去劉昫唐書曰狄仁傑字懷英太原人神功元年拜鸞臺侍郎中宗在房陵仁傑每奏對無不以母子恩情為言后省悟召還中宗帝反正追贈司空武后臨朝薛懷義勢傾當時雖王主皆下之蘇良嗣遇諸朝懷義偃蹇不為禮良嗣大怒使左右牽拽搭面數十武后知曰阿師當向北門出入南衙宰相往來勿犯他劉昫唐書曰蘇艮嗣世長之子髙宗時為周王府司馬守文檢括莫敢有犯深為髙宗所稱則天朝工部尚書武候將軍田仁會宋祁循吏傳曰田仁會雍州長安人永徽中為平州刺史嵗旱自暴以祈雨雨大至郡人歌之誣奏侍御史張仁褘朝野僉載曰張仁禕上元中為吏部員外郎髙宗臨問仁褘惶懼失次韋仁約歷階進曰臣與仁褘連曹頗知事由仁褘懦不能自理若仁會眩惑聖聽致仁褘非常之罪則臣事陛下不盡臣之恨矣請專對其狀詞辨縱橫音旨朗暢髙宗深納之乃釋仁褘大唐新語曰韋仁約在憲司見王公卿相未嘗拜人或勸之答曰雕鶚鷹鸇豈衆禽之偶奈何設拜以狎之後為左丞奏曰陛下為官擇人非其人則闕今不惜美錦令臣製之此陛下知臣之深亦微臣盡命之秋振舉綱目朝廷肅然韋安石為納言日劉昫唐書曰韋安石京兆萬年人周司空孝寬曽孫歷德鄭二州刺史持重少言笑為政清嚴所在人吏畏之久視中遷文昌右丞尋知納言二張引蜀商宋霸子博塞后前劉昫唐書曰張易之白晳美姿容善音律先是易之弟昌宗入侍中禁既而啓天后曰臣兄易之器用過臣兼工合鍊即召見甚恱兄弟俱侍宫中傅粉施朱衣錦繡服承辟陽之寵安石言商等賤類不當戲殿上顧左右引出坐皆失色后以安石辭正改容慰勉鳯閣侍郎陸元方自以為不及退語人曰韋公真宰相劉昫唐書曰陸元方蘇州吳縣人伯父東之以工書知名元方延載初遷鳯閣侍郎則天嘗問以外事對曰臣備位宰臣有大事即奏人間碎務不敢以煩聖覽由是忤旨狄梁公為度支員外郎車駕將幸汾陽宫狄奉使先修供頓并州長史李玄沖以道出妬女祠俗稱有盛衣服車馬過必致雷風之異欲别開路梁公謂曰天子行幸千乘萬騎風伯清塵雨師灑道何妬女之敢害而欲避之玄沖遂止果無他變宋廣平宋璟己見嘗侍宴朝堂時二張皆為列卿朝野僉載曰周張易之為控鶴監昌宗為祕書監廣平階六品在下坐易之素憚廣平剛正妄恱其意虛位揖廣平曰公第一人何乃下坐廣平曰才劣品卑張卿以為第一何也天官侍郎鄭善果謂廣平曰中丞奈何呼五郎為卿大唐新語曰當時朝列呼易之為五郎昌宗為六郎廣平曰以官言之正當為卿以親故當為張五非易之家奴何郎之有大唐新語曰鄭善果性至孝篤慎父城周大將軍討尉遲迥遇害母崔氏甚賢明曉以正道故善果勵已清亷所蒞咸有政績張易之誣魏元忠有不順之言引張説令證之説皇惑迫懼宋璟曰名義至重神道難欺必不可黨邪陷正以求茍免若緣犯顔流貶芬芳多矣或至不測吾必叩閣救子與子同死子須努力萬代瞻仰在此舉也説感其言及入乃保明元忠竟得免死大唐新語曰魏元忠以摧辱二張反為所搆云元忠屬意太子為少年耐久朋則天大怒下獄易之引張説為證説明其枉元忠得免死流嶺南宋廣平自廣州召還玄宗遣內侍楊思朂迎之廣平風度凝逺人莫測其際在塗竟不與思朂交一言思朂自以將軍貴幸訴之於帝帝益嗟重王毛仲有寵於玄宗百官附之一日毛仲嫁女上問何所須毛仲頓首謝曰臣萬事已備但未得客上曰張説源乾曜二人己見輩豈不可召耶對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰誠如聖旨上笑曰朕明日為汝召客明日上謂宰相朕奴毛仲有婚事卿等宜與達官悉詣其第既而日中客未敢舉箸待璟久之方至先執酒西向拜謝飲不盡巵遽稱腹痛而歸劉昫唐書曰王毛仲本髙麗人性識明悟玄宗為臨淄王時常伏侍左右開元中部統羣牧孳息數倍玄宗大恱加位至特進安樂公主恃寵嘗奏請昆明池為湯沐中宗不許劉昫唐書曰安樂公主中宗女也韋后欲寵樹公主為之開府置官屬安樂恃寵驕恣賣官鬻爵勢傾朝廷安樂大役人夫掘其側為定昆池池成中宗韋庶人往宴令公卿已下賦詩黃門侍郎李日知詩曰但願暫思居者逸無使時傳作者勞後睿宗登位謂日知曰朕當時亦不敢言非卿忠正何能爾唐詩紀事曰李日知鄭州人景龍初為相吕太乙為户部員外郎户部與吏部鄰司吏部移牒戶部令牆宇悉樹棘以防令史交通太乙報牒曰眷彼吏部銓總之司當須簡要清通何必設籬種棘省中賞其俊拔大唐新語曰太乙初為御史裏行自負才華而不即真詠院中叢竹以寄意曰擢擢當軒竹青青重嵗寒心貞徒見節籜小未成竿後遷户部員外吳競與劉子玄撰定武后實録敘張昌宗引張説誣證魏元忠事云説已許昌宗賴宋璟激勵苦切故轉禍為忠不然皇嗣且殆後説為相讀之不喜知競所為即從容謬語曰劉生書魏齊公事不少假借奈何競曰子玄已亡不可受誣地下競實書之其草故在聞者歎其直説屢以情蘄改競辭曰徇公之情何名實録卒不改世稱為今之董狐劉昫唐書曰吳競汴州浚儀人勵志勤學博通經史魏元忠朱敬則為相薦其有史才令直史館神龍中修武后實録祕書監薑皎得罪唐詩紀事曰薑皎長安中為尚書奉御明皇在藩邸皎識其有非常度遂委心焉及即位授殿中少監出入卧內開元中為祕書監坐泄禁中語流欽州道死張嘉貞附會權幸請加詔杖俄而皎死劉昫唐書曰張嘉貞蒲州猗氏人弱冠應五經舉纍官并州長史有告其在軍奢僣按驗無狀上將加告者反坐之罪嘉貞奏曰昔天子聽政瞍賦矇誦百工諫庶人謗而後天子酙酌焉今坐此輩是塞言者之路天下之事無由上達特望免此罪以廣謗誦之道帝以嘉貞為忠數月遷中書令後廣州都督裴胄先下獄帝問法當如何嘉貞復援皎例時張説進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱向者薑皎官是三品亦有微功若其有犯應死即殺應流即流不宜庭辱以卒伍待况律有八議勳貴在焉皎事既不可追胄先豈容復濫上然其言嘉貞退謂説曰何言事之深也説曰宰相者時來即為豈能長據若貴臣盡當可杖但恐吾等行當及之此言非為胄先乃為天下士君子也嘉貞有慙色劉昫唐書曰裴胄先絳州聞喜人宰相裴炎從子也官至工部尚書李雍為左拾遺時御史中丞宋璟奏張昌宗兄弟有不順之言請付法曹推斷則天初不應雍在陛下進曰臣觀宋璟之言事關社稷望陛下可其奏則天色稍解始允宋璟所請既出或謂雍曰子名位尚卑若不稱旨禍將不測何為造次如是雍曰不願不狂其名不彰若不如此後代何稱李雍宋璟張昌宗並己見孔著作至撰百家類例品第海內族姓以張燕公為近代新門不入百家之數駙馬張垍是燕公子見著作所撰謂弟埱曰多是漢天下族姓何與伊事而妄為升降埱素與著作善以兄言告之時工部侍郎韋述諳練士族舉朝共推每有商確咸就咨訪著作書初成以呈韋公韋以為可行及聞垍言著作懼禍將追改之以情告韋韋曰孔至休矣大丈夫奮筆將為千載楷則奈何以一言而自動搖有死而已何可改也遂不復改劉昫唐書曰韋述司農𢎞機曽孫篤志文學有家書二千卷童時記覽皆遍父景駿為肥鄉令述從父至任洺州刺史元行沖景駿姑子為時大儒常載書數車自隨述入其書齋忘寢與食行沖引與之談貫穿經史事如指掌探賾奧旨如遇師資試以綴文操牘便就行沖引之同榻曰此吾外家之寶也舉進士入關時述甚少儀形眇小考功宋之問曰韋學士童年有何事業述對曰性好著書有所撰唐春秋三十卷恨未終篇至如詞䇿仰待明試之問曰本求異才果得遷固居史館二十年勒成國史一百一十三卷蕭茂挺為集賢校理李林甫欲一見之穎士方有父喪不時肯詣林甫嘗至一故人舍邀穎士穎士遂往哭門內以待林甫林甫不得已前弔乃去李華作穎士文集序曰蘭陵蕭穎士字茂挺十九進士擢第淮南連帥表為揚州功曹君以文章制度為己任時人咸以此許之及卒門人諡為文元先生冉唐詩紀事曰穎士以拔奬後進為任如李陽冰皇甫陸渭由奬目皆為名士天下推知人稱蕭功曹嘗兄事元德秀而友殷寅顔真卿栁芳陸據李華邵軫趙驊時人語曰殷顔栁陸李蕭邵趙以能全交也李華與齊名世號蕭李常衮當國劉昫唐書曰常衮京兆人文章俊拔當時推重與楊炎同掌綸誥時稱常楊性清直孤潔不妄交遊代宗拜門下侍郎同平章事崔祐甫在中書劉昫唐書曰崔祐甫字貽孫父沔黃門侍郎祐甫性剛直無所容遇事不回遷中書舍人每論事未嘗降屈舍人岑參初掌綸誥屢稱疾不宿直諸人不敢言崔獨以舍人職在樞密不宜讓事於人岑舍人稱疾既久多有離局衮曰此子羸疾日久諸賢豈不能容之崔曰相公若知岑久抱疾本不當遷授今既居此地安可以疾辭王事乎衮默然無以奪唐詩紀事曰岑參南陽人文本之後至德中任宣議郎攝監察御史拾遺裴冕杜甫薦參識度清逺議論雅正佳名早立時輩所仰可備獻替之官李揆己見秉政苗侍中薦元載可大用劉昫唐書曰苗晉卿上黨壺關人世以儒素稱晉卿開元中知吏部選事性謙柔選人有訴訟索好官者雖數千言或聲色甚勵晉卿必含容之略無愠色纍官侍中揆語侍中曰龍章鳯姿之士不可見麞頭鼠目之子乃求官耶竟不肯納載入相除揆祕書監江淮養病十餘年唐書曰元載鳯翔岐山人符唐詩紀事曰載羈旅到京屢陳時務深上旨肅宗擢拜中書以貪吝伏法顔魯公在汝州淮西賊將僣竊問儀注於魯公公答曰老夫耄矣曽掌國禮所記唯諸侯朝覲之儀耳臨以白刃視之晏然李肇國史補曰李希烈陷汝州盧杞建議曰顔真卿四方所信若往諭之可不勞師而定時朱滔王武俊使皆在坐謂希烈曰聞太師名德久矣公欲建大號而太師至求宰相孰先太師者真卿叱曰若等聞顔常山否吾兄也祿山反首舉義師後雖被執詬賊不絶口吾年且八十官太師吾守吾節死而後已張延賞在中書劉昫唐書曰張延賞中書令嘉貞之子博涉經史達於政事苗晉卿見而竒之以女妻焉貞元中拜中書侍郎恃權矜已嫉栁渾守正使人謂之曰相公舊德但節言於廟堂則名位可久渾曰為吾謝張相公栁渾頭可斷舌不可禁卒為所擠續襄陽耆舊傳曰栁渾字夷曠襄陽人天寶初補單父尉纍拜監察御史求外職宰相惜其才留為左補闕裴澥為陜府録事參軍時李汧公李勉己見充觀察始至官屬謁訖令别召裴録事坐與之語且云少頃有燕便請隨判官同赴及燕三召不至公怒召澥讓之曰某忝公之官長以素聞公名兼朝中親友話公美事思接從容故超越禮分面約赴燕遂纍召不來何相忽之甚也澥正色言曰中丞細思之未知誰失必也正名各司其局古人所守其敢忘之中丞府中自有賓僚某走吏也安得同之汧公曰老夫過矣澥退汧公命駕訪之置在賓席趙璘因話録曰澥纍官同州刺史所在有能名憲宗寢疾杜黃裳時為太常卿欲率百官請皇太子監國以語其壻韋執誼執誼曰丈人方得一官寧可復開口議禁中事黃裳勃然曰黃裳受恩三朝豈可以一官見買即拂衣而出朱泚召段秀實己見計事源休姚令言李忠臣李子平皆在秀實戎服與休並坐語至僣位秀實勃然起執休腕奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段吾豈從汝反耶遂擊泚中顙流血衊面李惇在淄青幕屢有規正節度使王衡不能用一日王對諸客别有所問惇曰某前後頗獻愚直大夫不用今復問何為王作色曰李十五好為詆訐惇曰忠言大夫謂之詆訐久住何益請從此辭再拜趨出命駕而去栁元公甚知張尚書正甫劉昫唐書曰栁公綽字起夫性謹重動循禮法屬嵗飢其家雖給而每飯不過一器歲稔復初家甚貧有書千卷不讀非聖之書為文不尚浮靡官檢校左僕射河南節度觀察使元公之子仲郢别見嘗遇張於途去蓋下馬而拜張止之不獲他日張言於元公曰夀郎仲郢小字相逢其謙太過元公作色不應久之張起去元公謂客曰張正甫與公綽往還欲使兒於街中騎馬衝公綽此人亦不足與語張聞而謝過劉昫唐書曰張正甫字踐方南陽人官至檢校兵部尚書仁而端亮蒞官清強居外任所至稱理憲宗在東宫時王紹避太子諱請改名時以為諂李藩曰自古故事由不識體之人敗之不可復正雖紹何誅劉昫唐書曰李藩字叔翰趙郡人少恬淡修檢雅容儀好學元和中為中書侍郎藩為相材能不及裴垍孤峻頗後韋貫之然人物清規亦其流也裴垍在中書有故人自逺來訪裴給恤優厚其人乘間求京府判司裴曰公誠佳士但此官與公不相當不敢以故人之私而隳朝廷紀綱他日有瞎眼宰相憐公者不妨却得劉昫唐書曰裴垍字𢎞中河東聞喜人代李吉甫為中書侍郎年少驟居相位器局峻整雖大寮前輩不敢干以私議者謂垍作相才與時會知無不為于時朝無幸人百度寢理再周遘疾公論惜之鄭珣瑜在中書堂會食俄王叔文至吏白宰相方會食百官例不得見叔文恚叱吏吏入白韋執誼遽起延入閣內珣瑜歎曰吾可以復居此乎命左右取馬歸卧家七日不出自是罷相宋祁唐書曰鄭珣瑜字元伯鄭州滎澤人天寶中退耕陸渾山以養母崔祐甫為相擢左拾遺除河南尹清靜惠下人不敢干以私後為門下侍郎李逢吉當國劉昫唐書曰李逢吉字虛舟隴西人學士李玄道曽孫元和中為門下侍郎憲宗討淮蔡以兵委裴度逢吉密沮之後又構于方之獄代度平章事時國威不振天下延頸俟度再用及為逢吉所擠四海為之側目忌裴晉公裴度己見復相使京兆尹劉棲楚十餘人悉力根却之雖晉公門下賓客皆有去就意他日晉公置酒延客棲楚曲意自解附耳而語崔咸疾棲楚舉酒讓晉公曰丞相乃許所由官囁嚅耳語願上罰爵項安世家説曰今坊市公人謂之所由晉公笑受而飲棲楚不自安趨出坐上壯之宋祁唐書曰崔咸字重易博州博平人元和初鄭餘慶李夷簡表在幕府與均禮入朝為侍御史處正特立風采動一時李公垂李紳己見為李錡掌書記錡逗撓不朝一日召公垂使作疏公垂陽怖栗至不能為字下筆輒塗去盡數紙錡怒罵曰何敢爾不憚死耶公垂對曰生未嘗見金革今得死為幸即注以刃令易紙復然或言許縱能軍中書紳不足用召縱至操書如所欲即囚公垂獄中錡誅或欲以聞公垂謝曰本激於義非市名也乃止韋澳是韋貫之子兄溫與中丞髙元裕友善溫請用澳為御史一日謂澳曰髙二十九持憲綱欲與汝相面汝必得御史澳不答溫曰髙君端士汝不可輕澳曰然恐無呈身御史竟不詣元裕之門宣宗朝户部缺判使韋澳奏對延英宣宗言户部缺判使澳但對以府事上言戶部缺判使者三又問卿意何如澳曰臣近年心力減耗不奈繁劇纍曽陳乞一小鎮聖慈未垂矜允上默然不樂甥栁玭曰舅特承聖知延英奏對恐未得中澳曰吾不為時相所信忽自宸衷委以使務必以吾他歧得之何以自明我意不錯爾須知時事漸不佳是吾徒貪爵位所致爾宜志之後出鎮河陽周祖入京師百官迎謁周祖見馮道猶設拜意道便行推戴道受拜如平時徐語曰侍中此行不易周祖氣沮故禪代之謀稍緩宋太祖時竇儀在翰林忽一日宣入禁中行至屏障間覘見太祖猶衩衣潛身却退中書謂曰官家坐多時請速出見竇曰聖上衩衣必是未知儀來但奏云宣到翰林學士竇儀太祖聞之遂起索衫帶著後方召見五朝名臣言行録曰竇儀字可象薊州人登晉朝進士當金坡遺事曰王著既貶官太祖謂范質曰深嚴之地選慎重之士以處之質言前朝學士惟竇儀清介謹厚然已為尚書難於復召上曰禁中非此人不可當諭朕意令勉赴所職即日再入翰林陶榖為學士日嘗召對太祖褻服御便殿榖望見將進而復却者數四太祖笑曰措大索事分顧左右取袍帶來上束帶竟榖遽趨出宋太宗一日謂宰臣曰朕何如唐太宗衆皆曰陛下堯舜也何太宗可比李文正李昉己見獨無言徐誦白樂天詩曰怨女三千放出宫死囚四百來歸獄太宗曰朕不如也真宗欲以後宫劉氏為貴妃遣使持手札以問李沆己見沆對使者引燭爇手札因附奏曰但道臣沆以為不可其議遂寢張知白守亳亳有豪士修佛廟成知白召穆修作記記成不書士名士以五百金遺修求載名於記修投金庭下促治裝去曰吾寧糊口為旅人終不以匪人汚吾文也東都事略曰張知白字用晦滄州青池人真宗朝參知政事出知亳州天聖二年拜工部尚書平章事在位重名器無毫髮私清約如寒士卒贈中書令諡文節王魏公王旦己見當國時玉清宫初成丁崖相丁謂令大具酒食列幕次以飲食遊者後遊者多詣丁訴玉清飲食官視不謹多薄惡不可食丁至中書言於魏公公不答丁三四言終無所云丁色變問相公何以不答公曰此地不是與人理會饅頭夾子處王魏公至性儉素東封日二府議增飾車服以盛法從諸公令人於公第日詗之一無所為王冀公欽若乃作繡韀送公曰前議恐忘已令為之公使具直置之而不乘冀公怪問其故公曰常所跨者君上所賜非不華也豈可更事奢僣以隳典制王文正作相罕接賓客獨楊大年楊億己見來則對榻卧談文正卒時屬家事一付大年後丁晉公求文正家婚大年令絶之楊大年答契丹書云鄰壤交歡真宗注云朽壤糞壤令大年重改因易為鄰境明日引唐故事不稱職求罷上曰楊億不通商量真有性氣楊大年與王文穆不相得在館中文穆或繼至大年必徑出他處亦然文穆去國日朝士皆有詩大年獨不作文穆辭日奏真廟傳宣令大年作詩大年竟不奉詔宋史曰王欽若字定國臨江新喻人進士甲科纍官門下侍郎卒諡文穆智數過人每朝廷有所興造委曲遷就以中帝意又輕巧敢為矯誕仁宗嘗謂輔臣曰欽若久在政府觀其所為真姦邪也王曽對曰欽若與丁謂林特陳彭年劉承圭時謂五鬼姦邪險偽誠如聖諭真宗將立明肅后令丁謂諭旨於楊大年令作册文丁云此段不憂不富貴大年答曰如此富貴亦不願得楊文公在翰林丁謂初參政事羣公致賀楊語同列曰骰子選爾何多尚哉未幾逃歸陽翟别墅楊文公在翰苑日有新幸近臣意欲扳公入其黨中因間語公曰君子知微知章知柔知剛公正色疾聲答曰小人不恥不仁不畏不義王沂公在閣下日楊文公性詼諧一時僚友無不被其狎侮於沂公獨曰第四廳舍人不敢奉戲富鄭公為樞密使英宗初即位賜大臣永昭陵遺留器物已拜賜又例外獨賜鄭公加千鄭公力辭東朝遣小黃門諭公此微物不足辭雖家人亦以為不害大體屢辭恐違中旨公曰此固微物要是例外也大臣例外受賜不辭若人主例外作事何以止之竟辭不受馮拯在中書日涑水記聞曰馮拯河南人其父為趙韓王守第舍拯小時韓王見而竒之曰此子何不使讀書其父使就學數年舉進士太宗時請立太子謫嶺南真宗即位被用至宰相無文學而性伉直官至侍中孔道輔初拜正言詣馮許謁謝馮曰天子用君作諫官豈宜私謝執政道輔慙伏而退後道輔嘗語人曰如馮公者未足為賢相然求之於今亦未易有儒林公議曰孔道輔自以聖人之後常髙自標置性剛介急於進用或有勸其少通者答曰吾豈姓張姓李者耶聞者多笑之為御史中丞以事被黜知鄆州然非其罪躁忿且甚至胙縣一夕卒於驛舍富鄭公之薨神宗對輔臣悼惜且曰富弼平生強項今志其墓者亦必一強項人卿等試揣之已而自曰方今強項者莫如韓維必維為之五朝名臣言行録曰韓維字持國忠獻公之子篤志好學神宗在潛邸英宗命韓魏公擇宫僚用王陶韓維等皆名儒厚德之士時持國知汝州其弟玉汝在樞密院具聞此語亟遣使報持國曰雖其家以是相囑甚勿許之不然且獲罪先是富氏果以志屬持國持國與玉汝書曰吾平生受富公厚恩恨未有以報今其家見託義無以辭且已許之不可食言因以獲罪所甘心也卒為之初持國年幾四十猶未仕會富公鎮并門以帥幕辟之遂起東都事略曰韓縝字玉汝忠獻公子也官至中書侍郎外事莊重所至以嚴稱雖出入將相而寂無功烈厚自奉養清議非之韓魏公留守北京李稷以國子博士為漕頗慢公公不為較待之甚禮俄潞公代為留守未至揚言云李稷之父絢我門下士也聞稷敢慢魏公必以父死失教至此吾視稷猶子也果不悛將庭訓之公至北京李來謁坐客次久之公著道服出徐語曰而父吾客也只八拜稷不獲已如數拜之東都事略曰徐禧用兵西夏李稷主糧餉永樂城陷闔城俱沒稷贈工部侍郎神宗嘗對章惇稱張安道之美問惇識否惇退以告吕惠卿惠卿明日與安道同行入朝告以上語且曰行當大用矣安道縮鼻不對其夕安道適與客坐惇呵引到門謁入安道使謝曰素不相識不敢受謁惇慙怍而退熙寧初蔡寺丞名天申丞相挺之子也察訪京西挾其父勢妄作威福震動一路河南尹李師中轉運使李南公事之甚恭時司馬溫公判留司御史臺因朝謁應天院天申獨立一班既報班齊溫公呼知班曰引蔡寺丞歸本班知班引天申立監竹木務官富替善之下天申即日行蓋朝位儀注以官為髙下朝謁應天院留臺職也司馬文正公自在臺閣時不送門狀曰不誠之事所不敢為范蜀公范鎮己見有子弟赴官乞書詣見朝貴蜀公不許曰仕官不可廣求人知受恩多則難為立朝范景仁與趙閲道私好不協熙寧中王介甫執政以景仁時為異同數訐之於上且曰陛下問趙抃即知其為人他日上以問閲道閲道對曰鎮是忠臣上問卿何以知其忠對曰嘉祐初仁宗不豫鎮百請立皇嗣以安社稷豈非忠乎既退介甫語閲道曰公不與景仁有隙乎閲道曰不敢以私害公涑水記聞曰至和中范景仁為諫官趙閲道為御史以論陳恭公事有隙王荆公與唐質肅唐介己見同為參政議論未嘗少合荆公雅愛馮道嘗謂其能屈力以安人如諸佛菩薩之行一日於上前語及此事唐曰道為宰相使朝易四姓身事十主豈得為純臣乎荆公曰伊尹五就湯五就桀者正在安人而已豈得非純臣質肅曰有伊尹之志則可荆公為之變色王舒王嗜佛書曾子固欲諷之未有以發嘗一日會於南昌少頃潘延之亦至延之談禪王問所得子固熟視之已而又論人物曰某人可稱子固曰弇用老而逃佛亦可一稱舒王曰子固失言也善學者讀其書唯理之求有合吾心者則樵牧之言猶不可廢言而無理周孔所不敢從子固笑曰前言苐戲之耳羅湖野録曰清逸居士潘興嗣字延之初調德化縣尉同郡許瑊拜江州守潘往見之瑊不為禮遂懷刺歸竟不之官問道於黃龍南禪師獲其印可嘗曰我清世之逸民故自號焉孫少述與王荆公最厚荆公當國數年不復相聞及荆公再罷相歸過髙沙少述適在亟往造之相見惟勞苦及弔元澤之喪兩公皆自忘其窮達遂留荆公置酒共飯劇談經學抵暮乃散荆公曰退即解舟無由再見少述曰如此更不奉謝矣悵悵各有惜别之色人然後知兩公未易測也老學菴筆記曰孫少述字正之與荆公最厚公别少述詩云應須一曲千回首西去論心有幾人又云子今去此來何時後有不可誰余規其相與如此及公當國數年不相聞人謂二公之交遂絶王荆公初參大政一日因閲晏元獻小詞荆公曰為宰相何詎作詞平甫曰彼亦偶然自喜而為爾顧其事業亦不止此時吕惠卿為館職亦在坐遽曰為政必先放鄭聲况自為之乎平甫正色曰放鄭聲不若逺佞人吕大慚涑水記聞曰王安國常非其兄所為官西京國子教授任滿至京上以介甫故召上殿時人以為必除侍講上問以其兄秉政物論如何對曰但恨聚斂太急知人不明耳上默然不恱由是别無恩命安國嘗力諌其兄以天下恟恟不樂新法恐為家禍介甫不聽安國哭於影堂曰吾家滅門矣又責曾布以誤惑丞相更變法令布曰足下人之子弟朝廷變法何預足下事安國勃然怒曰丞相吾兄也丞相之父即吾父也丞相殺身破家僇及先人發握邱壠豈得不預我事也吕惠卿之謫詞頭始下劉貢父當草制東坡呼曰貢父平生作劊子今日才斬人也貢父引疾謁告東坡一揮而就不日傳寫都下紙為之貴曲洧舊聞曰紹興初惠卿牽復知江陵到任謝上表云顧惟妄論何禆當日之朝廷徒使煩言有黷在天之君父或曰觀此一聨其用心憸愎如此使其得志必殺二蘇無疑矣蓋當時臺諌論列多子由章疏而謫詞東坡當筆也章惇被謫錢協草詞云硜硜無大臣之體鞅鞅非少主之臣章甚銜之紹聖初召拜首台翰林曾子宣布草麻洎庭宣有赤舄几几南山巖巖之語時士大夫語云今則几几巖巖奈硜硜鞅鞅乎未幾錢自吏部尚書責知池州章子厚在政府一日李邦直欲復唐巾裹子厚曰未消爭競只煩公令嗣帶來略看蘇子由語張文潛曰廟堂之上謔語肆行在下者安得不風靡范淳夫五朝名臣言行録曰范祖禹字淳夫成都人事神宗哲宗為太史著唐鑑嘗語李方叔云宋史文苑傳曰李豸字方叔其先自鄆徙華豸六嵗而孤能自奮立以學問稱嘗以文謁蘇軾於黃州軾謂其筆墨瀾翻有飛砂走石之勢拊其背曰子之才萬人敵也李文正李昉己見有言士人當使王公聞名多而識面少此最名言蓋寧使王公訝其不來無使王公厭其不去髙宗在徽宗服中用白木椅子錢大主入覲見之曰此檀香椅子耶張婕妤掩口笑曰禁中用胭脂皂策多相公已有語更敢用檀香作椅子時趙鼎張浚作相宋史曰張浚字德逺漢州綿竹人紹興中總中外之政天子方厲精克已戒飭宫庭內侍無敢越度事無巨細必以咨浚趙鼎在潮五年杜門謝客時事不挂口及移吉陽軍有謝上表曰白首何歸悵餘生之無幾丹心未泯誓九死以不移秦檜見之曰此老倔強猶昔宋史曰趙鼎字元鎮解州聞喜人紹興中至宰相秦檜畏其逼出知泉州自泉州歸復上書言時政檜忌其復用諷次翁論其嘗受偽命乾沒都督府錢十七萬緡謫官興化軍論者猶不已責清逺軍節度副使潮州安置史彌逺拜相陳晦草制用昆命元龜語倪文節歎曰董賢為大司馬册文有允執厥中一語蕭咸以為堯禪舜之文長老見之莫不心懼今制詞所引舜禹揖遜事也天下有如蕭咸者讀之得不大駭乎乃上省牘請貼改麻制詔下分析彌逺除晦殿中侍御史即劾文節藩臣僣論麻制鐫職而罷宋史曰倪思字正甫湖州歸安人中博學宏詞科纍遷著作郎兼翰林權直光宗即位典册與尤袤對掌故事行三制並宣學士上欲試思一夕併草除公師四制訓詞精敏在廷誦歎金人來取趙彬等三十人家屬詔歸之時洪晧曰昔韓起謁環于鄭鄭小國也能引義不與金既限淮官屬皆吳人宜留不遣蓋慮知其虛實也彼方困於蒙古姑示強以嘗中國若遽從之謂秦無人益輕我矣檜變色曰公無謂秦無人宋史曰洪皓字光弼番昜人少有竒節慷慨有經略四方志假禮部尚書為大金通問使尼堪迫往劉豫皓不從流遞冷山烏舍鋭意南侵曰孰謂海大我力可乾但不能使天地相拍爾皓曰兵猶火也弗戢將自焚自古無四十年用兵不止者又數言所以來為兩國事既不受使乃令深入教小兒非古者待使之禮烏舍發怒曰汝作和事官而口硬如許謂我不能殺汝耶皓曰自分當死願大國無受殺行人之名願投之水以墜淵為名可也烏舍義之而止元兵大入賈似道當國以去要君時度宗初即位呼為師相至涕泣拜留之江萬里時為參政以身掖帝云自古無此君臣禮陛下不可拜似道不可復言去似道不知所為下殿舉笏謝萬里曰微公似道幾為千古罪人宋史曰江萬里字子逺都昌人少神雋有鋒穎入太學有文聲理宗在潛邸嘗書其姓名几硯間召試館職遷右正言為侍御史器望清峻論議風采傾動一時帝眷注尤厚度宗朝官至參知政事至元中程文海薦宗臣二十三人以謝枋得為首時行省奉詔起之執手相勞勉枋得謝曰上有堯舜下有巢由枋得名姓不祥不敢赴詔宋史曰謝枋得字君直信州弋陽人讀書五行俱下一覽終身不忘寶祐中對䇿極詆丞相董槐與宦官董宋臣中乙科官至權工部侍郎宋亡見福建行省參政魏天祐傲岸不為禮與之言不對天祐怒強之而北至京問謝太后櫕所及瀛國所在再拜慟哭遷憫忠寺見壁間曹娥碑泣曰小女子猶耳吾豈不汝若哉留夢炎使醫持藥雜米飲進之枋得曰吾欲死汝乃欲生我耶棄之於地不食而死呼沙呼弒衛紹王立宣宗一時朝臣皆言衛王失道天命絶之呼沙呼無罪且有推戴之功獨張行信抗章言之不報舉朝遂以為諱後史官謂賈益謙經事衛王宜知其事時益謙居鄭州乃遣編修一人就鄭訪之益謙慷慨言曰知衛王莫如我然我聞海陵被弒大定間禁近能暴海陵蟄惡者輒得美仕故當時史官多所附會衛王為人勤儉慎惜名器較其行事中材不及吾唯知此而已設欲飾吾言以實其罪吾亦何惜餘年金史曰賈益謙字彥亨沃州人大定中歷仕州郡以能稱纍官尚書左丞亷希憲嘗有疾帝纍遣醫診視醫言須用沙糖作飲北土糖最艱得家人求於外阿哈瑪特與二斤且致密意希憲却之曰使此物果能活人吾終不以姦人所與求活也元史曰亷希憲字善甫博囉哈雅子也幼魁偉舉止異凡兒篤好經史手不釋卷一日方讀孟子聞召急懷以進世祖問其説遂以性善義利仁暴之旨為對世祖嘉之目曰亷孟子由是知名元世祖一日命亷希憲受戒於國師對曰臣已受孔子戒上曰汝孔子亦有戒耶希憲曰為臣當忠為子當孝孔子之戒如是而已上稱善賈居貞為左司郎中劉秉忠奏除參知政事居貞辭曰他日必有由郎官援例求執政者將何以處之執不肯拜元史曰賈居貞字仲明真定獲鹿人十五汴京破奉母居天平世祖知其賢俾監築上都城授左司郎中從帝北征每陳説資治通鑑雖軍中未嘗廢書一日帝問郎俸幾何居貞以數對帝謂太薄敕增之居貞辭曰品秩宜然不可以臣而紊制初迎帝師至京有旨令朝臣一品以下皆乘白馬郊迎大臣俯伏進觴帝師不為動富珠哩翀時為國子祭酒舉觴立進曰帝師釋迦之徒天下僧人師也余孔子之徒天下儒人師也請各不為禮帝師笑而起舉觴卒飲衆為之栗然趙承旨趙孟俯己見初至京會詔集百官於刑部議法衆欲計至元鈔二百貫贓滿者死承旨抗言其非或以承旨年少初自南方來譏國法不便意頗不平責承旨曰今朝廷行至元鈔故犯法者以是計贓論罪汝以為非豈欲阻格至元鈔耶承旨曰法者人命所係議有輕重則人不得其死孟俯奉詔與議不敢不言今中統鈔虛故改至元鈔謂至元鈔終無虛時豈有是理公不揆於理欲以勢相陵可乎其人有愧色元史承旨議曰始造鈔時以銀為本虛實相權今二十年間輕重相去至數十倍故改中統為至元又二十年後至元必復如中統使民計鈔抵法疑於太重古者以米絹民生所須謂之二實銀錢與二物相權謂之二虛四者為直雖升降有時終不大相逺也以絹計贓最為適中况鈔乃宋時所創施於邊郡金人襲而用之皆出於不得已乃欲以此斷人死命似不足深取也王虎臣言平江路總管趙全不法世祖命虎臣往按葉李執奏不宜遣虎臣帝不聽趙承旨進曰趙全固當問然虎臣前守此郡多強買人田縱賓客為姦利全數與爭虎臣怨之虎臣往必將陷全事縱得實人亦不能無疑帝悟乃遣他使遂昌山人雜録曰吳守趙全繼除杭吳民泣送不忍捨時浙省以宗室大臣鎮之待憲臣如司屬全不勝折辱竟卒於杭時人擬以趙廣漢世祖嘗與趙承旨共論葉李留夢炎優劣承旨退語奉御徹爾曰帝論賈似道誤國責留夢炎不言僧格罪甚於似道而我等不言他日何以辭其責然我疏逺之臣言必不聽侍臣中讀書知義理慷慨有大節又為上所親信無踰公者夫捐一旦之命為萬姓除殘賊仁者之事也公必勉之既而徹爾至帝前數僧格罪惡帝怒命衛士批其頰血涌口鼻委頓地上少間復呼而問之對如初時大臣亦有繼言者帝遂按誅僧格罷尚書省大臣多以罪去元史曰前史官楊載稱孟俯之才頗為書畫所掩知其書畫者不知其文章知其文章者不知其經濟之學人以為知言云吕思誠為浙西亷訪僉事時南臺御史大夫達實特穆爾與江浙省臣有隙嗾思誠劾之思誠曰吾為天子耳目不為臺臣鷹犬也不聽元史曰吕思誠字仲實平定州人母馮氏夢一丈夫趨而揖曰我文昌星也寤而生思誠目有神光見者異之及長從蕭㪺學治經試國子伴讀纍官國子祭酒中書左丞吾子行吾衍己見遇人巧宦善富如蟲蛆臭腐將噬染已避去唯恐不速張士誠據有吳中江南名士多往依之所不可致者唯楊亷夫一人一日聞其來吳使人要於路亷夫不得已乃一至賓賢館時元主方以龍衣御酒賜士誠士誠聞亷夫至甚喜即命飲以御酒酒未半亷夫作詩曰山中歲歲烽煙起海上年年御酒來如此烽煙如此酒老夫懷抱幾時開士誠得詩知亷夫不可屈不敢強也張士誠弟士信聞倪元鎮善畫使人持絹侑以重幣欲求其筆元鎮怒曰倪元鎮不能為王門畫師即裂去其絹語林卷十三
