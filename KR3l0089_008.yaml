body:
  text: 語林卷八明何良俊撰文學第四中宋文帝嘗問慧觀頓悟之義誰復習之釋惠皎髙僧𫝊曰慧觀清河人姓崔十嵗便以博見馳名弱年出家㳺方廬山諮禀惠逺風神秀雅思入𤣥㣲答云有生公弟子道猷髙僧𫝊曰道猷初為生公弟子師亡後見新出勝鬘經歎曰先師昔義闇與經同因註勝鬘以翌宣遺訓即勑臨川郡發遣到京既至延入宫内大集義僧命猷伸述頓悟時競辯之徒關責互起猷既積思叅𤣥又宗源有本乘機挫銳徃必摧鋒帝撫几稱快髙僧𫝊曰道生既潜思日久徹悟言外廼喟然歎曰夫象以盡意得意則象忘言以詮理入理則言息自經典東流譯人重阻多守滯文鮮見𤣥義若志筌取魚始可以言道矣於是校閱真俗研思因果廼言善不受報頓悟成佛又著二諦論因語諸人曰生公孤情絶照猷公直轡獨上可謂克明師匠無忝徽音王令明王惠已見夷簡恬曠不妄交遊門無雜事陳郡謝宣逺才辯有風氣王儉七志曰謝瞻字宣逺陳郡人㓜能屬文宋黄門郎㓜童𫝊曰謝瞻㓜而聰悟五嵗能屬文通𤣥理其群從宣明謝晦已見阿多謝曜小字已見亦自雋上嘗同造令明談義諸謝言論蜂起文史間發令明時相酬對言清理逺宣逺等慙負而退齊竟陵王蕭子良已見精信釋教而范子真盛稱無佛南史曰范縝字子真南鄉舞隂人晉安北將軍汪六世孫祖璩之中書郎父濛早卒縝博通經術尤精三禮官至鄱陽内史竟陵曰君不信因果世間何得有富貴何得有貧賤范答曰凡人之生譬如一𣗳花同發一枝俱開一蔕隨風而墮自有拂簾幌墜於茵席之上自有關籬墻落於溷糞之側貴賤雖復殊塗因果竟在何處何子季與周彦倫同時二人精信佛法南史曰何𦙍字子季廬江灊人祖尚之中書令父鑠宋宜都太守𦙍八嵗居憂毁若成人及長輕薄不覊晚乃折節好學師事劉瓛受易及禮記毛詩入鍾山定林寺聴内典其業皆通而縦情誕節時人未之知也唯瓛與周顒深器異之仕齊為建安太守永元中徴太子詹事梁徴領軍司馬並不就子季别立精廬都無妻妾文惠太子嘗問彥倫卿精進何如何𦙍彦倫答曰三塗八難共所未免然各有其累太子問所累云何曰周妻何肉南史曰𦙍侈於味食必方丈後稍欲去其甚者猶食白魚䱉脯糖蟹嘗食蚶蠣使門人議之學生鍾岏曰䱉之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懐如怛至於車螯蚶蠣眉目内闕慙混沌之奇獷殼外緘非金人之慎不悴不榮曾草木之不若無馨無臭與瓦礫其何算故宜長充庖厨永為口實竟陵王見岏議大怒汝南周顒與𦙍書勸令食菜曰變之大者莫過死生死生之所重無逾性命性命之與彼極切滋味之在我可賖若云三世理誣則幸矣良快如使此道果然而受形未息一徃一來生死常事則傷心之慘行亦自及丈人於血氣之𩔖雖不身踐至於晨鳬夜鯉不能不取備屠門財貝之經盜手猶為㢘士所棄生性之一啟鸞刀寧復慈心所忍騶虞雖饑非自死之草不食聞其風者豈不使人多愧丈人得此有素聊復片言發起耳𦙍末年遂絶血味梁武帝大𢎞佛教親自講說昭明太子亦崇信三寳遍覧衆經乃於宫内別立慧義殿專為法集之所招引名僧講論不輟太子自立三諦法身義並有深致普通元年四月甘露降于慧義殿士庶皆以為至徳所感昭明集有令㫖解二諦義曰二諦理實深𤣥自非虚懐無以適其𢎞逺明道之方其由非一舉要論之不出境智或時以境明義或時以智顯行至於二諦即是就境明義若迷其方三有不絶若達其智萬累斯遣所言二諦者一是真諦一名俗諦真諦亦名第一義諦俗諦亦名世諦真諦俗諦以定體立名第一義諦世諦以褒貶立目若以次第言說應云一真諦二俗諦一與二合數則為三非直數過於二亦名有前後於義非便真既不因俗而有俗亦不由真而生正可得言一真一俗真者是實義即是平等更無異法能為雜間俗者即是集義此法得生浮偽起作第一義者就無生境中別立美名言此法最勝最妙無能及者世者以隔別為義生滅流動無有住相湼槃經言出世人所知名第一義諦世人所知名為世諦此即文證褒貶之理二諦立名差别不同真諦世等以一義說第一義諦以二義說正言此理徳既第一義亦第一世既浮偽更無有義所以但立世名諦者以審實為義真諦審實是真俗諦審實是俗真諦離有離無俗諦即有即無即有即無斯是假名離有離無此為中道真是中道以不生為體俗既假名以生法為體又與南澗寺慧超栖𤣥寺曇宗等問答二百餘條文多不録何散騎南史曰何子朗字世明東海郯人與宗人遜及思澄俱擅文名卒於國山令早有才思工於清言周昇逸每與共談服其精理南史曰周捨字昇逸汝南安成人周顒子也長而博學尤精義理官至侍中太子詹事陶貞白㓜有異操年十嵗得葛洪神仙𫝊晝夜研尋便有養生之志謂人曰仰青雲覩白日不覺為逺矣南史曰陶𢎞景字通明丹陽秣陵人高其志節累辭徴命隐于句容之句曲山中山立舘自號華陽隐居人間書札以隐居代名卒謚貞白先生陶隐居圓通慎約出處冥㑹心如明鏡遇物便了言無煩舛有亦輙覺徐常侍崇信釋教經論多所精解後主在東宫令常侍講大品經義學名僧自逺雲集每講筵商較四坐莫能與抗南史曰徐陵字孝穆東海郯人徐摛子也母臧氏夢五色雲化為鳳集左肩上已而誕陵十三通老莊義及長博渉史籍美文辭官至中書監領太子詹事蔵法師於開善寺講說門徒數百皆是勝流時周𢎞正年少未知名著紅褌錦絞髻踞門而聴衆人蔑之弗視俄而乘間進難一坐盡傾法師疑非世人覘知是𢎞正大相賞狎南史曰周𢎞正字思行父寳始梁司徒祭酒𢎞正㓜孤及弟𢎞讓𢎞直為伯父捨所飬十嵗通老子周易官至國子祭酒弟𢎞直字思方㓜聰敏仕梁為湘東王記室叅軍周𢎞正甚為伯父捨所重每與談理輙異之曰觀汝精神頴悟清理警發後世知名當出吾右張叅軍少有思理南史曰張譏字直言清河武城人祖僧寳梁太子洗馬父仲恱梁尚書祠部郎譏㓜聰俊有思理十四通孝經論語篤好𤣥言官始安王記室叅軍為國子助教時周𢎞正在國學發周易題𢎞正第四弟𢎞直亦在講席叅軍與𢎞正論義𢎞正理小屈𢎞直危坐厲聲助其申理叅軍正色曰今日義集辯正名理雖知兄弟急難四公不得有助𢎞正語人曰吾每登坐見張譏在席使人懔然馬要理義學精解梁邵陵王綸為南徐州引為學士時邵陵自講大品令要理講維摩老子周易同日發題道俗聴者二千人邵陵欲極觀優劣乃謂衆曰與馬學士論義必使屈伏不得空立主客於是數家學者各起問端要理依次剖判開其宗㫖然後枝分流别轉變無窮聴者無不稱善梁書曰馬樞字要理扶風郿人博極經史尤善佛經及周易老子義隐于茅山不應辟命每王公餽餉率十分受一樞少屬亂離凡所居處盗賊不入依托者常數百家目精洞黄能視暗中物有白鷰一雙巢其庭樹馴狎櫩廡時至几案春來秋去幾三十年撰道覺論行于世隋高祖嘗令沈重與辛彥之論義北史曰沈重吳興人隋時稱為碩學重不能抗避席謝曰辛所謂金城湯池無可攻之勢隋書曰辛彦之隴西狄道人祖世叙魏凉州刺史父靈輔周渭州刺史彦之九嵗而孤不交非𩔖博渉經史與牛𢎞同志好學後入闗家京兆周太祖見而器之引為中外府禮曹賜以衣馬珠玉時國家草創百度伊始朝貴多出武人修定儀注唯彥之而已入隋拜禮部尚書與牛𢎞撰新禮陶徴士少有高趣昭明太子陶徴士别𫝊曰陶淵明字元亮或云潜字淵明潯陽柴桑人曾祖侃晉大司馬淵明博學善屬文頴脫不羣任真自得自以曾祖晉世宰輔耻屈身後代自宋高祖王業漸隆不復肯仕世號靖節先生宅邊有五栁樹嘗著五栁先生𫝊以自况談者以為皆其胷懐本趣也陶集五柳先生𫝊曰先生不知何許人也亦不詳其姓字宅邊有五柳樹因以為號焉閒靖少言不慕榮利好讀書不求甚解每有意㑹便欣然忘食性嗜酒家貧不能常得親舊或置酒招之造飲輙盡期在必醉既醉而退曾不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也常著文章自娛頗示己志忘懐得失以此自終賛曰黔婁有言不戚戚於貧賤不汲汲於富貴其言兹若人之儔乎酣觴賦詩以樂其志無懐氏之民歟葛天氏之民歟謝康樂以疾東歸沈約宋書曰謝靈運陳郡人襲封康樂侯博覧羣書文章之美江左莫逮辟大司馬叅軍後為臨川太守為有司所紏徙封廣州遂令趙欽等要合鄉里徤兒於三江口墓取有司奏依法收罸詔於廣州棄市與族弟惠連東海何長瑜潁川荀雍太山羊璿之以文章賞㑹共為山澤之遊時人謂為康樂四友宋書曰謝惠連陳郡陽夏人㓜而聰敏十嵗能屬文族兄靈運深加賞之本州辟主簿不就後為司徒彭城王法曹年二十七卒璠南史曰荀雍宇道雍官至貟外散騎郎羊璿之字曜臨川内史為司徒竟陵王誕所幸愛誕敗坐誅何長瑜文才之美亞於惠連雍璿之皆不及也臨川王招集文士長瑜自其國侍郎至西平記室叅軍宋元嘉中南平王獻赤鸚鵡普詔群臣為賦太子左衛率𡊮淑文冠當時賦畢賫示謝希逸謝莊已見時希逸賦亦竟𡊮見而嘆曰江左無我卿當獨秀我若無卿亦一時之傑也遂隐其賦謝惠連十嵗能屬文族兄康樂賞愛之嘗曰每有篇章對惠連輒得佳語嘗於永嘉西堂思詩竟日不就忽夢見惠連即得池塘生春草園柳變鳴禽曰此語有神助非吾所及也顔延之嘗問鮑明逺已詩與謝康樂優劣鮑曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼沈約宋書曰鮑昭字明逺文辭贍逸世祖時為中書舎人上好為文章自謂物莫能及昭悟其㫖為文多鄙言累句當時咸謂昭才盡實不然也臨海王子瑱為荆州昭為前軍掌書記子瑱敗為亂兵所殺宋孝武殷貴妃亡丘長史獻挽詩三首有曰雲横廣堦闇霜深高殿寒帝摘句嗟賞南史曰丘靈鞠吳興烏程人祖系祕書監父道真䕶軍長史靈鞠少好學善屬文州辟從事卒官車騎長史鮑明逺文辭贍逸當世推美初入臨川王義慶衛軍府猶未見知欲貢詩言志人止之曰卿名位尚卑不可輕忤大王明逺勃然曰千載上有英才異士沉没而不聞者安可數哉丈夫豈可遂藴智能使蘭艾不辨終日碌碌與燕雀相隨乎於是奏詩臨川奇之賜帛二十匹張思光作海賦成文辭詭激以示鎮軍將軍徐凱之徐曰公此賦實超𤣥虛王儉七志曰木華字𤣥虛廣川人文章雋麗為楊駿府主簿傅亮文章志曰廣川木𤣥虚為海賦文章雋麗足繼前良但恨不道塩耳思光即求筆益之曰漉沙搆白熬波出素積雪中春飛霜暑露謝超宗坐康樂事徙嶺南南史曰謝超宗謝鳳子靈運之孫也元嘉末得還與惠休道人來徃沈約宋書曰沙門惠休善屬文徐湛之與之甚厚世祖命使還俗本姓湯位至揚州從事好學有文辭宋孝武用為寵子新安王子鸞常侍時王母殷淑妃卒超宗作誄奏之上大嗟賞曰超宗殊有鳳毛齊世祖問王僕射王儉已見當今誰能為五言詩王答曰謝朏得父膏腴南史曰謝朏字敬冲謝莊子㓜聰慧十嵗能屬文仕至中書監司徒衛將軍江淹有意劉璠梁典曰江淹字文通濟陽人六嵗能屬詩及長愛奇尚異宋桂陽王舉秀才齊興為豫章王記室天監中為金紫光禄大夫江文通以文章顯著後罷宣城郡歸泊船禪靈寺渚夜夢一人自稱張景陽謂曰前寄一疋錦在卿處今可見還江探懐中得數尺與之此人大恚曰那得裁割都盡顧見丘遲謂曰餘此數尺既無所用當遂遺君江自爾文思頓减江文通嘗宿於冶亭夢見一丈人自稱郭璞呼文通曰吾有筆在卿處多年可以見還江探懐中得五色筆一以授之爾後為詩絶無美句時謂之才盡何叅軍與族弟水部何遜别見散騎何子朗已見俱擅文名時人為之語曰東海三何子朗最多叅軍曰外言殊不爾故當推遜南史曰何思澄字元静東海郯人父敬叔齊長城令思澄少勤學工文為㳺廬山詩沈約見之大相稱賞自以為弗建仕至湘東王録事叅軍王仲寳極重任彥升每見其文必三復殷勤以為當時無軰嘗語人曰自傅季友以來始復見於任子何散騎嘗為敗冢賦以擬莊周馬捶其文甚工范彥龍梁書曰范雲字彦龍南鄉武隂人晉平北將軍汪六世孫機警有識善屬文仕齊為竟陵王文學至梁為散騎侍郎大重何仲言梁書曰何遜字仲言東海郯人曾祖承天宋御史中丞遜八嵗能賦詩文章與劉孝綽並見重於世世謂之何劉官至尚書水部郎與結忘年交好一文一咏范輙嗟頌嘗謂所親曰頃觀文人質則過俗麗則傷懦其能含清濁中今古見之何生矣謝𤣥暉長於五言詩沈休文見之曰二百年來無此詩也永明末盛為文章吳興沈休文陳郡謝𤣥暉瑯邪王元長以氣𩔖相推轂汝南周彥倫善識聲為文皆用宫商以平上去入為四聲以此制韻不可增减謂之永明體沈約謝朓周顒已見有蕭子顯齊書曰王融字元長瑯琊人神明警惠博渉文才為中書郎帝疾融先欲立竟陵王子良及即位下廷尉獄賜死柳文暢嘗和髙祖登景陽樓詩曰太液滄波起長楊高𣗳秋翠華承漢逺雕輦逐風遊當世𫝊稱咸以為佳柳吳興嘗為詩曰亭臯木葉下隴首秋雲飛王元長嘆以為佳因書齋壁昭明太子寛和容衆喜愠不形於色引納才雋上流賞愛無倦恒自討論篇籍與學士商確古今繼以文章著述時東宫有書三萬卷名才並集文學之盛晉宋以來未之有也天監中張士簡張率已見奏待詔賦帝手勑曰相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣王詹事工為詩沈休文甚知之南史曰王筠字元禮一字徳柔僧䖍之孫㓜警悟七嵗能屬文十六為芍藥賦其辭甚美及長清静好學與從兄泰齊名歴秘書監太子詹事謂其伯父次道王志已見曰賢弟子文章之美可謂後來獨歩昔謝𤣥暉嘗見語云好詩圓美流轉如彈丸近見筠數首方知此言為實南史曰筠性𢎞厚不以藝能髙人而少擅才名與劉孝綽見重當時其自序云余少好抄書老而彌篤雖遇見瞥觀皆即䟽記後重省覧懽興彌深習與性成不覺筆倦自年十三四建武乙亥至梁大同六年四十載矣㓜年讀五經皆七八十遍愛左氏春秋吟諷常為口實廣畧去取凡三過五抄餘經及周官儀禮國語爾雅山海經本草並再抄子史諸集皆一遍未嘗倩人並躬自抄録大小百餘卷不足𫝊之好事盖以備遺忘而已沈尚書製郊居賦構思積時猶未都畢要王詹事示其草王讀至雌霓五激反連踡尚書曰僕嘗恐人呼作霓五鷄反次至墜石磓星及冰縣塪而帶坻王皆擊節賛賞尚書曰知音者希真賞殆絶所以相邀正此數句耳沈尚書於郊居造齋閣成王詹事為著草木十詠書之于壁皆直寫文辭不加篇目尚書語人曰此詩指物呈形無假題署王文海在㑹稽日㑹稽境有雲門天柱山王常出遊累月不返至若耶溪賦詩曰蟬􅀈林逾静鳥鳴山更幽當時以為文外獨絶南史曰王藉字文海瑯琊人祖逺光禄勲父僧祐黄門郎籍好學有才氣為詩慕謝靈運至其合也殆無愧色時人咸謂康樂之有王籍如仲尼之有丘明老聃之有莊周天監中為湘東王諮議叅軍陳郡𡊮嘏自重其文常語人曰我詩應湏大材迮之不爾飛去蕭子顯著鴻序賦成南齊書曰蕭子顯字景陽豫章文獻王嶷子也身長八尺狀貌甚雅好學工文仕梁為吳興太守贈中書令以示沈休文休文曰可謂得明道之高致盖幽通之流也簫子顯自序曰余為邵陵王友逺思前比即楚之唐宋梁之嚴鄒追尋平生頗好辭藻雖在名無成求心已足若乃登高目極臨水送歸風動春朝月明秋夜早鴈初鸎開花落葉有來斯應每不能已且賈傅崔馬邯鄲繆路之徒並以文章顯所以屢上歌頌天監六年預九日宴稠人廣坐獨受㫖云今雲物甚美卿將不斐然賦詩詩成降㫖曰可謂才子余退謂人曰一顧之恩非望而至遂方賈誼何如哉每有製作特寡思功湏其自來不以力搆少來所為詩賦則鴻序一作體兼衆製文備多方頗為好事所傳故虛聲易逺傅茂逺傅昭已見􅊩官清静朝無請謁終日端居以書記為樂博極古今尤善人物魏晉以來官宦簿閥姻通内外舉而論之無所遺失世稱學府劉孝標少未開悟晩更厲精嘗苦所見不博聞有異書必徃祈借清河崔慰祖謂為書滛劉孝標自序曰峻字孝標平原人生於秣陵縣朞月歸故鄉八嵗遇桑梓顛覆身充僕圉永明四年逃還京師後為崔豫州刑獄叅軍天監中詔掌石渠閣以病乞骸骨隐東陽金華山余嘗自比馮敬通而有同之者三異之者四何則敬通雄才冠世志剛金石余雖不及之而節亮慷慨此一同也敬通逢中興明君而終不試用余逢命世英主亦擯斥當年此二同也敬通有忌妻至於身操井臼余有悍室亦令家道轗軻此三同也敬通當更始世手握兵符躍馬肉食余自少迄長戚戚無懽此一異也敬通有子仲文宦成名立余禍同伯道永無血𦙍此二異也敬通旅力剛强老而益壯余有犬馬之疾溘死無時此三異也敬通雖芝殘蕙焚終填溝壑而為名賢所慕其風流郁烈芬芳久而彌盛余聲塵寂寞世不吾知魂魄一去將同秋草此四異也所以力自為序遺之好事云徐衛率文體綺麗春坊盡學之號為宫體變動一時高祖召見欲加責譲既至應對明敏髙祖意釋因共商略經史次及百家雜說末論釋典衛率參校詳雅辭辯縱横高祖深相嘆異更被殊寵三國典畧曰徐摛字士秀東海剡人散騎常侍超之子文好新率不拘舊體梁武帝謂周捨曰我欲舉一人文學俱長兼有徳行者令與晉安逰處捨曰臣外弟徐摛形質陋小而堪此𨕖帝曰有仲宣之才亦不簡其貌也乃以為侍讀文體既别春坊盡學之謂之宫體杜輔𤣥義學精深兼綜佛老魏時嘗引見於九龍殿帝問經中佛性法性為一為異輔𤣥對曰佛性法性止是一理詔問佛性既非法性何得為一對曰性無不在故不說二詔問說者皆言法性寛佛性狹寛狹既别非二如何輔𤣥曰在寛成寛在狹成狹若論性體非寛非狹詔問既言成寛成狹何得非寛非狹若定是狹亦不能成寛對曰若定是寛則不能為狹若定是狹亦不能為寛以非寛狹故能成寛狹寛狹所成雖異能成恒一上恱稱善魏収魏書曰杜弼字輔𤣥中山曲陽人㓜聰敏及長好名理探味𤣥宗在軍恒帶經行注老子道徳經表上之又注莊子惠施篇并易上下繫名曰新注義苑行于世官至膠州刺史魏帝集名僧於顯陽殿講說佛理杜輔𤣥與吏部尚書楊愔中書令邢邵秘書監魏收並侍法筵勑輔𤣥升師子座昭𤣥都僧逹及僧道順並緇林之英問難鋒至徃復數十畨莫有能屈帝曰此賢若生孔門便是誰比魏書曰杜輔𤣥嘗與邢子才扈從東山其論名理邢以為人死還生恐是為蛇盡足杜曰盖謂人死歸無非有能生之力然物之未生何獨致怪邢曰聖人設教本由勸奬故懼以將來理合各遂其性杜曰聖人合徳天地齊信四時言則為經行則為法而云以虛示物以詭勸民將同魚腹之書有異鑿楹之誥安能使北辰降光龍宫韞櫝就如所論福果可以鎔鑄性靈𢎞奬風教為益之大莫極於斯此即真教何謂非實邢云死之言澌精神盡也杜曰此所言澌如射箭盡手中盡也小雅曰無草不死月令又云靡草死動植雖殊亦此之𩔖無情之卉尚得還生含靈之物何妨再造若云草死猶有種在則復人死亦有識種識種不見謂以為無神之在形亦非自矚離朱之明不能覩雖蔣濟觀眸賢愚可察鍾生聴曲山水呈狀乃神之工豈神之質猶玉帛之非禮鐘鼓之非樂以此而推義斯見矣邢云季札言無不之亦言散盡若復聚而為物不得言無不之也杜曰骨肉下歸於土魂氣則無不之此乃形墜魂遊徃而非盡如鳥出巢如蛇出穴由其尚有故無所不之若令無也之將焉適延陵有察㣲之識知其不随於形仲尼發習禮之嘆美其斯與形别若許之以廓然然則人皆季子不謂高論執此為無邢云神之在人猶光之在燭燭盡則光窮人死則神滅杜曰舊學前儒每有斯語羣疑衆惑咸由此起盖辯之者未精思之者不篤竊有末見可以覈諸燭則因質生光質大光亦大人則神不係於形形小神不小故仲尼之智必不短於長狄孟徳之容乃逺寄於崔琰神之於形亦猶君之有國國實君之所統君非國之所生不與同生孰云俱滅邢云捨此適彼生生恒在周孔自應同莊周之鼔缶和桑扈之循歌杜曰共隂而息尚有將别之悲窮轍以逰亦興中途之嘆况曰聮體同氣化為異物稱情之服何害於聖其後别與邢書云夫建言明理宜出典證而違孔背釋獨為君子若不師聖物各有心馬首欲東誰其能禦逸韻雖髙管見未喻前後徃復再三邢理屈而止人有問三教優劣於李士謙北史曰李士謙字子約小字容郎趙郡平棘人李謐之子䘮父事母以孝聞母殁捨宅為伽藍詣學請業研精不倦遂博覧羣籍家富於財以振施為務或謂士謙子多隂徳士謙曰夫言隂徳其猶耳鳴已獨知之人無知者今子皆知何隂徳之有開皇八年終趙州士女莫不流淚曰我曹不死令李叅軍死乎士謙曰佛日也道月也儒五星也人莫能難隋書曰士謙善談𤣥理有一客不信佛家報應之理士謙喻之曰積善餘慶積惡餘殃高門待封掃墓望䘮豈非休咎之應耶佛經云轉輪五道無復窮已此則賈誼所言千變萬化未始有極忽然為人之謂也佛道未東賢者已知其然矣至若鯀為黄熊杜宇為鶗鴂褒君為龍牛哀為獸君子為鵠小人為猿彭生為豕如意為犬黄母為黿宣武為鼈鄧艾為牛徐伯為魚鈴下為烏書生為虵羊祜前身李氏之子此非佛家變受異形之謂耶客曰邢子才云豈有松栢後身化為樗櫟士謙曰此不𩔖之談也變化皆由心作木豈有心乎邢子才邢邵已見率情簡素博覧墳籍晚年尤以五經章句為意窮其指要吉㓙禮儀公私諮禀質疑去惑為世指南每公卿㑹議事闗典政子才援筆立成證引該洽帝命朝章取定俄頃詞致宏逺獨歩當時與濟隂温子昇為文士之冠時人謂之温邢彭城王彥和博綜經史雅好文筆風儀容貌端嚴若神既無山水之適又絶親知之遊獨敦尚文史物務之暇披覧不輟撰自古帝王賢達至於魏世通三十卷名為要畧魏書曰彭城武宣王勰字彥和獻文皇帝子也少岐嶷姿性不羣長而好學雅善屬文長直禁中叅决大政軍國之事無不預焉封彭城王官中書令蕭仁祖蕭慤已見嘗於秋夜賦詩曰芙蓉露下落楊桞月中踈邢子才甚愛之語人曰蕭仁祖之文可謂雕章間出昔潘陸齊軌不襲建安之風顔謝同聲遂革太元之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顔黄門亦云吾愛其蕭散宛然在目而盧思道之徒雅所不愜箕畢殊好理固宜然魏孝静人日登雲龍門崔俊侍宴魏書曰崔悛字長孺清河東武城人狀貌偉麗善於容止歴覧群書兼有詞藻自中興迄於孝武詔令皆俊所為仕至東兖州刺史又勑其子瞻令近御坐亦有應詔詩北史曰崔瞻字彦通潔白善容止神彩嶷然言不妄發才學風流為後來之秀天統末官銀青光禄大夫帝問邢邵曰此詩何如其父邢曰悛博雅𢎞麗瞻氣調清新並詩人之冠燕罷共嗟賞之咸曰今日之讌并為崔瞻父子盧詢祖嘗作趙郡王妃挽歌其一篇云君王盛海内伉儷盡寰中女儀掩鄭國嬪容映趙宫春艶桃花水秋度桂枝風遂使叢臺夜明月滿床空當時嘆以為佳薛道衡聘陳作人日詩云入春纔七日離家已二年南人嗤之曰是底言誰謂此人解作詩及云人歸落鴈後思發在花前乃喜曰名下固無虛士隋書曰道衡字𤣥卿河東汾隂人六嵗而孤専精好學及長才名益著隴西辛術與語嘆曰鄭公業不亡矣河東裴讞目之曰鼎遷河朔吾謂關西孔子罕遇其人今復遇薛君矣官至司𨽻大夫裴子野撰宋畧二十卷蘭陵蕭琛謂其評論可與過秦王命分路揚鑣劉璠梁典曰子野曾祖松之元嘉中受詔續修宋史未成而卒子野欲繼成先業永明末沈約撰宋書稱松之已後無聞焉子野更撰宋畧二十卷叙事評論多善而云戮淮南太守沈璞以其不從義師故也約懼徒跣謝之請兩釋焉嘆其述作曰吾弗逮也煬帝時洛陽獻合蔕迎輦花帝令𡊮寳兒持之號司花女時虞永興草征南指揮徳音於側寳兒注視之帝曰昔𫝊飛燕可掌上舞今得寳兒方昭前事然多憨態今注目於卿卿可便嘲之虞為絶句曰學畫鴉黄半未成垂肩嚲䄂太憨生縁憨却得君王惜長把花枝傍輦行帝稱美劉昫唐書曰虞世南字伯施越州餘姚人父茘陳太子中庶子叔父寄無子以世南繼後性沉静寡欲篤志勤學少與兄世基學於顧野王經十餘年精思不倦或累旬不盥櫛善屬文祖述徐陵陵亦言世南得已之意又沙門智永善羲之書世南師焉妙得其體由是聲名籍甚太宗朝官秘書監爵永興縣子李徳林為内史令與楊素共執隋政素功臣豪侈後房婦女千人徳林子百藥夜入其室私素寵姬旦日俱執於庭將斬之百藥年未二十儀神雋令素意惜之曰聞汝善為文可作詩自叙若稱吾意當貸汝死授以紙筆立就素覧之欣然以妾與之并資從數十萬李徳林楊素李百藥並已見釋慧净嘗與道士蔡晃談義晃屢被摧折僧道宣𫝊燈録曰慧浄俗姓房氏常山真定人隋國子博士徽逺族子生知天挺雅懐篇什風格標峻噐宇冲邈弱嵗便曉文頌十四出家志業𢎞逺日頌八千餘言總持辭義罕有其比國子祭酒孔頴逹心存道黨謂慧浄曰佛家無諍法師何以屢構斯難慧淨答曰如來存日已有斯事佛破外道外道不通反謂佛曰汝常自言平等今既以難破我即是不平何謂平等佛為通曰以我不平破汝不平汝若得平即我平矣顧今亦爾以淨之諍破彼之諍彼得無諍即淨無諍也時太子在坐語祭酒曰君既䜈說真為道黨慧淨即啟曰淨聞君子不黨何祭酒亦黨乎太子大笑合坐稱善劉昫唐書曰孔穎達字仲達冀州衡水人八嵗就學日誦千餘言及長明左氏𫝊鄭氏尚書王氏易毛詩禮記兼善筭歴解屬文同郡劉焯名重海内穎達造門請質疑滯多出意表焯改容敬之大業初舉明經太宗引為文學舘學士拜國子祭酒王無功王績已見以周易老莊置床頭他書罕讀也魏徴奏引諸儒校集秘書國家圖籍粲然完整劉昫唐書曰魏徴字𤣥成鉅鹿曲城人父長賢北齊屯留令徴少孤貧落拓有大志不事生業出家為道士好讀書多所通渉見天下漸亂屬意縱横之說大業末事李宻後歸朝為隐太子洗馬太宗踐祚拜諫議大夫累官太子太師知門下省事明皇於勤政樓以七寳装成山座高七尺召諸學士講論古今勝者乃得升張曲江張九齡已見論辯風生首登此座李北海小時見特進李嶠李嶠已見自言讀書未徧願一見秘書嶠曰秘閣萬卷書豈時日能習耶北海固請乃假直秘書省未幾辭去嶠驚試問奥篇隐帙了辯如響嶠歎曰子且名家劉昫唐書曰李邕廣陵江都人父善受文𨕖於曹顯後賀蘭敏之薦為崇賢舘學士敏之敗善配流嶺外赦還寓居汴鄭之間以講文𨕖為業所注文𨕖行于時邕少知名長安初李嶠張廷珪薦邕詞高行直堪為諫官召拜左拾遺天寳初為北海太守倪若水蔵書甚多列架不足疊窓安置不見天日子弟直日㸔書凡親友祈借者先投束修羊宋祁唐書曰倪若水字子泉恒州藁城人累官尚書右丞出為汴州刺史政清淨增修孔廟興州縣學廬勸生徒身為教誨風化興行入為户部侍郎復拜右丞劉秩詳摭百家侔周書六官為政典三十五篇房琯稱其才過劉向宋祁唐書曰劉秩字祚卿史官劉知幾子也累官給事中所著政典止戈記凡數十篇杜君卿以為未盡因廣其闕參益新禮為二百篇自號通典奏之優詔嘉美儒者服其書約而詳劉昫唐書曰杜佑字君卿京兆萬年人父希望鴻臚卿佑以䕃入仕𥙷濟南郡叅軍累官檢校司徒充度支鹽鐡使劉捷卿續詩書禮樂春秋五說既成語人曰天下滔滔知我者希終不以示人宋祁唐書曰劉迅字捷卿劉知幾苐五子也歴京兆功曹叅軍事上元中避地安康卒杜君卿杜佑已見資性嗜學雖名位通顯猶夜分讀書陸魯望每得異書熟誦乃録讐比勤勤朱黄不去手所蔵雖少其精皆可𫝊唐詩紀事曰陸龜䝉字魯望吳郡人父虞賔浙東從事龜䝉少高放從張搏遊張歴湖蘓二州辟以自佐嘗至饒州三日無所詣刺史蔡京率官屬就見之龜䝉不樂拂衣去不喜交流俗常乘小舟設蓬席齎束書茶竈筆床釣具徃來時謂江湖散人或號天随子甫里先生自比涪翁漁父江上丈人唐末以左拾遺授之詔下日終于家裴公美裴休已見晝講經夜著書終年不出户語林卷八
