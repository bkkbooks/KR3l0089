body:
  text: 何氏語林小說家類一雜事之屬提要臣等謹案何氏語林三十卷明何良俊撰良俊有四友齊叢說己著録是編因晉裴啓語林之名其義例門目則全以劉義慶世說新語為藍本而雜採宋齊以後事迹續之併義慶原書共得二千七百餘條其簡汰頗為精審其採掇舊聞翦裁鎔鑄具有簡淡雋雅之致視僞本李垕續世說剽掇南北二史冗杳擁腫徒盈卷帙者乃轉勝之每條之下又仿劉孝標例自為之注亦頗為博贍其間托拾既富間有抵牾如王世懋讀史訂疑所謂以王莽時之陳咸為漢成帝時之陳咸者固所不免然于諸書舛互實多訂正如第二十二卷紀元載妻王韞秀事援引考證亦未嘗不極確核雖未能抗駕臨川並驅千古要其語有根柢終非明人小說所可比也乾隆四十二年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部十二語林目録小說家類一雜事之屬卷一德行上卷二德行中卷三德行下卷四言語上卷五言語下卷六政事卷七文學上卷八文學中卷九文學下卷十言志上卷十一言志下卷十二方正上卷十三方正下卷十四雅量卷十五識鑒卷十六賞譽上卷十七賞譽下卷十八品藻卷十九針規卷二十棲逸卷二十一捷悟博識豪爽卷二十二夙惠賢媛容止卷二十三自新術解巧藝卷二十四企羡寵禮傷逝卷二十五任誕卷二十六簡傲卷二十七排調卷二十八輕詆卷二十九假譎黜免儉嗇侈汰忿狷讒險卷三十尤悔紕漏惑溺仇隙語林原序何氏語林三十卷吾友何元朗氏之所編類倣劉氏世說而作也初劉義慶氏採擷漢晉以來理言遺事論次為書摽表揚榷奕奕𤣥勝自兹以還稗官小說無慮百數而此書特為雋永精深竒逸莫或繼之元朗雅好其書研尋演繹積有嵗年搜覽篇籍思企芳躅昉自兩漢迄于宋元下上千餘年正史所列𫝊記所存竒蹤勝踐漁獵靡遺凡二千七百餘事捴十餘萬言類列義例一惟劉氏之舊而凡劉所已見則不復書品目臚分雖三十有八而原情執要實惟語言為宗單詞隻句往往令人意消思致淵永足深唱嘆誠亦至理攸寓文學行義之淵也而或者以為托裂委瑣無所取裁骫骳偏駮獨䏻發藻飾詞于道德性命無所發眀嗚呼事理無窮學奚砥極理或不眀固不足以探性命之藴而辭有不達道何從見是故博學詳說聖訓攸先修辭立誠蓄德之源也宋之末季學者牽于性命之說深中厚默端居無為謂足以涵養性真變化氣質而考厥所存多可議者是雖師授淵源惑于所見亦惟簡便日趨偷薄自畫假美言以護所不足甘于面墻而不自知其墮于庸劣焉爾嗚呼玩物喪志之一言遂為後學之深痼君子蓋嘗惜之元朗于此真能不為所惑哉元朗貫綜深博文詞粹精見諸論撰偉麗淵宏足自名世此書特其緒餘耳輔談式藝要亦不可以無𫝊也辛亥四月之望文徴眀書
