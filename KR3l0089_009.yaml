body:
  text: 語林卷九明何良俊撰文學第四下杜正倫在中書日劉昫唐書曰杜正倫相州洹水人隋仁壽中與兄正𤣥正藏俱以秀才擢第隋代舉秀才止十餘人正倫一家有三秀才甚為當時稱美正倫善屬文深明釋典仕隋為羽騎尉武德中歷遷齊州總管府録事參軍貞觀四年遷中書侍郎顯慶中為相與舍人董思恭夜直共論文章思恭歸語人曰與杜公評文今日覺吾文頓進唐書曰董思恭蘇州吳人所著篇詠甚為時人所重初為右史知考功舉事坐預泄問目配流嶺表高宗時上官儀獨持國政嘗凌晨入朝巡洛水堤步月徐轡詠詩曰脉脉廣川流驅馬入長洲鵲驚山月曙蟬噪野風秋音韻清亮群公望之以為神仙唐書紀事曰上官儀字游韶陜州人工詩其詞綺錯婉媚一時效之曰上官體高宗時為相麟德元年坐梁王忠事下獄死武后惡之也王勮長壽中為鳳閣舍人劉昫唐書曰王勃與兄勔勮才藻相類勮弱冠進士登第纍除太子典膳丞遷鳳閣舍人壽春等五王出閣同日受冊有司具儀忘載冊文百官在列方知闕禮勮召五吏在前執管口授一時都畢其辭粲然衆皆恱服王勃道出鍾陵九日都督大宴滕王閣宿命其壻作序以誇客因出筆紙遍請坐客皆莫敢當至勃泛然不辭都督怒起更衣遣吏伺其文輒報一再報語益竒乃矍然曰天才也請遂成文劉昫文苑𫝊曰王勃字子安絳州龍門人祖通隋司户書佐棄官歸以講學為業父福畤勃六嵗解屬文構思無滯詞情英邁父為雍州司户左遷交趾令勃往交趾省父道出江中為採蓮賦以見意其辭甚美渡南海墮水而卒時年二十八駱賔王在徐敬業府為敬業檄武后罪狀后讀但嘻笑至一壞之土未乾六尺之孤安在矍然曰誰為之或以賔王對后曰宰相安得失此人劉昫唐書曰駱賔王婺州義烏人少善屬文尤妙於五言詩落魄無行好與博徒遊高宗末為長安主簿左遷臨海丞怏怏失志棄官去文明中與徐敬業作亂敬業軍中書檄皆賔王之詞也宋之問自謫所還至江南遊靈隱寺夜月極明在長廊行吟曰鷲嶺鬱岧嶤龍宫鎖寂寥句未屬有老僧㸃長明燈問曰少年夜久不寐何耶之問曰適欲題此寺而興思不屬僧請吟上聮即曰何不云樓觀滄海日門對浙江潮之問愕然訝其遒麗遂續終篇或言老僧是駱賔王唐詩紀事曰之問字延清汾州人與沈佺期劉允濟媚附易之及敗貶瀧州參軍逃歸景龍中諂事太平公主後安樂公主權盛復往諧結中宗將用為中書舍人太平發其贓遷越州長史賦詩流𫝊京師睿宗立以獪險盈惡流欽州賜死自建安以訖江左詩律屢變至沈約庾信以音韻婉附屬對精密及宋之問沈佺期又加靡麗回忌聲病約句凖篇如錦繡成文學者宗之號為沈宋當時語曰蘇李居前沈宋比肩唐詩紀事曰沈佺期字雲卿相州人除給事中考功郎受贓劾未䆒㑹張易之敗長流歡州稍遷台州録事參軍入計召見拜修文直學士侍宴為弄辭恱帝賜牙緋尋為太子詹事崔融作武后哀冊文發疾而卒時人以為二三百年來無此文劉昫唐書曰崔融字成晏齊州人擢八科髙第官司農少卿仍知制誥時張易之兄弟招集文學之士融與李嶠蘇味道王紹宗等俱以文才降節事之易之伏誅融左授𡊮州刺史尋召拜國子司業天后時刑吏橫酷淫及善人劉知幾悼士無良而甘於禍患作思謹賦以刺時蘇味道李嶠見而歎曰陸機豪士之流乎劉昫唐書曰劉子𤣥本名知幾少與兄知柔以詞學知名長安中纍遷左史宗楚客嫉其正直謂諸史官曰此人作書如是欲置我何地知幾又著史通子二十卷備論史䇿之體徐堅深重其書嘗云居史職者宜置此書於座右郭元振嘗因奏對天后與語大奇之索所為文章上寶劔篇后覽嘉歎唐詩紀事曰元振與薛稷趙彥昭同為太學生天資雄邁景雲中位宰相蘇廷碩為中書舍人制詞敏速李特進李嶠已見見而歎曰舍人思如湧泉吾所不及唐詩紀事曰蘇頲字廷碩幼敏悟一覽至千言吏侍馬載曰古稱一日千里蘇生是矣長安中為中書舍人時瓌同三品父子同在禁苑當世榮之𤣥宗平內難日書詔填委蘇頲在太極後閣口所占授功狀百緒輕重無所差書史白丐公徐之不然手腕脫矣王方慶賞徐堅文章典實嘗稱之曰此掌綸誥之選也劉昫唐書曰徐堅字元固西臺舍人齊𥅆子也少好學遍覽經史楊再思王方慶為東都留守引堅為判官方慶善三禮之學每有疑滯就堅質問堅必徴舊說訓釋詳明方慶深善之孫逖除庶子日唐詩紀事曰逖河南人年十五見崔日用試土火爐賦援筆立就甫冠三擅甲科終刑部侍郎苑咸草制詞曰西掖掌綸朝推無對當時以為知言顔魯公集曰唐人推咸為文誥之最梵王右丞贈苑咸詩序曰苑舍人能書梵字兼逹音曲盡其妙孟浩然嘗遊祕省值秋月新霽諸英畢集相與賦詩次當浩然浩然即援筆書曰微雲淡河漢踈雨滴梧桐舉坐嗟其清絶咸以之閣筆不復為綴王士源浩然集序曰孟浩然字浩然襄陽人骨貌淑清風神散朗救患釋紛以立義表灌蔬藝竹以全高尚交遊之中通脫傾蓋機警無匿學不為儒務掇菁藻文不按古匠心獨妙五言詩天下稱其盡美𤣥宗與太真妃賞花命李龜年持金花箋賜李白令進清平樂詞白援筆立就語詞妙麗天下稱之錢希白南部新書曰李白山東人父任城尉因家焉少與魯中諸生孔巢父韓沔裴政張叔明陶沔隱於徂徠山號竹溪六逸天寶中游㑹稽與吳筠隱剡中筠徴赴闕薦之於朝與筠俱待詔翰林權載之於述作特盛六經百氏游泳漸漬其文雅正𢎞博王侯將相洎當時名人薨殁以銘志為請者十七八一時稱為宗匠權德輿已見韋蘇州韋應物已見至性高潔常鮮食寡欲所在焚香掃地而坐為詩馳驟建安以還各得其風韻惟顧况劉長卿丘丹秦系皎然之儔得厠賔列與之酬唱郭曖尚升平公主劉昫唐書曰郭曖子儀第六子尚代宗第四女升平公主盛集文士即席賦詩公主幃而觀之李端中宴詩成曰薰香荀令偏憐小傅粉何郎不解愁衆以為工或言是夙構端曰願試一吟錢起云請以起姓為韻端復賦云新開金埓教調馬舊賜銅山許鑄錢一時稱其妙絶曖出名馬金帛為贈姚合極𤣥集曰李端趙郡人與盧綸吉中孚韓翃錢起司空曙苖發崔洞耿湋夏侯審唱和號十才子歷校書郎杭州司馬前唐詩紀事曰錢起吳興人與郎士元齊名時人語曰有沈宋後有錢郎終考功郎中秦公緒與劉長卿善時以詩酬唱宋祁唐書曰秦系字公緒㑹稽人天寶末避亂剡溪後客泉州南安有九日山大松百餘章俗𫝊東晉時所植系結廬其上穴石為硯注老子彌年不出人號其山為高士峯權德輿已見曰長卿自以為五言長城秦處士用偏師攻之雖老益壯唐詩紀事曰劉長卿字文房終隋州刺史以詩馳聲上元寶應間皇甫湜云詩未有劉長卿一句已呼宋玉為老兵矣語未有駱賔王一字已罵宋玉為罪人矣其名重如此裴晉公裴度已見平淮西後憲宗賜玉帶一條公臨薨却進使舊僚作表皆不當公意因令子弟執筆口占狀曰內府之珍先朝所賜既不敢將歸地下又不合留向人間謹却封進聞者歎其簡切而不亂裴令公居守東洛夜宴半酣令公索句時元白首唱白樂天已見父劉昫唐書曰元稹字微之河南人魏昭成皇帝之後寬比部郎中稹九嵗能屬文十五兩經擢第二十八應制舉才識兼茂明於體用科稹為第一除右拾遺長慶二年拜平章事唐詩紀事曰穆宗時嬪御多誦稹歌詞宫中號為元才子淫李肇國史𥙷曰元和以後文茟學淺切於白居易學靡於元稹俱名為元和體次至楊汝士唐詩紀事曰汝士字慕巢牛奇章待之善開成初鎮東川時嗣復鎮西川昆弟對擁節旄世榮其門汝士援筆書曰昔日蘭亭無艷質此時金谷有高人白知不能加遽裂之曰笙歌鼎沸勿作冷淡生活元顧語曰樂天所謂能全其名者也楊於陵已見入覲唐書曰於陵以長慶四年留守東都其子嗣復已見率兩榜門生迎於潼關宴新昌里第僕射與故人坐正寢嗣復領諸生翼兩序元白俱在席賦詩時楊汝士詩後成元白覽之失色是日大醉歸語其子弟曰吾今日壓倒元白元微之與劉夢得韋楚客同㑹於白樂天舍論南朝興廢各賦金陵懷古詩劉滿引一杯飲已即成詩曰王濬樓船下益州金陵王氣黯然收千尋鐡鎖沉江底一片降幡出石頭人世幾回傷往事山形依舊枕寒流而今四海為家日故壘蕭蕭蘆荻秋白覽詩曰四人探驪龍子先獲珠所餘鱗爪何用耶於是罷唱劉昫唐書曰劉禹錫字夢得彭城人祖雲父溆世以儒學稱禹錫精於古文善五言詩今體文章復多才麗為監察御史以附麗王叔文連加貶逐終太子賔客分司東都唐詩紀事曰韋楚客長慶進士終于拾遺白樂天初至京以所業謁顧著作顧覩姓名熟視曰米價方貴居亦不易及披卷首篇曰咸陽原上草一嵗一枯榮野火燒不盡春風吹又生乃嗟賞曰道得箇語居即易也因為之延譽聲名遂振唐詩紀事曰顧况字逋翁姑蘇人性詼諧與柳渾李沁為方外友德宗時渾輔政以祕書郎召及泌相遷著作郎坐詩語調謔貶饒州司户居茅山以夀終白傅藏書于東都聖善寺號白氏集李丞相公垂有詩曰寄玉蓮花藏緘珠貝葉扄院閒容客讀講倦許僧聽部列雕金榜題存刻石銘永添鴻寶集莫雜小乘經其為當時推重如此劉昫唐書曰李紳字公垂潤州無錫人本山東著姓高祖敬𤣥中書令父悟為晉陵令因家無錫紳形狀短小而精悍能為歌詩李錡愛其才辟為從事遁而獲免錡誅拜右拾遺穆宗時為翰林學士與李德裕元稹同在禁署時稱三俊白樂天長恨及上陽宫人歌元微之連昌宫詞道開元間宫禁事最為深切然微之有行宫一絶云寥落古行宫宫花寂寞紅白頭宫女在閒坐說𤣥宗當時稱其語少意婉有無窮之味唐球居蜀中所著詩撚稿為圓納之大瓢中後卧病投瓢於江曰斯文苟不沉沒得者方知我苦心爾至新渠有識者曰唐山人瓢也接得之唐詩紀事曰球居蜀之味江山方外之士也北夢瑣言曰球詩思遊歷不出二百里武宗賜陳傷邊將詔封敖草詞曰傷居爾體痛在朕躬帝言此語如朕意中出即賜以宫錦劉昫唐書曰封敖字碩大渤海人大和中為中書舍人敖構思敏速語近而理勝不尚竒澀武宗深重之大唐新語曰李德裕定䇿破回鶻誅劉稹封衛國公其制語有遏橫議於風波定竒謀於掌握逆稹盜兵壺關晝鎖造膝嘉話開懷靜思意皆我同言不他惑制出敖往慶之德裕口誦此數句撫敖曰陸生有言所恨文不逮意如卿此語秉筆者不易措言座中解其所賜玉帶以遺敖尚書東莞公夜宴坐列數花段成式作連珠以代劇語其一曰竊以銅街麗人恨塵泥之將隔石室素女怨仙俗之易分因知三鳥孤鸞從來要匹金雞玉鵠不願成群其二曰名比大喬怨佳期之未卜居連小市恨的信之難移因知夜逼更長斜漢回而脉脉寒侵夢淺行雲去以遲遲一時稱其美麗劉昫唐書曰假成式字柯古父文昌劍南節度使成式以䕃入宫為祕書省校書郎研精苦學祕閣書籍披閲皆遍咸通初出為江州刺史解印寓居襄陽以閒放自適家多書史用以自娛尤深於佛書宋次道家書皆校讐三五遍世之藏書以次道家為善本住在春明坊昭陵時仁宗陵名昭陵士大夫喜讀書多僦居其側以便於借置故也當時春明宅子僦直比他處常高一倍東都事略曰宋敏求字次道隨州平棘人父綬參知政事諡宣獻經史百家莫不通貫家藏書二萬卷敏求官龍圖閣學士修國史以力學被遇父子繼世掌史時以為榮陳叔易常歎此事曰此風豈可復見耶楊大年奉詔修冊府元龜每數卷成輒奏之比再降出真宗常有簽貼凡少差誤必見至有數十簽大年雖服上之精鍳心頗自愧竊揣萬幾少暇不應如此稍訪問之乃每進本到輒降付陳彭年彭年博洽不可欺毫髮故謬誤處皆簽貼以進大年乃盛薦彭年文字請與同修自是進本降出不復簽矣僧文瑩玉壺清話曰陳彭年字永年生撫州十三著皇綱論萬餘言為江左名輩所重入朝除正言待制龍圖閣與朝逈戚綸條貢舉事嚴設糊名謄録取字林韻略字統及三蒼爾雅為禮部韻凡科場儀範遂為著格奉勑編太宗御集纍官參知政事張端公名重當世蔡絛鐡圍山叢談曰張端公伯玉仁廟朝人時號張百杯又曰張百篇言一飲酒百杯一掃詩百篇也有士人頗强記自負飲酒鮮雙求一朝士書牘為容持謁端公端公啓緘喜曰君果多聞又能敵吾飲量吾老久無對不意君之肯辱命酒共酌三十許杯士人雄辨風生端公略不為動俄辭以醉端公笑曰果可人然量止此乎老夫當為君獨引矣遂自數十舉以手指其室中四匱書曰吾衰病不如昔所能記憶者獨此君試自探一卷來吾為子誦之士人即匱中偶探得儀禮以白端公端公語士人君宜自舉其首士人如其言端公琅然背誦士人始駭服再拜以為端公真竒人曾子固曾鞏别見初為太平州司户時張伯玉作守歐陽公與荆公諸人咸薦之伯玉殊不為禮一日就設㕔作大排召子固惟賔主二人亦不交一談既而召子固於書室謂曰人以公為曾夫子必無所不學也子固辭避而退一日請子固作六經閣記子固屢作終不可其意乃謂子固曰吾試為之即令子固代書遂口占曰六經閣者諸子百家皆在焉不書尊經也蓋子固年少恃才私以不識字詆伯玉至是始歎服以為不能加吳曾能改齊漫録曰伯玉字公逹范文正公客也張文定公張方平已見奉佛甚謹杜祁公獨不信佛法每對客嘲笑有一醫姓朱出入二公之門嘗欲方便勸導祁公久而未獲一日公病召朱朱以讀楞嚴未了不即往既至公怒曰楞嚴何等書而讀之朱出袖中首軸呈之公覽竟索餘軸不覺遽盡十卷乃絶歎以為竒書因與朱同謁文定責其不早以告文定曰譬如失物既已得之不必詰其得之之晚公自此即若有得大加崇信富文忠公深逹性理嘗與吳處厚書託訪荷澤諸禪師處厚以偈戲公云是身如幻泡盡非真實相况兹紙上影妄外更生妄到岸不須船無風休起浪唯當清淨觀妙法了無象公答偈曰執相誠非破相亦妄不執不破是名實相人皆服公精詣熙寧前士大夫未有談襌者偶富韓公問法於顒華嚴知其得於圓照大本本時住蘇州瑞光寺聲振東南乃遣使作頌寄之執禮如弟子於是一時翻然慕向人人喜言名理惟司馬溫公范蜀公以為不然既久二公亦自偶入其說而溫公尤信蜀公遂以為譏溫公曰吾豈謂天下無禪但吾儒所聞有不必棄我而從其書耳此亦幾所謂實與而文不與者後因蜀公不納乃以書戲之曰賤子悟已久景仁今尚迷又云到岸何須筏揮鋤不用金浮雲任來往明月在天心此理極致本無差别溫公悟理已到至處乃能知其不異僧曉瑩羅湖野録曰富鄭公鎮亳州華嚴顒公館於州治咨以心法既有證入别後答顒書曰示諭此事必有風因非今生能辦如弼遭遇和尚即無始以來忘失事一旦認得此後定須拔出生死海不是尋常恩和尚得弼百千何益於事不過得人道華嚴㑹下出得箇老病俗漢濟得甚事所云陶汰甚多每念古尊宿在本師處動是三二十年日日聞道聞法方得透頂透底弼兩次䝉和尚垂顧共得兩箇月請益更作聰明過人能下得多少工夫若非和尚巧設方便著力擲發何由見箇涯岸未知何日瞻拜但日夕依依也出續𫝊燈録曰圓照禪師常州管氏子體貌龎碩十九家漕使李復圭命開法瑞光法席日盛神宗造相國寺召為慧林第一祖召對延和殿帝目送之曰真慧福僧也劉原父在詞掖歐陽文忠公嘗折簡問入閣起於何年閣是何殿開延英起何年五日一起居遂廢正衙不坐起何年三者孤陋所不詳乞求本末原父方與客對食曰明當為答已而復追回令立俟報原父就坐中疏入閣事詳盡無遺原父私謂所親曰好箇歐九極有文章可惜不甚讀書東坡後聞此言笑曰軾輩將如之何王介甫喜談經術雖館閣諸公莫與爭鋒惟劉原父兄弟來介甫為之小屈朱辨曲洧舊聞曰東坡祭原父文特載其事有大言滔天詭論滅世之語蓋指介甫也祭文宣和以來始傳于世王舒王性酷嗜書雖寢食間手不釋卷或宴居默坐研究經㫖知常州日對客未嘗笑一日大㑹賔佐倡優在庭公忽大笑人頗怪之有客乘間啓公公曰疇日席上偶思咸恆二卦豁悟微㫖自喜有得故不覺發笑耳慶歷中士大夫多修佛學往往為偈頌以發明禪理司馬溫公為解禪偈六篇云文中子以佛為西方聖人信如文中子之言則佛之心可知矣今之言禪者好為隱語以相迷大言以相勝使學之者倀倀然益入於迷妄故豫廣文中子之言而解之作解禪偈六首若其果然雖中國可行何必西方若其不然則非豫之所知也偈曰忿忿如烈火利欲如銛鋒終朝長戚戚是名阿鼻獄顔回甘陋巷孟軻安自然富貴如浮雲是名極樂國孝悌通神明忠信行蠻貊積善來百祥是名作因果仁人之安宅義人之正路行之誠且久是名不壞身道德修一身功德被萬物為賢為大聖是名菩薩佛言為百世師行為天下法久久不可掩是名光明藏當時稱其精理蘇子瞻云范景仁范鎮已見平生不好佛晚年清謹無欲一物不芥蒂於心真却是學佛作家然至死常不取佛法某謂景仁雖不學佛而達佛理雖毁佛罵祖可也范蜀公素不飲酒又詆佛教在許下與韓持國兄弟往還諸韓皆崇此二事每燕集未嘗不極飲盡歡少間則以禪恱相勉蜀公頗病之蘇子瞻時在黃州公以書問救之當以何術曰麴糵有毒平地生出醉鄉土偶作祟眼前妄見佛國子瞻報之曰請公試觀能惑之性何自而生欲救之心作何形相此猶不立彼復何依正恐黃靣瞿曇亦須斂袵况學之者耶意亦將以曉蜀公公終不領五朝名臣言行録曰韓維字持國忠獻公億之子以䕃𥙷官仕至門下侍郎邵氏聞見録曰神宗潜邸英宗命韓魏公擇官僚用王陶韓維等皆名儒厚德之士一日侍坐近侍以弓樣靴進維曰王安用舞靴神宗有愧色亟令毁去宋次道知亳州家多書劉道原劉恕已見枉道就借觀之次道日具酒饌為主人禮道原曰此非吾所為來也殊廢吾事願悉撤去獨閉閣晝夜讀且抄留旬日盡其書而去劉道原在洛陽與司馬溫公同遊萬安山道旁有碑乃五代列將人所不稱道者道原即能言其行事終始不遺溫公歸驗之舊史信然司馬溫公十國紀年序曰光嘗奏舊史文繁自布衣之士鮮能該通况天子一日萬幾誠無暇周覽乞自戰國以還訖于顯德凡關國家興衰繫衆庶休戚善可為法惡可為戒者詮次為編年一書刪其浮長之辭庶於奏御差便上喜尋詔光編次仍謂光曰卿自擇館閣英才共修光對曰館閣文學之士誠多至於専精史學臣知者惟和川令劉恕一人而已上曰善退即奏召之與共修書凡數年史事之紛錯難治者則以諉之光䝉成而已黃龍寺晦堂老子嘗問山谷以吾無隱乎爾之義山谷詮釋再三晦堂終不然其說時暑退凉生秋香滿院晦堂因問曰聞木犀香乎山谷曰聞晦堂曰吾無隱乎爾山谷乃服羅湖野録曰太史黃公魯直元祐間丁家艱館黃龍山從晦堂和尚遊曾文清每日夙興誦論語一篇終身未嘗廢宋史曰曾幾字吉甫幼有識度事親孝母死蔬食十五年入太學有聲從舅氏孔文仲武仲學為文雅健詩尤工楊文公楊億已見初入館時年甚少故事初授館職必以啓謝執政時公啓事有曰朝無絳灌不妨賈誼之少年坐有鄒枚未害相如之末至一時稱之謝希深謝絳已見嘗作上楊祕監楊億啓事有曰曵鈴其空上念無君子者解組不顧公其謂蒼生何大年題於所携扇曰此文中虎也中吳紀聞曰歐陽公嘗云三代以來文章盛者稱西漢希深於制誥尤得其體常楊元白不足多也蘇舜欽既放廢寓居吳中宋史曰蘇舜欽字子美參知政事易簡之孫慷慨有大志范仲淹薦試集賢校理監進奏院舜欽娶宰相杜衍女衍時與仲淹冨弼在政府多引用一時聞人御史中丞王拱辰等不便其所為㑹進奏院祠神舜欽輒用鬻故紙公錢召妓樂㑹賔客拱辰亷得之諷其屬魚周詢等劾奏因欲搖動衍舜欽坐自盜除名同時㑹者皆知名士因緣得罪者十餘人買水石作滄浪亭益讀書自喜時發憤悶於歌詩其體豪放往往驚人舜欽既寓于吳友人韓維責以世居京師而去離都下隔絶親交舜欽報書曰䝉問責以兄弟在京師不以義相就獨羈外數千里自取愁苦豫豈無親戚之情豈不知㑹合之樂昨在京師不敢犯人顔色不敢議論時事隨衆上下心志蟠屈不開固亦極矣不能早自引去致不測之禍捽去下吏人無敢言友讐一波共起謗議被廢之後喧然未已更欲置之死地來者往往鈎賾言語欲以傳播故閉户不敢相見如避兵冦偷俗如此安可久居其間遂超然逺舉羈泊於江湖之上不唯衣食之纍實亦少避機穽也况血屬之多資入之薄持國見之矣常相團聚可乏衣食乎不可也可閉關不與人接乎不可也與之接必與之言與之言必與之還往使人人皆如持國則可不逮持國者必加釀惡言喧布上下使僕不能自明則前日之事未為重也都無此事亦終日勞苦應接不暇寒暑奔走塵土泥淖中不能了人事羸馬餓僕日栖栖取辱於都城使人指背譏笑哀閔亦何顔靣安得不謂之愁苦哉此雖與兄弟相逺而伏臘稍足居室稍寬無應接奔走之勞耳目清曠不設機關以待人心安間而體舒放三商而眠高舂而起靜院明窗之下羅列圖史琴樽以自愈恱有興則泛小舟出盤閭二門吟嘯覽古於江山之間渚茶野釀足以銷憂􅐜鱸稻蟹足以適口又多高僧隱君子佛廟勝絶家有林圍珍花奇石曲池高臺魚鳥留連不覺日暮昔孔子作春秋而夷吳又曰吾欲居九夷觀今之風俗樂善好事知豫守道好學皆欣然過從不以罪人相遇雖孔子復生必欲居此也人生內有自得外有所適固亦樂矣何必高位厚祿役人以自奉飬然後為樂今雖僑此亦如仕宦南北安可與親戚常相守耶豫窘迫勢不得如持國意必使我尸轉溝洫肉餧豺虎何其忍耶詩曰凡今之人莫如兄弟兄弟以恩急難必相拯救後章曰喪亂既平既安且寧雖有兄弟不如友生謂友朋尚義安寧之時以禮義相琢磨豫於持國外兄弟也急難不相救又於未安寧之際欲以義相琢刻雖古人所不能受豫欲不報慮淺吾持國也胡武平嘗奉勑撰溫成皇后哀冊當時受㫖以溫成嘗因禁卒竊發捍衛有功而秉筆者不能文其實公乃用西漢馬何羅觸瑟馮媛當熊二事以狀其意曰在昔禁闈誰何弛衛觸瑟方警當熊已屬覽者無不歎服東都事略曰胡宿字武平常州晉陵人為人清儉謹默內剛外和羣居不譁笑與人言必思而後對􅊩官臨事謹重不輒發發亦不可回試館閣校勘遷端明殿學士諡文恭劉原父已見文章敏贍嘗直舍人院一日追封皇子公主九人命原父草制方下直為之立馬却坐一揮悉就文辭典麗各得其體歐陽文忠聞而歎曰昔王勃一日草五王䇿未足多也王荆公在蔣山時以近製示蘇子瞻中有騷語云積李兮縞夜崇桃兮炫晝子瞻曰自屈宋沒後曠千餘年無復離騷句法乃今見之荆公曰非子瞻見諛某自負亦如此王荆公在鍾山有客自黃州來公曰東坡近日有何妙語客曰東坡宿於臨臯亭醉夢而起作成都聖像藏記千有餘言㸃定才一兩字有寫本適留船中公遣人取至時月出東南林影在地公展讀於風簷喜見眉鬚曰子瞻人中龍也然有一字未穩客請之公曰日勝日負不若曰如人善博日勝日貧耳東坡聞之拊手大笑亦以公為知言蘇子瞻自黃徙汝過金陵荆公野服乘驢謁於舟次子瞻迎揖曰軾今日敢以野服見大丞相公笑曰禮豈為我輩設哉乃相招遊蔣山在方丈飲茶公指案上大硯曰可集古詩聮句賦此子瞻應聲曰軾請先道一句因大唱曰巧匠斫山骨公沉思良久起曰且趂此好天色窮覽蔣山之勝此非所急也田承君田晝别見與一二客從後觀之田曰荆公尋常好以此困人門下士往往辭以不能如蘇公豈得以此懾伏蘇子瞻奉祠西太乙見荆公舊題六言詩曰楊柳鳴蜩緑暗荷花落日紅酣三十六陂春水白頭相見江南注目久之曰此老野狐精也蘇子瞻渡江至儀真和荆公遊蔣山詩後寄示荆公公亟取讀至峯多巧障日江逺欲浮天撫几歎曰老夫一生作詩無此二句荆公為許子春作家譜子春寄示歐陽永叔而隱其名永叔未及觀後因曝書讀之稱善初疑荆公作既而曰介甫安能為必子固也曾南豐表中語有曰鈎陳太微星緯咸若崑崙渤澥波濤不驚陳履常甚愛之嘗曰此語信為竒偉東都事略曰曾鞏字子固撫州南豐人生而警敏十二能文及冠遊太學歐陽修見其文而奇之自是名聞天下舉進士為集賢校理平生嗜書家藏至二萬卷又集古今篆刻為金石録五百卷蘇東坡荔枝詩有云海中仙人絳羅𥜗紅綃中單白玉膚當時絶歎以為工蘇子由嘗云豫少作文要使心如旋床大事大圓成小事小圓轉每句如珠圓蘇子由云讀書須學為文餘事作詩耳徐師川是山谷外生晚年欲自立名客有稱其源自山谷者公讀之不樂答以小啓曰涪翁之妙天下君其問諸水濵斯道之大域中我獨知之濠上周輝清波雜志曰東湖徐師川名俯視山谷為外家紹興初由諫垣遷翰苑贊機命耶律良讀書醫無閭山學既博將入南山肄業友人止之曰爾無僕御驅馳千里縱聞見過人年亦垂暮今若即仕已有餘地良曰窮通命也非爾所知不聽留數年而歸遼史曰耶律良字習撚小字蘇著帳郎君之後生於乾州重熙中為燕趙王近侍以家貧詔乘厩馬遷修起居注㑹獵秋良進秋游賦上嘉之清寧中上幸鴨子河作捕魚賦由是寵遇稍隆遷知制誥蕭蒲離不謝絶人事卜居抹古山屏逺葷茹潜心佛書延有道者談論彌日人問所得何如但曰有深樂惟覺六鑿不相攘餘無知者遼史曰蕭蒲離不字挼懶魏國王惠之四世孫父母蚤喪鞠於祖父兀古匿性孝悌年十三兀古匿卒自以早失怙恃復遭祖喪哀毁踰禮族里嘉歎纍徴皆以疾辭元明善以文學自負元史曰元明善字復初大名清河人拓跋魏之裔頴悟絶出讀書過目輒記諸經皆有師法尤深於春秋弱冠游吳浙東使者薦為安豐建康兩學正辟掾行樞密院時董士選僉院事待之若賔友士選升江西左丞辟為省掾纍官翰林學士河南行省左丞嘗問吳幼清五經奧義退而歎曰與吳先生言如探淵海遂執弟子禮終其身元史曰吳澄字幼清撫州崇仁人高祖曄居華蓋臨川二山間望氣者言其地當出異人澄三嵗頴悟日發教之古詩隨口成誦五嵗日受千餘言夜讀書至旦母憂過勤節其膏火澄候母寢燃火復誦既長於經𫝊皆習通之程巨夫奉詔求賢起澄至京師母老辭歸董士選薦澄有道擢翰林應奉學者稱為草廬先生𡊮伯長學士博聞洽識江左絶倫嘗語張伯雨曰宋東都典故能以嵗記之度江後事能月記之張伯雨輟耕録曰道士張伯雨號句曲外史又號貞居嘗從王溪月真人入京初謁虞先生虞集己見先生不與言儒者事只問道家典故伯雨略相酬對或不能詳復問伯雨能作幾家符伯雨對不能先生曰集試書之以質是否連書七十二家伯雨歎伏輒下拜曰真吾師也自是交欵甚密與先生書必稱弟子陳治中輟耕録曰陳孚字剛中臨海縣人以薦入翰林使交州有功授治中典鄉郡終老焉嘗與吕徽之相遇于道治中時猶布衣䇿蹇驢行見徽之風神高逺問曰君得非吕徽之乎曰然徽之亦問君非陳剛中乎遂握手若平生歡因共疏驢事徽之言一事治中答一事互至四十餘事治中已竭徽之曰我尚記得某出某書某出某書復三十餘事治中深歎以為不能及語林卷九
