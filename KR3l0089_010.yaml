body:
  text: 語林卷十明何良俊撰言志第五上夫志之於人大矣孟子曰志至焉仲尼燕居則使其羣弟子言志故曰隱居以求其志又曰匹夫不可奪志也范蠡曰君行令臣行意夫意亦志也假使李斯遂行其志安得身陷大戮逮夫詣市而始有牽黃犬出上蔡東門之悔不亦晚乎嘗怪主父偃言曰生不五鼎食死則五鼎烹昔人以果如其言痛之嗚呼斯殆其志之所安又何傷焉余厯觀古人性樂魚鳥則以伊呂為管庫口悅芻豢則以巢許為卒飬靜躁懸殊亦各從其好也然衆言淆亂當取𠂻於聖人求之孔門則由之勇賜之辨其或心存民社志在禮樂非不可以興建事功並垂竹素而夫子獨曰回也多財願為之宰又吾與之歎獨於曾㸃何耶此則志之髙下得失槩可見矣馮敬通才髙志大不戚戚於貧賤居常慷慨歎曰衍少事名賢經厯顯位懷金垂紫揭節奉使不求苟得常有陵雲之志三公之貴千金之富不得其願不槩於懷貧而不衰賤而不恨年雖疲曵猶庶幾名賢之風修道德於幽冥之路以終身名為後世法居貧年老卒于家范曅後漢書曰馮衍字敬通京兆杜陵人祖野王元帝時大鴻臚衍幼有竒才更始將軍廉丹辟為掾光武時新陽侯隂就敬重衍與之交結帝懲西京外戚賔客皆以法繩之衍由此得罪西歸故郡閉門自保不復與親故通桓君山嘗從班嗣借莊子班報曰吾子聞仁義之羈絆係聲名之韁鎖伏孔氏之軌躅馳顔閔之極藝何以大道為自眩也昔有學步邯鄲者失其故步匍匐而歸耳其行已持論如此後終于家魏𨽻高士傳曰班嗣世在京師家有賜書內足於財父黨揚子雲以下莫不造門延叔堅著作東觀以病免歸教授家巷時越雋太守李文德素善叔堅語羣公曰延叔堅有王佐之才奈何屈千里之足欲令薦引之叔堅為書止文德曰夫道之將廢所謂命也流聞乃欲相為求還東觀來命雖篤所未敢當吾昧爽櫛梳坐於客堂朝則誦羲文之易虞夏之書厯公旦之典禮覽仲尼之春秋夕則消搖內階詠詩南軒百家衆氏投閒而作洋洋乎其盈耳煥爛兮其溢目紛紛欣欣兮其獨樂也當此之時不知天之為蓋地之為輿不知世之有人已之有軀雖漸離擊筑傍若無人高鳳讀書不知暴雨方之於吾未足况也且吾自束修己來為人臣不陷於不忠為人子不陷於不孝上交不諂下交不黷從此而殁下見先君逺祖可不慙赧如此而不以善止恐如教羿射者也慎勿迷其本棄其生後遭黨事禁錮卒于家鄉里圖其形于屈原廟袁山松後漢書曰延篤字叔堅南陽犨人少從唐溪典受左氏傳之先賢行狀曰篤欲寫左傳無紙唐溪典以廢箋記與篤以箋記紙不可寫借本諷之糧盡辭歸典曰卿欲寫傳何故辭歸篤曰已諷之矣典聞歎曰嗟乎延生雖復端木聞一知二未足為喻若使尼父更起於洙泗君當編名七十與游夏爭匹也梁伯鸞居常閉户吟詠書記范曅後漢書曰梁鴻字伯鸞扶風平陵人受業太學家貧尚節介博覽不為章句學畢牧豕上林苑中誤遺火延及他舍鴻尋訪燒者悉以豕償之其主猶以為少鴻曰無他財願以身居作因為執勤不懈鄰家耆老共責讓主人而稱鴻長者始敬異焉悉還其豕鴻不受而去歸鄉里勢家慕其高節多欲女之鴻並不娶同縣孟氏有女肥醜而黑力舉石臼擇對不嫁父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之始以裝飾入門七日而鴻不答妻跪床下請曰竊聞夫子髙義簡斥數婦妾亦偃蹇數夫今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隱深山者今衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也字之曰德曜名孟光居有頃妻曰常聞夫子欲隱居避患今何為默默無乃欲低頭就之乎鴻曰諾乃入霸陵山中以耕織為業詠詩彈琴以自娛仰慕髙士為四皓以來二十四人作頌因東出關過京作五噫歌曰陟彼北芒兮噫顧覽帝京兮噫宮室崔嵬兮噫人之劬勞兮噫遼遼未央兮噫肅宗聞而非之乃易姓名居齊魯之間有頃去適吳作詩曰遊舊邦兮遐征將遙集兮東南心惙怛兮傷悴志菲菲兮升降欲乘䇿兮縱邁疾吾俗兮作讒競舉枉兮措直咸先佞兮唌唌固靡慙兮獨建冀異州兮尚賢聊逍遙兮遨嬉纘仲尼兮周流儻云覩兮我悅遂舍車兮即浮過季札兮延陵求魯連兮海隅雖不察兮光貌幸神靈兮與休惟季春兮華阜麥含含兮方秀哀茂時兮逾邁愍芳香兮日臭悼吾心兮不獲長委結兮焉究口囂囂兮余訕嗟恇恇兮誰留至吳依臯伯通居廡下為人賃舂妻具食舉案齊眉伯通異之曰彼傭能使其妻敬之如此非凡人也乃舍之於家鴻潜閉著書十餘篇疾且困告主人曰昔延陵季子葬于嬴博之間不歸鄉里慎勿令我子持喪歸及卒伯通為求葬地於要離冢傍咸曰要離烈士伯鸞清髙可令相近葬畢妻子歸扶風梁敬叔坐兄纍逺竄九真既徂南土厯江湖濟沅湘感悼子胥屈原以非辜沉身作悼騷賦繫𤣥石而沉之梁敬叔自負其才鬱鬱不得意登山逺望輒歎息言曰大丈夫生當封侯死當廟食如其不然閒居足以飬志詩書足以自娛州郡之職徒勞人耳馬季長善鼓琴好吹笛逹生任性不拘儒者之節大將軍鄧隲聞季長名召為舍人非其好也遂不應命後客遊凉州㑹羌亂米貴關西道殣相望季長既饑困乃歎息曰古人有言左手據天下之圖右手刎其喉愚夫不為所以然者生貴於天下也今以曲俗咫尺之羞滅無資之軀殆非老莊所謂矣遂應隲召范曅後漢書曰馬融字季長扶風茂陵人將作大匠嚴之子為人美辭貌有俊才趙邠卿年三十許有重疾卧蓐七年自慮奄忽乃為遺令勑兄子曰大丈夫生世遁無箕山之操仕無伊呂之勳天不我與復何言哉可立一員石於吾墓前刻之曰漢有逸人姓趙名嘉有志無時命也奈何其疾竟瘳摯虞三輔决録注曰趙岐字邠卿京兆長陵人初名嘉少明經有才藝仕州郡以廉直疾惡見憚娶馬敦女宗姜為妻敦兄子融嘗至岐家多從賔與從妹宴飲作樂日夕乃出過問趙處士所在岐亦厲節不以妹聓之故屈志於融與其友書曰馬季長雖有名當世而不持士節三輔髙士未曾以衣裾撇其門也曾讀周官二義不通一造之其賤融如此趙邠卿先自為壽藏圖季札子産晏嬰叔向四像居賔位圖已像居主位皆為讚頌勑其子曰我死之日墓中聚沙為牀布簟白衣散髮其上覆以單被即日便下下訖便掩仲長公理以為凡遊帝王者欲以立身揚名而名不常存人生易滅優遊偃仰可以自娛欲卜居清曠以樂其志因論之曰使居有良田廣宅背山臨流溝池環匝竹木周布場圃築前果園𣗳後舟車足以代步涉之艱使令足以息四體之役飬親有兼珍之膳妻孥無苦身之勞良朋萃止則陳酒肴以娛之嘉時吉日則烹羔豚以奉之蹰躇畦苑遊戲平林濯清水追凉風釣遊鯉弋髙鴻風於舞雩之下詠歸髙堂之上安神閨房思老氏之𤣥虛呼吸精和求至人之倣佛與達者數子論道講書俯仰二儀錯綜人物彈南風之雅操發清商之妙曲逍遙一世之上睥睨天地之間不受當時之責永保性命之期則可以陵霄漢出宇宙之外矣豈羡夫入帝王之門哉范曅後漢書曰仲長統字公理山陽高平人少好學博涉書記贍於文辭俶儻敢言不矜小節默語無常時人謂之狂生統嘗作詩以見志其詞曰飛鳥遺跡蟬蛻亡殼螣蛇棄鱗神龍喪角至人能變達士拔俗乘雲無轡騁風無足垂露成幃張霄成幄沆瀣當餐九陽代燭恆星艷珠朝霞潤玉六合之內恣心所欲人事可遺何為局促大道雖夷見幾者寡任意無非適物無可古來繞繞委曲如瑣百慮何為至要在我寄愁天上埋憂地下叛散五經滅棄風雅百家雜碎請用從火抗志山栖游心海左元氣為舟微風為柂敖翔太清縱意容冶張彥真張升己見好學博聞而任情不羈其意相合者則傾身交結不問窮賤如乖其志好雖王公大人終不屈從常歎曰死生有命富貴在天其有知我者秦越可親苟或不然從物何益許子伯嘗與友人言次因及漢無統嗣幸臣專朝世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭世謝承後漢書曰許慶字子伯家貧為郡督郵常乘牛車鄉里號曰軺車督郵趙溫居常歎曰大丈夫當雄飛安能雌伏范曅後漢書曰趙溫字子柔蜀郡成都人先是趙典為衛尉典兄子謙謙弟溫相繼為三公陳仲舉獨居一室荒穢不掃人問之答曰大丈夫當掃除天下安事一室孔北海居家失勢賔客日滿其門愛才樂士常若不足每歎曰坐上客常滿尊中酒不空吾無憂矣邴根矩童齔之中嶷然有異及長金玉其行逺遊從師單步負笈苦身持力邴原己見後原别傳曰原舊能飲酒自行之八九年酒不向口臨别師友以原不飲㑹米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當逺别因見貺餞可一飲燕於是共坐飲酒終日不醉至陳留則師韓子助𡊮山松後漢書曰韓卓字子助臘日奴竊食祭其先卓義其心即日免之潁川則宗陳仲弓陳實己見汝南則交范孟博范滂己見涿郡則親盧子幹范曅後漢書曰盧植字子幹身長八尺二寸音聲如鐘與鄭𤣥俱事馬融能通古今學好研精不守章句融外戚豪家多列女倡植侍講積年未嘗轉盼學終辭歸闔門教授性剛毅有大節常懷濟世志不好辭賦能飲酒一石管公明管輅己見常自言知我者希則我貴矣安能斷江漢之波為激石之流樂與季主諭道不欲與漁父同舟諸葛孔明在荆州遊學每晨夜恆抱膝長嘯蜀志曰諸葛亮字孔明琅琊陽都人父圭字君貢太山郡丞亮早孤躬耕隴畝好為梁父吟身長八尺每自比管仲樂毅時人莫之許也唯博陵崔州平潁川徐元直謂為信然孟魚豢魏略曰亮在荆州與潁川石廣元徐元直汝南公威俱遊學三人務於精熟亮獨觀其大略謂三人曰卿三人仕進可至刺史郡守三人問其所至亮但笑而不言後公威思鄉里欲北歸亮曰中國饒士大夫遨遊何必故鄉耶秦子勑少有才學屢辭辟命蜀志曰秦宓字子勑廣漢綿竹人不仕劉焉建興中武侯領益州牧迎為别駕遷大司農宓見帝系之文五帝同出一族辨其不然又論皇帝王霸養龍之說甚有通理譙周數往咨訪記録其言於春秋然否論同郡王商勸令仕云貧賤困苦亦何可以終身子勑答曰昔堯優許由非不𢎞也洗其兩耳楚聘莊周非不廣也執竿不顧僕得曝背隴畝之中誦顔氏之簞瓢詠原憲之蓬户時翺翔於林澤與沮溺為等儔聽𤣥猿之悲吟察鶴鳴於九臯安身為樂無憂為福處虛空之名居不靈之龜知我者希則我貴矣斯乃僕得志之秋何困苦之戚益部耆舊傳曰王商字文表廣漢人以才學稱聲聞著於州里劉璋辟為治中從事時許靖號為臧否至蜀見商稱之曰使商生於華夏王景興無以加也璋以為蜀郡太守成都禽堅有孝行商表其墓追贈孝亷與嚴君平李𢎞立祠作銘以旌先賢修學廣農百姓便之鄭泉博學有竒姿而性嗜酒間居常曰願得美酒滿五百斛船以四時肥甘置兩頭反覆沒飲之憊即住而啖肴膳酒有升斗減隨即益之不亦快乎吳書曰鄭泉字文淵陳郡人博學有竒志而性嗜酒仕吳官太中大夫使蜀先主問曰吳王何以不答吾書得無以吾正名不宜乎泉曰曹氏凌轢漢室終奪其位殿下既為宗室有維城之責不荷戈執殳為海內率先而於是自名未合天下之議是以寡君未復書耳先主有慙色鄭泉臨卒時語同輩曰必葬我陶家之側庶百嵗之後化而成土幸見取為酒壺實獲我心矣虞仲翔放棄南方虞翻己見自吳志曰翻性疏直數有酒失權嘗起行酒翻伏地陽醉不持權去乃起坐權手劒欲擊之大司農劉基抱權諫曰大王以三爵之後手殺善士雖翻有罪天下孰知之且大王以容賢畜衆海內望風何故一朝棄之權曰曹孟德尚殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王欲與堯舜比隆何得自喻於彼由是得免權又與張昭論神仙翻指昭曰彼皆死人而語神仙世豈有仙人也權積怒非一遂徙翻交州雖處罪放而講學不倦門徒常數百人自恨疏節骨體不媚犯上獲罪當長沒海隅生無可與語死以青蠅為吊客使天下一人知己者足以不恨阮嗣宗容貌瓌傑志氣宏放傲然獨得任性不羈或閉户視書纍月不出或登臨山水經日忘歸晉書曰阮籍字嗣宗陳留尉氏人父瑀魏丞相掾率魏氏春秋曰籍曠逺不羈不拘禮俗性至孝居喪不常檢而毁幾滅性兖州刺史王昶請與相見終日不得與言自以為不能測也阮步兵率意獨駕不由徑路車跡所窮輒慟哭而返嘗登廣武觀楚漢戰處歎曰時無英雄使豎子成名魏氏春秋曰籍登蘇門山因假蘇門先生之論以寄所懷其歌曰日沒不周西月出丹淵中陽精蔽不見隂光代為雄亭亭在須臾厭厭將復隆富貴俯仰間貧賤何必終又歎曰天地解兮六合開星辰隕兮日月頽我騰而上將何懷惟晉書曰籍又著大人先生傳其略曰世之所謂君子法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見羣虱之處褌中逃乎深縫匿乎敗絮自以為吉兆也行不敢離縫際動不敢出褌襠自以為得繩墨也炎􅏀火流焦邑滅都羣虱處於褌中而不能出也君子之處域內何異夫虱之處褌中乎此亦籍之胸懷本趣也東平呂安世語曰呂昭字子展東平人長子巽字長悌為相國掾有寵於司馬文王次子安字仲悌與嵇康厚善與康俱被誅服嵇中散高致嵇康别傳曰嵇康字叔夜譙國銍人父昭字子逺康家世儒學少有雋才曠邁不羣高亮任性不修名譽寬簡有大量學不師授博洽多聞長好老莊之業恬靜無欲性好服食善屬文論彈琴詠詩自足於懷遂放世事縱意於塵埃之表撰録上古以來聖賢隱逸遁心遺名者集為傳贊自混沌至于管寧凡百一十九人蓋求之於宇宙之內而發之乎千載之外者矣故世莫得而名焉每一相思輒千里命駕干寶晉紀曰呂安友嵇康相思則命駕千里從之或遇其出康兄喜位至方伯拭席而待弗之顧也獨宿車中康母設酒求康兒共戲則去向子期臧榮緒晉書曰向秀字子期河內懷人少有不羈之志嵇康被誅秀應本州計入洛晉書曰秀清悟有逺識少為山濤所知嘗注莊子內外十篇發明竒趣振起𤣥風讀者莫不超然心悟初秀欲注康曰此書詎復須注正是妨人作樂耳及成示康曰殊復勝否又與康論飬生辭難往復蓋欲發康髙致也譙國嵇康東平呂安友善向秀思舊賦序曰余與嵇康呂安居止接近其人並有不羈之才然嵇意逺而踈呂心曠而放並有拔俗之韻其進止無不同而造事營生業亦不異嘗與嵇康偶煆於洛邑同呂安灌園於山陽不慮家之有無外物不足怫其心弱冠著儒道論棄而不録或勸皇甫士安皇甫謐己見修名廣交士安答曰自非聖人孰能兼存出處居田里之中亦可以樂堯舜之道何必崇接勢利事官鞅掌然後為名乎作𤣥守論以見志謐𤣥守論曰或謂謐曰富貴人之所欲貧賤人之所惡何故委形待於窮而不變乎且道之所貴者理世也人之所美者及時也先生年邁齒變饑寒不贍轉死溝壑其誰知乎謐曰人之所至惜者命也道之所必全者形也性形所不可犯者疾病也若擾全道以損性命安得去貧賤存所欲哉吾聞食人之祿者懷人之憂形强猶不堪况吾之弱疾乎且貧者士之常賤者道之實處常得實沒齒不憂孰與富貴擾神耗精者乎又生為人所不知死為人所不惜至矣喑聾之徒天下之有道者也夫一人死而天下號者以為損也一人生而四海笑者以為益也然則號笑非益死損生也是以至道不損至德不益何哉體足也如迥回天下之念以追損生之禍運四海之心以廣非益之病豈道德之至乎夫唯無損則至堅矣夫唯無益則至厚矣堅故終不損厚故終不薄茍能體堅厚之實居不薄之真立乎損益之外游乎形骸之表則我道全矣謐又作釋勸曰客曰蓋聞天以懸象著明地以含通吐靈故黃鍾次序律呂分形春華發蕚夏繁其實秋風逐暑冬冰乃結人道以之應機乃發故士或同升於唐朝或先覺於有莘或通夢以感主或釋釣於渭濵或叩角以干齊或解褐以相秦或冒謗以安鄭或乘駟以救屯或班荆以求友或借術於黃神故能電飛景拔超次邁倫騰髙聲以奮逺抗宇宙之清音由此觀之進德貴乎及時何故屈此而不伸今子以英茂之才游精於六藝之府散意於衆妙之門者有年矣既遭聖明之主偶知己之㑹時清道真可以冲邁此吾生濯髮雲漢鴻漸之秋也韜光逐藪含章未曜棄通道之逺由守介人之局操無乃乖於道之趣乎且吾聞招搖昏迥回則天位正五教班叙則人理定今王命切至上招忤主之纍下致駭衆之疑達者貴同何必獨異羣賢可從何必守意方今同命並臻饑不待餐振藻皇塗咸秩天官子獨栖遲衡門放形世表惠不加人行不合道身嬰大疢性命難保若其羲和促轡大火西頽臨川恨晚將復何階夫貴隂賤璧聖所約也顛倒衣裳明所針也子其鍳先哲之洪範副聖朝之虛心冲靈翼於雲路浴天池以濯鱗排閶闔步玉岑登紫闥侍北辰翻然景曜雜沓英塵輔唐虞之主化堯舜之人宣刑措之政配殷周之臣銘功景鐘參叙彛倫不亦茂哉而忽金白之輝曜忘青紫之班瞵辭容服之光粲抱敝褐之終年無乃勤乎主人笑而應之曰吁若賔可謂習外觀之暉暉未覩幽人之髣佛也見俗人之不容未喻聖皇之兼愛也循方圓於規矩未知大形之無外也故曰天𤣥而清地靜而寧含羅萬類旁薄羣生寄身聖世託道之靈若夫春以陽散冬以隂凝泰液含光元氣混蒸衆品仰化誕制殊徴故進者享天祿處者安邱陵寒暑相椎四宿代中隂陽不治運化無窮自然分定兩克厥中二物俱靈是謂大同彼此無怨是謂至通若乃衰周之末貴詐賤誠牽於權力以利要榮故蘇子出而六主合張儀入而橫勢成亷頗存而趙重樂毅去而燕輕公叔沒而魏敗孫臏刖而齊寧蠡種親而越霸屈子踈而楚傾是以君無常籍臣無定名損義放誠一虛一盈故馮以彈劍感主女有反賜之說項奮拔山之力蒯陳鼎足之勢東郭劫於田榮顔闔耻於見逼斯皆棄禮喪真茍榮朝夕之急者也豈道化之本與若乃聖帝之創化也參德乎二皇齊風乎虞夏欲溫溫而和暢不欲察察而明切也欲混混若𤣥流不欲蕩蕩而名發也欲索索而條解不欲契契而繩結也欲芒芒而無垠際不欲區區而分别也欲暗然而內章不欲示白若氷雪也欲醇醇而任德不欲瑣瑣而執法也是以見機者以動成好遁者無所迫故曰一明一昧得道之槩一弛一張合禮之方一浮一沈兼得其真故上有勞謙之愛下有不名之臣朝有聘賢之禮野有遁竄之人是以支伯以幽疾距唐李老寄跡於西鄰顔氏安陋以成名原思娛道於至貧榮期以三樂感尼父黔婁定諡於布衾干木偃息以存魏荆萊志邁於江岑君平因蓍以道著四皓潜德於洛濵鄭真躬耕以致譽幼安發守乎今人皆持難奪之節執不回之意遭拔俗之主全彼人之志故有獨定之計者不借謀於衆人守不動之安者不假慮於羣賔故能棄外觀之華通內道之真去顯顯之明路入昧昧之埃塵宛轉萬情之形表排託虛寂以寄身居無事之宅交釋利之人輕若鴻毛重若泥沈損之不得測之愈深真吾徒之師表余迫疾而不能及者也子議吾失宿而駭衆吾亦怪子較論而不折中也夫才不周用衆所斥也寢疾彌年朝所棄也是以胥克之廢丘明列焉伯牛有疾孔子斯歎若黃帝創制於九經岐伯剖腹以蠲腸扁鵲造虢而尸起文摯徇命於齊王醫和顯術於秦晉倉公發祕於漢王華他存精於獨識仲景垂妙於定方徒恨生不逢乎若人故乞命訴乎明王求絶編於天籙亮我躬之辛苦冀微誠之降霜故俟罪而窮處羊太傅虞預晉書曰羊祜字叔子泰山南城人世為二千石至祜九世清德祖續漢南陽太守父道上黨太守祜蔡雍外孫少有異表太原郭奕見之曰此今之顔子也與王沈俱被曹爽辟沈勸就之祜曰委質事人復何容易爽敗沈謂祜曰常識卿前語祜曰此非始慮所及好山水每風景必造峴山置酒言詠終日不倦嘗慨然歎息顧謂從事中郎鄒湛曰晉諸公贊曰湛字潤甫新野人以文義達仕至侍中自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷如百嵗後有知我魂魄猶應登此王夷甫有雋才美姿明悟若神常自比子貢顧彥先機神朗悟在廷尉時恆縱酒酣暢謂友人張季鷹曰唯酒可以忘憂但無如作病何耳文士傳曰顧榮字彥先吳郡人其先越王勾踐之支庶封於顧邑子孫遂氏焉世為吳著姓大父雍吳丞相父穆宜都太守榮朗俊機警風頴標徹厯廷尉正張季鷹文士傳曰張翰字季鷹父儼吳大鴻臚翰有清才美望博學善屬文造次立成辭義清新齊王冏辟為東曹掾翰以疾歸府以輒去除吏名性至孝遭母艱哀毁過禮自以年宿不營當世以疾終於家見齊王冏執權虞預晉書曰冏字景治齊王攸子也少聰惠及長謙約好施趙王倫篡位冏起義兵誅倫拜大司馬政皆决之恣用羣小不復朝覲為長沙王所誅謂同郡顧彥先曰天下紛紛禍難未已夫有四海之名者求退良難吾本山林間人無望於時子善以明防前以智慮後顧捉季鷹手愴然曰吾亦與子採南山蕨飲三江水耳陸平原在洛陸機己見夏月忽思齊東頭竹篠中飲語劉寶曰吾思鄉轉深矣郭景純不持儀檢形質頽索縱情惰慢時有醉飽之失王隱晉書曰郭璞字景純河東聞喜人父瑗建平太守璞别傳曰璞竒博多通文藻粲麗才學賞豫足參上流其詩賦誄頌並傳於世而訥於言造次詠語常人無異著作郎干寶嘗戒之曰晉中興書曰干寶字令升新蔡人祖正吳奮武將軍父瑩丹陽丞寶少以博學才器著稱厯散騎常侍此非適性之道景純曰吾所受有分用之恆恐不盡卿乃憂酒色為害耶璞别傳曰王敦縱兵都輦咨以大事璞極言成敗不為回屈敦忌而害之𢎞農王粹以貴門尚主館宇𢎞麗圖莊周於室廣集朝士使嵇君道為之讚晉書曰嵇含字君道祖喜徐州刺史父蕃太子舍人含好學能屬文家在鞏縣亳邱自號亳邱子門曰歸厚之門室曰慎終之室楚王瑋辟為掾嵇援筆為吊文文不加㸃其序曰帝壻王𢎞逺華池豐屋廣延朝彥圖莊生垂綸之象記先達辭聘之事畫真人於刻桷之室載退士於進趣之堂可謂托非其所可吊不可讃也其辭曰邁矣莊周天縱特放大塊授其生自然資其量器虛神清窮𤣥極曠人僞俗季真風既散野無訟屈之聲朝有爭寵之歎上下相陵長幼失貫於是借𤣥虛以助溺引道德以自奬户詠恬曠之辭家畫老莊之象今王生沈淪名利身尚帝女連耀三光有出無處池非岩石之溜宅非茅茨之宇馳屈産於皇衢畫兹象其焉取嗟乎先生髙跡何局生處巖岫之居死寄雕楹之屋託非其所沒有餘辱悼大道之湮晦遂含悲而吐曲嵇君道言陸平原作子書未成余一門生昔在平原軍中常在左右見平原臨亡歎曰窮通時也遭遇命也古人貴立言以為不朽吾所作子書未成以此為恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓談新論未畢而終班固為其成琴道今才士何不贊成陸公子書漢時侍中習郁嘗於峴山南依范蠡飬魚法作池池邊有髙隄遍種長楸修竹芙蓉緣岸菱芡覆水是游宴名處山季倫臨荆州時每到此池未嘗不大醉而還曰此是我髙陽池虞預晉書曰山簡字季倫平雅有父風與嵇紹劉漠齊名遷尚書出為平南將軍王藍田初因家貧求試宛陵令頗受賂遺為州司所檢有一千三百條王丞相使謂之曰名父之子不患無祿屈臨小縣甚不宜爾藍田答云足自當止時人未喻也後屢居州郡清潔絶倫祿賜皆散之親故始為當時所歎王述别傳曰述字懷祖太原晉陽人祖湛父承並有髙名述蚤孤事親孝謹簞瓢陋巷晏安永日由是為有識所知襲爵藍田侯習鑿齒己見與譙國桓祕並以才氣相推及鑿齒罷滎陽郡歸與桓書曰吾以五月三日來達襄陽觸目悲感略無歡情痛惻之事故非書言所能具也每定省家舅從北門入西望隆中想卧龍之吟東眺白沙思鳳雛之聲北臨樊墟存鄧老之髙南眷城邑懷羊公之風縱目檀溪念崔徐之友肆睇魚梁追二德之逺未嘗不徘徊移日惆悵極多撫乘躊躇慨爾而泣若乃魏武之所置酒孫堅之所隕斃裴杜之故居繁王之舊宅遺事猶存星列滿目瑣瑣常流碌碌凡士焉足感其方寸哉夫芬芳起於椒蘭清響生乎琳琅命世而作佐者必垂可大之餘風髙尚而邁德者必有明勝之遺事若向八君子者千載猶使義想其為人况相去之不逺乎彼一時此一時焉知今日之才不如疇辰百年之後吾與足下不並為景行乎是皆情志所寄當時賞其風期俊邁晉書曰桓祕字穆子桓彛第四子小有才氣不倫於俗初拜祕書郎兄溫抑而不用久之為宣城內史王右軍少有美名在朝諸人愛其才氣頻召為吏部尚書侍中皆不就復授護國將軍又推遷不拜殷中軍殷浩己見素重右軍勸使應命與右軍書曰悠悠者以足下出處足觀政之隆替如吾等亦謂為然至如足下出處正與隆替對豈可以一世之存亡必從足下從容之適幸徐求衆心卿不時起復何以求美政不若豁然開懷當知萬物之情也右軍報書言吾素自無廊廟直王丞相時果欲內吾誓不許之手跡猶存由來尚矣不於足下參政而方進退俟兒婚女嫁便懷尚子平之志數與親知言之非一日也若蒙驅使關隴巴蜀皆所不辭吾雖無專對之能直謹守時命宣國家威德固當不同於凡使必令逺近咸知朝廷留心於無外此所益殊不同居護軍也漢末使太傅馬日磾慰撫關東若不以吾輕微無所為疑宜及冬初以行吾惟恭以俟命王右軍既懷靜退優游無事與吏部郎謝萬書曰古之辭世者或被髮佯狂或汚身穢跡今僕坐而獲免遂其宿心其為慶幸豈非天賜頃東遊還修植桑果今盛敷榮率諸子抱弱孫游觀其間有一味之甘割而分之以娛目前雖植德無殊邈猶欲教飬子孫以敦厚退讓戒以輕薄庶令舉䇿數馬倣佛萬石之風君謂此何如比當與安石東遊山海并行田視地利頥飬間曠衣食之餘欲與親知時共歡宴雖不能興言髙詠銜杯引滿語田里所行故以為撫掌之資其為得意可勝言耶常依陸賈班嗣楊王孫之處世老夫志願盡於此矣晉中興書曰謝萬字萬石太傅安弟也才氣髙俊蚤知名厯吏部西中郎將豫州刺史戴安道少有清操恬和通任甚為劉真長所知性甚快暢泰於娛生好鼓琴善屬文尤樂遊宴多與髙門風流者遊談者許其通隱屢辭徴命遂著髙尚之目晉安帝紀曰戴逵字安道譙國人也有美才謝太傅於東土山營墅樓館林竹甚盛每擕中外子姪往來遊集肴饌常費百金頗以此獲譏謝殊不以屑意謝太傅神識沉敏風宇條暢先居㑹稽與支道林王逸少許元度諸人常共遊處出則漁弋山水入則言詠屬文未嘗有處世意後以辭命被禁遂栖遲東土往臨安山中坐石室臨濬谷悠然歎曰此亦伯夷何逺謝太傅與支道林書曰人生如寄耳終日戚戚遲君一來以晤言銷之張天錫在北數游宴園池頗廢政事時有諫者天錫曰吾非好行行有得也觀朝榮則敬才秀之士玩芝蘭則愛德行之臣覩松竹則思貞操之賢臨清流則貴廉潔之行覽蔓草則賤貪穢之吏逢颷風則惡凶狡之徒若引伸觸類庶無遺漏矣宋武帝嘗問臨川王名映武帝弟居家何事最樂臨川曰政使劉瓛講禮顧􅀢講易朱廣之談莊老臣與二三諸彥兄弟友生時復擊歎以此為樂上大嗟賞劉穆之性奢豪食必方丈旦輒為十人饌未嘗獨餐每至食時客止十人以還帳下依常下食以此為常嘗白宋武帝曰穆之家本貧賤贍生多闕叨忝以來雖每存約損而朝夕所須微為過豐此外不敢一毫負公謝尚書自負才地少所交納臧榮緒晉書曰謝混字叔源陳郡人司空琰少子也少有美譽善屬文為尚書左僕射以黨劉毅誅與劉萬壽劉敬宣小字相遇便盡禮著歡沈約宋書曰劉敬宣字萬壽彭城人父牢之鎮北將軍敬宣寬厚善待士多伎藝弓馬音律無事不善官冀州刺史或問尚書卿未嘗輕交於人而傾蓋於萬壽何也尚書曰人之相知豈可以一途限孔文舉禮太史子義夫豈有非之者耶謝康樂為臨川內史在郡遊放不異永嘉為有司所糾司徒遣從事鄭望生收謝謝執録望生興兵叛逸為詩曰韓亡子房奮秦帝魯連耻本是江海人忠義感君子後詔於廣州棄市臨刑作詩曰龔勝無餘生李業有終盡嵇公理既迫霍生命亦殞悽悽陵霜葉網網衝風菌邂逅竟幾何修短非所愍送心自覺前斯痛久已忍恨我君子志不獲巖上泯詩所稱龔勝李業即前詩子房魯連之意也王𢎞之性好釣魚上虞江有一處名三石頭𢎞之常垂綸於此經過者不識之或問漁師得魚賣否𢎞之答曰釣亦不得得復不賣日夕載魚入上虞郭經親故門各以一兩頭置門內而去沈約宋書曰王𢎞之字方平琅琊人宣訓衛尉鎮之弟少孤貧為外祖何凖所飬從叔獻之及太原王恭甚貴重之後謝靈運顔延之並相欽重靈運與廬陵王義真箋曰㑹境既豐山水江左嘉遁並多居之但季世慕榮幽棲者寡或復才為時求弗獲從志若王𢎞之拂衣歸耕踰厯三紀孔淳之隱約窮岫自始迄今阮萬齡辭事就間纂戎先業浙河之外棲遲山澤如斯而已既逺同羲唐亦激貪厲競殿下愛素好古常若布衣每憶昔聞虛想巖穴若遣一介有以相存真可謂千載盛美也陶徴士不解音樂而蓄素琴一張每有酒適輒撫弄以寄意王公嘏在吏部時年二十四謂親友曰吾以外戚謬被時知多叨人爵本非其志兼比羸病庶務難擁安能捨其所好而狥所不能乃稱疾不拜便謝遣胥徒拒絶賔客掩扉覃思室宇蕭然南史曰王錫字公嘏太保𢎞之子曾祖洽晉中領軍祖珣晉司徒錫位至江夏內史髙自位遇江夏王當朝錫箕踞大坐略無推敬宗元幹小時叔父少文問其所志元幹答曰願乘長風破萬里浪孫巖宋書曰宗慤字元幹南陽沮人兄泌娶妻始入門夜被劫慤年十四挺身與拒衆皆披散叔少文素著髙節子弟以文義為業慤任氣好勇不為鄉曲所知劉靈預自少抗節須得祿便隱仕至晉平王驃騎記室即歸家靜處蕭子顯齊書曰劉蚪字靈預南陽涅陽人徙居江陵仕建平王驃騎記室罷官歸家斷穀餌术及胡麻張思光自名其集曰玉海禇司徒禇淵己見問其義張答曰玉以比德海崇上善張思光居常歎曰不恨我不見古人所恨古人不見我張思光家貧願祿與從叔征北張永己見書曰融昔稱幼學早訓家風雖則不敏率以成性布衣葦席弱年所安簞食瓢飲不覺不樂但世業清貧民生多待榛栗棗修女贄既長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三吳一丞雖屢舛錯今聞南康缺守願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞又語王吏部王僧䖍己見曰阮籍愛東平風土融亦欣晉平間外時議以思光非治民才竟不用張思光臨沒遺令建白旌無旅不設祭奠令人捉麈尾登屋招魂曰吾平生所善自當凌雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人哀事畢各遣還家以吾平生之風調何至使婦人行哭失聲耶王微與弟僧綽曰闔門皆蒙時私吾髙卧家巷遂至中書郎此足以闔棺也王智深宋記曰王微字景𤣥太保𢎞之弟子好學無不通覽善屬文能書十六舉秀才除右軍咨議微素無宦情徴不就齊衡陽王居身清率言未嘗及時事㑹稽孔稚圭家起園列植桐栁多搆山泉殆窮真趣衡陽往遊之稚圭曰殿下處朱門遊紫闥詎得與山人交耶答曰身處朱門而情遊江海形入紫闥而意在青雲稚圭大美之南史曰蕭鈞字宣禮齊髙帝第十一子出繼衡陽王性好學善屬文與琅琊王智深以文章交㑹濟陽江淹亦逰焉孔德璋孔稚圭己見風韻清踈好文詠飲酒七八斗與外兄張融情趣相得又與琅琊王思逺廬江何㸃㸃弟𦙍並欵交不樂世務居宅盛營山水憑几獨酌傍無雜事門庭之內草萊不剪中有蛙鳴或問之稚圭笑曰我以此當兩部鼓吹王文憲王儉己見初拜儀同王元長贈詩頗及規諷文憲甚憚之笑謂人曰穰侯印詎便可解王中書王融己見自恃人地三十內望為公輔夜直中書省歎曰作此寂寂使鄧禹笑人謝譓不妄交接門無雜賔有時獨醉嘗曰入吾室者但有清風對吾飲者唯當明月南史曰謝譓祖莊金紫光祿大夫父朏尚書令譓仕至右光祿大夫王子𤣥少有志意每讀范滂傳未嘗不為之歎悒南史曰王寂字子𤣥琅琊人僧䖍之子性迅動好文章建武初欲獻中興頌兄志謂曰汝膏梁年少何患不達不鎮之以靜將恐貽譏寂乃止位祕書郎卒年三十一丘祭酒丘靈鞠己見初領驍騎將軍丘不樂武位謂人曰我應還東掘顧榮冢江南地方數千里士子風流皆出此中顧榮忽引諸傖渡妨我輩塗轍王尚書王瞻别見性率任在選部時所舉多行其意頗嗜酒飲至旬日而精神益朗有人勸沈雲禎仕沈驎士己見沈答曰魚縣獸檻天下一契聖人𤣥悟所以每履吉先吾誠未能景行坐忘何為不希企日損作𤣥散賦以絶世語林卷十
