body:
  text: 語林卷十四明何良俊撰雅量第七昔鄙夫争一簞食聞堯讓天下而非之仲尼厄於陳蔡匡坐鼔琴子路愠見而弗是也夫茍能人我皆冥則無物不遣知有生皆幻則何險不夷此亦難與拘見褊心者道也有客薦士於王仲囘王丹己見仲囘舉之後所舉者陷罪仲囘坐以免客慙懼自絶仲囘終無所言尋復徵為太子太傅乃呼客謂曰子之自絶何待丹之薄也不為設食以罰之相待如舊公沙穆居建城山中依林阻為室獨宿無侣時暴風震雷有聲於外呼穆者三穆不與語有頃呼者自牖而入音狀甚怪穆誦經自若終亦無他聖賢羣輔錄曰公沙穆北海名士也張然明進屯長城時休屠各及朔方烏桓並同反叛燒度遼將軍門引屯赤阬煙火相望兵衆大恐各欲亡去然明安坐帷中與弟子講誦自若軍士稍安范曄後漢書曰張奐字然明敦煌酒泉人少遊三輔師事太尉朱寵學歐陽尚書舉賢良對䇿第一㩴拜議郎遷安定屬國都尉正身潔已威化大行遷使匈奴中郎將孔文舉在青州范曄後漢書曰融在北海六年劉備表為青州刺史為𡊮譚𡊮紹子所攻流矢雨集矛㦸内接孔隱几安坐讀書論義自若諸葛武侯與司馬宣王晉紀曰司馬懿字仲達河内温人猜忌多權數魏武聞其有狼顧相召使前行令反顧面正向後而身不動又嘗夢三馬同食一槽甚惡焉謂太子丕曰司馬懿非人臣也必與汝家事太子素與帝善每相全佑朱聖賢羣輔錄曰河内司馬懿仲達潁川陳羣長文譙鑠彦才濟隂吳質季重為魏文帝四友治軍渭濱克日交戰宣王戎服蒞事使人視武侯獨乗素輿葛巾毛扇指麾三軍隨其進止宣王歎曰諸葛君可謂名士矣曹公聞周公瑾年少俊才謂可以說動宻下揚州遣九江蔣幹江表傳曰幹有容儀以才辯見稱獨步江淮之間莫與為對布衣葛巾自託私行以詣公瑾公瑾出迎立謂幹曰子翼良苦逺涉江湖為曹氏作說客也幹曰與卿州里中間别隔遥聞芳烈故來叙濶拜觀雅規而云說客無乃逆詐乎公瑾曰吾雖不及夔曠聞絃賞音足知曲也因延幹入為設酒食後三日公瑾引幹徧觀營壘倉庫及軍資器仗復還張燕示以侍者服飾珍玩之物因謂幹曰丈夫處世一遇知己外托君臣之義内結骨肉之恩言行計從禍福共之假使蘇君更生酈􅅱復在吾猶拊其背而折其辭豈足下幼生所能移乎幹但笑終無所言幹稱公瑾雅量非言辭所間中州之士亦以此多之許司徒喪子蜀志曰許靖字文休汝南平輿人避亂交阯依太守士燮劉璋遣使招靖靖入蜀璋以為廣漢太守先主為漢中王拜太傅靖年逾七十愛樂人物誘納後進清談不倦丞相諸葛亮皆為之拜董休昭董允己見與費文偉欲共㑹其葬所休昭白其父掌軍請車蜀志曰董和字幼宰南郡枝江人劉璋時為益州太守先主定蜀為掌軍中郎將與武侯並署大司馬府事獻可替否共為交歡和外牧殊域内幹機衡二十餘年死之日家無儋石之財亮敎與羣下曰夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄弊蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啓告茍能慕元直之十一幼宰之殷勤有忠于國則亮可少過矣掌軍遣開後鹿車給之休昭有難載之色文偉便從前先上及至喪所諸葛亮及諸貴人悉集車乗甚鮮休昭猶神色未泰文偉晏然自若持車人還掌軍問之知其如此謂休昭曰吾嘗疑汝於文偉優劣未别也自是吾意了矣諸葛武侯亡後以蔣公琰錄尚書事時新喪元帥逺近危悚公琰拔自庶品處羣僚之右旣無戚容又無喜色神守舉止有如平日衆望漸服蜀志曰蔣琬字公琰零陵湘鄉人隨先主入蜀除廣都長先主至廣都琬衆事不理時又沈醉將加罪戮丞相請曰蔣琬社稷之器非百里之才其為政以安民為本不以修飾為先願主公察之先主雅敬亮乃不加罪蔣公琰在大司馬府東曹掾楊戲素性簡略公琰與語不時應答蜀志曰楊戲字文然犍為武陽人與巴西程祁巴郡楊汰蜀張表並知名丞相亮深識之辟為主簿亮卒蔣琬請為治中從事史嘗著漢季輔臣頌或搆戲於公琰曰公與戲語而不見應其慢上殊甚公琰曰人心不同各如其面面從後言古人所戒也文然欲賛吾是耶則非其本心欲反吾言則顯吾之非是以黙然是文然之快也乃更以為慢耶蜀志曰又督農楊敏曽毁琬曰作事憒憒誠非及前人或以白琬主者請推治琬曰吾實不如前人無可推也主者重白據聽不推則乞問其憒憒之狀琬曰茍其不如則事不當理事不當理則憒憒矣復何問耶魏軍次於興平蜀假費文偉節督師徃禦蜀志曰費褘字文偉江夏鄳人游學益土與汝南許叔龍南郡董允齊名丞相請為叅軍代蔣琬為尚書令費褘别傳曰戰國多事公務煩猥褘識悟過人毎省讀書記舉目暫視已究其意㫖其速數倍於人終亦不忘常以朝晡聽事其間接納賓客飲食嬉戲加之博奕毎盡人之歡事亦不廢董允為尚書令欲斆褘之所行旬日之中事多愆滯歎曰人才力相縣若此吾聽事終日猶有不暇爾光祿大夫來敏至文偉許别就求圍棊于時羽檄交馳嚴駕已訖文偉與敏留意對戲色無厭倦敏曰聊觀試卿耳信自可人必能辦賊者文偉至賊軍遂退蜀志曰來敏字敬達義陽新野人父豔漢司空敏涉略書籍善左氏春秋尤精倉雅訓詁先主署典學校尉與孟光皆以樞機不慎數見貶削然敏東宫舊㤙特加優待後為執慎將軍欲令以官自警范孝敬在武昌自造冢名長室時與賓客作鼓吹入中晏飲吳錄曰范慎字孝敬廣陵人竭忠知己之君纒綿三益之友時人榮之後為侍中出補武昌左都督孫皓移都甚憚之詔曰慎勲徳俱茂朕所敬慿宜登上公以副衆望以為太尉慎自恨久為將遂託老耄軍士戀之舉營為之隕涕夏侯太初夏侯𤣥己見格量𢎞濟臨斬東市顔色無異舉動自若阮徳如嘗於厠見鬼長丈餘色黒而眼大着皂單衣平上幘去之咫尺徳如心定徐笑語之曰人言鬼可憎果然鬼赧愧而退嵇中散嵇康己見嘗於夜中燈火下彈琴有一人入室初來時面甚小斯須轉大遂長丈餘顔色甚黒單衣草帶嵇熟視旣久乃吹火滅曰恥與魑魅争光山巨源無所標明淳深淵黙人莫見其際而其器亦入道故見者莫能稱謂而服其偉量魏陽元王隱晉書曰魏舒字陽元任城人幼孤為外氏寗家所養寗氏起宅相者曰當出貴甥外祖母意以盛氏甥小而惠謂應相也舒曰當為外氏成此宅相少名遲鈍叔父衡使守水碓毎言舒堪八百户長我願畢矣舒不以介意身長八尺二寸不修常人近事少工射著韋衣入山澤毎獵大獲為後將軍鍾毓長史為鍾毓後將軍長史魏書曰鍾毓字雅叔潁川長社人相國繇長子十四為散騎侍郎機捷談笑有父風仕至車騎將軍毓毎與參佐射陽元嘗為畫籌後遇朋人不足以陽元滿數毓初不知其善射陽元容範旣極閑雅兼發無不中舉坐莫敵毓謝而歎曰吾之不足以盡卿材有如此射矣魏陽元子旣先殞朝野咸謂陽元悲必過慟陽元退而歎曰吾不及莊生逺矣豈以無益自損乎遂不復哭王隱晉書曰魏舒子混字延廣清惠有才行為太子舍人年二十七先舒卒阮千里善彈琴名士傳曰阮瞻字千里夷任少嗜欲不修名行自得於懐讀書不甚研求而識其要仕至太子舍人人聞其能多徃聽之千里不問貴賤長幼至輒與彈神氣沖和不知向人所在内兄潘安仁常令鼔琴終日達夜曽無忤色晉陽秋曰潘岳字安仁滎陽人夙以才穎發名善屬文清綺絶世蔡邕未能過也仕至黄門侍郎為孫秀所害夏仲御母病危篤常詣洛市藥晉書曰夏統字仲御會稽永興人幼孤貧養親以孝聞睦於兄弟毎採梠求食或至海邊拘螊􅒹以資養雅善談論宗族勸之仕曰卿清亮質直可作郡綱紀與府朝接自當顯至統勃然曰諸君待我至此乎使統屬太平之時當與元凱評議出處遇濁代念與屈生同汙共泥若汙隆之間自當耦耕沮溺豈有辱身曲意於郡府之間平聞君之談不覺寒毛盡戴白汗言者大慙統自此不與宗族相見從父敬寧祠先人迎女巫章丹陳珠並有國色莊服甚麗善歌儛又能隱形匿影申夜之初撞鐘擊鼓間以絲竹統諸從兄弟欲徃觀共紿之曰從父疾病得瘳欲因其祭祀徃賀之卿可俱行乎統入門忽見丹珠輕步佪儛靈談鬼笑統驚愕而走破藩直出歸責諸人曰昔淫亂之俗興衛文公為之悲惋螮蝀之氣見君子尚不敢指季桓納齊女仲尼載馳而退子路見夏南憤恚而忼愾吾嘗恨不得頓叔向之頭陷華父之眼奈何迎此妖物夜與遊戲放傲逸之情縱奢滛之行亂男女之禮破貞髙之節也遂隱床上被髪而卧不復言衆踧踖即退遣丹珠會三月上巳洛中王公已下方軌連軫共至南浮橋邊褉男則朱服耀路女則錦綺粲爛仲御時在船中曝所市藥雖見此輩穩坐不揺賈公閭望見竒之願與相語晉諸公賛曰賈充字公閭襄陵人父逵豫州刺史充起家為尚書遷廷尉聽訟稱平晉受禪封魯公有才識明達治體加善刑法與裴楷共定科令蠲除宻網以為晉律遣問船中安坐者為誰仲御不應重問徐乃答曰會稽北海閒民夏仲御謝幼輿晉陽秋曰謝鯤字幼輿陳郡人父衡晉碩儒鯤性通簡好老易善音樂以琴書為業避亂江東王敦引為長史初至東海王越太傅府坐家僮取官稿除名于時在事諸人並以謝初登宰府便遭黜辱深為之恨謝聞之方清歌鼔琴不以屑意時人服其逺暢晉書曰東海王越字元超髙宻王泰之次子少有令名謙虚持布衣之操為中外所宗劉越石為胡騎所圍數重王隱晉書曰劉琨字越石中山魏昌人祖邁有經國才父璠光禄大夫琨少稱雋朗累遷尚書右丞迎大駕於長安以勲封廣武侯出為并州刺史為叚日磾所害城中窘迫無計劉始夕乗月登樓清嘯胡賊聞之皆悽然長歎中夜吹奏胡笳賊皆流涕人有懐土之切向曉又吹賊并起圍奔去或云是劉王喬曹嘉之晉紀曰劉疇字王喬彭城人父訥司𨽻校尉疇善談名理有重名永嘉中為閻鼎所害桓宣武止新亭大陳兵衛呼謝太傅王中郎前欲於坐害之王入失厝倒執手板流汗霑衣謝神姿舉動不異常日舉目徧歴左右衛士從容語曰安聞諸侯有道守在四夷明公何有壁間著阿堵輩桓笑曰正自不能不爾於是矜莊之色頓盡命左右促晏行觴笑語移日桓温謝安王坦之並已見郄嘉賓嘗三伏之月詣謝公時炎暑熏赫諸人雖復當風交扇猶沾汗流離謝着故絹衣食熱白粥宴然無異郄曰非公幾不堪此嘉賓郄超小字人晉中興書曰郄超字景興髙平司空愔之子卓犖不覊有曠世之度累遷司徒左長史孟嘉為桓宣武征西參軍九日宣武宴龍山寮佐畢集時佐吏並著戎服有風至吹嘉㡌落嘉不之覺宣武使左右勿言以觀其舉止嘉良久如厠宣武令取還之命孫盛作文嘲嘉著嘉坐處嘉還見即答之其文甚美四坐嗟異孫盛己見年陶靖節征西長史孟府君傳曰君諱嘉字萬江夏鄂人曽祖宗以孝行稱仕吳司馬祖揖元康中為廬陵太守宗葬武昌新陽縣子孫家焉遂為縣人君少失父奉母與二弟居娶大司馬長沙桓公陶侃第十女閨門孝友人無能間鄉閭稱之沖黙有逺量弱冠儔類咸敬之王子敬夜齋中卧有羣偷入其室盜物都盡王徐曰偷兒青氊我家舊物可特置之王獻之别傳曰獻之字子敬祖曠淮南太守父羲之右將軍獻之咸寧中詔尚餘姚公主遷中書令羊敬元羊欣己見在隆安中見晉室漸亂優游私門不復進仕會稽王世子元顯每使羊書常辭不奉命元顯怒乃以為其後軍府舍人此職本用寒士羊意貌恬然不以髙卑見色論者稱焉王江州王𢎞己見欲識陶淵明不能致淵明嘗徃廬山王令淵明故人龎通之齎酒具於半道栗里要之淵明有脚疾使一門生二兒轝籃輿旣至欣然便共飲酌俄頃王至亦無忤也徐羨之起自布衣直以局度超居廊廟朝野推服咸謂有宰臣之望沈宻寡言不以憂喜見色頗工奕棊觀戱常若未解當世倍以此推之嘗與謝晦傅亮宴聚晦亮才學辯博羨之風度詳整時然後言鄭鮮之歎曰觀徐傅言論不復以學問為長沈約宋書曰鄭鮮之字道子滎陽開封人髙祖渾魏將作大匠曽祖襲大司農父遵尚書郎襲初為江乗令因居縣境鮮之下帷讀書絶交遊之務初為桓偉輔國主簿歴官尚書右僕射宋明帝賜王景文死勅至之夜景文在江州方與客棊看勅訖置在局下神色恬然争刼竟歛子納奩畢徐言奉勅見賜以死方以勅示客因舉賜鴆謂客曰此酒不可相勸遂仰飲而絶王彧己見沈昭畧與徐孝嗣諸人同賜死於華林省時昭畧言笑自若了無懼容孝嗣語昭畧曰見卿使人思夏侯太初昭畧曰明府猶憶夏侯便是方寸不能都豁下官見龍逢比干欣然相對霍光脫問明府今日之事當何辭答之耶孝嗣不能對張黄門出為封溪令廣越嶂險獠賊執張將殺食之張神色不動方作洛生詠張融己見建南齊書曰帝寵姬殷淑妃薨齋僚佐襯者多至一萬融獨注襯百錢帝怒曰融殊貧當序以佳祿出為封溪令齊髙宗廢鬱林領兵入殿左右驚報謝侍中謝􅊪己見謝與客圍棊毎下子輒云其當有意竟局乃還齋卧終不問外事豫章王北宅後堂宴集沈率沈文季己見與褚太宰褚淵己見並善琵琶酒酣太宰取樂器作明君曲沈便下席大唱曰沈文季不能作技兒豫章曰此故當不損仲容之徳太宰顔色無異褚太宰宅嘗失火烟焰甚逼左右驚擾太宰神色怡然索轝來徐去哀太子甚有器度為侯景所憚一日賊黨稱景命召太子太子方講老子將欲下床而刑人掩至太子顔色不變徐曰久知此事嗟其晚耳刑者欲以衣帶絞之太子曰此不能見殺乃指繫帳竿下繩命取絞之而絶梁書曰哀太子字仁宗太宗嫡長子也太宗即位立為皇太子性寛和兼神用端嶷為賊所害時年二十八韋敬逺子在隨州物故孝寛子總復於并州戰没一日之中凶問俱至家人相對悲慟敬逺神色自若徐語之曰死生命也去來常事亦何足悲援琴撫之如舊齊晉陽陷没王叔朗與同志避周兵北史曰王晞字叔朗小字沙彌北海劇人淹雅有器度好學不倦美容儀有風則齊亡周武帝以為儀同大將軍王温酒服膏曾不一廢每未肯即去同侣尤之王曰莫我尤我行事若不悔久作三公矣李宻據洛口署李𤣥道為記室宻敗為王世充所執衆懼不能寐𤣥道曰死生有命非憂能了寢甚安及見世充辭色不撓世充用為著作佐郎劉昫唐書曰李𤣥道隴西人貞觀中為常州刺史在職清簡百姓安之吐谷渾與党項冦邊時柴紹討之虜據髙射紹軍矢下如雨士衆失色紹安坐遣人彈胡琵琶使二女子對舞虜異之休射縱觀紹伺其懈以精騎從後掩擊虜衆大潰劉昫唐書曰柴紹字嗣昌晉州臨汾人趫捷有勇力任俠聞於關中髙祖妻之以女即平陽公主也義旗建累功封霍國公劉禕之坐賜死旣沐浴而神色自若命其子草謝死表其子哀號將絶不能書監刑者催逼之禕之乃自操紙援筆即成辭理懇至見者無不傷痛唐詩紀事曰劉禕之字希美常州人與孟利貞髙智周郭正一俱有名號劉孟髙郭上元中與元萬頃等召入禁中論次新書髙宗宻與參決時政以分宰相權時謂北門學士武后時賜死李昭徳為内史婁師徳為納言相隨入朝師徳體肥行緩李顧待不即至乃發怒曰尀耐殺人田舍漢師徳聞之徐笑曰師徳不是田舍漢更阿誰是大唐新語曰婁師徳弟拜代州刺史將行謂之曰吾以不才位居宰相汝今又得州牧叨據過分人所嫉也將何以全先人髪膚弟長跪曰自今雖有唾某面者某亦不敢言但拭之而已以此自勉庶免兄憂師徳曰此適所謂為我憂也夫前人唾者發於怒也汝今惡其唾而拭之是逆前人怒也唾不拭將自乾何若笑而受之武后之年竟保寵祿率是道也婁師徳樸忠沈厚心無適莫狄仁傑己見入相師徳舉之及為同列仁傑頗輕師徳頻擠之外師徳知而不憾則天覺之嘗問仁傑曰婁師徳知人否仁傑對曰臣嘗同官未聞其知人則天曰朕之用卿師徳所薦安可謂不知人仁傑大慙而退歎曰婁公盛徳我為其所容婁師徳在夏官注選選者就按閱簿師徳曰容我擇之選者不去乃灑筆曰墨汙爾則天朝旱澇輒閉坊市南門以禳之宰相楊再思晨入朝值一重車將牽出西門峻而又滑馭者叱牛不前乃罵曰一羣癡宰相不能和得隂陽而閉坊門遣我匯行如此辛苦再思徐謂之曰爾牛亦自弱不得嗔他宰相劉昫唐書曰再思鄭州原武人證聖初鳯閣侍郎巧佞邪媚能得人主㣲㫖恭慎畏忌未嘗忤物或曰公名髙位重何為屈折如此再思曰世路艱難直者受禍茍不如此何以全身魏元忠己見㣲時家止一婢厨中方㸑出外汲水還見老猿為其守火婢驚白元忠元忠曰猿恐我乏使能為我爨不亦善乎後亦無他陸兖公陸象先己見為同州刺史有家僮過參軍不下馬參軍怒責其事鞭背見血入白兖公曰卑吏犯某請去官公從容謂曰奴見官人不下馬打也得不打也得官人打了去也得不去也得叅軍不測而退韋斌責蘄春時李鄴侯李泌己見以處士放逐中夜同宴屢聞鴟音韋流涕鄴侯曰此聲人以為惡茍以好音聽之則無足悲請飲酒不聞鴞音者浮以大白坐客皆企其聲終夕不厭劉昫唐書曰韋斌京兆萬年人父安石景雲初宰相斌容止嚴厲冇大臣體與兄陟齊名天寶末掌文誥李林甫構陷貶巴陵太守杜兼誣奏李藩動揺軍中徳宗宻勅杜佑殺之杜素重藩旬日不忍發因引藩共談内典遂及因報之說信有之不藩曰信然杜曰審如此君應遇事無恐因出詔示藩藩覽之無動色杜言君慎勿出口吾已宻論持百口保君矣德宗怒不解追藩赴闕及召見望其儀形曰此豈作惡事人耶除校書郎李藩杜佑己見宰劉昫唐書曰杜兼京兆人相正倫五代孫性浮險矜氣拜濠州刺史甚恣凶威叅軍韋賞判官陸楚以論事忤兼兼誣奏二人扇動軍中忽有制使至兼呼韋賞陸楚出宣制杖殺之賞進士擢第楚象先之孫皆名家有士林之譽無罪受戮天下寃之又誣奏李藩將殺之故兼所至人側目焉陽城己見召為諫議大夫見諸諫官紛紜言事細碎無不聞達天子厭苦之城方與二弟痛飲人莫窺其涯際有謁城者城引之與坐輒强以酒客辭城輒自飲客不得已乃與城酬酢或客先醉仆於席上或城先醉卧客懐中竟不聽客語裴晉公裴度己見不信術數每語人曰雞猪魚蒜逢著則喫生死老病時至則行靖安李少師雖居貴位不以威重隔物與賓僚飲宴談笑曲盡布衣之歡亦不記人過失嘗一日宴散有人言昨飲大歡公曰今日言歡則明前之不歡無好惡一不得言胡三省通鑑注曰李宗閔居靖安坊當時人因以稱之處士丁重有人倫鑒一日見于琮語路巖曰某比不熟識于侍郎今日見之風儀秀整禮貌謙挹如百斛重器所貯尚空其半安得不益於祿位哉茍踰月不居廊廟則某無復更至門下矣其後旬浹于果登台鉉劉昫唐書曰于琮給事中敖之子落拓有大志駙馬鄭顥以器度竒之後尚廣徳公主累踐臺閣揚歴藩府黄巢犯京師起琮為相義不受命為賊所害就路巖字魯瞻陽平冠氏人方鎮交辟久之方數年間至中書舍人司空表聖司空圖己見預為夀藏故人來者引置壙中賦詩對酌人或難之表聖曰達人大觀幽顯一致非止暫遊此中公何不廣耶鄭仁誨初事唐將陳紹光紹光恃勇使酒嘗乗醉抽劒將倳刃于仁誨左右無不奔避仁誨端坐以俟畧無懼色紹光擲劒于地曰汝有此器度必當享人間富貴後仁誨果至樞極五代史記曰鄭仁誨字日新太原晉陽人初事唐將陳紹光周太祖為樞宻召仁誨用之累官内客省使謙謹好禮不自矜伐為士大夫所稱馮道己見與趙上交王度迎劉贇為漢嗣旣而周太祖已副推戴左右知事變欲殺道等上交度惶怖不知所為惟道偃仰自適畧無懼色續世說曰道㣲時嘗賦詩云終聞海岳歸明主未省乾坤陷吉人至是其言驗矣江南孫晟使周世宗待之甚厚召見飲以醇酒問以唐事晟但言唐主畏陛下神武事陛下無二心及得唐主蠟書誘邊將李重進皆謗毁反間之詞帝大怒責晟以所對不實晟正色抗辭復問唐虚實又黙然不對送軍巡院更使曹翰從容問之終不言翰乃曰有勅賜相公死晟神色怡然索袍笏整衣冠南向拜曰臣謹以死報乃就刑馬令南唐書曰孫晟一名鳯宻州人好學有文辭尤工於詩少為道士居廬山簡寂宫後易儒服謁唐莊宗于鎮州用為著作郎天成中奔吳烈祖得晟甚喜以為右僕射後周世宗征淮元宗懼遣禮部尚書王崇質副晟奉表入周江南李氏太弟景遂嘗與官僚宴集賛善大夫張易有所規諫景遂方與客傳玩玉杯弗之顧易怒曰殿下重寶而輕士取杯抵地碎之衆皆失色景遂但歛容謝過鄭文寶南唐近事曰張易為太弟賓客方雅直率而好乗醉凌人嘗侍宴昭愛宫儲后持所愛玉杯親酌易酒捧玩勤至有不顧之色易張目排座抗音而讓曰殿下輕人重器不止虧損至徳恐乖聖人慈儉之㫖言訖碎玉杯於殿柱一座失色儲后避席而謝之吕文穆不記人過初叅政事入朝堂有朝士於簾内指之曰此子亦叅政耶文穆佯為不聞而過同列令詰其官位姓名文穆遽止之朝罷同列猶不能平悔不窮問文穆曰若一知其姓名則終身不復能忘固不如毋知也不問之何損時人服其量東都事畧曰吕蒙正字聖功河南人舉進士第一累官叅知政事李昉罷相以蒙正為中書侍郎平章事寛簡有重望以直道自持趙普開國元老䝉正晚出同在相位普甚推許之封許國公諡文穆何良俊曰夫以韓魏公之偉度猶不能忘李師中然則知人之過而能不記者惟太上忘情耳下此而曰我忘之者其欺人亦已甚矣故於此不但見文穆寛中又有以知其無隱情也李公沆秉鈞日有狂生叩馬獻書歴詆其短李遜謝曰俟歸家當得詳覽狂生遂發訕怒隨公馬後肆言曰居大位不能康濟天下又不能引退久妨賢路寧不愧於心乎公但於馬上踧踖再三曰屢求退以主上未賜允終無忤也李文靖李沆己見所居陋巷㕔事無重門頽垣敗壁不以屑慮堂前藥欄壊夫人戒守舍者勿葺以試公公經月終不言夫人以語公公笑謂其弟維曰豈可以此動吾一念哉向敏中拜右揆東都事畧曰向敏中字常之開封人沈毅開濟識大體深為人主所知祥符中拜中書門下平章事天禧元年進右僕射宣麻日李昌武在翰林當對上謂之曰朕自即位已來未嘗除僕射今日有此殊命敏中應甚喜門下賀客必多卿徃觀之明日却對來勿言朕意也向歸昌武徃候見門闌悄無人昌武徑入見之徐賀曰今日聞降麻士大夫莫不歡慰朝野相慶公但唯唯又言自上即位未嘗降端揆此非常之命自非勲徳隆重眷倚殊越何以有此公復唯唯終未測其意又歴陳前代為僕射者勲勞徳業之盛禮命之重公亦唯唯卒無一言旣退復使人至庖厨中問今日有無親戚賓客飲食燕會亦寂無一人明日昌武具以所見對上笑曰向敏中大耐官職宋史曰李宗諤字昌武文正公昉之子第進士授校書郎初昉居三館兩制之職宗諤不數年皆踐其地風流儒雅藏書萬卷内行淳至事繼母符氏以孝聞王太尉王旦己見局量寛厚人不見其喜怒飲食有不精潔但不食而已家人欲試其量以少埃墨投羮中公惟啖飯問其何以不食羮曰我偶不喜肉一日又墨其飯公視之曰吾今日不喜飯可且具粥王文正公子弟嘗愬於公曰庖肉為饔人所私食肉不飽公曰汝輩人料肉幾何曰一斤今但得半斤食其半為饔人所廋公曰盡一斤可得飽乎曰盡一斤固當飽曰此後人料一斤半王文正公嘗宅門壊主者撤屋新之暫於廊廡下啓一門以出入公至側門門低據鞍俯伏而過都不問門畢復行正門亦不問王文正家有控馬卒嵗滿辭公公問汝控馬幾時曰五年矣公曰吾不省有汝旣去復呼囘曰汝乃某人乎於是厚贈之乃是逐日控馬但見背未嘗視其面因去見其背方省是此人丁晉公丁謂己見謫朱崖後許於光州居住流落貶竄十五年髭鬢略無斑白人服其量丁晉公在光州親知皆會至食不足轉運使表聞有㫖給京東房錢一萬貫為其子珙數月呼博而盡臨終前半月已不食但焚香危坐黙誦佛書以沉香煎湯時呷少許臨化之際神識不亂奄然而逝能榮辱兩忘大變不怛當時稱為異人仁宗久病廢朝一日康復思見執政坐便殿促召二府吕許公聞命移刻方赴召比至中使數促公同列亦賛公速行公愈緩步旣見上曰久病方平喜與公等相見何遲遲其來公從容奏曰陛下不豫中外頗憂一旦聞忽召近臣臣等若奔馳以進慮人驚動爾上以為得輔臣之體龍川志曰王沂公知制誥朝望日重一日至中書見王文正公公問君識一吕夷簡否沂公曰不識也文正曰此人異日與舍人對秉鈞軸沂公曰何以知之曰吾亦不識但以其奏請得之沂公曰奏請何事曰如不稅農器等數事卒與沂公並相景徳中河北用兵車駕欲幸澶淵中外之論不一獨冦忠愍冦準己見賛成上意乗輿方渡河虜騎充斥城下人情恟恟上使人㣲覘忠愍方酣寢於中書鼻息如雷人以其一時鎮物比之謝安吕許公吕夷簡己見執政范文正屢攻其短坐落職知饒州後吕再入相言於仁宗曰仲淹賢者朝廷將用之豈可但除舊職遂除龍圖閣直學士經畧陜西上以許公為長者文正面謝曰曏以公事忤相公不意乃爾奬拔許公曰豈復以前事為念宋元憲與弟景文未第時貧甚因依外家就學安陸冬至召同人飲元憲語客曰至節無以為具獨有先人劒鞘上裹銀一兩麄以辦節乃笑曰冬至喫劒鞘年節當喫劒耳宴笑自若吕文靖夷簡四子公弼公著公爽公孺皆穎異文靖與夫人語四兒他日皆顯重但不知誰作宰相吾將驗之他日四子居外夫人使小鬟擎四寶器貯茶而徃敎令至門故跌而碎之三子皆失聲獨公著凝然不動文靖謂夫人曰此兒必作相元祐中果大拜富鄭公致政歸西都嘗著布直裰跨驢出郊逢水南巡檢蓋中官也威儀呵引甚盛前卒呵騎者下公舉鞭促驢卒聲愈厲又唱言不肯下驢請官位公舉鞭稱名曰弼卒不曉所謂白其將曰前有一人騎驢衝節請官位不得口稱弼弼將方悟曰乃相公也下馬伏謁道左其候賛曰水南巡檢唱喏公舉鞭去韓魏公帥定武時夜作書令一侍兵持燭於旁兵他顧燭燃公鬚公以袖麾之作書如故少頃囘視則已易其人矣公恐主吏鞭卒急呼曰勿易之渠方解持燭軍中為之感服韓魏公知北都有人獻玉盞云耕者入壊塚而得表裏無纎瑕可指真絶寶也開讌召漕使顯官特設一桌致玉盞其上將酌酒遍勸坐客俄為吏將誤觸臺倒玉盞竟碎坐客皆愕然吏將伏地待罪公神色不動徐語曰物破亦自有時韓魏公駐兵延安忽夜有人攜匕首至卧内遂褰帷魏公起坐問是誰曰某來殺諫議又問誰遣汝曰張相公蓋夏國方張元用事也魏公復就枕曰汝取我首去其人曰某不忍願得諫議金帶足矣遂取帶而去明日魏公亦不治此事俄有守陴卒報城櫓上得金帶乃納之范純祐亦在延安謂魏公曰不治此事甚善蓋行之則沮國威今受其帶是墮其計中矣魏公握范手再三歎曰非某所及龎相龎籍己見為郡掾日會郡守性褊好責人小禮常令掾屬羅拜庭下率坐受之衆皆忿恥竊罵公獨處之自若公曾以疾在告月餘方出例當庭叅偶是日大雨守乃命張傘布茅於庭使人設拜公拜起唯謹當時以為逺到之量趙閱道趙抃己見為成都轉運出行部内唯攜一琴一鶴坐則看鶴鼓琴嘗過青城山遇雪舍於逆旅逆旅人不知是趙或慢狎之公頹然鼓琴不問唐質肅嘗言文潞公文彦博己見交結宫禁自御史責英州别駕潞公亦罷相後潞公復相即上言唐介所言正中臣罪召臣未召介臣不敢行仁宗即起介通判潭州尋至大用東都事畧曰唐介字子方荆南人為御史裏行論張堯佐不當除宣徽使言彦博顯用堯佐隂結貴妃外陷陛下有私後宫之名仁宗怒甚貶英州别駕元厚之知福州日有吏白事公問如何行遣吏對合依元降指揮公曰元絳未嘗指揮公名絳故云吏悚而退終不加罪東都事畧曰元絳字厚之杭州錢塘人舉進士除著作佐郎出知鄆州召為翰林學士卒諡章簡吕晦叔吕公著己見平章軍國時門下因語次或曰嘉問敗壊家法可惜公不答客愧而退一客少留曰司空尚能容吕惠卿何况族黨此人妄意迎合可惡也公又不答旣歸子弟請問二客之言何如公亦不答宋史曰吕嘉問字望之以䕃入官條例司引以為屬提舉市易務初嘉問竊從祖公弼論新法奏稿以示安石公弼遂斥於外吕氏號為家賊范忠宣范純仁己見謫居永州以書寄人云此中羊麫無異北方每日閉門飡餺飥不知身之在逺猗覺寮雜記曰比人食麫名餺飥揚雄方言餅謂之飥齊民要術青䴹麥麫堪作飯及餅飥甚美磨盡無麩則飥之名已見於漢魏五代史李茂貞傳朕與宫人一日食粥一日食不托不托俗語當以方言為正作餺飥字范忠宣謫永州公夫人在患難中毎遇不如意事則罵章惇曰枉陷正人使我至此公每為一笑舟行過橘洲大風雨中船破僅得及岸公令正平持蓋自負夫人以登燎衣民舍稍蘇公顧曰船破豈亦章惇所為耶范丞相在永州閉門獨處人稀識面客苦欲見者或出則問寒暄而已家僮掃榻具枕揖客解帶對卧良久鼻息如雷霆客自度未起亦熟睡睡覺常及暮乃去范忠宣云或相勉以攝生之理不知人非久在世之物假如丁令威千歳化鶴歸鄉見城郭人民皆非則獨存亦何足樂蘇公逮獄時舒亶之徒力詆上前必欲置之死地裕陵宻遣小黄門至獄中視蘇起居狀適蘇公晝寢鼻息如雷即馳以聞裕陵顧謂左右曰朕知蘇軾胷中無事者於是即有黄州之命蘇子瞻為鳯翔判官章子厚任商令同試永興軍進士時劉原父為師皆以國士遇之二人相得歡甚同遊南山諸寺抵仙遊潭下臨絶壁萬仞横一木為橋子厚推蘇過潭書壁蘇不敢子厚平步以過用索繫樹步躡上下神色不動以漆墨濡筆大書壁上曰章惇蘇軾來遊范寥言魯直至宜州州無亭驛亦無民居可僦止一僧舍可寓適為崇寧萬夀寺法所不許迺居一城樓極為湫隘秋暑方熾幾不可過一日忽小雨魯直飲薄醉坐胡床自欄楯間伸足出外以受雨顧謂寥曰信中吾平生無此快也未幾而卒米元章晩年學禪有得卒於淮陽軍先一月區處家事作親友别書盡焚其所好書畫竒物預置一棺坐卧飲食其中前七日不茹葷更衣沐浴焚香清坐而已及期徧請郡寮舉拂示衆曰衆香國中來衆香國中去擲拂合掌而逝蔡肇南宫舍人米公墓誌曰元章少與禪人摩詰遊詰以為得法其逝不怛作偈語有倫王鼎宰縣日嘗憩於庭俄有暴風舉卧榻空中鼎無懼色但覺枕榻俱髙乃曰吾中朝端士邪無干正可徐置之須臾榻復故處風亦隨止遼史曰王鼎字虚中涿州人幼好學居太寧山數年博通經史時馬唐俊有文名適上已與同志袚褉水濱鼎偶造席唐俊見鼎樸野置下坐欲以詩困之出所作索賦鼎援筆立成唐俊驚其敏妙因與定交調易州觀察判官累遷翰林學士當代典章多出其手楊鐵崖在松江嘗遊盤龍塘夜抵普門寺宿盜伺其亡盡竊去所畜物黎明家人徃白之先生賦詩不輟語客曰老鐵在是區區長物又奚恤衆服其量倪元鎮旣却張士信之請一日士信與諸文士遊太湖聞小舟中有異香士信曰此必一勝流急榜舟近之乃元鎮也士信大怒即欲手刃之諸人力為營救然猶鞭元鎮元鎮竟不吐一語後有人問之曰君被士信窘辱而一語不發何也元鎮曰一說便俗語林卷十四
