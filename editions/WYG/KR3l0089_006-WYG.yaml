body:
  text: 語林卷六明何良俊撰政事第三孔子曰政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛此因子産遺訓故言氶敝易變之道大率如此余觀孔子雅言及古稱循吏炳煥竹素者何嘗用猛哉太史公曰奉法循理亦可以為治何必威嚴哉斯言是矣善哉劉真長之言曰古之善政司契而已豈不以敦本正源鎮静流末乎此語可著令甲茍用此道雖聖人之篤恭𤣥黙何以加諸卓茂為宻令有人詣茂言亭長受其米肉茂問此人亭長為從汝求乎將平居自以恩意遺之人曰往遺之耳茂曰遺之而受何故言耶人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰凡人所以貴於禽獸者以有仁愛知相敬事今鄰里長老尚致饋遺此乃人道所以相親吏顧不當乘威力強請求耳凡人之生羣居雜處故經紀禮義以相交接汝獨不欲脩之寜能髙飛逺走不在人間耶人曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨以律治汝何所措其手足乎一門之内小者可論大者可殺也且歸念之於是人納其訓吏懐其恩酈道元水經註曰卓茂字子康南陽宛人温仁寛雅恭而有禮人有認其馬者茂與之曰若非公馬幸至丞相府歸我遂挽車而去後馬主得馬謝而還之任黄門郎遷宻令舉善而徴口無惡言教化大行道不拾遺蝗不入境百姓為之立祠享祀不輟矣東觀漢記曰茂恬暢樂道雅實不為華貌行已在清濁之問自束髪至白首與人未嘗有爭孔君魚為姑臧長清儉逼下有譏之者答曰奮身處脂膏不能自潤東觀漢記曰孔奮字君魚扶風茂陵人守姑臧長時天下亂河西獨安前長居官數月即致貲産奮在姑臧四嵗財物不増惟老母極膳妻子但食葱菜鄭尚書在淮隂范曄後漢書曰鄭𢎞字巨君會稽山隂人從淮隂太守四遷為尚書令消息繇賦政不煩苛郡中大旱自出行春隨車致雨白鹿方道俠轂而行謝承後漢書曰𢎞問主簿黄國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相龎仲逹為漢陽太守司馬彪續漢書曰龎參字仲逹河南緱氏人官至太尉郡人任棠有竒節𨼆居教授仲逹到先候之棠不交言但以薤一大本水一盂置户屏前自抱孫兒伏於户下主簿白以為倨仲逹思其㣲意良久曰棠是欲曉太守水者欲吾清㧞大本薤者欲吾擊強宗抱兒當户欲吾開門恤孤也歎息而還仲逹在職抑強助弱果以恵政得民任延為會稽都尉時年十九迎官驚其壯及到静泊無為唯先遣饋禮祠延陵季子范曄後漢書曰任延字長孫南陽宛人年十二為諸生學於長安明詩易春秋顯名太學學中號為任聖童更始中以大司馬屬拜會稽都尉延叔堅舉孝亷為平陽侯相到官表龔遂之墓立銘祭祠擢用其後於畎畆之間延篤别見陳昭公守廣漢入為大司農范曄後漢書曰陳寵字昭公沛國洨人祖咸哀平間尚書寵性周宻每亊務於寛厚由廣漢太守入為大司農後為司空雖𫝊法律而兼通經書號為任職相帝問在郡何以為理昭公頓首謝曰臣任功曹王渙以簡賢選能主簿譚顯拾遺補闕臣奉宣詔書而已帝大悦范曄後漢書曰王渙字稚子廣漢郪人少好俠尚氣晚更改節敦儒習尚書讀律令為太守陳寵功曹當職割斷不避豪右寵風聲大行渙由此顯名州舉茂才為洛陽令譚顯後亦知名安帝時為豫州刺史𡊮司徒為河南尹政號嚴明然未嘗以􅂍罪鞠人常言曰凡學仕者髙則望宰相下則希守牧錮人於聖世尹不忍為也聞者皆感激自勵𡊮安已見汝南太守宗資任功曹范滂范滂已見叔謝承後漢書曰宗資字都南陽安衆人家代為漢名臣資少在京師學孟氏易歐陽尚書舉孝亷拜議郎補汝南太守署范滂為功曹委任政事推功於滂不伐其美任善之名聞於海内南陽太守成瑨亦委功曹岑晊謝承後漢書曰成瑨少修仁義以清名見稱舉孝亷拜郎中遷南陽太守郡多豪強中官磐牙境界瑨下車振威嚴以檢攝之時桓帝乳母外親張子禁恃勢不畏法網功曹岑晊勸使捕子禁付宛獄笞殺之桓帝徴瑨下獄死林范曄後漢書曰岑晊字公孝南陽􅁄陽人有髙才郭宗朱公叔皆與為友李膺王暢稱其有幹國器雖在閭里慨然有董正天下之意二郡為之語曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯宗叔都宗資已見在汝南請范孟博為功曹范在職嚴整疾惡人有行違孝弟不軌仁義者皆掃迹斥逐不與共朝顯薦異節捜㧞幽陋天下稱之范孟博外甥西平李頌是公族子孫行義為鄉里所棄中常侍唐衡以頌屬汝南太守宗資資用為吏時孟博在功曹心非其人寢而不召資怒責書佐朱靈靈仰謝曰范滂清裁猶以利刅齒腐朽今日寜受笞死而滂不可違資乃止謝承後漢書曰宗資責問書佐朱靈靈以告滂滂曰答教當言頌則滂之姊子豈不樂其升進縁頌汙穢小人不宜玷塵清朝不敢以位私人是以不召陳仲舉為樂安太守司馬彪續漢書曰陳蕃字仲舉汝南平輿人舉孝亷除郎中母憂去官周景辟從事以諌爭不合投𫝊而去後李固表薦徴拜議郎范曄後漢書曰李固為青州刺史名有威政屬城聞風皆自引去蕃獨以清績留安續漢志曰樂安本名千乘和帝更名樂郡人周孟玉清潔之士張璠漢紀曰周璆字孟玉臨濟人有美名前後太守禮命皆不至獨仲舉能致焉仲舉大加寵異字而不名特置一榻去則懸之𡊮山松後漢書曰璆為樂城令逍遥無事縣中大治去官徴聘不至陳蕃為太守璆來置榻去懸之陳仲舉在樂安郡縣民趙宣𦵏親而不閉埏隧止居其中行服積二十年鄉邑稱孝州郡數禮請之仲舉就與相見言次問及妻子宣有五子皆服中所生仲舉怒曰聖人制禮賢者俯就不肖企及且祭不欲數以其易瀆故也况乃寢宿冢蔵孕育其中誑時惑衆誣汚鬼神乎遂致其罪孔文舉孔融已見在北海時教髙宻令曰志士鄧子然告困焉得愛釡庾之間以傷烈士之心與豆三斛後乏復言孔文舉為北海相有一人遭父䘮哭泣墓側色無憔悴文舉刑之又一人母病瘥思食新麥家中無有乃盗鄰家熟麥以進文舉特加賞異曰無有來謝勿復盗也秦子曰夫盗而不罪者以為勸於養母也哭而見殺者以為哀而不實也胡威少有志尚厲操清白父質臨荆州威自京都省之家貧無車馬童僕威自驅驢單行見父停廐中十許日告歸臨辭質賜絹一匹為道路費威跪問曰大人清嚴不審於何得此質曰是吾俸禄之餘故以為汝糧耳威受而去晉陽秋曰胡威字伯虎淮南人父質荆州刺史以忠清顯胡質在荆州其子威省覲告歸每至客舍自放驢取樵爨炊食畢復隨旅進道質帳下都督隂齎糧要之因與為伴每事相助經營又進少飯威疑宻加誘問知是都督謝而遣之後以白質質杖都督一百除其吏名裴潜為兖州時嘗作一胡牀及去留以挂壁魏志曰裴潜字文行河東人避亂荆州劉表待之賔禮潜私謂王粲司馬芝曰劉牧非覇王之才而欲以西伯自處其敗無日矣遂南渡適長沙王夷甫王衍别見為元城令終日清談而縣務自理陶公陶侃已見明識過人臨荆州時勑武昌道上種栁人有竊之植于其家陶見而識之問何以盗官栁種子時以為神王丞相善於因事初過江帑蔵空竭唯有練數千端丞相與朝賢共制練布單衣一時士人翕然競服練遂涌貴乃令主者賣之端至一金王丞相王導已見薨後庾季堅代相網宻刑峻晉書曰庾氷字季堅兄亮以名徳流訓氷雅素垂風諸弟相率莫不好禮為世論所重亮常以氷為庾氏之寳殷洪喬出行遇收捕者於途殷氏譜曰殷羡字洪喬父識鎮東司馬羡仕至光禄勲慨然歎曰丙吉問牛喘似不爾班固漢書曰丙吉為相嘗出逢清道羣鬭者死傷横道吉過之不問前行逢人逐牛牛喘􅄍舌吉止駐使騎吏問逐牛行幾里矣掾吏謂丞相前後失問或以譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁嵗竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可太熱􅂲牛近行用暑故喘此時氣失節恐有所傷害也三公典調和隂陽職所當憂是以問之掾吏乃服以吉知大體殷光禄殷羡嘗從容謂庾季堅曰卿輩自是綱目不失皆是小道小善耳至如王公王導已見故能行無理事謝太傅每歎詠此唱東海王越臨兖州以江應元為别駕委以州事江氏家傳曰江統字應元時太傅從事中郎庾子嵩以風韻見重雅敬君徳毎云當今可以為司徒充民望者江生其人也與應元書曰昔王子師王允已見為豫州未下車辟荀慈明下車辟孔文舉荀爽孔融二人並已見貴州人士有堪應此者不應元舉郄鑒為賢良阮脩為直言程收為方正時稱其得人郄鑒别見收阮修已見晉書曰程濟北人劉尹在郡為政清整門無雜賔時百姓好訟官長諸郡往往為相舉正劉曰夫居下訕上此弊道也古之善政司契而已豈不以敦本正源鎮静流末乎君雖不君下安可以失禮若此風不革百姓將往而不反遂寢不問劉尹别𫝊曰劉惔字真長沛國蕭人漢氏之後有雅裁雖蓽門陋巷晏如也歴侍中丹陽尹為政務鎮静信誠風塵不能移也孫安國孫盛已見為長沙太守頗營資貨桓温遣部從事至郡察知之重其髙名不時即劾盛與温牋辭㫖放蕩稱州遣從事觀採風聲進無威鳯來儀之美退無鷹鸇摶擊之用徘徊湘川將為怪鳥温得牋復遣從事按之􅂍賄狼籍檻車收盛到州捨而不罪何法盛晉中興書曰孫盛字安國太原中都人為秘書監篤尚好學自少及長手常不釋卷既為史官乃著三國晉陽秋何良俊曰小人黷貨固惟其常茍求亷潔自將正當責之賢者桓元子當察舉之寄實宜矯厲頽流使屬城聴采以彰軌物今孫盛􅂍賄狼籍乃獨以名髙不劾及以放蕩致隟始復按之罪狀既明又捨而不問將使小人因之有辭而中才猶或自沮求之舉措俱為失據晉於是為失政刑矣吳𨼆之已見為廣州刺史此地包帶山海珍異所出一篋之寳可資數世前後刺史遂多黷貨未至州二十里地名石門有水曰貪泉飲者懐無厭之欲隱之既至語所親曰不見可欲使心不亂越崖喪亷吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一㰱懐千金試使夷齊飲終當不易心在州逾厲清操帷帳器服皆付外庫常食不過菜及乾魚顧覬之除山隂令山隂劇邑民户三萬前令晝夜不得休事猶不舉覬之御繁以約縣用無事晝日垂簾門庭閑寂宋世稱山隂務簡而理諸郡莫及宋書曰顧覬之字偉仁吴郡吳人髙祖謙晉陸機姊夫祖崇大司農父黃老司徒左西掾覬之初為郡主簿謝晦為荆州以為衛軍叅軍愛其雅素深相知待孔思逺孔覬已見在郡性至真素不尚矯飾遇得寳玩服用不疑而他物麄敗終不改易時吳郡顧覬之亦志崇儉素宋世並稱清約孔思逺代庾徽之為御史中丞庾性豪侈服玩甚華思逺衣冠器用莫不麄率時蘭臺令史並三吳富人初有輕之之意後見思逺蓬首緩帶風貌清嚴便重迹屏氣莫敢欺犯南史曰庾徽之字景猷頴川􅋣陵人卒官南東海太守孔思逺使酒仗氣每醉彌日不醒為後軍府長史雖醉日居多而曉明政理醒時判决未嘗有壅衆咸曰孔公一月二十九日醉勝世人二十九日醒劉損為吳郡太守至閶門便入泰伯廟時廟室頽毁垣墻不修損愴然曰風猷尚可彷彿衡宇一何摧頽即發教整葺南史曰劉損字子騫衛將軍毅從父弟也父鎮之以毅貴顯退居京口未嘗應召毅甚畏憚毎還京口不敢以羽儀入鎮之門損贈太常張景山歴三府諮議事舉情得多無異同或問景山主上既㓜執事多門君每能輯和公私云何致此景山曰古人言一心可事百君我為政端平待物以禮悔吝之事何由而及明闇短長更是才用之多少耳南史曰張岱字景山吳郡吴人張裕子也州辟從事遷東遷令時殷冲為吴興太守謂人曰張東遷親貧須養所以棲遲下邑然名器方顯終當大至後為司徒西曹掾沈瓉之在丹徒性至踈直自以廉潔不事左右浸潤日至遂鎻繫尚方南史曰沈瓉之吳興武康人為丹徒令以清亷抵罪邱寂之歎曰清吏真不可為也政當處季孟之間瓉之自言願一見天子上召問復欲何陳答曰臣坐清所以獲罪上曰清復何以得罪言無以承奉要人上問要人為誰瓉之以手板四面指曰此赤衣諸賢皆是後上知其無罪復除丹徒令吏人候之瓉之戯語曰我今重來當以人肝代米不然清名不立何敬叔在政清約不通問遺嘗歳儉夏節忽牓門受餉共得米二千八百石悉取以代貧人輸租齊春秋曰何敬叔為長城令在縣淸亷不受饋傅琰為山隂令有賣針賣糖二老姥共争團絲來詣琰琰樹團絲令鞭之宻視有鐡屑乃罰賣糖者劉𤣥明甚有吏能厯建康山隂令政常為天下第一南史曰劉𤣥明臨淮人官至司農卿後傅翽代為山隂問𤣥明曰願以舊政告新令尹𤣥明答曰我有竒術卿家譜所不載孔平仲續世説曰傅僧祐及子琰琰子翽為令並著竒績時云諸傅有理縣譜子孫相𫝊不以示人臨别當以相示既而言作縣令唯日食一升飯而不飲酒此第一䇿也傅翽居官有名為吴令時往别建康令孫亷亷因問曰聞丈人發姦摘伏恵化如神何以至此傅答曰惟勤而能清清則憲綱自行勤則事無不理憲綱自行則吏不能欺事自理則物不凝滯亷深服其言南史曰傅翽北地靈州人祖僧祐山隂令父琰為建康山隂令並著能名二縣謂之傅聖翽位至驃騎諮議顧憲之為建康令剖斷明决人稱神宰權要請托長吏貪殘據法直繩無所阿縱性又清儉強力為政甚得民和故都下飲酒得㫖者輒呼為顧建康言其清醇也南史曰顧憲之字士思呉郡吴人祖覬之湘川刺史憲之官尚書吏部郎中宋時覬之嘗為吏部於庭列植嘉樹謂人曰吾為憲之植耳至是憲之果為此職傅常侍傅昭已見為臨海郡臨海先有􅁡巖前後太守皆自封固専收其利常侍曰周文之囿與百姓共之大可喻小教令勿封安成王初臨江州南史曰安成康王秀字彦逹梁文帝第七子仕齊太子舍人梁朝建封安成郡王時諸王並下士建安安成尤好人物世以二安方之四豪秀精意學術搜集經記招學士劉孝標使撰𩔖苑書未畢而已行於世秀於武帝布衣昆弟及為君臣小心畏敬過於疎賤帝益賢之前刺史取陶徴士曾孫為里司安成歎曰陶潜之徳豈可不及後嗣即日辟為西曹王綸之為豫章下車日祭徐孺子許子將墓圖畫陳蕃華歆謝鯤像於郡朝堂南史曰王綸之字元章王敬𢎞之曾孫為安成王記室叅軍偃仰召㑹退居僚末𡊮粲聞而嘆曰貴㳺居此位者不以文記為髙自綸之始厯侍中出為豫章太守孔光禄除晉陵太守清白自守妻子並不之官唯以單船臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見光禄居處儉素乃餉以衣氊一具光禄曰太守身居美禄何為不能辦此但百姓未周不容獨享温飽勞卿厚意幸勿為煩南史曰孔奐字休文㑹稽山隂人曾祖琇之江夏内史祖臻太子舍人父㓜孫無錫令奐仕齊為建康令梁武受禪除晉陵太守太建中為吏部尚書甚有鑒裁詳練百氏凡所甄拔諸人莫不悦服郎世業泛渉典籍清慎無所營嘗語人曰仕官之所木枕亦不須作况過於此唯頗令人寫書樊子葢曾遺之書曰在官寫書亦是風流罪過世業答曰觀過知仁斯亦可矣三國典畧曰郎基字世業中山新市人魯郡太守智之孫宋世良為清河太守獄内穭生桃樹􅅫蒿亦滿每日門庭虚寂無復訴訟時謂之神門及代去有老人丁金剛曰老人年九十記三十五政府君非惟善政過人清亦徹底今失賢者人何以濟北史曰宋世良字元友西河介休人魏孝莊時拜清河太守才識閑明尤善政術在郡未幾聲問甚髙蘓瓊為清河太守清慎無私有沙門道研求謁意在理債瓊每見則談問𤣥理道研無由啟口弟子問其故道研曰每見府君徑將我入青雲間何由得論地上事遂焚其劵蘓瓊已見髙僕射髙熲别見每以盤盛粉置於卧側思得一公事輒書其上至明則記録入朝行之楊昉為左丞時宇文化及子孫理資䕃朝廷以事隔兩朝其家親族亦衆多為言者所司理之至於左司昉未詳其案狀訴者以道理已成無復疑滯勃然逼昉昉曰適朝退未食食畢當詳案訴者言公云未食亦知天下有累年覊旅訴者乎昉遽命案立批之曰父殺隋主子訴隋資生者猶配逺方死者無宜更叙時人深賞之貟半千調武陽尉值嵗旱勸令殷子良發粟賑民子良不從及子良謁州半千悉發之下頼以濟刺史大怒囚半千於獄會薛元超持節河南讓太守曰君有民不能恤恵出一尉尚何罪耶半千遂得釋薛元超别見殷子良未詳江幾隣嘉祐雜志曰白水縣堯山民掘得誌石是貟半千墓云十八代祖疑自梁入魏本姓劉彭城人以其雅正似伍員遂賜姓員齊劉昫文苑𫝊曰員半千本名餘慶晉州臨汾人少與州何彦先同師王義方義方嘉重之義方卒半千與彦先皆制服喪畢而去上元初授武陽尉睿宗朝至崇文舘學士宋廣平愛民惜物朝野歸美人咸謂有脚陽春劉昫唐書曰宋璟邢州南和人其先自廣平徙焉璟少耿介有大節博學工文翰弱冠舉進士累轉鳯閣舎人當官正色則天甚重之𤣥宗朝累官尚書右丞相封廣平郡公𤣥宗嘗賜酺三日上御五鳳樓觀者喧溢樂不得奏金吾白挺如雨不能遏止上患之髙力士奏河南丞嚴安之為理嚴為人所畏請使止之上從之安之至以手板繞塲畫地曰犯此者死於是三日指其畫以相戒無敢犯者封氏聞見記曰嚴安之為赤縣尉力行猛政裴耀卿勤於政事夜閲案牘晝决獄訟常養一雀每夕自更初有聲至漏盡則急鳴裴呼為知更雀劉昫唐書曰耀卿户部尚書守真子也少聰敏解屬文弱冠拜秘書正字補相王府典籖睿宗在藩甚重之與掾邱悦文學韋利器更直以備顧問府中稱為學直後遷京兆尹尋拜黄門侍郎充轉運使李林甫姦邪隂賊妬嫉賢能至於善守章程深得宰相之體當時雖正直之士多被搆害而尋常仕進者各獲其分至開成間人猶呼為李右座而不名劉昫唐書曰林甫髙祖從父弟叔良之孫天寳中以禮部侍郎同平章事性沉宻城府深阻未嘗以愛憎見於容色自處台衡動循格令衣冠士子非常調無仕進之門秉鈞二十年朝野側目憚其威權及國忠誣搆天下以為寃裴琰之為同州司户叅軍年少不主曹務刺史李崇義内輕之因語曰三輔事繁子盍求便官毋留此琰之唯唯州中有積年舊案數百崇義讓使􅃐斷琰之曰何至逼人乃爾命吏人連紙進筆遂為省閲一日都畢既與奪當理而筆詞勁妙崇義驚曰子何自晦以成鄙夫之過由是名動一州號霹􅆮手徳宗即位淄青節度李正已表獻錢三十萬緡上欲受恐見欺却之則無辭宰相崔祐甫請遣使慰勞淄青將士因以正已所獻錢賜之使將士人人戴上恩諸道知朝廷不重財貨上悦從之正已大慙服𡊮滋為華州刺史以寛易清簡為政劉昫唐書曰𡊮滋字徳深陳郡汝南人弱嵗強學以外兄元結有重名往依焉讀書𤣥解㫖奥結甚重之黜陟使趙賛以處士薦授校書郎使南詔還擢諫議大夫出為華州刺史以寛簡為政百姓至自他境者給地以居其居曰義合里専以慈恵為本人甚愛之徴拜金吾衛大將軍徴為金吾大將軍以楊於陵代之百姓遮道不得去於陵使喻曰吾不敢易𡊮公政人皆羅拜劉昫唐書曰楊於陵字逹夫𢎞農人太尉震之後父太清單父尉禄山亂殁於賊於陵始六歳長客江南好學有竒志釋褐句容主簿時韓滉節制金陵剛嚴少所接與於陵以屬吏謁謝滉甚竒之謂其妻栁氏曰夫人欲擇佳壻吾閱人多矣無如楊主簿者遂以女妻之滉入朝總將相財賦之任於陵以婦翁權幸方熾卜築建昌以讀書山水為樂滉殁始為膳部員外累官檢校右僕射盧坦在江淮時旱儉穀貴或請抑其直坦曰所部地狹榖來他州若直賤不來耳不如任之既而商賈以米坌至又多貸兵食出諸市中米價頓平唐書曰盧坦字保衡河南洛陽人初為義成軍判官累遷中丞出為宣歙池觀察使李徳裕在浙西日南方信禨巫父母癘疾人子厭棄不肯收養徳裕擇長老可語者喻以孝慈大倫患難相收無可棄之義數年惡俗大變劉昫唐書曰李徳裕字文饒趙郡人祖栖筠御史大夫父吉甫元和初宰相徳裕㓜有壯志苦心力學年纔及冠志業大成貞元中以父譴逐蠻方隨侍左右元和初父再秉國鈞避嫌不仕十一年得殿中侍御史穆宗召入翰林轉中書舍人後李逢吉欲引牛僧孺為相懼徳裕與李紳止之出為浙西觀察使李徳裕初作相兩街使請准例每早朝令兵衛送徳裕判云在具瞻之地自有國容當無事之時何勞武備衛送宜停白傅白樂天已見為郡日恩信及民百姓皆愛而思之嘗植檜數本於郡圃後人目為白公檜以比甘棠開成中延英奏對李石已見言臣往年從事西蜀中元日嘗詣佛寺見故劍南節度使韋臯圖形百姓至者先拜而後謁佛至有欲泣者臣訪於故老皆曰令公恩深於蜀方百姓税重令公輪年全放自令公後無此恵澤百姓窮困追思益切唐書曰韋臯字武臣京兆人貞元元年為劍南西川節度使以功加檢校司徒中書令封南康郡王令狐文公除守兖州州方旱儉米價甚髙迓史至公首問米價幾何州有倉倉有幾石屈指獨語曰舊價若干諸倉出米若干定價出糶則可賑救左右竊聴語逹郡中富人競發所蓄米價頓平劉昫唐書曰令狐楚字殻士家世儒素楚善屬文李説嚴綬鄭儋相繼鎮太原皆辟從事楚才思俊麗徳宗好文每太原奏至能辨楚之所為鄭儋在鎮暴疾不及處分後事軍中諠譁將有急變中夜十數騎持刃廹楚至軍門令草遺表楚在白刃中搦管即成讀示三軍無不感泣軍情乃安自是聲名益重官尚書僕射封彭陽郡公謚曰文文宗已見賜翰林學士章服續有待詔先欲賜者上曰賜君子小人不同日待詔賜且待别日趙中令為相日於㕔事屏風後置二大甕凡有人投機宜文字者悉置於中滿即焚之通衢東都事畧曰趙普字則平幽州薊人沉厚有大畧宋太祖受禪以佐命功累官中書令李文靖李沆已見為相當太平之際凡有建議務更張喜激昻者一切報罷曰用此報國湘山野録曰李公嘗被同年馬亮責之曰外議以兄為無口瓠公笑曰吾居政府然無長才但中外所陳利害一切報罷聊以此補國耳今國家防制纎悉宻若凝脂茍狥所陳一一行之則所傷實多陸象先曰庸人撓正正謂此也憸人茍一時之進豈念於民耶公薨沐浴右脅而逝盛暑中七日方斂不聞腐氣信履踐之明效也宋世京畿及各郡皆有激賞庫遇羣盗竊發郡家開庫募士故盗不旋踵輒被擒獲宋世於郡縣立慈㓜局凡貧家子多欲厭棄不育者許其抱至局書生年月日局置乳媪鞠視他人家或無子女却來局取養之歳祲子女多入慈㓜局道無抛棄者信乎仁澤之周也五代以來軍卒陵將帥胥吏陵長官餘風至宋猶未盡除張乖崖張詠已見為崇陽令一吏自庫中出􅁂傍巾下有一錢詰之乃庫中錢也乖崖命杖之吏勃然曰一錢何足杖我耶爾能杖我不能斬我也乖崖援筆判云一日一錢千日千錢繩鋸木斷水滴石穿自仗劍下堦斬其首申臺府自劾崇陽人至今𫝊之錢若水為同州推官五朝名臣言行録曰錢若水字淡成河南人舉進士官至同知樞宻院事時有富民女奴逃亡父母訟於州州録事嘗貸於富民不獲乃劾富民父子共殺女奴罪皆應死富民不勝榜楚自誣服具獄上州皆覆實無反異若水獨疑之留其獄數曰録事詣若水詬之曰若受富民錢欲出其死若水笑謝曰今數人當死豈可不少留熟觀其獄辭耶留之且旬日若水詣知州屏人言曰若水所以留其獄者宻使人訪求女奴今得之矣因宻送於知州所知州垂簾引女奴父母從簾中推女奴示之父母持之而泣乃引富民父子破械縱之其人號泣不肯去曰㣲使君則某滅族矣知州言此推官之賜其人趨詣若水㕔事若水閉門拒之曰知州自求得之我何與焉其人不得入繞墻而哭傾家資飯僧為若水祈福知州又欲論奏其功若水固辭曰若水獄事正人不寃死耳論功非本心也且朝廷若以此為若水功當置録事於何地知州歎服司馬温公涑水記聞曰錢若水為同州推官知州性褊急數以胷臆决事若水固争不能得輒曰當陪奉贖銅耳旣而果為上司所駁州官皆以贖論知州愧謝已而復然如此數次謝諌議知襄州日張宻學逸為鄧城令有善政鄧去襄城度漢水才十餘里謝暇日多乘小車從數吏渡漢水入鄧城界以觀風謡或載酒邀張於野外同酌吟嘯終日而去宋史曰謝泌字宗源歙州人少好學有志操賈黄中知宣州一見竒之累官右諫議大夫判吏部銓鄧墨客揮犀曰謝諫議名知人喜薦下吏知襄州日待城知縣張逸特厚將薦之朝乃先設几案庭中置章其上望闕焚香拜曰老臣為朝廷得一能吏乃封上之逸官至樞宻學士累典大郡皆有能名趙徳明言民饑求糧百萬斛大臣皆曰徳明新納誓而敢違約請以詔書責之真宗以問王魏公王旦已見公請勑有司具粟百萬於京師詔徳明來取上從之徳明得詔慙且拜曰朝廷有人張師徳謁向文簡向敏中别見曰師徳兩詣王相公王旦已見皆不得見恐為人輕毁望公從容明之一日方議知制誥王曰可惜張師徳向問何謂王曰累於上前説張師徳名家子有士行不意兩及吾門狀元及第師徳是狀元張去華子師徳又狀元及第榮進素定但當静以待之若奔競而得使無階者何如向方以師徳意啟之公曰某處安敢輕毁人但師徳後進待我淺也向因稱師徳適有闕望公弗遺公曰第緩之使師徳知聊以戒貪進激薄俗也蔣侍郎蔣堂已見為江淮轉運日屬縣例致賀冬至書皆投書即還有一縣使人獨不肯去須責回書呵逐亦不去曰寜得罪不得書不敢回邑時蘓子美别見在坐頗駭曰皂隷如此野狠其令可知蔣曰不然此必徤者能使人不敢慢其令如此乃為一簡答之方去子美歸吳中月餘得蔣書曰縣令果徤者遂延譽後卒為名臣或云是天章閣待制杜杞涑水記聞曰杜杞字偉長為河南轉運使五溪蠻反杞以金帛誘出之因為設宴飲以漫陀羅酒昬醉盡殺之因立大宋平蠻碑自擬馬伏波上疏論功朝廷劾其棄信専殺之狀既而舍之官至天章閣待制范文正公用士多取氣節而濶畧細故如孫威敏滕逹道皆所素重其為帥日辟置幕客多取見居謫籍未牽復人或疑之公曰人有才能而無過朝廷自應用之若其實有可用之材不幸䧟於吏議深文不因事起之則遂為廢人矣故公所舉多得士滕逹道别見元東都事畧曰孫沔字規㑹稽人為人明敏果敢有材知衡山縣上書言事以切直謫監衡州酒稅移通州楚州所至皆有能迹召為右正言拜樞宻副使契丹使請觀太廟樂宰相言非祠享不可習沔請以理折之乃謂使臣曰廟樂之作皆本朝所以歌詠祖宗功徳使人如能留助吾祭乃可觀之由是不敢復請卒官觀文殿學士謚威敏皇祐中東吳大饑時范文正領浙西吴人喜競渡好為佛寺文正縱民競渡太守日出宴於湖上居民空巷出遊大興工役諸寺鼎興又新敖倉吏舎日役千夫監司奏劾杭州不恤荒政嬉遊不節公私興造傷耗民力文正乃自條叙所以宴遊興造皆欲發有餘之財以恵貧者服力之人仰食公私無慮數萬荒政之施莫此為大是嵗兩浙唯杭州晏然民不流徙人以為文正之恵富韓公在青州活饑民四十餘萬公常自以為功語人曰過於作中書令二十四考矣邵氏聞見録曰富弼字彦國河南人初逰塲屋穆伯長見而謂之曰進士不足以盡子之才當以大科名世後果登大科位至丞相封韓國公謚忠文歐陽公好推挽後學王向小時為三班奉職勾當滁州一鎮公守滁日有書生為學子不行束修自往詣之學子閉門不接書生訟于向向判其牒曰禮聞來學不聞往教先生既已自屈弟子寜不少髙盍二物以收威豈兩辭而造獄書生不喜向判徑持牒以見歐公公一閲大稱其才遂為延譽卒成聞人宋史曰王向字子直福建侯官人王回弟也為文長於序事嘗作公黙先生𫝊歐陽公知開封日承包孝肅政猛之後一切循理不事風采或以包之政勵公者公答曰凡人材性不一各有長短用其所長事無不舉強其所短政必不逮吾亦任吾所長爾聞者服其言吕氏家墊記曰包拯字希仁嘗為京尹令行禁止天下皆呼為包待制又曰包家故市井小民及田野之人見徇私者皆指笑之曰你一箇包家見貪汚者曰你一箇司馬家葢當時亦稱司馬君實為司馬家謝希深㓜子景平監光化軍税有一兵官為本㕔軍員所持憂憤不樂景平一日問之兵官語其事景平曰君第自解去吾必能報之兵官既去景平呼軍員責之曰老兵何敢把持兵官使罷任去軍員無頼大言曰景平但可飲酒擊鞠耳此事何能預景平以犯階級送獄獄成决配之希深一時有大名其諸子皆賢景平最㓜尚有家風龔明之中吳紀聞曰謝絳字希深太子賔客濤之子楊文公薦其才召充秘閣校理寳元初知鄧州自少而仕凡五十年自守不回而外亦不甚異一時賢士大夫無不敬之子景初景温皆為名儒孫夢得為中丞東都事畧曰孫抃字夢得眉州眉山人六世祖長孺喜蔵書為樓而置其上蜀人謂之書樓孫氏抃中甲科官翰林學士薦唐介吳中復為御史唐介别見東都事畧曰吳中復字仲庶興國軍人孫抃薦為御史彈治宰相梁適謫判䖍州後知永興軍闗右大旱中復奏請賑䘏執政遣使案驗誣以不實坐奪一官為人樂易簡約好周人之急士大夫稱之或人問曰聞君未嘗與二人相識而薦之何也孫答曰昔人恥呈身御史今豈求識面臺官耶後二人俱以風力稱於天下孫晚年執政嘗歎曰吾無功以輔政唯薦二臺官為無愧耳司馬文正公作相日親書牓稿掲于客位曰訪及諸君若覩朝政闕遺庶民疾苦欲進忠言者請以奏牘聞於朝廷光得與同僚商議擇可行者進呈取㫖行之但以私書寵諭終無所益若身有過失欲賜規正即以通封書簡分付吏人𫝊入光得内自省訟佩服改行至於整會官職差遣理雪罪名凡干身計並請一面進狀光得與朝省衆官公議施行若在私第垂訪請不語及髙宗視師金陵時張魏公為守張浚已見楊和王領殿前司有卒夜出與兵馬都監喧競卒訴之公判曰都監夜廵職也禁兵酉㸃後不許出營法也牒宿衛司照條行和王不得已命斬之張魏公守金陵日嘗詣學有一士人投牒取視則爭博也公立判云士子争財於學校教化不明太守罪也當職先罰俸半月牒學照規行教官大窘引去秦檜當國日民間以乏見鏹告貨壅莫售京尹曹泳以白檜檜即席命召文思院官􅃐者絡繹既至亟諭之曰適得㫖欲變錢法煩公依舊夾錫様鑄一緡將以進入盡廢見鏹不用約以翌午畢事院官退夜呼工鞴液將以及期富家聞之大窘盡輦宿蔵争取金粟物賈大昻泉溢於市曲端為涇原都統日張魏公嘗按視其軍端執撾以軍禮見營中閴無一人公異之謂欲㸃視端以所部五軍籍進公命㸃其一部端於庭間開籠縱一鴿以往而所㸃之軍隨至張為愕然既而欲盡閲於是悉縱五鴿則五軍頃刻而集戈甲煥燦旗幟精明公大加奨異周公謹曲壯閔本末曰曲端字平甫鎮戎軍人善屬文長於兵畧張浚宣撫川陜以端有威聲承制拜宣撫司都統制羅索寇邠州端屢戰皆㨗薩里罕乘髙望之懼而號泣敵人目為啼哭郎君既而浚欲大舉未測其意先使張彬覘之曰公常患諸路兵不合財不足今宣撫司兵已合財已足羅索以孤軍深入我合諸路攻之不難萬一尼堪併兵而來何以待之端曰不然兵法先較彼已今敵可勝止羅索孤軍然將士輕脱不减前日我不過止合五路兵耳然將士無以大異於前兼敵之入㓂因糧於我我常為客彼常為主今當按兵據險時出偏師以擾其耕彼不得耕必將取糧河東是我為主彼為客不一二年間必自困斃可一舉而滅萬一輕舉後憂方大彬以其言復命浚不悦其秋烏珠窺江淮浚議出師㑹諸將議所從端力以為不然須十年乃可端既與浚異􅃐時王庶為參謀與端有宿怨譛於浚曰端有反心久矣盍早圖之浚積前疑復聞庶言大怒罷其兵柄謫海州團練萬安軍安置是年浚大舉軍至富平縣將戰立前軍都統制曲端旗以懼之羅索曰聞曲將軍已得罪必紿我也擁軍驟至軍遂大潰浚心愧其言而欲慰人望乃下令以富平之役涇原軍出力最多皆前帥曲端訓練有方叙復左武大夫興州居住浚自興州移司閬州復用端吳玠憾之懼端復起乃言曰曲端再起必不利於張公王庶又譛之浚入其説且以張中爭李彦琪趙彬降虜疑端知其謀徙端恭州置獄端赴逮知必死仰天長吁指其所乘戰馬鐵象云天不欲復中原乎惜哉泣數行下左右皆泣初至獄有一官日盛服候之如事上官禮端甚訝之一日其人忽前云將軍功臣朝廷所知决無他慮若欲早出第手書一病狀獄司即以申主便可憑藉出矣端欣然書之甫就獄官遽卷懐而去是晚即進械坐之鐡籠熾火逼之殊極慘惡渇甚求飲與之酒九竅流血而死年四十一至今西北故老尚能言其寃而四朝國史端本傳之論乃曰曲端之死時論或以為寃然觀其很愎自用輕視其上縱使得志終亦難御况動違節制夫何功之可言乎此雖史臣為魏公地然失其實矣信如所言則秦檜之殺岳飛亦不為過或又比之孔明斬馬謖尤無謂也直筆之難也乆矣惜哉陳良翰在瑞安瑞安俗號強梗吏治尚嚴陳獨撫之以寛催租不下文符但掲示名物民競樂輸聽訟咸得其情或問陳何術陳答曰良翰無術第公此心如虚堂懸鏡耳宋史曰陳良翰字邦彦台州臨海人蚤孤事母至孝性資莊重為文恢博有氣中紹興五年進士知温州瑞安縣累官太子詹事馬人望為度支判官㑹檢括户口人望未兩旬而畢同知留守蕭保先怪而問之人望曰民産若括之無遺他日必長厚歛之弊大率十得六七足矣保先謝曰公慮逺吾不及也遼史曰馬人望字儼叔髙祖𦙍卿為石晉青州刺史人望頴悟㓜孤長以才學稱咸雍中第進士官至參知政事卒謚文獻張特立為宣徳州司候州多國戚號難治特立至官俱往謁之有五將軍者率家奴刼民羣羊特立命大索閭里遂過將軍家温言誘之曰將軍宅寜有盗羊者耶聊視之以杜衆口潜使人索其後庭得羊數十遂縳其奴繫獄其子匿他舍捕治之豪貴歛跡民頼以全元史曰張特立字文舉東明人為偃師主簿改宣徳州候世宗時歸𨼆田里世祖特賜號中庸先生胡汲仲已見嘗為台州寜海主簿時浙東大祲宣慰同知托歡徹爾議賑䘏歛富人錢一百五十萬給之至縣以餘錢二十萬屬汲仲去行旁縣汲仲察其有乾沒意悉散於民閲月再至索其錢汲仲抱成案進曰錢在是矣托歡徹爾怒汲仲曰民一日不食當有死者誠不及以聞然官書具在可徴也托歡徹爾不敢問胡汲仲在寜海日有羣嫗相聚於佛菴誦經一嫗失其衣適汲仲出行嫗訟之汲仲命以牟麥寘羣嫗掌中令合掌繞佛誦經如故汲仲閉目端坐且曰吾使神督之盗衣者行數周麥當芽中一嫗屢開視其掌汲仲命縳之還所竊衣至元中鈔法不行詔遣尚書劉宣與兵部郎中趙孟頫馳驛至江南問行省丞相慢令之罪仍命凡左右司及諸路官則徑笞之孟頫受命而行比還不笞一人元史曰趙孟頫字子昻宋太祖子秦王徳芳之後五世祖秀安僖王子偁四世祖崇憲靖王伯圭髙宗無子立子偁之子是為孝宗伯圭其兄也賜第湖州故為湖州人父與訔生孟頫㓜聰敏讀書過目輒成誦為文操筆立就宋亡家居益自力於學至元中程鉅夫奉詔搜訪遺逸於江南得孟頫以之入見世祖大悦王克敬為江浙行省叅政有松江一大姓嵗漕米萬石獻京師其人既死子孫貧且行乞有司仍嵗徴弗足則雜置松江田賦中令民包納克敬曰匹夫妄獻米徼名爵以榮一身今身死家破又已奪其爵不可使一郡之人均受其害國家寜乏此耶具奏免之元史曰王克敬字叔能大寜人㓜竒頴嘗戯道旁丞相完澤見而異之大寜朔土習尚少文而克敬孜孜為儒者事既仕為江浙行省屬累遷吏部尚書乘傳至淮安墜馬居呉中養疾元統初起為江浙行省叅知政事王克敬嘗為兩浙鹽運使温州逮鹽犯以一婦人至克敬大怒曰豈有逮婦人行千百里外與吏卒雜處者汚教甚矣自今毋得逮婦人建議著為令葢苖為濟寜路單州判官會歳饑白郡府郡府未有以應時他邑亦以告郡府遣苖至户部以請户部難之苖伏中書堂下出糠餅以示曰濟寜民率食此况不得食此者尤多豈可坐視而不救因泣下時宰大悟凡被災者咸獲賑焉元史曰葢苖字耘夫大名元城人聰敏好學善記誦弱冠遊學四方藝業大進延祐中授濟寜路單州判官語林卷六
