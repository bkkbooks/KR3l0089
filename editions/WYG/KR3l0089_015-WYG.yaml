body:
  text: 語林卷十五明何良俊撰識鑒第八夫人情深阻而莫測事勢倚伏而難定况乎人方幼而即審其終事未形而能知其著可不謂尤難哉書曰知人則哲維帝其難之易曰知幾其神乎不虚耳然子貢億則屢中夫子顧少之焉何平叔曰子貢不窮理而幸中亦所以不虚心也蓋聖人者心如明鏡遇物便了豈有議擬一涉議擬或幸中鮮不失矣况億以為知者哉易稱寂然不動感而遂通釋氏所謂常寂常照皆此道也後世去古聖賢甚逺然觀其品校人物推測事幾多竒中若大賢以下有不能者何耶蓋東漢以後尚老釋宋世好談理性嗚呼清虚澄汰之功又焉可誣也吳祐牧猪長垣澤中誦經而行范曄後漢書曰吳祐字季英陳留長垣人年二十喪父居無擔石而不受贍遺常牧豕於長垣澤中行吟經書後舉孝亷北海公沙穆遊太學資乏變服為傭與祐賃舂遂為交於杵臼之間延熹中京師遊士范滂諸人非毁朝政公卿以下折節下之太學生争慕其風以為文學將興處士復用申屠蟠歎曰范曄後漢書曰申屠蟠字子龍陳留外黄人九嵗喪父哀毁過禮家貧傭為漆工郭林宗見而竒之同郡蔡邕深重蟠及被州辟乃讓蟠曰蟠秉氣𤣥妙性敏心通喪親盡禮幾於毁滅至行美義人所鮮能安貧樂潛味道守真不為燥濕輕重不為窮達易節方之於邕以齒則長以徳則賢郡召主簿不行太尉黄瓊辟不就瓊卒歸葬四方名豪會者六七千人互相談論莫能及蟠惟南郡一生與相酬對旣别執蟠手曰君非聘則徴當相見於上京矣蟠勃然作色曰始吾以子為可與言何意乃拘敎樂貴之徒耶振手而去不復與言昔戰國之世處士横議列國之君至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人謝承後漢書曰蟠居蓬萊之室依桑樹為楝前後徵辟文書悉挂於樹初不顧盻也鍾季明鍾皓己見為郡功曹時陳太丘陳寔己見為西門亭長鍾深獨敬異太丘少鍾十七嵗常禮待與同分義會辟公府臨辭太守問鍾誰可代君鍾曰明府必欲得其人西門亭長可用太丘曰鍾君似不察人為意不知何獨識我鍾季明兄子覲是李元禮李膺己見姑子與元禮年齊並有令名覲又好學慕古有退讓之行元禮祖太尉漢官儀曰李修字伯游安帝時為太尉言覲似我家性國有道不廢國無道免於刑戮復以元禮妹妻之元禮嘗謂覲曰孟軻以為人無好惡是非之心非人也弟於人何太無皂白耶覲嘗以元禮之言白鍾君鍾君曰元禮祖公在位諸父並盛韓公之甥故得然耳國武子好昭人過以為怨本今豈其時保身全家汝道為是後元禮雖荷功名卒殞身世禍范曄後漢書曰元禮免歸鄉里居陽城山中天下士大夫皆髙尚其道而汙􅁾朝廷荀爽恐其名髙致禍欲令屈節以全亂世為書貽曰久廢過庭不聞善誘陟岵瞻望惟日為嵗知以直道不容於時恱山樂水家于陽城道近路夷當即聘問無狀嬰疾闕於所仰頃聞上帝震怒貶黜鼎臣人鬼同謀以為天子當貞觀二五利見大人不謂夷之初旦明而未融虹蜺揚煇棄和取同方今天地氣閉大人休否智者見險投以逺害雖匱人望内合私願想甚欣然不為恨也願怡神無事偃息衡門任其飛沈與時抑揚李元禮一世龍門時同縣聶季寶小家子不敢見元禮杜周甫知季寶賢不能定名以語元禮元禮呼見坐置砌下牛衣上一與言即決曰此人當作國士後卒如元禮言聶季寶未詳許子將山峙淵停行應規表范曄後漢書曰許劭字子將汝南平輿人少峻名節好人倫多所賞識與兄靖俱有髙名好共論郷黨人物毎月輒更其品題汝南俗有月旦評焉謝子㣲世稱其裁鑒見子將十許嵗時歎曰此乃希世之偉人汝南先賢傳曰謝甄字子㣲汝南召陵人禀氣聰爽明識達理有人倫嘗曰察其盼睞則賞其心覩其顔步則知其道許子將嘗到潁川多長者之游唯不詣陳仲弓陳寔己見又陳仲舉陳蕃己見妻喪還葬鄉人俱至許獨不徃或問其故子將曰太丘道廣廣則難周仲舉性峻峻則少通故不造也時人服其裁量衛子許弱冠與同郡圏文生同稱盛德郭林宗與二人俱到市子許買物隨價讐直文生訿呵減價乃取林宗曰子許少欲文生多情此二人非徒兄弟乃父子也後文生以􅁾貨見捐子許以烈節致譽先賢行狀曰衛兹字子許陳留襄邑人不為詭激之行不狥流俗之名明慮淵深規畧宏逺為車騎將軍何苗所辟司徒楊彪再加旌命漢室傾蕩曹公到陳留與兹相見同議起兵兹曰亂生久矣非兵無以整之由是首讃洪謀從太祖入滎陽力戰終日失利而殁曹操㣲時人無知者嘗徃候橋太尉太尉見而異焉范曄後漢書曰橋𤣥字公祖梁國睢陽人少為縣功曹舉孝亷補洛陽左尉光和元年拜太尉性剛急無大體然謙儉好士及卒家無居業喪無所殯當時稱之語曹曰今天下將亂安生民者其在君乎曹常感其知己後經太尉墓輒悽愴致祠自為祭文按曹公祭文曰故太尉橋公懿德髙軌汎愛博容國念明訓士思令謨幽靈潛翳懇哉緬矣操以幼年逮升堂室特以頑質見納君子增榮益觀皆由奬朂猶仲尼稱不如顔淵李生厚歎賈復士死知己懐此無忘又承從容約誓之言殂没之後路有經由不以斗酒􅃗雞過相沃酹車過三步腹痛勿怨雖臨時戲笑之言非至親之篤好胡肯為此辭哉懷舊惟顧念之悽愴奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其享之盛孝章為臺郎路逢一童子是孔文舉孔融己見孔時年十餘嵗孝章察其容貌非常怪而問之孔舉手答曰是魯國孔融孝章以為異乃載歸與之言知其竒才便結為兄弟升堂拜親虞預會稽典錄曰盛憲字孝章㑹稽人器量雅偉舉孝亷補尚書郎遷吳郡太守孫䇿定吳會誅其英豪憲素有名䇿深忌之初憲與少府孔融善憂其不免與曹公書由足徵為都尉詔命未至果為權所害王叔優與弟季道小時聞郭林宗有知人之鑒共徃候之請問才行所宜以自處業林宗笑曰卿二人皆二千石才也然叔優當以仕宦顯季道宜以經術進若違才易務亦不至也叔優等從其言後叔優至北中郎將季道代郡太守王氏世譜曰王㫤字文舒太原晉陽人伯父柔字叔優父澤字季道荀令君舉士不以一揆荀彧己見戲志才魏志曰戲志才籌畫士也太祖甚器之早卒郭嘉魏志曰郭嘉字奉孝潁川人太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多竒士誰可以繼之彧薦嘉召見論天下事太祖曰使孤成大業者必此人也有負俗之累杜畿簡傲少文魏志曰杜畿字伯侯京兆杜陵人終傅子曰畿自荆州還至許見侍中耿紀語夜尚書令荀彧與紀比屋夜聞畿言異之旦遣人謂紀曰有國士而不進何以居位旣見畿如舊相識遂進畿于朝皆以智䇿舉之終各顯名司馬徳操司馬徽己見有人倫在荆州時知劉表性暗必害善人乃括囊不復談議時有以人物問徳操者初不辯其髙下每輒言佳其婦諫曰人質所疑君宜辯論而一皆言佳豈人所以咨君之意徳操曰如卿所言亦復佳司馬徽别傳曰有人謂劉表曰司馬徳操竒士也但未遇耳表後見之曰世人多妄語此直小書生耳便以為竒其智而能愚皆此類管幼安管寧己見見公孫度時語唯經典不及世事乃因山為廬鑿坏為室越海避難者皆就之旬月成邑遂講詩書陳爼豆飾威儀明禮讓非從學者弗見由是度安其賢民化其徳邴原時亦在遼好以清議格物度已下心不安之幼安謂原曰潛龍以不見為徳言非其時皆招禍之道也宻勸令西還杜伯侯杜畿己見與太僕李恢東安太守郭智有好恢子豐交結英雋以才智著名魚豢魏畧曰李豐字安國年十七八鄴下名為清白識别人物海内翕然注意後隨軍在許昌聲稱日隆其父不願其然令閉門斷客明帝在東宫豐在文學中及即尊位得吳降人問江東聞中國名士為誰降人云聞有李安國者時豐為黄門郎帝問左右安國所在左右以對帝曰豐名乃被於吳越耶轉騎都尉智子冲有内實而無外觀蜀記曰晉扶風王駿鎮關中司馬劉寶長史桓隰諸官屬共論諸葛亮於時談者多譏亮託身非所勞因蜀民力小謀大不能度徳量力金城郭沖以為亮權智英畧有踰管晏因條亮五事隱没不聞於世者寶等不能復難扶風王慨然善沖之言伯侯為尚書僕射二人各修子孫禮見伯侯旣退伯侯歎曰孝懿無子非徒無子殆將無家君謀為不死也時人皆以伯侯為誤恢死後豐為中書令父子兄弟皆誅沖為代郡太守卒繼父業世乃服伯侯知人龎士元性好人倫勤於長養毎所稱述多過其才時人或問之士元曰當今雅道陵遲善人常少方欲興風俗長道業不美其譚即聲名不足企慕不足企慕而為善者少矣今拔十失五猶得其半而可以崇邁世敎使有志者自勵不亦可乎時人服其言襄陽記曰龎統字士元襄陽人少未有識者惟徳公重之年十八使見司馬徳操徳操與語旣而歎曰徳公誠知人此實盛徳也李衡小時聞羊道别見有人物徃干之道曰多士之世尚書劇曹郎也襄陽耆舊傳曰李衡字叔平襄陽人習竺以女英習配之漢末為丹陽太守孫休在丹陽衡數以法繩之後休得立衡自詣獄表列前失休下令曰李衡以徃事之嫌自拘有司夫射鉤斬袪在君為忠遣衡還郡勿令自疑加威逺將軍荀奉倩荀粲己見與傅蘭碩魏志曰傅嘏字蘭碩北地泥陽人弱冠知名司空陳羣辟為掾本傅子曰嘏旣達治好正而有清理識要好論才性原精㣲尠能及之司隸校尉鍾會年甚少嘏以明智交會夏侯太初夏侯𤣥别見親善荀常語蘭碩與太初曰子等在世塗間功名必勝我但識劣我耳蘭碩難曰能盛功名者識也天下孰有本不足而末有餘者耶荀曰功名者志局之所奬也然則志局自一物耳固非識之所獨濟也我以能使子等為貴然未必齊子等所為二人莫能難裴使君裴徽己見問管公明管輅己見何尚書何晏己見一代名士其實何如管曰其才若盆盎之水所見者清不見者濁神在廣博志不務學弗能成才如以盆盎之水求一山之形形不可得則智由此惑故說老莊則巧而多華說易義則美而多偽華則道浮偽則神虚得上才則淺而絶流得中才則遊精而獨出輅以為少功之才也裴使君曰吾數與何平叔共說老莊易義常覺其辭妙於理不能折之又時人吸習歸之益令不了相見得清言然後灼灼耳夏侯太初在正始中風格髙朗𢎞辯博暢魏志曰夏侯𤣥字太初少知名弱冠為散騎黄門侍郎無世語曰𤣥世名知人為中䕶軍拔用武官叅㦸牙門非俊傑牧州典郡立法垂敎皆為後式曹爽誅後徵為太常内知不免不交人事不畜筆研魏畧作不畜華妍及司馬宣王亡許領軍謂之曰魏畧曰許允字士宗髙陽人少與清河崔賛俱發名于冀州官領軍將軍卿無復憂矣太初歎曰士宗卿何不見事乎此人猶能以通家年少遇我子元子上不吾容也司馬師字子元晉景王司馬昭字子上晉文王後果及難魏氏春秋曰中書令李豐惡大將軍執政謀以𤣥代之大將軍聞其謀誅豐收𤣥送廷尉干寶晉紀曰初豐之謀也使告𤣥𤣥答曰宜詳之爾不以聞也故及於難曹殷基通語曰司馬懿誅曹爽費褘設甲乙論甲以為爽兄弟凡品庸人以宗子支屬得䝉顧命而驕奢僭逸交非其人私樹朋黨謀以亂國懿奮誅戮一朝殄盡此所以副士民之望也乙以為懿感曹仲附已不一豈爽與相干事勢不專以此隂成疵瑕初無忠告侃爾之訓一朝屠戮讒其不意豈大人經國篤本之事乎若爽信有謀主之心大逆已構而發兵之日更以芳委爽兄弟懿父子從後閉門舉兵蹙而向芳豈忠臣為君深謀之謂乎以此推之爽無大惡明矣若懿以爽奢僣廢之可也滅其尺口􅀍以不義絶子丹血食及何晏魏之親甥亦與同戮為僣濫不當矣夏侯仲權入蜀魏志曰夏侯覇字仲權夏侯淵子素為曹爽所厚爽誅自疑亡入蜀姜伯約姜維别見問之曰司馬公旣得彼政還復有征伐之志不仲權曰此人方營立家門未遑外事有鍾士季鍾會己見者其人雖少終為吳蜀之憂劉恭嗣年十嵗時嘗於講堂上戲司馬徳操拊其頭曰孺子孺子黄中通理寧自知不魏志曰劉廙字恭嗣南陽安衆人兄望之有名於世劉表辟為從事數以正諫不合投傳告歸廙謂望之曰趙殺鳴犢仲尼回輪今兄旣不能法栁下惠和光同塵於内則宜模范蠡遷化於外坐而自絶殆不可也望之不從尋遇害廙遂歸太祖太祖辟為丞相掾歴官侍中辛憲英是佐治女世語曰憲英適泰山羊躭累魏志曰辛毘字佐治潁川陽翟人遷衛尉聰明有才鑒初文帝與陳思王爭為太子旣而文帝得立抱佐治頸曰辛君知我喜不佐治以告憲英憲英曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚而喜何可以久魏其不昌乎夏侯湛憲英傳曰憲英弟敞為大將軍曹爽叅軍司馬宣王將誅爽因爽出閉城門司馬魯芝將爽府兵斬關出城赴爽來呼敞俱去敞問憲英曰天子在外太傅閉城門人云將不利國家於事可得爾乎憲英曰天下有不可知然以吾度之太傅不得不爾明皇帝崩把太傅臂以後事付之此言猶在朝士之耳且曹爽與太傅俱受寄託之任而獨專權勢於王室不忠於人道不直此舉不過誅爽耳敞曰然則事就乎憲英曰得無殆就爽才非太傅之偶也敞曰然則敞可以無出乎憲英曰安可不出職守人之大義也凡人在難猶或恤之為人執鞭而棄其事不祥敞遂出宣王果誅爽敞歎曰吾不謀於姊幾不獲於義逮鍾會為鎮西憲英謂從子羊祜曰會在事縱恣非持久處下之道吾畏其有他志也祜曰季母勿多言其後會請子琇為叅軍憲英憂曰他日見鍾會之出吾為國憂之今日難至吾家琇固請司馬文王不聽憲英語琇曰行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其惟仁恕乎琇竞以全聶友小時為縣吏虞仲翔虞翻己見徙交州縣令使友送之仲翔與語竒焉為書與豫章太守謝斐令以為功曹郡時見有功曹斐問之曰縣吏聶友可堪何職功曹答曰此人縣間小吏猶可堪曹佐斐曰論者以為宜作功曹君其避之即用為功曹使至都諸葛元遜友之江表傳曰諸葛恪字元遜瑾長子也少有才名發藻岐嶷辯論應機莫與為對權見而竒之謂瑾曰藍田生玉真不虛也時論謂顧子黙顧譚己見子直吳志曰顧承字子直譚母弟與陸瑁俱徵孫權與雍書曰貴孫子直令問休休至與相見過於所聞為君嘉之其間無所復容元遜欲以友居其間由是知名吳錄曰聶友字文悌豫章人有唇吻諸葛恪軍還友知其將敗與滕𦙍書曰當人强盛河山可拔一朝贏縮人情萬端言之悲歎恪誅孫峻忌友以為鬱林太守發病死阮嗣宗阮籍己見先與王渾為友世語曰王渾字長原瑯琊臨沂人有才望歴尚書涼州刺史時濬沖年十五晉諸公賛曰王戎字濬沖太保祥宗族晉文王輔政鍾會薦之曰裴楷清通王戎簡要即俱辟晉文踐阼累遷荆州刺史以平吳功封安豐侯隨渾在郎舍濬沖少阮二十嵗阮與之交阮毎適渾俄頃輒去過視濬沖良久然後出嘗謂渾曰濬沖清貴非卿倫也共卿言不如共阿戎談鍾士季鍾會己見伐蜀過王濬沖别問計將安出王曰道家有言為而不恃非成功難保之難也及士季敗衆以為知言嵇叔夜從孫登遊嵇康集目錄曰登字公和不知何許人無家屬於汲縣北山上窟中得之夏則編草為裳冬則被髪自覆好讀易鼔琴見者皆親樂之每所止家輒給其衣服食飲得無辭讓叔夜欲與之言登黙然不對踰時將去叔夜曰先生竟無言乎登乃言曰子識火乎火生而有光而不用其光果然在於用光人生而有才而不用其才果然在於用才故用光在乎得薪所以保其焰用才在於識真所以全其年今子多才寡識難乎免於今之世叔夜不能用遂及於難虞預晉書曰康與東平吕昭子巽及巽弟安親善會巽淫安妻徐氏而誣安不孝囚之安引康為證康義不負心保明其事安亦至烈有濟世志力鍾會勸大將軍因此除之遂殺安及康夏侯太初夏侯𤣥己見為征西時樂彦輔父方嘗叅其軍事彦輔時年八嵗太初見彦輔在路因呼與語還謂方曰向見廣神姿朗澈終為名士虞預晉書曰樂廣字彦輔南陽人清夷沖曠加有理識累遷河南尹用心虚淡時重其貞貴代王戎為尚書令尚書閔鴻見陸士龍陸雲己見小時即竒之曰此兒若非龍駒當是鳯雛武伯南三子小時皆秀異虞預晉書曰武陔字元夏沛郡竹邑人父周字伯南魏光祿大夫陔及二弟韶茂總角見稱並有器望雖鄉人諸父未能覺其多少同郡劉公榮名知人晉陽秋曰劉㫤字公榮沛國人為人通達仕至兖州刺史嘗造伯南伯南曰卿有人倫欲使三兒見卿卿為目其髙下公榮乃自詣陔兄弟與共言論觀其舉動出語伯南曰君三子皆國士也元夏器量最優有輔佐之風展力仕宦可為亞公叔夏季夏不減常伯納言也後陔仕至僕射王渾從子浚是司空沉賤嬖子小時不為親黨所知渾嘗語諸弟曰卿等莫輕彭祖王浚小字此兒平世不減方州牧伯亂世可為都督三公浚懐愍之世果為幽州都督位至鼎輔如渾所說晉諸公賛曰王浚字彭祖為幽州刺史洛陽破浚承制建行臺以宗廟焚毁設壇望祀七室及功臣配食者索靖有先識逺量知天下將亂指洛陽宫門銅駝歎曰會見汝在荆􅁄中晉書曰索靖字幼安燉煌人父湛北地太守靖少有逸羣之量與鄉人汜衷張甝索紒索永俱詣太學馳名海内稱燉煌五龍靖該博經史兼通内緯傅𤣥張華與靖一面皆厚與之相結出為西域戊巳校尉長史張勃表靖才藝絶人宜在臺閣武帝擢為尚書郎與襄陽羅尚河南潘岳吳郡顧榮同官咸器服焉夏少明在東未有名聞裴逸民知人乃裹糧寄載入洛從之未至裴少許見一人著黄皮袴褶乗馬將獵少明問裴逸民家逺近答曰君何以問少明曰聞其名知人故從會稽來投之裴曰身是逸民君明可更來明徃逸民果知之乃用為西門候少明於此遂知名胡母彦國過河南尹門下將飲酒使門卒王子博取火子博曰卒也唯不乏吾事安能為人役彦國呼與語歎曰吾不及也因言於河南尹以為功曹永嘉流人名曰胡母輔之字彦國泰山奉髙人湘州刺史之晉書曰彦國少擅髙名有知人鑒光孟祖為博昌亭長迎新令至都晉書曰光逸字孟祖樂安人初為博昌小吏縣令使逸送客冐寒舉體凍濕遇令不在逸解衣炙之入令被中卧令還大怒將加嚴罰逸曰家貧衣單沾濕無可代若不暫温勢必凍死奈何惜一被而殺一人乎君子仁愛必不爾也故寢而不疑令竒而釋之時胡母彦國與荀道𤣥共詣令家晉書曰荀邃字道𤣥祖朂尚書令父藩司空邃解音樂善談論弱冠辟趙王倫相國掾遷太子洗馬望見孟祖因謂道𤣥曰彼似竒才便呼上車與談良久果是雋器令怪客久不入詢之吏白與光逸共語桓茂倫有鑒識桓彛别傳曰彛字茂倫譙國龍亢人漢桓榮十世孫父穎有髙名彛少孤識鑒明朗避亂渡江累遷散騎常侍年晉中興書曰桓彛家貧而性度髙豁不以簞瓢屑意在弱冠便有知人之鑒為宣城太守百姓懐之嘗去職無事至廣陵尋親舊遇風停浦中累日上岸逍遥見一空宇有似􅅟署桓訪之云是輿縣􅅟令姓徐名寧桓旣獨行思逢悟賞聊造之寧清惠博涉相遇怡然遂停宿因留數夕與寧結友而則徐江州本事曰徐寧字安期東海郯人通朗有徳素初為輿縣令遇桓彛大相賞得桓至都謂庾公曰吾為卿得一佳吏部郎亮問所在桓即敘之遷吏部郎劉真長劉惔己見標寄清逺小時諸人比之𡊮羊劉喜還告其母母有識鑒謂之曰此非汝比勿受之又有方之范汪者劉復喜母又不聽後真長年徳轉升論者比之荀粲范汪别傳曰范汪字𤣥平穎陽人左將軍畧之孫少有不常之志通敏多識博涉經籍致譽於時歴吏部尚書而晉書曰汪少孤六歳過江依外家新野庾氏王澄見竒之及長好學外氏家貧無以資給汪乃廬於園中布衣蔬食燃薪冩書誦讀亦遍博學多通善談名理劉穆之旣為宋武帝委任心懐警惕嘗語所親曰貧賤常思富貴富貴必踐危機今日思為丹陽布衣不可得也沈約宋書曰劉穆之字道和小字道民東莞莒人齊悼惠王肥後也世居京口好書傳博覽多通為濟陽江數所知以宋室佐命贈侍中封南昌縣侯劉裕布衣時人未之識唯王謐獨竒貴之嘗語裕曰卿當為一代英雄謝尚書謝混己見見𢎞㣲己見小時即竒之曰此兒深衷夙敏方成佳器謝晦權遇太盛兄宣逺每裁止之及還彭城言於武帝曰臣本素士父祖位不過二千石弟年始三十志用凡近位任顯宻福過災生特乞降黜以保衰門宋明帝廢立之際王思逺謂從兄晏王晏己見曰兄荷武帝厚恩今一旦賛人如此事彼或可以權計相須未知兄將何以自立及此引決猶可保全門户不失後名晏曰方噉粥未暇此事及晏拜驃騎會子弟謂思逺兄思徵曰隆昌之末阿戎思逺小字勸我自裁若用其語豈有今日思逺遽應曰如阿戎所見猶未晚也旬日晏及禍南史曰王思逺晏從父弟也父羅雲平西長史思逺八歳父卒祖𢎞之及外祖羊敬元並棲退髙尚故思逺少無仕心宋建平王景素辟主簿深見禮遇後至司徒左長史瑯琊王元長才名甚盛欲與徐勉己見相識每託人召之徐謂人曰王郎名髙望促難可輕􅗓衣裾俄而元長及禍時人服其幾鑒建武中褚彦囘嘗與從弟彦宣同載道遇齊太祖彦囘指太祖車語彦宣曰此非常人將來不可測劉祭酒劉瓛己見住在檀橋瓦屋數間上皆穿漏世祖為祭酒立館以楊烈橋故主第給之生徒皆賀祭酒曰室美為人災此華宇豈吾宅耶幸可詔作講堂猶恐見害也未及徙居祭酒遇病卒傅茂逺傅昭己見年十一時隨外祖於朱雀桁賣厯日外祖是𡊮雍州客雍州嘗一日來茂逺所茂逺讀書自若神色不改雍州曰此兒神情不凡必是佳器南史曰𡊮顗字國章陳郡陽夏人𡊮淑兄子也父洵吳郡太守顗官至雍州刺史王僧辯東討梁元帝謂僧辯曰王師近次朝士孰當先來王曰其周𢎞正乎𢎞正智不後機體能濟勝無妻子之顧有獨決之明其餘碌碌不逮也俄而𢎞正至王飛騎迎之及見歡甚曰吾固知王僧辯非後機者公可坐吾膝上周曰所謂進人若將加諸膝老夫何足以當周𢎞正己見栁文暢栁惲己見唯與王暕陸杲厚善每歎曰暕雖名家猶恐累我徐陵己見母臧氏嘗夢五色雲化為鳯凰集左肩上已而誕陵時寶誌公在都世稱其有道家人攜以候之寶誌手摩其頂曰天上石麒麟也北齊王晞為并州司馬昭帝欲以為侍中苦辭不受或勸王勿自疎王曰我少年以來閱要人多矣充詘少時鮮不顛覆且性實疎緩不堪時務人主恩私何由可保萬一披猖求退無地非不欲作熱官但思之爛熟耳王晞己見蕭大圜己見至北時周兵攻髙齊拔晉州或問大圜師遂克不蕭曰髙歡昔以晉州肇基偽迹今本旣拔矣能無亡乎所謂君以此始必以此終數月齊氏果滅聞者以為知言隋吏部侍郎髙孝基鑒識幾悟清慎絶倫然俊爽有餘迹似輕薄時宰多以此疑之唯牛𢎞己見深識其真推心委任後孝基在事選舉最為清允時論彌服牛公識度之逺北史曰髙構字孝基北海人性滑稽多智辯給過人好讀書工吏事仁夀初為吏部侍郎以公事免煬帝立召令復位論者稱構有知人之鑒隋吏部侍郎髙孝基銓人至房梁公劉昫唐書曰房喬字𤣥齡齊州臨淄人幼聰敏博覽經史善屬文為太宗佐命封梁國公杜蔡公愕然端視良久降階與之抗禮延入内㕔共食甚恭曰二賢當為興王佐命位極人臣杜年夀稍減於房耳願以子孫相託後皆如其言王績己見知天下將亂藩部法嚴一日歎曰網羅髙懸去將安所出所受俸錢積于縣城門前託以風疾輕舟夜遁劉文靜一見唐太宗退語裴寂曰大度類於漢髙神武同於魏祖其年雖少乃天縱矣李勣臨事選將必先相其竒龎福艾者遣之或問其故答曰薄命之人不足與成功名劉昫唐書曰李勣曹州狐離人初事李宻宻為王世充所破擁衆歸朝頻立戰功官并州大都督府長史封英國公王師旦知舉日進士張昌齡王瑾並文辭俊爽聲振京邑師旦考其文䇿為下等舉朝不知所以及奏等太宗怪無昌齡等名以問師旦師旦曰此輩誠有辭華然其體輕薄文章浮豔必不成令器臣恐後生倣效有變風雅帝深然之唐詩紀事曰王師旦太宗時考功郎中張昌齡冀州人與兄昌宗俱能文獻翠㣲頌敕於通事舍人裏供奉衡南部新書曰昌齡與文皇作息兵詔上見而歎曰襧潘岳之儔也大唐新語曰昌齡為長安尉以􅂍罪解官王瑾亦無所成李義琛為御史日文成公主貢金遇盜於岐州主名不立太宗召羣御史至目義琛曰是人神情爽拔可使推捕義琛徃數日果獲賊劉昫唐書曰李義琛中書侍郎義琰從祖弟也為雍州長史時關輔饑髙宗欲令貧民逐食義琛恐人流轉不還固争之出為岐州刺史稱良吏王勃在沛王府時諸王方共鬭雞勃戲為沛王檄英王雞髙宗見之大怒曰此殆交搆之漸即日竄勃狄梁公狄仁傑己見初授并州判佐時閻立本黜陟河南梁公為人誣告立本一見即驚謝曰仲尼觀過知仁足下可謂海曲之明珠東南之遺寶特薦之遷并州法曹劉昫唐書曰閻立本雍州萬年人父毘在隋以工藝知名立本與兄立徳早傳家業總章中為右相與姜恪對掌樞宻天后遣徐彦伯迎廬陵王於房州王至后匿王帳中召見狄梁公語廬陵事梁公敷請輒至涕下浸淫不能止后乃使王出曰還爾太子梁公降拜頓首曰太子歸未有知者人言紛紛何所信后然之更令太子舍龍門具禮迎還中外大悅唐詩紀事曰徐彦伯兖州人為蒲州司兵叅軍時司户韋暠善判司士李亘工書彦伯屬辭號河東三絶武后撰三敎珠英取文辭士皆天下之選彦伯與李嶠居首崔湜在中書日張嘉貞己見為舍人湜頗輕之常呼為張底後與商量數事皆出湜意外湜驚美久之顧語同官曰詎意張底乃我輩人此終是其坐處後嘉貞至中書令唐詩紀事曰崔湜字澄瀾仁師之子以文辭稱附韋后作相又附太平公主門客獻海鷗賦以諷湜稱善而不自悛帝誅蕭至忠湜流嶺外後知湜本謀賜死荆州張曲江張九齡己見見朝士趨附楊國忠語人曰皆是向火乞兒一旦火盡灰冷暖氣何在當凍屍裂體棄骨溝壑中不逺矣後祿山之亂果皆滅族李華文辭綿麗而乏宏傑之氣蕭穎士己見徤爽自肆時謂華不及穎士華自疑過之嘗著弔古戰塲文極思研確旣成自加汗漫雜置梵書中他日與穎士讀之穎士稱工華問誰可及穎士曰君加精思便可及此華愕然而服唐詩紀事曰李華字遐叔除右補闕祿山亂輦母而逃為盜所得二京復謫杭州司功叅軍召加司封員外郎將以司言處之華曰焉有隳節奪志者可以荷君之寵乎移病請告李峴表為從事以風痺廢居楚禮部侍郎楊俊掌貢舉問蕭茂挺蕭穎士己見求人海内以為徳選潘孟陽母劉夫人是劉晏妹孟陽為户部侍郎劉昫唐書曰潘孟陽禮部侍郎炎之子登博學宏辭科徳宗末王紹以恩倖數稱孟陽之才授權知户部侍郎夫人憂之曰以爾人才而在丞郎之位吾懼禍之至也試會爾同列吾觀之因遍招深熟者客至夫人視之喜曰皆爾儔也不足憂矣向末坐綠衫少年何人曰補闕杜黄裳夫人曰此人全别必是有名卿相劉昫唐書曰杜黄裳字遵素京兆杜陵人貞元末為太常卿王叔文竊權黄裳終不造其門尋拜平章事潘孟陽在徳宗朝為翰林學士恩渥極異有一京尹伺候累日不得見乃遺閽者三百縑劉夫人知之謂潘曰豈有為人臣使京尹願一見遺奴三百疋縑其危可知遽勸潘避位段文昌自渚宫客遊成都韋南康與奏釋褐為賓從後劉闢逐佐外邑髙崇文收蜀召復舊職指其椅曰此猶不足與君坐劉昫唐書曰段文昌字墨卿西河人髙祖志𤣥陪葬昭陵文昌倜儻有氣義韋皋在蜀表授校郎長慶中朝廷以文昌少在西蜀詔授西川節度使文昌素洽蜀人之情至是以寛政為治嚴静有斷蠻夷畏服韓晉公節制三吳所辟賓佐隨其所長無不得人嘗有故舊子弟投之更無他能嘗召之與燕畢席端坐不與比坐交言晉公署以隨軍令監庫門此人每早入幃端坐至夕警察吏卒無敢濫出入者竟獲其力劉昫唐書曰韓滉字太沖太子少師休之子幼有美名其所結交皆時之雋彦非公直者不與親宻性持節儉志在奉公衣裘茵衽十年一易官檢校左僕射封晉國公陸忠州知舉劉昫唐書曰陸贄字敬輿嘉興人少特立不羣頗勤儒學徳宗素知贄名召為翰林學士貞元七年以兵部侍郎知舉八年代竇叅為中書侍郎後貶忠州别駕時崔元翰梁肅文藝冠時梁肅己見十唐詩紀事曰崔元翰初名鵬舉進士年五矣禮部侍郎于邵以其文擢異等曰後當司詔令竇叅秉政引知制誥訓詞温厚有典誥風以剛褊罷為比部郎中忠州輸心於肅肅與元翰推薦藝實之士昇第之日雖衆望不愜然一嵗選士纔十四五數年之内居臺省清近者十餘人李觀唐詩紀事曰李觀字元賓以文馳聲卒于校書郎陸希聲序其文曰激揚發越若絲竹中有金石聲每篇得意處如健馬在御蹀蹀不能止韓愈劉昫唐書曰韓愈字退之昌黎人幼刻苦學儒大厯貞元間文士多尚古學効揚雄董仲舒之述作獨孤及梁肅最稱淵奥愈從其徒逰銳意鑚仰欲自振於一代官至吏部侍郎李絳宋祁唐書曰李絳字深之元和中為翰林學士一日奏對李吉甫盛稱天子威徳絳極言規切帝顧左右曰絳言骨鯁真宰相也崔羣宋祁唐書曰崔羣字敦詩貝州武城人未冠舉進士陸贄知舉梁肅薦其有公輔器遂擢甲科共游梁補闕之門唐詩紀事曰梁肅字欽之世居陸渾蕭復杜佑交薦終右補闕四賢造補闕靡不偕行一日延接補闕盛稱四人文學復奬以交遊之道補闕素善人倫觀等旣去復止崔李曰公等文行相契他日皆振大名然二君位極人臣幸各自愛後果如其言楊炎自道州還家人以綠袍木簡棄之炎曰吾嶺外一逐吏超登上台此可常哉且有非常之福必有非常之禍安可棄是及再貶果還所服劉昫唐書曰楊炎字公南鳯翔人與常袞並掌綸誥時號常楊樂賢下士人士歸之以與元載厚善貶道州司馬韓滉有知人之鑒見楊於陵甚恱滉有愛女方擇佳婿謂其妻栁氏曰吾閱人多矣無如楊生貴而有夀生子必為宰相於陵自句容尉秩滿寓居揚州而生嗣復滉見之撫其首曰名位果踰於父揚門之慶也因字曰慶門於陵更踐中外以右僕射致仕終年七十八嗣復作相裴晉公裴度己見㣲時羈遊洛中一日䇿蹇驢上天津橋時淮西不庭已數年矣二老人倚柱歎曰蔡州何時得平俄見晉公愕然而退有僕夫在後聞其語曰適憂蔡州未平須得此人為將僕遽告公公曰見我龍鍾故相戲爾路巖佐崔鉉於淮南為支使鉉知其必貴嘗曰路十終須作彼一官胡三省通鑑注曰謂作相也旣而入為監察御史不出長安城十年至宰相其入翰林日鉉猶在淮南聞之曰路十今已入翰林如何得老後皆如鉉言路巖已見曰劉昫唐書崔鉉字台碩義成節度使元畧子也累官户部侍郎會昌末以本官平章事為同列李徳裕所嫉罷相清泰中樞宻直學士吕琦問國家運祚于趙延義延義曰保邦在刑政保祚在福徳刑政則術士不敢言奈際會諸公罕有福徳者下官竊有恤緯之僣韓熈載在南唐多置女僕晝夜歌舞客至雜坐熈載語僧徳明云吾為此行正欲避國家入相之命僧問何故避之曰中原常虎視於此一旦真主出江南棄甲不暇吾不能為千古笑端湘山野錄曰韓熈載字叔言本青社人事江南三主時謂之神仙中人風彩照物每縱轡春城秋苑人皆隨觀談笑則聽者忘倦審音能舞善八分及畫筆皆冠絶簡介不屈舉朝未嘗拜一人毎獻替多嘉納吉凶儀制不如式者隨事稽正制誥典雅有元和之風屢欲相之為宋齊邱深忌終不進用孫晟己見為南唐尚書郎國主賜以一宅在鳯臺山西岡壠之間徙居之日羣公萃止韓熈載見其門卑巷陋謂孫曰湫隘若此豈稱為相第耶舉坐莫喻其㫖明年孫拜御史大夫旬日之間果正台席王昭素謂李穆兄弟皆令器穆尤沈厚他日必至廊廟後果叅知政事皇朝𩔖苑曰王昭素酸棗人博學通九經尤長於易作易論二十三篇學者稱之李穆薦之太祖召見年已八十貌不衰太祖問何不求仕致相見之晩對曰草野陋儒無補聖化賜坐講易帝嘉之以為國子博士逾月遣還善攝養年九十餘卒李文靖李沆已見在相位時王文正王旦已見為叅政西北二方猶梗羽書日聞或至旰食王公歎曰安得企見太平吾輩稍得優游乎文靖曰國家少有憂勤足為警戒異日天下寧晏人臣率職亦未必髙拱無事君奚念哉後北鄙和好西鄰欵附於是朝陵展禮登封行慶寖尋巨典無所不講屬王公衰病疲於賛導始服文靖之深識真宗朝李沆王旦同時執政四方奏報祥瑞沆固滅裂之如有災異則再三疏陳以為失徳所招上意不恱旦退謂沆曰相公何苦違戾如此似非將順之意沆曰自古太平天子志氣侈盛非事四夷則躭酒色或崇釋老不過以此數事自敗今上富於春秋須常以不如意事裁挫之使心不驕則可為持盈守成之主沆老矣公他日當見之旦猶不以為然至晚年東封西祀禮無不講時沆已薨旦繪像事之每胷中鬱鬱則摩腹環行曰文靖文靖蓋服其明識也王魏公旦在政府一日王沂公曽李觀察維薛尚書映造謁公辭病薛有不平之色公婿韓億時在門下見之以此啓公公曰韓郎未之思爾王薛皆李公之婿相率而來恐有所干於朝廷事果不可沮之無害若可行答以何辭執政之大忌韓乃謝曰非億所知後果是李文靖夫人有所請託王魏公與楊文公品量人物楊曰丁謂果何如公曰才則才矣語道未可他日在上位使有徳助之庶保終吉若獨當權必為身累後丁果被流竄章得象為職方知洪州罷歸丁晉公與楊文公博召數人皆不至丁以為二人博無歡楊曰有章職方者善博可召之旣至丁不勝輸銀器數百章無喜色亦不辭他日又博章輸銀器數百兩亦無吝色丁嘉其有度援引以至清顯嘗云章公他日必為公台東都事畧曰章得象字希言世家泉州後徙居浦城寶元中拜中書門下平章事仁宗謂曰先太后臨朝羣臣邪正朕皆黙識之卿清忠無所附麗故大用也唐待制先與丁晉公為友後居水櫃街宅正相對丁將有弼諧之命唐遷居州北或問其故唐曰謂之入則大拜數與徃還事涉依附經旬不見情必猜疑故避之耳後晉公南遷唐曰丁之才術李賛皇之流動多而静少任智而鮮仁可以佐三事但不可冢百官耳宋史曰唐肅字叔元杭州錢塘人錢鏐時七嵗能誦五經名聞國中後與孫何丁謂游學者慕之官至龍圖閣待制慶厯中余靖歐陽修蔡襄王素在臺中力引石介為諫官執政亦欲從其請時范文正為叅政語同列曰石介剛正天下所聞然性亦好異若使為諫官必以難行之事責人主以必行少拂其意則引裾折檻叩頭流血無不為矣主上雖富有春秋然無失徳朝廷政事亦自修舉安用如此諫官人皆服其言慶厯中一近侍犯法罪不至死執政以其情重請殺之范希文獨無言退而語同列曰諸公勸人主法外殺近臣一時雖快意不宜敎手滑諸公黙然東軒筆錄曰刼盜張海過髙郵知軍晁仲約度不能禦具牛酒迎勞事聞朝廷大怒時富鄭公在樞府議欲誅仲約范欲宥之富公曰方今患法不舉方欲舉法而多方沮之范公曰祖宗以來未嘗輕殺臣下此盛徳之事奈何欲輕壊之且吾與公在此同僚之間同心者有幾雖上意亦未知所定而輕導人主以誅戮臣下他日手滑雖吾輩亦未敢自保富公終不以為然及范公出按陜西富公出按河北富自河北還及國門不許入未測朝廷意此夜徬徨不能寐遶牀歎曰范六丈聖人也薛簡肅知成都范蜀公范鎮己見方為舉子薛一見愛之館於府第俾與子弟講學每曰范君廊廟人也蜀公益自謙退乗小駟至銅壺閣下即步行趨府門踰年人不知為帥客薛還朝以蜀公行或問薛自成都歸得何竒物曰蜀珍産不足道吾歸得一偉人與俱來五朝名臣言行錄曰薛奎字宿藝絳州人嘗尹開封以嚴為治及鎮蜀則以惠愛稱蜀人愛且畏之以比張詠而不苛官至叅知政事卒諡簡肅御史臺有閽吏𨽻臺中四十餘年善評其優劣每以所執之挺待中丞之賢否中丞賢則横其挺否則直其挺此語諠於縉紳凡為中丞者唯恐其挺之直也范諷為中丞聞望甚峻一日視事次閽吏忽直其挺范大驚立召問曰爾挺忽直豈覩我之失耶吏初諱之苦問乃言曰昨見中丞召客親諭庖人以造食指揮者數四庖人去又呼之復丁寧者數四大凡役使者授以法而觀其成茍不如法有常刑矣何事喋喋之煩若使中丞宰天下不止一庖人之任皆欲如此喋喋不亦勞而可厭乎某心鄙之不知其挺之直也范大笑慙謝儒林公議曰范諷齊人性疎誕不顧小節監舒州靈仙觀莊獻太后臨朝聞其俊邁召拜諫官好大言捭闔時有補益常塗者皆畏之任三司使闕畧財計議者以謂任不適其器好朋飲髙歌噭呼或不冠幘禮法之士深疾之吕獻可待對於崇政殿時司馬温公為翰林學士侍讀邇英閣亦趨賛善堂待召相遇朝路並行而北温公宻問曰今日請對何所言獻可舉手曰袖中彈文乃新叅也温公愕然曰王介甫素有學行命下之日衆皆喜於得人奈何論之獻可正色曰君實亦為此言耶安石雖有時名好執偏見不通物情輕信姦囘喜人佞已聽其言則美施於用則疎若在侍從猶或可容置諸宰輔必天下受其禍矣温公又諭之曰與公相知有所懐不敢不盡未見其不善之迹遽論之不可獻可曰上新嗣位富於春秋朝夕謀議者二三執政爾茍非其人則敗國事此乃腹心之疾治之惟恐不及顧可緩耶後安石變法人始服獻可先見卲氏聞見錄曰吕誨字獻可正惠公之孫初為侍御史言歐陽修首建邪議尊濮安懿王出知鄿州神宗擢天章閣待制又論王安石出知鄧州盛文肅知揚州簡重少許可時夏有章授鄭州推官過謁文肅驟稱其才明日置酒召之人謂有章盛公未嘗燕過客甚器重者方召一飯有章别日為一詩謝之公得詩不發封使人謝曰度已衰老無用此詩有章殊不意詣通判刁繹言其故刁徃見文肅問之公曰始見其氣韻清秀謂必逺器今封詩乃自稱新圃田從事得一幕官遂爾輕脫其志已滿必止於此官他日可驗時賈文元為叅政與有章有舊薦為館職會御史發其舊事遂寢改差國子監主簿仍帶鄭州推官未幾卒於京師東都事畧曰盛度字公量餘杭人累官翰林學士叅知政事性好學家居讀書未嘗釋手真宗命與李宗諤楊億王曽李維舒雅任隨石中立同編文苑英華所著有愚谷集度肌體豐大艱于拜起有拜之者俯伏不能興或至詬罵其褊戾如此張樂全方平守陳富鄭公在亳社以不行新法謫知汝州假道宛丘與樂全相見富歎曰人果難知某三次薦安石謂其才可大用不意今日乃如此樂全曰自是彦國未識此人方平昔年知舉辟為㸃檢試卷官每向前來論事則滿院無一人可其意者自是絶之至今無一字徃還李待制在仁宗朝當為州縣官因邸吏報包希仁包拯已見拜叅政或曰朝廷自此多事矣承之正色曰包公無能為今知鄞縣王安石者眼多白甚似王敦他日亂天下者必此人元祐間東坡在禁林張無盡以書自言曰覺老近來見解與徃時不同若得一把茅蓋頭必能為公呵佛罵祖蓋欲坡薦為臺諫也温公頗有意用之嘗以問坡坡云犢子雖俊可喜終敗人事不如求負重有力而馴良服轅者使安行於八達之衢為不誤人也温公遂止張天覺好佛而不許諸子誦經嘗云彼讀書未多心源未明纔粘著經卷便燒香禮拜不能得了張芸叟云吕申公名知人多得於下僚家有茶羅子一金飾一銀一棕櫚方接客索銀羅子常客也金羅子禁近也棕櫚則公輔必矣家人常排列於屏間以候之亷文正王秉政日中書右丞劉整以初附為都元帥騎從甚都詣門求見文正弟薊公希貢為通謁文正讀書不顧薊公出整復凂入言之文正因令撤去坐椅自據中坐令整入整展拜起立不與之一言整求退謂曰此是我私宅汝欲有所言明日當詣政事堂整出愧赧殆無人色頃之有士人在羈旅寒餓狼狽衣冠襤縷袖詩求見文正兄弟皆揶揄之薊公復入為言文正亟令設坐戒内人備酒饌至外門肅入對坐張燕執禮甚恭且錄其居止士人但言困苦乞歸明日言於世祖皆遂其請文正兄弟怪問劉元帥主上之所倚任反薄待之江南窮秀才却禮遇如此我等不能無疑文正曰我是國家大臣言動嚬笑繫天下重輕整雖貴是賣國叛臣故折辱之令其知君臣重義若寒士數十皆誦法孔子在宋不與燕坐况國家起朔漠斯文不絶如綫我更不尊禮則儒術將掃地矣聞者無不歎服陶九成輟耕録曰恒陽亷文正王希憲字善父畏吾氏由父孝懿王布魯凱官亷訪使因氏焉希憲國初拜平章事倪元鎮當至正初天下尚無事元鎮日鬻其家田産不事家人作業唯逍遥吟諷兼寓意於圖畫人竊笑其為戇後兵興諸富家田産剽剥都盡衆始服其有見語林卷十五
