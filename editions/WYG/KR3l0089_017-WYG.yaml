body:
  text: 語林卷十七明何良俊撰賞譽第九下杜子光童孺時奇才博學能著文章心解性達無不貫綜一時稱爲舞陽杜孔子崔鴻十六國春秋前涼録曰杜育字子光濮陽舞陽人崔司徒崔浩己見每與盧𤣥談輙歎曰對子眞使我懷古之情更深北史曰盧𤣥字子眞范陽涿人曽祖諶晉司空從事中郎祖偃父邈仕慕容氏俱以儒雅稱神䴥四年太后辟召儒雋以𤣥為首授中書博士遷侍郎崔浩欲整人倫分明姓族𤣥曰創制立事各有其時樂為此者詎幾人也宜三思浩不納後終以此敗髙伯恭髙允己見少有奇度清河崔𤣥伯見而異之歎曰髙子黄中内潤文明外照必爲一代偉人魏收魏書曰崔宏字𤣥伯清河東武城人魏司空林六世孫少有雋才號曰冀州神童符堅徵為太子舎人不就魏道武以為黄門侍郎與張衮對掌機要魏中山王熈博識之士見盧㓜章歎之曰盧郎有如此風神唯須誦離騷飲美酒自爲佳士北史曰盧元明字㓜章范陽涿人渉歴群書兼有文義風采閒潤進退可觀太平中副李諧使梁南人稱之范陽祖元珍祖瑩别見與陳郡𡊮景翔齊名秀出北史曰𡊮翻字景翔陳郡項人時人爲之語曰京師楚楚𡊮與祖洛中翩翩祖與𡊮濟隂王元暉見温子昇文嘗云江左文人宋有顔延之謝靈運梁有沈約任昉我子昇足以凌顔轢謝含任吐沈北史曰温子昇字鵬舉太原人晉大將軍嶠之後世居江左祖恭之避難歸魏家于濟隂寃句子昇博覽百家文章清婉永熈中為散騎常侍領本州大中正魏陸暐與弟恭之並有時譽洛陽令賈禎歎曰僕以老年更覩􅀟璧黄門郎孫惠蔚曰不意二陸復在坐隅北史曰陸暐字道暉弟恭之字季順代人也世領部落祖俁仕魏封東平王父凱官至正平太守暐除伏波將軍嘗擬急就章為悟蒙章及七誘十醉章表數十篇恭之有操尚位東荆州刺史所著文章詩賦千餘篇楊遵彦小時夙成從父兄黄門侍郎昱特相器重嘗謂人曰此兒駒齒未落已是我家龍文更十年當求之千里外耳楊遵彦典選時以六十人爲一甲楊令其自敘訖不省文簿便次第呼之嘗誤以盧士深爲士琛士深自言其名遵彦曰盧郎朗潤所以加玉三國典畧曰東魏以楊愔典選愔令選人自敘不省文簿次第呼之嘗誤呼慕容為長孫一人而已有職人魯漫漢自言微賤不蒙記愔曰卿前在元子思坊乗驢遥見我不下以方麴障面我何不識卿耶漫漢驚服楊遵彦作文徳論楊愔己見以爲古今辭人皆負才遺行澆薄險忌唯邢子才王元景温子昇彬彬有徳素楊遵彦欲引崔彦通崔瞻己見爲中書侍郎時盧思道直中書省因問盧曰我比日多務都不見崔瞻文藻卿與之親通理當相悉思道荅曰崔瞻文辭之美實有可稱但舉世重其風流所以才華見没北齊廢帝爲太子時嘗集諸儒講孝經問國子助教許散愁曰先生在世何以自資許對曰散愁自少以來不登孌童之牀不入季女之室服膺簡策不知老之將至平生素懷若斯而已太子曰顔子縮屋稱貞柳下嫗而不亂未若此翁白首不娶魏帝嘗季秋大射普令群臣賦詩魏佛助魏收小字詩末云尺書徵建業折簡召長安文襄壯之顧謂諸人曰在朝今有魏收便是國之光采盧子均小字龍子風神澹雅從弟思道小字釋奴宗中俱稱英妙幽州爲之語曰盧家千里釋奴龍子思道已見北史曰盧昌衡字子均沉静有才識風神澹雅容止可法博渉經史工行草書王沙彌王晞小字己見東適海隅與邢子良遊處子良愛其清悟與其在洛兩兄昕書曰賢弟彌郎意識深逺曠達不羈簡於造次言必詣理吟咏情性徃徃麗絶恐足下方難爲兄不暇憂其不進也吏部郎中陸卭嘗稱李徳林曰徳林文章浩浩如長河東注比來見後生制作乃涓澮之流耳續世說曰北齊任城王亦稱徳林曰經國大體是賈生晁錯之儔雕䖝小技殆相如子雲之輩李徳林爲文辭覈理暢魏收嘗對髙隆之謂其父曰賢子文筆終當繼温子昇隆之大笑曰魏常侍殊已嫉賢何不近比老彭乃逺求温子柳思敬少有逺量濟陽蔡大寳有重名於江左時爲岳陽王蕭詧己見諮議見柳便歎曰襄陽水鏡復在於兹北史曰柳莊字思敬河東解人宋太尉元景從孫博覽墳籍兼善詞令隋給事黄門侍郎辛懷逺與二兄鑒曠弟寳迅皆以才識知名秦雍爲之語曰五龍一門金友玉昆崔鴻前涼録曰辛攀字懷逺隴西狄道人父奭尚書郎鎭南長史恱壽謂南海王曰向見北海王子天資宏雅神爽髙邁始知天族多奇玉林皆寳李密乗一黄牛被以蒲韉將漢書一帙掛於角上一手捉牛靷一手翻漢書越國公楊素己見遇見於道從後按轡躡之既及問何處書生躭學如此密識是越公乃下牛再拜自言姓名又問所讀書荅云項羽傳越公奇之與語大恱謂其子𤣥感等曰吾觀李密識度女等不及虞世基拜内史舎人時柳顧言博學罕所推許與世基相見歎曰海内當共推此一人薛收與弟徳音元敬齊名號河東三鳯時目收爲長離徳音爲鸑鷲元敬年最少爲鵷雛太宗登極日語房𤣥齡曰薛收若在朕當以中書令處之唐太宗嘗稱虞永興虞世南己見有五絶徳行忠直博學文詞書翰李守素尤精譜學人號肉譜或謂虞秘監曰李倉曹以善談人物乃得此名然非雅目公既言成凖的宜有以改之秘監曰昔任彦昇善談經籍時稱爲五經笥宜改倉曹爲人物志隋唐嘉話曰李守素趙州人太宗署為倉曹㕘軍甚工譜學自晉宋以降四海士流及諸勲貴華戎閥閱莫不詳究當時號為行譜劉子翼峭直有行常面折僚友之短退無餘訾李百藥嘗語人曰劉四雖復罵人人多不憾大業雜記曰劉子翼字小心劉禕之之父仕隋至著作郎太宗嘗出行有司請載副書以從上曰不須虞世南在此行秘書賀徳仁與兄徳基俱以辭學見稱時人爲之語曰學行可師賀徳基文質彬彬賀徳仁唐書曰賀徳仁越州山隂人少與從兄徳基俱事國子祭酒周𢎞正以辭學見稱徳仁仕陳官吳興王友太宗嘗宴群臣于積翠池酣樂賦詩魏徵賦西漢其卒章曰終藉叔孫禮方知皇帝尊帝曰徵言未嘗不約我以禮太宗征遼東拜楊宏禮爲兵部侍郎駐蹕之役領歩騎二十四軍跳出賊背所向摧靡帝自山上下望見其袍仗精整人人盡力謂許敬宗曰越公兒郎故有家風劉昫唐書曰楊宏禮隋尚書令素弟岳之子髙祖受禪襲爵清河郡公太宗征遼以宏禮有文武材擢拜兵部侍郎專典兵機之務太宗嘗曰禇遂良鯁亮有學術竭誠親於朕若飛鳥依人自加憐愛劉昫唐書曰禇遂良散騎常侍亮之子博渉文史尤工𨽻書父友歐陽詢甚重之谷那律淹識群書禇遂良目爲九經庫唐書曰谷那律魏州人淹識群書官至𢎞文館學士張文瓘補并州㕘軍時李勣爲長史語人曰稚圭今之管蕭吾所不及太宗嘗問群臣曰朕子弟孰賢魏徵曰臣愚不盡知其能唯吳王數與臣言未嘗不自失帝曰朕亦器之然卿以爲前代孰比對曰經學文雅漢之河間東平至於孝行曾閔不能過帝由是寵遇益厚劉昫唐書曰霍王元軌髙祖第十四子武徳八年封吳王改封霍王薛元超爲髙宗所知時在中書特承恩遇嘗召入與諸王同預私讌重其文學政理之才嘗語之曰長得卿在中書固不藉多人唐詩紀事曰元超薛收之子髙宗時為給事轉中書舎人薦任希古郭正一崔融等皆以才名上元初同中書門下三品政出武后因陽喑乞骸骨李義府己見初進以李大亮劉洎之薦太宗召令詠烏李曰日裏颺朝彩琴中伴夜啼上林如許樹不借一枝棲帝曰當以全枝借子何止一枝韋思謙調官有微累吏部尚書髙季輔曰自吾居選部今始得此一人豈可以小疵而棄大徳擢授監察御史皇甫公義引韋思謙爲沛王府倉曹曰公豈是池中物屈公爲數旬之客以望此府耳鳯閣侍郎杜景佺文章智識並髙逺時號爲鶴鳴鷄樹盧昇之爲鄧王府典籖王甚知之嘗語諸人曰此即寡人相如唐詩紀事曰盧照鄰字昇之范陽人調新都尉病去官足攣一手又廢乃居具茨山下自以為髙宗尚吏已獨儒武后尚法已獨黄老后封嵩山屢聘賢士己巳廢著五悲文以自明病既久與親屬訣自沉潁水張鷟文章俊敏凡應八舉皆登甲科騫味道嘗稱之曰此生天下無􅀟續世說曰張鷟為兒童時夢紫色大鳥五綵成文降於庭中其祖謂曰五色赤文鳯也紫文鷟也為鳯之佐吾兒當以文章瑞於明庭因名鷟員半千嘗見其文曰張子之文如青錢萬選萬中未聞退時時目為青錢學士崔尚書崔湜已見甚重其弟潤甫嘗語人曰液子我家龜龍唐詩紀事曰崔液字潤甫仁師子湜之弟也工五言官殿中侍御史坐湜故亡命郢州作幽征賦以見意貟半千本名餘慶嘗師事學士王義方義方嘉重之嘗語之曰五百年一賢者生足下當之矣因改名半千孔季詡在秘書陳子昻每爲之目曰神韻清逺可比衛玠魏知古亡後宋廣平歎曰叔向古之遺直子産古之遺愛兼之者其魏公乎唐詩紀事曰魏知古深州人相睿宗薦洹水令吕太一司功㕘軍齊澣騎曹㕘軍柳澤密尉宋遥補闕𡊮暉封希顔伊闕尉陳希烈後皆為聞人李元紘爲相務峻崖檢夸進者憚之宋廣平嘗曰李侍郎引宋遥之美黜劉晃之貪貴爲國相家無留儲雖季文子之徳何以加諸劉昫唐書曰李元紘京兆萬年人少謹厚為雍州司戸時太平公主與寺僧争碾磑元紘斷還寺僧竇懐貞為雍州長史懼太平勢促令元紘改斷元紘大署判後曰南山或可改移此判終無揺動竟執正不撓懐貞不能奪開元中中書侍郎李乂嘗典選請謁不行時人爲之語曰李下無蹊徑唐詩紀事曰李乂字尚眞趙州人十二工屬文薛元超曰是子且有海内名沉正方雅識治體時稱有宰相器初為黄門侍郎姚崇為紫微令薦為侍郎外託引重實去其糾駮權張燕公張說已見嘗曰沈三兄沈佺期已見詩直須還他第一楊再思每目徐堅為鳯閣舎人様韋氏孝友文學有承慶嗣立劉昫唐書曰韋承慶字延休嗣立承慶異母弟也父思謙則天朝納言母王氏遇承慶甚嚴每有杖罰嗣立必解衣請代母不聽輒私自杖母察知之漸加恩貸議者比王祥王覽􅃉音樂有萬石劉昫唐書曰萬石韋挺之子有學業而善音律為太常卿増損郊廟燕㑹樂調時以為稱職達禮儀則叔夏劉昫儒學傳曰韋叔夏左僕射安石凡也精通三禮官國子祭酒撰五禮要記史才博識有述劉昫唐書曰述勒成國史一百十三卷事簡而記詳有良史才蕭頴士以為譙周陳壽之流述以儒術進當代宗仰而純厚長者澹於勢利聚書二萬卷皆自校定雖御府不逮也兼古今朝臣圖歴代知名人畫魏晉以來草隷眞跡數百卷古碑古器藥方格式錢譜璽譜之𩔖當代名公尺題無不畢備禄山之亂兩京䧟賊𤣥宗幸蜀述抱國史藏於南山經籍資産焚剽殆盡述亦䧟於賊庭時趙冬曦兄弟亦有美名唐詩紀亊曰趙冬曦定州人開元初監察御史坐事流岳州召還復官張燕公嘗語人曰韋趙兄弟人之杞梓韋述是元行冲姑子性好學嘗入行冲書齋忘寢與食行冲引與之談貫綜經史事如指掌試以綴文操牘便成行冲大恱引之同榻曰此吾外家之寳張燕公嘗稱許景先曰許舎人之文雖無峻峰激流嶃絶之勢然屬詞豐美得中和之氣實一時之秀唐詩紀事曰許景先常州人景先獻賦李逈秀見之曰是宜付太史後與齊澣王邱韓休更知制誥𤣥宗嘗早朝見張九齡風儀秀整有異於衆謂左右曰朕每見張九齡精神頓生汝陽王璡是寧王長子丰儀秀整𤣥宗甚愛之嘗曰花奴姿質明瑩必神仙謫墮也寧王隨短之上曰大哥不在過慮阿瞞自是相師帝王之相須有英特之風深沉之候花奴但端笑過人當得公卿間令譽耳劉昫唐書曰寧王憲本名成器睿宗長子也追贈讓皇帝長子璡封汝陽王與賀知章禇廷誨為詩酒之交房太尉每見元魯山即終日歎息嘗謂李遐叔華曰見紫芝眉宇使人名利之心頓盡劉昫唐書曰房琯字次律河南人平章事融之子少好學風儀沉整以門䕃補宏文生性好𨼆遁與東平吕向於陸渾伊陽山讀書凡十餘歲天寳末官至憲部侍郎𤣥宗幸蜀奔赴行在拜文部尚書同平章事奉使靈武册立肅宗抗䟽自請將兵戰敗于陳濤斜韋陟以父安石憤激致斃與弟斌杜門不出八年親友更徃敦曉乃強調洛陽令宋璟見陟歎曰盛徳遺範盡在此矣韋安石韋斌並已見石劉昫唐書曰韋陟字殷卿自㓜風標峻整安尤愛之早有台輔之望被李林甫楊國忠所擠中原兵起鬱鬱不得志乃歎曰吾道窮於此乎有志不伸得非天命因遘疾卒于虢州賀知章己見性曠夷善談說與族姑子陸象先己見善象先嘗謂人曰季眞清談風流吾一日不見則鄙吝生矣賀知章見李太白稱之曰此天上謫仙人也陸象先與弟景倩景融景獻景裔皆有名當世僧一行少時與象先兄弟相善嘗語人曰陸氏兄弟皆有士行古之荀陳何以加之吉頊爲吏部侍郎用陸景初陸象先先名景初己見爲洛陽尉其父元方時亦在吏部固辭不敢當頊曰爲官擇人至公之道陸景初才望髙雅非常流所及實不以吏部之子妄推薦也竟奏授之元結舉進士禮部侍郎楊浚見其文歎曰一第慁子耳有司得子是頼是年果擢上第唐詩紀事曰元結字徽之蘇源明薦於肅宗時思明攻河陽帝召結詣京師結上時議三篇攝監察御史發宛葉軍屯泌陽全十五城帝善之代宗時侍親歸樊上拜道州刺史民樂其教始號猗玗子後稱浪士又曰漫郎更曰聱叟閻士和嘗評㩁歴世文章獨推蕭頴士以爲聞蕭氏之風者五尺童子羞稱曹陸皇甫冉是𤣥晏先生之後張曲江深愛之嘗曰皇甫生清頴秀㧞有江徐之風唐詩紀事曰皇甫冉字茂政常州人大歴二年遷右補闕髙仲武中興間氣集曰皇甫補闕自擢桂禮闈遂為髙格徃以世道艱虞避地江外每文章一到朝廷作者變色李遐叔著含元殿賦成以示蕭茂挺茂挺曰景福之上靈光之下錢起與郎士元齊名時人語曰前有沈宋後有錢郎姚合極𤣥集曰錢起字仲文吳興人天寳十載進士終尚書郎太清宫使郎士元字君胄天寳十五載進士與錢起齊名歴拾遺終頴州刺史劉捷卿劉迅已見在都嘗寢疾房太尉聞而憂之通夕不寐顧語賔從曰捷卿有不諱可謂無復有神理劉忠州每與劉捷卿談輙語曰聞劉公清言皇王之理盡矣唐詩紀事曰劉晏字士安八歲獻頌泰山行在帝命張說試之說曰國瑞也即授太子正字公卿邀請傍午號神童良俊按宋祁唐書劉知幾第五子劉迅傳中有此二事又摭言李華三賢論其論劉愼虚亦載此事不應二人同時事都不異然三賢論又謂愼虚名儒大官之家兄弟以學著乃述詩書禮易春秋爲五說條貫源流備古今之變今考劉昫宋祁唐書及李肇國史補作五說者正劉迅也且劉迅父知幾史才無對官至崇文館學士叔知柔以文章政事致位尚書右丞兄貺餗彚秩弟逈本傳中皆有述撰則所謂名儒大官之家與兄弟以學著者非迅而何且二唐書都不載劉愼虚事豈摭言稱愼虚門閥風望如此而正史顧遺之耶則愼虚之爲迅無疑迅本字捷卿或愼虛其别字也但正史不著迅有别字與其能詩而詩家序論亦不詳其所出乃知記事者固多踈漏也陳郡殷寅名知人見劉捷卿歎曰今之黄叔度也李揆己見在中書美風儀善奏對帝歎曰卿門地人物文學皆當世第一信是朝廷羽儀文宗嘗問魏謩卿家書詔頗悉存不劉昫唐書曰魏謩字申之五代祖徴貞觀朝名相謩至檢校右僕射儀容魁偉言論切直宣宗每曰魏謩綽有祖風竞以語詞太剛為令狐綯所忌謩對比多失墜惟故簮笏在詔令上送時鄭覃曰在人不在笏帝曰覃不識朕意此笏乃今之甘棠劉昫唐書曰鄭覃故相珣瑜之子長於經學稽古守正文宗尤重之官至守司徒元稹己見爲翰林承㫖朝退行至廊下時初日映九英梅隙光射稹有氣勃然百寮望之歎曰豈腸胃之章映日可見乎顧逋翁顧况己見恃才凌物於文章少所推可見白居易之文即自失曰吾謂斯文遂絶今復得子矣有人言牛僧孺可爲御史大夫宰臣鄭覃曰頃爲中丞未嘗搏擊恐無風望上曰鸞鳯與鷹隼事異牛竒章鎭江夏辟柳仲郢爲從事仲郢有元公之風動修禮法竒章歎曰茍非積習名教安能及此柳璨爲左拾遺公卿託爲牋奏時譽日洽以其博奥目爲柳篋子劉昫唐書曰柳璨河東人祖公器僕射公綽之再從弟璨少孤貧好學僻居林泉晝則採樵夜則燃木葉以照書趙光逢方直温潤當時目爲玉界尺孔平仲續世說曰後唐趙光逢㓜嗜典墳動守規檢弟光𦙍為平章事時謁問於私第語及政事他日光逢署其戸曰請不言中書事清靜端黙如此劉子儀愛徐堅初學記嘗曰非但初學正可爲終身記耳李穆有清識然獨重徐寳臣徐鉉己見嘗語人曰吾觀江表冠蓋若中立有道唯有徐公涑水記聞曰李穆字孟雍陽武人㓜沉謹温厚好學周世宗時為左拾遺太祖登極以左拾遺知制誥太宗朝除中書舎人母卒哀毁過人未終䘮而卒上甚惜之謂宰相曰李穆國之良臣奄爾淪没非穆不幸乃國之不幸也李穆從王昭素學易昭素語穆曰子所謂精理徃徃出吾意表王聖塗澠水燕談録曰王昭素先生酸棗人博學通五經尤長於易作易論二十三篇學者稱之李穆薦之太祖召見賜坐逾月遣還陳彭年己見在翰林所兼十餘職皆文翰清秘之目時人謂其署銜爲一條氷王冀公王欽若已見自江寧歸再秉機軸魯宗道時爲㕘政凡聚議多冀公不堪冀公語曰掌武相公在政府日㕘政豈敢如此魯笑曰王文正先朝重徳豈他人可企茍公執政平允宗道亦何敢異同五朝名臣言行録曰魯宗道字貫夫亳州人官至㕘知政事當時目為魚頭㕘政因其姓且言骨鯁如魚頭也宋景文宋祁己見云左太沖詩曰振衣千仞岡濯足萬里流使人飄飄有世表意不減嵇康目送飛鴻語宋莒公言歐陽永叔推重歸去來詞以爲江左髙文丞相以爲知言歐陽公平日少許人惟服韓稚圭嘗因事歎曰累百歐陽脩何敢望韓公文彦博守成都見文與可竒之嘗曰與可􅁭韻灑落如晴雲秋月塵埃不到二蘇初赴制舉到都是時同召試者甚衆一日韓魏公與客言曰二蘇在此而諸人亦敢與之較試耶此語既傳由是不試而去者十八九程伯淳嘗至天寧寺方飯見趨進揖遜之盛歎曰三代威儀盡在是矣王荆公司馬温公吕申公韓黄門四人並己見仁宗朝同在從班特相友善暇日多㑹於僧坊徃徃談燕終日他人罕得而預時目爲嘉祐四友王介甫與吕申公素相厚善嘗曰吕十六不作相天下不太平又曰晦叔作相吾輩可以言仕矣邵氏聞見録曰王介甫嘗簡晦叔曰京師二年疵吝積於心每不自勝一詣長者即廢然而反夫所謂徳人之容使人之意消者於晦叔得之矣以安石之不肖不得久容左右以求於心而稍近於道又曰師友之義實有望於晦叔故介甫作相薦晦叔為中丞後議新法不合始謂晦叔有驩兠共工之姦矣東坡詩文落筆輙爲人傳誦每一篇到歐公爲終日喜前後𩔖如此一日與子棐論文因及東坡公歎曰汝記吾言三十年後世上人更不道著我也崇寧間海外詩盛行後生不復有言歐公者東坡初爲趙清獻公作表忠觀碑或持以示王荆公公讀之沉吟曰此何語耶時有客在傍遽詆訿之公不荅讀至再三又携之而起且行且讀忽歎曰此三王世家也客大慚崇寧大觀間朝廷禁止蘇公文章賞錢增至八十萬禁愈嚴而傳愈盛徃徃以多相誇士大夫不能誦坡詩便自覺氣索而人謂之不韻㕘寥嘗與客評詩客曰世間故實小說有可以入詩者有不可以入詩者唯東坡全不揀擇入手便用如街談巷說一經坡手似神仙㸃瓦礫爲黄金自有妙處㕘寥曰老坡牙頰間别有一副爐鞲他人豈可學耶座客無不以爲然蘇欒城云子瞻諸文皆有竒氣至赤壁賦彷彿屈原宋玉之作漢唐諸公莫及也蘇欒城云讀上林賦如觀君子佩玉冠冕折還揖讓音吐皆中規矩終日威儀無不可觀蘇子由云莊周養生一篇誦之如神龍行空爪趾鱗翼所及皆自合規矩吕太尉惠卿赴延安帥道出西都時程正叔居里中謂門人曰吾聞吕吉甫未識其面明旦西出必經吾門我且一覘之迨旦了無所聞詢之則過已久矣道旁多不知正叔歎曰夫以從者數百人馬數十行道中能使悄然無聲馭衆如此可謂整肅矣立朝雖多可議其才亦何可掩黄太史黄庭堅己見年十七八時自稱清風客俞清老見而目之曰竒逸通脫眞驥子墮地也石林避暑録曰俞澹字清老揚州人少與黄魯直同從孫莘老學於漣水軍黄魯直見謝無逸詩歎曰使在館閣當不減晁張彭乗墨客揮犀曰謝逸字無逸臨川人有髙才江南勝士也閒居多從衲子遊不喜對書生朱世英為撫州舉八行不就蘇子瞻自海外歸與米元章書云嶺海八年親友曠絶亦未嘗關念但念吾元章邁徃凌雲之氣清雄絶俗之文超妙入神之字何時見之以洗我積年瘴毒耶今眞見之及得寳月菴賦誦之以爲恨二十年相從知元章不盡元章荅云更有知不盡處脩楊許之業爲帝宸碧落之遊異時相見乃知也其髙自標置如此宋史曰米芾字元章吳人以母侍宣仁后藩邸舊恩補臨光尉歴漣水軍使知無為軍召為書畫學博士賜對便殿上其子友仁楚江清曉圖擢禮部貟外郎芾為文奇險不剽襲前人特妙翰墨沉著飛翥得王獻之筆意畫山水人物自名一家尤工臨移至亂眞遇古器物書畫則極力求取必得乃已立寳晉齋貯之坐起玩拊精於鑒裁一經題品價增數倍所與遊皆名士王安石摘其詩句書扇上蘇軾亦喜稱譽之冠服效唐人風神蕭散音吐清暢所至人聚觀之而好㓗成癖至不與人同巾器時有可傳笑者又舉止頡頏不能與世俯仰故仕數困紹聖元符間汪内相彦章有聲太學中時人爲之語曰江左二寳胡伸汪藻游宦紀聞曰胡伸字彦時新安人終符寳郎宋史曰汪藻字彦章饒州徳興人㓜穎異官至龍圖閣直學士知湖州博極群書老不釋卷工儷語多著述所為制辭人皆𫝊之王景文在太學與九江王阮齊名阮嘗曰聽景文談如讀酈道元水經名川支渠貫穿周匝無有間斷咳唾皆成珠璣宋史曰王質字景文其先鄆州人後徙興國質博通經史善屬文與張孝祥父子游深見器重孝祥將薦質舉制科㑹去國不果虞允文當國欲用為右正言中貴人隂沮之出為通判荆南府趙汝愚嘗稱劉光祖論諫激烈似蘇子瞻懇惻似范祖禹世以爲知言宋史曰劉光祖字徳脩簡州陽安人為右正言上章言事讀之有流涕者劾戸部尚書葉翥太府卿沈揆結近習圖進用言比年以來士大夫不慕亷靖而慕奔競不尊名節而尊爵位不樂公正而樂軟美不敬君子而敬庸人既安習以成風謂茍得為至計良由老成零落後生晚進議論無所據依學術無所宗主正論益衰士風不競幸詔大臣妙求人物必朝野所共屬賢愚所同敬者一二十人㕘錯立朝國勢自壯臣雖終歲無所㕘糾固亦末至曠官今日之患在於不封殖人才臺諫但有摧殘廟堂初無長養臣處當言之地豈以排擊為能哉御史胡紘希韓侂胄意誣趙汝愚久蓄邪心嘗語人以乗龍授鼎之夢又言朝士中有推汝愚宗𣲖出楚王元佐爲正統所在蓋指游仲鴻也初欲直書仲鴻名張孝伯見之曰書其名則竄矣凡阿附宰相本冀官爵此人沉埋六院且二年心迹可察遂不書仲鴻名宋史曰游仲鴻字子正南充人趙汝愚一見即敬之汝愚在樞密謂仲鴻直諒多聞訪以蜀中利病汝愚欲親出經畧西事仲鴻曰宥密之地斡旋者易公獨不聞吕申公經畧西事當在朝廷之語乎汝愚悟而止除利路提㸃刑獄而卒劉光祖表其隧道曰慶元黨人游公之墓趙汝愚罷相游仲鴻力求外除朱仲晦聞其出歎曰信蜀士之多竒也謝枋得豪爽性好直言每與人論古今治亂及天下事必掀髯抵几跳躍自奮徐霖嘗稱之曰謝君如驚鶴摩霄不可籠縶謝枋得已見如宋史曰至元二十五年福建行省㕘政管徳將㫖如江南求人材留夢炎以枋得薦枋得遺書夢炎曰江南無人材求一瑕吕飴甥程嬰杵臼厮養卒不可得也紂之亡也以八百國之精兵而不敢抗二子之正論武王太公凛凛無所容急以興滅繼絶謝天下殷之後遂與周並立使三監不叛武庚必不死殷命必不黜夫金人之待二帝亦慘矣我宋今年遣使祈請明年遣使問安王倫一市井無頼小人謂梓宫可還太后可歸終則二事皆符其言今一王倫且無之則江南無人材可見也吾年六十餘所欠一死耳豈復有他志哉終不聽董師中小時敏悟右相唐古額爾衮尤器重之撫其座曰子議論英發􅁭度開朗他日必居此座金史曰董師中字紹祖洺州人少贍敏好學強記擢皇統進士官尚書左丞謚文定黄文獻平居和易煦如陽春然剛中少容觸物或弦急及升朝行挺立無所附足不登勢人之門一時稱其髙風勁節如氷壺玉尺纎塵弗汚元史曰黄溍字晉卿婺州義烏人母童氏夢大星墜于懐乃有娠溍生而俊異迨長以文名于四方與同郡柳貫臨川虞集豫章掲傒斯齊名人號儒林四傑官侍講學士謚文獻元仁宗嘗目趙子昻操履純正博學多聞書畫絶倫旁通釋老求之當代罕見其儔胡汲仲謂趙子昻書上下五百年從横一萬里舉無此書趙子昻嘗語人曰姚子敬天資髙爽相見令人怒不見令人思鮮于伯機鮮于樞已見目趙子昻神情簡逺是神仙中人語林卷十七
