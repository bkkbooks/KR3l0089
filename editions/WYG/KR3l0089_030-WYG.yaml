body:
  text: 語林卷三十明何良俊撰尤悔三十五夫言行君子之樞機也使言而見尤行而致悔豈自修之道耶故夫子於多聞多見既闕其疑殆又欲君子之慎其餘也曹公聞丁正禮才美欲以愛女妻之魏畧曰丁儀字正禮沛郡人父冲宿與太祖親善儀有文才太祖辟為掾以問五官將曹丕己見五官將曰女人觀貌而正禮目眇恐愛女未必悦也不如與伏波子楙魏志曰夏侯惇字元讓沛國譙人太祖平河北以為伏波將軍子楙太祖以女妻之即清河公主魏畧曰楙字子林惇仲子也文帝少與親善及即位以為安西將軍都督關中太祖從之尋辟正禮為掾及與論議嘉其才朗曰丁掾好士即使其兩目盲尚當與女何況但眇是兒悞我邵貟與虞俊鄰居貟先不知俊俊至吳與張温朱據會清言竟日温等敬服於是吳中盛為俊談貟聞而歎曰吾與仲明遊居比屋不能甄其英秀播其風烈而令他邦稱我之傑深用為媿會稽典畧曰邵貟字徳方餘姚人陸平原陸機己見為河北督已被間搆内懐憂懣聞衆軍警角鼔吹謂孫顯世曰晉書曰孫拯字顯世吳郡富春人能屬文吳黄門郎入晉為涿令陸機被誣收拯考掠兩踝肉盡門生費慈宰意二人詣獄明拯遂同死獄中今我聞此不如華亭鶴唳八王故事曰華亭由拳縣郊外墅也有清泉茂林吳平後陸機兄弟共遊於此十餘年吳郡圖經曰華亭縣本嘉興縣地天寳十年置因華亭谷為名孔熙先與范曄同逆下獄被責望風吐欵辭氣不撓上竒其才遣人慰勞之曰以卿之才而滯於集書省理應有異志又詰責前吏部尚書何尚之曰使孔熙先年三十作散騎郎那不作賊沈休文自負髙才昧於榮利乗時藉勢頗累清淡及居端揆稍𢎞止足每進一官輒殷勤請退而終不能去論者方之山濤張𤣥素出自刑部令史仕至三品太宗問云在隋任何官曰縣尉又問以前何官曰流外又問在何曹司𤣥素將出閣門殆不能移步精爽頓盡色𩔖死灰朝臣見之多所驚怪禇遂良上疏切諫太宗曰朕亦悔此問唐太宗嘗與侍臣泛舟春苑池中見異鳥容與波上悦之召閻立本圖其狀閣外𫝊呼畫師閻立本是時已為主爵郎中俯伏池左研吮丹粉瞻望坐賔羞悵流汗歸戒其子曰吾少好讀書幸免面牆縁精染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝宜深戒勿習此技陸鴻漸與常伯熊皆精茶理范攄雲溪友議曰鴻漸嘗為茶論説茶之功效并煎茶炙茶之法造茶具二十四事以都統籠貯之逺近傾慕好亊者家藏一副御史李季卿宣慰江南劉昫唐書曰李季卿丞相適之子也弱冠舉明經頗工文詞代宗時拜御史大夫奉使江淮宣慰振拔幽滯進用忠㢘時人稱之至臨懐縣館或言伯熊善茶季卿請為之伯熊著黄帔衫烏紗幘手執茶器口通茶名區分指㸃左右刮目茶熟李為歠兩杯既到江外又有言鴻漸者李公復請為之鴻漸身衣野服隨茶具而入如伯熊故事李公心鄙之茶畢命孥取錢三十文酬博士鴻漸夙遊江介通狎勝流及此羞愧遂著毁茶論哀帝時魏博羅紹威以牙軍之逼召朱全忠全忠殪八千餘家其餘攻討悉平全忠留魏半年紹威供億所殺牛羊豕近七十萬資糧稱是所賂遺又近百萬比全忠之去蓄積為之一空紹威雖除其偪而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐵不能為此錯也劉孟節酷愛山水天資絶俗青之南有冶原歐冶子鑄劍之地山竒水清旁無人烟叢筠古木氣象幽絶富鄭公鎮青為築室原上孟節常寓居龍興僧舍之西軒往往凭欄静立慨想世事吁唏獨語或以手拍欄杆自詠詩曰讀書悞我四十年幾回醉把欄杆拍皇朝𩔖苑曰劉槩字孟節青州夀光人少師种放篤好古學而天資絶俗與世齟齬故久不仕其後范文正公文潞公皆欲薦之朝先生懇辭二公亦不敢强以成其髙尚黄徳潤事阜陵孝宗陵名人或議其循黙淳熙末上將内禪一日朝退留二府賜坐從容諭及倦勤之意諸公交贊公獨無語上顧曰卿以為何如對曰皇太子聖徳誠克負荷顧李氏不足母天下宜留聖慮上愕然色變公徐奏陛下問臣臣不敢自黙然臣既出此語自今不得復覲清光陛下異日思臣之言欲復見臣亦不可得矣退即求去甚力後夀皇在重華宫每撫几歎曰悔不用黄洽之言或至淚下宋史曰黄洽字徳潤福建侯官人通判福州召為太常丞請外孝宗方厲精求治曰黄洽厚徳方任以亊不許後厯官御史中丞洪景盧在翰苑日嘗入直值制詔沓至凡視二十餘草事竟小步庭間一老人負暄花隂問之是京師人累世為院吏今已八十餘幼時及識元祐間諸學士今子孫復為吏故養老於此因言聞今日文書甚多學士必大勞神洪喜其言告以今日草二十餘制皆已畢老人復頌曰學士才思敏速真不多見洪矜之云蘇學士想亦不過如此速耳老人復首肯咨嗟曰蘇學士敏速亦不過此但不曾檢閲書冊洪為赧然自恨失言宋史曰洪邁字景盧皓季子也幼讀書日數千言一過目輒不忘博極載籍雖稗官虞初釋老傍行靡不涉獵淳熙三年拜中書舍人兼侍讀直學士院尹少稷穡博學工文杜門讀書不汲汲於仕進後乃附麗湯思退力排張魏公以是除諫議公論始薄之後貶嶺南累年蒙恩北歸周益公素與之善便道來訪謂益公曰某三十年閉户讀書養得少名思之不審所得於彼者幾何而破壊掃地雖悔何及悵然者久之益公每舉以為士大夫之戒紕漏三十六夫南山之竹不揉自直然括而羽之可以射逺況天之降才爾殊不必盡會稽之竹箭也不加櫽括欲無紕漏其能免乎是以君子貴學也陳夀將為國志晉書曰陳夀字承祚巴西安漢人少師事譙周事蜀為觀閣令史父喪有疾使婢丸藥鄉黨以為貶議坐是沉滯者累年張華愛其才以為夀雖不逺嫌原情不至貶廢舉孝㢘除佐著作郎謂丁梁州曰若覔千斛米見借當為尊公作佳𫝊丁不與米遂不為立𫝊時論以此少之梁州是敬禮子文士𫝊曰丁廙字敬禮少有才博學洽聞建安中為黄門侍郎廙從容謂太祖曰臨菑侯天性仁孝發於自然而聰明智達其殆庶幾至於博學淵識文章絶倫當今天下賢才皆願從其游而為之死實天命所以鍾福於大魏而永授無窮之祚也欲以勸動太祖太祖荅曰植吾愛之安能若卿言吾欲立為嗣何如廙曰此國家所以興衰天下所以存亡非愚劣瑣賤者所得與及廙聞知臣莫若君知子莫若父至於君不論明闇父不問賢愚而能常知其臣子者何蓋由相知非一事一物相盡非一朝一夕況明公加之以聖哲習之以人子今發明達之命吐永安之言可謂上應天命下合人心得之於須㬰垂之於萬世也廙敢不盡言太祖深納之王濬沖典選未嘗進寒素退虚名與時浮沉門調户選而已明帝函封詔與庾公信誤致於王丞相丞相開詔末云勿使冶城公知丞相居冶城故帝稱為冶城公丞相既視表荅曰伏讀明詔似不在臣臣開臣閉無有見者明帝甚愧數月不敢見王公顧虎頭顧愷之小字愷之己見人笑為痴桓𤣥嘗以一葉栁詒之曰此蟬翳葉也以自蔽人不見已顧引葉自蔽𤣥就溺焉顧目覩醜􅁾故云不見以珍重此葉顧長康嘗以一厨畫糊題其前寄桓南郡許皆其深所珍惜者南郡發其厨後竊取畫而緘封如舊以還之紿曰未開顧見封題如初但失去畫直云妙畫通靈變化而去亦猶人之登仙了無怪色范蔚宗曄被收家中樂器服玩並極珍麗妓妾亦盛飾母住止單陋唯有一厨中著樵薪沈約宋書曰范曄臨刑與其甥謝綜同逆俱至市曄問綜曰時欲至未綜曰勢不復久曄既食又苦勸綜綜曰此異病篤時何事强飯曄家人悉至市臨刑問須相見不曄問綜曰家人以來幸得相見將不蹔别綜曰别與不别亦何所存來必當號泣正足亂人意曄曰號泣何關人向見道邊親故瞻望亦殊勝不見吾意故欲相見於是乎前曄妻先下撫其子回罵曄曰君不為百嵗阿家不感天子恩遇身死固不足塞罪奈何枉殺子孫曄乾笑云罪至而已曄所生母泣曰主上念汝無極汝曹不能感恩又不念我老今日奈何仍以手擊曄頸及頰曄顔色不怍綜母以子弟自蹈逆亂獨不出視曄語綜曰姊今不來勝人多也曄轉醉子藹亦醉取地土及果皮以擲曄呼曄為别駕數十聲曄問曰汝恚我耶藹曰今日何縁復恚但父子同死不得不悲劉義基封營道侯凡鄙無識始興王濬謂義基曰陸士衡詩云營道無烈心其意何若義基荅曰下官初不識士衡何忽見苦𡊮淑嘗詣彭城王南史曰宋武帝七男王修容生義康永初元年封彭城王彭城問其年淑荅曰鄧仲華拜衮之嵗東觀漢記曰鄧禹字仲華以元功拜太傅彭城曰身不識也淑又曰陸機入洛之年彭城曰身不讀書何為作才語見向謝超宗是謝鳳子有文才補新安王常侍作王母殷淑儀誄帝大嗟賞謂謝莊曰超宗殊有鳳毛時右衛將軍劉道隆在御坐出候超宗曰聞君有異物欲覔一見謝曰懸罄之室何得異物耶道隆武人正觸其父諱曰方侍宴至尊説君有鳳毛謝徒跣還内道隆謂檢覔鳳毛至暗待不得乃去沈休文嘗侍梁武帝燕有妓師是齊文恵宫人帝問識坐中客不曰惟識沈家令休文伏坐流涕帝亦悲感為之罷酒何敬容在選日嘗有一客詣之此人姓吉敬容問之曰卿與丙吉逺近荅曰如明公之與蕭何祖孝徵祖珽己見放縱不羈曾至交州刺史司馬世雲家飲酒遂藏銅疊二面㕑人請捜諸客果於孝徵懐中探得又魏神武嘗宴僚屬於坐失金叵羅竇太后令飲者皆脱帽果在孝徵髻中見者以為深恥孝徵怡然不屑北史曰祖孝徵性疎率不能㢘慎嘗守倉曹受山東課輸大文綾并連珠孔雀羅等百匹令諸嫗擲摴蒱調新曲招城市年少歌舞為娛遊諸倡家與陳元康穆子容任胄元士亮諸人為聲色之遊北人謂茗飲為酪奴亦云水戹蕭正徳初入北侍中元叉欲為設茗先問正徳卿於水戹多少正徳初不知荅云下官雖生水鄉立身以來未遭陽侯之難舉坐大笑貞觀中尚藥奏求杜若敕下度支有省郎以謝朓詩云芳洲生杜若乃委坊州貢之本州曹官判云坊州不出杜若應由讀謝朓詩誤華省名郎作此判事豈不畏二十八宿笑人耶太宗聞之改授雍州司法虞世南兄世基許敬宗父善心同為宇文士及所害封徳彞時為内史舍人備見其事因謂人曰世基被誅世南匍匐而請代善心之死敬宗舞蹈以求生人以為口實敬宗銜之禇遂良其父亮尚在乃别開門敕嘗有賜遂良使者由正門入亮出曰渠自有門蘇味道為相具位未嘗有所發明脂韋自營而已常謂人曰決事不欲明白誤則有悔模棱持兩端可也世號模棱手侯思止為左臺御史嘗命作籠餅謂膳者曰與我縮葱作之時人號為縮葱侍御李林甫不學太常少卿姜度妻誕子林甫手書慶之曰聞有弄麞之慶客視之掩口李林甫引蕭炅為户部侍郎炅不知書嘗與嚴挺之共語稱蒸嘗伏臘乃呼為伏獵挺之語九齡曰省中乃有伏獵侍郎乎郭𢎞霸為右臺御史時大夫魏元忠病僚屬省候𢎞霸獨後入憂見顔間請視便液即染指嘗之驗疾輕重因賀曰凡甘者病不瘳今味苦當愈喜溢于面元忠惡其媚暴語于朝安禄山好作詩嘗詠櫻桃云櫻桃一籃子半青一半黄一半寄懐王一半寄周贄或請以一半寄周贄句在上則協韻禄山怒曰豈可使周贄壓我兒耶韓㫤是韓吏部子雖教有義方而性頗闇劣嘗為集賢校理史𫝊有金根車㫤以為誤悉改為銀江南一驛吏以幹事自任典郡者初至吏白驛中已理請一閱之刺史往視初見一室署云酒庫諸醖畢熟其外畫一神刺史問是誰言是杜康刺史曰公有餘也又一室署云茶庫諸茗畢貯復有一神問是誰云是陸鴻漸刺史益善之又一室署云葅庫諸葅畢備亦有一神問是誰吏曰蔡伯喈刺史大笑曰不必置此耶律徳光嘗問馮道曰爾是何等老子道荅曰無才無徳癡頑老子徳光大喜即以道為太傅儒林公議曰馮道當天下大亂戎夷交侵生民之命急於倒挂道方自號長樂老著書數百言陳已更事四姓及契丹所得階勲官爵以為榮自謂孝於家忠於國為子為弟為人臣為師長為夫為父有子有孫時開一卷時飲一杯食味别聲老而自樂何樂如之蓋其自述如此北方民家吉凶輒有相禮者謂之白席多鄙俚可笑韓魏公自樞密歸鄴赴一姻家禮席偶盤中有荔枝欲啗之白席者遽唱言曰資政喫荔枝請衆客同喫荔枝魏公憎其喋喋因置不復取白席者又云資政惡發也却請衆客放下荔枝魏公為一笑熙寧中省試王射虎侯賦一試卷云講君子必争之藝飾大人所變之皮又嘗試貴老為其近於親賦一試卷云覩兹黄耉之狀𩔖我嚴君之容一時𫝊以為笑余靖不事修飾作諫官日因賜對面陳乞不修開寳塔時方盛暑上入内云被一汗臭漢薰殺噴唾在吾面上涑水記聞曰余靖本名希古韶州人舉進士未預解薦曲江主簿王仝善遇之為干知韶州者舉制科知州怒以為玩已捃其罪無所得唯得與希古接坐仝坐違敕停任希古杖臀二十仝遂不復仕進希古更名靖字安道取他州解及第景祐中為館職為范文正訟寃獲罪由是知名范公入參大政引為諫官苗振以第四人及第既而召試館職一日謁晏丞相晏語之曰君久從吏事必疎筆硯今將就試宜稍温習振率然荅曰豈有三十年作老娘而倒掤孩兒者乎晏公俛而哂之既而試澤宫選士賦韻有王字振押之曰率土之濵莫非王不成語遂不中選晏公聞而笑曰苗君竟倒掤孩兒矣李獻臣好為雅言知鄭州時孫次公為陜漕罷赴闕先遣一使臣入京所遣乃獻臣故吏到鄭庭參獻臣甚喜欲令左右延飯乃問之曰餐來未使臣誤意餐者謂次公也遽對曰離長安日都運已治裝獻臣曰不問孫待制官人餐來未其人慙沮而言曰不敢仰昧為三司軍將日曾喫却十三蓋鄙語謂遭杖為餐獻臣掩口曰官人誤也問曾與未曾餐飯欲奉留一食耳王荆公為小學時嘗訪蔡君謨君謨聞公至喜甚自取茶之精品親滌器烹㸃以飲公公忽於夾袋中取消風散一撮投茶甌中併食之君謨失色公徐曰大好茶味君謨大笑且歎公之真率吕申公吕公著己見素喜釋氏之學及為相務簡静罕與士大夫接惟能談禪者多得從遊於是好進之徒往往幅巾道袍日遊禪寺隨僧齋粥談説理性覬以自售時人謂之禪鑽程師孟嘗請於王介甫曰公文章命世師孟多幸與公同時願得公為墓誌庶𫝊不朽惟公矜許介甫問先正何官師孟曰非也師孟恐不得常侍左右欲豫求墓誌俟死而刻之耳介甫雖笑不許而心憐之吳中舊事曰程光禄師孟吳下人樂易純質喜作詩效白樂天而尤簡直至老不改吳語與王荆公有塲屋之舊荆公頗喜之晚相遇猶如布衣時自江州致仕歸過荆公􅃽山留數日時已年七十餘荆公戲之曰公尚欲仕乎曰猶可更作一郡荆公大笑知其無𨼆情也及王雱死有習學檢正張安國被髮藉草哭於柩前曰公不幸未有子今郡君妊娠安國願死托生為公嗣京師為之語曰程師孟生求速死張安國死願托生王荆公作相日當生朝光禄卿鞏申以大籠貯雀詣客次搢笏開籠且祝曰願相公一百二十嵗時有邊寨之主妻病而虞候割股以獻天下駭笑時人為之語曰虞候為縣君割股大卿與丞相放生東軒筆録曰光禄卿鞏申佞而好進老為省判尤趨附不己吕恵卿嘗語王荆公曰公面有䵟用園荽洗之當去荆公曰吾面黑耳非䵟也吕曰園荽亦能去黑公笑曰天生黑於予園荽其如予何紹聖間馬從一監南京排岸司適漕使至隨衆迎謁漕一見怒甚即叱之曰聞汝不職未欲按汝何不亟去尚敢來見耶從一惶恐自陳湖湘人迎親竊禄求哀不已漕察其語南音也乃稍霽威云湖南亦有司馬氏乎從一荅曰某姓馬監排岸司耳漕乃微笑曰然則勉力職事可也初蓋誤認為温公族人故欲害之自是從一刺謁但稱監南京排岸而已𫝊者皆以為笑謝無逸閒居多從衲子遊不喜對書生一日有一舉子來謁坐定曰每欲問無逸一事輒忘之嘗聞人言歐陽修者果何如人無逸熟視久之曰舊亦一書生後甚顯達嘗參大政又問能文章不無逸曰文章也得無逸之子宗野方七嵗立在傍聞之匿笑而去建炎中車駕倉卒南渡駐蹕錢塘有侍臣因召對自陳劄子首曰恭惟嵗二月東巡狩至於錢塘吕相頤浩見之笑曰秀才家識甚好惡金主亮南侵命葉義問視師江上義問素不習軍旅會劉錡捷書至讀之至金賊又添生兵顧問吏曰生兵是何物聞者掩口温日觀己見嘗在朱宣慰家畫葡萄遂題一詩於上曰昔有朱買臣今有朱宣慰兩箇擔柴夫並皆金紫貴朱欣然曰朱清果是賣蘆柴出身和尚説得我著酬以䞋資五錠輟耕録曰宋季亡賴相聚鈔掠海上朱清張瑄最為雄長廷議招懐令部其徒屬為防海民義後建言海漕事試之良便上注意嚮之父子致位卿相弟姪甥壻皆大官田園宅館遍天下僕從皆佩金虎符為萬户意氣盈滿同時夷戮殆盡惑溺三十七夫欲之惑人迺至於溺而不能返蓋自中人以上有不能免者其能奮然自拔者幾人哉故孟子以為養心莫善於寡欲老子曰為道日損孰能知損之為道君子哉山陽太守薛勤喪妻不哭將殯臨之曰幸不為夭復何恨哉汝南先賢𫝊曰薛勤字公祖仕郡為功曹陳仲舉十五時為父詣勤勤顧而異之明日造焉仲舉父出迓勤勤曰足下有不凡子吾來候之不從卿也言議盡日後王伯宗妻卒伯宗與諸子並持杖行服時人或兩譏焉張璠漢紀曰王龔字伯宗有髙名於天下順帝時為太尉荀奉倩既娶曹洪女荀粲己見太魏志曰曹洪字子㢘祖從弟也容服帷帳甚麗専房燕婉後婦病亡傅嘏往弔奉倩不哭而神傷傅問曰婦人才色並茂為難子之聘也遺才存色非難遇也何哀之甚奉倩曰佳人難再得顧逝者不能有傾城之異然未易可遇也痛悼不能已已後嵗餘亦亡石崇有妓緑珠美而工笛孫秀使人求之崇别館北邙下方登凉觀臨清水使者以吿崇崇出其婢妾數十人以示之曰任所以擇使者曰本受命索緑珠崇勃然曰緑珠我所愛不可得也使者曰君侯博古知今察逺照邇願加三思崇不聴使者已出又反崇竟不許遂及於難劉道真劉寳己見子婦始入門遣婢䖍劉持之甚苦婢固不從劉乃下地叩頭婢懼而從之明日語人曰手推故是神物一下而婢子服淫王丞相曹夫人性甚忌禁制丞相不得有侍御時有妍少必加誚責丞相不能久堪乃密營别館衆妾羅列男女成行後元會日夫人於青疏中觀望忽見兩三小兒騎牛皆端正夫人語婢云汝出問此是誰家兒竒可念給使不達㫖乃云此是第四五等諸郎曹氏驚恚不能自忍乃命駕車將黄門及婢二十人持食刀欲自出尋討丞相亦飛轡出門猶患遲乃以左手攀車欄右手提麈尾以柄打牛狼狽奔馳方得先至蔡司徒聞之乃謂丞相曰朝廷欲加公九錫公知不丞相為信自敘謙志蔡曰不聞加餘物惟聞短轅犢車長柄麈尾爾丞相大恚恨謝太傅劉夫人性忌不令公有别房公既深好聲樂後遂頗欲立妓妾兄子外生輩微達此㫖共問訊劉夫人因方便稱關雎螽斯有不忌之徳夫人知以諷己乃問誰撰此詩云是周公夫人曰周公是男子相為耳若使周姥撰詩當無此言范汪至能噉梅有人致一斛奩須㬰噉盡劉邕南史曰邕穆之子襲封南康郡公愛食瘡痂以為味似鰒魚嘗詣孟靈休靈休先患疚瘡痂落在牀邕取食之靈休大驚痂未落者悉褫取飴邕邕去靈休與何勗書曰劉邕向顧見噉遂舉體流血山隂主淫恣過度嘗謂帝曰妾與陛下雖男女有殊俱托體先帝陛下六宫萬數而妾唯駙馬一人事不均平一何至此帝乃為置面首左右三十人帝每出行主與朝臣常共陪輦王僧達為太子洗馬在東宫愛念軍人朱靈寳及出為宣城靈寳已長僧達作列死亡寄宣城左永之藉注以為己子改名元序啓太祖補竟陵典書後事發禁錮庾炳之性好潔士大夫造之者去未出户輒令拭席洗牀王思微好潔浄左右提衣悉令用白紙裹手指宅中有犬汙屋棟思微令門生洗之意尤不已更令刮削復言未足遂令易柱何佟之性好潔一日之中洗滌者十餘過猶恨不足人稱為水淫梁書曰何佟之字士威廬江􅈞人豫州刺史惲六世孫祖劭之宋貟外散騎常侍父歆齊奉朝請佟之少好三禮師心獨學彊力専精手不輟卷讀禮論二百篇畧皆上口起家揚州從事仍為總明館學士仕梁至尚書左丞魏收使梁買吳婢入館其部下有買婢者魏亦喚取遍行姦􅁾梁朝館司皆為之受譴人皆稱其才而鄙其行崔湜是崔仁師子與弟澄液從兄涖並有文翰别居清要每私宴自比王謝之家謂人曰吾門户及出身未嘗不為第一丈夫當先據要路以制人豈能黙黙受制故進取不已而不以令終喬知之有侍婢曰窈娘美麗歌舞為武承嗣所奪知之怨惜因作緑珠篇以寄情密送與婢婢感憤自殺承嗣大怒因諷酷吏羅織知之下獄死唐詩紀事曰喬知之馮翊人武后時為補闕𤣥宗性俊邁不好琴會聴琴一弄未畢叱琴者出謂内侍曰速令花奴將羯鼓來為我解􅁾王維居輞川宅宇既廣山林亦逺而雅好潔地不容浮塵日有十數帚掃治専使兩僮縛帚有時不給鮮于叔明嗜蟠虫權長孺嗜人爪甲元載納薛瑶英為姬以龍綃衣衣之衣一襲無一兩載以瑶英體輕不勝重衣於異國訪求此服𡊮正辭積錢盈室室常有聲如牛人以為妖勸其散積以禳之正辭曰吾聞物之有聲求其同𩔖爾宜益以錢聲必自止李納性辯急酷尚奕棋每下子安詳極於寛緩有時躁怒家人輩則密以棋具陳於前納覩便欣然改容取子布􅈫都忘其恚孫何性落魄而酷好古文為轉運使日政尚苛峻州縣患之乃求古碑文字磨滅者得數本釘於館中孫至則讀其碑辯識文字以爪搔髮垢而嗅之遂往往至暮不復省録文案丁諷病廢常令兩女妓掖侍見客於堂中諷以好色致疾既廢亡賴益求妙年殊質以厭其心客出不能送又令一婢子送至中門曰謝訪以故賔客之至者加多乃數倍於未病時宋子京多内寵後庭曳羅綺者甚衆嘗宴於錦江偶微寒命取半臂諸婢各送一枚凡十餘枚皆至子京視之茫然恐有厚薄之嫌竟不取服忍凍而歸東坡云未知一生當著幾兩屐吾有嘉墨七十枚而尤求取不已不近愚耶石昌言畜李廷珪墨不許人磨或戲之曰子不磨墨墨將磨子今昌言墓木拱矣而墨故無恙李公擇見墨輒奪卿相間抄取殆遍近有人從渠許來云懸墨滿堂此亦通人之一蔽也米元章有潔癖屋宇器具時一滌之巾帽少有塵則濯之復加於頂客去必濯其坐榻米元章在真州嘗謁蔡攸於舟中攸出右軍王略帖示之元章驚嘆求以他畫易之攸有難色元章曰公若不見從某不復生即投此江死矣因大呼據船舷欲墮攸遂與之彭淵才游京師十餘年其家饘粥不給父以書促歸跨一驢攜一布囊親舊相慶曰布囊中必金珠也君官爵雖未入手且使父母妻兒脱凍餒之厄囊中所有可早出之淵才喜見鬚眉曰吾富可埒國也汝可拭目以觀既開橐乃李廷珪墨一丸文與可墨竹一枝歐陽公五代史稿草一巨束一士人以鬻書為業盡掊其家所有約百餘千買書將入京中塗遇一士人取書目閲之愛其書而貧不能得家有數古銅器將貨之而鬻書者雅有此癖一見甚喜乃曰無庸貨也我與汝估其值而兩易之於是盡以隨行之書換數十銅器亟返其家其妻視其行李但見二三布囊磊磈然鏗鏗有聲問得其實乃詈其夫曰你換得他這箇幾時近得飯喫其人曰他換得我那箇也幾時近得飯喫聞者無不絶倒趙子固己見嘗得姜白石所藏定武不損本禊帖乗舟夜汎而歸行至霅之昇山風起舟覆行李襆被皆渰溺無餘子固方披濕衣立淺水中手持禊帖語人曰蘭亭在此餘不足問也因題於卷首云性命可輕至寳是保仇隙三十八甚哉怨毒之於人遂相讐陷有殺其身而不悔者吁可畏哉故一朝之忿忘其身以及其親亦聖賢之深戒也獻帝嘗宴見孔文舉與郄鴻豫司馬彪續漢書曰郄慮字鴻豫山陽髙平人少受學於鄭𤣥問文舉曰鴻豫何所優長文舉言可與適道未可與權鴻豫舉笏曰融昔宰北海政散人流其權安在遂與文舉互相短長范曄漢書曰操以孔融論建漸廣慮鯁大業郄慮承望風㫖以微法奏免融官因顯明讐怨操書激厲融曰蓋聞唐虞之朝有克讓之臣故麟鳳來而頌聲作也後世徳薄猶殺身為君破家為國及至其敝睚眦之怨必讐一餐之恵必報故晁錯念國遘禍於𡊮盎屈平悼楚受譖於椒蘭彭寵傾亂起自朱浮鄧禹威損失於宗馮由此言之喜怒怨愛禍福所因可不慎與昔㢘藺小國之臣猶能相下冦賈倉卒武夫屈節崇好光武不問伯升之怨齊侯不疑射鈎之虜夫立大操者豈累細故哉往聞二君有執法之平以為小介當收舊好而怨毒漸積志相危害聞之憮然中夜而起昔國家東􅁶文舉盛歎鴻豫名實相副綜達經學出於鄭𤣥又明司馬法鴻豫亦稱文舉竒逸博聞誠怪今者與始相違孤與文舉既非舊好又於鴻豫亦無思紀然願人之相美不樂人之相傷是以區區思協歡好又知二君羣小所搆孤為人臣進不能風化海内退不能建徳和人然撫養戰士殺身為國破浮華交㑹之徒計有餘矣融報曰猥恵書教告所不逮融與鴻豫州里比鄰知之最早雖嘗陳其功美欲以厚於見私信於為國不求其覆過掩惡有罪望不坐也前者黜退歡欣受之昔趙宣子朝登韓厥夕被其戮喜而求賀況無彼人之功而敢枉當官之平哉忠非三閭智非晁錯竊位為過免罪為幸乃使餘論逺聞所以慙懼也朱彭冦賈為世壯士愛䕶相攻能為國憂至於輕弱薄劣猶昆虫之相嚙適足還害其身誠無所至也晉侯嘉其臣所争者大而師曠以為不如心競性既遲緩與人無傷雖出跨下之負榆次之辱不知貶滅之於己猶蚊䖟之過也子産謂人心不相似或矜勢者欲以取勝為榮不念宋人待四海之客大鑪不欲令酒酸也至於屈榖巨瓠堅而無竅當以無用罪之耳他者奉尊嚴教不敢失墜郄為故吏融所推進趙衰之拔卻縠不輕公叔之升臣也知同其愛訓誨發中雖懿伯之忌猶不得念況恃舊交而欲自外於賢吏哉輒希腹心修好如初王平北在任王乂别傳曰王乂字叔元瑯琊臨沂人時蜀新平二府作亂文帝西之長安徵為相國司馬遷尚書督幽州諸軍事平北將軍有簡書將免官夷甫時年十七夷甫是平北子見從舅羊祜申陳事狀辭甚俊偉羊不然之夷甫拂衣而起羊顧謂賔客曰此人必將以盛名處當世大位然敗俗傷化者必此人也初羊以軍法欲刑王濬沖夷甫又忿羊言其必敗不相貴重天下為之語曰二王當朝人莫敢稱羊公之有徳謝𤣥暉頗輕江祏祏嘗詣𤣥暉𤣥暉因言有一詩呼左右取既而復停祏問其故云定復不急祏以為輕已後遂搆害𤣥暉劉長史劉孝綽己見與到茂沿到沿己見友善同遊東宫劉自以才優於到每於宴坐嗤鄙其文到常銜之及劉為廷尉正攜妾入官府其母猶停私宅到尋為御史中丞遣令史按其事遂劾奏之云攜少妹於華省棄老母於下宅髙祖為𨼆其惡改妹為姝免孝綽官王偉侯景之徒也景敗元帝愛其才欲全之朝士多忌之曰前日偉作檄文有異詞句帝求而觀之云項羽重瞳尚有烏江之敗湘東一目寧為赤縣所歸元帝大怒釘其舌於柱剜腸臠肉偉顔色自若劉璠梁典曰王偉洛陽人學通周易嘗在揭陽賦詩曰平明聴戰鼓薄暮敘存亡楚漢方龍鬭秦關陣未央至江陵繫獄以詩贈湘東嬖人曰趙一能為賦鄒陽解獻書何惜西江水不救轍中魚又上五十韻詩以希不死湘東愛其詞翰猶欲未誅左右疾之曰偉前作檄文言不順湘東取視乃斬之郄昂與韋陟友善因話國朝宰相陟曰誰最無徳昂誤對曰韋安石已而驚走出逢吉温於街中温問何此倉黄荅曰適與韋尚書話國朝宰相最無徳者本欲言吉頊誤云韋安石既知失言復鞭馬而走抵房相之第琯執手慰問之復以房融為對昂有時稱忽一日觸犯三人舉朝嗟嘆惟韋陟遂與之絶顔平原不容於盧杞杞將出之平原辭曰先中丞𫝊首平原面被流血吾不敢以衣拭親舌䑛之公不忍見容乎杞矍然下拜而銜恨切骨牛竒章赴舉時每為同袍見忽嘗投贄於劉補闕禹錫劉對客展卷飛筆㸃竄其文一時雖謝礲礪終為鞅鞅後劉轉汝州竒章出鎮漢南枉道至汝駐旌旄信宿酒酣以詩喻劉劉承詩意方悟往年改牛公文卷因作詩謝過牛公吟諷前意稍解移宴竟夕方整前驅范攄雲溪友議曰牛僧孺席上贈劉尚書詩曰粉署為郎四十春今來名輩更無人休論世上升沉事且鬭尊前見在身珠玉會應成咳唾山川猶覺露精神莫言恃酒輕言語曾把文章謁後塵劉和詩曰昔年曾忝漢朝臣晚嵗空餘老病身幼見相如成賦日後為丞相掃門人追思往事咨嗟久喜幸清光笑語頻猶有當時舊冠劍待公三日拂埃塵楊㢘夫與倪元鎮嘗會飲於友人家時席有歌妓㢘夫狂誕脱妓人鞋行酒令坐客𫝊飲元鎮素有潔病見之大怒翻案而起㢘夫亦色變飲席遂散後二公竟不復面語林卷三十
