body:
  text: 語林卷二十九明何良俊撰假譎二十九夫君子所貴者誠假譎則於誠何有哉蓋雖權以濟事亦君子所不道也安帝時闕尚書詔將大夫六百石以上試對政事天文道術以髙第者補之翟酺自恃能髙而忌故太史令孫懿恐其先用乃往候懿既坐言無所及唯涕泗流連懿怪問酺曰圖書有漢賊孫登將以才智為中官所害觀君表相似當應之酺受恩接悽愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書范曄後漢書曰翟酺字子超廣漢雒人四世𫝊詩酺好老子尤善圖緯天文厯􅈫以報舅讐當徙日南亡於長安為卜相工遇赦還郡徵拜議郎遷侍中魏武嘗行軍廩榖不足私召主者問如何主者曰可行小斛以足之太祖曰善後軍中言太祖欺衆太祖謂主者曰特當借君一死以厭衆不然事不解乃斬之取首題徇曰行小斛盗官榖劉𤣥徳嘗戰敗自投曹公一日曹公從容語𤣥徳曰天下英雄唯使君與孤本初之徒不足數也𤣥徳方食失匕箸會雷大震𤣥徳曰聖人言迅雷風烈必變良有以也一震之威乃至於此曹公遂不疑𤣥徳宋世祖與羣臣至殷貴妃墓謂劉徳願曰卿等哭貴妃若悲當加厚賞劉應聲號慟涕泗交横上以為豫州刺史帝又令羊志哭羊亦嗚咽甚哀他日有問羊者卿那得此副急淚羊曰我爾日自哭亡妾耳姚崇與張説同為宰輔各懐疑阻張銜之頗切崇病戒諸子曰張丞相與吾不協釁隙甚深然其人素懐奢侈尤好服玩吾身沒之後當來弔汝具陳吾平生服玩寳帶重器羅列帳前張若不顧汝家族無𩔖矣若顧此當録玩用致之仍以神道碑為請既獲其文登時録進先礱石以待至便鐫刻張丞相見事常遲於我數日之後必當有悔若徵碑文以刋削為辭當引視鐫石仍告以聞上崇沒張果至目其服玩者三四崇家悉如崇戒不數日文成敘致該詳時謂極筆其略曰八柱承天髙明之位列四時成嵗亭育之功全數日果遣使取本以為辭未周密欲加刪改姚氏諸子引使者視其碑仍告以奏御使者復命張悔恨撫膺曰死姚崇能􅈫生張説吾今日方知才之不及逺矣李泌以虚誕自任嘗對客曰令家人速灑掃今夜洪崖先生來宿有人遺酒一榼會有客至云麻姑送酒來與君同傾飲未畢閽者云某侍郎取榼子泌命倒還之畧無怍色韓晉公韓滉已見自江東入覲氣槩傑出是時劉𤣥佐在大梁倔强難制滉欲致其朝覲結為兄弟升堂拜親駐車三日大出金帛賞勞一軍為之傾動𤣥佐敬伏乃使人密聴滉滉夜問孔目吏所費多少詰責頗細𤣥佐笑而鄙之曹武穆知渭州號令明肅西人懾憚自是邊境無虞一日方召諸將飲會有叛卒數千亡奔賊境候騎報至諸將相眎失色公言笑如平時徐謂騎曰吾命也汝勿顯言西人聞以為襲巳皆殺之東都事畧曰曹瑋字寳臣武恵王彬第三子彬被疾真宗問以後事對曰臣二子璨與瑋皆堪為將問以優劣曰璨不如瑋瑋好讀書通春秋尤善左氏為將幾四十年威震西鄙諡武穆丁晉公執政不許同列留身唯王文正一切委順未嘗忤其意文正謂丁曰欲面求恩澤又不敢留身丁曰如公不妨一日留身進文字一卷具道丁事丁去數步大悔之不數日丁遂有朱崖之行文潞公以樞密直學士知成都公年未四十成都風俗喜行樂公多燕集有飛語至京師御史何聖從因謁告歸上遣伺察之東都事略曰何郯字聖從成都人為御史鯁切無所避為仁宗所知何將至潞公亦為之動有幕客張少愚謂公曰聖從之來無足念少愚與聖從同郡因迎見於漢州命酒設樂有營妓善舞聖從狎問其姓妓曰姓楊聖從曰所謂楊臺栁者少愚即取妓項帕羅題詩曰蜀國佳人號細腰東臺御史惜妖嬈從今喚作楊臺栁舞盡春風萬萬條命其妓作栁枝詞歌之聖從為之霑醉後數日聖從至成都頗嚴重一日潞公大作樂以燕聖從迎其妓雜府妓中歌少愚之詩以侑觴聖從每為之醉聖從還朝潞公之謗乃息𨼆逸𫝊曰張愈字少愚益州郫人雋偉有大志屢舉不第遂𨼆於家文彦博治蜀為置青城山白雲溪杜光庭故居以處之殿帥楊存中有親愛吏平居賜予無􅈫一旦無故怒而逐之吏莫知得罪之由泣拜辭去存中曰無事莫來見我吏悟其意歸以厚貲俾其子入臺中為吏無何御史欲論存中乾沒軍中糞錢十餘萬其子歸語其父其父奔告存中存中即具劄奏言軍中有糞錢若干樁管某處惟朝廷所用不數日臺中果以為言髙宗出存中劄子示之御史坐妄言被黜秦會之夫人常入禁中顯仁太后言近日子魚大者絶少夫人對曰妾家有之當以百尾進歸吿會之會之咎其失言與其館客謀進青魚百尾顯仁拊掌笑曰我道這婆子村果然秦檜當國日四方餽遺日至方滋徳帥廣東為蠟炬以衆香實其中遣駛卒持詣相府厚遺主藏吏期必達吏使俟命一日宴客吏白燭盡適廣東方經畧送燭一罨未敢啟命取用之俄而異香滿坐察之則自燭中出也亟命藏其餘枚數之適得四十九呼使人問故則曰經畧専造此燭供獻僅五十條既成恐不佳試爇其一不敢以他燭充數秦大喜以為奉己之専秦檜為相日都堂左揆前有石榴一株每著實檜嘿數焉忽亡其二檜佯不問一日將排馬忽顧謂左右取斧伐樹有親吏在旁倉卒對曰實佳甚去之可惜檜反顧曰汝盗食吾榴吏叩頭服韓彦古尹京日周公謹癸辛雜志曰韓彦古字子師詭譎任數處性不常孝宗時為京尹李仁甫惡其詭譎弗與交請謁一日瞰其亡往見之韓實未出既見延入書室請曰平日欲一攀屈而不能今既見臨姑解衣盤礴可也仁甫辭不獲遂為强留室有二㕑貯書牙籖黄袱扃䕶甚嚴仁甫問此為何書荅曰先人在軍中日得於北方蓋本朝野史編年成書者時仁甫方修長編既成有詔臨安給筆札就其家繕録以進而卷帙浩博未見端緒仁甫聞其言亟欲得見韓言家所秘藏將即進呈不可他示李益窘再四致禱乃曰且為某飲酒續當以呈仁甫為盡量每杯行輒請酒罷笑謂仁甫曰前言戲耳此即公所著長編已用嘉紙作副本裝治即以奉納使可進御矣仁甫視之信然蓋隂戒書吏𫝊録每一板酬千錢吏畏其威利其賞輒先録送韓所故仁甫方成韓已得全帙仁甫雖奮愧不平亦幸蒙其成遂用以進宋史曰李燾字仁甫眉州丹稜人博極載籍捜羅百氏慨然以史自任倣司馬光通鑑例斷自建隆迄於靖康為編年一書凡九百七十八卷名長編黜免三十夫尺有所短寸有所長况三代以下士鮮全徳世率以寸朽而棄大材微纇而遺美寳君子蓋深惜之蜀先主銜張裕不遜兼忿其漏言張裕已見曰蜀志曰裕私語人嵗在庚子天下當易代劉氏祚盡矣主公得益州九年之後寅夘之間當失之人密白其言後魏氏之立先主之薨皆如裕所刻下獄將誅之諸葛武侯表請其罪先主荅教曰芳蘭當門不得不鉏蜀志曰裕甚精相術每舉鏡視面自知刑死未嘗不樸之於地也李令伯李密已見入晉自負才器常望内轉而羈旅無援遷漢中太守自以失分懐怨賜餞東堂詔令賦詩令伯末章云人亦有言有因有縁仕無中人不如歸田明明在上斯語豈然帝大忿怒廢黜于家摯瞻為王敦戸曹參軍摯氏世本曰瞻字景游京兆長安人太常虞兄子也父育涼州刺史瞻少善屬文起家著作郎中朝亂依王敦為户曹參軍敦以故壊裘賜老病外部都督瞻諫曰尊裴雖故不宜與小吏敦問何為不可瞻時因醉曰若上服皆可用賜貂蟬亦可賜下乎敦言非喻所引如此不堪二千石瞻曰瞻視去西陽如脱屣耳殷中軍殷浩已見被廢夷神委命雅詠不輟雖家人不見其有流放之戚外生韓康伯始隨至徙所周年還都殷素愛之送至水側乃詠曹顔逺詩曰富貴他人合貧賤親戚離因泣下何長瑜為臨川王義慶記室參軍嘗於江陵寄書與族人何勗以韻語序臨川州府僚佐云陸展染􅁂髮欲以媚側室青青不解久星星行復出如此五六句輕薄少年遂演而廣之一時人士並為品目盡加劇言苦句其文流行臨川以白太祖長瑜徙廣州南史曰太尉𡊮淑文冠當時義慶在江州請為衛軍諮議其餘吳郡陸展東海何長瑜鮑照並有詞章之美引為佐吏謝恵連隨父方明在會稽郡愛郡吏杜徳靈及居父憂贈以五言詩十餘首坐流徙廢塞不豫榮伍殷僕射景仁愛其才因言次白太祖臣兒時便見世中有此文而論者云是恵連其實非也太祖曰若如此便應通之即用為彭城王義康法曹參軍𡊮陽源𡊮淑已見不附劉湛大相乖忤陽源賦詩曰種蘭忌當門懐璧莫向楚楚少别玉人門非種蘭所尋以久病免官梁武每集文士䇿經史事時范雲沈約之徒皆引短推長帝悦加其賞賚曾䇿錦被事咸言已罄帝試呼問劉孝標劉時貧悴冗散忽請紙筆疏十餘事坐客皆驚帝不覺失色自是惡之不復引見及孝標𩔖苑成帝即命諸學士撰華林徧略以髙之竟不見用劉乃著辯命論以寄懐髙祖於鍾山造大愛敬寺王思寂有舊墅在寺側良田八十餘頃是王丞相賜田髙祖遣主書宣㫖就思寂求市欲以賜寺思寂荅㫖云此田不賣若是敕取所不敢言酬對又脱略髙祖怒付市評價以直逼還之由是忤㫖出為吳興太守南史曰王騫字思寂一字𤣥成王儉子也性凝簡慕樂廣之為人不事産業有田八十餘頃與諸宅及故舊共佃之常曰我不如鄭公業有田四百頃而食常不周以此為愧仕至度支尚書加給事中宋考功宋之問已見在天后朝求為北門學士不許作明河篇以見意詩末云明河可望不可親願得乗槎一問津更將織女支機石還訪成都賣卜人則天見其詩謂崔融曰吾非不知之問有才但以其有口過蓋之問患齒疾口常臭故也之問終身慙憤孟浩然極為王右丞所知一日王待詔金鑾召浩然商較風雅上忽臨幸浩然錯􅌓伏床下王不敢𨼆因奏聞上欣然曰朕素聞其人因得召見上曰卿將得詩來否浩然奏曰臣偶不齎所業上即命吟舊作浩然拜舞誦詩曰北闕休上書南山歸敝廬不才明主棄多病故人疎上聞之憮然曰卿自不求朕朕未嘗棄卿奈何誣朕因放歸南山開元中東宫官僚清淡薛令之為右庶子題詩自悼曰朝日上團團照見先生盤盤中何所有苜蓿長闌干飯澁匙難綰羮稀箸易寛何以謀朝夕何由保嵗寒上幸東宫覽之索筆題其榜曰啄木口嘴長鳳凰羽毛短若嫌松桂寒任逐桑榆暖令之遂謝病歸唐詩紀事曰薛令之閩之長溪人肅宗在東宫令之為右庶子積嵗不遷棄官歸乾元中肅宗以舊恩召令之而令之已先卒開元中陸堅在中書以麗正學士供擬過豐謂朝列曰此亦何益國家致此費損將議罷之張説謂諸人曰説聞帝王功成則有奢僭之失或興造池臺或躭玩聲色聖上重儒崇徳親自講論刋校圖書詳延學者今之麗正即是聖主禮樂之司永代規模不易之道所費者細所益者大陸子之言未為達也𤣥宗後聞其言陸之恩待稍薄李適之為相疎直坦夷時譽甚美唐詩紀事曰適之常山愍王孫天寳初代牛仙客為左相朝退每邀賔戚談諧賦詩為李林甫排誣罷免朝賢雖知其無罪然謁問甚稀適之意憤日飲沉酣且為詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾箇來林甫愈怒終遂不免徐常侍久在中書常參李右座議李林甫已見右座被廢常侍恐為罪累逃𨼆衡山為東林寺掇蔬行者詐為喑啞數年後值修建佛殿僧中選善書者題梁巳二三人忽徐行者跨過掌事怒以杖連擊其背徐乃畫地曰某口雖不言昔年曾學大書乞試之使題數行諸僧皆悦服因遣盡書之時李北海遊嶽觀其題處曰不知徐公在此乃召至握手言曰朝列於公已息論矣遂解其布褐釋以簪裳因戲徐曰徐侍郎曾吟峴山思駐馬漢水憶迴舟否徐曰喑啞之時亦黙詠之即與同載北歸唐詩紀事曰徐安貞始名楚璧應制舉三登甲科開元中為中書舍人帝屬文多令視草終中書侍郎陸宣公謫忠州土塞其門家人由於狗竇中州將不得謁面張祜深為令狐楚所知楚鎮天平自草薦表以祜詩三百篇隨表進上祜至京屬元稹在内庭帝以問稹稹曰祜雕虫小技壯夫不為或奨激之恐變陛下風教由是失意東歸令狐綯劉昫唐書曰令狐綯字子直宰相楚之子大中四年以兵部侍郎平章事曾以舊事訪於温庭筠庭筠荅曰事出南華經非僻書也冀相公燮理之暇時宜覽古綯甚怒奏庭筠有才無行不許登第遂轗軻以至終身摭言曰開成中温庭筠才名籍甚然罕拘細行以文為貨識者鄙之與唐詩紀事曰庭筠彦博裔孫李商𨼆俱有名時號温李陶榖久在翰林意希大用建隆以後宰相往往不由文翰聞望皆出榖下榖不能平仍俾其黨因奏對言榖宣力實多微伺上㫖太祖曰翰林草制皆檢前人舊本俗所謂依様畫葫蘆耳何宣力之有榖乃作詩書于玉堂之壁詩曰官職須由生處有才能不管用時無堪笑翰林陶學士也能依様畫葫蘆太祖益薄其怨望遂決意不用丁崖州當政日置宴私第忽語於衆曰嘗聞江南國王鍾愛一女一日諭大臣曰吾止一女姿儀性識特異於人卿等為擇佳壻須年少美風儀有才學門第髙者或言洪州劉生為郡參謀風骨秀美大門博學有文可以充選國主召見大喜尋尚主拜都尉鳴珂鏘玉出入禁闈良田甲第珍寳竒玩豪華富貴冠於一時未幾主殂國主悲悼不勝曰吾將不復見劉生削其官一物不與遣還洪州生恍疑夢覺觸目如失丁笑曰某他日不失作劉參謀也坐中莫不失色未幾有海上之行籍其家孑然南去楊文公為執政所忌母病謁告不候朝㫖徑歸韓城與弟倚居踰年不調有啟謝朝中親知云介推母子願歸綿上之田伯夷兄弟甘受首陽之餓後除汝州希㫖者攻擊不已公又有啟曰已擠溝壑猶下石而弗休方困蒺藜尚關弓而相射當事諸人益惡之東坡既謫黄州復以先知徐州日不覺察妖賊事取勘已而有㫖放罪乃上表謝神宗讀至無官可削撫已知危笑語曰畏喫棒耶儉嗇三十一孔子曰與其不孫也寧固蓋深惡奢僭甚之也夫齊相以濯冠見譏魏人以葛屨興刺下此則戔戔小人纎嗇委瑣又安足道哉沈叔山在吳有美名性至儉􅈔張恵恕使蜀時詣沈别沈入内良久出語恵恕曰向擇一端布欲以送卿而絶無麄者恵恕佳其能顯非江表傳曰沈珩弟峻字叔山有名譽但性儉吝和長輿性至儉嗇家有好李諸弟往園中採食皆計核責錢王琨儉于財用設客不過兩盌酒輒云此酒難遇鹽豉姜蒜之屬並挂屏風酒漿悉置牀下内外有求琨手自賦之世祖幸芳林園就虞侍中悰求扁米粣虞獻粣及雜肴數十轝大官鼎味不及也上就虞求諸飲食方虞秘不肯出上醉後體不快虞乃獻醒酒鯖鮓一方而已夏侯亶性節儉不事華侈晚年頗好音樂有妓妾數十人無被服姿容每有客常隔簾奏樂時呼簾為夏侯妓衣南史曰夏侯亶字世龍譙郡譙人父詳天監元年徵為侍中亶仕至豫州刺史侈汰三十二記曰奢則逼上正孔子所謂不孫也夫僭擬者王誅之所不赦余觀侈汰之徒皆取禍不旋踵蓋有所由來矣馬季長居宇器服多存侈飾教養生徒常數千許自坐髙堂施絳紗帳前授生徒後列女樂弟子髙足𫝊授鮮有入其室者劉威碩在蜀車服飲食號為侈靡侍妾數十能為聲樂悉教誦讀魯靈光殿賦蜀志曰劉琰字威碩魯國人有風流善談論先主在豫州辟為從事厚親待之隨從周旋常為賔客然不豫國政領兵千餘隨諸葛武侯諷議而已劉尚書劉寔己見詣石季倫如厠見有絳紗帳大牀茵褥甚麗兩婢持錦香囊尚書惶遽反走語季倫向誤入卿内季倫曰是厠耳羊稚舒冬月釀常令人抱甕須臾復易人酒速成而味好符朗過江時與朝士宴會諸人並用唾壺朗欲誇之使小兒跪而張口承唾含出謝靈運性奢豪車服鮮麗衣裳器物多改舊形制世共宗之咸名為謝康樂虞景豫悰善為滋味和齊皆有方法豫章王嶷盛饌享賔王問今日肴羞寧有所遺不虞曰恨無黄頷􅌜何曾食疏所載也羊祖忺羊侃己見性善音律自造採蓮棹歌兩曲甚有新致姬妾侍列窮極奢靡有彈筝人陸太喜著鹿角爪長七寸儛人張浄琬腰圍一尺六寸時人咸推能掌中舞又有孫荆玉能反腰帖地銜得席上玉簪敕賚歌人王娥兒時東宫亦賚歌者屈偶之並妙盡竒曲一時無對徐湛之己見産業甚厚室宇園池伎樂之妙冠於一時門生千餘皆三吳富人子姿質端美衣服鮮麗每行遊塗巷盈滿兩目悉以後車載之文帝每嫌其侈縱時安成公何勗無忌之子臨汝公孟靈休是昶之子並名奢豪與湛之以肴膳器服車馬相尚都下語曰安成食臨汝飾湛之特兼何孟之美河間王琛駿馬千餘疋以銀為槽忩户之上玉鳳啣鈴金龍吐斾陳顯達子與王敬則諸兒並精車牛麗服飾當世快牛稱陳世子青王三郎烏吕文顯折角江瞿曇白鼻後皆集陳氏家蕭宏奢侈過度修第擬於帝宫後房數百餘人皆極天下之選所幸江無畏服玩侔於東昏潘妃寳屧直千萬南史曰臨川静恵王宏字宣達梁文帝第六子也天監元年封臨川王位揚州刺史隋文帝子秦王俊盛修宫室窮極侈麗為妃作七寳罩籬車不可載以馬負之而行又為水殿香粉塗壁玉砌金堦梁柱榱棟之間周以明鏡間以寳珠極瑩飾之美每與賔客妓女絃歌於上煬帝作西苑其内為海海北有龍鱗渠作十六院門皆臨渠每院以四品夫人主之剪綵為芰荷乗輿臨幸則去水而布之上好以月夜從宫女數千騎遊西苑作清夜遊曲馬上奏之隋虞孝仁性奢華伐遼之役以駱駞負函盛水養魚以自給唐太宗盛飾宫掖大然燈燭與蕭后同觀之因問朕施設孰與隋主蕭后笑而不荅固問之曰彼乃亡國之君陛下開基之主奢儉之事固自不同帝問隋主何如蕭后曰每至除夜殿前設火山數十盡沉水香根每一山焚沉香數車以甲煎簇之焰起數丈香聞數十里一夜用沉香二百餘葉甲煎二百石房中不然膏火懸寳珠一百二十以照之光比白日妾觀陛下殿前所焚是柴木殿内所爇是膏油但覺烟氣薰人太宗良久不言口刺其奢而心伏其盛韋陟性侈縱喜飾服馬侍兒閹童列左右常數十侔於王宫主第窮治饌羞選膏􅃾地藝榖麥以鳥羽擇米每食視厨所棄其直猶不減萬錢宴公侯家雖極水陸曾不下箸明皇雜録曰陟早以文學識度著名善屬文出入清顯踐厯崇貴自以門地才華坐取卿相接物簡傲未嘗與人欵曲何良俊曰觀韋陟如此舉動其奢縱無檢幾於不孫縱其人地甚髙亦已減十之四五以宋廣平之清徳而猶歎譽之不置何耶豈其兄弟杜門時嘗矯矯自立兹豈其鳳徳之衰耶廣平語載賞譽中韋陟厨中飲食香味錯雜人入其中多飽飫而歸時人為之語曰人欲不飯筋骨舒夤縁須入郇公厨岐王宫於竹林内縣碎玉片每夜聞相觸之聲即知有風號占風鐸劉昫唐書曰恵文太子隆範睿宗第四子也封岐王好學工書雅愛文章之士與閻朝𨼆劉廷琦張諤鄭繇篇題倡和又多聚書畫古蹟為時所稱王元寳嘗以金銀疊為屋壁以紅泥泥之别置禮賢堂以沉香為軒檻以鑌鐵甃地面以錦文石為柱礎又以銅線穿錢甃於後圃花徑中泥雨不滑人呼為王氏富窟開元天寳遺事曰王元寳京師巨豪也以李冗獨異志曰明皇嘗問元寳家財多少對曰請一縑繫陛下南山一樹南山樹盡臣縑不窮于頔為襄州日㸃山燈一上油二千石元載末年造芸暉堂𢷬芸香為屑塗壁更以沉檀為梁棟飾金銀為戸牖蘇鶚杜陽雜編曰芸香草也出于闐國其香潔白如玉入土不朽可以塗壁元載寵姬薛瑶英幼㗖香肌肉皆香載處以金絲却塵褥李昌䕫在荆州打獵大修裝飾其妻獨孤氏亦出女隊二千人皆著紅紫繡襖子及錦鞍韀魚朝恩有洞房四壁皆安琉璃板中貯江水及萍藻諸色魚蝦號魚藻洞段文昌富貴後打金蓮花盆盛水濯足或規之荅曰人生幾何要酬平生不足也續世説曰段文昌布素之時所向不偶及其達也揚厯顯重出入將相垂二十年服飾玩好歌鐘妓女苟悦於心無所愛惜奢侈過度物議貶之李徳裕營平泉莊逺方以異物奉之或題曰隴右諸侯供語鳥日南太守送名花李徳裕好飲恵山泉自京至常州置遞時號水遞李徳裕每食一杯羮其費約錢三萬雜珠玉寳貝雄黄硃砂煎汁為之過三煎即棄其滓於溝中王廣津作相日庭穿一井合玉為櫃嚴其鏁鑰天下寳玉真珠投置其中汲其水供飲後廣津被刑其骨肉之色並如金張功甫是張循王諸孫園池聲妓服玩之麗甲天下嘗於南湖園作駕霄亭於四古松間以巨鐵絙懸之空半當風月清夜與客梯登之飄揺雲表王簡卿侍郎嘗赴其牡丹會云衆賔既集坐一虚堂寂無所有俄問左右云香已發未荅云已發命卷簾則異香自内出郁然滿坐羣妓以酒肴絲竹次第而至别有名姬十輩皆衣白凡首飾衣領皆牡丹首帶照殿紅一妓執板奏歌侑觴歌罷樂作乃退復垂簾談論自如良久香起卷簾如前别十姬易服與花而出大抵簪白花則衣紫紫花則衣鵞黄黄花則衣紅如是十杯衣與花凡十易所謳者皆前輩牡丹名詞酒竟歌樂無慮百數十人列行送客燭光香霧歌吹雜作客皆恍然如仙遊齊東野語曰張鎡字功甫循忠烈王諸孫能詩一時名士無不交遊於誅韓有力賞不滿意又欲以故智去史事泄謫象臺而殂忿狷三十三夫以伯夷之隘尚曰君子不由若夫勁狹之徒一遭愆忤即怒目攘臂其去伯夷何逺哉然且曰望望然去之在伯夷則有然矣故孟子非惡伯夷惡後世之以伯夷為口實者嗚呼君子何可不知所以自養也許子將許劭己見與從兄文休許靖己見俱知名並有人倫臧否之稱而私情不協子將為郡功曹排擯文休不得齒敘以馬磨自給典論曰汝南許劭與族兄靖俱避地江東共争論於太守許貢坐至於手足相反時苖令夀春日􅃽濟作揚州治中苖初至謁濟濟素嗜酒適會其醉不時見苗苖恚恨還刻木為人署曰酒徒􅃽濟豎之墻下旦夕射之魏畧曰時苗字徳胄鉅鹿人為大官令領其郡中正至於敘人才不能寛大然記人之短雖在久逺銜之不置魏國既建杜子緒魏志曰杜襲字子緒潁川定陵人曾祖安祖根著名漢世襲避亂荆州劉表待以賔禮同郡繁欽數見竒於表襲曰吾與子欲龍蟠幽藪待時鳳翔豈謂劉牧為撥亂之主而規委身哉子見能不已非吾徒也遂南適長沙建安初逃還鄉里太祖以為西鄂長厯官侍中王仲宣和陽士王粲己見表魏志曰和洽字陽士汝南西平人與親舊南依劉太祖定荆州辟為丞相掾時毛玠崔琰並以忠清幹事選用儉節洽曰天下大器在位與人不可以一節儉也儉素過中自以處身則可以此格物所失或多夫立教觀俗貴處中庸今崇一槩難堪之行以檢殊塗勉而為之必有疲瘁並以彊識博聞見知魏武遊觀出入多得驂乗至其見敬不及於陽士杜嘗獨見魏武留語直至夜半仲宣性躁競中夜起坐曰不知公對杜襲道何等也陽士笑曰天下事豈有盡耶卿晝侍可矣悒悒於此欲兼之乎王僕射敬𢎞諸兒孫嵗中不過一再見見輒剋日恢之為新安太守敬𢎞子嘗請假還東定省王剋日見之至日不果假日將盡恢之乞求奉辭王呼前既至閣復不見恢之於閣外拜辭流涕而去南史曰敬𢎞子恢之瓚之昇之孫秀之延之曾孫綸之凡四世並方嚴剋日乃見子孫蓋家風也王敬𢎞諸子未嘗教以學問人問之荅曰丹朱未應乏教甯越不聞被捶王錫年二十四辭吏部郎掩扉覃思室宇蕭然諸子温凊隔簾趨侍謝𢎞微至性寛博與人未嘗有牾末年嘗與友人棋友人西南棋有死勢一客唱言西南風急或至覆舟其人悟而救之𢎞微大怒投局於地識者覺其有異未幾果卒虞玩之好臧否人物王仲寳常舉員外郎孔逷玩之頗持異議仲寳甚恨之後玩之亡後孔瑄就仲寳求會稽五官仲寳方盥投皂莢於地曰卿鄉俗殊惡虞玩之至死煩人虞玩之王儉並己見餞南史曰玩之東歸儉懐恨不出送朝廷無祖者中丞劉休與親知書曰虞公散髪海隅同古人之美而東都之送殊不藹藹段相文昌性介狹每燕賔客有眉睫之失必致怪訝在西川有進士薛太白飲酒稱名太多明日遂不復召梅侍讀詢晩年躁於禄位嘗朝退過閤門見箱中有錦軸云是胡侍郎則致仕告身同列取視梅逺避而過曰幣重而言甘誘我也何以視為時人多笑之梅侍讀年七十餘又病足常撫其足而詈之曰是中有鬼令我不至兩府者汝也慶厯中西師未解晏元獻為樞密使大雪置酒西園歐陽永叔賦詩云須憐鐵甲冷徹骨四十餘萬屯邊兵晏曰昔韓愈亦能作言語赴裴度會但云園林窮勝事鐘鼔樂清時不聞如此合閙倪元鎮修潔不能容物嘗寓其姻鄒氏家鄒塾師陳子章有壻曰金宣伯一日來訪元鎮聞宣伯儒者倒屣迎之見其言貌麄率大怒掌其頰宣伯媿忿不見主人而去鄒出頗怪之元鎮曰宣伯面目可憎語言無味吾斥去之矣讒險三十四夫讒險之毒慘於戈兵是以吉甫慈父也伯竒孝子也不能不致疑於掇蜂之間成王明君也周公賢臣也猶必有待於風雷之變故孔子以浸潤之譖膚受之愬不行既謂之明又謂之逺嗚呼難矣况乎義闕君臣恩非父子聴言者非成王吉甫之能詳致謗者無周公伯竒之可指幾何其不見惑於交搆之徒耶巷伯之詩欲取彼譖人投之有昊亦豈過也曹公欲加害孔北海使路粹作奏典畧曰路粹字文蔚少學於蔡邕初平中隨車駕至三輔建安初以髙才與京兆嚴象擢拜尚書郎象以兼有文武出為揚州刺史粹後為軍謀祭酒與陳琳阮瑀等典記室粹承㫖文致融罪言融昔在北海見王室不寧招合徒衆欲圖不軌言我大聖之後而滅於宋有天下者何必夘金刀又融為九列不遵朝儀秃巾微行唐突宫掖與白衣禰衡言論放蕩衡與融交相贊揚衡謂融仲尼不死融謂衡顔淵復生諸如此𩔖辭語甚多融死之後覩粹所作無不嘉其才而畏其筆也姚崇天資權譎始為同州張説以素憾諷趙彦昭劾之及崇當國説懼潛詣岐王申欵他日朝退衆皆趨出崇曳踵為有疾狀帝詔問之對曰臣心有憂痛不在足問其故曰岐王陛下愛弟張説輔臣而密車出入王家恐為所誤故憂之於是説出相州李適之與李林甫争權不協林甫隂賊好䛕謂適之曰華山生金采之可以富國顧上未之知適之性疎信其言他日從容為帝道之帝喜以問林甫林甫對曰臣知之舊矣顧華山陛下本命王氣之舍不可穿治故不敢以聞帝以林甫為愛已而薄適之李義府貌足恭與人言嬉怡微笑而隂賊􅄶忌凡忤意者皆中傷之時號義府笑中刀盧杞以關播韋柔可制因從容言播材任宰相其儒厚可鎮浮動乃拜同平章事大政一決於杞嘗論事帝前播意不可避坐欲有所言杞目禁輒止退讓播曰以君寡言故至此奈何開口争事耶播即喑畏不敢與争李揆為盧杞所惡用為入蕃會盟使揆辭以老恐死道路不能達明命帝惻然杞曰和戎者當練達朝事非揆不可且使揆則異時年少於揆者不敢辭揆遂行至蕃酋長曰聞唐有第一人李揆公是否揆畏留因紿之曰彼李揆安肯來耶盧杞忌張鎰剛直欲去之時朱泚以盧龍卒戍鳳翔帝擇人代之杞即謬曰鳳翔將校班秩素髙非宰相信臣不可鎮撫臣宜行帝不許杞復曰陛下必以臣容貌寢陋不為三軍所信恐後生變臣不敢自謀惟陛下擇之帝乃顧鎰曰文武兼資望重内外無易卿者為朕撫盧龍士乃以中書侍郎為鳳翔隴右節度鎰知為杞隂中然辭窮因再拜受詔穆修有詩名多遊京洛有題其詩於禁中壁間者真宗一見大加賞歎問為誰詩左右以穆修對上曰有文如此公卿何不薦來時丁晉公在側從容荅曰此人行不逮文由此上不復問王冀公既以城下之盟短冦萊公於真宗真宗曰然則如何可以洗此恥冀公曰今國家欲以力服契丹所未能也契丹之性畏天而信鬼神今不若盛為符瑞引天命以自重契丹聞之庶幾不敢輕中國上疑未決因幸秘閣見杜鎬問之曰卿博達墳典所謂河圖洛書者果有之乎鎬曰此蓋聖人神道設教耳上遂決用冀公之䇿作天書等事故世言符瑞之事始於冀公成於杜鎬墨客揮犀曰杜學士鎬博聞强記凡有檢閲先戒小吏某事在某書第幾行取視無差士大夫有所著撰咨以古事無不知者雖晚學卑品亦應荅不倦時人號為杜萬卷性和易有懿行士君子推之紹聖初逐元祐黨人以水土美惡繫罪之輕重一日執政聚議至劉安世器之時􅃽穎叔云劉公平昔人推命極好章子厚以筆於昭州上㸃之曰劉待制命好且去昭州試命一巡秦丞相檜晚嵗權尤重常有數卒皂衣持梃立府門外行路過者稍顧視謦欬皆呵止之嘗病告一二日執政獨對不敢他語惟盛稱秦公勲業明日入堂忽問曰聞昨日奏事甚久執政惶恐曰某惟誦太師勲徳曠世所無語終即退實無他言秦公嘻笑曰甚感蓋已嗾言事官上章執政甫歸閣子彈章副本已至其忮刻如此語林卷二十九
