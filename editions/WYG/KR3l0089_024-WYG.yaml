body:
  text: 語林卷二十四眀何良俊撰企羡第二十二夫自賢者日損見人之賢者日益夫茍見人之賢企而望之常若不及則其進善寧有窮乎故曰好善優於天下不虛耳趙文楚拜東海相道經滎陽縣令曹暠是文楚故孝廉迎路謁候文楚不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁文楚畢辭歸范曄後漢書曰趙咨字文楚東郡燕人少孤有孝行州郡舉孝廉不就後舉有道拜東海相在官清簡計日受奉視事三年以疾自乞徵拜議郎張楷除長陵令不至官𨼆居𢎞農山中學者隨之所居成市後華隂山南遂有公超市范曄後漢書曰張楷字公超蜀郡成都人通嚴氏春秋古文尚書門徒常百人賔客慕之父黨夙儒造門車馬填街徒從無所止貴戚之家皆起舍巷次以候過客往來之利楷疾其如此輙徙避之李元禮獨持風裁以聲名自髙士有被其容接者名為登龍門郭林宗來遊京師當還鄉里送車千許乘李膺亦在焉衆人皆詣大槐客舍而別獨膺與林宗共載乘薄笨車上大槐坂觀者數百人引領望之𦕈若松喬之在霄漢庾徵君少給事縣庭郭林宗見而㧞之勸遊學宫遂為諸生傭後能講論自以卑第毎處下坐諸生博士皆就讐問由是學中以下坐為貴范曄後漢書曰􅁃乗字世遊潁川鄢陵人徵辟並不起世號徵君郭林宗聲望顯重士爭歸之載刺常盈車郭林宗嘗行陳梁間遇雨巾一角霑折二國學士著巾莫不折其一角云作林宗巾荀慈眀荀爽已見嘗就謁李元禮李膺已見因為其御既還喜曰今日乃得御李君矣孔北海孔融已見深重鄭康成鄭𤣥已見屣履造門吿髙宻縣為𤣥特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意鄭君好學實懐明徳昔太史公廷尉吳公謁者僕射鄧公皆漢名臣又南山四皓有園公夏黄公潜光𨼆耀世嘉其髙皆悉稱公然則公者仁徳之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉昔東海于公僅有一節猶戒鄉人侈其門閭矧乃鄭公之徳而無駟牡之路可廣開門衢令容髙車號為通徳門殷芸小說曰鄭𤣥在徐州孔文舉時為北海相欲其返郡敦請懇惻使人繼踵又教曰鄭公久遊南夏今艱難稍平倘有歸來之思無寓人于室毁傷其蕃􅁺林木必繕治墻宇以俟還向及歸融吿僚屬昔周人尊師謂之尚父今可咸曰鄭君不得稱名也𡊮紹一見𤣥歎曰吾本謂鄭君東州名儒今乃是天下長者夫以布衣雄世斯豈徒然哉魏文帝大重虞仲翔仲翔在呉帝令設虛坐山陽縣東北有嵇叔夜園宅後悉為墟父老猶稱嵇公竹林述征記曰山陽東北二十里魏中散大夫嵇康園宅悉為田墟時有遺竹裴國寳晉諸公賛曰裴瓉字國寳楷之子才氣爽雋終中書郎世說曰正始中人士比論以五荀方五陳八裴方八王以裴瓉方王敦是裴叔則子風神髙邁見者無不􅁱敬特為王萬子所重每從之遊晋諸公賛曰王綏字萬子辟太尉掾不就年十九卒肥晋書曰萬子有羙號而太戎令食糠而肥愈甚萬子父安豐王戎謂之曰國寳初不來汝那得數往萬子曰國寳雖不知綏綏自知國寳廣陵戴若思戴淵已見東南之羙舉秀才入洛素聞周僕射名往候之終坐而出不敢顯其才辯謝公少有羙譽時多慕愛鄉人有罷中宿縣者還詣公公問其歸資荅云有蒲葵扇五萬公乃取其中者捉之京師士庶競市價增數倍謝太傅能為洛生詠謝本有鼻疾故其音濁名流愛其詠而弗能及恒以手捉鼻為之謝叔源誅後及宋武帝受禪謝晦言曰陛下應天受命登壇日恨不得謝益夀謝混小宇奉璽紱帝亦歎曰吾甚恨之使後生不得見其風流張新安張鏡已見少與顔光禄延之鄰居顔談議飲酒喧呼不絶新安靜翳無言聲後顔於籬邉聞其與客語設胡牀坐聽辭義清𤣥顔指謂坐賔曰此中有人由此不復酣呌虞愿拜後軍將軍禇彦回詣之不值見其牀上積塵埃有書數卷彦回歎曰虞君之清乃至於此令人掃地拂牀而去南史曰虞愿字士恭㑹稽餘姚人元嘉中為湘東王國常侍明帝立以愿儒吏學涉兼蕃國舊恩除太常丞散騎常侍王仲寳作解散幘斜揷簮朝野慕之相與倣效儉常語人曰江左風流宰相唯有謝安何思澄已見終日造謁每宿豫作名紙一束曉便命駕朝賢無不悉狎所在命食有人方之婁護思澄欣然當之任中丞任昉已見欲造阮居士阮孝緒已見而不敢嘗至其兄履之許輙望而歎曰其室雖邇其人甚逺元文若姿制閑裕吐發流靡瑯琊王誦見之未嘗不心醉忘疲魏尚書右丞髙綽國子博士封軌素以方直自業宣武朝髙肇擅國肇拜司徒日綽送迎往來軌竟不詣肇綽顧視不見軌遽歸歎曰吾平生自謂不失規矩今日舉措不如封生逺矣温子昇博覽百家文章清婉梁使張臯寫温文筆𫝊於江外梁武見之歎曰曹植陸機復生北土恨我辭人數窮百六趙郡李渾嘗燕聚名輩詩酒正歡譁崔㥄後到一坐無復談話鄭伯猷歎曰身長八尺靣如刻畫謦欬作洪鍾胷中貯千卷書使人那得不畏李神雋晚年無子見崔瞻才學風流為後來之秀語邢邵曰昨見崔㥄兒便為後生第一我遂無此物使人傷懐韋敬逺志在放逸不干世務薛仁友裕慕其恬静數載酒候之談宴終日薛嘗謂親友曰大丈夫當聖明之運而無灼然文武之用為世所稱雖復恓恓惶惶徒為勞耳至如韋處士退不丘壑進不市朝怡然守道榮辱不及何其樂也仲長子光𨼆居北渚凡三十年非其力不食王無功愛其貞素徙與相近歐陽率更行見古碑張懐瓘書斷曰歐陽詢字信本長沙汨羅人官至太子率更令善書筆力勁險體尤妙髙麗國王愛其書遣使請焉神堯曰不意詢之書名逺播海外是索靖所書羊愔能書人姓名曰燉煌索靖字㓜安張芝姊之孫官至征南司馬善草書駐馬觀之良久而去數百步復還下馬佇立疲倦則布毯坐觀因宿其下三日乃去閻立本善畫朱景𤣥唐朝名畫録曰閻立本太宗朝官宰相畫入神品與兄立徳齊名於世至荆州見張僧繇舊迹曰定虛得名耳明日又往曰猶近代佳手明日又往曰名下定無虛士因坐卧觀之留宿其下宣和畫譜曰張僧繇吳人天監中官右將軍以丹青馳譽于時嘗於金陵安樂寺畫四龍不㸃目睛謂㸃之則驤騰而去人以為誕固請㸃之因為落墨纔及二龍果雷電破壁徐視畫已失矣獨二龍未㸃睛者在焉世謂僧繇畫骨氣奇偉規模宏逸六法精備當與顧陸並馳爭光崔湜執政時年三十六嘗暮出端門下天津橋馬上賦詩曰春還上林苑花滿洛陽城張說見之歎曰文與位固可致其年不可及也崔湜甚重陸象先太平公主謀引崔為相崔曰陸𧰼先人望宜幹樞近若不爾者湜敢辭主為言之遂並知政事倪若水為汴州刺史時班景倩入為大理少卿倪設餞于路因語之曰班生此行何異登仙蘇司業每謂當時名士曰僕不幸生於衰俗所不耻者識元紫芝元徳秀已見國杜工部集曰蘇源明天寳中守東平召為子司業禄山陷京師源明以病不受偽官肅宗復兩京權考功郎中知制誥殷直清達於名理摭言曰殷寅字直清陳郡人自恨言理少對以未嘗面劉慎虚嘗想見其人張嘉貞為相閱堂按見宋璟危言切議未嘗不失聲歎息蕭頴士嚴酷異常有一僕事之十餘年頴士每加箠楚輙百餘不堪其苦人或激之使去其僕曰我非不能他從所以遲留者特愛慕其博奥耳李冗獨異志曰頴士常使一傭僕名杜亮獨孤郁是權相壻歴掌綸誥有羙名憲宗常歎曰我女壻不如徳輿女壻秦系客泉州南安有九日山系結廬其上系亡後南安人猶思之為立小亭號其山為髙士峯叚文昌有別業在廣都縣之南龍華山嘗杜門力學於此俗稱之為叚公讀書臺杜舍人弱冠成名制策登科名振京邑嘗與同輩城南遊覽至一寺有禪僧擁褐獨坐與之語𤣥言妙㫖咸出意表問杜姓字又問􅁱何業傍人以累㨗誇之顧而笑曰皆不知也杜歎訝因題詩曰家在城南杜曲傍兩枝仙桂一時芳禪師都未知名姓始覺空門意味長劉昫唐書曰杜牧字牧之司徒佑之孫好讀書攻詩為文常自負經緯才畧為湖州刺史入拜中書舍人文宗常戚戚不樂一日幸三殿東亭見横廊架巨軸上指謂畫工程􅁱已曰此開元東封圖也命内臣懸於東廡下上舉玉如意指張說輩歎曰使吾得其中一人則可見開元之理冦萊公出入宰相三十年不營私第處士魏野贈詩曰有官居鼎鼐無地起樓臺暨萊公南遷時北使至内宴宰執使者與坐歴視諸相語譯者曰孰是無地起樓臺相公王聖塗澠水燕談録曰陜右處士魏野與蒲中李瀆俱有髙節以吟詠相善野於東郊鑿土室方丈䕃以􅁱竹泉流其前曰樂天洞范文正貶饒州朝廷方治朋黨士大夫莫敢往别王待制獨扶病餞於國門大臣責之曰君何自䧟朋黨王曰范公天下賢者質何敢望之若得為范公黨人公之賜質厚矣聞者歎服東都事略曰王質字子野旦猶子也以䕃補太常寺太祝知荆南府為政有惠愛召為史館􅁱撰拜天章閣待制黄魯直晚年懸東坡像於室中每早衣冠薦香肅揖甚敬或以同時聲名相上下為問則離席驚避曰庭堅望蘇公門弟子耳安敢失其序紹聖中用蔡京之請置元祐黨籍刻石禁中時尚書省國子監亦有石刻國子監有無名子以朱大題其碑上曰千佛名經東坡自海外歸毘陵病暑著小冠披半臂坐船中夾運河千萬人隨觀之坡顧語坐客曰莫看殺我否陳無已已見與晁以道俱學文於曾子固無已晚得詩法於黄魯直他日二人論文以道曰吾曹不可負曾南豐既而論詩無已曰吾此一瓣香須為山谷道人燒也昭徳先生郡齋讀書志曰晁說之字以道文元公𤣥孫少慕司馬温公為人自號景迂生年未三十蘇子瞻以著述科薦之紹聖中除中書舍人以論不合去國唐侍御以論錢尚書去國同朝送之館學為空孝宗知之歎曰遂為唐氏百年口實周公瑾癸辛雜識曰唐仲友之父侍御堯封孝廟時以禮部侍郎除副端有直聲嘗論錢尚書左遷小龍施聖與嘗使金親王至不肯退班一時稱其有守後金使至闕問館伴云師㸃今居何官館伴宇文价於班列中指聖與示之金使恍然曰一見正人令人眼明宋史曰施師㸃字聖與上饒人弱冠遊太學司業髙宏稱其文深醇有古風官給事中假學士使金致命金廷立班既定相儀者以親王至命師㸃退位師㸃屹立相儀者請數四師㸃正色曰班立已定尚欲何為不肯少動在廷相顧駭愕不敢復以為請使還有言其事於上上嘉歎不已承暉生自富貴居家頗𩔖寒素常置司馬光蘇軾像於書室曰吾師司馬而友蘇公金史日承暉字維明好學淹貫經史五經皆經師授謹守力行不為虚文累官中都留守元兵至中都失守仰藥而死趙文敏公趙孟頫已見以程鉅夫薦起家為郎及鉅夫為學士承㫖求致仕去文敏代之先往拜其門而後入院時人以為衣冠盛事寵禮第二十三何良俊曰今郡縣不請士宰相不俛眉之日久矣昔孔子當春秋問齊魯陳衛之君聘問接轍其道雖不得大行然不可謂不知之也世猶悲其不遇使生於今之世茍非守章句擢甲科曽不得與士之最下者齒安望其若此哉三代之風逖哉邈矣東漢猶有徒見二千石不如一逢掖之言或者東漢去古未逺夫以秦檜之當國猶能優一陸士規時宋室雖季非無多聞懿實之士柰何其所禮者特文華浮競之徒卒之挾勢黷賄而後之不欲下士者遂為口實夫天道下濟而光明上不下交世漸否塞徒使有志之士憤嘅盈襟嗚呼斯豈特在上者之過哉趙元叔舉郡上計到都華嶠後漢書曰趙壹字元叔漢陽西縣人體貎魁梧身長九尺羙須豪眉望之甚偉恃才倨傲為鄉里所擯後屢抵罪幾至死友人救得免乃作刺世疾邪賦以舒其怨憤曰伊五帝之不同禮三王亦又不同樂數極自然變化非是故相反駮徳政不能救世溷亂賞罰豈足懲時清濁春秋時禍敗之始戰國愈復増其荼毒秦漢無以相踰越乃更加其怨酷寧計生民之命唯利已而自足于兹迄今情偽萬方佞謟日熾剛克消亡䑛痔結駟正色徒行嫗􅯭名勢撫拍豪强偃蹇反俗立致咎殃㨗懾逐物日富月昌渾然同惑孰温孰涼邪夫顯進直士幽蔵原斯瘼之攸興實執政之匪賢女謁掩其視聽兮近習秉其威權所好則鑚皮出其毛羽所惡則洗垢求其瘢痕雖欲竭誠而盡忠路絶嶮而靡縁九重既不可啟又群吠之狺狺安危亡於旦夕肆嗜慾於目前奚異涉海之失柂積薪而待燃榮納由於閃榆孰知辨其蚩妍故法禁屈撓於勢族恩澤不逮於單門寧饑寒於堯舜之荒歳兮不飽暖於當今之豐年秉理雖死而非亡違義雖生而匪存有秦客者乃為詩曰河清不可俟人命不可延順風激靡草富貴者稱賢文籍雖滿腹不如一囊錢伊憂北堂上抗髒倚門邊魯生聞此辭繫而作歌曰勢家多所宜咳唾自成珠被褐懐金玉蘭􅈍化為芻賢者雖獨悟所困在群愚且各守爾分勿復空馳驅哀哉復哀哉此是命矣夫時司徒𡊮逢受計范曄後漢書曰𡊮逢字周陽曽祖安祖京父湯累世三公而逢以寛厚篤信著稱於時官至司空卒計吏數百皆拜伏庭中莫敢仰視趙獨長揖逢望而異之令左右讓之曰下郡計吏而揖三公何也趙曰昔酈食其長揖漢王今揖三公何遽怪哉逢歛袵下堂延置上坐顧語坐客曰此漢陽趙元叔也朝臣莫有過之者吾請為諸君分坐皇甫度遼解官歸鄉范曄後漢書曰皇甫規字威明安定朝那人官度遼將軍與太常張奐然明太尉叚熲紀明並知名顯達稱為涼州三明時有以貨得鴈門太守者書刺投謁度遼卧不時起既入見問卿前在郡食鴈羙乎有頃白王節信在門度遼驚據而起衣不及帶屣履出迎援手入坐極歡而别時人為之語曰徒見二千石不如一逢掖范曄後漢書曰王符字節信安定臨涇人少好學與馬融竇章張衡崔瑗友善安和之後世務游宦更相薦引符獨耿介不同於俗以此不得升進志意藴憤𨼆居著書三十餘篇名潜夫論李元禮恒以疾不送迎賔客積二十日乃一通客惟陳仲􅃓來輙乘輿出門迎之禰正平年未及冠而孔文舉已踰五十相與為爾汝交張隲文士傳曰禰衡有逸才少與孔融交時衡未滿二十而融已五十敬衡才秀忘年殷勤邴根矩邴原已見在魏為東閣祭酒太祖北伐三郡還住昌國宴士大夫酒酣太祖曰孤反鄴中諸君必來迎今日明旦度皆至其不來者獨有邴祭酒耳頃之而根矩先到門下通謁太祖大驚喜擥履而起迎謂根矩曰賢者誠難測度孤謂君將不能來乃逺自降屈誠副饑渇之懐王仲宣初入長安蔡中郎見而奇之時蔡才學顯著貴重朝廷常車騎填巷賔客盈座聞仲宣在門倒屣迎之仲宣至年既幼弱容狀短小一坐盡驚蔡曰此王公孫有異才吾不如也吾家書籍文章盡當與之魏志曰王粲字仲宣山陽髙平人曽祖龔祖暢父謙皆有名漢世粲避亂依荆州劉表表以粲貎寢而體弱通侻不甚重也表卒勸表子琮歸太祖太祖辟為丞相掾卿典畧曰粲才既髙辯論應機鍾繇王朗等雖各為魏相至於朝廷奏議皆閣筆不能措手劉南郡劉肇貽王濬沖筒中細布五十端為司隷所糾以知而未納故得不坐然議者猶少之帝謂諸人曰以戎之為行豈懐私茍得者正當不欲為異耳謝㓜輿為王大將軍長史謝鯤已見王平子時在敦坐見㓜輿清談無倦唯歎謝長史可與言都不盼敦王孝孫初為護軍府兵士晋書曰王尼字仲孫城陽人本兵家子寓居洛陽卓犖不羈初入洛詣東海王越不拜越問其故尼曰公無宰相之能是以不拜因數之言甚切時泰山胡母彦國與瑯琊王澄北地傅暢中山劉輿潁川荀􅃉河東裴遐五人並已見善晋陽秋曰劉輿字慶孫中山人有豪俠才筭交結為范陽王虓所暱虓薨太傅召之大相委仗用為長史共齎羊酒詣門邀孝孫門吏疏名呈護軍護軍驚曰諸名士何得持羊酒來孝孫時以給府中養馬諸人入就馬廄下與孝孫炙羊飲酒醉飽而去竟不見護軍護軍大驚即與孝孫長假王丞相常懸一麈尾著帳中後殷中軍來乃取之與中軍曰今以遺汝眀帝嘗引紀思逺於廣室慨然憂天下言社稷之臣欲無復十人如何因屈指曰君便其一紀議擬辭避帝曰方欲與君善語復何事謙挹晋書曰紀瞻字思逺丹陽秣陵人祖亮呉尚書令瞻少以方直知名才兼文武朝廷稱其忠亮雅正以久病去官不聽加散騎常侍王敦作逆帝使謂之曰卿雖病但為朕卧䕶六軍所益多矣桓宣武取羅君章羅含已見為别駕以􅅟寺喧雜非靜默所居乃於城西小洲上更立茅屋竹果䕃宇伐木為牀織葦為席布衣蔬食宴若有餘謝萬與太傅共詣簡文萬來無衣幘可前簡文曰但前不須衣幘即呼使入萬著白綸巾鶴氅裘履板而前共談移日王仲祖病劉真長為稱藥荀令則為量水荀令則為征北將軍禇公禇裒長史既到禇公謂叅佐曰荀生資逸群之氣將有沖天之舉諸君宜善事之王東亭當之吳郡就汰公道人宿别晡許府家往瓦棺寺設幔屋竟一寺東亭至汰公為設豆藿糜汰公自啖一大塸東亭難汰公遂强進半甌須臾東亭行帳設名飲食果炙畢備汰公都無所噉王敬仁有異才時賢皆重之王􅁱已見王右軍在郡迎敬仁叔仁輙同車常惡其遲後以馬迎敬仁雖風雨亦不以車也周祗隆安記曰王藴字叔仁小字阿興父濛司徒左長史風流標望藴為鎮軍將軍亦得世譽王甲從北來詣謝公公問北方何果最勝甲云桑椹最好公問可比江東何果甲云是黄柑之流公曰君乃爾妄語甲不欲受妄語之名乃買駿馬候熟時馳取數十枚奉公公食之以為羙語甲曰此味乃江東所無君何近比黄柑即引甲為賔客車武子與呉𨼆之已見皆以寒素博學知名武子又善於賞㑹當時每有盛坐而武子不在皆云無車公不樂謝公游集之日常設席待之續晋陽秋曰車𦙍字武子南平人父育郡主簿𦙍少為王胡之所知及長風姿羙劭幾悟敏率桓温在荆州取為從事一嵗至治中蕭思話從太祖登鍾山北嶺中道有磐石清泉上使於石上彈琴因賜以酒謂曰相賞有松石間意沈約宋書曰蕭思話南籣陵人孝懿皇后弟子也涉獵書𫝊能隷書解音律便􅃓馬官至鎮西將軍宋太祖嘗曰人仕宦非唯須才然亦須運命每有好官缺我未嘗不先憶羊𤣥保羊𤣥保善奕棋棋品第三太祖與賭郡戲勝以𥙷宣城太守王髙麗年十四五時四月八日在彭城佛寺中戲謝混一見以㯽榔贈之執王手語曰王郎謝叔源可與周旋否羊敬元嘗詣謝領軍混謝拂席改服然後見之時康樂在坐退吿宣逺曰望蔡謝混襲封望蔡侯見羊欣遂易衣改席由此益知名廬陵王義真聰眀愛文義而輕動無徳業與陳郡謝靈運瑯琊顔延之沙門慧琳𢎞明集何承天曰冶城慧琳道人作白黒論並周旋異常都督徐羡之嫌其暱狎過甚嘗使范晏從容戒之義真曰靈運空疎延之隘薄魏文帝云鮮能以名節自立者但性情所得未能忘言於悟賞故與之遊耳王蒨玉王球已見除尚書僕射素有脚疾常還家卧不時入直江夏王義恭啓宋文帝曰王球誠有素譽頗以物外自許端任要切或非所長帝曰誠知如此要是時望所歸昔周伯仁終日飲酒而居此職蓋所以崇素徳也遂見優容後以白衣領職新安王子鸞豫章王子尚嘗詣曇濟道人於八公山道人設茶茗子尚味之曰此甘露也何云茶茗焉王僕射王儉已見髙自標位嘗自比漢李膺時人呼儉府為入芙蓉池嘗用庾杲之為衛軍長史謂人曰昔𡊮公作衛軍欲用我為長史雖不獲就要是意向如此今亦應須我輩人也柳惔與兄恱小時齊名王僕射一日造世隆宅世隆謂為詣已及至門唯求恱與惔遣謂世隆曰賢子俱有盛才一日見顧今故報禮若仍相造似非本意恐年少窺人南史曰柳世隆長子恱字文殊少有清致位中書郎次子惔字文通好學工文尤曉音律少與兄恱齊名仕至尚書左僕射范尚書范雲已見大武帝十三嵗嘗侍宴帝謂臨川鄱陽王曰南史曰臨川名宏鄱陽名恢武帝二弟也我與范尚書少便親善申四海之敬今為天下主此禮遂革汝宜代我呼范為兄二王下席拜與雲同車還省孔休源為晋安王長史梁書曰孔休源字慶緒㑹稽人晋尚書沖八世孫沖即愉之世父休源從沈麟士受經梁臺建與劉之遴同為太學博士當時以為羙𨕖後為晋安王長史加金紫光禄大夫王深相倚仗嘗於齋中别施一榻云此是孔長史坐續世說曰昭明太子亡後召休源入宴居殿與群公㕘定謀議立晋安王為太子公卿珥貂挿筆奏決於休源前休源怡然無愧時人名為兼天子孔休源來都寓止少府孔登舍范侍中雲到少府登謂詣已拂筵整帶備水陸之品范停箸命休源休源命取其常膳正有赤倉米飯蒸鮑魚范食休源食都不舉主人之饌髙談竟日同載還家陶貞白𨼆茅山武帝每有征討大事輙先以咨訪月中常有數信時人謂為山中宰相到溉山池有奇礓石長一丈六尺梁武賭得之即迎置華林宴居殿前移石三日都下傾城縱觀時謂之到公石盧辨素重㓂雋待以師友之禮每閑暇輙詣雋燕語彌日恒云不見西安君煩憂不遣後周冦雋明帝與之同席而坐顧問洛陽故事雋身長八尺鬚􅁂皓然容止端詳音韻清朗帝不覺屢為之前膝及雋辭還帝親執其手曰公年徳俱尊朕所欽向乞言之事所望於公宜數相見以慰虚想即以御輿令於帝前乘出高熲在隋文帝朝任寄隆重當時莫比隋書曰髙熲字昭𤣥渤海蓨人明敏有器局隋文帝知熲習兵事用為府司録及受禪拜尚書左僕射封渤海郡公呼為獨孤而不名北史曰熲父賔仕東魏大統中棄官奔西魏獨孤信引為僚佐賜姓獨孤氏帝嘗語之曰伐陳之役人云公反朕已斬之君臣道合非青蠅可間也將軍盧賁等前後短熲於帝皆被疎絀因謂熲曰獨孤猶鏡也每被磨瑩皎然益明李徳林毎賛平陳之計隋髙祖以馬鞭南指曰待平陳之後㑹以七寳莊嚴公張沛在同州時任正名為録事劉幽求為朝邑尉沛奴下諸官而獨呼二公為劉大任大若平常之交張嘉貞免歸鄉里御史張循憲採訪河東薦嘉貞材堪憲官則天召見垂簾與之語嘉貞奏曰臣以草萊得謁九重是千載一遇只尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令捲簾中宗於立春日内出綵花賜近臣時武平一應制詩最羙中宗云平一年雖最少文甚警新恱紅蕋之先開訝黄鶯之未囀循還吟咀賞歎兼懐今更賜花一枝以彰其羙所賜學士花令揷頭上平一左右交揷因舞蹈拜謝時崔日用乘酣飲欲奪平一所賜花上於簾下見之謂平一曰日用何為奪卿花平一跪奏曰讀書萬卷從日用滿口虚張賜花一枝學平一終身不獲上及侍臣大笑因更賜酒一杯當時歎羙唐詩紀事曰武平一名甄以字行武后時畏禍𨼆嵩山中宗雖宴豫常因詩規戒然不能卓然自引去明皇時終亦被謫雖謫而名不衰眀皇在便殿甚思姚元崇論時務時七月十五日苦雨不止泥濘盈尺上令待制者擡步輦召學士來時元崇為翰長中外榮之肅宗夜坐地爐燒二梨以賜李泌潁王恃恩固求上不許曰汝飽食肉先生絶粒何乃爭耶李鄴侯家𫝊曰時諸王請聫句潁王曰先生年幾許顔色似童兒信王曰夜枕九仙骨朝披一品衣益王曰不食千鍾粟惟飡兩顆棃上曰天生此間氣助我化無為蕭茂挺父旻以莒丞抵罪隷士往訴於府佐張惟一惟一曰旻有佳兒吾以旻獲譴不憾乃平宥之楊綰在代宗朝恩遇甚厚綰時有疾毎引見延英特許扶入綰亡後帝語侍臣曰天不使朕致太平何奪我楊綰之速徳宗狩山南道路險澁與從官相失夜召陸贄不得帝驚且泣詔軍中得贄者賞千金久之上謁帝喜見顔間太子以下皆賀韋綬在翰林劉昫唐書曰韋綬徳宗朝為翰林學士貞元之政多㕘決於内署綬所議多合中道然畏慎致傷晚多心疾故不極其用徳宗嘗至其院韋妃從幸㑹綬方寢學士鄭絪欲馳吿之帝不許時適大寒帝以妃蜀纈袍覆而去唐詩紀事曰鄭絪字文明善屬文所交皆天下名士憲宗初拜相四年罷絪守道寡欲所居不為烜赫事以篤實稱白尚書姬人樊素善歌小蠻善舞年既髙邁而小蠻方豐艷因為楊柳詞以託意曰一樹春風萬萬枝嫰於金色軟於絲永豐坊裡東南角盡日無人屬阿誰及宣宗朝國樂唱是詞上問誰詞永豐在何處左右具以對遂因東使命取永豐柳兩枝植於禁中摭言曰白樂天去世大中皇帝以詩弔之曰綴玉聨珠六十年誰教㝠路作詩仙浮雲不繫名居易造化無為字樂天童子解吟長恨曲胡兒能唱琵琶篇文章已滿行人耳一度思卿一愴然牛奇章帥維揚日杜牧在幕中杜夜間微服狎遊公以街子數輩潜隨以防不虞後杜以拾遺召公以縱逸為戒杜始𨼆諱公取一篋示杜皆街子輩報帖言杜書記平善柳公綽在山南時牛僧孺罷相鎮江夏公綽具戎容於郵舍候之軍吏以漢上地髙於鄂疑公綽禮太過公綽曰奇章纔離台席方鎮重宰相是尊朝廷也竟以戎容見之令狐綯在翰林日夜對禁中帝命以乘輿金蓮華炬送還院吏望見以為天子來俄𫝊呼曰學士歸院和魯公梁貞眀三年在薛廷珪下第十三人及第後魯公知舉獨愛范魯公質文語范曰君文合在第一輙屈居第十三人用𫝊老夫衣鉢時以為榮五代史記曰和凝字成績鄆州須昌人累遷翰林學士知貢舉所取皆一時之秀漢髙祖時拜太子太傅封魯國公唐故事知貢舉者所放進士以已及第時名次為重凝舉進士時第五後知舉𨕖范質為第五質位至宰相封魯公皆與凝同當時以為榮王元之謫黄州日時蘇易簡知舉適放榜易簡奏曰禹偁翰苑名儒今乞以全榜諸生送於郊外上從其請錢文僖維演守西都謝希深歐陽永叔同在幕下一日游嵩山自潁陽歸暮抵龍門香山俄而雪作登石樓望都城各有所懐忽於烟靄中有車馬渡伊水來既至則文僖遣厨傳歌妓至𫝊公語曰山行良佳少留龍門賞雪無遽歸也其髙曠愛才如此周煇清波雜志曰思公既貶漢東王文康公曙代為留守一日訝幕客多遊責曰君等自比冦萊公何如萊公尚坐奢縱取禍况其下者衆不敢對永叔取手板起立曰萊公之禍不在杯酒在老不知退耳時文康年已髙為之動四座偉之范蜀公鎮毎對客尊嚴靜重言有條理客亦不敢慢易獨敬重蘇子瞻子瞻來則掀髯鼓掌旁若無人陸士規布衣工詩秦檜喜之嘗挾秦書干臨川守餽遺不滿意升堂嫚罵守懼以書白秦自解秦怒陸甚陸請見不出然猶令其子小相見之問其近作陸誦其黄陵廟一絶云東風吹草綠離離路入黄陵古廟西帝子不知春又去亂山無主鷓鴣啼小相入誦之秦吟賞再四即命請見待之如初元仁宗拜趙文敏為學士承㫖眷之甚厚常呼其字而不名有人言國史所載不宜使趙孟頫知帝曰趙子昂世祖皇帝所簡㧞朕優以禮貎置在館閣典司述作𫝊之後世此屬呶呶何也俄賜鈔五百錠語侍臣曰中書每言國用不足必持而不與其以普慶寺别貯鈔給之趙承㫖或累月不至官帝以問左右皆謂其年老畏寒帝特敕御府賜貂䑕裘傷逝二十四夫死生去來特旦暮耳而昔人傷之無乃幾於怛化耶杜輔𤣥有言共隂而息尚有將别之悲竆轍以遊亦興中途之歎况情之所鍾正在我輩往而不返能無傷乎若氣機迴環逝川不息固當知之濠上耳龔勝死漢書曰龔勝字君賔楚人王莽徵之不食而死楚父老來弔哭甚哀既而歎曰薰以香自燒膏以眀自煎嗟哉龔生竟天天年非吾徒也徐州先賢𫝊曰楚老者彭城之𨼆人也范巨卿謝承後漢書曰范式字巨卿山陽金鄉人一名汜少尚節義游學京師同業有長沙陳平子與式未相見被病將亡謂其妻曰范巨卿烈士可託死吾殁後以尸埋巨卿户前裂素為書以遺巨卿時式出行適還省書愴然向墳揖哭以為死友營䕶平子妻兒身自送䘮於臨湘未至四五里委素書於柩上哭别而去其兄弟尋求不復見與張元伯為友范曄後漢書曰張劭字元伯汝南人與范巨卿交二人吿歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉共剋期日後期至元伯具以白母請設􅄿候之母曰千里結言爾何相信之審耶對曰巨卿信士必不乖違母曰若然當為爾醖酒至日巨卿果到升堂拜飲盡歡而別後元伯寢疾同郡郅君章殷子徵晨夜省視元伯臨盡歎曰恨不見吾死友子徵曰吾與君章盡心於子是非死友復欲誰求元伯曰若二子者吾生友耳山陽范巨卿所謂死友也元伯尋卒范忽夢見元伯𤣥冕垂纓屣履而呼曰巨卿吾以某日死當以爾時𦵏永歸黄泉子未我忘豈能相及范恍然覺寤悲歎泣下范時為郡功曹具吿太守請往奔䘮便具服投其𦵏日范未及到而䘮已發引柩不肯前其母撫之曰元伯豈有望耶遂停移時見有素車白馬號哭而來其母云是必范巨卿也巨卿既至叩棺言曰行矣元伯死生異路永從此辭㑹𦵏千人皆為揮涕范執紼引柩䘮乃得前陳蕃竇武為中官所害郭林宗哭之于野慟既而歎曰人之云亡邦國殄瘁瞻烏爰止不知于誰之屋徐孺子徐穉已見前後為群公所辟雖不就有死䘮萬里赴弔常預炙雞一隻以一兩綿漬酒日中曝乾以裹雞徑到所赴冡隧外以水漬綿使有酒氣升米飯白茅為籍以雞置前啜酒畢留謁即去不見䘮主皇甫謐髙士𫝊曰徐穉仁讓聞於天下黄瓊辟公府不詣黄死穉負笈徒步三千里到瓊墓致酹蔡中郎死縉紳諸儒莫不流涕鄭康成鄭𤣥已見聞而歎曰漢世之事誰與正之孔北海孔融已見與蔡中郎蔡邕已見素厚中郎亡後有虎賁士貎𩔖於蔡北海每酒後引與共坐曰雖無老成人尚有典刑魏文帝曹丕已見愛楊徳祖楊修已見才羙徳祖誅後帝追憶之徳祖嘗以寳劒與文帝帝後佩之吿左右曰此楊修劒也樓𤣥到廣州宻求虞仲翔故宅處徘徊躑躅哀歎悽愴不能自勝陸士衡士龍與弟躭同時遇害㕘軍孫恵歎曰不意三陸相携亂朝一朝湮滅道業淪䘮痛酷之深荼毒難言國䘮雋望悲豈一人其為州里悼痛如此潘安仁與石季倫同刑東市石謂潘曰天下殺英雄卿復何為爾潘曰俊士填溝壑餘波來及人衛洗馬亡謝幼輿哭之慟曰棟梁折矣何得不哀荀中郎亡後荀羡已見八晋中興書曰荀令則鎮淮隂時年二十中興方伯未有如羡之少者石季龍死胡中人亂羡移鎮下邳撫納降附甚得衆心卒年三十八穆帝歎曰荀令則王敬和晋中興書曰王洽字敬和丞相導第三子累遷呉郡内史為士民所懐徵拜中領軍尋加中書令年二十六卒相繼凋落股肱腹心將復誰寄王東亭亡後桓敬道與㑹稽王道子書曰元琳神情朗悟經史明徹風流之羙公私所寄忽爾䘮失歎悼之深豈惟風流相悼而已王文度與竺法師友善髙逸沙門𫝊曰竺法深不知其俗姓蓋衣冠之𦙍道徽髙扇譽播山東值永嘉亂投迹揚土居止京邑内持法綱外允具瞻𢎞道法師也以業慈清淨而不耐風塵考室剡東二百里􅢐山同遊十餘人髙棲浩然支道林宗其風範與髙麗道人書稱其徳行年七十九終于山中每共論幽明報應便要先死者當報其事後經年王忽見法師來云貧道已死罪福皆不虚唯當勤􅁱道徳以升濟神眀耳言訖不見王亦尋没羊曇少為謝太傅所知晋書曰羊曇者泰山人知名士也為謝公所愛重太傅亡後羊輟樂彌年行不由西州路嘗因石頭大醉扶路唱樂不覺至州門左右白曰此西州門羊悲感不已以馬策叩扉詠曹子建詩曰生存華屋處零落歸山丘慟哭而去范蔚宗謀逆被繫上有白團扇甚佳送曄令出詩賦羙句曄攬筆書曰去白日之昭昭襲長夜之悠悠上為循覽悽然沈約宋書曰范曄字蔚宗順陽人也少好學為髙祖相國掾稍遷太子詹事坐謀反誅宗少文宗炳已見妻羅亦有髙情與少文協趣羅亡後少文哀之過甚既而輟哭尋理悲情頓釋謂沙門慧堅曰死生之分未易可達三復至教方能遣哀王曇首亡文帝臨慟歎曰王詹事所疾不救國之衰也中書舍人周﨣侍側曰王家欲衰賢者先殞帝曰直是我家衰耳張思曼亡後從弟融齎酒於靈前酌酒慟哭曰阿兄風流頓盡齊豫章王亡梁武哀痛敕王元長融為銘王作銘曰半岳摧峰中河墜月帝流涕曰此正吾所欲言劉孝陵為太子中庶子俄而病卒南史曰劉遵字孝陵彭城安上里人祖勔贈司空父悛散騎常侍孝陵清雅有學行工屬文仕至太子中庶子太子與其從兄孝儀令曰賢從弟中庶孝友淳深立身貞固内含玉潤外表瀾清言行相符終始如一文史該富琬琰為心辭章辨博𤣥黄成采既以鳴謙表性又以難進自居益者三友此實其人及𢎞道下邑未申善政而能使人結去思野多馴翟此亦威鳳一羽足以驗其五徳南史曰劉潜字孝儀祖勔父繪孝儀㓜孤與諸兄弟相朂以學並工屬文孝綽嘗曰三筆六詩三即孝儀六即孝威也王威明王規已見亡後昭明與湘東王書曰王威明風韻遒正神峰標映千里絶迹百尺無枝實俊人也一爾過隙永歸長夜金刀掩鋩長淮絶涸去歲冬中已傷劉子今兹寒孟復悼王生俱往之傷信非虚說梁書曰蕭繹字世誠封湘東王後即大位為世祖孝元皇帝到長史亡昭明與晋安王令曰明北兖到長史遂相係凋落傷怛悲惋不能已已去嵗陸太常殂殁今兹二賢長謝陸生資忠履貞冰清玉潔文該四始學遍九流髙情勝氣貞然直上明公儒學稽古淳厚篤誠立身行道始終如一儻值夫子必升孔堂到子風神開爽文義可觀當官莅事介然無私皆海内之俊乂東序之秘寳此之嗟惜更復何論但遊處周旋並淹歲序造膝忠規豈可勝說幸免祗悔實二三子之力談對如昨音言在耳零落相仍皆成異物每一念至何時可言天下之寳理當惻愴近張新安乂致物故其人文筆𢎞雅亦足嗟惜隨弟府朝東西日久尤當傷懐也人物零落特可傷惋屬有今信乃復及之梁書曰蕭綱字世纉昭明母弟也封晋安王後即大位為太宗簡文皇帝梁簡文為侯景幽縶題壁自叙云有梁正士蘭陵蕭世纉立身行道終始如一風雨如晦雞鳴不已弗欺暗室豈况三光數至於此命也如何三國典畧曰簡文為侯景所幽作連珠曰吾聞道行則五福俱凑運閉則六極所鍾是以麟出而悲豈唯孔子途窮則慟寧止嗣宗孫右軍孫璉已見亡後江總為其誌銘後主又題銘後四十字遣左民尚書蔡徵宣敕就宅鐫之其詞曰秋風動竹烟水驚波幾人樵徑何處山阿今時日月宿昔綺羅天長路逺地久雲多功臣未勒此意如何時論咸以為榮崔浩誅後眭夸為之素服受鄉人弔喭歎曰崔公既死誰能更容眭夸咸陽王窮極驕奢姬妾數十意尚不已後以叛誅宫人為之歌曰可憐咸陽王奈何作事悞金牀玉几不能眠夜蹋霜與露洛水湛湛彌岸長行人那得渡其歌流𫝊江表北人在南者雖至富貴弦歌奏之莫不灑泣北史曰咸陽王禧魏獻文皇帝子也盧元明與潁川王由友善忽夜夢由擕酒就之言别賦詩及明憶其十字云自兹一去後朝市不復遊元明歎曰由性不狎俗旅寄人間乃今有夢又復如此必有他故經三日果聞由為亂兵所害夏侯夬好酒北史曰夏侯夬字元廷魏驃騎將軍道遷子也性好酒與南人辛諶庾遵江文遥終日遊聚酣飲之際恒相謂曰人生局促何殊朝露坐上相看先後之間耳脫有先亡者當於良辰羙景靈前飲燕倘或有知庶共為樂及夬亡後三月上已諸人相率至夬靈前酌酒爾日天隂室中微闇咸見夬在坐衣服形容不異平昔時執杯酒似若獻酬但無語耳裴伯茂嗜酒疎傲以傷性致殞殯於家園友人常景李渾王元景盧元明魏季景李騫等十許人於墓旁致酒設祭哀哭涕泣一飲一酬曰裴中書魂而有靈知吾曹也乃各賦詩一篇李騫以魏收亦與之友寄以示收收時在晋陽乃同其作論叙伯茂云臨風想𤣥度對酒思公榮時人以伯茂性誕傲謂收詩頗得事實北史曰裴伯茂河東聞喜人魏冀州刺史徽之後也學涉群書文藻富贍釋褐奉朝請後為廣平王文學加中軍大將軍柳匡道博涉群書辭彩雅贍與𢎞農楊素友善栁卒素誄之曰山陽王弼風流長逝潁川荀粲零落無時􅁱竹夾池永絶梁園之賜長楊映沼無復洛川之文其為士友痛惜如此北史曰柳𢎞字匡道河東解人少聰頴工草隷辭彩雅贍與𢎞農楊素為莫逆交除内史上士唐太宗語房梁公房𤣥齡已見曰以銅為鏡可正衣冠以古為鏡可知興替以人為鏡可明得失朕嘗寳此三鏡用防己過今魏徵殂逝遂亡一鏡矣杜如晦亡後帝嘗賜房𤣥齡黄銀帶語之曰昔如晦與公同輔朕今獨見公因泫然流淚曰世𫝊黄銀鬼神所畏更取金帶遣𤣥齡送其家岑文本從太宗伐遼至幽州卒太宗撫之流涕其夕聞警鼓之聲曰文本殞逝情深惻怛今宵夜警所不忍聞命停之元魯山亡族弟道州元結已見哭之至慟或曰子哭無乃過哀道州曰若知禮之過而不知情之至朱梁末帝唐莊宗納其妃郭氏許收葬末帝殷鵬作誌文警句云七月有期不見望陵之妾九疑無色空餘泣竹之妃聞者為之悽然雷宣徽頗涉道書因讀史廢書流涕曰功名者貪夫之鈎餌横戈開邉枝劒討叛死生食息之不顧及其死也一棺戢身萬事都已悲夫東都事畧曰雷有終同州郃陽人殿中御史徳驤子也以父任為萊蕪尉有平賊功授保信軍留後契丹入冦真宗幸澶淵有終赴援威聲甚震召拜宣徽北院使江鄰幾云宋史曰江休復字鄰幾開封陳留人强學博覽為文淳雅尤善於詩喜琴奕飲酒不以聲利為意為藍田尉騎驢之官每據鞍讀書至迷失道嘗獻所著書召試集賢校理與蘇舜欽遊坐預進奏院祠神㑹落職監蔡州商稅胡翼之凶訃至京錢公輔學士與太學生徒百餘人詣興國戒壇院舉哀又自陳師䘮給二日假近時無復此事五朝名臣言行録曰胡瑗字翼之與孫明復石守道同讀書泰山攻苦食淡終夜不寢十年不歸得家問見有平安二字即投之澗中不復展讀以范文正薦官太常博士學者稱為安定先生蘇子瞻云昔劉原父酒酣誦陳季弼吿陳元龍語陳矯語已見言語篇中因仰天太息此自原父舒其胷中磊塊之氣吾嘗作詩云平生我亦輕餘子晚歲人誰念此翁記原父語也原父没尚有貢父在每與語强人意今復死矣何時復見此俊傑人乎東坡初入荆溪有樂死之語繼而抱疾稍革徑山老惟琳來候坡曰萬里嶺海不死而歸宿田里有不起之憂非命也耶然死生亦細故爾後二日將屬纊聞根先離琳叩耳大聲曰端明勿忘西方坡言西方不無但箇裡著力不得語畢而終彭器資久在侍從剛明正直朝野推重晚娶宋氏有姿色器資承順惟恐不及後出守九江病中忽索紙筆大書云宿世寃家五年夫婦從今以後不打這皷投筆而逝宋史曰彭汝礪字器資饒州鄱陽人舉進士第一神宗用為監察御史漢陽軍呉處厚得蔡確安州詩上之傅㑹解釋以為怨謗諫官交章請治之汝礪曰此羅織之漸也數上疏論列落職知徐州初汝礪論吕嘉問事與確異趣徙外十年後治嘉問他獄以不阿執政坐奪二官至是又為確得罪人以此益賢之自昔名公下世太學生必相率至佛宫薦悼王荆公薨太學録朱朝偉作薦文以公好佛其間多用佛語東坡訃至京師王定國及李豸皆有疏文張耒時知潁州聞坡卒出俸於薦福禪寺修供以致師尊之哀乃遭論列責房州别駕元祐黨籍皆一時名賢逮宣和中往往多在鬼録獨劉器之范徳孺二公在未幾器之訃至晁以道對賔客誦南嶽新摧天柱峰之句至哽咽不得語客皆抆􅊿以道徐曰耆哲凋䘮殆盡緩急將柰何客曰世未嘗乏材前輩雖有殄瘁之感安知無後來之秀以道曰人材於世譬如名方靈藥之於病世之集名方儲靈藥者多矣然不肯先疾而備至於疾既彌留始閱方書而治藥材不如見成湯劑為應所須而取効速也時坐客無不深味其言語林卷二十四
