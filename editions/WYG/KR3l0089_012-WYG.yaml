body:
  text: 語林卷十二明何良俊撰方正第六上詩小康篇曰無縱詭隨以謹無良式遏宼虐㦧不畏明毛公傳曰詭隨者詭人之善而隨人之惡鄭氏箋曰王為政無聴於詭人之善不肯行而隨人之惡者以此勑慎無善之人又用此止為㓂虐曾不畏敬明白之刑罪者夫康成之曰以此曰又用此是盖深得詩人之㫖矣至孔頴達正義乃曰惡有大小詭隨小惡無良其次㓂虐則大惡也非唯不知詩人之㫖抑且并鄭氏之意而失之矣盖詭隨㓂虐其惡相因豈有異也夫茍國是若定雖㓂虐之人亦何能為害唯善惡不分則㓂虐者始恣肆而無所畏忌一人詭隨猶可幾也一國詭隨而衆論揺矣乃至於天下詭隨為善者將安望哉故詩人於每章必著詭隨㓂虐盖三致意焉其意以為此詭隨者廼無善之人茍一縱之則根盤芽茁其勢必至於惽怓罔極以衆犯政繾綣而不可解必無縱而謹之則無善者始不敢肆又用是以止㓂虐庶幾不至於作慝敗正而小康或可冀也此詩人之意而孔氏以為詭隨小惡夫乃欲芟夷㓂虐而更壅治之耶嘗讀屈原卜居篇曰寧廉潔正直以自清將突梯滑稽如脂如韋以潔楹盖傷之焉夫一善之不勝衆詭明矣原豈不知卑疵􅏽趨之足以免禍寧自沉死而不肯為余觀世亦有方正如原者然皆取禍不旋踵嗚呼傷哉此所載其疾惡似已甚稍失中然能使詭隨歛跡至不得自容亦良快矣余故以著之篇云陳尚書見王莽誅何武鮑宣喟然歎曰易稱君子見㡬而作不俟終日吾可以逝矣即乞骸骨去職三子參豐歛在位悉令解官父子相與歸郷里閉門不出入猶用漢家祖臘或問之答曰我先祖豈知王氏臘乎班固漢書曰御史大夫陳萬年子咸亢直有異才官廷尉監累遷尚書蘇桓公性强切而持毁譽士友咸憚之至相語曰見蘇桓公患其教責人不見又思之三輔號為大人後漢書蘇章傳曰章八世祖建武帝時右將軍祖父純字桓公有高名王仲回姿性方潔疾惡强豪一友人䘮親同郡陳遵關西大俠為䕶䘮事賻助甚豐仲回懐一縑陳於主人前曰如丹此縑出自機杼遵有慙色范曄後漢書曰王丹字仲回京兆下邽人哀平間仕州郡王莽時連徴不至鄧禹至關中表為左馮翊稱疾不視事免歸後徴為太子少傅更始中陳遵為大司馬出使匈奴過辭王丹丹曰俱遭反覆唯我二人為天所遺今子當之絶域無以相贈贈子以不拜遂揖而别班固漢書游俠傳曰陳遵字孟公杜陵人祖遂宣帝微時與有故遵長八尺餘容貌甚偉畧涉傳記贍於文辭請求不敢逆所到衣冠懐之時列侯有與遵同姓氏者毎至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云侯司徒欲與王仲回交友仲回被徴司徒遣子昱候於道昱迎拜車下仲回下答之昱曰家公欲與君結交何為見拜仲回曰君房有是言丹未之許也范曄後漢書曰侯覇字君房河南宻人矜嚴有威容篤志好學師事九江太守房元治榖梁春秋為元都講建武四年徴覇與車駕㑹壽春拜尚書令明年代伏湛為大司徒馬伏波嘗有疾梁松来候之獨拜牀下伏波不答松去後諸子問曰梁伯孫帝婿貴重朝廷公卿己下莫不降意大人奈何獨不為禮伏波曰我乃松父友也雖貴何得失其序范曄後漢書曰梁松字伯孫安定烏氏人梁統子少為郎尚光武女舞隂長公主後飛書毁謗下獄死光武嘗問宋𢎞求通博之士後漢書曰宋𢎞字仲子京兆長安人父尚成帝時至少府𢎞薦沛國桓譚才學洽聞幾能及揚雄劉向父子帝召拜議郎每燕輒令鼓琴好其繁聲𢎞聞不悦伺譚出内正朝服坐府上遣吏召譚至讓之曰吾欲薦女令輔國家以道徳奈何數進鄭聲以亂雅頌譚頓首辭謝良久遣去後大㑹羣臣令譚鼓琴譚見𢎞遂失常度帝怪問𢎞免冠謝曰臣薦譚望能以中正導主而令朝廷躭悦鄭聲臣之罪也帝改容謝不復令譚給事范曄後漢書曰桓譚字君山沛國相人好音律善鼓琴博學多通徧習五經皆詁訓大義不為章句能文章尤好古學數從劉歆揚雄辨析疑異性嗜倡樂簡易不修威儀而意非毁俗儒由是多見抵排吳大儀初為郡吏范曄後漢書曰吳良字大儀齊國臨菑人初為郡吏東平王聞而辟之上疏薦良除議郎遷司徒長史歳旦與掾史入賀門下掾王望舉觴上壽謟稱太守功徳大儀於下坐勃然進曰望佞邪之人欺謟無狀願勿受其觴太守歛容而止讌罷轉大儀為功曹大儀耻以言受進終不肯謁東觀漢記曰王望言曰齊郡敗亂遭離盜賊不聞鷄鳴犬吠之音明府視事五年土地開闢盜賊滅息五榖豐熟家給人足今日嵗首請上雅爵掾史皆稱萬嵗良時跪曰門下掾佞謟明府勿受其觴盜賊未盡人庶困乏今良曹掾尚無絝望曰議曹惰窳自無絝寧足為不家給人足耶太守曰此生言是賜良鰒魚百枚也肅宗嘗問第五倫曰聞卿為吏不過從兄飯有之乎倫答曰臣少遭饑亂米石萬錢實不妄過人飯司馬彪續漢書曰第五倫字伯魚京兆人修行清白袁安己見初為縣功曹奉檄詣從事從事因安致書於令安曰公事自有督郵私請則非功曹所持辭不肯受從事瞿然而止周穉都作太常清潔守禮盡敬宗廟嘗臥病齋宮其妻哀穉都老病闚問所若穉都大怒以妻干犯齋禁收送詔獄時人為之語曰生世不諧作太常妻一嵗三百六十日三百五十九日齋一日不齋醉如泥東觀漢記曰周澤字穉都少修髙節耿介特立好學問治嚴氏春秋門徒數百人隐居上野不汲汲於時俗拜太常果敢數有直言朝廷嘉其清亷范史雲范丹已見與王子炳親善范曅後漢書曰王奐字子炳謝承書曰王奐字子昌河内武徳人明五經負笈追業常賃灌園耻交勢利為考城令遷漢陽太守拜議郎卒子炳為考城令屢遣書請范范不時往及子炳除漢陽太守范與弟協歩齎麥酒於路側設壇待之范見子炳車徒駱驛遂不自聞與弟共辯論於路子炳識其音聲即下車與相揖對子炳言行路倉卒非陳契濶之所可共到前亭宿昔以叙分隔范曰子前在考城思欲相從以賤質自絶豪友耳今子逺適千里㑹靣無期故輕行相候以展訣别如其相追將有慕勢之譏便起告違拂衣而逝大將軍鄧隲貴戚傾時無所下借獨重李充髙節每卑敬之嘗置酒請充賔客滿堂酒酣隲跪曰幸託椒房位列上將幕府初開欲辟天下竒偉以匡不逮惟諸君博求其器充乃為陳海内隐居懐道之士頗有不合隲欲絶其説以肉啖之充抵肉於地曰説士猶甘於肉遂出徑去杜預汝南記曰李充字大遜陳留人兄弟二人貧無擔石之儲并日而食易衣而出妻竊謂充曰今貧如此妾有私財可分異獨居人多費極無為空自窮也充請呼隣里室家相對前跪白其母便顧其妻叱而遣之婦行泣出門去盧植少與鄭𤣥俱事馬融能通古今學好研精而不守章句融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉盼融以是敬之桓文林桓礹已見姑是楊司空楊賜夫人文林父卒姑赴哀止於傳舍整飾而入文林心非之及勞問終無所言號哭而已司空遣吏奉祠因縣發取祠具悉拒不受後每至京師未嘗舎宿楊氏蔡中郎自朔方歸將就還路五原太守王智餞之智中常侍王甫弟也酒酣起舞屬中郎中郎不為報智素驕貴慚於賔客詬曰徒敢輕我中郎遂拂衣去智宻告中郎怨於囚放謗訕朝廷中郎慮不免乃亡命江海逺跡吳㑹袁忠嘗乗船戴笠過詣王景興見景興左右僮從皆著青絳采衣忠非其奢麗即稱疾發而退魏文帝受禪曹丕字子桓魏武長子也人魏氏春秋曰初夏侯惇勸曹公宜早順望曹公曰若天命有歸吾其為周文王矣後果至丕始代漢欲用楊公楊彪已見為太尉先遣人示㫖楊曰彪備漢三公遭世傾亂不能有所補益耄年被病豈能賛維新之朝乃授光禄大夫賜几杖衣袍朝會引見著布單衣鹿皮冠持杖而入待以賔客之禮司馬彪續漢書曰魏文帝詔曰先王制几杖之賜所以賔禮黄耉太尉楊彪乃祖以来世著名績其賜公延年杖延請之日便使杖入也魏文帝曹丕已見為五官中郎將時天下嚮慕賔客如雲邴根矩邴原已見獨守道持常自非公事不妄舉動曹公微使人從容問之邴答曰吾聞國危不事冢宰君老不奉世子此典制也曹公深重其言沐徳信少有志介嘗過其姊姊為殺鷄炊黍徳信不留蘇則魏志曰蘇則字文師扶風武功人少以學行聞起家為酒泉太守轉安定武都所在有威名魏書曰則剛膓疾惡慕汲黯之為人與臨菑侯曹植已見聞魏氏代漢皆發服慟哭文帝知臨菑如此初不聞則後帝在洛陽嘗從容言曰人心不同當我應天受禪時天下人有哭者帝意在臨菑則謂見問須髯悉張欲正論以對侍中傅巽目之則悟而止傅子曰傅巽字公悌瓌瑋博逹有知人鍳識蘇文師拜侍中與董昭同官董嘗枕文師膝卧文師推置之曰蘇則之膝非佞人之枕魏志曰董昭字公仁濟隂定陶人舉孝㢘初袁紹以為叅軍入魏為太祖謀臣拜司空軍祭酒呂子義世稱清賢有人就之宿非其度數之内子義燃燭危坐通曉目不轉睛膝不移處呂子義已見司馬公既進爵為王晉書曰司馬昭字子上司馬宣王次子景王母弟也咸熙元年加封晉王王太尉晉書曰王祥字休徴瑯琊臨沂人事繼母朱氏以孝聞徐州刺史呂䖍檄為别駕州界清静政化大行時人歌之曰海沂之康實賴王祥邦國不空别駕之功後天子幸太學命祥為三老祥南靣几杖以師道自居天子北靣乞言祥陳帝王政化之要聞者莫不砥礪官至太尉荀司空晉陽秋曰荀顗字景倩太尉彧第四子幼為姊夫陳羣所異司馬宣王見而竒之曰荀令君之子也擢散騎侍郎佐命晉室官至太尉封臨淮康公並詣之荀曰相王尊重何侯與一朝之臣皆已盡敬今日便當相率而拜無所復疑太尉曰相國位勢誠為貴重然要是魏之宰相吾等備位三公相去一階而已班列大同安有天子三公可輒拜人者損魏朝之望虧晉王之徳君子愛人以禮吾不為也及入荀遂下拜太尉獨長揖王謂太尉曰今日然後知君見顧之重晉諸公賛曰何曾字頴考陳郡陽夏人父䕫魏太僕曾以髙雅稱加性純孝位至太宰年八十餘薨謚元公侯傅子曰以文王之道事其親者其穎昌何侯乎其荀乎古稱曾閔今曰荀何内盡其心以事其親外崇禮讓以接天下孝子百世之宗仁人天下之令也有能行仁孝之道者君子之儀表也諸葛思逺初統朝事蜀志曰諸葛瞻字思逺丞相亮之子亮出武功與兄瑾書曰瞻已八嵗聰慧可愛嫌其早成恐不為重器耳丞相亡蜀人思之愛瞻才敏毎朝廷有一善政佳事雖非瞻所建倡傳相告曰葛侯所為也是以美聲溢譽有過其實與董厥並平尚書事蜀亡死於國難廖元儉蜀志曰廖化字元儉襄陽人為丞相參軍以果烈稱官位與張翼齊而在宗預之右過宗徳豔欲與共詣思逺許徳豔曰吾軰年踰七十所竊已過但少一死耳何求於年少軰而屑屑造門耶遂不往蜀志曰宗預字徳豔南陽安衆人為丞相主簿丞相卒吳慮魏襲蜀增巴邱守兵萬人蜀亦益永安之戍預將命至吳孫權問曰東之與西譬猶一家而西更增白帝之守何也預曰東益巴邱之戍西増白帝之守皆事勢宜然不足相問權大笑嘉其伉直孫仲謀嘗於武昌臨釣臺飲酒吳志曰孫權字仲謀兄策既定諸郡以權為陽羡長郡察孝㢘行奉義校尉漢遣劉琬加䇿錫命琬語人曰吾觀孫氏兄弟雖各才秀明逹然皆禄祚不終唯中弟孝㢘形貌竒偉骨體不恒大貴之表年又最壽堅江表傳曰堅為下邳丞時生權方頥大口目有睛光異之以為有貴象及䇿起事江東權嘗隨從性度𢎞朗仁而多㫁好俠飬士毎參同計謀䇿自以為不及使人以水灑羣臣曰今日酣飲惟醉墮臺中乃當止耳張子布正色不言出外車中坐權遣人呼張還謂曰共為樂耳公何為作異張對曰昔紂為糟邱酒池長夜之飲當時亦以為樂不以為過權黙然有慚色吳志曰張昭字子布彭城人少好學從白侯子安受左氏春秋博覧衆書與瑯琊趙昱東海王朗俱發名友善顧元歎顧雍己見不飲酒寡言笑舉動時當每飲酒歡燕左右恐有酒失為元歎所覺終不敢肆情孫權常曰顧公在坐使人不樂江表傳曰雍孫譚為選曹尚書嘗與宴醉酒起舞不止雍召譚責之曰君王以含垢為徳臣下以恭謹為節昔蕭何吳漢並有大功何見髙帝似不能言漢奉光武亦信恪勤汝於國寧有汗馬之勞但階門户遂見寵任何有舞不知止雖為酒後亦由恃恩忘敬謙虚不足損吾家者必爾也因向壁卧譚立過一時乃遣去陸公紀陸績己見小時在孫討逆孫策己見坐時張昭張紘秦松為上賔共論四海未泰須當用武公紀在末坐大聲言曰昔管仲相齊九合諸侯一匡天下不以兵車孔子曰逺人不服則修文徳以来之今論者不務道徳懐取之術而唯尚武童蒙竊所未安姚彪與張温俱至武昌遇吳興沈珩守風粮盡從彪貸鹽一百斛彪性峻直得書不答方與溫談論良久呼左右倒百斛鹽著江中謂温曰明吾不惜惜所與耳建武初裴叔則裴楷己見與山巨源山濤己見和長輿晉諸公賛曰和嶠字長輿汝南西平人父逌魏太常嶠少以雅量稱深為賈充所知毎向世祖稱之厯官尚書並以盛徳處位晉武嘗問曰朕應天革命海内更始外間風聲云何裴對曰陛下受命四海承風所未比徳於堯舜者但以賈充之徒尚在朝耳方宜引天下賢人與𢎞政道不宜示人以私郄道徽在合肥被徴郄鍳别傳曰鍳字道徽髙平金鄉人漢御史大夫郄慮後也少有體正躭思經籍以儒雅著名道經姑熟與王大將軍相見王敦别傳曰敦字處仲瑯琊臨沂人少有名理累遷青州刺史避地江左厯丞相大將軍揚州牧以罪伏誅王謂道徽曰樂彦輔樂廣己見短才耳後生流宕言違名檢考之以實正應不勝滿武秋荀綽冀州記曰奮字武秋髙平人魏太尉寵之孫性清平有識自吏部郎出為冀州刺史之晉諸公賛曰奮體量清雅有曽祖寵風遷尚書令為荀顗所害道徽曰擬人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親踈及愍懐之廢可謂柔而有正武秋失節之士那得為比王曰愍懐廢徙之際交有危機之急人何能以死守以此相方其不減明矣道徽曰丈夫既潔身北靣義同在三豈可偷生屈節茍道數終極固當存亡以之耳王素懐無君之心聞道徽言大忿遂不復相見拘留不遣道徽舉止自若初無懼心後王謂錢鳯曰郄道徽儒雅之士名位既重何得害之乃放還臺王敦下石頭害周伯仁虞預晉書曰周顗字伯仁汝南安城人揚州刺史浚長子也晉陽秋曰顗有風流才氣正體嶷然儕軰不敢䙝王世儒與周侯素善往哭甚慟既而見敦敦怪其有慘容問其所以世儒答曰向哭周伯仁情不能已敦曰伯仁自致刑戮且凡人遇汝汝那得爾世儒曰伯仁清譽之士有何罪故而加以極刑因數敦抗旌犯上言辭慷慨與淚俱下晉書曰王彬字世儒王廙之弟少稱雅正周僕射周顗己見亡後王敦使人致吊周仲智曰鄧粲晉紀曰周嵩字仲智周顗弟也性狡直果俠每以才氣凌物亡兄天下有義人為天下無義人所殺復何所吊敦甚銜之猶取為從事中郎後因事誅嵩晉陽秋曰嵩事佛臨刑猶誦經初過江時熒惑守南斗經旬王丞相語陶回曰南斗是揚州分野為熒惑守之吾當遜位以厭此謫耳陶氏家傳曰回字恭淵為王導從事中郎為人正直不撓導亦以此重焉每言曰陶中郎有輔佐之才真國器也回答曰公以明徳作相輔佐聖主宜親忠貞逺邪佞而與桓景造膝熒惑何由退舍丞相有愧色何法盛晉中興書曰丹陽尹桓景頗以佞事司徒王導導甚昵之王丞相王導己見名位􅂭重百僚欲為降禮馮太常馮氏譜曰馮懐字祖思長樂人厯太常䕶國將軍以問顔光禄晉書曰顔含字𢎞都瑯琊莘人祖欽給事中父黙汝隂太守含少有操行以孝聞仕至光禄勲累晉中興書曰顔含嫂病困須蚺虵膽不能得含憂歎日忽有一童子持青囊授含乃虵膽也童子化為青鳥飛去顔曰王公雖重禮無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人曰吾聞伐國不問仁人向馮祖思問佞於我我其有邪徳乎郭景純郭璞己見嘗遇顔𢎞都欲為之筮顔曰年在天位在人修己而天不與者命也守道而人不知者性也自有性命無勞􅆱龜蔡子尼體貌尊嚴莫有䙝嫚髙平劉整俊才白衣車服奢麗語人曰紗縠吾之常服耳遇蔡子尼在坐而經日不自安晉諸公賛曰蔡克字子尼陳留雍邱人雅蔡克别傳曰克祖睦蔡邕孫也克少好學有尚體貌尊嚴王褒己見與管彦為友約男女為婚彦後葬父於洛陽褒遂别嫁其女因語彦弟馥曰昔嫁姊妹皆逺吉凶斷絶今賢兄葬父洛陽則京邑之人豈吾結好之意馥曰嫂是齊人兄當還齊褒曰豈有葬父洛陽而隨妻還齊如此去就復何婚之有庾異行庾衮己見嘗與諸兄過邑人陳凖諸兄友之皆拜其母異行獨不拜凖弟徽曰子何以不拜吾親異行曰夫拜人之親者將自同於人之子其義至重袞敢輕之乎遂不拜王懐祖王述己見年三十尚未知名人或謂之痴王丞相以門地辟為中兵屬既見無他言唯問以在東米價懐祖張目不答丞相曰王掾不痴人何言痴也桓公桓温己見議移洛陽鍾簴王懐祖曰永嘉不競暫都江左方當漸平區宇旋軫舊京若其不爾宜改遷園陵不應先事鍾簴桓公不能奪簡文臨崩續晉陽秋曰帝諱昱字道萬中宗少子仁聞有智度穆帝幼冲以撫軍輔政大司馬桓温廢海西公立帝在位三年而崩詔桓公居攝王中郎持詔命入於帝前毁之帝曰天下儻来之運卿何所嫌中郎曰天下宣元之天下陛下何得自專事遂不行王中郎别傳曰王坦之字文度太原晉陽人祖承清淡平逺父述貞貴簡正坦之器度淳深孝友天至譽輯朝野標的當時累遷中書令領北中郎將徐兖二州刺史桓公平蜀朝廷欲以豫章郡封桓時荀令逺言於朝曰若温復假王威北平河洛修復園陵將何以加此朝議乃止晉書曰荀㽔字令逺荀崧之子起家秘書郎遷尚書左丞少有儀望風操甚為簡文帝所重會稽王道子專政孝文王傳曰王諱道子簡文皇帝第五子也封㑹稽王領司徒揚州刺史進太傅為桓元所害委任羣小陸祖言陸納己見望闕歎曰好家居纎兒欲撞壊之耶朝士稱其忠亮周勰為謝太傅主簿居䘮廢禮崇尚老莊脱落名教時韓康伯領中正不過勰品為之議曰拜下之敬猶違衆從禮情理之極不宜以多比為通時人以康伯為澄世所不能澄裁世所不能裁續晉陽秋曰韓伯字康伯清和有思致幼為舅殷浩所知辭晉書曰王坦之著公謙論袁宏作論以難之伯美其㫖以為是非既辨誰與正之遂作辯謙以折中曰夫尋理辯疑必先定其名分所存則彼我之􅃐可得而詳也夫謙之為義存乎降己者也以髙從卑以賢同鄙故謙名生焉孤寡不穀人之所惡而侯王以自稱降其貴者也執御執射衆之所賤而君子以自目降其賢者也與山在地中之象其致豈殊哉捨此二者而更求其義雖南轅求冥終莫近也夫有所貴故有降焉有所美故有謙焉譬影響之與形聲相與而立道足者忘貴賤而一賢愚體公者乗理當而均彼我降挹之義於何而生則謙之為美固不可以語至足之道渉大方之家矣誠由未能一觀於能鄙則貴賤之情立非忘懐於彼我則私己之累存當其所貴在我則矜值其所賢能之則伐處貴非矜而矜己者常有其貴言善非伐而伐善者驟稱其能是以知矜貴之傷徳故宅心於卑素悟驟稱之虧理故情存乎不言情存於不言則善斯匿矣宅心於卑素則貴斯降矣况君子之流茍理有未盡情有未夷存我之理未冥於内豈不同心於降挹哉體有而擬無者聖人之徳有累而存理者君子之情雖所滯不同其於遣之縁有弊而用降已之道由私我而存一也故懲忿窒欲著於損象卑以自牧實繫謙爻皆所以存其所不足拂其所有餘者也王生之談以至理無謙近得之矣云人有争心善不可收假後物之迹以逃動者之患以語聖賢則可施之於下斯者豈惟逃患於外亦所以洗心於内也㑹稽王道子執政寵昵王國寳委以機權王氏譜曰國寳坦之第三子太傅謝安國寳婦父也惡而抑之安薨相王輔政遷中書令弟緒有寵於王國寳權動内外王珣王恭殷仲堪為孝武所待不為相王所盻恭抗表討之會稽王不能拒諸侯兵遂委罪國寳付廷尉賜死王孝伯每正言規諫周祗􅂭安記曰王恭字孝伯太原晉陽人祖濛司徒左長史風流標望父藴鎮軍將軍亦得世譽中恭别傳曰恭清廉貴峻志存格正起家著作郎厯書令出為五州都督青兖二州刺史道子不從及赴山陵還孝伯歎曰榱棟維新便復有􅁰離之歎戴安道戴逵己見少有髙名武陵王司馬晞為太宰封武陵王聞其善鼓琴使人召之安道就使者前打破琴直語云戴安道不能為王侯伶人司馬太傅㑹稽王道子已見嘗集朝士置酒於東府謝尚書因醉為委巷之歌王孝伯正色曰居端右之尊集藩王之第而大肆淫聲欲令臣下何所取則晉書曰謝石字石奴丞相安之弟拜秘書郎累遷尚書僕射淮陵内史虞珧子婦裴氏有服食之術常著黄衣狀如天師司馬道子甚悦之令與賔客談論時賢為之降節王孝伯獨抗言曰未聞宰相之坐有失行婦人坐賔莫不反側王佛大臨荆州甚得民和王忱小字佛大平晉安帝紀曰王忱字元達北將軍坦之第四子甚得名於當世與族子恭相善齊聲見稱仕至荆州刺史桓南郡桓元己見時在江陵既其本國且奕葉故義常以才雄駕物王毎裁抑之南郡嘗詣王通人未出南郡乗轝徑入王對南郡鞭門幹南郡怒去王亦不留𡊮彦升𡊮喬己見與褚季野友善及康獻臨朝康獻皇后季野女也彦升與季野書曰皇太后踐登正阼臨馭皇朝將軍於國外姓之太上皇也至於皇子近屬咸有揖讓之禮况䇿名人臣而交媟人父天性攸尊亦體國而重矣故友之好請從此辭論者以彦升為得禮𡊮書又曰與將軍雖世譽先後臭味同歸然平昔之交與禮數而降箕踞之欣隨世事而替雖欲虚詠濠肆脱落儀制其能得乎桓𤣥作逆晉安帝出宮時徐野民陪列悲動左右及𤣥簒立野民又獨哀感涕泗交流晉書曰徐廣字野民東莞姑臧人世好學至廣尤為精純謝𤣥為兖州辟從事桓𤣥輔政以為大將軍文學祭酒謝尚書謂之曰徐公將無小過也野民收淚言曰君為宋朝佐命身是晉室遺老憂喜之事固自不同乃更欷歔沈約宋書曰謝晦字宣明陳郡陽夏人祖朗東陽太守父重司馬道子長史晦為孟㫤中兵叅軍後為宋髙祖中領軍少帝即位加中書令與徐羡之傅亮共輔政以事伏誅謝晦為宋臺右衛權遇已重於彭城還都迎家賔客輻輳時宣逺在家驚謂晦曰吾家以逺退為業汝遂勢傾朝野此豈門户福耶乃􅆆籬隔絶門庭曰吾不忍見此殷仲文還姑孰祖送傾朝桓敬祖要王參軍王𢎞之已見同行參軍曰餞離送别必在有情下官與殷風馬不接無緣扈從敬祖深貴其言晉中興書曰桓謙字敬祖冲第三子尚書僕射中軍將軍蔡子度自豫章徴為吏部尚書沈約宋書曰蔡廓字子度濟陽考城人曾祖謨晉司徒祖系撫軍長史父琳司徒左西屬廓博涉羣書言行以禮起家著作佐郎至尚書令時傅季友沈約宋書曰傅亮字季友北地人博涉經史尤善文辭官散騎常侍徐羡之共管朝政宋書曰徐羡之字宗文東海郯人祖寜尚書吏部郎父祚之上虞令羡之厯官司空録尚書事羡之起自布衣人無學術直以志力局度一旦居廊廟朝野推服謂有宰臣之望與謝晦傅亮同誅蔡因傅􅂭以問季友若選事悉以見付不論不然不能拜也季友以語羡之羡之曰黄門郎以下悉以委蔡吾徒不復厝懐自此以上故宜共參同異蔡曰我不能為徐干木羡之小字署紙尾也遂不拜沙門慧琳以才學為文帝所賞朝廷政事多與參决帝每引見常升獨榻顔延之因醉白上曰昔同子􅆖乗𡊮絲正色此三台之坐豈可使刑餘居之帝為變色王倩玉王球已見是司徒王謐子公子簡貴素不交遊筵席虚靜門無異客時殷尚書宋書曰殷景仁陳郡長平人曽祖融晉太常祖茂散騎常侍父道裕早亡景仁少有大成之量官至尚書僕射劉領軍並執權重傾動内外王雖通家姻戚未嘗往来宋書曰劉湛字𢎞仁南陽湼陽人祖躭父桞並晉左光禄大夫湛少有局力不尚浮華博涉史傳諳前世舊典弱年便有宰世情常自比管夷吾諸葛亮厯官尚書僕射領軍將軍中書舍人王𢎞為太祖所愛遇上謂曰卿欲作士人得就王球坐乃當判耳若往詣球可稱旨就席𢎞如言往王舉扇撝曰若不得爾𢎞還依事啓聞太祖曰我便無如此何張景𦙍張敷己見為正員中書郎時舍人秋當周﨣並管要務以張同省名家嘗欲詣之周曰彼恐不相容接不如勿往秋言我等並已員外郎矣何憂不得共坐景𦙍先設二牀去壁三四尺許二客就席張呼左右曰移我逺客周等失色而退張景𦙍為江夏王撫軍記室江夏就文帝求一義學沙門㑹景𦙍赴假還江陵入辭帝令以後車載沙門往云道中可得言晤張不奉詔曰臣性不耐雜宋書曰江夏王義恭武帝子也幼明穎姿顔美麗武帝特所鍾愛封江夏王謚文獻蔡興宗在荆州被徴還都時右軍王道隆任參内政權重一時躡履到前不敢造席良乆王去竟不呼坐南史曰蔡興宗字興宗幼為父廓所重謂有已風與親故書曰小兒四嵗神氣似可不入非𩔖室不與小人遊故以興宗為之名以興宗為之字厯官吏部侍郎中書監宋孝武好狎侮羣臣自太宰義恭尚書令桞元景以下皆不能免又寵一崑崙奴令以杖遍擊羣臣唯憚蔡興宗方嚴不敢侵媟顔師伯謂議曹王耽之曰蔡尚書常免昵戱去人實逺王僧祐雅為從兄仲寳王儉己見所知仲寳在中書日常鳴笳列騶到其門候之僧祐輒稱疾不前仲寳曰此吾之所望於若人也世以仲寳之愛名徳僧祐之不附貴要並兩稱之南史曰王僧祐字𦙍宗瑯琊人父逺光禄勲僧祐雅博古善老荘不尚繁華工草𨽻善鼓琴亭然獨立不交當世自天子至侯伯未嘗與一人遊卒於黄門郎向𤣥季有義學才能立身方雅南史曰向桞字𤣥季河内山陽人父靖太子左衛率桞仕至南康郡渉義宣事伏法與𡊮太尉徐司空顔揚州𡊮淑徐湛之顔竣並己見並相友善後揚州貴勢當朝𤣥季猶以素情自處不相推下范伯玉戒之曰名位不同禮有異數卿何得作曩時意耶𤣥季曰我與士遜心期久矣豈可一旦以勢利處之南史曰范璩字伯玉平北將軍汪之曾孫位至淮南太守褚彦回褚淵己見美儀貌善容止俯仰進退咸有風則宋山隂公主窺見彦回悦之以白帝帝召彦回西上閣宿十日公主夜就之備見逼迫彦回整身而立不為移志公主謂曰君鬚髯如㦸何無丈夫意彦回曰回雖不敏何敢首為亂階紀僧真得幸於齊世祖容表有士風嘗請於世祖曰臣出自本縣武吏邀逢聖時階榮至此為兒婚得荀昭光女即時無復所須唯就陛下乞作士大夫上曰此由江斆别見謝􅊪己見我不得措意可自詣之僧真承㫖詣斆登榻坐定斆顧命左右曰移吾牀逺客僧真䘮氣而退以告世祖世祖曰士大夫故非天子所命宋徳既衰齊高祖輔政朝野之情人懐彼此時王延之與尚書令王僧䖍己見中立無所去就時人為之語曰二王持平不送不迎南史曰王延之字希季祖敬𢎞宋侍中父昇之都官尚書延之静黙不交人事仕宋司徒左長史清貧居字穿漏褚彦回以啓宋明帝即勅材官為起三間齋屋厯吏部尚書左僕射宋世吏部都令史咨執選事陸東海陸慧曉己見在選任已獨行未嘗與語帝遣人語陸云都令史諳悉舊貫可共叅懐陸曰六十之年不復能諮都令史為吏部郎也上若謂身不堪便當拂衣而退齊髙帝於華林宴使羣臣各効伎藝褚彦回彈琵琶王僧䖍桞世􅂭彈琴沈文季歌子夜来張敬兒舞時王仲寳曰臣無所解唯知誦書因跪上前誦相如封禪書上曰此盛徳之事吾何以堪之王僕射王儉己見嘗屬王琨用東海郡吏琨謂信人曰語郎三臺五省皆是郎用人外方小郡當乞寒賤省官何容復奪之遂不過其事南史曰琨王華從父弟也祖薈㑹稽内史父懌不辨菽麥時以為殷道矜之流琨少謹篤為從伯謐所愛先是琨伯父廞得罪晉世諸子並從誅唯華得免華宋世貴盛以門衰提擕琨恩若同生為之延譽厯位宣城太守孝建中為吏部郎褚彦宣常非從兄彦回身事二姓褚炤己見彦回子賁南史曰淵長子賁字蔚先少耿介父背𡊮粲等附髙帝賁深執不同終身愧恨有棲退之志位侍中往問訊彦宣彦宣問曰司空今日何在賁曰奉璽紱在齊大司馬門彦宣正色曰不知汝家司空將一家物與一家亦復何謂彦回好戱詔以軺車給之彦宣大怒曰着此辱門户那可令人見索火燒之馭人奔車乃免卞士蔚弱冠時為上虞令甚有剛氣㑹稽太守孟彭以令長裁之士蔚積不能容脱幘投地曰我所以屈卿者正為此幘耳今已投之卿以一世勲門而傲天下國士拂衣竟去卞彬己見張思曼張緒己見忘情利禄朝野皆貴其風常語人曰吾一生不解作諾劉璡己見嘗為武陵王曅征虜參軍武陵與僚佐飲自割鵞炙璡曰應刀落俎膳夫之事殿下親執鸞刀下官未敢安席中領軍劉勔宋書曰劉勔字伯猷彭城安上里人祖懐義父穎之並郡守勔少有志節兼好文義受明帝顧命守尚書僕射中領軍晚節有棲退志表求東陽郡南史曰勔以世路紏紛有懐止足經始鍾嶺之南以為棲息聚石蓄水髣髴邱中朝士雅素者多往游之尚書令𡊮粲以下莫不賛美之王吏部曰永初景平唯謝晦殷景仁為中領軍元嘉有到彦之為人望才譽勔不及也近聞加侍中已為怏怏便求東陽臣恐子房赤松未易輕擬明帝廢鬱林虞侍中稱疾不陪位齊書曰虞悰字景豫㑹稽餘姚人祖嘯父晉左民尚書父秀之黄門郎悰少謹勅有至性秀之於都亡悰東出奔䘮水漿不入口州辟主簿厯官侍中帝使尚書令王晏諭㫖以虞舊人引叅佐命南史曰王晏字休黙一字士彦祖𢎞之有髙行父普曜秘書監晏官侍中左僕射永明中位任親重以事伏誅虞謂晏曰主上聖明公卿戮力寧假朽老以匡賛維新乎不敢聞命朝議欲紏之僕射徐孝嗣曰此亦古之遺直衆議乃止任彦升任昉己見在齊紆意於梅蟲兒南史曰梅蟲兒吳興人齊東昏時為制局監甚見愛幸東昏敗伏法用為中書郎彦升造謝尚書令王亮亮曰卿宜謝梅那忽謝我彦升大慙南史曰王亮字奉叔王瑩從父弟也父昌宋太宰中郎亮以名家宋末選尚公主齊竟陵王開西邸延才俊以為士林使工圖其像亮亦與焉仕中書監加散騎常侍沈休文撰史王希􅆅一日問休文曰從叔太常何故無傳休文戱語云賢從有何可載希􅆅答曰從叔唯忠與孝君當不以忠孝為美休文有慙色徐勉為吏部尚書梁書曰徐勉字修仁東海郯人祖長宗宋髙祖覇府行叅軍父融南昌相勉幼孤貧早勵清節六嵗時屬霖雨家人祈霽率爾為文見稱耆宿及長篤志好學起家國子生王儉為祭酒稱勉有宰輔之量厯官侍中謚簡肅嘗與門人夜集客有虞暠求詹事五官勉正色答云今夕止可談風月不宜及公事時人服其無私勉嘗為書戒子崧曰吾家世清廉嘗居貧素至産業之事所未嘗言非直不經營而已薄躬遭逢遂至今日尊官厚禄可謂偹之每念叨竊若斯豈由才致仰藉先代風範故臻此耳古人以清白遺子孫不亦厚乎又曰遺子黄金滿籝不如一經詳求此言信非徒語吾實有本志庶得遵奉此義不敢墜失所以顯貴以来門人故舊亟薦便宜或使創闢田園或勸興立邸店又欲舳艫運致亦令貨殖聚歛若此事皆距而不納非謂㧞葵去織且欲省息紛紜中年聊於東田營小園者非在播藝以要利入正欲穿池種𣗳少寄情賞又以郊際閑曠終可為宅儻獲懸車致事實欲歌哭於斯慧日十住等既應營婚又須住止吾清明門宅無相容處所以爾者亦復有以前割西邉施宣武寺既失西廂不復方幅意亦謂此逆旅舍耳何事須華常恨時人謂是我宅古往今来豪富繼踵髙門甲第連闥洞房宛其死矣定是誰室但不能不為培塿之山雜以花卉以娛休沐用託性靈隨便架立不在廣大所以内中逼促無復房宇近營東邉兒孫二宅乃藉十住南還之資既牽挽不至又不可中塗而輟郊間之園遂不辦保貨與韋黯乃獲百金成就兩宅已消其半尋園價所得何以至此由吾經始厯年麄已戒立桃李茂宻桐竹成隂塍陌交通梁畎相屬華樓逈榭頗有臨眺之美孤峯叢薄不無紏紛之興瀆中並饒菰􅃽湖裏殊富芰蓮雖云人外城闕宻邇韋生欲之亦雅有情􅃐追述此事非有􅈔心盖是筆勢所至耳憶謝靈運山家詩云中為天地物今成鄙夫有吾此園有之二十載矣今為天地物物之與我相校幾何哉此吾所餘今以分汝營小田舍親累既多理亦湏此且釋氏之教以財物謂之外命儒典亦稱何以聚人曰財况汝曹常情安得忘此聞汝所買姑孰田地甚為舄鹵彌復何安孔子曰居家理治可移於官既以營之宜使成立進退兩亡更貽耻笑若有所收穫汝可自分贍内外大小宜令得所非吾所知又復應沾之諸女耳汝既居長故有此及凡為人長殊復不易當使中外諧緝人無間言先物後己然後可貴老生云後其身而身先若能爾者更招巨利汝當自朂見賢思齊不宜忽畧以棄日也棄日乃是棄身身名美惡豈不大哉今之所敕畧言此意正謂為家已来不事資産陳其始末無愧懐抱兼吾年時朽暮心力稍殫牽課奉公畧不克舉其中餘暇裁可自休或復冬日之陽夏日之隂良辰美景文案間隙負杖躡屩逍遥陋舘臨池觀魚披林聴鳥濁酒一杯彈琴一曲求數刻之暫樂庶居常以待終不宜復勞家間細務汝交關既定吾不復言及田事汝亦勿復與吾言之假使堯水湯旱吾豈知如何若其滿庾盈箱爾之幸遇並無俟令吾知也記云夫孝者善繼人之志善述人之事今且望汝全吾此志則無所恨矣朱彦和方貴用事賔客輻輳南史曰朱异字彦和錢唐人祖昭之以學觧稱父巽之字處林有志節著辨相論顧歡見而異之以女妻焉异徧覧經史兼通雜藝官侍中中領軍欲引江子一為助南史曰江子一字元亮濟陽考城人晉散騎常侍統之七世孫父法成奉朝請子一少慷慨有大志仕終南津校尉彦和是子一姑夫子一知彦和不為物議所歸未嘗造門王東陽性簡貴有風格時朱异當朝用事毎休下車馬填咽時有魏郡申英者寒門才俊好危言髙論以忤權右常指异門曰此中穰穰皆以利往能不至者唯有大小王東陽小東陽即承弟穉也南史曰王承字安期初為秘書郎累遷國子祭酒承祖儉父暕皆為此職三世為國師前代未有後為東陽太守阮居士外兄王晏貴顯居士度其必至顛覆王笳管造門居士穿籬逃匿不與相見曽食醤美問之云是王家所得便吐餐覆醤郡陵王綸嘗於婁湖立園廣宴朝士酒後好聚衆賔冠手自裂破投之吐壺皆莫敢言謝舉嘗預宴王欲取舉冠舉正色曰裂冠毁冕下官弗敢聞命拂衣而退王屢召不反甚有慙色蕭引己見為建康令時宦者李善度蔡脱兒多所請託引皆不許或諫曰李蔡之權在位皆憚亦宜少為身計引曰吾之立身自有本末亦安能為李蔡致屈就令不平不過免職耳陳後主嘗置酒歡甚將移宴𢎞範宮衆人咸從唯蔡凝與𡊮憲不行後主問其故凝答曰長樂尊嚴非酒後所過臣不敢奉詔衆皆失色南史曰蔡凝字子居蔡興宗曽孫蔡撙之孫也美容止及長博渉經傳有文詞太建中選尚信義公主後主嗣位為黄門侍郎李敬文為髙陽内史河間守崔謀恃其弟暹權勢從敬文乞麋角翎羽敬文答曰翎有六翮飛則冲天麋有四足走便入海下官膚體踈嬾手足遲鈍不能逐飛追走逺事佞人北史曰李繪字敬文趙郡平􅁄人儀貌端偉神情朗雋舅邢晏每與言數其髙逺曰若披雲霧如對珠玉宅相之寄良在此甥齊文襄用為散騎常侍晉公護執政廣營第宅嘗召韋敬逺至宅訪以政事敬逺仰視其堂徐語曰酣酒嗜音峻宇雕墻有一於此未或不亡䕶甚不悦有識者以為知言桞調為侍御史楊素嘗戯之曰桞條通體弱獨揺不禁風調歛版正色答曰調信無可取者公不當以為侍御史調信有可取不應發此言公當具瞻之地樞機何可輕發素甚竒之北史曰桞調河東觧縣人桞昂之子厯官秘書侍郎時王綱不振朝士多贓貨唯調清素守常為時所美語林卷十二
