body:
  text: 語林卷十一明何良俊撰言志第五下王彦深不為羣從所禮常懷耻慨欲以將領自奮每撫刀曰龍泉太阿汝知我者南史曰王藴字彦深王景文兄子也父楷人才凡劣故藴不為羣從所禮何子晳明目秀眉容貌方雅真素通美不以門户自矜博通羣書善於談論家本甲族親姻多貴仕子晳雖不入城府而率到好狎遨遊人間不簮不𢃄人地並髙無所與屈大言箕踞公卿皆敬下之時駕柴車蹻草履恣心所適致醉而歸時人號為通隐南史曰何㸃字子晳廬江人祖尚之父鑠㸃十一居父母憂幾至滅性及長感家禍遂絶婚宦宋徴太子洗馬梁徴中書侍郎並不就何子晳哀樂過人嘗行逢葬者歎曰此哭者之懷豈可思耶因悲慟不能禁何子晳與陳郡謝􅊪南史曰謝􅊪字義潔陳郡人謝荘子也仕至太子詹事吳國張融㑹稽孔稚圭為友從弟遁以東籬門園居之稚圭為築室焉園有卞忠貞冢子晳植花卉於冢側毎飲必舉酒酌之何子晳小時欲絶婚宦既老又娶魯國孔嗣之女築别室處之不與相見時人莫諭其意南史曰魯國孔嗣之字敬伯宋時與齊髙帝同為中書舍人非其所好去官隐居鍾山謝司徒謝朏己見出為吳興弟侍中謝瀹己見送至征虜渚司徒指侍中口曰此中唯宜飲酒侍中於建武初專以長酣為事與劉瑱沈昭畧以觴酌交飲各至數斗檀超嗜酒好言詠舉止和靡自比晉郄超為髙平二超謂人曰猶覺我為優南史曰檀超字悦祖金鄉高平人祖嶷之南瑯邪太守父道彪正員郎超少好學放誕任氣為司徒右長史與江淹對掌史職為左僕射王儉所不同徙交州於路見殺王思寂王騫己見舊墅在鍾山有田八十餘頃與諸宅及故舊共佃之常語人曰我不如鄭公業有田四百頃而食常不周以此為愧人或謂卞田居卿都不持操名器何由得升卞曰擲五木子十擲輒鞬豈復是擲子之拙吾好擲政極此耳南史曰卞彬字士蔚濟隂寃人祖嗣之中領軍父延之上虞令彬險㧞有才與物多忤官車騎記室參軍蕭南郡初為秘書郎宋書曰蕭惠開南蘭陵人蕭思話子也少有風氣渉獵文史官至少府加給亊中著作並名家年少蕭意􅃐與人都不同比肩或三年不共語外祖劉光禄南史曰劉成沛郡人仕至光禄大夫戒之曰汝恩戚家子正應將迎時俗緝外内之歡如汝自業將無少傷多異以取天下疾患耶蕭曰人間宜相緝和甚如慈㫖但不幸耿介耻見作凡人畫龍未成故遂至於多忤耳蕭南郡除少府意甚不得寺内所住齋前有嚮所種花草甚美恵開悉令剗除列種白楊𣗳每謂人曰人生不得行胷懐雖壽百嵗猶為夭也王養王筠小字筠己見除尚書殿中郎王氏自過江以来未有居郎署者或勸使不就養笑曰陸平原東南之秀王文度獨歩江東吾得比蹤昔人何所多恨欣然就職陶隐居特愛松風每聞其響便欣然為樂梁元帝居藩勤心著述巵酒未嘗妄進蕭雍州毎語人曰下官厯觀世人多有不好歡樂乃仰眠床上看屋梁而著書千秋萬嵗誰傳此者勞神苦思竟不成名豈如臨清風對朗月登山泛水肆意酣歌也南史曰蕭恭字敬範梁文帝孫南平王元襄子也官寧蠻校尉雍州刺史沈處黙清静有至行慕黄叔度徐孺子之為人獨處一室人罕見其靣南史曰沈顗字處黙吳興武康人父演之齊太子右衛率顗永明中徴著作郎不起齊末兵􅂽與家人并日而食或有饋其粱肉者閉門不受唯採蓴荇根供食以樵採自資怡然不改其樂庾彦寳性托夷簡特愛林泉十畝之宅山池居半梁書曰庾詵字彦寳新野人聰警篤學經史百家無不該綜晚年尤遵釋教宅内立道塲環繞禮懴六時不輟誦法華經毎日一遍夜中忽見一道人自稱願公容止甚異呼詵為上行先生授香而去中大通四年因寢忽驚覺曰願公復来不可久住言終而亡年七十八舉室咸聞空中唱上行先生已生彌陀淨域矣武帝下詔謚貞節處士以顯髙烈蕭光祿南史曰蕭子範豫章文獻王嶷之子幼有孝性為南平王從事中郎王愛文學士子範偏被恩遇簡文即位召為光禄大夫以逼賊不拜子範貧無居宅尋卒於招提寺僧房與弟子顯己見子雲南史曰子雲字景喬子顯弟也好學有文藻性沈静不樂仕進風神閑曠任性不羣夏月接賔恒自裸袒又善草𨽻為世楷法官至侍中國子祭酒才名畧相比而風采容止不逮故官途有優劣每讀漢書杜緩兄弟五人至大官唯中弟欽官不至而最知名常吟諷之以况已也蕭叔佐為㑹稽丞行經延陵季子廟設蘋藻之薦託異代之交為詩叙意辭理清典南史曰蕭允字叔佐蕭介第三子也風神凝逺通達有識鑒容止醖藉仕梁位太子洗馬侯景陷䑓城百僚奔㪚允整衣冠坐于宫坊景軍敬焉弗之逼也尋居京口時㓂賊縱横百姓波駭允獨不行人問其故允曰性命自有常分豈可逃而免乎莊周所謂畏景避迹吾弗為也乃閉門静處併日而食卒免於患裴鴻臚裴子野己見性曠達自云年出三十不復詣人初未與張都尉遇便虚相推重因為忘年之交張纉己見蕭彦瑜言少壯有三好音律書酒年長以来二事都廢唯書籍不衰南史曰蕭琛字彦瑜惠開從子祖僧珎宋廷尉卿父惠訓齊巴東相琛少明悟有才辯與梁武有舊仕特進金紫光禄大夫馬要理馬樞己見嘗喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊呂為管庫束名實則芻芥柱下之言翫清虚則糠粃席上之説稽之篤論亦各從其好也比求志之士望塗而息豈天之不恵髙尚何山林無聞之甚乎乃隐於茅山有終焉之志髙道穆學涉經史非名流雋士不與交結每謂人曰人生厲心立行貴於見知當使夕脱羊裘朝佩珠玉若時不我知便須退跡江海自求其志魏收魏書曰髙恭之字道穆自云遼東人學涉經史所交皆名流雋士厯官黄門侍郎胡倫許好屬文既善典雅之辭又工鄙俗之句西入凉州不遇將北遊魏乃為詩示所知程伯達曰羣犬吠新客佞闇排踈賔直途既已塞曲路非所遵望衛惋祝鮀盼楚悼靈均何用宣憂懐託翰寄輔仁一時皆傳之魏書曰胡叟字倫許安定臨涇人世為西夏著姓少聰慧年十三辨疑釋理鮮有能屈以姚氏將衰遂入長安隐匿名行懼人見知京兆韋祖思少閲典墳多蔑時彦待叟不足叟拂衣去祖思留之曰當與君論天人之際何遽返乎叟曰論天人者其亡久矣與君相知何夸言若是遂歸李琰之毎休暇之際恒閉門讀書不交人事嘗語人曰吾所以好讀書不求身後之名但異見異聞心之所願是以孜孜搜討欲罷不能豈為聲名勞七尺也此乃天性非為力强北史邢邵傳曰邵與黄門侍郎李琰之對掌朝儀常景雅有文思兼好篇詠淹滯門下積年不遷北史曰常景字永昌河内温人魏太常林之後祖爽時號儒林先生景躭好經史遇新異之書求訪質買以必得為期衣食取濟而已自以蜀司馬相如王裒嚴君平揚子雲四賢皆有髙才而無顯位乃托意賛之按景賛相如曰長卿有艷才直致不羣性鬰若春烟舉皎如秋月映遊梁雖好仁仕漢常稱病清貞非我亊窮逹委天命其賛王曰王子挺秀質逸氣干青雲明珠既絶俗白鵠信驚羣才世茍不合遇否途自分空枉碧鷄命徒獻金馬文其賛嚴曰嚴公體沉静立志明霜雪味道綜微言端蓍演妙説才屈羅仲口位結李强舌素尚邁金貞清標陵玉徹其賛揚曰蜀江導清流揚子挹餘休含光絶後彦覃思邈前修世輕久不賞𤣥談物無求當途謝權寵置酒獨閑遊李永和杜門却掃絶跡下帷棄産營書手自刪削每歎曰丈夫擁書萬卷何假南靣百城北史曰李謐字永和少好學周覧百氏初師小學博士孔璠數年後璠還就謐請業同門生為之語曰青成藍藍謝青師何常在明經徴拜著作佐郎辭以授弟郁詔許之州再舉秀才公府二辟並不就唯以琴書為業有絶世之心及卒博士孔璠等奏謚為貞静處士平繼叔研綜經籍多所通究安貧樂道不營資産衣食常不足妻子不免饑寒三子並不率父業好酒自棄繼叔忿其勢衰植杖廵舍側岡而哭不為營事婚宦故仕聘濁碎不得及其門流親知每以為言繼叔曰此輩㑹是衰頓何煩勞我乃别搆精廬置經籍其中一奴自給妻子莫得而往時有珍味呼時老東安公刁雍等共飲噉之家人無得嘗焉北史曰平恒字繼叔燕郡薊人祖視父儒仕慕容為通宦恒耽勤讀誦多通博聞自周暨於魏世帝王傳代之由貴臣升降之緒皆撰品第商畧是非號曰畧注合百餘篇安貧樂道不以屢空改操徴中書博士盧詢祖己見嘗為築長城子使自負其才内懷鬱鬱既至役所作築長城賦其畧曰板則紫栢杵則木瓜何斯材而斯用也草則離離靡靡縁岡而殖但使十歩而有一芳余亦何辭間於荆棘楊遵彦聞髙王欲送置魏帝所棄衣冠於水濵若自沉者變易名姓自稱劉士安入嵩山與沙門曇謨等屏居削迹又潜之光州東入田横島以講誦為業海隅之士謂之劉先生北史曰楊愔字遵彦𢎞農華隂人楊津子也小名秦王兒童時口若不能言而風度深敏六嵗學史書十一習詩易好左氏春秋仕至開府儀同三司尚書右僕射邢子才邢邵己見有書甚多不甚讐校見人校書常笑曰何愚之甚天下書至死讀不可遍焉能始復校此且誤書思之更是一適李百藥齊書曰子才妻弟李節才學之士謂子才曰世間人多不聰明思誤書何由能得子才曰若思不能得便不勞讀書盧叔彪少便機悟豪舉輕俠好竒䇿慕諸葛亮之為人北史曰叔彪盧觀之弟范陽涿人韋敬逺韋夐己見雅好名義虚襟善誘雖耕夫牧䜿亦接對歡然與族人處𤣥及安定梁曠為放逸之友韋敬逺少愛文史留情著述手自抄録數十萬言晚年虚静唯以體道㑹真為務舊所著述咸削其藁北史曰韋敬逺作終戒曰昔士安以蘧蒢束體王孫以布囊繞尸二賢髙達非庸才能繼吾死之日可歛舊衣勿更新造使棺足周尸牛車載柩墳髙四尺壙深一丈其餘煩雜悉無用也朝晡奠食於事彌煩吾不能頓絶汝輩之情可朔望一奠而已仍薦蔬素勿設牲牢親友以物吊祭並不得受吾終時􅂲為恍惚故預戒汝輩瞑目之日勿違吾志也釋曇延嘗自顧其影言曰余與爾沉淪日久飄泊何歸今可挾道潜形精思出要遂隐于太行山百梯寺僧道宣傳燈録曰釋曇延俗姓王氏蒲州桑泉人世家豪族年十六聴妙法師講湼槃深悟其㫖遂捨俗服進具後器度日新機鍳俊㧞蕭大圜是簡文子幼便聰敏神情俊悟江陵平入魏大見知遇深信因果心安閑放嘗言之曰拂衣褰裳無吞舟之漏網挂冠懸節慮吾志之未從儻獲展禽之免有美慈明之進如蒙北叟之放實勝濟南之徴其故何哉夫閭閻有優游之美朝廷多簮佩之累盖由来久矣留侯追蹤於松子陶朱成術於辛文良有以焉况乎智不逸羣行不髙物而欲辛苦一生何其僻也豈如知足知止蕭然無累北山之北棄絶人間南山之南超踰世網靣修原而𢃄流水倚郊甸而枕平皋築蝸舍於叢林搆環堵於幽薄近瞻煙霧逺睇風雲籍纎草以䕃長松結幽蘭而援芳桂仰翔禽於百仞俯泳鱗於千尋果園在後開窓以臨花卉􅂼圃居前坐簷而看灌甽二頃以供饘粥十畝以給絲麻侍兒五三可充絍織家僮數四足代耕耘沽酪牧羊協潘生之志畜鷄種黍應莊叟之言獲菽尋汜氏之書露葵徴尹君之録烹羔豚而介春酒迎伏臘而候嵗時披良書探至􅄨歌纂纂唱烏烏可以娛神可以散慮有朋自逺揚㩁古今田畯相過劇談稼穡斯亦足矣樂不可支永保性命何畏憂責豈若蹙足入絆申脰就覊遊帝王之門趨宰衡之勢不知飄塵之少選寧覺千祀之斯須萬物營營靡存其意天道昧昧安可問哉嗟乎生若浮雲朝露寧俟長繩繫景實不願之執燭夜遊驚其迅邁百年何幾擎跽曲拳四時如流俛首躡足出處無成語黙奚當非直丘明所耻抑亦仲尼耻之北史曰蕭大圜字仁顯梁簡文第二十子幼聰悟四嵗能誦三都賦侯景殺簡文大圜潜遁獲免元帝降魏大圜至長安周文帝以客禮待之封晉陵縣公蕭理孫在魏境上疆土既狹居常怏快每誦老驥伏櫪志在千里烈士暮年壯心不己未嘗不盱衡扼腕歎咤者久之梁書曰蕭詧字理孫昭明子梁封岳陽郡王李元操少善屬文晚年不復留意文筆人問其故慨然歎曰五十之年倐焉已過􅁂垂素髮筋力已衰宦意文情一時都盡悲夫每於暇日輒引賔客絃歌對酒終日為歡隋書曰李孝貞字元操趙郡平􅁄人魏李順之𤣥孫好學善屬文美於詞令隋文帝徴拜内史侍郎與内史令李徳林叅典文翰王無功王績己見以醉失職託無心子以見􅃐曰無心子以􅁾行聞越王黜之無愠色退而適茫蕩之野王無功集無心子傳曰東皋子始仕以醉罷鄉人或誚之東皋子不屑也退著無心子以見􅃐焉無心子寓居於越越王不知其大人也拘之仕無喜色越國之式有􅁾行者不仕俄而無心子以􅁾行聞於王王黜之無愠色退而將遊於茫蕩之野適過勣之邑而遇機士士撫髀而歎者三曰嘻子賢者而以罪廢無心子不應機士曰願受教無心子曰爾聞蜚㢘氏之説乎昔蜚㢘氏有二馬一者朱鬛白毳龍骼鳯臆驟馳如舞終日不釋鞍竟以熱死一者重脛昂尾駝頸貉膝踶齧善蹶卉而散諸野終年肥遁是以鳯凰不憎山棲蛟龍不羞泥蟠君子不茍潔以罹患聖人不避穢而飬生東皋子聞之曰善哉不可以加之矣王無功待詔門下省故事官給酒日三升或問待詔何樂耶無功答曰良醖可戀耳侍中陳叔達聞之日給一斗時號斗酒學士劉昫唐書曰陳叔達字子聰陳宣帝第十六子也善容止有才學在陳封義陽王年十餘嵗嘗侍宴賦詩十韻援筆便就僕射徐陵甚竒之入隋久不得調武徳四年拜侍中大樂署史焦革家善釀王無功求為大樂丞吏部以非流不許無功固請曰有深意竟除之革死其妻送酒不絶嵗餘又死無功曰天不使我酣美酒耶遂棄官去顔師古多蔵古人圖畫是性所篤愛劉昫唐書曰顔籀字師古雍州萬年人齊黄門侍郎之推孫也其先居瑯琊世仕江左之推始居關中父思魯以學藝稱師古博覧羣書尤精詁訓拜秘書少監時論稱其納賄出為栁州刺史師古既負其才頻有罪譴意甚䘮沮自是闔門守静杜絶賔客放志園亭葛巾野服搜求古跡及古器耽好不已杜如晦英爽喜書以風流自命阮逸中説注曰杜如晦字克明唐太宗時典章文物皆杜所定李襲譽性好讀書手不釋卷居家以儉約自處所得俸禄散給宗親餘貲寫書數萬卷每謂子孫曰吾不好貨財以至貧乏京城有賜田十頃耕之可以充食河南有桑千株蠶之可以充衣所寫得書讀之可以求官吾殁之後汝曹勤此三事可以無求於人矣時論多之大唐新語曰李襲譽為揚州江淮俗尚商賈不事農業襲譽引陂塘水又築句城塘以灌田八百餘頃百姓思之東方虬自言二百年後乞你與西門豹作對唐詩紀事曰虬武后時左史年陳子昂集寄東方左史修竹篇序曰文章道弊五百矣漢魏風骨晉宋莫傳然而文獻有可證者常觀齊梁詩彩麗競繁而興寄都絶每以永歎昨見明公孤桐篇骨氣端翔音韻頓挫光英明韻有金石聲遂用洗心收視發揮幽鬰不圖正始之音復覩於兹王義方己見將彈李義府懼不㨗沉吟者久之他日忽言曰非但為國除蠧亦乃名在身前遂彈焉坎坷以至於終劉昫唐書曰李義府饒陽人善屬文對䇿擢第以劉洎馬周之薦除監察御史髙宗將立武氏為皇后義府宻申協賛擢中書侍郎既處權要有忤意者輒加傾陷柔而害物時人謂之李貓義方傳義方廷劾義府曰臣聞附下罔上聖主之所宜誅心狠貌恭明時之所必罰是以隐賊掩義不容唐帝之朝竊幸乗權終齒漢王之劍中書侍郎李義府因縁際㑹遂階通顯不能盡忠竭節對敭王休䇿蹇勵駑祗奉皇眷而反憑附城社蔽虧日月請托公行交遊羣小貪冶容之美原有罪之淳于恐漏洩其謀殞無辜之正義雖挾山超海之力望此猶輕廻天轉日之威方斯更劣此而可恕孰不可容金風届節玉露啓塗霜簡與秋典共清忠臣將鷹鸇並擊請除君側少答鴻私碎首玉階庶明臣節髙宗以義方毁辱大臣言詞不遜左遷萊州司户蘇頲己見掌文誥嘗八月十五夜禁中直宿與諸學士翫月時長天無雲月色如晝蘇曰清光可愛何用燈燭遂令撤去李太白云予小時大人令誦子虛賦私心慕之及長南遊雲夢覽七澤之壯觀酒隐安陸者十許年李白晚度牛渚磯至姑孰悦謝家青山欲終焉及卒遂葬山麓李長源嘗語肅宗曰臣絶粒無家禄位第宅皆非所欲收復京師後得枕天子膝睡有司奏客星犯帝座一動天文足矣劉昫唐書曰李泌字長源少聰敏博渉經史精究易象善屬文以王佐自命天寳中上書召見待詔翰林楊國忠忌之潜遁名跡以習隐自適肅宗至靈武泌自嵩潁赴行在陳古今成敗之機延致臥内動皆顧問泌稱山人固辭官秩特以散官寵之李徳裕己見不樂應舉其父丞相李吉甫己見勉之答曰好驢馬不入行遂以品子叙官世言白樂天所藴不得施乃放意文酒醉吟先生白居易己見與嵩山僧如滿為空門友平泉客韋楚為山水友劉夢得為詩友皇甫明之為酒友韋表微為御史裏行不樂曰爵禄譬如滋味人皆欲之吾年五十拭鏡剪白冐遊少年間取一班一級不見其味也將為松菊主人不愧陶淵明云劉昫儒林儔曰韋表微元和中拜監察御史少尅苦自立著九經師授譜春秋總例諸書唐衢應進士不第能為歌詩意多感發見人文章有歎傷者讀訖必哭涕泗不能已每與人言論發聲一號音詞哀切聞者莫不悽然嘗遊太原屬戎帥軍宴衢得預㑹酒酣言事抗音而哭一席不樂為之罷㑹故世稱唐衢善哭李肇國史補曰唐衢周鄭客也有文學老而無成唯善哭天隨生陸龜蒙己見宅荒少墻屋多隙地前後皆𣗳杞菊以供杯案至夏中枝葉老硬氣味苦澁猶責童兒採掇不已有人言千乗之邑非無好事之家日欲擊鮮為具以飽君君獨閉關不出率空腸貯古聖賢道徳言語何自苦如此天隨生笑曰我幾年来忍饑誦經豈不知屠沽兒有酒食耶笠澤業書杞菊賦曰惟杞與菊偕寒互緑或穎或苕煙披雨沐我衣敗綈我飯脱粟羞慙齒牙茍且梁肉蔓延駢羅其生實多爾杞未棘爾菊未莎其如予何其如予何鄭少師於里第植小松七本號七松處士嘗曰異代可對五栁先生宋祁唐書曰鄭熏字子溥以太子少師致仕再知禮部舉所引皆寒俊士𩔖稱之既老號所居為隐巖蒔松于庭稱七松居士裴休己見披毳衲於歌嫗院持鉢乞食曰不為俗情所染可以説法為人皮日休放誕自號間氣布衣唐詩紀事曰皮日休字襲美襄陽人咸通中太常博士遭亂歸吳黄巢寇江浙刼以從軍以為偽學士令之作䜟日休曰欲識聖人姓田八二十一欲知聖人名果頭三屈律巢大怒蓋巢頭醜掠􅁂不盡疑譏之也遂及禍司空表聖司空圖己見自目為耐辱居士司空表聖作亭觀素室悉圖唐興節士文人劉昫文苑傳曰圖晚年為文尤事放達嘗擬白居易醉吟傳為休休亭記曰司空氏禎貽溪之休休亭本名濯纓亭為陜軍所焚天復癸亥復葺於壞垣之中乃更名曰休休休休也美也既休而具美存焉盖量其才一宜休揣其分二宜休耄且瞶三宜休又少而惰長而率老而迂是三者皆非濟時之用又宜休也尚慮多難不能自信既而盡寢遇二僧曰吾嘗為汝師汝昔矯於道鋭而不固為利欲所拘幸悟而悔將復從我於是溪耳且汝雖退亦嘗為匪人所嫉宜耐辱自警庶保終始與醉吟靖節第其品級於千載之下復何求哉因為耐辱居士歌題於東北楹曰咄語休休休莫莫莫伎倆雖多靈性惡頼是長教閑處着休休休莫莫莫一局棊一爐藥天意時情可料度白日偏催快活人黄金難買堪騎鶴若曰爾何能答曰耐辱莫其詭激嘯傲多此𩔖李文正罷相為僕射奉朝請居昭慶坊去禁門遼逺五鼓即起置白傅集數册於茶鐐中至安逺門仗舍燃燭觀之俟啓鑰則赴朝陳后山談叢曰李昉字明逺深州人周朝知開封府時人望已歸太祖昉獨不附王師入京昉又不朝貶延州别駕在延州為生業以老後宰相奏其可大用召判兵部既至上勞之昉曰臣前日知亊周而已今以事周之心事陛下上喜曰宰相不謬薦人太宗命蘇易簡講文中子有楊素食經上因問食品稱珍何物為最易簡曰臣聞物無定味適口者珍臣止知虀汁為美太宗笑問其故曰臣憶一夕寒甚擁爐燒火乗興痛飲大醉就寢四鼓始醒以重衾所擁咽吻燥渴時中庭月明殘雪中覆一虀盎不暇呼童披衣掬雪以盥手亟引數缶連沃濁肺咀虀數莖燦若金脆臣此時自謂上界仙厨鸞脯鳯腊殆恐不及屢欲作氷壺先生傳因循未暇也太宗笑而然之東都事畧曰蘇易簡字太簡梓州銅山人少好學風度凝粹弱冠舉進士厯官翰林學士性嗜酒太宗嘗以詩戒之入直雖不敢飲在私第未嘗不醉及其死太宗曰易簡果以酒敗可惜也种明逸至性嗜酒嘗種秫自釀每曰空山清寂聊以飬和因號雲溪醉侯王聖塗澠水燕談曰种放字明逸舉進士不第隐於南山豹林谷學行髙古從學者尤衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝景徳中召至闕真宗欲大用放固辭乃放還山張忠定張詠己見自號乖崖以為乖則違衆崖不利物陳堯佐退居鄭圃尤好詩什張士遜判西京以牡丹花及酒遺之堯佐答曰有花無酒頭慵舉有酒無花眼懶開正向西園念蕭索洛陽花酒一時来當時稱其有韻孔平仲談苑曰陳堯佐字希元修真宗實録特除知制誥舊制須召試唯楊億與堯佐不試而授兄堯叟弟堯咨皆舉進士第一兄弟貴盛當世少比晏元獻公晏殊己見雖早貴奉飬極約惟喜賔客未嘗一日不宴飲盤饌皆不預辦客至旋營之蘇丞相頌嘗在公幕見毎有佳客必留但人設一空案一杯既命酒果實蔬茹漸至亦必以歌樂相佐談笑雜出數行之後案上已粲然矣稍闌即罷遣歌樂曰汝曹呈藝已畢且去乃具筆札相與賦詩率以為常前軰風流未有其比歐陽公言吾集古録一千卷蔵書一萬卷有琴一張有碁一局而常置酒一壺吾老於其間是為六一遂號六一居士自為傳刻石石曼卿於􅇬後自作一庵常醉卧其間名曰捫虱楊褒家雖甚貧特好書畫竒玩充實中槖家姬數人布裙糲食而歌舞妙絶歐陽公贈之詩云三脚木牀坐調曲盖紀實也澠水燕談録曰楊褒華陽人家甚貧好古博物孫龍圖喜讀書晚年病目乃擇卒伍中識字稍解事者二人使其子取西漢左氏等數書授以句讀每瞑目危坐室中命二人更讀於傍終一䇿則易一人飲之酒一盃使退卒亦自喜不以為難宋史曰孫覺字莘老髙郵人從胡瑗學厯官御史中丞以疾請罷除龍圖閣學士提舉醴泉觀胡旦己見作大硯可數尺鑱其旁曰宋胡旦作漢春秋硯遺命埋冢中劉貢父所居在宋門城下城脅有地可方八尺餘去地一丈以上每登以眺逺其子戱曰此閶闔臺劉攽己見東都事畧曰攽與兄敞同學自刻厲博讀羣書言行髙逺名亞敞焉韓持國韓維己見喜聲樂遇極暑輒求避屢徙不如意則卧一榻使婢執板緩歌不絶聲展轉徐聴或頷首撫掌與之相應往往不復揮扇司馬文正公嘗與人書曰草妨歩則薙之木碍冠則芟之其他任其自然相與同生天地間亦各使遂其生耳王荆公不耐静坐非卧即行晚卜居鍾山謝公墩自山拒城適相半謂之半山嘗畜一驢毎食罷必日一至鍾山縱歩山間倦則即定林寺而睡往往至日昃乃歸率以為常有不及終往亦必跨驢中道而還此蔡天啓薛肇明見之東都事畧曰蔡肇字天啓丹陽人師事王安石長於歌詩蘇子瞻在黄州及嶺外每旦起不招客與語必出而訪客所與遊亦不盡擇各隨其人髙下談諧放蕩不復為畛畦有不能談者則强之使説鬼或辭無有則曰姑妄言之於時聞者無不絶倒東坡在嶺海間最喜讀陶淵明栁子厚集謂之南遷二友東坡云爛蒸同州羊灌以杏酪食之以匕不以筋南都撥心麵作槐葉温淘糝以襄邑抹猪炊共城香稻薦以蒸子鵝吳興庖人砟松江鱸鱠既飽以廬山康王谷水烹曾坑鬭品少焉觧衣仰卧使人誦東坡赤壁前後賦亦一大快東坡言嶺南氣候不常吾謂菊花開時乃重陽凉天佳月即中秋不須以日月為斷十月初菊始開與客作重九因次韻淵明九日詩登遊盡醉而返范堯夫范純仁己見每仕京師早晚二膳自己身以至婢妾皆治於家往往鐫削過為簡儉有不飽者雖晚登政府亦然補外則付之外厨加料幾倍無不厭餘或問其故曰人進退雖在己然未有不累於妻孥者吾欲使居中則勞且不足在外則逸而有餘故處吾左右者朝夕所言必以外為樂而不顧戀京師於吾亦一助也前軰嚴於出處每致意如此田承君云頃為金陵酒官有王荆公處一老兵時来沽酒必問公之動止兵云相公每日只在書院讀書時時以手撫床而歎人莫測其意聞見録曰田畫字承君陽翟人宣簡公之姪也人物雄偉議論慷慨深有前軰之風王仲弓浮沉久不仕超然不嬰世故慕嵇叔夜陶淵明之為人硯北雜志曰王寔字仲弓許昌人文恪公陶之子未冠從司馬温公學公不以膏粱蓄之教以名節仲弓超然不以仕宦進取為意韓持國歸以女范蜀公以耆老退居忘年接之蘇黄門蘇轍己見南遷既還居許下多杜門不通賔客有鄉人自蜀来見之伺候於門彌旬不得通宅南有叢竹竹中為小亭遇風日清美或徜徉亭中鄉人既不得見謀之閽人閽人使待於亭旁後旬日果出鄉人因趨進黄門見之大驚慰勞久之曰子姑待我於此翩然而入迨夜竟不復出張文潜云范丞相范堯夫己見司馬太師司馬文正公己見俱以閑官居洛中余時待次洛下一日春寒中謁之先見溫公時寒甚天欲雪温公命至一小書室中坐談久之爐不設火語移時主人設栗湯一杯而退後至留司御史臺見范公纔見主人便言天寒逺来不易趨命溫酒大杯滿釂三杯而去此事可見二公之􅃐各異盧秉侍郎嘗為江南小郡司户叅軍於傳舍中題詩云青衫瘦馬病叅軍旋糶官糧置酒樽但得有錢留客醉也勝騎馬傍人門王荆公過而見之尤極稱賞俄薦于朝數年間遂超顯仕范成大吳郡志曰盧秉本徳清人父革舉神童累官太子賔客退居于吳遂為吳人秉元豐中為發運使每嵗上計必請還鄉省侍後帥涇原懇乞歸飬手詔慰勉時以為榮茅山元符宮有蘇飬直象自賛其上曰松風颼颼瘦藤在手唯此白叟獨全于酒荃翁貴耳集曰蘇庠字飬直父伯固從東坡遊東坡我夢扁舟遊震澤之詞為伯固作也飬直屬玉雙飛水滿塘之句亦見賞於坡坡呼為吾家飬直葉少藴言余家蔵書三萬餘卷䘮亂以来所亡幾半山居狹隘餘地置書囊無幾雨漏鼠齧日復蠧敗今嵗出曝之閱兩旬纔畢其間往往多余手抄日取所喜觀者數十卷命門生從旁讀之不覺至日昃舊得釀法極簡易盛夏三日輒成色如潼醴不減玉友每晚凉即相與飲三杯而散亦復盎然讀書避暑固是佳事况有此釀忽記歐公詩有一生勤苦書千卷萬事消磨酒十分慨然有當於心宋史曰葉夢得字少藴蘇州吳縣人嗜學蚤成多識前言往行談論亹亹不窮仕至江東安撫制置使提舉洞霄宮卒于湖州林時隐博學多聞深明象緯聚書數千卷皆自校讐語子孫曰吾與汝曹獲良産矣宋史曰林霆字時隐與鄭樵為金石交林光朝嘗師事之趙子固清放不覊好飲酒醉則以酒濡髮歌古樂府自執紅牙以節曲陶南村輟耕録曰趙孟堅字子固自號彛齋宋宗室也寓居嘉興之廣陳酷嗜古法書名畫耶律和尚雅有美行數以財恤親友人皆愛重然嗜酒不事事故不獲柄用或以為言答曰吾非不知顧人生如風燈石火不飲將何為晚年沈湎尤甚遼史曰耶律和尚字特黙系出季父房善滑稽重熙初補祗候郎君時帝篤於親親凡三父之後皆序父兄行第於和尚尤狎愛然毎侍宴雖詼諧未嘗有一言之過由是上益重之厯積慶永興宮使累遷至同知南院宣徽使事完顔仲實資質簡重博學有俊才家蔵法書名畫不減中秘宣宗南遷衣冠顛沛奔走仲實盡載書畫一帙不遺徙居汴中客至貧不能具酒肴􅂼飯共食焚香煑茗盡出蔵書談大定明昌以来故事終日不聴客去金史曰完顔璹本名壽孫世宗賜名字仲實博學多才喜為詩工真草書日以講誦吟咏為事與文士趙秉文楊雲翼雷淵元好問李汾王飛伯軰交善謝臯父登子陵西臺以竹如意擊石歌招魂之辭曰魂来兮何極魂去兮江水黒化為朱鳥兮其咮焉食歌竟竹石俱碎失聲大哭人莫能測鄧牧謝臯父傳曰謝翺字臯父延平人蚤事科舉有志當世遭亂憤懣成疾性耿介不以貧累人所居産薪炭秋暮載至杭易米卒嵗少裕則資遊江海訪前代故實著家史補唐詩人無傳者三十餘篇傳近世隐逸數篇趙子昂有琴名松雪但時出横牀未嘗撫弄硯北雜志曰張伯雨少學琴畜一琴名風林嘗從趙子昂論琴子昂以為琴之五音各有改絃法其法不傳世所謂琴者皆不審五音之主徒呶呶耳殆不若秦筝之按宮徵也故伯雨終身不復鼓琴胡石塘送蔡如愚歸東陽詩云薄糜不繼襖不煖謳吟猶是鍾球鳴因指以語蔡曰此余秘宻蔵中休糧方也胡汲仲己見鮮于伯機嘗於廢圃中得怪松一株移植所居齋前呼為支離叟朝夕撫翫以為適硯北雜志曰鮮于樞字伯機漁陽人少為郡吏後以材選為御史大夫掾意氣爽豪晨出載筆櫝與其長廷爭是非一語不合輒欲棄去日晏歸焚香弄翰取鼎彛陳諸几席搜抉㫁文廢欵客至則相對指説吟諷或命觴徑醉中嵗益自刻苦讀書因號困學卒官太常典簿貫酸齋拜翰林侍讀學士知制誥同修國史元史曰蘇雅爾約蘇哈父楚國忠惠公名衮格根蘇爾約蘇哈雅以貫為氏自號酸齋生而神采秀異年十三膂力絶人稍長折節讀書目五行下為文不蹈襲故常其旨皆出人意表忽喟然歎曰辭尊居卑昔賢所尚今禁林清選與所讓軍資孰髙人將議吾矣元史曰公初襲父官為兩淮萬户府達嚕噶齊御軍極嚴稍暇輒投壺雅歌意所暢適不為形跡所拘一日呼弟忽都海涯語之曰吾生宦情素薄顧祖父之爵不敢不襲今已數年矣願以讓弟語已即觧所綰金虎符佩之乃稱疾辭還江南賣藥於錢塘市中詭姓名易冠服人無有識之者偶過梁山濼見漁父織蘆花為被欲易之以紬漁父疑其人陽曰君欲吾被當更賦一詩遂援筆立成竟持被去人間喧傳蘆花被詩其依隐玩世多𩔖此庫庫子山嘗語人曰天下事皆宰相所當言宰相不得言則臺諫言之臺諫不敢言則經筵言之吾得備位經筵得言人所不敢言於天子之前志願足矣元史曰庫庫字子山喀喇氏父博果宻自有傳庫庫肄業國學博通羣書風神凝逺制行峻潔其遇事英發掀髯論辨法家拂士不能過之始授集賢待制累官奎章閣學士院大學士知經筵事曹知白嘗遊京師王侯鉅公多折節與交章辟屢上知白悉謝去曰吾聞冀北多竒士庶幾見之豈齪齪求官者耶即日南歸隐居讀易終日不出户庭或放筆圖畫掀髯長笑人莫窺其際松江志曰曹知白字又𤣥别號雲西其先閩之霍童山人後徙居温宋宣和中景修始遷華亭知白身長七尺美鬚髯性機敏至元中詔遣中書左丞鑿吳松江以策從行功居多大徳戊戌庸田使栁公行水復獻寘閼成隄之法民甚徳之大府薦教諭崑山意不樂遂辭去吾子行沉困市隱不能以自見豐碑巨碣寫其幽曠託焉以自逃者也胡長孺吾子行文塚銘曰吾衍字子行太末人曠放髙不仕之節求室委巷教小學常數十人所著有尚書要畧諸書楊鐡崖雖病困危坐不披文則弄劄翰或理音樂素不喜奕畫謂碁損閑心畫為人役見即屏去楊鐡崖毎至名山川必登髙遐眺想見古人風節曠邁非常人所能測也倪雲林平生無他好翫唯嗜畜古法書名畫持以售者酬之百金無所靳髙勝之韻每發揮於縑素蒼勁妍潤尤得清致晚益務情退棄散無所積屏慮釋累黄冠野服浮遊湖山之間以遂其志顧仲瑛晚年閲佛書有悟遂祝髪稱金粟道人自題其像曰儒衣僧帽道人鞋天下青山骨可埋若説向時豪俠處五陵衣馬洛陽街一時賞其曠達殷奎顧府君墓志曰君諱徳輝字仲瑛姓顧氏崑山人盖四姓之舊也幼頴敏善記誦輕財喜事以意氣自豪年三十更折節讀書崇禮文儒師友其賢者後淮兵入吳聞君將用之乃謝絶塵事營别業於嘉興之合溪漁釣五湖三泖間自稱金粟道人嵗戊申從其子􅁶臨濠而卒語林卷十一
