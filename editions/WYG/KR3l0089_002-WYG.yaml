body:
  text: 語林卷二眀何良俊撰徳行第一中齊髙帝鎮東府朝廷致敬時虞玩之為少府猶躡屐造席髙帝取屐視之訛黒蒵斷以芒接之因問卿此屐已幾載玩之曰初釋褐時買之着已三十年貧士竟不辦易髙帝咨嗟因以新屐與之玩之不受問其故答曰公之賜恩華俱重但􅆱簮弊履復不可遺帝稱善久之南史曰虞玩之字茂瑶㑹稽餘姚人少閑刀筆汎渉書史好臧否人物元徽中為尚書右丞桞侍中頻立大功名位已重時光禄大夫韋祖征州里宿徳侍中每為之拜或勸祖征止之祖征答曰司馬公所為後生楷法吾安能止之哉時人稱其兩得南史曰栁世隆字彦緒元景弟子父叔宗位建威叅軍世隆㓜孤挺然自立雖門勢子弟獨脩布衣之業及長好讀書彈琴渉獵文史音吐温潤元景愛賞異扵諸子言扵宋孝武得召見帝謂元景曰此兒將来復是三公一人謝元暉好奨人才㑹稽孔闇麄有文筆未為時人所知孔稚圭嘗令草讓表以示元暉元暉嗟歎良久自折簡寫之語稚圭曰是子聲名未立應共奨成無惜齒牙餘論蕭子顯齊書曰謝朓字元暉陳郡人少有美名文章清麗觧褐豫章王行叅軍稍遷尚書吏部郎江祏等謀立始安王遥光朓不肯收朓下獄死王僧䖍為武陵太守携諸子姪到郡南史曰僧䖍光禄大夫僧綽弟也父曇首太子詹事僧䖍釋褐太子舍人退黙少交接與𡊮淑謝荘善淑每嘆曰卿文情鴻麗學解深拔而韜光潜實物莫之窺雖魏陽元之射王汝南之騎無以加焉兄子儉中塗得病僧䖍為廢寝食諸人或慰喻之僧䖍曰昔馬援子姪之間一情不異鄧攸扵弟子更逾所生吾實懐其心誠未異古亡兄之𦙍不宜忽諸若此兒不救便當回舟謝職南史僧䖍戒子書曰知汝恨吾未許汝學欲自悔厲或以闔棺自欺或更擇美業亟聞斯唱未覩其實吾未信汝非徒然也往年有意扵史取三國志聚置牀頭百日許復徙業就𤣥汝曽未窺其題目未辨其指歸而終日欺人人不受汝欺也由吾不學無以為訓然重華無嚴父放勛無令子亦各由己耳汝軰竊議亦當云阿越不學何忽自課汝見其一耳不全爾也設令吾學如馬鄭亦復甚勝復倍不如今亦必大减致之有由從身上来也汝自勤數倍許勝劣及吾耳吾雖乏徳素要復推排人間十許年故是一舊物人或以比數汝耳即化之後若自無調度誰復知汝事者舍中亦有少負令譽越超清級者于時王家門中優者龍鳯劣猶虎豹失䕃之後豈龍虎之議况吾不􅀎為汝䕃政令各自努力耳或有身經三公蔑爾無聞布衣寒素卿相屈體父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及欲以前車誡爾後乗也汝年入立境方應從宦兼有室累何䖏復得下帷如王郎時邪各爾身已切義復關吾邪鬼唯愛深松茂柏寜知子弟毁譽事因汝有感故畧叙胷懐張思曼口不言利有財輒散之清言端坐或竟日不食門生見思曼饑為之辦飱南史曰張緒字思曼岱兄子也父演宋太子中舍人緒少知名清簡寡欲從伯敷及叔父鏡從叔暢並貴異之鏡比之樂廣敷云是我軰人暢言扵孝武帝用為尚書倉部郎都令史諮詳郡縣米事緒蕭然直視不以經懐宋眀帝每見輒歎其清淡張思光給假東出世祖問思光住在何䖏思光答曰臣陸䖏無屋舟居非水後日上以問其從兄思曼思曼曰融近東出未有居止權牽小船扵岸上住蕭子顯齊書曰張融字思光吴郡吴人父暢㑹稽太守祖褘有操行融弱冠有名陸慧曉為晉熈王長史立身清肅僚佐造見必起送之或語云長史貴重不宜妄自謙屈陸曰我性惡人無禮不容不以禮䖏人又未嘗卿士大夫或問其故陸曰貴人不可卿而賤者乃可卿人生何容立輕重扵懐抱南齊書曰陸慧曉字叔眀吴郡吴人髙祖玩晉太尉祖萬載侍中父子真元嘉中海陵太守慧曉清介正立不雜交游同郡張暢見其童㓜便嘉異之張思曼亦曰此江東裴樂也謝長史亡後南史曰謝曜小字阿多𢎞㣲之兄歴御史中丞彭城王義康驃騎長史𢎞㣲哀戚過禮蔬食積時雖除服猶不噉魚肉宋書曰謝𢎞㣲初名宻曽祖萬晉西中郎將祖韶車騎司馬父思武昌太守𢎞㣲童㓜時精神端審時然後言南史曰𢎞㣲居身清約噐服不華而飲食滋味盡其豐美沙門慧琳嘗詣𢎞㣲𢎞㣲與之共飯見其􅂼食慧琳曰檀越素既多疾頃者肌色㣲損即吉之後猶未服膳若以無食傷生豈所望扵得理𢎞㣲答曰衣冠之變禮不可踰在心之哀實未􅀎已因而廢食歔欷不自勝宋末江左無復鰒魚一枚直錢數千文有餉禇彦回禇淵别見三十枚者時彦回雖貴而貧過甚門人請賣之可得十萬錢彦回曰我謂此是食物聊爾受之雖復儉乏寜可賣餉取錢即與親㳺噉之少日都盡蕭子顯齊書曰禇淵字彦回河南陽翟人祖秀之宋太常父湛之驃騎將軍尚主彦回少有世譽復尚文帝女湛之卒彦回推財與弟唯取書數千卷仕宋為司空後為齊朝佐命官至侍中司徒裴昭明為長沙郡丞罷任歸南齊書曰裴昭眀河東聞喜人宋大中大夫松之孫父駰南中郎叅軍昭眀少𫝊儒史之業泰始中太學博士建武初為王𤣥邈安北長史刺史王藴謂曰卿清貧必無還資湘中人士有湏一禮之命者我不愛也昭明曰下官忝為邦佐不􅀎光益上府豈以鴻都之事仰累清風南史曰王藴字彦深景文兄子也裴始安在郡還甚貧罄世祖曰裴昭眀罷郡歸遂無宅我不諳書不知古人中誰比蕭子顯齊書曰裴昭眀永眀三年使虜世祖曰以卿有將命之才當以一郡相賞還為始安内史沈約撰宋書劉璠梁典曰沈約字休文吴興武康人少為蔡興宗所知引為安西記室梁興稍遷侍中丹陽尹擬立𡊮粲傳以審世祖世祖曰𡊮粲自是宋家忠臣宋書曰𡊮粲字景倩陳郡陽夏人太尉淑兄子也父濯早卒祖母哀其㓜孤名之曰愍孫好學有才清整持風操自遇甚厚著妙徳先生傳以自況曰有妙徳先生陳國人也氣志淵虚姿神清映性孝履順栖冲業簡有舜之遺風先生㓜多疾踈􅈸無所營尚然九流百氏之言雕龍談天之藝皆泛識其大歸而不以成名家貧嘗仕非其好也混其聲迹晦其心用席門常掩三逕裁通雖揚子寂漠嚴叟沈冥不是過也修道遂志終無得而稱焉又嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂唯國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂扵是聚謀共執國主療其狂疾火艾針藥莫不畢具國主不任其苦到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水愍孫㓜慕荀奉倩白世祖求改名為粲不許至是言扵太宗乃改為粲字景倩後齊王功徳既重天命有歸粲以身受顧托不欲事二姓宻有異圗由是遇害約又多載孝明帝諸鄙瀆事上遣左右謂約曰孝武事迹不容頓爾我昔經事宋眀帝卿可思諱惡之義由是多所省除顔見逺仕齊為御史正色立朝有當官之稱及梁武執政以疾去官尋齊和帝暴崩見逺慟哭而絶梁帝深恨之語諸人曰我自應天從人何預天下人事而顔見逺乃至扵此姚思亷梁書曰顔見逺瑯琊臨沂人六代祖含晉侍中見逺博學有志行初齊和帝之鎮荆州以見逺為録事叅軍及即位以為治書侍御史兼中丞阮長之為中書郎直省夜往隣省誤著屐出閤長之依事自列門下以闇夜人不知不受列状長之固遣送曰長之一生不侮闇室南史曰阮長之字景茂一字善業陳留尉氏人祖裕晉光禄大夫父普驃騎叅軍長之少有孝性除臨海太守在官常擁敗絮先是郡中田禄以芒種為斷此前去官則一年秩禄皆入後人長之去武昌代人未至以芒種前一日解印綬去時論多之徐孝嗣拜儀同齊書曰徐孝嗣字始昌東海郯人祖湛之宋司空父聿之著作郎並為太祖所殺孝嗣㓜挺立風儀端簡官尚書令謀廢少主賜藥酒卒歛容謂左右曰吾徳慙古人位登衮職將何以堪之明君可以理奪必當死請若不獲命正嘗角巾邱園待罪家巷耳劉祭酒吴均齊春秋曰劉瓛字子珪沛國相人晉丹陽尹惔六世孫也五嵗聞舅孔昭先讀管寜𫝊欣然更請讀因聽受曰可及此耳弟璡方軌率直祭酒嘗夜呼璡共語璡不時答方下床著衣立然後應祭酒怪問其久璡曰向束帶未竟蕭子顯齊書曰劉璡字子璥方軌正直宋泰豫中為明帝挽郎後齊文恵太子召璡入侍東宫尋署中兵記室叅軍王茂逺與謝覽約官至侍中不復謀仕進覽自吏部尚書出為吴興郡平心不畏強禦由䖏俗情薄也茂逺為侍中已後雖不退身亦淡然自守南史曰王峻字茂逺王敬宏之曽孫也父秀之侍中峻美風姿善容止仕齊為桂陽内史天監初至中書侍郎昭明太子至性仁孝所生丁貴嬪亡水漿不入口每哭輒慟絶姚思亷梁書曰昭明太子蕭統字徳施髙祖長子也孝謹天至精扵義學後寝疾薨年三十一髙祖遣顧常侍喻㫖曰毁不滅性聖人之制禮不勝䘮比扵不孝有我在那得如此太子乃強進數合自是至葬日進麥粥一升昭明體素壮腰帶十圍至是減削過半每入朝士庶見之莫不下泣南史曰顧協字正禮吴郡吴人晉司空和六世孫清介有志操仕至散騎常侍舎人昭眀與諸賢汎舟𤣥圃池有盛稱此中宜奏女樂太子初無言但詠左太冲招隠詩曰何必絲與竹山水有清音任彦升好交結奨拔士友得其延譽率多升擢衣冠貴逰莫不爭與交親坐上賔客恒有數十時人慕之號曰任君劉璠梁典曰任昉字彦升樂安人四嵗誦古詩數十篇十六舉秀才第一辭章之美冠絶當時官至寜朔將軍新安太守范元琰少便栖遁家甚貧罄灌園自給嘗出行見人盜其菜元琰遽退還母問其故具以實對母問盜者為誰答曰向退走者正畏其愧恥耳今啓其名願勿泄也扵是母子秘之梁書曰范元琰字伯珪吴郡錢塘人祖恱之太學博士徴不至父靈瑜居憂以毁卒元琰時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義然性謙敬不以所長驕人家貧以園蔬為業人有渉溝盜范元琰筍者元琰因伐木為橋以渡之盜者大慙一鄉無復草竊明山賔至性篤實家甚貧困嘗貨所乗車中牛既售受錢山賔語買主曰此牛經患漏蹄治差已久􅂲後脫發無容不相語買主遽追取錢䖏士阮孝緒聞之歎曰此言足使還淳反朴激薄停澆矣阮孝緒别見梁書曰明山賔字孝若平原鬲人父僧紹隠居不仕山賔七嵗􅀎言𤣥理十三博通經𫝊居䘮盡禮服闋州辟從事史起家奉朝請累遷中書侍郎眀山賔初臨青州所部平陸縣嵗儉啓倉出米以贍貧民後刺史檢州曺失去簿書以山賔為耗闕有司追責籍其宅入官山賔黙不自理更市地造宅劉璠梁典曰梁昭眀太子聞山賔築室不就令曰眀祭酒出撫大藩擁旄推轂挕金拖紫而恒事屢空聞搆宇未成今送薄助并貽以詩曰平仲古稱竒夷吾昔擅美今則挺伊賢東秦固多士築室非道傍置宅歸仁里庾桑方可繫原生今易擬必来三徑人將招三徑士庾子輿少有至性父域卒官巴西子輿奉䘮歸至巴東滛預石瞿塘大灘秋水猶壮子輿撫心長呌其夜五更水忽減退安流南下及度水壮如舊時人為之語曰滛預如幞本不通瞿塘水退為庾公南史曰庾子輿字孝卿南陽新野人父域有孝行母好鶴唳域孜孜營求一日䨇鶴来下子輿幼而岐嶷五嵗讀孝經手不釋卷或曰此書文句不多何用自苦答曰孝者徳之本何謂不多傅茂逺泊然静䖏不妄交逰𡊮司徒𡊮粲已見每經其户輒歎曰經其户寂若無人披其帷其人斯在豈得非名賢南史曰傅昭字茂逺北地靈州人晉司𨽻校尉咸七世孫也蒞官常以清静為政不尚嚴肅居朝廷無所請謁普通五年為散騎常侍顧常侍清介持操為廷尉正時冬服單薄寺卿蔡子度蔡廓别見謂人曰我欲解身上襦與顧郎􅂲顧郎難衣食者竟不敢遺之顧協已見南史曰協少有志操内弟張言率極推重之嘗薦扵武帝帝問協年率三十五帝曰北方髙凉四十強仕南方卑濕三十便衰如協便為已老但其事親孝與友信亦不可遺扵草澤卿便稱勑喚出扵是以協為太常博士張士簡嗜酒踈脫扵家務尤所忘懐在新安時遣家僮載米三千斛還吴耗失大半士簡問其故答曰雀䑕耗也士簡笑曰壮哉雀䑕不復研問南史曰張率字士簡吴郡吴人祖永宋征北將軍父瓌右光禄大夫率性寛雅十二􅀎屬文歴黄門侍郎出為新安太守髙伯恭魏收魏書曰髙允字伯恭勃海蓨人漢太傅褒之後曽祖慶慕容垂司空祖泰吏部尚書父韜魏道武丞相叅軍允少孤夙成有竒度年十餘嵗祖父䘮還本郡允推財與二弟而為沙門名法浄未久而罷性好文學擔笈負書千里就業博通經史天文術數仕至秘書監與廣平游雅魏書曰游雅字伯度小名廣頭廣平任人與髙允俱知名徴拜中書博士性剛戅好自矜誇凌獵人物髙允重雅文學而雅素輕允允性寛不以為恨允將婚于邢氏雅勸允娶其族允不從雅曰人貴河間邢不勝廣平游人自棄伯度我自敬廣頭其貴已賤人皆此𩔖太原張偉儒林傳曰張偉字仲業太原中都人學通諸經儒謹汎納雖有蒙固偉告喻殷勤曽無愠色常依附經典教以孝弟門人感其仁化事之如父性清雅非法不言大武時與髙允等俱辟授博士遷中書侍郎同業相友雅嘗論伯恭曰夫喜怒者有生所不能無前史載卓公寛中文饒洪量􅄶心者或弗之信余與髙子逰䖏四十年未嘗見其愠喜之色不亦信哉髙子内文眀而外柔弱其言呐呐不􅀎出口余嘗呼為文子崔公謂余云髙生豐才博學一代佳士所乏者矯矯風節耳余亦然之司徒之譴起扵纎㣲及於詔責崔公聲嘶股戰不􅀎言宗欽已下伏地流汗都無人色髙子敷陳事理申釋是非辭義清辯音韻髙亮眀主為之動容聞者無不稱善仁及僚友保兹元吉向之所謂矯矯者更在斯乎魏書曰崔浩與閔湛等同領著作湛等勸浩刋所撰國史于石以彰直筆允聞之謂著作郎宗欽曰閔湛所營分寸之間􅂲為崔門萬世之禍吾徒無類矣未幾難作初浩被收允直中書省景穆召允留宿宫内翌日謂曰入當見至尊吾自導卿脫至尊有問但依吾說既入見景穆言允小心慎宻且㣲賤制由扵浩請赦之帝召允謂曰國史皆浩作不允曰太祖記前著作郎鄧彦海所撰先帝記及今記臣與浩同作然而臣多扵浩帝大怒曰此甚扵浩安有生路景穆曰天威嚴重允迷亂失次耳帝問如東宫不允曰臣罪應滅族不敢虚妄殿下以臣侍講日久哀臣乞命耳實不問臣不敢迷亂帝謂景穆曰直哉此人情所難臨死不移且對君以實貞臣也寜失一有罪宜宥之扵是召浩前使人詰惶惑不􅀎對允事事申眀皆有條理時帝怒甚勑允為詔自浩以下一百二十八人皆夷五族允持疑不為頻詔催切允乞更一見然後為詔詔引前允曰浩之所坐若更有餘釁非臣敢知直以犯觸罪不至死帝命介士執允景穆拜請帝曰無此人忿朕當有數千口死矣浩竟滅族餘皆身死宗欽臨刑歎曰髙允其殆聖乎宗愛之任勢也威振四海嘗召百司扵都坐王公以下望庭畢拜髙子獨升階長揖由此觀之汲長孺可卧見衛青何抗禮之有向之所謂風節者得不謂此乎知人固不易人亦不易知吾既失之扵心内崔亦陋之扵形外鍾期止聽扵伯牙夷吾見眀扵鮑叔良有以也北史曰宗愛不知所由来以罪為閹人歴碎職至中常侍後矯詔立吴王余位居元輔録三省兼總戎禁坐召公卿權恣日甚内外憚之盧度世以崔浩事逃在髙陽鄭羆家羆匿之使者逮羆長子羆誡之曰君子殺身以成仁汝雖死勿言其子奉命大被拷掠乃至火􅅡其體以死卒無所言北史曰度世字子遷㓜聰達有計數與從兄遐俱以學行為時流所重度世官至侍中楊津拜司空日當時府主皆自引僚佐有人就津求為幕屬津曰此事湏家兄裁之何為見問北史曰楊津字羅漢𢎞農華隂人兄播華州刺史椿累官太保津至司空家世純厚並敦義譲兄弟相事有如父子旦則聚扵㕔堂終日相對未嘗入内有一美味不集不食㕔堂間幃幔隔障為燕息之所時就休偃還共談笑椿年老他䖏醉歸津扶侍還室仍假寝閣前承候安否椿津年過六十並登台鼎津常旦暮叅問子姪羅列階下椿不命坐津不敢坐椿每近出或日斜不至津不先飯椿還然後共食食則津親授匙箸味皆先嘗椿命食然後食初津為肆州椿在京每四時佳味輒因使次附之若或未寄不先入口一家之内男女百口緦服同爨庭無間言魏世以来唯盧陽烏兄弟及播昆季當世莫逮焉翟暹别見平居侵曉則與兄弟跪問母之起居出理官政暮歸嘗食視寝畢然後至外齋對親賔論事或與沙門談𤣥理夜久還寝一生不問家産牛𢎞弟弼好酒而􅒬嘗因醉射殺𢎞駕車牛𢎞還宅夫人迎謂曰叔射殺牛𢎞聞之無所怪問直答曰作脯坐定其妻又言叔射殺牛大是異事𢎞言已知顔色自若讀書不輟北史曰牛𢎞字里仁安定鶉觚人襁褓時相者見之謂其父曰此兒當貴善愛養之及長􅂡貌甚偉性寛裕好學博聞開皇初授秘書監大業中進位上大將軍崔彦𤣥清虚寡欲以簡正見稱李百藥齊書曰崔劼字彦𤣥清河人父孝伯侍中劼少清虚寡欲好學有家風魏末累遷中書侍郎初和士開擅朝曲求物譽北史曰和士開字彦通清都臨漳人㓜聰慧為國子生解悟㨗疾為同業所尚以傾巧便僻有寵扵齊神武仕至尚書左僕射諸公因此頗為子弟干禄世門之胄多䖏京官彦𤣥二子並為外任弟廓之從容言曰拱擴幸得不凡何為不在省府之中清華之所而並出外藩有損家代彦𤣥曰吾立身以来恥以一言自達今若進兒與身何異卒無所求陸雲駒􅇜母憂哀慕毁悴殆不勝䘮至沉篤頓昩時第五弟摶遇疾臨終謂其兄弟曰大兄尫病如此性至慈愛摶死之日不可令大兄知哭泣之聲亦不宜聞徹致有感動家人至扵祖載方始告之雲駒聞而悲痛一慟便絶北齊書曰陸卭字雲駒洛陽人昆弟六人並魏藍田公主元氏所生故邢邵嘗謂人曰藍田生美玉豈虚也韋孝寛在延州令狐徳棻後周書曰韋叔裕字孝寛京兆杜陵人世為三輔著姓孝寛沈敏和正渉獵經史弱冠屬蕭寳夤作亂詣闕請為前驅拜統軍随長孫承業西征每戰有功歴大司空出為延州總管兄敬逺至州與孝寛相見將還孝寛以所乗馬及轡勒與敬逺敬逺以其華飾心弗欲之笑謂孝寛曰古人不棄遺簮墜屨者惡與之同出不與同歸吾雖不逮前烈然捨舊録新亦非吾志乃乗舊馬以歸後周書曰韋夐字敬逺志尚夷簡澹於榮利弱冠召拜雍州中從事非其好也謝疾去前後十見徵辟皆不應屬周文帝經綸王業側席求賢聞夐養髙不仕虚心敬恱遣使辟之備加禮命雖情諭甚至竟不能强李徳林父校書亡時正嚴冬單衰徒跣自駕靈輿反𦵏故里時博陵豪族有崔諶休假還鄉車服甚盛將赴吊徳林從者數十騎稍稍減留比至徳林門纔餘五騎云不得令李生怪人熏灼隋書曰李徳林字公輔博陵安平人父敬族太學博士徳林㓜聰敏數嵗誦左思蜀都賦十日便度十五誦五經古今文日數千言􅔜博墳典隂陽緯候無不通渉善屬文詞覈而理暢隋文帝時為相府屬加儀同大將軍房彦謙雖有禄仕務存儉素恒致屢空怡然自得嘗從容獨笑顧謂其子𤣥齡曰人皆以禄富我獨以官貧所遺子孫唯在清白耳所著文筆恢廓閑雅有古人深致時太原王劭北海髙孝基蓨縣李綱河東栁彧薛孺皆一時知名之士彦謙並與為友雖冠盖成列而門無雜賔體資文雅深達政務有識歸之隋書曰彦謙清河東武城人天性頴悟受學于博士尹琳手不釋卷遂通渉五經解屬文雅有詞辯風槩齊廣寜王為齊州刺史辟為主簿終司𨽻刺史薛元敬是薛收兄子武徳中為天䇿府叅軍兼直記室劉昫唐書曰薛元敬隋選部侍郎邁子也有文學少與收及族兄徳音齊名時人謂之河東三鳯武徳中為秘書郎太宗召為天䇿府叅軍記室時收與房杜房𤣥齡杜如晦二人别見䖏腹心之寄更相結附元敬謹畏未嘗申欵如晦嘆曰小記室不可得而親不可得而踈唐書曰薛收字伯褒蒲州汾隂人隋内史侍郎道衡子也十二解屬文房𤣥齡薦之太宗即日召見授天䇿府記室叅軍中說曰收也曠而肅温大雅將改葬其祖父筮者曰若葬此地當害兄而福弟大雅曰若得家弟永康我當含笑入地葬訖嵗餘果卒劉昫唐書曰温大雅字彦𢎞太原祁人性至孝少好學以才辯知名仕隋東宫學士髙祖起義兵引為記室叅軍専掌文翰武徳中遷黄門侍郎與弟彦博對居近宻當世榮之李百藥名徳之子文行兼絶四海名流莫不宗仰晚年懸車告老怡然自得穿池築山文酒譚賔以盡平生之志宋祁唐書曰李百藥字重規定州安平人隋内史令徳林子也七嵗能屬文貞觀初拜中書舎人官至散騎常侍霍王元軌唐書曰元軌唐髙祖第十四子也始封吴王少多才藝太宗嘗問羣臣朕子弟中孰賢魏徴曰唯吴王數與臣言未嘗不自失上問前代誰比徴曰經學文雅漢之間平也改封霍王臨徐州與䖏士劉𤣥平為布衣之交或問𤣥平王之所長𤣥平答以無長人問其故𤣥平曰夫人有短所以見長至扵霍王無所不備吾何以稱之太宗嘗賜于志寜張行成髙季輔田志寜言臣家自周魏以来世居關中貲業不墜今行成季輔始營産土願以臣有餘賜不足者帝分其田以與二人唐書曰于志寜雍州髙陵人周太師燕文公謹之曽孫大業末為冠氏長時山東盜起棄官歸鄉里髙祖入關率羣從扵長春宫迎接髙祖甚加禮遇太宗召補記室至尚書僕射局張行成定州義豐人少師事河間劉炫炫曰張子體方正廊廟人也大業末為謁者武徳中補殿中侍御史太宗謂房𤣥齡曰古今用人必因媒介若行成者朕自舉之官至尚書左僕射武髙季輔徳州蓨人父衡隋萬年令季輔少好學兼習藝貞觀初拜監察御史多所彈糺永徽中授光禄大夫行侍中河間王次子晦私第有樓下臨酒肆其人嘗候晦言曰㣲賤之人雖禮所不及然家有長㓜不欲外人窺之家迫眀公之樓出入非便請從此辭晦即日毁其樓唐書曰河間王孝恭髙祖從父兄子也次子晦累官營州都督以善政聞璽書勞問李義琰宅無正寝劉昫唐書曰李義琰魏州昌樂人常州刺史𤣥道族孫也身長八尺博學多識上元中累遷中書侍郎弟義璡為市堂材唐書曰李義璡義琰弟官岐州司功叅軍義琰曰以吾為國相甚愧豈可尚營美宇以速禍咎義璡言凡任為丞尉且崇第舎兄位髙安可偪下義琰曰事難全遂物不兩興既䖏貴仕又廣居宇非有令徳必受其殃卒不許其後木腐棄之封氏聞見記曰義琰宅至􅄶廹雖居相位在官清儉竟終于方丈室之内髙宗聞而嗟歎勅將作造堂以安靈座焉戴至徳為尚書右僕射劉昫唐書曰至徳戴胄兄子胄無子以至徳為後乾封中累遷西䑓侍郎父子數年間相繼知國政人以為榮時劉仁軌為左唐書曰劉仁軌汴州尉氏人恭謹好學博渉文史武徳初河南道大使任瓌將上表論事仁軌見其起草為改定數字瓌甚異之遂赤牒補息州叅軍累遷尚書僕射人有所訴仁軌率優容之至徳乃詰究本末理直者宻為奏理終不顯私恩當時人多不知獨稱仁軌為解事僕射常更日聽訟有一嫗詣省至徳已收牒嫗乃復取曰初以為解事僕射今乃非是至徳笑還之人服其長者韋述唐歴曰世稱劉樂城與戴至徳同為端揆劉則甘言接人以收物譽戴正色拒下推美扵君故樂城之善于今未弭而戴氏之績無聞焉嗚呼髙名美稱或因邀飾而致逺深仁至行或以韜晦而莫𫝊豈唯劉戴而然盖自古有之矣故孔子曰衆好之必察焉衆惡之必察焉非夫聖智鮮不惑也郭元振在太學時家中送資錢四十萬㑹有縗服叩門者自言五世未葬願假以治䘮元振舉與之無少吝亦不質其姓氏唐書曰郭元振魏州貴鄉人授通泉尉任侠使氣不以細務介意前後掠賣所部千餘人以遺賔客百姓苦之則天聞召見與語甚竒之累官朔方軍大總管王義方初拜御史意望殊髙忽畧人間細事買宅既數日忽對賔朋指庭中青桐樹一䨇曰此亡酬直賔朋言侍御貴重不知交易樹當随宅無别酬例義方曰此嘉樹非他物比召宅主付之錢四千宋祁唐書曰王義方泗州漣水人客于魏孤且窶事母謹甚淹究經術性謇特髙自標樹不肯造請貴勢素善張亮亮抵罪義方貶吉安丞道南海舟師持酒脯請福義方酌水誓曰有如忠獲戾孝見尤四維廓氛千里安流神之聽之無作神羞時盛夏濤霧蒸湧既祭天雲開露人壮其誠顯慶元年擢侍御史尋以彈李義府貶莱州司户嵗終不調往客昌樂聚徒教授隠居不出王義方舉眀經詣京師客有徒歩疲扵道者自言父宦逺方病且革欲往省覲困不􅀎前義方解所乗馬遺之不告姓名而去王義方為魏徵别見所知徵欲妻以夫人之姪王辭不取俄而徵薨王乃取女人問其故曰初不附宰相今感知己故也李嶠當則天朝拜相后幸其宅見卧青絁帳賜御用繡羅帳易之嶠卧不安席明日奏小時相者謂不當華欲仍用舊帳劉昫唐書曰李嶠趙州賛皇人隋内史侍郎元操從曽孫也代為著姓父鎮惡㐮城令嶠早孤事母以孝聞為兒童時夢有神人遺之䨇筆自是漸有學業弱冠舉進士累轉監察御史神龍二年代韋安石為中書令故事宴集賢院官重者先飲時張說為學士語諸人曰吾聞儒以道相髙不以官閥為先後大帝時修史十九人長孫無忌以元舅每宴不肯先舉爵長安中與修三教珠英當時學士亦不以品秩為限扵是引觴同飲時伏其有體劉昫唐書曰張說字道濟其先范陽人代居河東後徙洛陽弱冠對䇿授太子校書預修三教珠英開元中召說及禮官學士賜宴集賢殿授說集賢院學士蘓昌容轉揚州大都督府長史府據都㑹多名珍怪産前長史貲取巨萬昌容單衣襆被自將劉昫唐書曰蘓瓌字昌容京兆武功人隋僕射威曽孫也祖䕫隋鴻臚卿父朂貞觀中台州刺史瓌弱冠舉進士授豫王府録事叅軍長史王徳貞司馬劉禕之皆噐重之累遷揚州大都督府長史尚書右僕射陸象先在蒲州日小吏有罪但誡遣之大吏爭白以為可杖象先曰人情大抵不相逺謂彼不曉吾言必湏責者當以汝為始大吏慙而退象先嘗曰天下本自無事但庸人擾之為煩爾第澄其源何憂不簡劉昫唐書曰陸象先本名景初蘓州吴縣人天官侍郎元方之子少有噐量應制舉拜揚州叅軍歴中書侍郎清浄寡欲不以細務介意言論髙逺雅為時賢所服崔湜每謂人曰陸公加扵人一等矣太平公主用事宰相蕭至忠岑羲及湜等咸傾附之唯象先孤立未嘗造謁至忠等伏誅象先獨免其難以保䕶功封兖國公時窮討至忠枝黨象先宻有申理全濟甚多然未嘗言及當時無知之者陸象先在官務以寛仁為政司馬韋抱真嘗言望眀公稍行杖罰以立威名不然􅂲下人怠廢象先曰為政者理則可矣何必嚴刑樹威損人益已以傷仁恕之道元延祖年過四十不仕親姻強勸之再調舂陵丞輒棄官去嘗曰人生衣食可適饑飽不宜復有所湏每灌畦掇薪以為有生之役過此吾不思也宋祁唐書曰延祖元結之父三嵗而孤祖仁基曰此兒且祀我因名而字之安禄山反延祖召結戒曰而曺逢世多故不得自安山林勉樹名節無近羞辱云卒年七十六門人私謚曰太先生元紫芝貧時其兄早亡有遺孤朞月其嫂又䘮無乳哺之紫芝晝夜哀號抱其子以已乳含之渉旬湩流遂得長大兄子能食其乳方止劉昫唐書曰元徳秀字紫芝河南人性純朴無縁飾動師古道父為延州刺史徳秀少孤貧事母以孝聞開元中遊京師不忍離親每行則自負板輿與母詣長安母亡廬扵墓所食無鹽酪藉無茵席刺血畫像寫佛經久之以孤㓜牽扵禄仕授邢州南和尉佐治有恵政召補龍武叅軍終魯山令元紫芝為魯山令有清徳門下相與諡為文行先生士大夫髙其行不名謂之元魯山刺史韋詵休沐日登樓見人扵後圃有所瘞蔵訪之羣吏曰此叅軍裴寛宅寛義不以苞苴汙家適有人以鹿為餉致而去不敢自欺故瘞之詵聞而歎異劉昫唐書曰裴寛絳州聞喜人裴漼從祖弟父無晦𡊮州刺史寛通畧以文詞進騎射彈棊投壷特妙景雲中為潤州叅軍刺史韋詵為按察使引為判官清幹善扵剖斷詵重其才以女妻之後應㧞萃舉累官禮郎尚書楊綰至性沈靖獨處一室左右圖史凝塵滿席澹如也劉昫唐書曰楊綰字公權華州華隂人祖温玉則天朝國子祭酒父偘醴泉令皆以儒行稱綰生聰惠䖏羣從之中敏識過人及長好學不倦博通經史九流七畧無不該覽尤工文辭藻思清贍而宗尚𤣥理家貧養母以孝聞補太子正字代元載為中書侍郎集賢殿大學士楊綰始輔政御史中丞崔寛家族富侈城南别墅池觀堂皇為當時第一即日遣人毁之京兆尹黎幹出入從騶御百數省損才留十騎中書令郭子儀在邠州行營方大㑹除書適至音樂散五之四其他聞風靡然自化者不可勝紀世以比山濤謝安楊綰知友皆一時名士或造之者清談終晷未嘗及名利有欲干以世務綰言必𤣥逺不敢發詞内愧而退大歴中徳望日崇天下雅正之士不逺數千里爭趨其門叚秀實初為營田官涇原大將焦令諶強占民田紿與農約熟歸其半嵗旱令謀索入農往訴秀實秀實署牒免之令諶召農責曰我畏叚秀實耶以牒置背上大杖擊二十輿致庭中秀實泣曰乃我困汝即自裂裳裹瘡注藥賣已馬以代償淮西將尹少榮罵令諶曰叚公亷仁惟一馬賣而市穀入汝汝取之不恥汝何能為人令諶大愧流汗曰吾終不可見叚公一夕自恨死劉昫唐書曰叚秀實字成公隴州汧陽人祖達左衛中郎父行琛洮州司馬秀實性至孝沉厚有斷朱泚謀逆時秀實為司農卿泚召秀實議事源休姚令言李忠臣李子平皆在坐秀實戎服與泚並膝語至僣位秀實勃然而起執休腕奪其象笏奮躍而前唾泚面大罵曰狂賊吾恨不斬汝萬叚吾豈逐汝反耶遂擊之泚舉臂自捍纔中其顙流血匍匐而走兇徒愕然初不敢動秀實曰我不同汝反何不殺我兇黨羣至遂遇害焉崔刑部樞夫人是李西平女宋祁唐書曰李晟字良噐洮州臨潭人世以武力仕晟㓜孤奉母以孝聞身長六尺積功至鳯翔隴右涇原節度使封西平王西平生日中堂大宴方食有小婢附崔夫人耳語夫人頷之而去有頃復至王問何事夫人言大家昨夜小不安適使人往候王擲箸怒曰我不幸有此女大竒事汝為人婦豈有阿家體候不安不檢校湯藥而與父作生日吾有此女何用作生日為遽遣走擔子歸身亦續至崔氏家問疾且拜謝教子女不至姻族聞之無不愧歎大唐詔令憲宗時詔曰中書舎人崔樞積學懿文守經據古夙夜講習庶協于中可充皇太子侍讀因話録曰崔樞夫人治家整肅婦妾皆不許時世粧劉敦儒事親至孝親心緒不理每鞭人見血則一日恱暢敦儒常歛衣受杖曽不變容唐書曰敦儒開元史官散騎常侍子𤣥之孫居䘮毁瘠骨立洛中謂之劉孝子官至兵曺叅軍李道樞母盧夫人剛嚴性喜鞭人時道樞名聞已光又在班列往往賔客至門值公方受杖劉昫唐書曰李道樞趙郡人官侍御史嘗乗醉謁中丞獨孤朗朗劾之左授司議郎李師古䟦扈唐書曰師古淄青節度使李納之子憚杜黄裳為相未敢失禮命一幹吏寄錢數千繩并氊車子一乗亦直千緡使者未敢遽送扵宅門伺候累日有緑輿自宅出從婢二人青衣繿縷言是相公夫人使者遽歸以告師古師古折其謀終身不敢改節劉昫唐書曰杜黄裳字遵素京兆杜陵人登宏辭科杜鴻漸深噐重之為郭子儀朔方從事貞元二年為檢校司空兼河中尹封邠國公李汧公少貧客㳺梁宋與諸生共逆旅諸生病且死出白金語汧公曰左右無知者幸君以此葬我餘則君自取之汧公許之托葬宻置餘金棺下後其家来謁汧公共啓墓出金付之劉昫唐書曰李勉字𤣥卿鄭王元懿曽孫幼勤經史長而沉雅清峻徳宗朝以司徒平章事一日上謂勉曰衆人皆言盧杞姦邪朕何不知對曰天下皆知其姦邪獨陛下不知所以為姦邪也時人多其正直勉坦率素淡好古尚竒清亷簡易為宗臣之表善鼔琴好屬詩在相位二十年禄俸皆遺親黨身沒無私積其在天官禮賢下士以廵張叅為判官卒扵幕三嵗之内每遇宴飲必設虚位扵筵次陳膳執酹辭色悽惻論者美之李汧公為嶺南罷鎮歸行到石門停舟悉捜家人犀象投江中而去李約嘗江行與一商胡舟楫相次商胡病篤固邀與約相見以二女託之皆有異色又遺一大珠約悉唯唯及商胡死財寳數萬約皆籍送官與二女求配始殮商胡時宻以夜光含之後親屬来理資物約請官司發掘驗之夜光果在墓中尚書故事曰李約為兵部貟外汧公勉之子也識度清曠逈出塵表與主客郎張諗同官每單床清言達旦不寐冲因話録曰約以近屬宰相子而雅度𤣥機蕭蕭逺陽城年長不肯娶語羣弟曰吾與若孤惸相育既娶則間外姓雖共䖏而益踈我所不忍羣弟義之亦不娶遂兄弟同䖏終身宋祁卓行傳曰陽城字亢宗定州北平人好學貧不􅀎得書求為吏𨽻集賢院竊院書讀之晝夜不出户六年無所不通去隠中條山與弟堦域常易衣出後為諫議大夫以沮裴延齡相出為道州刺史陽城嵗饑屏跡不過隣里屑榆為粥講論不輟有奴都兒化其徳亦方介自約或哀其餒與之食不納後致糠覈數杯乃受任廸簡在李景略幕中宋祁唐書曰任廸簡京兆萬年人天徳李景畧表佐其軍後景畧卒軍中請為天徳軍使景略嘗宴客行酒者誤進醯景略用法嚴迪簡不忍其死飲為釂徐以他辭請易之歸病衉血終不以聞軍中服其長者宋祁唐書曰李景畧幽州良鄉人父承恱檀州刺史宻雲軍使景畧以䕃補幽州府功曺大歴末客河中闔門讀書李懐光為朔方節度署廵官官至天徳軍西受降城都防禦使李廙為尚書左丞有清徳其妹是劉晏夫人晏方秉權嘗造廙延至宴室見其門簾甚弊乃潜度廣狹以麤竹織成簾將以贈廙三擕至門不敢發言而去李實尹京時劉昫唐書曰李實道王元慶𤣥孫以䕃入仕貞元十九年為京兆尹恃寵強愎不顧文法人皆側目貶通州長史甚知韋貫之嘗舉笏示所知曰此其姓名也與吾同里素聞其賢願識之而進扵上或以語貫之曰子今日詣實眀日賀者至矣貫之唯唯數嵗中不往官亦不遷劉昫唐書曰韋貫之本名純八代祖夐號逍遥公父肇吏部侍郎有重名貫之授秘書郎以尚書右丞平章事自布衣至貴位居室無改易歴重位二十年苞苴寳玉不敢到門沉厚寡言與人交終嵗無欵曲未曽偽詞以恱人身歿之後家無羡財語林卷二
