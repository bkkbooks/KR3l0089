body:
  text: 語林卷二十二明何良俊撰夙慧第十六世言早慧者大未必佳自孔文舉小時大中大夫陳韙已有是語殆不然夫黃帝徇齊后稷岐嶷此皆大聖人也豈後果不佳耶蓋人性皆善而根有利鈍若頴脫者最易為善夫既易為善則亦易為惡在所以養之耳後人不論所養而槩責之早慧吁可怪哉陳咸小時父萬年嘗召至牀下教之咸睡去頭觸屏風萬年怒責咸叩頭謝曰具曉所言大要教咸諂也萬年因不復言漢書曰御史大夫陳萬年子咸亢直有異才官廷尉監纍遷尚書黃文彊小時家貧都無僕妾躬執勤苦盡心色養博通經典精究道術時人為之語曰天下無雙江夏黃童東觀漢記曰黃香字文彊江夏安陸人九嵗失母哀毁殆不免喪十二太守劉護召署門下孝子家業虗貧衣食不贍舅龍鄉侯為作衣被不受桓驎年十二張隲文士傳曰桓驎字元龍精鑒好學在伯父太尉坐范曄後漢書曰桓焉字叔元沛郡龍亢人父郁祖榮皆以經學顯名焉位至太尉太尉告客曰此吾弟子有異才殊能作詩賦客乃為詩曰甘羅十二楊烏九齡昔有二子今則桓生驎應聲答曰邈矣甘羅超等絶倫伊彼楊烏命世稱賢嗟豫蠢弱殊才偉年仰慙二子俯愧過言黃子琰少即辨惠建和中嘗日食京師不見子琰祖太尉以狀聞太后詔問所食多少太尉思其對而未知所況子琰年七嵗時在側曰何不言日食之餘如月之初東觀漢記曰黃琬字子琰江夏安陸人琬少失父曾祖香祖瓊並有髙名司徒盛允有疾黃太尉瓊遣子琰候問㑹江夏上蠻賊事副司徒府允發書視畢微戲子琰曰江夏大邦而蠻多士少子琰奉手對曰蠻夷猾夏責在司徒因拂衣辭去孔北海孔融已見年四歲與諸兄食梨輒取其小者人問其故答曰小兒法當取小者孔北海被收時男方九嵗女才七嵗以幼弱得全寄住他舍主人遺以肉汁男飲之女曰今日之禍豈得久活何賴知肉味乎或有言於曹操收之將加戮女謂兄曰若死而有知得見父母豈非至願乃延頸就刑孫策年十四詣𡊮術俄而外通劉豫州來孫便求去𡊮曰劉豫州何若答曰英雄忌人既出下東階劉𤣥德從西階上但得轉顧視孫足下行殆不復能前沈子正小時有異年十一嵗華子魚行風俗見而竒之因呼曰沈郎可登車語乎子正逡巡却曰君子講好㑹宴以禮今仁義陵遲聖道漸壞先生銜命將以禆補先王之教整齊風俗而輕脫威儀猶負薪救火無乃更崇其熾乎子魚慙謝曰自桓靈以來雖多英彥未有見幼童若此者張勃英録曰沈友字子正吳郡人弱冠博學多所貫綜善屬文兼好武事注孫子兵法又辨於口每所至衆人默然莫與為對咸言其茟之妙舌之妙刀之妙三者皆過絶於人權以禮聘既至論王道之略當時之務權斂容敬焉正色立朝清議峻厲為庸臣所譛誣以謀反權以終不為己用害之時年二十九張純吳書曰張純字元基敦之子可吳録曰純少厲操行學博才秀切問捷對容止觀拜郎中𥙷廣德令治有異迹擢太子輔義都尉張儼吳録曰張儼字子節吳人弱冠知名以博聞多識拜大鴻臚使于晉皓曰今南北通好以君有出境之才故相屈行對曰皇皇者華蒙其榮耀無古人延譽之美磨厲鋒鍔思不辱命既至賈充裴秀荀朂等欲傲以所不知而不能屈僕射羊祜尚書何禎並結縞帶之好朱異吳志曰朱異字季文吳郡吳人朱桓子也以父任為郎拜騎都尉代桓領兵孫權與論攻戰辭對稱意權謂異從父驃騎將軍據曰本知季文懀定見之復過所聞俱童少知名嘗同時詣驃騎將軍朱據吳志曰朱據字子範吳郡吳人有姿貌膂力又能論難黃武初拜五官郎中時選曹尚書暨豔疾貪汙在位欲沙汰之據以為天下未定宜以功覆過棄瑕取用舉清厲濁足以沮勸若一時貶黜懼有後咎豔不聽卒敗權咨嗟將率追思吕蒙張溫以據才兼文武可以繼之拜建議校尉據聞三人才名欲試之因語曰老鄙相聞饑渴甚矣夫騕裊以迅驟為功鷹隼以輕疾為妙其為吾各賦一物然後入坐儼乃賦犬曰守則有嚴出則有獲韓盧宋鵲書名竹帛純賦席曰席以冬設簟為夏施揖讓而坐君子攸宜異賦弩曰南嶽之幹鍾山之銅應機命中獲隼髙墉三人皆隨目便賦成而後坐據大笑恱何平叔小時魏武帝納其母平叔少養於魏宫至七八嵗慧心天悟形貌絶美武帝欲以為子每扶持遊觀令與諸子長幼相次平叔微覺此意坐則專席止則獨立或問其故答曰異姓不相貫王戎年七嵗時嘗與諸小兒遊矚看道邉李𣗳有子扳折諸小兒競走之惟戎不動人問之答曰𣗳在道邉而多子此必苦李取之信然愍懷太子少便聰慧武帝甚愛之六七嵗時宫中嘗夜失火武帝登樓望之太子牽上衣裾使入暗中上問其故太子對曰暮夜倉卒宜備非常不宜親近火光令照見人主晉書曰愍懷太子遹字熙祖惠帝長子幼聰慧武帝愛之恆在左右嘗從帝觀豕牢言於帝曰豕甚肥何不殺以享士而使久廢五榖帝嘉其意即便烹之因撫其背謂廷尉傅祗曰此兒當興我家嘗對羣臣稱太子似宣帝於是令譽流於天下張光祿張永已見嘗携內外孫遊武丘山顧正禮時年數嵗光祿撫之曰兒欲何戲正禮答曰兒正欲枕石潄流王養王泰小字年數嵗時祖母集諸孫姪𣪚棗栗於牀群兒競取之泰獨不動祖母問其故曰不取自當得賜梁書曰王泰字仲通幼敏悟好學手所抄寫二千許卷及長通溫和雅家人不見喜愠之色與王筠齊名沈約常曰王有養炬謝有覽舉炬即筠小字也王僧孺五嵗便機警嘗有餽其父冬李者先以一枚與僧孺僧孺不受曰大人未見不容先嘗梁書曰王僧孺字僧孺東海郯人衛將軍肅八代孫曽祖雅晋左光祿大夫祖淮宋司徒長史僧孺六嵗能屬文既長好學家貧傭書以養母所寫既畢諷誦亦通仕齊起家王國左常侍入梁歷吏部郎徐孝穆早慧徐陵已見光宅寺慧雲法師每嗟其早就謂之顔回蕭建平梁書曰蕭大球字仁珽簡文帝子封建平王明惠夙成髙祖歸心釋教每發誓願恆云若有衆生應受諸苦悉請身代時建平年七嵗聞之驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦云凡有衆生應獲苦報悉大球代受其明悟如此𡊮君正年數嵗父疾晝夜不眠專侍左右家人勸令暫休𡊮答曰尊患既未瘥眠亦不安南史曰𡊮君正字世忠陳郡陽夏人祖顗雍州刺史父昂尚書令君正美風儀善自居處早得時譽為豫章內史謝元正幼便聰慧八歲為春日閒居詩從舅尚書王筠竒其有佳致謂所親曰此兒方當大成至如風定花猶落乃追步惠連矣陳書曰謝貞字元正陳郡陽夏人晋太傅安九世孫父藺以孝義稱貞少有至性仕始興王録事參軍陸從典八嵗時讀沈休文集見回文硯銘援筆擬之便有佳致南史曰陸從典字由儀吳郡吳人祖雲公父瓊皆有文才從典篤好學業博涉群書位太子洗馬陳亡入隋為著作佐郎虞荔年九嵗往候太常陸倕倕已見稽陳書曰虞荔字山披㑹餘姚人祖權梁廷尉卿父檢始興王咨議參軍荔幼聰敏有志操官太子中庶子領著作倕問五經十事荔對無遺失倕甚異之弟寄亦機敏南史曰寄字次安少聰敏及長好學善屬文性沖靜有棲遁志弱冠對䇿髙第起家梁宣城王國左常侍陳寶應據閩得寄甚喜承聖中除中書侍郎寶應愛其才托以道阻不遣數嵗時有人造其父遇寄於門嘲寄云郎子姓虞必當無智寄應聲曰文字不辨豈得非愚客大慙入謂其父此子非常人孔文舉之流也魏宗室元子和魏收魏書曰元順字子和文宣王澄之子九嵗時師事樂安陳豐初書王羲之小學篇數千言晝夜誦之旬有五日一皆通徹豐白文宣曰豐十五從師迄于白首耳目所經未見此比江夏黃童不得無雙文宣笑曰藍田生玉何容不爾何妥八嵗時遊太學顧良戲之曰汝姓是荷葉之荷為河水之河妥應聲曰先生姓顧是貨雇之雇為新故之故李德林幼便聰敏年數嵗誦左思蜀都賦十餘日便度髙隆之見而嗟歎遍告朝士云若假其年必為天下偉器鄴京人士多造觀之月餘日中車馬不絶李百藥七嵗時中書舍人陸又嘗過其父德林有讀徐陵文者云刈琅琊之稻坐客並不識其事百藥進曰傳稱鄅人藉稻注云鄅國在琅琊開陽縣人皆服其機頴孫思邈七嵗就學日誦千言弱冠善談老莊兼綜釋典及百家之說洛州總管獨孤信見而歎曰此聖童也蘇瓌初未知頲一日有客詣瓌候於客次頲擁篲庭廡間遺落一文字客取視之乃詠崑崙奴詩云指如十挺墨耳似兩張匙客異之良久瓌出與客淹留言詠以其詩問瓌何人豈非足下宗庶之孽瓌備言其事客驚訝之請瓌加禮收舉必蘇氏令子瓌稍親之有人獻兔懸於廊廡瓌召頲令詠之即應聲曰兔子死蘭彈將來挂竹竿試將眀鏡照無異月中看瓌覽詩異之由是學問日新文章蓋代及帝平內難制誥駱驛皆出於頲時稱小許公蘇頲年五嵗時裴談嘗過其父頲方誦庾信枯𣗳賦避談字諱因易其韻曰昔年移栁依依漢隂今看搖落悽愴江潯𣗳猶如此人何以任皆歎異之嚴挺之薄妻而愛其子武武年八嵗詢其母曰大人常厚𤣥英挺之妾未嘗慰省何至於斯母曰汝父嫌吾寢陋枕席數宵即懷汝自後相棄其母悽咽武亦憤惋候父出𤣥英方睡武持小鐵鎚擊碎其首挺之歸驚愕視之已斃矣左右言小郎君戲運鎚而致此挺之呼武曰汝何戲之甚武曰焉有大朝人士厚其侍妾困辱兒之母乎故須擊殺非戲也父曰真嚴挺之兒劉昫唐書曰嚴挺之華隂人體質昂藏雅有吏幹姚崇深器異之又與張九齡善張欲引之同居相位謂之曰李尚書深承聖眷足下宜一造門挺之素負氣竟不肯詣深為林甫所嫉子武神氣隽爽敏於聞見幼冇成人之風官劒南西川節度使蘇晉數嵗能屬文嘗作八卦論王紹宗見而歎曰此後來王粲也楊綰四嵗時嘗因夜宴客舉令各舉坐中一物以四聲呼之衆皆未言綰應聲指鐵𣗳曰燈盞柄曲聞者歎異開元間悉召能言佛道孔子者相答禁中有員俶九嵗升座詞辨注射坐人皆屈帝異之曰半千孫固應爾因問童子豈有類若者乎俶跪奏有臣舅子李泌帝即馳召之泌至帝方與張說觀奕因使說試其能說請賦方圓動靜泌逡巡曰願聞其略說因曰方若棋局圎若棋子動若棋生靜若棋死泌即答曰方若行義圎若用智動若騁材靜若得意說因賀帝得竒童帝大恱曰是子精神要大於身李衛公李德裕已見幼時父吉甫每誇其敏捷武相元衡召見問曰吾子在家所嗜何書德裕不應翌日元衡以告吉甫吉甫責之德裕曰武公身為宰相不問理國調隂陽而問所嗜書其言不當所以不應髙定是貞公郢之子小字董二年七嵗時讀書至牧誓問奈何以臣伐君貞公答曰應天順人耳又問用命賞於祖不用命戮於社豈是順人貞公不能對髙郢已見劉昫唐書曰髙定小字董二聰明絶倫人以其幼惠多以小字呼之尤精王氏易著易外傳二十二卷楊大年楊億已見七嵗時對客談論有老成風年十一太宗聞其名召對便殿授祕書省正字且謂曰卿久離鄉里得無念父母乎對曰臣見陛下一如臣父母上歎賞久之王元澤數嵗時客有以一獐一鹿同籠以獻問元澤何者是獐何者為鹿元澤實未識良久對曰獐邉者是鹿鹿邉者是獐客大竒之嶽柱年八嵗時觀畫師何澄畫陶母剪髮圗嶽柱指陶母手中金釧詰之曰金釧可易酒何用剪髮為也何大驚即易之元史曰嶽柱字止所一字兼山自幼容止端嚴性頴悟有逺識至大中授集賢學士賢媛第十七夫無非無儀女婦所貴然觀王儒仲樂羊子之妻與孟德耀辛憲英諸人其深識髙行世所稱賢者尚不敢輕擬又豈可以一切少之哉若蔡文姬辱身北庭君子耻之縱文才卓出又何稱焉王儒仲少立髙節其妻亦美志行初儒仲與令狐子伯為友後子伯為椘相其子為郡功曹子伯遣子奉書儒仲車服鮮麗僕從都雅儒仲子方耕於野聞賔至投耒而歸見令狐子沮怍不能仰視儒仲目之有愧容客去久卧不起妻問其故儒仲曰吾與子伯素不相若向見其子容服甚光舉措有適而我兒曹蓬頭歷齒未知禮則見客而有慙色父子情深不覺自失耳妻曰君少修清節不顧榮祿今子伯之貴孰與君之髙奈何忘宿志而慙兒女子乎儒仲屈起笑曰有是哉遂共終身𨼆遁范曄後漢書曰王霸字儒仲太原廣武人王莽時棄冠帶絶交宦建武中徵到尚書拜稱名不稱臣司徒侯霸讓位於霸閻陽毁之曰太原俗黨儒仲頗有其風遂止以病歸𨼆居守志茅屋蓬戶樂羊子遊學七年妻常躬勤養母又逺饋羊子嘗有他舍雞謬入園中姑盜殺而食之妻對雞泣而不餐姑怪問其故對曰自傷居貧使食有他肉姑亦感悟棄去列女傳曰河南樂羊子之妻不知何氏之女有盜欲犯之先劫其姑妻舉刀自刎而死太守以聞以禮葬之號曰貞義樂羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水論語撰考䜟曰水名盜泉仲尼不潄亷者不受嗟來之食禮記曰齊大飢黔敖為食於路以待餓者有䝉𬒮戢屨貿貿而來曰嗟來食曰余唯不食嗟來之食以至於斯從而謝之不食而死仲尼曰其嗟也可去其謝也可食况拾遺求利以汙其行乎羊子大慙乃捐金於野𡊮隗妻馬倫是季長女馬融已見少有才辨融家世豐豪裝遣甚盛初成禮隗問曰婦奉箕帚而已何乃過珍麗乎對曰慈親垂愛不敢逆命君若欲慕鮑宣梁鴻之髙妾亦請從少君孟光之事矣隗言弟先兄舉世以為笑今處姊未適先行可乎對曰妾姊髙行殊邈未遭良匹不似鄙薄茍然而已又問南郡學窮道奧文為辭宗而所在之職輒以貨財為損何耶對曰孔子大聖不免武叔之毁子路至賢猶有伯寮之訴家君獲此固其宜耳隗默然不能屈蔡文姬自胸奴歸後適董都尉董犯法當刑董祀為屯田都尉文姬自詣曹公請之時公卿名士及逺方使驛坐者滿堂曹公謂賔客曰蔡伯喈女在外今為諸君見之及文姬進蓬首徒行叩頭請罪音辭清辨㫖甚酸哀衆為改容曹公曰誠為相矜然文狀已去奈何文姬曰眀公廏馬萬匹虎士成林何惜疾足一騎不濟垂死之命乎操感其言乃特原祀范曄後漢書曰蔡伯喈女名琰字文姬博學有才辨妙於音律適河東衛仲道夫亡無子興平中喪亂為丐奴所獲沒於南胸奴左賢王十二年生二子曹公素與伯喈善遣使以金璧贖之嫁與董祀曹公問蔡文姬聞夫人家先多墳籍猶能憶識之不文姬曰昔亡父賜書四千許卷流離塗炭罔有存者今所誦憶裁四百餘篇曹公言當使十吏就夫人寫之文姬曰妾聞男女之别禮不親授乞給紙筆真草唯命於是繕書送上文無遺誤桓宣武平蜀以李勢妹為妾南康主不即知之後知乃拔刃向李所因欲斫之李在窗梳頭未竟李姿貌端麗見主來徐徐結髮斂手向主神色間正辭甚悽惋主擲刀前抱之曰阿子我見汝亦憐何况老奴續晋陽秋曰溫尚明帝女南康長公主謝鎮西謝尚已見妾阿妃有國色甚善吹笛謝死阿妃誓不嫁郤曇時為北中郎設權計遂得阿妃為妾阿妃終身不與曇言晋書曰郤曇字重熙郤鑒第二子司徒王導辟祕書郎王江州王凝之已見為孫恩所害謝夫人名道韞已見婺居㑹稽太守劉栁聞其名請與談義夫人素聞劉名亦不自阻乃簮髻素褥坐在帳中劉束修整帶造於别榻夫人風韻髙邁叙致清雅先及家事慷慨流漣徐酬問㫖詞理無滯劉退而歎曰實頃所未見曕察言氣使人心形俱服夫人亦云親從凋亡始遇此士聽其所問殊開人心胸晋書曰劉栁字叔惠南陽人劉􅔬之曽孫少登清宦歷尚書左右僕射時右丞傅迪好廣讀書而不解其義栁唯讀老子而已迪每輕之栁云卿讀書雖多而無所解可謂書簏矣時人重其言宋太宗后王是僧朗女沈約宋書曰眀恭王皇后諱貞風琅琊人元嘉五年拜淮陽王妃太宗即位立為皇后帝嘗於宫內大集裸婦人觀之以為歡笑后以扇障面獨無所言帝怒曰外舍家寒乞今共為歡笑何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而裸婦人形體以此為樂外舍之為歡適與此不同帝大怒遣后令起后兄景文以此事語從舅陳郡謝緯曰后在家為儜弱婦人不知今假遂能剛正如此朱百年妻孔氏亦有髙行百年卒於山中蔡興宗為㑹稽太守餉米百斛孔氏遣婢詣郡固辭時人美之以比梁鴻妻劉孝綽三妹嫁琅琊王叔英未詳吳郡張嵊南史曰張嵊字四山吳郡人張稷子也方雅有志操能清言湘東王長史東海徐悱梁書曰徐悱字敬業東海郯人徐勉子也幼聰敏能屬文仕至晋安內史並有文才徐妻尤為清拔鄭善果母崔氏賢眀曉政道每善果理務崔氏常於閣內聽之聞其剖斷合理歸則大恱處事不允母則不與之言善果伏於牀前終日不敢食善果由此厲已為清吏李審諸為御史臺中送祿米到宅其母遣量之賸三石問其故曰御史例不槩又問車腳幾錢答言御史例不還腳錢母怒送賸米及腳錢因責審諸御史皆有慙色肅宗宴于宫中時有蕃將阿布思伏法其妻配掖庭善為優因使𨽻樂工是日為假官之長上及侍宴者笑樂政和公主獨俯首嚬眉不視上問其故公主曰禁中侍女不少何必須得此人使阿布思真逆人其妻亦同刑人不合迫至尊之座果寃耶豈忍使其妻與群優雜處為笑謔之具妾雖至愚深以為不可上亦憫惻為之罷戲趙璘因話録曰政和公主肅宗第三女降栁潭宫中女優有弄假官戲其緑衣秉簡者謂之參軍樁元相元載已見得罪後夫人王氏韞秀少有識量節概頗聞掖庭代宗欲令入宫備彤管針規之任王歎曰王家十三娘二十年太原節度使女十六年宰相妻誰能書得長信昭陽之事得罪亦幸矣堅不從命范櫖雲溪友議曰韞秀王縉相公之女右丞維之姪初王公鎮北京以韞秀嫁元載久而見輕韞秀謂元曰何不增學所有奩幌資裝盡為紙墨之費元到京屢陳時務深契上㫖肅宗擢拜中書按通鑑及劉昫唐書載妻王忠嗣女且王縉與載同時作相史言縉卑體附之故縉終以載得罪不應翁壻同時俱在政府又不應婦翁卑體於女壻則載妻為忠嗣女無疑而雲溪友議與杜陽雜編以為韞秀縉女也夫范攄蘇鶚皆唐時人其所載唐事尚相抵牾如此乃知野史所書固多謬妄也劉異將赴鎮安平公主入辭以異姬從安平左右皆宫人上盡記忽見别姬問安平曰此為誰安平曰劉郎聲音人上大喜安平不妒顧左右曰别與作主人不令與宫娃同處令狐峘為吉州刺史齊映亷察江西故事刺史始見觀察皆戎服庭趨峘以前輩耻為此禮入告其妻韋氏韋氏亦以抹首庭謁為非謂峘曰卿自視何如人頭白走小生前卿如不以此禮見映雖黜死我亦無恨峘乃以客禮見映映深以為憾以事奏貶峘為衢州别駕李景讓母鄭氏性嚴明早寡家貧居於東都諸子皆幼母自教之宅後古牆因雨隤陷得錢盈船奴婢喜奔告鄭鄭往焚香祝之曰吾聞無勞而獲身之災也夫必以先君餘慶矜其貧而賜之則願諸孤他日學問有成乃其志也此不敢取遽命掩而築之李景讓為浙西觀察一左都押衙忤意杖殺之軍中憤怒將變景讓方視事母出坐聽事立景讓於庭責之曰天子付汝以方面豈得妄殺萬一致一方不寧豈惟上負天子使垂白之母銜羞入地何以見汝先人乎命左右禠其衣坐之將撻其背將佐皆泣拜為請久乃釋之軍中遂安中和間時溥既平黃巢獻俘於朝井巢姬妾百數僖宗御大元樓受之宣問姬妾汝等皆勳貴子女世受國恩何為從賊其居首曰狂賊凶逆國家以百萬之衆失守宗祧播遷巴蜀今陛下以不能拒賊責一女子置公卿將相於何地乎僖宗不復問皆戮於市人爭與之酒衆皆悲慟昏醉居首者獨不飲不泣至於就刑神色肅然宋太祖將北征京師喧言軍中欲立㸃檢為天子太祖慎密以告家人曰外間訩訩如此將若之何太祖姊或云即魏氏長公主方在厨引麵杖擊太祖逐之曰丈夫臨大事可否當自决胸懷乃來家間恐怖婦女何為耶太祖默然而出任夢臣任西川路提㸃刑獄以廉節稱卧病不起家徒四壁二女賢甚趙清獻公守成都率僚屬以俸助之二女辭不受曰豈敢以此汙先君清德趙倅成伯篤意勉之遂納于公宇之東廡既行以元物榜於門壁付之守吏無毫髮損二女亷潔如此又文筆議論皆士人所不逮後清獻以子姓妻之容止第十八珠藏淵而川暉玉韞石而山潤茍符采炳發雖重波積壤何能掩焉顔子曰茍有溫良在中斯眉睫與之矣嗚呼容止之於人豈直黼黻藻繪而已耶陸子春姿容如玉威儀秀異吳地記曰陸閎字子春吳郡吳人陸暢之子光武嘗登臺見而偉之歎曰南方故多佳人謝承後漢書曰陸閎建武中為尚書令美姿貌喜著越布單衣上見而好之自是常敇㑹稽郡獻越布漢末諸賢多委王服以幅巾為雅𡊮紹崔豹之徒雖為將帥猶著縑巾管幼安在家恆著皂帽劉季和嘗言荀令君至人家坐處常三日香襄陽記曰劉季和性愛香嘗上厠還過香爐上主簿張坦曰人名公作俗人不虗也季和曰荀令君至人家坐處三日香為我如何令君而惡我愛香也坦曰古有好婦人患而捧心顰眉見者皆以為好其鄰醜婦法之見者走公便欲使下官遁走耶季和大笑以是知坦魏武帝佻易無威重性好音樂倡優在側窮日達夜被服輕綃常自佩小鞶囊以盛手巾細物時或著帢帽見客每與人談論戲弄言詠盡無所𨼆及歡恱大笑至以頭沒杯案間肴膳皆沾汚巾幘譙允南體貌素朴而潜識內敏然無造次論辨諸葛武侯領益州牧辟為勸學從事初到修謁左右皆笑既出有司請推笑者武侯曰孤欲不能忍何况左右聽令勿推蜀志曰譙周字允南巴西西充人幼孤與母兄同居耽古篤學家貧不問産業誦讀典籍欣然獨笑研精六經尤善書札頗曉天文而不以留意身長八尺體貌朴素推誠不飾無造次辨論然潜識內敏丞相亮領益州命為勸學從事亮卒周聞問即便奔赴尋詔書禁斷惟周以速行得達益部耆舊傳曰益州刺史董榮圖畫周像於州學命從事李通頌之曰抑抑譙侯好古述儒實道懷真鑒世盈虗雅明美迹終始是書我后欽賢無言不譽攀諸前哲丹青是圖嗟爾來葉鑒兹顯模何平叔慧心天悟容貌絶美每出遊行觀者盈路咸謂是神仙之類嵇叔夜長七尺八寸偉容色土木形骸不加飾厲而龍章鳳姿天質自然正爾在羣形之中便自知非常之器魏陽元魏舒已見身長八尺二寸不修常人近事為相國參軍晋王每朝罷目送之曰魏舒堂堂人之領袖陸平原兄弟初入洛見張茂先張問平原雲何以不來平原曰雲有笑疾恐公未悉故未敢俄而雲詣茂先茂先為人多姿制又好以帛纒須雲見而大笑不能自已陸士龍好笑嘗著縗幘上船水中自見其影便大笑不已幾落水王安豐形狀短小目甚清照能視日不眩衛洗馬衛玠已見總角時乘羊車入洛陽市見者咸曰誰家璧人衛叔寶風神秀異其舅王武子嘗與同遊語人曰昨日吾與外甥共坐若明珠之在側朗然來照人庾公道王尼非唯事事勝人布置須眉亦勝人我輩皆出其轅下晋中興書曰王尼字孝孫洛陽覆沒避亂江夏王澄時為荆州見之欣喜厚供給之庾太尉庾亮已見兄弟初渡江行路人有避雨者悉聚㕔事上征西車騎庾翼庾冰並已見自譬遣之不肯去太尉新沐頭散髮髙詠從閣內出向人奔迸走去莫有留者諸人要阮光祿阮裕共詣林公阮曰欲聞其言惡見其靣桓宣武自以容姿風氣是司馬宣王劉越石之儔有以比王大將軍者意甚不平及北伐還於路中得一巧作老婢乃越石故妓一見桓便􅏰然而泣桓問其故答曰公甚似劉司空桓大恱出外整理衣冠又呼問此婢婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌桓於是褫衣解𢃄昏然而卧不怡者數日安公講僧常數百習彥威曽餉十梨值安開講安便於座中手自剖分梨盡人遍都無頗偏釋道安習鑿齒並已見裴瓉風神髙邁為中書侍郎出入禁門見者肅然改容謝晦美風姿善言笑眉目分眀鬢髮如墨時謝混風鑒為江左第一常與晦同在宋武帝前帝目之曰一時頓有兩玉人謝景仁至性整潔居宇淨麗在坐輒唾左右人衣事畢聽一日浣濯故每欲唾左右爭來受之有人詣謝益夀言向在劉丹陽坐見一客殊毛謝曰正是我家阿瞻宋眀帝姿貌豐潔與圭璧等質王令眀王惠嘗臨曲水風雨暴至座者皆馳散王徐起去姿制不異常日王思逺已見立身簡潔客有詣之者覘知衣服垢穢方便不聽前形儀新楚乃與促䣛及去之後猶令二人交帚拂其坐處伏曼容風采韶秀宋眀帝以方嵇叔夜命吳人陸探微畫叔夜像賜之南史曰曼容字公儀平昌安丘人少篤學善老易倜儻好大言都水使者季圭之常曰見王思逺終日匡坐不妄言笑簮帽衣領無不整潔便憶丘眀士見明士蓬頭散帶終日酣醉吐論縱橫唐突卿宰便復憶見王思逺言其兩反也禇太宰禇淵已見美儀貌善容止俯仰進退咸有風則每朝㑹百僚逺國莫不延首宋明帝嘗歎曰禇淵能遲行緩步便持此得宰相時人以方何平叔王景文王彧已見風姿為一時之冠𡊮粲歎曰景文非但風流可恱乃餔啜亦復可觀有客及識謝混者曰景文方謝叔源則為野父矣粲惆悵曰恨眼中不見如此人續世說曰宋孝武選侍中四人並以風貌王彧謝莊為一雙阮韜何偃為一雙張景𦙍張敷已見音儀詳緩與人别輒執手曰念相聞餘響久之不絶張思曼張緒已見吐納風流聽者皆忘饑疲見者肅然如在宗廟張思光融風止詭越坐常危膝行則曳步翹身仰首意制甚多隨例同行常稽遲不進張長史融形貌短陋精神清徹王敬則見融革帶垂寬殆將至骼謂之曰革帶太急融曰既非步吏急帶何為梁武平建鄴朝士造之獨王亮王瑩等數人揖自餘皆拜謝景滌時年二十為太子舍人亦長揖而已意氣間雅瞻視聰眀梁武帝目送良久謂徐勉曰覺此生芳蘭竟體南史曰謝覽字景滌陳郡陽夏人父􅀢太子詹事覽選尚齊錢唐公主仕梁為吳興太守張都尉張纘已見年十七身長七尺四寸眉目踈朗神采爽發何敬容公庭就列容止出人武帝雖衣浣衣而左右衣必須整潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縛耶敬容希㫖故益鮮明常以膠清刷鬢衣裳不整伏牀尉之或暑月背為之焦南史曰何敬容字國禮弱冠尚齊武帝女天監中為建安內史清公有美績守吏部尚書銓序明審號為稱職歷官侍中劉顯將之尋陽朝賢設祖勝流畢集顯懸帛十匹約曰儉衣來者以賞之衆人競改常服不過長短之間顯曰將有甚於此者既而周𢎞正著緑絲布袴軒昻而至折標取帛陶𨼆居𢎞景身長七尺四寸神儀眀秀朗目踈眉細形長耳雖在朱門閉影不交外物徐孝穆目有青睛時人以為聰慧之相李諧形貌短小兼是六指因癭而舉頥因跛而緩步因謇而徐言人謂李諧善用三短李密目瞳子正方黑白眀徹煬帝見之謂宇文述曰左仗下黑色小兒為誰云是蒲山公李寬子密帝曰此小兒瞻視異常無令入衛李特進李嶠體貌短小鼻口都無厚時議不以重祿待之張九齡體弱有醖藉故事公卿皆搢笏於帶而後乘馬九齡獨常使人持之因設笏囊笏囊自九齡始帝後每用人必曰風度能若張九齡乎𤣥宗召李白見於便殿神氣髙朗軒軒然若霞舉路侍中風貌之美為世所聞鎮成都日委政於孔目吏邉咸日以伎樂自隨宴於江淮都人士女懷擲果之美又善巾裹蜀人見必效之後自剪紗巾之腳以異於衆閭巷有眩服修容者人必譏之曰爾非路侍中耶朱泚之亂裴佶與衣冠數人佯為奴求出城佶最寢陋自稱甘草門兵曰此數子定非人奴如甘草者不疑劉昫唐書曰裴佶字𢎞正裴耀卿之孫能屬文弱冠舉進士德宗南狩奔詣行在拜拾遺佶清徑溫敏所交皆當時第一流與鄭餘慶持相友善佶沒餘慶行朋友之服縉紳美之鄭畋文學優深器量𢎞恕美風儀神采如玉崔逺文才清麗風神峻整當時目為釘座梨言席上之珍也劉昫唐書曰崔逺博陵安平人祖璵兵部侍郎父淡吏部侍郎逺仕至右僕射從昭宗東遷栁璨希朱全忠㫖貶白州長史被害於白馬驛趙匡凝氣貌甚偉每整衣冠使人持巨鑑前後照之衣巾上微覺有塵即令持紅拂去之五代史記曰趙匡凝字光儀蔡州人氣貌甚偉性方嚴喜自修飾頗好學問聚書數千卷為政有威惠蘇東坡云梅二聖俞長身秀眉大耳紅額飲酒過百􅊦輒正坐髙拱此其醉也蘇端明平生寢卧時已就枕則安然不復翻動劉元城對賔客或宴居雖暗室常端坐略無欹仄至於終日劉器之待制對客多默坐往往不交一談至於終日客意甚倦或請去輒不聽至留之再三有問之者曰人能終日危坐而不缺伸欹側蓋百無一二其能之者必貴人也以其言試人皆驗東都事略曰劉安世字器之大名人少師事司馬光既仕請於光曰願一言終身行之光曰其誠乎安世問其目曰自不妄語始哲宗立光舉安世充館職除祕書省正字纍官左諌議大夫後除名羈館峽州黃太史庭堅嘗言人心動則目動王介甫終日目不停轉黃太史過范景仁終日相對正身端坐未嘗回顧亦無倦色景仁言二十年來胸中未嘗起一思慮不甚觀書若無賔客則終日獨坐夜深方睡雖兒曹歡呼咫尺皆不聞庭堅曰公却是學佛作家吕居仁云米元章盥手用銀方斛瀉水於手已而兩手相拍至乾都不用巾拭趙文敏公趙孟俯已見神觀煥爛容儀軒舉每一入朝則光映殿廷世祖常目送之語左右曰此神仙中人倪雲林性好潔每盥頸易水數次冠服著時數十次振拂齊閣前樹石常洗刷見俗士避去如恐凂語林卷二十二
