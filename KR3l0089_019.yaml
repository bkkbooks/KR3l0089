body:
  text: 語林卷十九眀何良俊撰針規第十一臧孫有言曰石猶生我疢之美其毒滋多嗚呼自古天子有四海諸侯饗國卿大夫持祿守官士庶人保其家何可一日不聞讜言乎嚴子陵范曄後漢書曰嚴光字子陵會稽餘姚人少有髙名與光武同遊學及光武即位變姓名隱身不見帝令以物色訪之齊國上言有一男子披羊裘釣澤中帝疑是光安車聘之三反而後至終不能屈與侯司徒書曰范曄後漢書曰侯霸字君房河內密人篤志好學師事九江太守房元治穀梁春秋為元都講光武徵拜尚書令時無故典朝廷又少舊臣霸明習故事悉收録條奏帝施用之君房足下位至鼎足甚善懷仁輔義天下恱阿腴順旨腰領絶侯得書封奏之帝笑曰此狂奴故態皇甫謐髙士傅曰霸與光素舊使西曺屬侯子道奉書光不起于牀上箕踞抱膝發書讀訖問子道曰君房素癡今為三公寧小差否子道曰位已鼎足不癡也光曰遣卿來何言子道傳霸言光曰卿言不癡是非癡語也天子徵我三乃來人主尚不見當見人臣乎子道求報光曰我手不能書乃口授之使者嫌少可更足光曰買菜乎求益也髙義方嘗造馬季長季長辭不見義方覆刺為書曰伏聞髙問為日已久冀一見龍光敘腹心之願不圗辭之以疾昔周公父兄文武九命作相以尹華夏猶握沐吐食以接白屋之士天下歸德厯載邈矣今君不能相見宜哉季長大愧遣人追請徑去不肯還漢雜事曰髙彪字義方吳郡人志尚甚髙逰太學博覽經史善屬文范孟博范滂己見遷光祿勳主事時陳仲舉陳蕃己見為光祿勳范執公儀詣陳陳不止之范懷恨投版棄官而去郭有道郭泰己見聞而讓仲舉曰若范孟博者豈宜以公禮格之今成其去就之名得無自取不優之議仲舉乃謝孟博禰正平禰衡己見忤曹公責為鼓吏禰祼身更衣顔色不怍孔北海孔融己見退而數之曰正平大雅固當爾耶魏文為五官將時臨淄侯才名甚盛幾有奪嫡之議曹公一日屏人以咨于賈詡詡默然不對曹公曰與卿言不答何也詡曰屬有所思不即對耳公問何思答曰思𡊮本初劉景升父子也曹公大笑太子遂定魏略曰文帝嘗使人問詡以自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道而已帝從之深自砥礪蜀先主時天旱禁酒釀者有刑吏於人家檢得釀具欲令與釀酒者同罰時簡雍從先主逰見一男子行道雍謂先主曰彼人欲行淫何以不縛先主曰卿何以知之雍曰彼有淫具與欲釀同先主大笑命原欲釀者蜀志曰簡雍字憲和涿郡人少與先主冇舊隨從周旋先主至荆州與麋竺孫乾同為從事中郎常為談客往來使命後拜昭德將軍優遊諷議性簡傲跌宕在先主坐猶箕踞傾倚適諸葛亮已下則獨擅一榻項枕卧語無所為屈樊建入晉為給事中晉武帝問諸葛孔明之治蜀建對曰聞惡必改而不矜過賞罰之信足感神眀帝曰善哉使我得此人以自輔豈有今日之勞乎建稽首曰臣竊聞天下之論皆謂鄧艾見枉陛下知而不理此豈馮唐所謂雖得頗牧而不能用者乎帝笑曰吾方欲眀之卿言起我意于是發詔理艾晉百官表曰樊建字長元使蜀志曰建延熙中以校尉吳值孫權病篤不自見建權問諸葛恪曰樊建何如宗預恪曰才識不及預而雅性過之後為侍中守尚書令石季倫嘗與長水校尉孫季舒酣宴孫慢傲過度季倫欲表免之裴叔則聞而謂之曰季舒酒狂四海所知足下飲人狂藥責人正禮不亦乖乎王丞相與庾太尉頗懷疑二時孫安國為庾公征西主簿孫密諫庾曰王公神情朗達常有世外之懷豈肯為凡人事耶此必邪佞之徒欲間踈內外耳公宜稍詳之太尉初意頓釋祖士言深好奕棋王隱晉書曰祖納字士言范陽遒人九世孝亷納事諸母三兄最治行操能清言厯太子中庶子避地江南溫嶠薦為光祿大夫王處叔謂之曰禹惜寸隂不聞數棋晉書曰王隱字處叔陳郡陳人世寒素父銓少好學有著述之志每私録晉事及功臣行狀未就而卒隱以隱素自守不交勢援博學多聞受父遺業西都舊事多所諳究家貧無資依征西將軍庾亮于武昌亮供其紙筆書成詣闕上之隱雖好著述而文辭鄙拙蕪舛不倫其書次第可觀者皆父所撰文體混漫義不可解者隱之作也祖云聊用忘憂耳處叔曰古人邅時則以功達其道不遇則以言達其才故否泰不窮也今晉未有書而天下傾覆舊事蕩滅君少長王都遊宦四方華夷成敗皆在耳目何不記述使有裁成昔應仲逺作風俗通崔子真作政論蔡伯喈作勸學篇史遊作急就章猶行于世便為沒而不朽當其同時人豈少哉而皆無聞由無述作也故君子疾沒世而名不稱況國史眀乎得失之迹何必博奕而後忘憂哉祖喟然歎曰非不恱子之道力不足也遂發書薦處叔修史帝以問鍾雅事遂不行鍾雅别傳曰雅字彥胄潁川長社人魏太傅鍾繇弟仲常曽孫也少有才志纍遷侍中謝太傅愛好聲律期功之慘不廢伎樂頗以成俗續晉陽秋曰謝安初携幼稚同好養志海濵襟情超暢尤好聲律然抑之以禮在哀能至弟萬之喪不聽絲竹者將十年及輔政而修室第園館麗車服雖期功之慘不廢伎樂王坦之因苦諫焉王文度苦相規切王坦之己見謝貽文度書曰知君思相愛惜之至僕所求者聲謂稱情義無所不可為聊復以自娛耳若潔軌迹崇世教非所擬議亦非所屑常謂君粗得鄙趣者猶未得之濠上耶故知莫逆未易為人文度答言具君雅旨此是誠心而行獨往之美然恐非大雅中庸之謂意者以為人之體韻猶器之方圎方圎不可錯用體韻豈可易處各順其方以𢎞其業則嵗寒之功必有成矣吾子少立德行體議淹允加以令地優遊自居僉曰之談咸以清逺相許至于此事實有疑焉公私二三莫見其可以此為濠上悟之者得無鮮乎且天下之寶故為天下所惜天下之所非何為不可以天下為心乎想君幸復三思書反覆數四謝竟不從謝萬為豫州都督王右軍貽書戒之曰以君邁往不屑之韻而俯同羣辟誠難為意然所謂通識正自當隨事行藏乃為逺耳願君與士之最下者同則盡善矣食不二味居不重席此復何有而古人以為美談濟不所由實在積小以致髙大君其存之謝萬就太傅乞裘自云畏寒太傅答曰君妄語正欲以為豪具耳若畏寒無復勝綿者乃以三十斤綿與萬車武子為侍中日與王東亭諸人期共逰集武子請急出過詣王子敬子敬時住在建陽門內道北武子求去子敬問卿何以忽忽武子答云與東亭諸人期共行子敬曰卿何以乃作此不急行武子不敢去盡急還臺王國寶是謝太傅壻専利無檢行太傅每抑制之後國寶為孝武帝親昵遂危搆太傅帝一日召桓子野飲太傅亦在坐子野桓伊小字將續晉陽秋曰伊字叔夏譙國銍人父景護軍軍伊少有才藝又善聲律標悟省率為王濛劉惔所知纍遷豫州刺史帝命桓吹笛桓神色無忤即吹為一弄乃放笛云臣于筝分乃不及笛然自足以韻合歌管請以筝歌并請一吹笛人帝善其調達乃勑御妓吹笛桓又言御府人于臣必自不合臣有一奴善相便串帝令召之奴既吹笛桓便撫筝而歌曹子建怨詩詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刋推心輔王室二叔反流言聲節慷慨俯仰可觀太傅泣下沾襟乃越席就之捋其鬚曰使君于此處不凡謝奕在豫州亡後晉中興書曰謝奕字無奕陳郡陽夏人祖衡太子少傅父裒吏部尚書奕少有器鑒辟太尉掾纍遷豫州刺史簡文使王彪之舉可代者王氏譜曰彪之字叔虎祖正尚書父彬衛將軍年二十而頭須皓白時人謂之王白須少有局幹之稱纍遷左光祿大夫簡文曰人有舉桓雲者君謂何如晉書曰桓雲字雲子桓彛第二子大司馬溫之弟初為何充驃騎參軍襲爵萬寧男厯位建武將軍王曰雲不必非才然溫居上流割天下之半其弟復處西藩兵權盡出一門亦非深根固蒂之宜人才非可豫量但當令不與殿下作異者耳簡文深納其言王司徒謐與逺公書曰身年始四十而衰同耳順逺答曰古人不愛尺璧而重寸隂觀其所存似不在長年耳檀越既履順而逰性乘佛理以御心因此而推復何羡于遐齡耶聊想斯理久已得之為復酬來信耳人皆稱公善誘謝康樂父奐不慧為祕書郎早亡康樂好臧否人物叔尚書混患之欲加裁折未有方也謂宣逺曰非汝莫能乃與晦曜𢎞微等共逰戲命瞻與靈運共車既上便商較人物宣逺謂之曰祕書早亡談者亦互有同異靈運默然言論自此衰止世祖登祚以顔延之為光祿大夫時延之兒竣既貴重權傾一朝凡所資供延之一無所受器服不改宅宇如舊常乘羸牛敝車逢竣鹵簿即屏往道側又好騎馬遨逰里巷遇知舊輒據鞍索酒得酒便頽然自得常語竣曰吾平生不喜見要人今不幸見汝竣起大宅延之謂曰善為之無令後人笑汝拙也孔中丞孔覬己見二弟在官孔徽孔道存道存官至南海太守頗營贓賄嘗請假還東中丞出渚迎之輜重十餘船皆是綿絹紙席中丞見之偽喜曰我比困乏得此甚要因命上置岸側既而正色語曰汝輩忝預士流何至還東作賈客耶命左右取火燒之燒盡乃去齊武帝時諸弟皆無寵嘗于御坐曲宴武陵因醉伏地以貂抄肉柈帝笑曰汙貂武陵答曰陛下何愛其羽毛而疏其骨肉武陵王曄己見丘靈鞠嘗詣褚彥回彥回不時起語靈鞠曰比腳疾更增不復能起靈鞠言腳疾亦是大事卿為一代鼎臣不可復為覆餗王仲寶既為朝宰起長梁齋制度小過叔僧虔視之不恱竟不入户仲寶即日毁之王仲寶王儉己見小時叔父僧虔撫之曰我不患此兒無名政恐名太盛宋眀帝頗好言理以周彥倫有辭義引為宿直時帝所為慘毒周不敢顯諫輒誦經中因緣罪福事帝亦為之小解釋慧皎髙僧傳曰明帝末年頗多忌諱因之犯忤致戮者十有七八僧瑾每以匡諫恩禮遂薄時周顒入侍帷幄瑾謂顒曰陛下比日所為殊非人君舉動俗事諷諫無所復益妙理深談彌為賖緩唯三世苦報最切近情檀越儻因機候正當陳此而已帝後風疾數加針灸痛惱無聊輒召顒及殷洪等説鬼神雜事以散胸懷顒乃習讀法句賢愚二經每見談説輒為言帝驚曰報應真當如此亦寧可不畏因此犯忤之徒屢被全宥徐孝嗣己見從武帝幸方山帝曰朕經始此山之南復為離宫故應有邁靈丘靈立玄武湖新林苑也孝嗣答曰繞黃山欵牛首乃盛漢之事今江南未矌民亦勞止願陛下少更留神王長史王騫己見至性凝簡不狎當世嘗從容語諸子曰吾家門户所謂素族自可隨流平進不須茍求建元中都下舛雜且多姦盜上欲立符伍家家以相檢括王仲寶曰京師翼翼四方是湊必也持符于事既煩理成不曠謝安所謂不爾何以為京師齊髙宗從弟季敞性頗豪縱上心非之南史曰輔國將軍蕭季敞粗猛無行善于彌縫嘗語之曰卿可數詣王思逺王思逺己見南史曰思逺立身簡潔陳顯達除江州刺史自以門寒位重每一遷官常有愧懼之色戒其子勿以富貴陵人而諸子多事豪侈顯達聞之不恱子休尚為郢府主簿過九江拜别顯達語之曰麈尾蠅拂是王謝家物汝不須捉此即取于前燒除之湘東王繹入援臺城頓軍武城淹留不進中記室參軍蕭賁以繹不早下心甚非之嘗與繹雙陸食子未即下賁斂手言曰殿下都無下意繹甚銜之南史曰蕭賁字文奐形不滿六尺有文才能書善畫起家為湘東王法曹參軍陳寶應潛有逆謀虞寄微知其意寶應嘗令左右讀漢書卧而聽之至蒯通説韓信曰相君之背貴不可言寶應蹶起曰可謂智士寄正色曰覆酈驕韓未足為智豈如班彪王命識所歸乎北齊髙祖嘗宴群臣酒酣各令歌樂武尉斛斯豐樂歌曰朝亦飲酒醉暮亦飲酒醉日日飲酒醉國計無取次上曰豐樂不諂是好人北齊孝昭樂善聞過後代罕及嘗問舍人裴澤在外議論得失裴率爾對曰陛下聰眀至公自可逺侔古昔而有識之士咸言傷細帝王之度頗為未𢎞帝笑曰誠如卿言唐太宗幸九成宫駕還有宫人憩湋川縣官舍俄而李靖王圭二人並己見至縣官移宫人于别所太宗怒曰威福豈由靖等何為輕我宫人即令按驗湋川屬官魏徵曰靖等陛下心膂大臣宫人陛下賤𨽻論其委任事理不同又靖等出見官吏訪問朝廷法式民間疾苦自應與官吏相見至于宫人供養之外不合參承若以此加罪恐不益德音駭天下耳目太宗曰公言是遂捨不問太宗嘗作宫體詩使虞永興虞世楠己見賡和虞曰聖作誠工然體非雅正臣恐此詩一傳天下風靡帝曰朕試卿爾後帝為詩一篇述古興亡既而歎曰鍾子期死伯牙不復鼓琴朕此詩何所示耶敕禇遂良即永興靈坐焚之太宗射猛獸于苑內有羣豕突出太宗引弓四發殪四豕有一雄豕直來衝馬尚書唐儉下馬搏之太宗拔劒斷豕顧而笑曰天策長史不見上將擊賊耶何懼之甚唐對曰漢祖以馬上得不以馬上理之陛下以神武定四方豈復逞雄心于一獸太宗因命罷獵劉昫唐書曰唐儉字茂約晉陽人北齊尚書雍之孫父鑒與髙祖有舊髙祖在太原險説太宗以天下可圖太宗白髙祖召入密訪時事授記室參軍貞觀中天䇿府長史貞觀中百官表請封禪獨魏徵切諫太宗謂徵曰朕欲卿極言其不可徵對曰陛下功則髙矣而人未懷惠德雖厚矣而澤未滂流諸夏雖安未足以供事逺夷慕義無以供其求符瑞雖臻罻羅猶密積嵗豐熟倉廪尚虛臣未能逺譬但喻于人今有人十年常患療治且愈皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下良醫除其疾苦雖已乂安未甚充實告成天地臣竊有疑且陛下東封萬國咸萃要荒之外莫不奔走今伊洛已東洎于海岱灌莽巨澤蒼茫千里人煙斷絶雞犬不聞道路蕭條進退艱阻豈可引彼蠻夷示之虛弱殫府竭財未厭逺人之望加年給復不償百姓之勞或遇水旱之災風雨之變庸夫橫議悔不可追豈獨臣之懇誠亦實輿人之議太宗乃罷封禪少府監裴匪躬善營利嘗奏賣苑中馬糞嵗可得錢二十萬緡上以問劉仁軌仁軌對曰利則厚矣恐後代稱唐家賣馬糞非佳名也裴匪躬在司農寺按諸苑鬻果蔬儲利佐公以墨敇示僕射蘇良嗣己見良嗣判曰公儀休一諸侯相尚拔葵去織未聞天子賣果蔬與人爭利事遂不行髙宗出獵在路遇雨因問諫議大夫谷那律曰油衣若為不漏對曰能以瓦為之必不漏矣上因此不復出獵王方慶在政府其子為眉州司士參軍武后嘗問卿在相位何子之逺方慶答曰廬陵是陛下愛子今尚在逺臣之子庸敢相近世以比倉唐之對劉昫唐書曰王方慶雍州咸陽人周石泉公褒之曽孫官至太子左庶子博學好著述尤精三禮髙宗嘗問魏元忠外以朕方前代何主元忠答曰周成康漢文景帝問然有遺恨否曰有之王義方一世豪英而死草萊議者謂陛下不能用賢帝曰我適用之聞其死顧已無及元忠曰劉藏器行副于才陛下所知今七十為尚書郎徒歎彼而又棄此帝默然蕭至忠依太平公主後復當國嘗出主第遇宋璟于道宋曰非所望于蕭傅唐詩紀事曰至忠蕭德言之孫相中宗後從太平公主謀逆伏誅明皇曰至忠誠國器但晚謬耳玄宗登封泰山張燕公多引兩省生徒及所親知攝官升山超階至五品時張九齡當草詔謂燕公曰官爵者天下之公器望為先勞舊為次若顚倒衣裳則譏議起矣今登封霈澤千載絶典清流髙品不沐殊恩胥吏末班先加章紱但恐制出之後四方失望今進草之際事猶可改燕公曰事已決矣悠悠之談何足慮也後果為宇文融所劾中宗嘗宴侍臣酒酣後令各為回波詞衆皆為佞恱之語時李景伯獨寓規諷其詞曰回波爾時酒巵微臣職在針規侍飲既過三爵喧譁切恐非儀中宗不恱中書令蕭至忠稱之曰此真誎官眀皇以李林甫為相一日曲宴近臣于苑中帝指示張九齡李林甫曰檻中盆池新魚數頭鮮活可愛林甫曰賴陛下恩波所養九齡曰盆中之魚猶陛下用人但能裝景致助兒女之戲耳張九齡奬愛李泌常引至卧內九齡與嚴挺之蕭誠善挺之惡誠好佞勸九齡絶之九齡獨念嚴太苦徑不若蕭軟美可喜方命左右召蕭泌在旁率爾曰公起布衣以直道至宰相顧喜軟美者乎九齡改容驚謝因呼小友玄宗嘗于復道窺見衛士食畢以殘食棄水竇中上怒令杖殺之寧王曰從復道窺衛士之過恐人不能自安上曰大哥于我可謂急難杜暹家藏書皆自題跋尾以戒子孫曰請俸買來手自校子孫讀之知聖道鬻及借人皆不孝職官分紀曰杜暹開元十四年召為中書門下平章事遣中使往迎賜宅一區肅宗為太子時明皇使割羊臑肅宗以餅拭刀徐噉之眀皇喜曰福當如是愛惜唐肅宗既遷上皇于西內嘗端午日山人李唐入見上抱幼女語唐曰朕念之卿勿怪也唐對曰太上皇思見陛下計亦如陛下之念公主上泫然泣下李臯為山南節度鎮襄陽劉昫唐書曰李臯字子蘭曺王明之玄孫天寶中嗣封多智數善因事以自便奉太妃鄭氏以孝聞官襄州刺史山南東道節度使襄陽有張柬之林園在州西公府多假之遊宴臯嘗欲買之馬彛斂袵言曰漢陽有中興功遺業當百世共保奈何令其子孫自鬻臯謝曰主吏失詞以為君羞非君安得聞此言劉昫唐書曰馬彛扶風人初未知名李臯始辟之後以正直稱裴諝為河東鹽鐵使時關輔旱儉諝入計召至便殿問𣙜酤之利嵗出內幾何諝久不對帝復問諝曰臣有所思帝問何思諝曰臣自河東來涉三百里而農人愁歎穀菽未種誠謂陛下軫念元元先訪疾苦而乃責臣以利孟子曰治國者仁義而已何以利為故未即對帝曰微公言朕不聞此劉昫唐書曰裴諝字士朋洛陽人父寬有重名諝通達簡率不好苛細史思眀寇東都陷賊中乃隂疏賊短長以聞事泄思眀大怒僅而免死賊平纍官兵部侍郎陸敬輿陸贄己見嘗語德宗曰欲紓多難收羣心惟在赦令而已動人以言所感已淺言又不切人誰肯懷陸相贄知舉放崔羣己見後羣知舉陸氏子簡理被黜羣妻李夫人謂羣曰子弟成長盍置莊園公曰今年已置三十所矣謂知舉放三十人也夫人曰君非陸贄門生乎君掌文柄陸氏子無一得事者如以君為良田陸氏一莊荒矣羣無以對韓滉堂先無挾廡弟洄稍增補之滉見即撤去曰先君容焉吾弟奉之猶恐失墜安敢改作以傷儉德栁渾為相韓滉自浙西入覲朝廷委政待之每奏事語至日午他相充位而已滉于省中榜吏渾雖滉所引心惡其専正色曰先公狷察為相不滿嵗而罷今相公復榜吏于省中省闥非刑人之地相公奈何復蹈前非況在朝而専立威福豈尊主卑臣之義滉憮然愧悔為之霽威鄭絪為門下侍郎朝廷以盧從史與王承宗有連詔從史歸潞從史辭潞乏糧請留軍山東李吉甫密譛絪漏言于從史帝怒坐浴堂殿召學士李絳語其故絳曰誠如是罪當族然誰以聞陛下帝曰吉甫為我言絳曰絪任宰相稍識名節不當如犬彘梟獍與姦臣外通恐吉甫勢軋內忌造為醜辭帝良久曰吉甫幾誤我劉昫唐書曰鄭絪字文眀少有竒志好學善屬文張參蔣乂楊綰常衮皆相知重憲宗朝拜中書侍郎集賢殿大學士絪以文學進踐厯華顯者四十年所居雖無赫奕稱而守道敦篤耽恱墳典與博聞好吉之士為講論名理之遊時人仰其耆德憲宗初徵栁宗元劉禹錫至京俄皆貶謫栁得栁州劉得播州栁以禹錫須侍親播州最為惡處請以栁州換上不許宰相言禹錫有老親上曰但要與惡郡豈繫母在裴晉公徐進曰陛下方侍太后不合發此言上有愧色既而語左右曰裴度終愛我切禹錫改授連州周墀節度鄭滑劉昫唐書曰周墀字德升汝南人能為為古文有史才文宗重之補集賢學士出鄭滑節度使入朝遷刑部侍郎以本官平章事表韋澳在幕府會墀入相私語澳曰卿何以教我澳曰願公無權墀愕然澳曰爵賞刑罰人主之柄公無以喜怒行之俾庶官各舉其職則公斂袵廟堂天下治矣烏用權墀歎曰吾先居此得無愧乎唐詩紀事曰韋澳字子斐官至祕書監分司東都嘗戲吟曰莫將韋監同殷監錯認容身是保身此語聞于京師權佞甚怒之德宗令王叔文直東宫太子欲言宫市之弊人皆贊美叔文獨無言罷坐太子謂叔文曰君何獨無言叔文曰太子視膳問安外不合輒預他事陛下在位嵗久如小人離間謂殿下收取人心則安能自解太子聞之曰茍無先生安得聞此語于延陵授建州刺史上問建去京師近逺對曰八千里上曰朕左右多建人郡極不惡卿若亷潔奉公綏緝凋瘵無異長在我前或撓枉法度逺人亡聊即三尺階前便是萬里延陵悸懾上撫而遣之崔彥昭與王凝為外昆弟凝先顯而彥昭未仕彥昭嘗倨見凝凝慢言曰不若從明經舉彥昭為憾後彥昭入相凝為兵部侍郎彥昭母敕婢多製履襪曰王氏妹必與子皆逐吾將共行彥昭聞之泣且拜不敢為怨王凝己見居劉昫唐書曰崔彥昭字思文清河人事母至孝雖位宰輔退朝侍膳與家人雜處承奉左右未嘗髙言嵗時慶賀公卿拜席時人榮之李茂貞居岐以地狹賦薄嘗下令𣙜油因禁城門無內松薪以其可為炬也有優者笑曰臣請并禁月眀五代史記曰李茂貞深州博野人為博野卒戍鳯翔光啓中以功自扈蹕都頭拜鳯翔隴右節度使唐眀宗與馮道語及年穀屢登四方無事道曰臣常記昔在先皇幕府奉使中山厯井陘之險臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕凡為天下亦猶是也上深以為然江南李景于宫中起樓甚髙衆皆歎美蕭儼獨曰恨樓下無井以此不及景陽樓太平興國中朝士祖吉典郡以姦贓下獄太宗怒其貪穢遣中使諭旨于執政祖吉特俾于郊赦不宥明日宰相趙普己見奏曰敗官抵罪合正刑辟然而國家卜郊肆類所以對越天地告于神眀吉本何人亦安足以隳陛下赦令上善其對而止王魏公王旦見家人服飾似過則瞑目曰吾門素風一至于此亟令減損蘇子美以饗客得罪言事者欲因子美以動一二大臣彈擊甚急宦者操文符捕人所逮皆一時名士都下為之紛駭左右無敢救解韓魏公從容言于仁宗曰舜欽一醉飽之過止可付有司治之何至如此帝悔見于色崔公孺是韓魏公夫人之弟魏公執政日用監司有非其人者公孺曰公居陶鎔之地宜法造化為心造化以蛇虎者害人之物故置蛇于藪澤置虎于山林公今何乃置之通衢使為民害涑水記聞曰崔公孺諫議大夫立之子韓魏公夫人之弟性亮直喜面折人魏公甚嚴憚之連庶為夀春令縣有淮南王舊壘在山間州守議取其甓為城庶曰弓矢舞衣傳之百世藏于王府非為必可用蓋以古之物傳于今尚有典刑也壘因是得存王得臣麈史曰應山二連伯氏庶字君錫仲氏庠字元禮少從學于二宋相繼登科君錫為人凊修孤潔故當官人號為連底清元禮加以肅人號為連底凍陳恭公判亳州遇生日親族多獻老人星圗姪世修獨獻范蠡逰五湖圗且贊曰賢哉陶朱霸越平吳名隨身後扁舟五湖公即日納節宋史曰陳執中字昭譽以父恕任為祕書省正字纍遷平章事卒贈侍中禮官韓維議諡言諡法寵祿光大曰榮不勤成名曰靈執中出入將相以一品就第寵祿光大矣得位行政士大夫無述焉不勤成名矣請諡為榮靈詔諡恭嘉祐中除張堯佐節度東軒筆録曰張堯佐以進士擢第官至屯田貟外郎知開州會其姪女有寵于仁宗册為修媛堯佐遂驟遷一日除宣徽節度景靈羣牧四使陳秀公作中丞上殿爭之仁宗初盛怒作色待之既進見迎謂之曰豈欲論張堯佐不當授節度耶節度使本粗官何用甚爭時唐質肅唐介己見作御史裏行在衆人後越次進曰節度使太祖太宗總曽做來恐不是粗官上竦然而罷東都事略曰陳升之字㿩叔建州建陽人舉進士為校書郎徙監察御史張堯佐以後宫親為三司使升之言其不可改侍御史知雜為人深沉多數善傅會始為小吏與王安石相遇安石深器之升之在樞府安石亦執政多變更舊制引升之共事升之心知其非而竭力贊助故先安石拜相封秀國公諡成肅洛中有一僧欲開堂説法司馬君實夜過邵堯夫曰聞富彥國吕晦叔欲往聽此甚不可晦叔貪佛已不可勸人亦不怪如何勸得彥國堯夫曰今日已莫姑任之眀日二人果偕往後月餘彥國招數客共飯堯夫在坐因問彥國曰主上以裴晉公禮起公公何不應命又聞三遣使公皆卧內見之彥國曰衰病如此其能起否堯夫曰上三命公不起一僧開堂以片紙見呼即出恐亦未是彥國曰弼亦不曽思量至此邵康節與富鄭公在洛每晴日必同行至僧舍鄭公見佛必躬身致敬康節笑曰無乃為佞乎文潞公守東都日富鄭公致仕在洛司馬溫公領宫祠范蜀公自許來同過郡為會潞公出四玉杯勸酒官奴不謹碎其一潞公將治之溫公請筆書牘尾云玉爵弗揮典禮雖聞于往記彩雲易散過差可恕于斯人潞公笑釋之陳少卿蓄書數千卷名畫數十幅晚年退居有華亭唳鶴一雙怪石一株竒峭可愛與異花數十本列植于庭為詩以戒子孫曰滿室圗書雜墳典華亭仙客岱雲根他年若不和花賣便是吾家好子孫陳死未幾皆散落民間吳處厚青箱雜記曰陳亞揚州人仕至太常少卿年七十卒蓋近世滑稽之雄也范蜀公以議新法不合而去其謝表云望陛下集群議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壯之邵氏聞見録曰王荆公草制詞極于醜詆公笑誦其辭曰材無任職之能某披襟當之內有謀利之實則夫子自道也後元祐起公公辭曰六十三而求去蓋不待年七十九而復來豈云得禮卒不起李清臣平日多于韓魏公前論釋氏貴定力謂無定力則不能主善公每然之後朝廷斥異論者清臣頗持兩端魏公因書問之曰比來臺閣斥逐紛紛吾親得不少加定力耶公之善諭人如此吕獻可吕誨己見病亟日自草章乞致仕其辭曰臣無宿疾偶值醫者用術乖方殊不知脈候有虛實隂陽有逆順診察有標本治療有先後妄投湯劑率意任情差之指下禍延四肢寖成風痺遂難行步非秪憚􅏓盩之苦又將虞心腹之變勢已及此為之奈何雖然一身之微固未足恤其如九族之託良以為憂是思納祿以偷生不俟引年而還政蓋以疾喻政天下聞而韙之范蜀公與司馬溫公同逰嵩山各携茶以行溫公以紙為貼蜀公用小黑木合子盛之溫公見之驚曰景仁乃有茶具耶蜀公聞其言留合與寺僧而去范蜀公素不飲酒又詆佛教在許下與韓持國兄弟往還諸韓皆崇此二事每宴集蜀公未嘗不與同飲盡歡少間必以禪恱相勉蜀公頗病之蘇子瞻時在黃州蜀公以書問救之當以何術曰麴糵有毒平地生出醉鄉土偶作祟眼前妄見佛國子瞻報之曰請公試觀能惑之性何自而生欲救之心作何形相此猶不立彼復何依正恐黃面瞿曇亦須斂袵況學之者耶亦以曉公公終不領蘇惠州以作詩下獄自黃州再起遍厯侍從然其詩每為不知者咀味以為有譏訕遂出守錢塘來别文潞公公曰願君至杭少作詩恐為不喜者誣謗再三言之臨别上馬潞公笑曰若還興也便有箋云時吳處厚取蔡安州詩作注以上安州遂遇禍故潞公有箋云之戲晏叔原著樂府黃山谷為之序父客韓宫師玉汝曰願郎君捐有餘之才崇未至之德黃山谷小山集序曰晏叔原臨淄公之暮子也辭經籍考曰小山集晏幾道叔原撰其在名勝間可追迫花間髙處或過之朝伯宇少作閔吾廬賦黃魯直以示蘇長公曰此朝家十郎作年未二十也長公答曰此賦甚竒麗信是朝家多異材耶凡人至足之餘自溢為竒怪乃可今朝傷竒太早可作魯直微意諭之勿傷其邁往之氣魯直以語朝朝自是文章大進昭德先生郡齋讀書志曰朝載之字伯宇黃魯直嘗薦之于蘇子瞻云伯字謹厚守文元家法從逰多長者後坎􅀈終身卒官封丘丞二王王寧王實是韓持國壻一日訪蘇端明端明因問訊持國王曰公自致政來尤好為歡嘗謂身已癃老且以樂聲自娛不爾無以度日東坡曰殘年正不應爾願為某傳一語于持國頃有一老人未嘗參禪而雅合禪理死生之際極為了然一日置酒大會酒闌語衆曰老人即今且去因攝衣正坐奄奄欲逝諸子惶遽呼號曰大人今日乃與世訣願留一言為教老人曰本欲無言今為汝懇只且第一五更起諸子未諭老人曰惟五更可以幹當自家事諸子曰家中幸豐何用早起舉家諸事皆是自家豈有分别老人曰所謂自家事是死時將得去者吾平時治生今日就化可將何者去諸子頗悟今持國自謂殘年請二君言與持國但言某請持國幹當自家事與其勞心聲酒不若為可以死時將去者計也王元澤病亟介甫命道士作醮大陳楮泉平甫啓介甫曰兄在位要須令天下後世人取法雱雖疾丘之禱久矣為此奚益且兄常以倉法繩吏姦今乃以楮泉徼福安知三清門下不行倉法耶李伯時善畫馬鄧椿畫繼曰李公麟字伯時舒城大族家世業儒公麟以文學有名于時陸佃薦為中書省刪定官董敦逸辟檢法御史臺學佛悟道深得微旨立朝籍籍有聲平日博求鐘鼎古器圭璧寶玩森然滿家以其餘力留意畫筆心通意徹直造玄妙蓋其大才逸羣舉皆過人也法秀師讓之曰伯時為士大夫而以畫行已可恥又作馬忍為之耶伯時恚曰作馬無乃例能蕩人心墮惡道乎師曰公業已習此則日夕思其情狀求為神駿繫念不忘一日眼花落地必入馬胎無疑非惡道而何伯時大驚不覺身去坐榻曰今當何以洗此過師曰但當畫大士像伯時遂畫此像妙絶天下一時公卿服師之善誘法秀師嘗語黃魯直曰公作豔歌小詞可罷之魯直曰空中語耳非殺非偷不至坐此墮惡道師曰君以邪言蕩人搖心使逾禮越禁其罪豈止墮惡道而已魯直由此不作詞曲捫虱新話曰黃魯直初好作豔歌小詞道人法秀謂其以筆墨誨淫于我法中當墜泥犁之獄魯直自是不作張藝叟云頃遊京師嘗聽司馬溫公王荆公之論于行義文史為多唯歐陽公多談吏事余言學者見公莫不欲聞道德文章今先生何教人以吏事公曰吾子皆時才異日臨事當自知之大抵文學止于潤身政事可以及物吾昔貶官夷陵方壯年未厭學欲求漢史一觀公私無有因取架閣陳年公案反覆觀之見其枉直乖錯不可勝數違法徇情滅親害義無所不有且夷陵荒逺褊小尚如此天下固可知也當時仰天誓心自爾遇事不敢忽時蘇眀允父子亦在共聞此語東都事略曰張舜民字藝叟邠州人王安石行新法舜民上書謂裕民所以窮民強內所以弱內闢國所以蹙國以堂堂之天下不當與小民爭利時皆壯之元祐初司馬光舉舜民才氣秀異剛直敢言召試祕閣校理舜民慷慨善論事自號浮休居士劉資政為太常少卿時靖康用兵軍需困乏劉檢視禮器庫見有故祭服甚多將建請以為戰士衲衣有老吏諫曰祭器弊則埋之祭服弊則焚之禮也奈何以為戰士衣劉默然蔡元長既刻黨籍碑在朝無敢言者其後再相葉左丞從容謂之曰夢得聞天下有道則庶人不議今舉籍上書之人刻之于石以昭示來世恐非所以彰先帝之盛德也蔡大感悟其後黨禁稍解胡尚書直孺聞之歎曰此人宜在君側宗澤任館陶尉凡獲逃軍即殺之邑境為之無盜時吕大資惠卿帥大名聞其事因召與語仍薦之且戒云此雖警盜賊之一䇿恨子未閲佛書人命難得安可殺況國有常刑方勺泊宅編曰宗澤婺州農家子登進士任館陶尉楊誠齋為零陵丞以弟子禮謁張魏公時公以遷謫杜門謝客南軒為之介紹數日乃得見因跪請教公曰元符貴人腰金紆紫者何限惟鄒志完陳瑩中姓名與日月爭光誠齋得此語終身厲清直之操王嘉叟與王龜齡别語龜齡曰吾輩會合不可常但令常留面目異日可以相見龜齡每歎賞此言趙德莊嘗宰餘干趙忠定汝愚是其邑子忠定初冠多士適德莊在朝忠定往謁謝德莊語之曰慎勿以一魁先置胸中時以為名言荃翁貴耳集曰趙介菴名彥端字德莊宗室之秀能作文賦淳祐甲辰省元徐霖狀元劉夢炎皆三衢人一時士林稱為盛事時楊彥瞻守衢揭雙元坊以誇之二公各以書為謝且固辭焉彥瞻答書頗致規諷二公得書悚然其後徐以道學名劉以功業顯世以為彥瞻有以發之周公謹齊東野語曰彥瞻答書云嘗聞前輩曰吾鄉昔有第奉常而歸饋者迓者往來而觀者闐路駢陌既而宗族姻友與客交賀焉至于讐者亦茹恥含愧賀且謝焉獨鄰居一室扄鐍逺引若避寇然余怪問之愀然曰所貴衣錦之榮者謂其得時行道有以庇吾鄉里今或竊一名得一官即起朝富暮貴之想名愈髙官愈穹而用心愈謬武斷者有之庇姦慝持州縣者有之是一身之榮一害之增也其居日以廣鄰居日以蹙吾將入山林深密之地以避之是可弔何以賀為吾聞而異其言因默識而謹書之凡交逰間必道此語相訓切而非心相知者不道也執事于不肖可謂心相知而不以告罪也且今日此扁之揭所以獨異于尋常者蓋僕之望于執事者亦異焉人于此時每以諛獻僕乃獨以忠告非求異于人所冀進執事之德成執事之器也執事若以僕之言為然則是扁之揭可無愧矣金海陵鋭于求治講論每至夜分嘗乙夜召見楊伯雄因及鬼神事伯雄進曰漢文帝召見賈生夜半前席不問百姓而問鬼神後世譏之陛下不以臣愚陋幸及天下大計鬼神之事未之學也海陵曰但言之以釋永夜倦思伯雄曰臣家有一卷書記人死復生或問冥官何以免罪答曰汝置一厯白日所為暮夜書之不可書者是不可為也海陵為之改容金史曰楊伯雄字希雲真定藁城人八世祖彥稠後唐定州兵馬使伯雄登皇統進士海陵一見深加器重海陵執政以舊知伯雄屬之使時時至其第伯雄不往海陵怪問之對曰君子受知于人當以禮進附麗奔走非素志也海陵篡立鋭于求治講論每至夜分嘗問人君治天下其道何貴對曰貴靜海陵默然明日復謂曰我遷諸部猛安分屯邉戍前日之對豈指是為非靜耶對曰徙兵分屯使南北相維長䇿也所謂靜者乃不擾之耳虞伯生與元眀善俱以文章著二人相得甚歡至京師乃復不相下董士選自中臺行省江浙二人送至都門士選曰伯生以教道為職當早還復初宜更送我伯生還眀善送至二十里外士選下馬入邸舍中為席酌酒同飲舉酒屬眀善曰士選以功臣子出入臺省無補國家惟求得佳士數人為朝廷用如復初與伯生他日必皆光顯然恐不免為人構間復初中原人仕必當道伯生南人將為復初摧折今為我飲此酒慎勿如是眀善受巵酒跪而釂之起立言曰請公再賜一巵眀善終身不敢忘公言乃再飲而别元眀善己見允元史曰虞集字伯生宋丞相文五世孫父伋黃岡尉宋亡僑居臨川與吳澄為友娶楊氏國子祭酒文仲女生集三嵗即知讀書伋挈家趨嶺外無書册可携楊氏口授論語孟子左傳歐蘇文輒成誦文仲以春秋名家族弟棟眀性理之學楊氏盡通其説故集與弟槃皆受業家庭董士選除南行臺中丞延集家孰大德初至京師益自充廣除國子助教即以師道自任纍官奎章閣大學士晝元史曰董士選字舜卿文炳次子幼從文炳居兵間治武事夜讀書不輟靜重識大體秋毫無所取其禮敬賢士尤至在江西以屬掾元眀善為賔友又得吳澄而師之延虞伋于家孰以教其子諸老儒及西蜀遺士皆以書院之祿起之遷南行臺招伋子集與俱得范梈等數人皆以文學顯于時世稱求賢薦士必以董氏為首許白雲許謙己見初從金履祥學履祥語之曰士之為學猶五味之在和醯醬既加則酸鹹頓異今子處此已三日而猶夫人也豈我之學無以感發子耶白雲聞之惕然自勵數年盡得其所傳之奧元史曰金履祥字吉甫婺之蘭溪人幼敏睿授之書即能記誦比長益自䇿勵凡天文地形禮樂田乘兵謀律厯之書靡不畢究及壯知向濓洛之學事同郡王柏學者稱為仁山先生世祖時天變異常上遣鄂爾根薩里召集賢翰林兩院官詢致災之由議者莫敢語及時政先是丞相僧格遣實都王濟理算天下錢糧害民特甚人不聊生自殺者相屬趙承旨趙孟俯己見與鄂爾根薩里善勸令奏帝赦天下盡與蠲除庶幾天變可弭鄂爾根薩里入奏如承旨言上從之詔草已具僧格大怒謂非上意承旨語僧格曰凡錢糧未徵者其人死亡已盡何所從取非及是時除免之他日言事者倘以失陷錢糧數千萬歸咎尚書省豈不為丞相深纍耶僧格悟民始獲蘇順帝嘗于暇日欲觀古名畫庫庫即取郭忠恕比干圗以進庫庫己見語林卷十九
