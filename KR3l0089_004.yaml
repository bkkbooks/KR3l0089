body:
  text: 語林卷四明何良俊撰言語第二上余讀韓詩外傳得趙倉唐對魏文侯事歎曰夫言何可以已哉排難解結釋疑辨誣喻誠通志協羣情定國是使當時無倉唐之言太子不得立魏國幾殆嗚呼夫言何可以已哉孔子曰誦詩三百使於四方不能専對雖多亦奚以為又曰君子居其室出其言善則千里之外應之正以見言之不可已也何良俊曰余撰語林頗倣劉義慶世説然世説之詮事也以玄虛標凖其選言也以簡逺為宗非此弗録余懼後世典籍漸亡舊聞放失茍或泥此所遺實多故披覽羣籍隨事疏記不得盡如世説其或辭多浮長則稍為刪潤云耳漢哀帝語尚書鄭崇曰卿門何以如市崇答曰臣門如市臣心如水班固漢書曰鄭崇字子遊髙密大族祖父以資徙平陵崇少為郡文學史大司徒傅喜薦崇擢尚書僕射數求見諫諍上初納用之每見曳革履上笑曰我識鄭尚書履聲靈帝頗好學藝每引見劉寬常令講經寬每於坐被酒睡伏帝問太尉醉耶寬仰對曰臣不敢醉但任大責重憂心如醉耳帝重其言劉寬己見朱公叔年二十許為郡督郵迎太守張璠漢記曰朱穆字公叔南陽宛人父暉尚書令穆五嵗好學嚴謝承後漢書曰穆少有英才學明五經性矜疾惡不交非類太守見公叔問曰君年少為督郵為因族勢或有令德公叔答云郡中瞻望明公如仲尼謂非顔回不敢以逆孔子語次因及風俗人物太守大竒之曰身非仲尼督郵無愧顔子𡊮山松後漢書曰穆著論甚美蔡雍自至其家寫之穆感時澆薄慕尚敦篤乃作崇厚論其辭曰夫俗之薄也有自來矣故仲尼歎曰大道之行也而丘不與焉蓋傷之也夫道者以天下為一在彼猶在已也故行違於道則愧生於心非畏義也事違於理則負結于意非憚禮也故率性而行謂之道得其天性謂之德德性失然後貴仁義是以仁義起而道德遷禮法興而淳朴散故道德以仁義為薄淳朴以禮法為賊也夫中世之所敦已為上世之所薄况又薄於此乎故天不崇大則覆幬不廣地不深厚則載物不博人不敦龎則道數不逺昔仲尼不失舊于原壤楚莊不忍章于絶纓由此觀之聖賢之德敦矣老氏之經曰丈夫處其厚不處其薄居其實不居其華夫時有薄而厚施行有失而惠用故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為德誡其兄子曰吾欲汝曹聞人之過如聞父母之名斯言要矣逺則聖賢履之上世近則邴吉張子儒行之漢廷故能振英聲於百世播不滅之遺風不亦美哉然時俗或異風化不敦尚相誹謗謂之臧否記短則兼折其長貶惡則并伐其善悠悠皆是其可稱乎凡此之類豈徒乖為君子之道將有危身纍家之禍焉悲夫行之者不知憂其然故害興而莫之及斯既然矣又有異焉人皆見之而莫能自遷何則務進者趨前而不顧後榮貴者矜已而不待人智不接愚富不賑貧貞士孤而不恤賢者厄而不存故田蚡以尊顯致安國之金淳于以貴勢引方進之言夫以韓翟之操為漢名宰然猶不能振一貧賢薦一孤士况其下者乎此禽息史魚所以専名於前而莫繼於後者也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也何則先進者既往而不反後來者復習俗而追之是以虛華盛而忠信微刻薄稠而純篤稀斯蓋谷風有棄豫之嘆伐木有鳥鳴之悲矣嗟乎世士誠躬師孔聖之崇則嘉楚莊之美行希李老之雅誨思馬援之所尚鄙二宰之失度美韓稜之抗正貴丙張之𢎞裕賤時俗之誹謗則道豐績盛名顯身榮然後知薄者之不足厚者之有餘也何良俊曰觀朱公叔之論崇厚似欲含光混俗志存悶悶者及其著絶交論與劉伯宗絶交書又何察察忿狷若此耶蔡中郎以為括二論而言之則刺薄者博而洽斷交者貞而孤及考公叔之平生刺姦疾邪又若不肯以身而受物之汶汶者則崇厚之作豈亦其矯性之談歟蔡又云孤有羔羊之節與其不獲已而矯時也走將從夫孤焉余則以為孤不可以立訓乃録其崇厚著之篇鄭康成鄭玄己見在𡊮冀州坐𡊮山松後漢書曰𡊮紹字本初汝南汝陽人司空逢之庶子出後伯父成好英雄記曰紹不妄通賔客非海內知名不得相見又遊俠與張孟卓何伯求吳子卿許子逺伍德瑜為奔走之友時汝南應劭亦歸於𡊮東觀漢記曰應劭字仲逺汝南南頓人父奉司𨽻校尉劭少便篤學博覽多聞因起自贊曰故泰山太守應仲逺北面稱弟子何如鄭笑曰仲尼之門考以四科回賜之徒不稱官閥應有慙色符偉明在太學范曅後漢書曰符融字偉明陳留浚儀人少有鑒識先是漢中晉文經梁國黃子艾並恃才智炫曜上京融察其非真謂李膺曰二子行業無聞而使公卿問疾王臣坐門融恐小道破義空譽違實特宜察焉膺然之二人由是名論漸衰後以浮薄罪廢謝承後漢書曰融一見郭林宗便與之交又介於李膺以為海之明珠未耀其光鳥之鳯凰羽儀未翔膺與林宗相見待以師友之禮遂振名天下融之致也師事少府李膺膺風性髙簡每見偉明輒不聽他客前聽其言論偉明幅巾奮袖談辭如雲膺常捧手歎美范曅後漢書曰李膺字元禮頴川襄城人祖修太尉父益趙國相膺性簡亢無所交接唯以荀淑陳實為師友張彥真去官歸鄉道逢友人共班草言曰趙殺鳴犢仲尼臨河而反覆巢竭淵龍鳳逝而不至今宦豎日亂陷害忠良夫德之不逮人之無援將性命之不免奈何相抱而泣有一老父趨而過之植其杖太息言曰二丈夫何泣之悲也夫龍不隱鱗鳳不藏羽網羅髙懸去將安所雖泣何及乎二人欲與之語不顧而去司馬彪續漢書曰張升字彥真陳留尉氏人祖放富平侯范孟博以黨事繫獄詔遣中常侍王甫以次辨詰孟博越次對曰臣聞仲尼之言見善如不及見惡如探湯欲使善善同其清惡惡同其汚謂王政之所願聞不悟更以為黨甫問卿更相拔舉迭為唇齒有不合者動見排斥其意云何孟博慷慨仰天曰古之循善自求多福今之循善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然為之改容范曅後漢書曰范滂字孟博汝南細陽人少厲清節舉孝亷為清詔使登車攬轡有澄清天下之志及至州境守令自知贓汚望風解印綬去其所舉奏莫不厭塞衆望後以黨事誅曹公魏志曰曹操字孟德沛國譙人少機警有權數任俠放蕩不治行業後子丕代漢稱太祖武皇帝以楊太尉范曅後漢書曰楊彪字文先𢎞農華隂人曾祖震太尉祖秉太尉父賜司空彪少傳家學以博習舊聞公車徴拜議郎中平中代黃琬為司空與𡊮公路婚將誣以同逆英雄記曰𡊮術字公路汝南汝陽人司空逢之子後僣號于夀春孔文舉聞之不及朝服往見曹曰楊公四世清德海內所瞻周書父子兄弟罪不相及况以𡊮氏歸罪楊公易稱積善餘慶徒欺人耳曹公云此國家之意文舉曰假使成王殺邵公周公可得言不知耶今纓緌縉紳瞻仰明公者以公聰明仁智輔相漢朝今橫殺無辜則海內觀聽誰不解體孔融魯國男子明日便當拂衣而去不復朝矣范曅後漢書曰孔融字文舉魯國人孔子二十世孫七世祖霸為元帝師位侍中父宙泰山都尉融家傳曰融兄弟七人融第六幼有自然之性曹公曹操己見既殺楊德祖張隲文士傳曰楊修字德祖父彪漢太尉修辟丞相府主簿少有才䇿為曹操所忌以罪見殺後與太尉遇於朝堂曹問太尉公何瘦之甚太尉答曰愧無日磾先見之明班固前漢書曰金日磾子二人武帝所愛以為弄兒其後弄兒壯大不謹自殿下與宫人戲日磾適見之惡其淫亂遂殺弄兒猶懷老牛舐犢之愛曹公為之改容許汜襄陽耆舊傳曰許汜是楊慮同里人少師慮為魏武從事中郎昔在劉表坐論陳元龍者其人也與劉玄德續漢書曰劉備字玄德涿郡人漢景帝子中山靖王勝之後並在劉荆州坐英雄記曰劉表字景升山陽髙平人魯恭王之後領荆州牧身長八尺姿貌溫偉與張儉等號為八顧共論人物許曰陳元龍淮海之士豪氣不除謝承後漢書曰陳登字元龍下邳淮浦人學通古今處身循禮非法不行性兼文武有雄姿異略領廣陵太守玄德問許君言豪寧有事耶許曰昔遭亂過下邳見元龍無客主之意不相與語自上大床卧使客卧下床玄德曰君有國士之名今四海橫流帝王失所君須憂國忘家有救世之意乃求田問舍言無可採是元龍所諱也何緣當與君語如我自卧百尺樓上卧君於地下何但上下床之間哉荆州大笑玄德因言曰若元龍文武膽志當求之於古耳造次難得比也劉公幹辨敏無對文士傳曰劉楨字公幹東平人父梁字曼山少有清才以文學見責終野王令楨善文章尤工五言坐平視甄夫人配輸作部典略曰文帝為太子嘗請諸文學酒酣坐歡命夫人甄氏出拜坐中咸伏楨獨平視太祖聞之收楨減死輸作魏武至尚方觀作見劉匡坐磨石公問石何如劉因喻己自理跽而答曰石出荆山懸巖之顛外有五色之文內含卞氏之珍磨之不加瑩雕之不增文稟氣堅貞受之自然顧其理枉屈紆繞而不得申公笑釋之典略曰文帝嘗賜楨廓落帶其後師死欲借以為像因書嘲楨云夫物因人貴故在賤者之手不御至尊之側今雖取之勿嫌其不反也楨答曰楨聞荆山之璞曜元后之寶隨侯之珠燭衆士之好南垠之金登窈窕之首鼲貂之尾綴侍臣之幘此四寶者伏朽石之下潛汙泥之中而揚光千載之上發彩疇昔之外亦皆未能初自接於至尊也夫尊者所服卑者所修貴者所御賤者所先也故夏屋初成大匠先立其下嘉禾始熟農夫先嘗其粒恨楨所帶無他妙飾若實殊異尚可納也楨辭旨巧妙皆如是徐景山為尚書郎魏志曰徐邈字景山燕國薊人太祖平河朔召為丞相軍謀掾數嵗拜司空邈歎曰三公論道之官無其人則缺豈可以老病忝之哉固辭不受時科禁酒景山私飲至醉校尉趙達問以曹事景山答言中聖人逹白曹公公大怒由是得罪魏略曰時鮮于度遼曰平日醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳後文帝幸武昌見景山問曰頗復中聖人否景山答曰昔子反斃於穀陽御叔罰於飲酒臣嗜同二子不能自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑顧左右曰名不虛立盧欽論曰或問欽徐公當武帝之時人以為通自在涼州及還京師人以為介何也欽答曰往者毛孝先崔季圭用事貴清素之士于時皆變易車服以求名髙而徐公不改其常故人以為通比天下奢靡轉相倣效徐公雅尚自若不與俗同故前日之通乃今日之介也何尚書自言易義精了魚豢魏略曰何晏字平叔太祖納晏母收養晏其時秦宜祿兒阿蘇亦隨母在公家蘇性謹慎而晏無所顧憚服飾擬於天子文帝特憎之每不呼其姓字謂之假子晏尚主又好色故黃初時無所事任明帝立頗為冗官至正始曲合於曹爽爽用為散騎侍郎遷侍中尚書晏性自喜動靜粉白不去手行步顧影為尚書主選舉與之有舊者多被拔擢所不解者九事一日迎管公明共論管輅别見公明為剖析玄旨九事皆明尚書曰君論隂陽此世無雙時鄧玄茂亦在坐鄧言君見謂善易而語不及易中辭義何也公明尋聲答言夫善易者不論易尚書含笑贊之曰可謂要言不煩魏略曰鄧揚字玄茂南陽人少得士名與李勝等為浮華友事發被斥後為侍中尚書許臧艾以顯官艾以父妾與揚京師為之語曰以官易婦鄧玄茂孫討逆既定豫章還饗將士吳志曰孫䇿字伯符曹操表為討逆將軍謂虞仲翔虞翻别見曰孤昔再至夀春見馬日磾三輔決録曰日磾字翁叔馬融族孫獻帝時太傅與蔡雍楊賜堂溪典同校定石經及與中州士大夫會言我東方人多才耳恨學問不博語議之間有所不及孤意猶謂未爾卿博學洽聞故前欲令卿一詣許交見朝士以折中國妄語兒卿不願行便使張子綱吳志曰張紘字子綱廣陵人少逰學京都後避地江東孫䇿創業遂委質焉與張昭並與參謀常令一人居守一人征討江表傳曰初權於羣臣多呼其字惟呼張昭曰張公張紘曰東部所以重二人也恐子綱不能結兒輩舌也吳書曰紘見柟榴枕愛其文作賦陳琳在北見之以示人曰此吾鄉里張子綱所作後紘見陳琳作武庫賦應機論與琳書深歎美之琳答曰自僕在河北與天下隔此間率少於文章易為雄伯故使僕受此過荖之談今景興在此足下與子布在彼所謂小巫見大巫神氣盡矣紘既好文學又善楷書與孔融書自書融遺紘書曰前勞手筆多書每舉篇見字欣然獨笑如復覩其人也李令伯嘗聘吳吳主與羣臣泛論道義因言寧為人弟令伯曰願為人兄吳主問何願為兄令伯答曰為兄供養之日長吳主及羣臣稱善華陽國志曰李密字令伯犍為武陽人祖光朱提太守父早亡母何氏更適人密養於祖母治春秋左氏傳博覽多所通涉機警辨捷事祖母以孝聞其侍疾則泣涕側息日夜不解帶膳飲湯藥必自口嘗夲郡禮命不應州辟從事尚書郎王渾平吳之日登建業宫釃酒既酣謂吳人曰諸君亡國之餘得無戚乎晉書曰王渾字玄沖太原晉陽人父昶魏司空渾沉雅有器量以平吳功封一子江陵侯位至司徒時周子隱答曰漢末分崩三國鼎立魏滅於前吳亡於後亡國之戚豈惟一人王大有慙色虞預晉書曰周處字子隱吳郡陽羡人父魴吳裨將軍處入晉為御史中丞多所彈糾不避強禦齊萬年反以建威將軍西征臨陳慷慨奮不顧命遂死於戰劉季治善名稱有大辨曹爽用為選部郎魏志曰劉曅字子揚淮南成德人為太祖謀臣少子陶字季治亦髙才而薄行官平原太守王弼别傳曰淮南劉陶善論縱橫為當時所推鄧玄茂鄧揚己見之徒稱為伊吕季治意陵青雲嘗語傅休奕曰仲尼不聖何以知其然夫智者圖國天下羣愚如弄一丸於掌中而不能得天下休奕以其言大惑不復詳難謂季治曰天下之質變無常也會見卿窮後曹爽敗季治退居里舍乃謝其言之過晉書曰傅玄字休奕北地泥陽人祖燮漢漢陽太守玄少博學善屬文解鍾律性剛徑亮直不能容人之短向茂伯經事鍾士季鍾會别見人晉書曰向雄字茂伯河內山陽世語曰雄有節槩仕至護軍將軍鍾誅後茂伯收殮塋葬晉文王召茂伯責之曰往者王經之死卿哭於東市我不問也世語曰王經字彥偉清河人漢晉春秋曰髙貴鄉公見威權日去召侍中王沈尚書王經常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日與卿出討之王經曰昔魯昭公不忍季氏敗走失國為天下笑今權在其門朝廷四方皆為致死不顧逆順之理非一日也且宿衛空闕兵甲寡弱陛下無乃欲除疾而更深之耶宜見重詳帝出懷中版令投地曰行之決矣正使死何所懼况不必死耶入白太后沈業奔告文王晉諸公贊曰沈業將出呼王經經不從曰吾子行矣今鍾會作逆又輒收葬若復相容如王法何茂伯對曰昔先王掩骼埋胔仁流枯骨當時豈先卜其功罪今王誅既加於法已備雄感義收葬教亦無闕法立於上教𢎞於下何必使雄違生背死以立於時殿下讐枯骨以為將來仁賢之資乎晉王稱善鍾士季鍾會别見母嘗言人誰能皆體自然但力行不倦抑亦其次魏氏春秋同異曰鍾繇嬖庶子會之母黜其夫人文帝命繇復焉鍾恚忿飱椒致噤帝乃止劉尚書娶華家女生子不令或謂尚書曰君行髙一世而諸子不能遵何不旦夕切磋使自改耶尚書答曰吾之行事是所聞見不相祖習豈復教誨之所得乎世以劉言為當晉書曰劉實字子真平原髙唐人少貧苦賣牛衣以自給好學讀書博通古今清身潔己行無玷缺初鍾會鄧艾伐蜀或問二將其平蜀乎實曰破蜀必矣而皆不還客問其故笑而不答竟如其言實以世多進趣亷遜道缺著崇讓論以矯之裴叔道以辨論為業善敘名理辭氣清暢泠然若琴瑟聞者知與不知無不歎服晉諸公贊曰裴遐字叔道河東人父緯長水校尉遐少有理稱辟司空掾散騎郎郭洗馬入洛聽伎人歌言佳鄧粲晉紀曰郭訥字敬言官至太子洗馬石季倫問其曲王隱晉書曰石崇字季倫石苞子生於青州故小名齊奴為荆州刺史劫奪殺人以致巨富郭云不知季倫笑曰卿不識曲那得言佳郭答曰譬如見西施何必識姓名然後知美晉陽秋曰初訥仕吳為蒸陽令入晉久不進序陸機薦之曰訥風度簡曠器識朗拔通濟敏悟才足幹事出自新邦朝無知己居不遐外志不自營年時倏忽邈無階緒實州黨愚智所為恨恨衛叔寶少有名理善談老易自抱羸疾簡於酬對時友歎曰衛君不言言必入真晉書曰衛玠字叔寶河東安邑人祖瓘太尉父峘黃門侍郎標玠别傳曰玠頴識通逹天韻令謝幼輿敬以亞父之禮王尼見司馬太傅越曰公負尼物太傅言初不識此事尼曰昔楚人失布謂令尹盜者以令尹執政盜賊公行是與自盜無異今君左右有屋舍尼獨窮困是亦明公負尼物也太傅大笑與尼絹五十匹王尼别見卞望之在事公私肅然性不宏裕故為諸名士所少卞壼别傳曰壼字望之濟隂寃句人父粹太常卿壼少以貴正見稱厯尚書令蘇峻作逆率衆距戰父子俱死王難為鄧粲晉紀曰咸和中貴遊子弟慕王平子謝幼輿等逹卞厲色於朝曰悖禮傷教罪莫斯甚中朝傾覆實由於此欲奏治之王導庾亮不從乃止阮遙集嘗謂之曰卿恆無間泰常如含瓦石卞答曰諸君以道德恢𢎞風流相尚執鄙吝者非壼而誰阮孚别傳曰阮仲容所幸姑家婢生子仲容與姑書曰胡婢遂生胡兒姑答曰魯靈光殿賦曰胡人遙集於上楹可字曰遙集也故孚字遙集王敦犯順王敦别傳曰敦字處仲琅琊臨沂人少有名理纍遷青州刺史避地江左厯侍中丞相大將軍以罪伏誅功鄧粲晉紀曰初王導協贊中興敦有方面之敦以劉隗為間已舉兵討之詔公卿於石頭見敦敦問戴若思曰吾此舉動天下以為何如戴曰見形者謂之逆體誠者謂之忠敦笑曰卿可謂能言虞預晉書曰戴儼字若思廣陵人才義辨濟有風標鋒頴纍遷征西將軍為王敦所害建康遭蘇峻之難王隱晉書曰蘇峻字子髙長廣掖人少有才學仕郡主簿值中原亂招合流舊三千餘家結壘本縣逺近咸共宗焉討王敦有功遷厯陽太守峻外營將表曰鼓自鳴峻斫鼓曰我鄉里時有此則空城有頃詔徴峻峻曰臺下云我反反豈得活耶我寧山頭望廷尉不能廷尉望山頭乃作亂晉陽秋曰峻率衆二萬濟自橫江至蔣山王師敗績宫室焚蕩溫太真議遷都豫章虞預晉書曰溫嶠字太真太原祁人少標俊清徹英頴顯名為劉琨左司馬時二都傾覆天下大亂琨聞元皇受命慷慨幽朔志存本朝使嶠奉使嶠喟然曰嶠雖乏管張之才而明公有桓文之志敢辭不敏以違髙旨以左長史奉使纍遷驃騎大將軍三吳之豪請都會稽時異論紛紜王丞相曰建康古之金陵舊為帝里又孫仲謀劉玄德俱言王者之宅古之帝王不必以豐儉遷都茍𢎞衛文大帛之冠則無往不可若不績其麻則樂土為墟矣且北寇遊魂伺我之隙一旦示弱竄於蠻越求之望實俱非良計今特宜鎮之以靜羣情自安王丞相别傳曰王導字茂𢎞琅琊人祖覽以德行稱父裁侍御史導少知名家世貧約恬暢樂道未嘗以風塵經懷溫太真嘗問郭文舉郭文己見曰飢則思食壯則思室自然之性先生安獨無情乎文舉答曰思由憶生不憶故無情抱朴子曰郭文舉入陸渾山學道獨能無情意不生也翟道淵隱于潯陽庾公庾亮己見臨江州時欽其風素嘗束帶躡屐造之庾禮甚恭道淵曰使君直敬其枯木朽株耳庾稱其能言晉陽秋曰翟湯字道淵南陽人漢方進之後篤行任素義讓亷潔饋贈一無所受值亂多寇聞湯名德皆不敢犯此潯陽記曰亮表薦湯徴國子博士不赴主簿張玄曰君卧龍不可動也王安期去官東渡江道路梗澀人懷危懼王每遇艱險處之夷然雖家人不見其憂喜之色既至下邳登山北望歎曰人言愁我始欲愁謝太傅曰當爾時覺形神俱往名士傳曰王承字安期太原晉陽人父湛汝南太寄承沖淡寡欲無所循尚纍遷東海內史為政清靜吏民懷之避亂渡江元皇為鎮東引為從事中郎琅琊王鎮廣陵晉書曰琅琊孝王名裒字道成裒晉中興書曰元皇以明帝及琅琊王並非敬后所生謂裒有大成之度勝於明帝從容問王導曰立子以德不以年今二子孰賢導曰世子宣城俱有爽明之德莫能優劣如此故當以年於是更封裒為琅琊王妙選僚佐以阮遙集為長史帝語之曰卿既統軍府郊壘多事宜節飲也阮曰陛下不以臣不肖委以戎旅臣僶俯從事不敢有言正以今王在鎮威風赫然皇澤遐被賊寇斂迹氛祲既澄日月自朗臣亦何可爝火不息正應端拱嘯詠以樂當年晉陽秋曰阮孚字遙集陳留人咸第二子也少有智調而無雋異纍遷侍中吏部尚書王長史好儀形嘗覽鏡自照稱其父字曰王文開生如馨兒耶當時稱以為逹王長史别傳曰王濛字仲祖太原晉陽人其先出自周室經漢魏世為大族祖父佐北軍中候父訥葉令濛神氣清韶十餘嵗放邁不羣弱冠風流雅正外絶榮競內寡私欲辟司徒掾以后父贈光祿大夫王長史王濛己見語劉真長曰卿近大進劉曰卿仰看耶長史問何意劉曰不爾何由測天之髙也孟萬年好飲喜酣暢愈多不亂桓宣武嘗問酒有何好而卿嗜之孟答曰公但未知酒中趣耳孟嘉别傳曰嘉字萬年江夏鄳人曾祖父宗吳司空祖父揖晉廬陵太守宗葬武昌子孫家焉嘉少以清操知名庾亮領江州辟嘉部廬陵從事下都還亮引問風俗得失對曰待還當問從事吏亮舉塵尾掩口而笑語弟翼曰孟嘉故是盛德人轉勸學從事桓宣武嘗問孟萬年聽伎絲不如竹竹不如肉何也孟答曰漸近自然一坐咨嗟桓宣武征還劉尹真長己見出數十里迎之桓都不語直云垂長衣談清言竟是誰功劉答曰晉德靈長功豈在汝釋道安俊辨有髙才安和上傳曰釋道安者常山薄栁人本姓衛年十二作沙門神性聰敏而貌至陋佛圖澄甚重之值石氏亂於陸渾山修學為慕容俊所逼乃住襄陽以佛法東流經籍錯謬更為條章標序篇目為之注解自支道林等皆宗其理自北來荆州與習鑿齒相見晉中興書曰習鑿齒字彥威襄陽人自續晉陽秋曰鑿齒少而博學才情秀逸桓溫甚竒之州從事嵗中三轉至治中後以忤旨左遷户曹參軍衡陽太守在郡著漢晉春秋斥溫覬覦之心也道安因自通曰彌天釋道安習答曰四海習鑿齒當時以為名對許玄度將弟出都婚諸人無不欽遲既至見其弟乃甚癡都欲嘲棄之玄度為作賔主相對劉真長笑曰玄度為弟婚施十重鐡步障續晉陽秋曰許詢字玄度髙陽人魏中領軍允玄孫總角秀惠衆稱神童長而風情簡素司徒掾辟不就蚤卒謝太傅嘗賞愛𡊮彥伯機對敏速續晉陽秋曰𡊮宏字彥伯陳郡人魏郎中令渙六世孫也祖猷侍中父朂臨汝令宏起家安南司馬記室後彥伯出為東陽郡時賢祖道冶亭太傅起執彥伯手顧就左右取一扇授之因語云聊以贈行彥伯應聲答曰輒當奉揚仁風惠彼黎庶一時稱其率當謝太傅一生語未嘗誤每與客共語退後敘説向言皆有次第後忽一誤自知當必死其年果薨謝公謝安己見嘗有所咨於桓石秀石秀默然不答謝公甚怪之他日以語其從弟嗣嗣問之石秀曰此事非公所諳吾又何言桓石秀己見桓南郡桓玄别見問謝夫人婦人集曰謝夫人名道藴謝太傅大兄奕之女左將軍王凝之妻也有文才所著詩賦誄頌傳於世太傅謝安在東山二十餘年遂復不終其理云何夫人答曰亡叔先正以無用為心顯隱為優劣始末正當動靜之異耳桓靈寶征殷仲堪道出廬山因詣逺公語次及征討之意逺不答又問何以見願逺曰願檀越安隱使彼亦復無他桓出山語左右曰實乃生所未見釋慧皎髙僧傳曰慧逺本姓賈雁門樓煩人弱而好書圭璋秀發及長博綜六經尤善莊老性度宏偉宿儒英逹莫不服其深致後至潯陽見廬峯清靜始住龍泉精舍殷仲文嘗勸宋武帝畜伎帝曰我不解聲仲文曰但畜自解帝曰畏解故不畜續晉陽秋曰仲文字仲文陳郡人祖融太常父康吳興太守仲文為桓玄咨議參軍時王謐見禮而不親卞範之被親而少禮其寵遇隆重兼於王卞矣玄篡位以佐命親貴輿馬器服窮極綺麗後房妓妾數十絲竹不絶音玄敗先投義軍遷侍中以罪伏誅王韶之少家貧而好學嘗三日絶糧執卷不輟家人誚之曰困窮若此何不耕王徐答曰我常自耕耳沈約宋書曰王韶之字休泰琅琊臨沂人曾祖廙晉驃騎將軍祖羡之鎮軍掾父偉之郎中令韶之家貧父為烏程令因居縣境好史籍博涉多聞初為衛將軍謝琰行參軍戴仲若春日携雙柑斗酒人問何之答曰往聽黃鸝聲此俗耳針砭詩腸鼓吹戴顒己見宋武帝西討劉毅以諸葛長民監留府長民後有異謀猶豫不能發因屏人語劉穆之曰悠悠之言云太尉與我不平何以至此穆之曰公泝流逺伐以老母弱子委節下若有一毫不盡豈容若此長民意乃小安劉穆之别見劉毅諸葛長民與宋武帝同時起義並以事見誅宋武帝大會戲馬臺令諸人賦詩王曇首詩先成李延夀南史曰王曇首太保𢎞之弟幼有素尚兄弟分財曇首唯取圖書而已辟琅琊王大司馬屬帝以問其兄太保曰卿弟何如卿太保答曰臣弟若但如下官門户何寄武帝大笑宋書曰王𢎞字休元琅琊臨沂人曾祖導晉丞相祖洽中領軍父珣司徒𢎞少好學以清恬知名與尚書僕射謝混善弱冠為會稽王驃騎參軍宋武帝既正位語羣臣曰朕始望不至此衆人咸撰辭欲稱功德王太保率爾對曰所謂天命求之不可得推之不可去衆以為知言髙祖辟宗少文為主簿不起問其故少文答曰棲邱飲谷三十餘年髙祖善其對宋書曰宗炳字少文南陽涅陽人祖承宜都太守父繇之湘鄉令母同郡師氏聰辨有學義教授諸子炳居喪過禮為鄉閭所稱刺史殷仲堪桓玄並辟主簿舉秀才不就衡陽王義季語宗少文曰方欲屈先生以重祿宗答曰祿如腐草盛衰幾何元嘉中京尹蕭摹之請建佛寺帝與何尚之羊玄保數人議之尚之言渡江以來王庾諸公並稟志歸依則大教難得頓絶時羊玄保進曰此談蓋天人之際豈臣所宜與竊恐秦楚論強兵之術孫吳盡吞併之計將無取於此帝曰此非戰國之具良如卿言尚之曰夫禮隱逸則戰士怠貴仁義則兵氣衰若以孫吳為志茍在吞噬則無取堯舜之道豈惟釋教而已帝喜曰釋門有卿亦猶孔門之有季路所謂惡言不入於耳帝自是信心始立顧湘州顧覬之别見嘗在宋文帝坐論江東人物言及顧彥先𡊮陽源謂湘州曰卿南人怯懦豈辦作賊湘州正色曰卿乃復以忠義笑人陽源有慙色沈約宋書曰𡊮淑字陽源陳郡陽夏人丹陽尹豹少子也少有風氣數嵗伯父湛謂家人曰此非几兒及長善屬文彭城王起為祭酒遷左衛率及凶劭篡逆淑諫見害何尚之在選日有一人求為吏部郎尚之歎曰此敝俗也官當圖人人安得圖官時顔延之在坐大笑語尚之曰我聞古者官人以才今官人以勢彼勢之所求又何疑焉當時以二公為名言宋世祖嘗賜謝中書寶劒宋書曰謝莊字希逸陳郡陽夏人太常𢎞微子也七嵗能屬文仕至光祿大夫卒年三十六諡憲子玉南史曰莊韶令美風儀宋文帝見而異之曰藍田生豈虛也哉謝以與魯豫州送别後魯作逆世祖嘗因宴集問劒所在謝曰昔與魯爽别竊為陛下杜郵之賜世祖大悅當時以為知言宋書曰魯爽小名女生扶風郿人祖宗之父軌爽少有武藝世祖以為左軍將軍都督豫州軍事與南郡王義宣作逆薛安都臨陳刺爽傳首京都元凶篡立宋書曰元凶劭字休逺文帝長子也與始興王濬同謀弒逆世祖入討劭伏誅以顔延之為光祿大夫沈約宋書曰顔延之字延年琅琊人晉光祿大夫含之曾孫好讀書無所不覽文章之美冠絶當時吳國內史劉栁以為行軍參軍後為祕書監先是延之子竣為世祖參軍及義師入討竣參定密謀兼造書檄劭召延之示以檄文問曰此筆誰所造延之曰竣之筆也問何以知之延之曰竣筆體臣不容不識又問言辭何至乃爾延之曰竣尚不顧有老父何緣復有陛下劭意遂釋姓氏英賢録曰顔竣字士遜延之長子也少有令譽為宋孝武撫軍主簿甚被知遇竣盡心補益孝武鎮尋陽遷南中郎記室及文帝崩問至孝武舉兵入討轉咨議參軍領軍録事宋明帝嘗出射雉至日中無所得帝甚猜羞召問侍臣曰吾旦來如臯遂空行可笑座者莫答禇侍中言曰今節候雖適而雲露尚凝故斯翬之禽驕心未警但得神駕遊豫羣情便為載歡南史曰禇炫字彥緒彥回從父弟也父法顯鄱陽太守炫少清簡為從舅王景文所知齊臺建為侍中以家貧出補東陽太守謝孺子特善聲律南史曰孺子陳郡陽夏人祖景仁左僕射父恂鄱陽太守孺子少與族兄莊齊名多藝能尤善聲律家貧求為西陽太守與王車騎張宴桐臺孺子吹笙王自起舞既而歎曰真使人飄颻有伊洛間意南史曰王彧字景文與明帝諱同故以字行祖穆司徒謐之長兄父僧朗尚書景文美風姿好言理少與謝莊齊名為從叔球所知張征北為吳興南史曰張永字景雲吳郡吳人會稽太守張裕子也涉獵書史能為文章善𨽻書騎射雜藝觸類兼善又有巧思紙墨皆自營造上每得永表啓輒執玩咨嗟歎供奉者了不及也請沈驎士入郡沈聞郡後堂有佳山水乃往停數月張欲請為功曹使人致意沈曰明府德履沖素留心山谷民是以被褐負杖忘其疲病必欲飾混沌以蛾眉冠越客於文冕走雖不敏請附髙節有蹈東海而死爾南史曰沈驎士字雲楨吳興武康人祖英期晉太中大夫父虔之宋樂安令驎士幼俊敏七嵗聽叔父嶽言玄賔散言無所遺嶽撫其肩曰若斯文不絶其在爾乎及長博通經史有髙尚之心親亡居喪盡禮忌日輒流涕彌旬居貧織簾誦書口手不息鄉里號為織簾先生張景胤小名查南史曰張敷字景胤母亡年數嵗便有感慕之色性整貴風韻甚髙好讀玄言兼屬文論父卲使與高士宗少文談繫象往復數畨少文每欲屈握麈尾歎曰吾道東矣於是名價日重宋武帝聞其美召見竒之曰真千里駒也以為中軍參軍父茂宗小名梨南史曰張邵字茂宗會稽太守裕之弟晉琅琊內史後仕宋終吳興太守宋文帝嘗戲之曰查何如梨景胤答曰梨為百果之宗查何可比齊髙帝時魏人南伐至淮而退帝問何意忽來忽去時未有應者張思光張融己見在下坐抗聲言曰以無道而來見有道而去公卿歎以為佳栁侍中栁世隆己見盛事墳典張思曼語之曰觀君舉措當以清名遺子孫耶栁曰一身之外亦復何須子孫不才將為爭府如其才也不如一經良俊按裴昭明傳亦載此事未應二人同時並有斯語江夏王鋒在南徐州與行事王文和别駕江祏王文和未詳江祏别見並相交欵後文和被徴為益州置酒告别文和流淚言曰下官少來未嘗作詩今日違戀不覺文生於情王仲寶聞之曰江夏可謂善變素絲者也南史曰江夏王鋒字宣頴齊高帝第十二子也性方整五嵗好學書十嵗便能屬文出為南徐州刺史常忽忽不樂作修柏賦以見志張寶積為湘州行事時蕭頴胄在江陵寶積乘腰輿詣之舉動自若頴胄問何至之晚答曰本朝危亂四海橫流既不能為比干之死實未忍為微子之去是以至晚頴胄深以為善南史曰寶積張稷第六弟也永元中為湘州行事蕭穎胄用為相府咨議釋僧鍾南遊京邑住中興寺梁釋慧皎髙僧傳曰釋僧鍾姓孫魯郡人十六出家居貧履道嘗出夀春譙郡公請講百論導公往聽之謂人曰後生可畏真不虛矣永明初魏使李道固來聘會于寺內帝以鍾有辨才勑令酬對往復移時言無失措日影小晚鍾不食道固問何以不食鍾曰古佛道法過中不餐道固曰何為聲聞耶鍾答曰應以聲聞得度者故現聲聞當時以為名對禇彥宣少秉髙節常非從兄彥回身事二代聞彥回拜司徒歎曰彥回少立名行不意披猖至此門户不幸乃復有今日之拜使彥回作中書郎而死不當是一名士耶名德不昌遂令有期頤之夀禇淵己見彥南史曰禇照字彥宣回從父弟也父法顯鄱陽太守照少有髙節除國子博士以一目眇不拜世祖在東宫日嘗於玄圃宴集沈率數勸禇司徒酒南史曰沈文季字仲逹吳興武康人父慶之侍中文季以寬雅正直見知沈攸之反齊髙帝用為太子右衛率司徒甚不平啓世祖曰沈文季謂淵經為其郡數加淵酒沈率曰惟桑與梓必恭敬止豈如明府亡國失土不識枌榆譏司徒事二姓禇司徒甚重殷長史南史曰殷睿陳郡人王奐壻也奐敗伏誅嘗語之曰諸殷自荆州以來無出卿右殷斂容答曰殷族衰悴誠不如昔若此旨為虛固不足降此旨為實彌不可聞周彥倫清貧寡欲終日常蔬食雖有妻子獨處山舍南齊書曰周顒字彥倫汝南安城人晉僕射顗七世孫祖虎頭貟外常侍父恂歸鄉相顒少為族祖朗所知解褐海陵國侍郎轉著作撰起居注衛將軍王儉嘗問彥倫曰卿山中何所食彥倫答曰赤米白鹽緑葵紫蓼南齊書曰王儉字仲寶琅琊臨沂人祖曇首父僧綽儉生而僧綽遇害為叔父僧虔所養數嵗襲爵豫章侯拜受茅土流涕嗚咽幼有神彩専心篤學手不釋卷仕至中書監文惠太子齊書曰文惠太子長懋字雲喬小字白澤世祖長子也嘗問周彥倫菜食何味最佳彥倫曰春初早韭秋末晚菘周彥倫少往外氏臧車騎質家得衛峘散𨽻書法學之甚能文惠太子使彥倫書玄圃茅齋壁國子祭酒何胤以倒薤書求就彥倫換之彥倫笑曰天下有道丘不與易也宗敬微答府召云何為謬傷海鳥橫斤山木南史隱逸傳曰宗測字敬微一字茂深南陽涅人炳之孫也家居江陵性靜退不樂人間齊世祖幸豫章王東田宴南齊書曰豫章文獻王嶷字宣儼太祖第二子寬仁𢎞雅有大成之量太祖特鍾愛焉諸王咸在獨不召武陵王南史曰武陵昭王曅字宣照太祖第五子也剛頴雋出工奕棊豫章曰風景殊美今日甚憶武陵上乃呼之武陵至便射屢發命中顧謂四坐曰手如何帝神色甚怪豫章曰阿五常日不爾今可謂仰藉天威帝遂釋然永明末京邑人士盛為文章談義皆湊竟陵王西邸南齊書曰竟陵文宣王子良字雲英世祖第二子也劉士章為後進領袖機悟多能南史曰劉繪字士章彭城安上里人劉勔子也初為齊髙帝行參軍仕梁轉大司馬從事中郎時張思光周彥倫張融周顒並己見並有言工張音旨緩韻周辭致綺捷士章言吐又頓挫有風氣時人為之語曰劉繪貼宅别開一門何義方言不虛妄蓋其天性梁書良吏傳曰何逺字義方東海郯人每戲語人曰卿若得我一妄語則謝卿一縑衆共伺之終莫能得梁髙祖遣王領軍杲聘何子季領軍曰今君遂當邈然絶世猶有致身理不何曰卿但以事見推吾年巳五十三月食四斗米不盡何容得有宦情昔荷聖王眄識今又蒙旌賁甚願一詣闕但比腰腳大惡此心不遂耳阮居士嘗與吳郡范元琰同徴不起梁書曰阮孝緒字士宗陳留尉氏人父彥之宋從事中郎孝緒少懷栖遁屏居人外非定省未嘗出戶家人莫見其面親友因呼為居士陳郡𡊮峻語之曰往者天地閉賢人隱今世路已清而子猶懷栖遁耶居士曰昔周德雖興夷齊不厭薇蕨漢道方盛黃綺無間山林為仁由己何關人世梁書曰孝緒著髙隱傳上自炎黃終于天監之末分為三品又著論云夫至道之本貴在無為聖人之迹存乎拯弊弊拯由迹迹用有乖於本本既無為有為非道之至然不垂其迹則世無以平不究其本則道實交喪丘旦將存其迹故宜權晦其本老莊但明其本亦宜深抑其迹迹既可抑數子所以有餘本方見晦尼丘是故不足非得一之士闕彼明智體之之徒獨懷鑒識然聖已極照反創其迹賢未居宗更言其本良由迹須拯世非聖不能本實明理在賢可照若能體兹本迹悟彼抑揚則孔莊之意其過半矣阮居士嘗曰非志驕富貴但性畏廟堂若使麏麚可驂何以異夫騏驥王季文南史曰王份字季文琅琊人祖僧朗宋尚書右僕射父粹黃門侍郎份歷官侍中丹陽尹兄子肅在北屢引魏人來侵疆場南史曰王奐字道明景文兄子也為雍州刺史加都督與寧蠻長史劉興祖不睦擅自殺之臺徴不就裴叔業於城內起兵攻奐斬之奐長子融融弟琛於都棄市琛弟肅秉並奔魏世祖嘗因侍坐從容問季文曰近有北信不季文斂容答曰肅既近忘墳柏寧逺憶有臣王侍中王份嘗因侍宴髙祖問羣臣朕為有為無侍中答曰陛下應萬物為有體至理為無蕭引書法遒逸陳宣帝嘗指其署名語諸人曰此字筆勢翩翩似鳥之欲飛引答曰此乃陛下假其羽毛耳南史曰蕭引字叔休南蘭陵人曾祖思話祖惠休父介並有名引方正有器度聰敏博學善屬文仕梁位西昌侯主簿侯景之亂南奔嶺表北還拜尚書金部侍郎徐孝穆徐陵别見使魏魏人授館宴賔是日甚熱主客魏收嘲孝穆曰今日之熱當由徐常侍來北史曰魏收字伯起小字佛助巨鹿下曲陽人少機警不持細行隨父在邊好習騎射後折節讀書精力不輟以文華顯除太學博士至中書監孝穆從容答曰前王肅至此為魏始制禮儀今我來聘使卿復知寒暑北史曰王肅字恭懿琅琊臨沂人父奐齊雍州刺史肅少聰辨涉獵經史頗有大志位祕書丞父奐為齊武帝所殺肅自建業來奔孝文虛襟待之引見問故肅辭義敏切辨而有禮帝甚哀惻之官散騎常侍揚州刺史語林卷四
