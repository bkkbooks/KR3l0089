body:
  text: 語林卷二十七明何良俊撰排調第二十七詩美衛武公善謔即孔子於子游亦有牛刀之戲蓋弛張委蛇先哲之盛事也下至衰世之君所為失德纍數諌而不從者優伶之徒往往以一言悟主易於轉圜若優孟優旃黃幡綽敬新磨之類是也太史公稱談言微中亦可以解紛則排調亦何可少哉然稍過甚則亦多為厲階故世稱君子雅謔以不虐為善此編所載庶幾近之司馬建公魏志曰司馬防字建公宣王之父嘗舉曹公為北部尉後曹公進爵為王召建公到鄴與歡飲語之曰孤今日可復作尉否建公曰昔舉大王時適可作尉耳魏太祖嘗因宴㑹嘲王景興王朗己見曰不能效君昔在㑹稽折粳米飯也王仰而歎曰宜適難值太祖問云何王曰如朗昔者未可折而折如明公今日可折而不折五官將曹丕己見既納𡊮熙妻孔文舉與曹公書曰武王伐紂以妲己賜周公曹公以文舉博學真謂書傳所記後見文舉問之答曰以今度之想當然耳蘇文師拜侍中舊儀侍中親省起居故俗謂之執虎子虎子云是溲器時蘇同郡有吉茂者為冗散見蘇嘲之曰仕進不止執虎子蘇笑曰我誠不能效汝蹇蹇驅鹿車馳也張裕饒鬢蜀志曰張裕字南和蜀郡人明曉占候而天才過於周群蜀先主在劉璋坐嘗嘲之曰昔吾居涿郡特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕即答曰昔有作上黨潞長遷為涿令去官還家時人與書欲署潞則失涿署涿則失潞乃署曰潞涿君先主無鬢故裕以此嘲之張奉使吳以姓名調闞澤澤不時答吳志曰闞澤字德潤㑹稽山隂人家世農夫澤好學居貧無資常為人傭書以供筆札所寫既畢誦讀亦遍究覽羣籍由是顯名孫權以為尚書吳録曰虞翻稱澤曰闞生矯傑蓋蜀之揚雄又曰闞子儒術德行今之仲舒也薛敬文薛綜己見下行酒因勸奉酒曰蜀者何也有犬為獨無犬為蜀橫目勾身蟲入其腹奉曰不當復說君吳耶敬文應聲曰無口為天有口為吳君臨萬邦天子之都於是舉坐大笑孫權嘗燕見蜀使費禕逆勑羣臣使禕至伏食勿起禕至權為輟食而諸人不起禕調之曰鳳凰來翔麒麟吐哺驢騾無知伏食如故諸葛恪應聲答曰爰植梧桐以待鳳凰有何燕雀自稱來翔何不彈射使還故鄉費禕别傳曰孫權每别置好酒以酌禕視其醉然後問以國事辭難纍至禕輒辭以醉退而撰次所問事條答無所遺失張君嗣在益州為雍闓縛送孫權蜀志曰張裔字君嗣蜀郡成都人治公羊春秋博涉史漢許文休入蜀謂裔幹理敏捷是中夏鍾元常之倫也武侯遣鄧芝使吳蜀志曰鄧芝字伯苖義陽新野人漢鄧禹之後避亂入蜀先主用為廣漢太守後先主崩武侯恐孫權異計遣芝奉使芝成好而還權謂芝曰若天下太平二主分治不亦樂乎芝對曰夫天無二日土無二王如并魏之後大王未深識天命君各茂其德臣各盡其忠將提枹鼓則戰爭方始耳權笑曰君之誠欵乃爾耶權與亮書曰丁肱掞張隂化不盡和合二國唯有鄧芝令言次從權請裔裔自至吳流徙伏匿權未之知故許芝遣裔裔臨發乃引見問裔曰蜀卓氏寡女亡奔相如貴土風俗何以乃爾裔曰愚以為卓氏寡女猶賢於買臣之妻諸葛武侯出駐漢中以張君嗣領留府長史張嘗北詣武侯咨事送者盈路車凡數百乘張還書與所親曰近者涉道晝夜接賔不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死人皆稱其談啁流速之美孫權大㑹將佐命諸葛元遜行酒次至張輔吳張昭己見前張先有酒色不時肯飲曰此非養老之禮也權謂元遜曰卿但令張公辭屈乃當飲耳元遜即難張曰昔尚父九十秉旄仗鉞猶未告老今軍旅之事將軍在後酒食之事將軍在前何謂不養老也張卒無辭遂為盡爵曽有白頭鳥集吳殿前孫權問羣臣曰此何鳥也諸葛元遜對云此名為白頭翁張輔吳自以坐中最老疑元遜以鳥戲之因曰恪欺陛下未嘗聞鳥名白頭翁者試使恪復求白頭母元遜曰鳥名鸚母未必有對試使輔吳復求鸚父張不能答一坐大笑諸葛子瑜面長似驢孫權嘗大㑹羣臣使人牽一驢入長檢其面題曰諸葛子瑜時元遜在坐跪請筆益兩字權聽與筆元遜續其下曰之驢舉坐歡笑權命以驢與元遜鍾育兄弟頴悟絶人每有嘲戲未嘗困躓育嘗語㑹聞安陸能作調試共視之乃盛飾共載行至西門一女子笑曰車中央殊髙二鍾都不覺車後一門生云向己被嘲鍾愕然門生曰中央髙者兩頭羝二鍾多髯故以為戲州泰為司馬宣王所知泰屢在艱中宣王留缺待之至三十六日擢為新城太守宣王為泰㑹使尚書鍾元常調泰曰君釋褐登宰府三十六日擁麾蓋守兵馬郡乞兒乘小車一何駛乎泰曰誠有此君名公之子少有文采故守吏職獮猴騎土牛又何遲也衆賔咸悅魏志曰州泰南陽人好立功名宛世語曰初荆州刺史裴濳以泰為從事司馬宣王鎮濳數遣詣宣王由此為宣王所知及征孟逹泰又導軍遂辟泰庾純與賈充志趣不同二人並己見一日賈宴朝士而庾後至賈曰君行常居人前今何忽在後庾曰且有小市井事不了是以來後世言庾之先嘗有伍伯賈之先有市魁因以相譏劉道真嘗與一人共索柈草中食見一嫗將兩兒過並青衣劉調之曰青羊將兩羔嫗答曰兩豬共一槽晉百官名曰劉寶字道真髙平人劉道真於河側自牽船見一老嫗採梠劉調之曰女子何不調機利杼而採梠嫗答曰丈夫何不跨馬揮鞭而牽船鍾雅語祖士言我汝潁之士利如錐卿燕趙之士鈍如槌祖曰以我鈍槌打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神槌王仲祖好飲茶賔至輒命飲之士大夫皆患其如此每欲往候必曰今日有水厄琅琊有一諸葛面病鼠瘻劉真長見之歎曰鼠乃復窟穴人面耶劉尹見桓公每嬉戲必取勝一日謂桓曰卿乃爾好利何不焦頭刁彛於桓公坐晉書曰刁彛字大倫渤海饒安人刁協之子嘲韓博曰君是韓盧後博誤應曰卿是韓盧後桓公笑曰刁以卿姓韓故相問耳他自姓刁那得復是韓盧後博曰明公未之思耳短尾者則為刁也桓公大悅一坐歎以為佳崔鴻十三國春秋前凉録曰苻堅復有兼并之規天錫大懼遣從事中郎韓博奉表於晉又與桓溫書尅期大舉范武子嘗患目痛晉中興書曰范寧字武子慎陽縣人博學通覽纍遷中書郎豫章太守就張處度求方晉東宫官名曰張湛字處度髙平人司張氏譜曰湛祖嶷正員郎父曠鎮軍馬湛仕至中書郎處度因嘲之曰古方宋陽里子少得其術以授魯東門伯魯東門伯以授左丘明及漢杜子夏鄭康成魏髙堂隆晉左太沖凡此諸賢並有目疾相傳此方云用損讀書一減思慮二專內視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣篩藴於胸中七日然後納諸方寸修之一時近能數其目睫逺視尺捶之餘長服不已洞見牆壁之外非但明目乃亦延年習鑿齒以腳病廢居里巷符堅滅樊鄧素聞鑿齒名與釋道安並致焉與語大悅以其蹇疾裁堪半丁堅與諸鎮書曰晉氏平吳利在二俊今破漢南得士一人半耳有人詣謝公别謝公流涕此人了不悲既去左右曰向客殊自密雲謝公曰非徒密雲乃自旱雷耳謝敷隱居㑹稽山初月犯少微星少微一名處士星識者以隱士當之時吳國戴逵名重於敷時人憂之俄而敷死故㑹稽士人以嘲吳人云吳中髙士便是求死不得檀道鸞續晉陽秋曰謝敷字慶緒㑹稽人崇信釋氏入太平山十餘年以長齊供養為業招引同事化納不倦以母老還若耶中內史郤愔表薦之徴博士不就顧愷之見謝萬因論神仙顧問云仙者之乘或羊或鹿使君當乘何物耶謝曰居家者遇物斯乘卿輩即轅中客也謝康樂父瑍生而不慧為祕書郎早亡康樂小時便文藻豔逸祖車騎甚竒之謂親知曰我乃生瑍瑍那得不生靈運何尚之與顔延年少相好狎二人並短小尚之嘗謂延年為猿延年目尚之為猴一日同遊太子西池延年問路人云吾二人誰似猴此人指尚之為似延年喜笑此路人曰彼似猴君乃是真猴范蔚宗范曄己見臨刑時妓妾來别蔚宗悲涕流漣謝綜時亦同刑宋書曰外甥謝綜為曄所知顧謂蔚宗曰舅殊不同夏侯色先是曄在獄作詩曰禍福本無兆性命歸有極必至定前期誰能延一息在生已可知來緣㦎無識好醜其一丘何足異枉直豈論東陵上寧辨首陽側雖無嵇生琴庶同夏侯色寄言生存子此路行復即故綜以譏曄沈約宋書曰曄意入獄便死上窮治其獄遂經二旬曄更有生望獄吏戲之曰外傳詹事或當長繫曄聞驚喜綜熙先笑曰詹事在西池射堂上躍馬顧盻自以為一世之雄今擾攘紛紜畏死乃爾設令今賜以性命人臣圖主何顔可以生存曄謂獄將曰惜哉薶如此人將曰不忠之人亦何足惜曄曰大將言是也范蔚宗撰和香方其序云麝本多忌過分必害沉實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息鬱金捺多和羅之屬並被珍於外國無取於中土及棗膏昏鈍甲煎淺俗非惟無助於馨烈乃當彌增於尤疾此序所言悉以比類朝士麝本多忌比庾炳之零藿虛燥比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊𤣥保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沉實易和以自况也宋太祖嘗面許張思光融為司徒長史敕竟不下張乘一馬甚瘦太祖見之問曰卿馬何瘦給粟多少張曰日給粟一石上曰食粟不少何瘦如此張曰臣許而不與明日即除司徒長史王延之己見阮韜俱是劉湛己見外甥並有早譽劉甚愛之嘗曰韜後當為第一延之其次也延之甚不平後為江州每致餉下都韜與朝士同例髙祖聞之與延之書曰韜云卿未嘗有别意當由劉家月旦耶南史曰阮韜字長明陳留人晉光祿大夫裕𤣥孫也為南兖州别駕江夏王求資費錢韜曰此朝廷物也執不與張思光既免官為詩與何徴士何求己見有髙尚之言何答曰昔聞東都日不在簡書前思光久病之及何後婚孔氏女思光始為詩贈何曰惜哉何居士薄暮遘荒淫何亦病之而無以釋也謝吏部謝朓己見初告王敬則反狀蕭子顯齊書曰王敬則晉陵南沙人母為女巫生敬則而胞衣紫色謂人曰此兒有鼓角相敬則兩腋下生乳各長數寸夢騎五色獅子二十善拍張明帝即位為直閣將軍進大司馬以事伏誅謝妻是敬則女常懷刀欲報謝謝不敢相見及為吏部郎謝自叙謙挹沈昭略謂之曰卿人地之美無愧此職但恨今日刑于寡妻南史曰眺臨刑歎曰天道其不可昧乎我雖不殺王公王公因我而死文齊書曰沈昭略字茂隆吳興武康人祖慶之太尉父振侍中昭略性狂雋不事公卿升平末為相國西曹掾齊髙帝謂王儉曰南士中有沈昭略何職處之儉以擬前將軍尋為中書郎遷侍中永元中與叔文季俱召入華林省賜藥酒卒江祏及弟祀南史曰江祏字宏業濟陽考城人姑為齊髙帝兄始建王妃生明帝祏少為明帝所親恩如兄弟明帝入纂拜寧朔將軍官中書令弟祀字景昌位晉安王鎮北長史明帝崩祏受遺輔政以謀廢東昏兄弟同日見殺與劉渢劉晏南史曰劉渢字處和南陽人為始安王遙光咨議遙光敗與弟謙俱見殺俱候謝𤣥暉𤣥暉戲之曰可謂帶二江之雙流齊太祖嘗置酒為樂清河崔思祖侍宴謂沈侍中沈文季己見曰羮膾為南北所推沈答曰羮膾乃吳食非卿所知思祖曰炮鱉膾鯉似非勾吳之詩沈曰千里蓴羮豈關魯衛之事帝稱美曰蓴羮頗須歸沈南史曰崔祖思字敬元清河東武城人崔琰七世孫少有志氣好讀書齊髙帝在淮隂祖思聞風自結為上輔國主簿參預謀議齊朝建官青冀二州刺史王儉與王敬則同拜三公徐孝嗣於崇禮門候儉因嘲之曰今日可謂連璧儉曰不意老子遂與韓非同傳梁武朝盛於佛教朝賢多啓求受戒江休映精信因果而髙祖未知梁書曰江革字休映濟陽考城人祖齊之宋金部郎父柔之齊倉部郎革早有才思六嵗便屬文仕至光祿大夫謂江不奉佛乃賜江覺意詩五百字云惟當勤精進自强行勝修豈可作底突如彼必死囚以此告江革并及諸貴游又手敕云世間果報不可不信豈得底突如對元延明耶江因啓乞受菩薩戒南史曰革在彭城南下為魏人所執魏徐州刺史元延明聞革才名厚加接待革稱腳疾不拜延明將害之見革辭色嚴正更加敬重時祖暅同被拘執延明使暅作欹器漏刻銘革唾暅曰卿荷國厚恩乃為虜立銘孤負朝廷延明又令革作丈八寺碑革辭以囚執既久無復心思延明將加箠朴革厲色曰江革年六十不能殺身報主今日得死為幸誓不為人執筆延明知不可屈乃止朱异遍治五經涉獵文史兼通雜藝博奕書算皆其所長年二十詣都沈尚書約戲語曰卿年少何乃不廉异逡巡未達其㫖約曰天下唯有文義棋書卿一時將去那得云廉朱异己見殷孚沈約宋書曰孚殷淳子有父風大明末為尚書吏部郎與何朂嘗共食朂是何無忌子孚羮盡朂曰益殷􅐜羮孚答曰何無忌諱謝鳳子名超宗謝莊子名朏宋明帝敕二人由鳳莊門入超宗曰君命不可以不往乃趨而入朏曰君處臣以禮遂不入王僧䖍子慈謝鳳子超宗並己見並年少戲狎慈方學書超宗曰卿書何如䖍公慈曰慈書比大人猶雞之比鳳謝莊子􅀢劉勔子悛嘗同飲悛曰謝莊兒不可云不能飲􅀢曰茍得其人自可流湎千日何承天為著作時年已老而諸佐郎並名家年少潁川荀伯子嘲之常呼為奶母何曰卿當云鳳凰將九子何言奶母耶南史曰何承天東海郯人母徐廣姊聰明博學故承天幼漸訓義博見古今為一時所重除著作佐郎陸澄當世稱為碩學讀易三年不解文義欲撰宋書終不能成王儉戲之曰陸公書厨也到舍人梁書曰到鏡字圓照到溉子五嵗口授為詩婉有詞致位太子舍人作七悟文甚美子藎小時聰慧南史曰到鏡子藎早聰慧仕尚書殿中郎嘗從髙祖幸京口登北顧樓賦詩藎受詔便就上覽以示其祖溉曰藎定是才子翻恐卿從來文章假手於藎因賜溉連珠曰研磨墨以騰文筆飛毫以書信如飛蛾之赴火豈焚身之可肱必耄年其已及可假之於少藎初梁武帝與任昉相遇於竟陵王西邸從容語昉曰我登三事當以卿為記室昉亦戲帝曰我若登三事當以卿為騎兵以帝善騎故也後帝既登大位與昉語次因及此語昉仰謝曰昔承清宴屬有緒言提挈之㫖形於善謔豈謂多幸斯言不渝釋寶淵廣寫義疏貴市王征南書緘封一簏有意西歸同寺慧濟謔之曰昔謝氏青箱不至不得作文章今卿白簏未來判無講理淵曰殊不然此乃打狗杖耳釋道宣續髙僧傳曰釋寶淵本姓陳巴西閬中人年二十三於成都出家居羅天宫寺酷好蒲撲使酒挾氣師僧旻曉喻返以為讐因爾改塗復從智藏採托先業自建講筵劉諒為湘東王所善梁元帝始封湘束王湘東一目眇一日與諒共遊江濵歎秋望之美諒曰今日可謂帝子降於北渚湘東以為刺巳因語諒曰卿言目眇眇而愁豫耶由此嫌之南史曰諒字求信彭城人祖繪大司馬從事中郎父孝綽祕書監諒少好學有文才尤悉晉代故事時號皮裏晉書魏伯起昔在京洛輕薄尤甚時為之語曰魏收驚蛺蝶後文襄遊東山令諸臣宴文襄曰魏收恃才卿輩適須出其短往復數畨伯起忽大唱曰楊遵彥理屈已倒楊從容言曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蛺蝶也文襄先知之大笑稱善魏佛助與邢子才意趣不協更相詆毀魏每議陋邢文邢云江南任昉文體本踈魏收非直模擬亦大偷竊魏聞乃曰伊嘗於沈約集中作賊何意道我偷任昉任沈俱有重名邢魏各有所好武平中黃門郎顔之推以二公意問祖僕射祖曰見邢魏之臧否即是任沈之優劣魏收邢邵己見不北齊書曰祖瑩字孝徴神情機警詞藻遒逸性踈率能廉慎起家祕書郎顔之推字介琅琊臨沂人祖見逺父協並以義烈稱之推博覽書史辭情典麗為湘東王右常侍好酒任縱不修邊幅時論少之祖孝徵所乘老馬自稱騮駒又與寡婦王氏姦通每人前相聞往復裴讓之與祖早狎嘗於衆中嘲祖曰卿珽那得如此詭異老馬十嵗猶號騮駒一妻耳順尚稱娘子于時喧然傳之北史曰裴讓之字士禮河東聞喜人少好學有文情清明俊辨早得聲譽對策髙第歷屯田郎中兼散騎常侍聘梁文宣時賜死王沙彌晞嘗詣晉祠賦詩曰日落應歸去魚鳥見留連忽有相王使至召王不時至明日在丞相西閣祭酒盧思道謂王曰昨被召己朱顔得不以魚鳥致怪王緩笑曰昨晚陶然頗以酒漿被責卿輩亦是留連之一物豈直魚鳥而已徐之才聰辨强識有兼人之敏尤好劇談公私㑹聚多相嘲戲常嘲王昕姓云有言則誑近犬則狂加頸足而為馬施角尾而為羊盧元明因戲之才云卿姓是未入人名是字之誤徐即答云卿姓在亡為虐在丘為墟生男則為虜配馬則為驢又嘗與朝士出遊遙望羣犬競走諸人試令目之徐應聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂阮孚性機辨好酒貌短而禿周文帝偏所愛重常於室內置酒十瓶瓶大一斛上皆加帽欲以戲孚孚適入室見即驚喜曰吾兄弟輩甚無禮何為入王家匡坐相對宜早還宅因持酒去周文帝憮然大笑齊世有席毗嗤鄙文學嘲劉逖曰君文如朝菌須臾之􅥬豈比吾千丈松常有風霜劉答云既有寒木又發春花可乎席不能屈席毗未詳亭三國典略曰劉逖字子長彭城叢里人漢楚王後也少好弋獵後倦於羈旅發憤自勵專精讀書晉陽都㑹之所霸朝人士咸務宴集逖卷不離手遇有文籍所未見者則終日諷誦或通夜不歸亦留心文藻頗工詩詠齊天保初行定陶縣令王肅好魚己見在北時彭城王協嘗戲之曰卿不重齊魯大邦而愛邾莒小國王對曰鄉曲所美不得不好彭城復謂曰卿明日顧我為卿設邾莒之餐亦有酪奴北人因號茗飲為酪奴孫彥舉以文才著稱然學淺行薄邢邵嘗謂之曰卿更須讀書孫曰我精騎三千足敵君羸卒數萬北史曰孫搴字彥舉樂安人少勵志勤學孫騰薦之齊神武㑹神武西征命李義深李士略作檄文皆辭請以搴代神武引搴入帳自為吹火催促之搴神色安然援筆立就其文甚美神武大悅署相府主簿李庶生而天閹崔諶調之曰教弟種鬚法以錐遍刺作孔插以馬尾庶曰先以此方回施貴族藝眉有效然後樹鬚世傳諶門有惡疾以呼沱為墓田故庶言及之崔鴻十三國春秋曰李庶黎陽人魏大司農諧之子以清才每接梁使徐陵謂其徒曰江北有李庶可語耳庶無鬚髯人謂天閹宗如周面狹長蕭察戲之曰卿何為謗經如周曰身自來不謗經蔡大寶曰卿當不謗餘經正應不信法華經爾蓋法華經云聞經隨喜面不狹長如周乃悟後梁書曰蔡大寶字敬仁嘗以書干僕射徐勉勉大賞異令與其子遊處所有墳籍盡以給之遂博覽羣書學無不綜栁機北史曰栁機字匡時河東解人偉容儀有器局頗涉經史年十九周武帝引為記室栁昂北史曰栁昂字千里河東解人幼聰穎有器識幹局過人周武帝時為內史中大夫當途用事百寮皆出其下在周朝俱歷要任至隋文帝受禪並為外職時楊素方用事因文帝賜宴素戲語機云二栁俱摧機應聲答曰不若孤楊獨聳侯白好俳謔一日楊素與牛𢎞退朝白語之曰日之夕矣素曰以我為牛羊下來耶麥鐡杖隋書曰麥鐡杖始興人少有勇力日行五百里走及奔馬踈誕使酒好交遊重信義立功隋朝仕至開府儀同三司因朝集考功郎竇威戲之曰麥是何姓鐡杖曰麥豆不殊那忽致怪隋書曰蘇威字無畏武功人蘇則之後少有至性隋文帝為丞相髙熲屢言其賢與語大悅居月餘威聞禪代之議遁歸田里髙熲請追之帝曰此不欲預吾事且置之及受禪徴拜太子少保兼納言庾信自建康遁歸江陵湘東王因賜妾徐氏妾與信弟掞私通掞欲求之無致言者信庭前有一蒼鵝乃繫書于鵝頸信視之遂題紙尾曰畜生乞汝歐陽詢形狀猥陋長孫無忌嘗嘲之曰聳膊成山字埋肩畏出頭誰令麟閣上畫此一獮猴詢應聲曰索頭連背暖漫襠畏肚寒秖緣心渾渾所以面團團太宗笑曰詢殊不畏皇后耶武懿宗形狀短陋嘗統兵禦西戎畏懦而遁張元一嘲之曰長弓短度箭蜀馬臨髙蹣去賊七百里隈牆獨自戰忽然逢著賊騎豬向南䞼則天未曉曰懿宗無馬耶元一曰騎豬夾豕也則天大笑劉昫唐書曰武懿宗則天伯父士逸之孫張元一武后時左司郎中善滑稽張易之與弟昌宗為奉宸令引詞人為供奉時有言昌宗是王子晉後身令被羽衣吹簫乘木鶴奏樂於庭崔融賦詩為絶唱有昔偶浮丘伯今同丁令威中郎才貌是藏史姓名非之句後與蘇味道相誚云某詩所以不及相公無銀花合也味道詠上元詩曰火樹銀花合星橋鐡鎖開故崔以為戲味道云子詩雖無銀花合還有金銅丁王勃與二弟助劼皆以文著後福峙幼子勸又有文名福峙嘗以詫韓思彥思彥曰昔武子有馬癖君復有譽兒癖王家癖何多耶婁師德好諧謔則天朝大禁屠殺師德因使至陜庖人進肉師德曰何得有此庖人曰豺咬殺羊師德曰豺大解事又進鱠復問何得有此庖人曰豺咬殺魚師德大叱之曰智短漢何不道是獺遂不食許敬宗嘗奏流其子昂於南及敬宗死博士𡊮思古議諡為謬昂子彥伯於衆中將擊之𡊮曰今為賢家君報讐何忽見怒彥伯慙而止宋濟老於詞場舉止可笑嘗試賦誤落官韻濟撫膺曰宋五坦率矣此聲大傳後禮部上甲乙名明皇先問曰宋五坦率不盧相邁不食鹽醋同列問之足下不食鹽醋何堪邁笑而答曰足下終日食鹽醋復又何堪劉昫唐書曰盧邁字子元范陽人以孝友謹厚稱貞元中以給事中平章事大政决於陸贄公謹身中立守文奉法而已喬琳好談諧朱泚僭逆琳掌賊中吏部選人前白曰所注某官不穩便琳答曰足下謂此選竟穩便乎楊汝士以尚書出鎮東川白樂天是尚書妹壻時以太子少傅分洛樂天戲代內子作詩賀兄嫂曰劉綱與婦共登仙弄玉隨夫亦上天何似沙哥汝士小字沙哥領崔嫂碧油幢引向東川又曰金花銀碗饒兄用罨畫羅裙任嫂裁嫁得黔婁為妹壻可能空寄蜀茶來白傅就裴晉公乞馬裴贈以一馬戲為詩曰君若有心求逸足我還留意在明姝蓋用愛妾換馬事白即答云安石風流無奈何欲將赤驥換青娥不辭使送東山去臨老無人與唱歌白樂天求箏於牛竒章竒章贈詩曰但愁封寄去魔物或驚禪樂天云㑹教魔女弄不動是禪心樂天嘗言思黯自誇前後服鍾乳三千兩而歌舞之妓甚多乃謔豫衰老故答思黯詩云鍾乳三千兩金叉十二行妒他心似火欺我鬢如霜慰老資歌笑銷愁仰酒漿眼看狂不得狂得且須狂竒章又有詩云不是道公狂不得恨公逢我不教狂張祜初未識白公白刺蘇州時祜來謁才見白即語曰久欽藉嘗記得君有欵頭詩祜愕然請其故白曰鴛鴦鈿帶拋何處孔雀羅衫付阿誰非欵頭何耶張頓首微笑仰而答曰祜亦嘗記得舍人有目連變白曰何也祜曰上窮碧落下黃泉兩處茫茫皆不見非目連變耶遂與歡宴竟日徐晦嗜酒沈𫝊師善餐楊嗣復戲語云徐家肺沈家脾真安穩耶姚峴善滑稽遇機即發姚僕射南仲廉察陜郊峴嘗候見僕射延之中堂未及語忽有投刺者云李過庭僕射曰過庭之名甚新未知誰家子弟客將左右皆稱不知又問峴峴初猶俯首頃之自不可忍斂手言曰恐是李趨兒僕射久方悟而大笑姚巖傑托言曰姚巖傑梁國公元崇之孫少聰悟絶倫弱冠博通典籍慕班固司馬遷為文時稱大儒與盧肇㑹於江亭托言曰盧肇字子發為歙州牧肇改令欲目前取𧰼一聯即發令曰逺望漁舟不闊尺八尺八樂器名爾雅釋樂不載唐逸史曰開元末一僧往終南回寺中一老僧令於空房內取尺八來乃玉也謂曰汝主在寺以愛吹尺八謫在人間此常吹者也汝回可將此付汝主僧歸進於𤣥宗特攻吹之宛是先所御者孫夷中仙隱傳曰房介然専吹竹笛名尺八姚遽飲酒一器憑欄嘔噦須臾即席還令曰憑欄一吐已覺空喉方干姿態山野且兔缺性好凌侮人有龍邱李主簿偶一見干遂同杯酌李目有翳千改令譏之曰措大喫酒㸃鹽軍將喫酒㸃醬只見門外著籬未見眼中安障李答曰措大喫酒㸃鹽下人喫酒㸃鮓只見半臂著襴不見口唇開跨一坐大笑孫郃元英先生傳曰先生新安人字雄飛廣明間為律詩江南未有及者謁錢塘守姚合合視其貌陋初甚侮之覽卷駭目變容而嘆先生一舉不得志遂遁於㑹稽與鄭仁規李頻陶詳為三友唐僖宗頗工衆藝於音律蒱博蹴踘鬭雞無不精妙尤善擊毬嘗謂優人石野猪曰朕若應擊毬進士舉須為狀元野猪對曰若遇堯舜作禮部侍郎恐陛下不免駮放湖南馬希聲聞梁太祖嗜食雞慕之殺五十雞為膳居其父武穆王喪發引之夕頓食雞臛數盤吏部侍郎潘起譏之曰昔阮籍居喪食蒸豚何代無賢周世宗時陶尚書奉使江南韓熙載遣家妓以奉盥匜及旦以書謝有云巫山之麗質初臨霞侵鳥道洛浦之妖姿自至月滿鴻溝舉朝不能㑹其辭熙載因召家妓訊之云是夕忽當浣濯東都事略曰陶穀字秀實邠州新平人有俊才起家為校書郎在周為翰林學士宋興歷禮刑户部三尚書遷承㫖博記美詞翰滑稽好大言佛老之書隂陽之學亦能詳究乾德初郊法物制度多榖所定陶尚書小字鐡牛李濤嘗戲之曰每至海源即思靈德陶榖使吳越忠懿王宴之因食蝤蛑詢其族類忠懿命自蝤蛑至蜞蚏凡取十餘種以進榖曰真所謂一蟹不如一蟹宴將畢或進葫蘆羮相勸榖下箸忠懿笑曰先王時庖人善為此羮今依樣饌來者榖一語不答楊大年方與客棋石中立自外至戲云止於坐隅貌甚間暇石答云口不能言請對以臆楊大年嘗於丁晉公席上舉令云有酒如線遇斟則見公答曰有餅如月因食則缺楊文公嘗戒門人為文宜避俗語既而公自作表云伏惟陛下德邁九皇門人鄭戩曰未審何時得賣生菜公笑易之丁晉公在祕閣日凝寒近火常以鐡箸於灰燼間書畫同舍伺公暫起燒火箸使熱公至為箸所尉曰昨宵通曉不寐為四鄰絃管喧呼所聒同舍曰是必嫁娶之家也公曰非是時平嵗稔小人輩共樂其父母祖先耳丁晉公自崖州還坐客論天下州郡何地最雄盛公曰唯崖州地望最重客問其故答曰宰相只作彼州司户參軍他州何可及石中立喜滑稽天禧中為員外郎時西域獻獅子畜於御苑日給羊肉十五斤石率同列往觀或曰吾輩忝與郎曹反不及一獸石曰汝何不知分彼乃苑中獅子吾曹員外郎耳安可並耶魏泰東軒筆録曰石參政中立事太宗為館職至真宗末年猶為學士盛度體豐肥一日自前殿趨出宰相在後盛初不知忽見即欲趨避行百餘步乃得直舍隱於其中石學士中立見其喘甚問之盛告其故石曰相公問否盛曰不問别去十餘步乃悟罵曰奴乃以我為牛王宣徽拱辰於洛中營第甚侈中堂起屋三層最上曰朝天閣時司馬公亦在洛於私第穿地丈餘作壤室邵康節見富鄭公公問洛中新事邵云近有一巢居一穴處者富為大笑趙閲道抃罷政閒居每見僧至接之甚有禮一日有士人以書贄見公讀之正色謝去後再往閽人不為通士人謂閽者曰參政便直得如此敬重和尚閽者曰尋常僧來相見亦只是平平人相公道只是重袈裟士人笑曰我這領襴衫直是不直錢閽者曰也半看佛面士人曰便那輟不得些少來看孔夫子面人傳以為笑孫巨源從劉貢父乞墨吏送達孫莘老中丞巨源以未得讓劉劉曰已嘗送君矣後知是莘老誤留以其皆孫姓而同為館職吏輩莫能别劉曰何不取其髯為别吏曰皆鬍而莫能别劉曰既是皆鬍何不以身之大小為别於是館中以孫莘老為大鬍孫學士巨源為小鬍孫學士沈存中括為內翰劉貢父與從官數人同訪之始下馬典謁者報云內翰方就浴可少待貢父語同行曰存中死矣待之何益衆驚問其故貢父曰孟子云死矣盆成括衆悟其為戲劉貢父初入館乘一騍馬而出或言此豈公所乘亦不慮趨朝之際有從羣者或致奔踶之患耶貢父曰吾將處之也或問何以處之曰吾令市青布作小䄡繫之馬後耳或曰此更詭異也貢父曰我初幸館閣之除俸入儉薄不給桂玉之用因就廉直取此馬以代步不意諸君子督過之深姑為此以掩言者之口耳王觀恃才放誕陸子履慎默於事無所可否觀嘗以方直少之然二人極相善觀嘗寢疾子履往候之觀以方帽包裹坐復帳中子履笑曰體中小不佳何至是所謂王三惜命也觀厲聲曰王三惜命何如六四括囊聞者莫不大笑馬默為臺官嘗彈奏劉貢父輕薄不當置在文館劉曰既云馬默豈合驢鳴宋史曰馬默字處厚單州成武人家貧徒步從石介學諸生時以百數一旦出其上將歸石語諸生曰馬君他日必為名臣宜送之山下纍官寶文閣待制知徐州紹聖時坐附司馬光落待制致仕劉貢父性滑稽喜嘲謔與王汾同在館中汾病口吃貢父為之贊曰恐是昌家又疑非類未聞雄名只有艾氣王汾嘗嘲劉攽云常朝多喚子蓋常朝知班吏多云班班謂之喚班攽應聲云寒食每呼君東都事略曰王禹稱曽孫汾舉進士甲科元祐中為工部侍郎寶文閣待制入元祐黨籍云治平初濮安懿王原寢皆用紅泥雜飾劉貢父謂王汾曰頃聞王墳賜緋得非子有銀章之命耶王介甫為相大講天下水利劉貢父嘗造介甫值一客在坐獻策曰梁山泊決而涸之可得良田萬頃但未擇得利便之地貯其水耳介甫傾首沉思曰然安得所貯許水乎貢父抗聲曰此甚不難介甫欣然以為有策遽問之貢父曰别穿一梁山泊則足以貯此水矣介甫大笑遂止王介甫多思而喜鑿說嘗與劉貢父共食王曰孔子不撤薑食何也貢父曰本草言薑食多損智道非明民將以愚之孔子以道教人故不撤薑食所以愚之也介甫欣然而笑久乃悟其為戲劉貢父滑稽辨捷世推無對晚年雖得末疾乘機决發亦不能忍一日擁爐於惠林僧寮語東坡曰吾之鄰人有一子稍長使之代掌小解不逾嵗誤質盜物資本耗折殆盡其子引罪請曰某拙於運財以敗成業今請從師讀書勉赴科舉其父大喜擇日具酒肴遣之既别且囑之曰吾老矣恃子以為窮年之養今子去我而游學儻或僥幸改門換户固吾之大幸然切有一事不可不記或有交友與汝唱和須子細看莫更和却賊詩狼狽而歸蓋譏東坡前逮詔獄王晉卿周開祖之徒皆以和詩為纍也烏臺詩案曰公有與王詵往來詩賦及寄周邠諸詩二人皆以收蘇軾有譏諷文字不申繳有司各治罪貢父語始絶口東坡即曰某聞昔夫子自衛反魯㑹有召夫子食者羣弟子相與語曰魯吾父母之邦我曹久從夫子轍環四方今幸俱還鄉里伺夫子之出當共尋訪親舊因閲市肆衆欣然許之始過闤闠未及縱觀而稠人中望見夫子巍然而來惶懼相告由夏之徒奔踔越逸無一留者獨顔子拘謹不能遽為闊步顧市中石塔似可隱蔽即屏伏其旁以俟夫子之過羣弟子因目之為避孔子塔蓋譏貢父風疾之劇以報之也東坡嘗與劉貢父言某與舍弟習制科時日享三白食之甚美不復信世間有八珍也貢父問三白之說坡言是一撮鹽一碟生蘿蔔一碗飯貢父大笑久之以簡招坡喫皛飯坡不復省憶謂人云貢父讀書多必有出處比至赴食見案上所設惟蘆蔔鹽飯而已始悟貢父以三白相戲援匕箸食之幾盡將上馬云明日可見過當具毳飯奉待貢甫雖知其為戲但不解毳飯所設何物逮往談論過半午不設食貢父饑甚索飯坡云少待如此者再三坡答如故貢父饑不可忍矣坡徐曰鹽也毛蘆蔔也毛飯也毛非毳而何貢父捧腹曰固知君必報東門之役然慮不及此坡始命進食扺暮乃去王聖塗云聖塗字闢之蘇子瞻文章議論獨出當世風格髙邁書畫亦精絶有得其真跡者重於珠玉雖才髙一世而遇人溫厚有片善即與之傾盡城府論辨酬倡間以談謔謫居黃州日有陳處士携紙筆求書㑹客方鼓琴遂書曰或對一貴人彈琴者天隂聲不發貴人怪之曰豈絃慢耶對曰絃也不慢其清談善謔類如此蘇子瞻與姜潛同坐姜字至之先舉令云坐中各要一物是藥名乃指子瞻曰君藥名也問之曰子蘇子子瞻應聲曰君亦藥名也君若非半夏定是厚朴姜請其故曰非半夏厚朴何故曰姜制之宋史隱逸傳曰姜潛字至之兖州奉符人從孫復學春秋神宗時召對除陳留令以不散青苖錢移疾去東坡鎮維揚幕下皆竒豪一日石塔長老遣侍者投牒求解院東坡問長老欲何往對曰歸西湖舊廬東坡即將僚佐同至石塔令擊鼓大衆聚觀袖中出疏使朝無咎讀之其詞曰大士何曽出世誰作金毛之聲衆生各自開堂何關石塔之事去作無相住亦隨緣戒公長老開不二門施無盡藏念西湖之久别亦是偶然為東坡而少留無不可者一時稽首重聽白槌渡口船回依舊雲山之色秋來雨過一新鐘鼓之聲以文為戲一時咸慕其風東坡在惠州天下傳其已死後七年北歸時章丞相方貶雷州東坡見南昌太守葉祖洽葉問曰世傳端明已歸道山今尚爾游戲人間耶坡曰途中見章子厚乃回反耳黃魯直戲東坡曰昔右軍書為換鵝字近日韓宗儒性叨餮每得公一帖於殿帥姚麟家換羊肉數斤可名公書為換羊書矣公在翰苑一日以生辰製撰紛冗宗儒繼作簡以圖報書來人督索甚急公笑曰傳語本官今日斷屠涪翁黃庭堅已見嘗和東坡春菜詩云公如端為苦筍歸明日春衫誠可脫坡得詩戲語坐客曰吾固不愛做官魯直遂欲以苦筍硬差致仕聞者絶倒劉道原恕日記萬言終身不忘壯輿羲仲道原子並已見亦能記五六千字壯輿之子所記才三千字朝以道戲壯輿曰更兩世當與我輩相似吕嘉問已見提舉市易曽子宣布劾其違法曽反得罪嘉問治事如故劉貢父曰豈意曽子避席望之儼然乎嘉問字望之司馬公洓水記聞曰曾布為三司使與吕嘉問爭市易事介甫主嘉問布坐左遷蘇長公在維揚一日設客十餘人皆一時名士米元章亦在坐酒半元章忽起立自贊曰世人皆以芾為顛願質之子瞻長公笑答曰吾從衆海嶽遺事曰米元章嘗為書畫學博士後遷禮部員外郎數遭白簡逐出一日以書抵蔡京訴其流落且言舉室百指行至陳留獨得一舟如許大遂畫一艇於行問京哂焉時彈文正謂其顛而芾又歷告諸執政自謂久任中外並被大臣知遇舉主纍數十百皆用吏能為稱首一無有以顛䝉者世遂傳米老辨顛帖元祐中米元章居京師被服怪異戴髙簷帽不欲置從者之手恐為所涴既坐轎為頂蓋所礙遂徹去露帽而坐一日出保康門遇朝以道以道大笑下轎握手問曰朝四你道似甚底朝云我道你似鬼章二人撫掌絶倒時西邊獲賊寨首領鬼章檻車入京故朝以為戲滕甫有弟申狠暴無禮其母獨篤愛用是數凌侮其兄而閫政多紊章子厚與甫舊狎一日語之曰公多類虞舜然亦有不似者甫究其說子厚曰類者父頑母嚚象傲不類者克諧以孝耳宋名臣四科事實曰龍圖滕甫臨大事毅然不計死生至於己私則小心莊栗惟恐有過黃魯直劉莘老同在館中每庖人請食次魯直頗治珍味劉北人性朴厚常云來日喫蒸餅鄉音頗質黃不樂其簡儉一日聚飲行令以三字離合成字一人云戊丁成皿盛或云王白珀石碧或云里豫野土墅黃云禾女委鬼魏劉未答黃遽云僕當奉代以來力敕正整如何其聲大似蒸餅之語坐皆笑劉不樂吕與叔言長安有安氏家藏唐明皇髑髏作紫金色其家事之甚謹因爾家富達遂為盛族後其家析居爭髑髏斧為數片道學名臣言行録曰吕大臨字與叔大鈞之弟學於橫渠橫渠卒乃東見二程元祐中除正字范內翰薦可為講官未用而卒張文潛張耒已見聞之即語曰明皇生死為姓安人極惱合坐大笑時秦學士太虛方為賈御史彈不當授館職文潛戲太虛曰千餘年前賈生過秦今復爾也聞者以為佳謔郭景初嘗夜出為醉人所誣墨客揮犀曰郭朏字景初泉州人少有才學而性甚輕脫太守召景初詰其狀景初笑曰諺所謂張公喫酒李公醉太守怪其言不屈命取紙筆使作張公喫酒李公醉賦郭操紙立就其略云事有不可測人當防未然何張公之飲酒乃李老之醉焉清河丈人方肆杯盤之樂隴西公子俄遭酩酊之愆太守見而大笑乃釋之林瑀王淶同作直講林謂王曰何相見之濶也王曰遭此霖雨瑀云今後轉更踈濶王曰何故答云逢此短晷蓋譏王之侏儒陳繹好為敦朴之狀時謂熱熟顔回後熙寧中台州推官孔文仲舉制科庭試對策言事有痛哭太息執政惡而黜之繹時為翰林學士語於衆曰文仲狂躁真杜園賈誼王平甫笑曰杜園賈誼可對熱熟顔回合坐大噱李章赴鄰人小集主人素鄙㑹次章適坐其傍既進饌主人前一魚特大於衆客者章即請於主人曰章與主人俱蘇人每見人書蘇字不同其魚不知合在左邊者是右邊者是主人曰古人作字不拘一體移易從便也章即引手取主人之魚示衆云領主人指揮今日左邊之魚亦合從便移過右邊一座輟飯而笑終席乃已龔明之中吳紀聞曰李章姑蘇人敏於戲調元符中上巳日錫燕從臣命御新龍舟蔡元長忽墜于金明池萬衆喧駭蔡得浮木憑出遂入次舍方一身淋漓蔣頴叔之竒唁公曰元長幸免瀟湘之役蔡大笑答曰幾同洛浦之遊許下人相傳章子厚當軸喜罵士人嘗對衆云今世士人如人家婢子才出外求食箇箇要作行首張天覺在旁云如商英者莫做得一箇角妓否章笑久之遂遷職子厚之孫章大方云不然天覺好詼諧先祖丞相曰豈有禁從作是俳語好闥天覺應聲云某權某職且二年切告相公撻下權字丞相未幾乃落權字吳元中在辟雍時試經義五篇盡用字說據援精博蔡京為進呈特免過省以為學字說之勸及作相請復春秋科反攻王氏徐擇之時為左相語人曰吳相此舉雖湯武不能過客不解擇之曰逆取而順守元中甚不能平宋史曰吳敏字元中真州人大觀二年辟雍私試蔡京愛其文薦充館職中書侍郎劉正夫以敏未嘗過省不可京請御筆特召上殿除左司郎官金人犯順敏薦李綱同贊徽宗內禪遷知樞密院事翟參政汝文與蔡安世靖陳應賢邦光同在門下省安世位汝文之上應賢坐其下每共談論二人交闢之一日辭屈汝文歎曰嗟乎遂厄於陳蔡之間蔡絛鐡圍山叢談曰翟參政公巽字汝文有文名對人辭語華暢雖談笑歷歷皆可聽然不妄吐也政和間為給事中宣和間追復蘇軾職名時衛仲達當行詞同列戲語曰達可宜善為此詞蓋須焚黃耳聞者莫不大笑淇水流慶録曰衛仲達初名上達字達可秀州華亭人大觀三年登進士第徽宗改今名為館職日上書諫修三山石橋官至吏部尚書尤延之博洽工文與楊誠齊為金石交淳熙中誠齊為祕書監延之為太常卿又同為青宫寮寀二公皆善謔延之一日言有一經句請祕監對曰楊氏為我誠齊應聲曰尤物移人衆皆歎其敏確楊誠齊嘗戲呼尤延之為蝤蛑延之呼誠齊為羊一日食羊白腸延之曰祕監錦心繡腸亦為人所食誠齊笑吟曰有腸可食何須恨猶勝無腸可食人世稱蟹類為無腸公子一坐大笑翟伯夀俊爽好竒巾服一如唐人自名唐裝張荃翁貴耳集曰翟耆年字伯壽公巽參政之子能清言工及八分書一日往見許彥周彥周髽髻著犢鼻禈躡髙屐出迎伯夀愕然彥周徐曰吾晉裝也公何怪乾道中衆客赴郡宴爾日伎樂甚盛一年少勇於見色甫就席中一客以服辭乃命撤樂勸酬次年少責此人曰敗一席之歡者爾也真所謂不自殞滅禍延過客者耶賔主為之閧堂㑹稽有富人馬生以入粟得官號馬殿幹喜賔客有姬美豔能歌時出佐酒客有梁縣丞者頗黠因與之目成後馬生殂梁捐金得之他日置酒觴客陳無損益之在坐酒酣舉杯屬梁曰有儷語奉上梁諦聽之即琅然髙唱曰昔居殿幹之家爰喪其馬今入縣丞之室母逝我梁一坐大笑梁憮然不樂無幾病死趙魏公趙孟俯已見有一私印曰水晶宫道人周草窗以瑪瑙寺行者對之夏文彥圖繪寶鑑曰周密字公謹號草窗歷山人居錢塘魏公遂不用此印後見草窗同郡崔進之藥肆縣一牌曰養生主藥室魏公以敢死軍醫人對之進之亦不復設此牌魏公語人曰我今日方為水晶宫吐氣劉時中與文子方矩同過暢純父暢師文已見值其濯足暢聞二人至輟洗迎笑而出曰佳客至正有佳味於卧內取四大桃置案上以二桃洗於濯足水中持啖二人子方與時中不食但以其置案上者人持一顆去曰公洗者其自享之無以二桃汙三士也乃大笑而出張仲舉每以文自負常語人曰吾於文已化矣蓋吾未嘗搆思特任意屬筆而已元史曰張翥字仲舉晉寧人少負才雋豪放不羈好蹴踘喜音樂其父以為憂翥翻然曰大人勿憂今請易業乃閉門讀書受業於李存存江東大儒其學傳於陸九淵翥從之游道德性命之說多所研究留杭從仇逺學遠於詩最髙翥盡得其音律之奧遂以詩文知名他日學士實喇卜示以所為文請易數字仲舉苦思移時終不能就實喇卜曰先生於文豈猶未化耶何思之苦也仲舉因相視大笑陶九成輟耕録曰文定王實喇卜之字敬臣號山齊輝和爾人庚申帝師也嘉興林叔大鏞為江浙行省掾貪墨鄙吝頗交名流以沽美譽其於達官顯宦則品饌甚豐若髙人勝士不過素湯餅而已一日延黃子久作畫多士畢集復以此供客諸人不能堪譏訕交作叔大赧甚揖潘子素求題其畫子素援筆書一絶句云阿翁作畫如說法信手拈來種種佳好水好山塗抹盡阿婆臉上不曽搽子久笑語曰好水好山謂達官顯宦阿婆臉不搽言素面也言未巳子素復加一句云諸佛菩薩摩訶薩俱不解其意子素曰此即僧家懴悔閧堂大笑而散叔大數日不見客姑蘇志曰黃公望字子久性聰敏博極羣書於技能無不通曉補浙西憲掾以忤權豪棄去黃冠野服往來三吳開三教堂於蘇之文德橋三教中人多執弟子禮善畫山水師董源巨然潘純字子素廬州人游京師文學貴介爭延致之每宴集談笑傾坐語林卷二十七
