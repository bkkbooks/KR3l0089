body:
  text: 語林卷七明何良俊撰文學第四上仲尼之徒身通六藝者七十二而以文學顯者二人可不謂難哉子夏序詩與六經並垂宇宙何可掩也獨子遊無所考見說者以為南方之學得其精華嗚呼夫文與義皆天地之賾也茍非得其精華者曷足以與此後世言有枝葉若與古少異矣然覽其豎義綴文理幹辭條蔚然並茂非有義根曷從生哉枝葉雖繁又烏可少也余故托其最者著之篇使來者得以觀焉淮南王著鴻烈二十篇號淮南子自云字中皆挾風霜之氣揚子雲以為一出一入字直百金西京雜記曰鴻大也烈明也言大明禮教也董仲舒夢蛟龍入懷作春秋繁露太史公儒林𫝊曰董仲舒廣川人以治春秋孝景時為博士梁敬叔閉户自養以經籍為娛著書數篇名曰七序班固見而稱曰孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慙范曄後漢書曰梁竦字敬叔安定烏氏人父統太中大夫兄松尚光武女舞隂公主以誹謗下獄死竦與弟恭俱徙九真朱公叔耽學專精鋭意講誦或時思至不自知亡失衣冠顛墜坑岸其父以為専愚幾不知馬之幾足朱穆已見王充著論衡成中土未有傳者𡊮山松後漢書曰王充字仲任會稽上虞人幼聰明詣太學觀天子臨辟雍作六儒論雖謝承後漢書曰謝夷吾薦充曰充之天才非學所加前世孟軻孫卿近世揚雄劉向司馬遷不能過也蔡中郎蔡雍别見到江東得之歎為髙文恆祕玩以為談助及還北諸公覺其談更逺檢求其帳中果得論衡一部𡊮山松後漢書曰其後王朗為㑹稽太守又得其書時人稱其才進或曰不見異人當得異書問之果以論衡之益雍抱朴子曰時人在蔡雍帳中搜得論衡捉數卷持去丁寧之曰唯我與爾共之勿廣也𡊮冀州𡊮紹已見大㑹賔客使人要鄭康成鄭𤣥已見鄭最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀溫偉𡊮氏客多豪俊並有才說見鄭儒者未以通儒許之競設異端百家互起鄭依方辨對咸出問表得所未聞莫不嗟服范曄後漢書曰黨禁起𤣥隱修經業杜門不出時任城何休好公羊學遂著公羊墨守左氏膏肓榖梁廢疾𤣥乃發墨守針膏肓起廢疾休見而嘆曰康成入吾室操吾矛以伐我乎初中興之後范升陳元李育賈逵之徒爭論古今學後馬融答北地太守劉瓌及𤣥答何休義據通深由是古學遂明董卓被誅蔡中郎適在司徒王允坐言之而嘆有動於色允即收中郎治罪中郎請黥首刖足繼成漢史張璠漢記曰蔡雍字伯喈陳留圉人六世祖勳與鮑宣卓茂不仕新室父棱亦有清白行諡貞定公雍性篤孝少博學師事太傅胡廣好辭章數術天文妙操音律桓帝時中常侍擅恣聞雍善鼓琴遂白天子勑陳留督促發遣雍雍不得已行到偃師稱疾而歸間居玩古不交當世志范曄後漢書曰王允字子師太原祁人少好大節有於立功郭林宗見而奇之曰王生一日千里王佐才也後與士孫瑞結謀同誅董卓太尉馬日磾馳謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典且忠孝素著而所坐無名誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中衰神器不固不可令佞臣執筆在幼主左右既無益聖德復使吾黨蒙其訕議日磾退而告人曰王公其不長世乎善人國之紀也制作國之典也滅紀廢典其能久乎中郎遂死獄中三輔决録曰日磾字翁叔馬融族子少𫝊融業以才學進與楊彪盧植蔡雍等典校中書歷位九卿遂登台輔魏文帝初在東宫集諸儒於肅城門內講論大義侃侃無倦荀奉倩諸兄並以儒術論議魏志曰荀粲字奉倩潁川潁隂人父彧尚書令祖緄濟南相曾祖淑朗陵相一何劭荀粲别𫝊曰粲簡貴不能與常人交接所友皆時俊傑葬夕赴者裁十餘人皆同時知名之士哭之感慟路人字荀氏家𫝊曰彧五子惲字長倩虎賁中郎將惲弟俁叔倩御史中丞俁弟詵字曼倩大將軍從事中郎皆知名詵弟顗字景倩顗弟粲晉陽秋曰荀顗博學洽聞嘗難鍾㑹易無互體見稱於世奉倩獨好言道常以子貢稱夫子之言性與天道不可得聞何晏論語集解曰性者人之所受以生也天道者元亨日新之道深微故不可得而聞然則六籍雖存固聖人之糠粃也兄俁難曰易云聖人立象以盡意繫辭焉以盡言則微言胡不可聞奉倩答曰蓋理之微者非物象之所舉也今稱立象以盡意此非通於意外者也繫辭焉以盡言此非言乎繫表者也斯則象外之意繫表之言固藴而不出矣一時能言之士皆莫能屈何平叔何晏已見以為聖人無喜怒哀樂其論甚精鍾士季諸人述之魏志曰鍾㑹字士季潁川長社人太傅繇庶子年五嵗繇遣見蔣濟濟甚異之及壯有才數技藝精練名理王輔嗣王弼别見意頗不同以為聖人茂於人者神明也同於人者五情也神明茂故能體冲和以通無五情同故不能無哀樂以應物然則聖人之情應物而無纍於物者也今以其無纍便謂不復應物失之逺矣世以王理為得曹爽嘗集諸名德使何尚書談理時少長莫不預㑹魏春秋曰曹爽字昭伯魏宗室大司馬真之子受明帝顧命頗專政恣肆以不得於司馬宣王被誅中領軍聞之歎曰妙哉何平叔之論道盡其理矣魏志曰曹羲爽之弟爽用為中領軍後爽頗縱酒作樂羲深以為憂數諌止之又著書三篇陳驕淫盈溢之致禍托戒諸弟以示爽爽甚不恱羲以諌諭不納涕泣而起王輔嗣與何尚書何晏已見論道其賦會文辭不如晏然自然有所拔得多晏也魏志曰王弼字輔嗣父業粲族子官至尚書郎何劭王弼别𫝊曰弼幼而察惠好老氏通辨能言時裴徽為吏部郎弼未弱冠往造焉徽一見而異之尋為𫝊嘏所知何晏為吏部尚書甚奇之歎曰仲尼稱後生可畏若斯人者可與言天人之際乎其注老子為指略致有理統注易往往有髙麗言太原王濟好談老莊常云見弼易注所悟者多然淺而不識物情初與王黎荀融善黎奪其黃門郎於是恨黎與融亦不終正始中遇癘疾亡時年二十四晉景王聞之嗟歎纍日其為髙識所惜如此王輔嗣與鍾士季鍾㑹已見善鍾之論議以校練為家然每服王之思致管公明與單子春談文采葩流枝葉橫生少引聖籍多發天然子春與群士論難鋒起公明人人答對言皆有餘至日向暮子春語衆人曰此年少盛有材氣聽其言論正似司馬長卿遊獵賦何其磊落雄壯英神雋茂必能明天文地理變化之數不徒有言也於是發聲徐州號為神童魏志曰管輅字公明平原人容貌粗醜無威儀而嗜酒管輅别傳曰輅父為琅琊即邱長公明時年十五來至官舍講學郡黌琅琊太守單子春雅有材度聞公明一黌之雋請與相見子春大㑹賔客百餘人皆才辨之士公明曰府君名士加有雄貴之姿輅既年少膽未堅剛若欲相難懼失精神請先飲三升清酒然後言之子春便酌三升清酒獨使飲之酒盡問子春今欲與輅相對者府君四坐之士耶子春曰吾自與卿旗鼓相當輅言學問微淺未能上引聖人之道陳秦漢之事但欲論金木水火土鬼神之情耳子春言此至難而卿更以為易耶於是唱大論之端遂經於隂陽單稱嘆不已管公明將赴洛辭裴使君荀綽冀州記曰裴徽字文季河東聞喜人魏尚書令潜之少弟有髙才逺度善言𤣥妙裴言丁鄧二尚書有經國才略於物理不精何尚書神明精微言皆巧妙殆破秋毫自言不解易中九事必當以相問比至洛宜善精其理公明言何若巧妙以攻難之才遊形之表未入於神也夫入神者當步天元推隂陽探味𤣥虛覽道無窮如差次老莊而參爻𧰼愛微辨而興浮藻可謂射侯之巧非破秋毫之妙也若九事皆至義者不足勞思若隂陽者精之已久何足復言黃初中有甲乙疑論荀仲茂荀氏家𫝊曰荀閎字仲茂諶之子為太子文學掾鍾元常魏志曰鍾繇字元常潁川長社人王景興王朗别見𡊮曜卿魏志曰𡊮渙字曜卿陳郡扶樂人父滂漢司徒渙避地江淮為𡊮術所命吕布擊術於阜陵渙往從之為布所拘㽜𡊮氏世紀曰布之破也陳羣父子亦在布軍見太祖皆拜渙獨髙揖太祖甚嚴憚之時太祖給衆官車各數乘使取布軍中物衆人皆重載渙取書數百卷而已議各不同文帝謂元常曰𡊮王國士更為唇齒荀閎徑悍往來鋭師真君侯之勍敵左右之深憂虞仲翔與孔北海書示以易注吳志曰虞翻字仲翔㑹稽餘姚人初為王朗功曹過吳書曰翻少好學有髙志年十二客有候其兄者不翻翻追與書曰僕聞虎魄不取腐芥磁石不受曲針過而不存不亦宜乎客得書奇之孔答曰聞延陵之理樂覩虞子之治易乃知東南之美非徒㑹稽之竹箭又觀𧰼雲物察應寒暑原其禍福與神合契可謂探賾窮通者也虞翻别傳曰翻初立易注奏上曰臣聞六經之始莫大隂陽是以伏羲仰天縣象而建八卦觀變動六爻為六十四以通神明以類萬物臣髙祖零陵太守光治孟氏易曾祖平輿令成纘述其業至祖父鳯為之最密臣先考日南太守歆受本於鳳世傳其業至臣五世前人通講多玩章句雖有祕說於經疏闊臣生遇世亂長於軍旅習經於枹鼓之間講論於戎馬之上蒙先師之說依經立注又臣郡吏陳桃夢臣與道士相遇放髮被鹿裘布易六爻撓其三以飲臣臣乞盡吞之道士言易道在天三爻足矣豈臣受命應當知經所覽諸家解不離流俗義有不當輒改定以就其正孔子曰乾元用九而天下治聖人南靣蓋取諸離斯誠天子所宜協隂陽致麟鳯之道謹正書副上解又奏曰經之大者莫過於易自漢初以來海內英才之率少孝靈之際潁川荀諝號為知易臣得其注有愈俗儒至所說西南得朋東北喪朋顛倒反逆了不可知孔子嘆易曰知變化之道者其知神之所為乎以美大衍四象之作而上為章首尤可怪笑又南郡太守馬融名有俊才其所解釋復不及諝孔子曰可與共學未可與適道豈不其然若乃北海鄭𤣥南陽宋忠雖各立注忠少差𤣥而皆未得其門難以示世潘元茂作魏公冊命辭義溫雅人謂與典誥同風元茂亡後王仲宣擅名當時時人見此冊疑是仲宣所為論者紛紜及晉王為太傅臘日大㑹賔客元茂子滿時亦在焉太傅語之曰尊君作魏公冊髙妙信不可及吾曾聞仲宣亦以為不如朝廷之士始信是元茂作潘朂已見邯鄲子淑初詣臨菑侯魚豢魏略曰邯鄲淳一名竺字子淑博學有文章又善蒼雅蟲許氏字指初平時從三輔客荆州荆州內附太祖召與相見甚敬異之時五官將博延英儒宿聞淳名因啓淳欲使在文學官屬㑹臨菑侯植亦求淳太祖遣淳詣植臨菑大喜延入坐不先與談時天正熱因呼常從取水自澡訖傅粉遂科頭拍袒胡舞五椎煆跳丸擊劔誦俳優小說數千言謂子淑曰邯鄲生何如耶乃更著衣幘整容儀與子淑評說混元造化之端品物區别之意然從論羲皇以來賢聖名臣烈士優劣之差次頌古今文章賦誄及當官政事宜所先後又論用武行兵倚伏之勢乃命厨宰酒炙交至坐席默然莫敢與抗及暮子淑歸對其所知歎臨菑之才謂之天人魏志曰陳思王植字子建十嵗即善作文太祖曰汝倩人耶植跪曰言出為論下筆成章顧當靣試奈何倩人時銅爵臺新成太祖將諸子登臺使各為賦植援筆立成太祖甚異之初封平原侯後徙臨菑植既以才見異丁儀丁廙楊修等為之羽翼幾為太子者數矣然任性而行不自雕厲飲酒不節文帝御之以術矯情自飾左右並為之說遂定為嗣魏武嘗辟阮元瑜張隲文士𫝊曰阮瑀字元瑜陳留尉氏人魏丞相掾知名于時不至連見逼促遂逃入山中魏武使人焚山得之阮至召見魏武時征長安大延賔客怒阮不時與語使就伎人列阮既解音聲又善鼓琴遂撫絃按節因造歌曲曰奕奕天門開大魏應期運青蓋巡九州在東西人怨士為知己死女為恱已玩恩義苟敷暢他人焉能亂為曲既捷音聲殊妙當時冠坐魏武大恱魚豢典略曰太祖嘗使瑀作書與韓遂時太祖適近出瑀隨從因於馬上具草呈之太祖攬筆欲有所定而竟不能損益陳孔璋草檄文成以呈曹公曹操公先苦頭風是日疾發卧讀孔璋所著翕然而起曰此愈我病魏略曰陳琳字孔璋廣陵人避難冀州𡊮紹使典文章紹檄文即琳之辭也後歸太祖太祖謂曰卿昔為本初移書但可罪狀孤而已惡惡止其身何乃上及父祖耶琳謝罪太祖愛其才而不責也蔡中郎蔡雍已見從朔方還嘗避怨於吳顧元歎從學琴書顧專一清靜敏而易教中郎歎異之曰卿必成致今以吾名與卿顧遂名雍又是中郎所歎因用元歎為字吳志曰顧雍字元嘆吳郡吳人連牧州郡皆有治迹歷奉常尚書令封陽遂鄉侯拜侯還寺家人不知後代孫邵為丞相陸公紀容貌壯偉博學多識星歷算數無不該覽虞仲翔舊齒名德龎士元龎統别見荆州令士年亦差長皆與交善吳志曰陸績字公紀吳郡吳人父康漢廬江太守績在吳除鬱林太守既有躄疾又意在儒雅非其志也雖有軍事不廢著述作渾天圖注易釋𤣥皆𫝊于世預知亡日乃為辭曰有漢志士吳郡陸績幼敦詩書長玩禮易受命南征遘疾遇厄遭命不幸嗚呼悲隔年三十二皇甫士安皇甫謐已見耽玩典墳忘寢與食時人謂為書淫或有針其過篤將損耗精神士安曰朝聞道夕死可矣况命有修短分定懸天乎虞預晉書曰謐少不好學遊蕩無度或以為癡嘗得瓜果輒進所後叔母任氏任氏曰孝經云三牲之飬猶為不孝汝年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不擇鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對之流涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂博綜典籍沈靜寡欲始有髙尚之志以著述為務自號𤣥晏先生著禮樂聖真之論後得風痺疾猶手不輟卷張茂先强記默識四海之內若指諸掌晉陽秋曰張華字茂先范陽人博覽洽聞無不貫綜晉武帝嘗問漢代宫室制度及建章千門萬户茂先應對如流聽者忘倦畫地成圖左右屬目時人比之子産孔子家語曰夫子曰子産於民為惠於學為博物吾以兄事之也陸士衡初入洛次河南偃師時近夕結隂望道左若有民居因往投宿見一少年姿神端逺與士衡言𤣥妙有辭致士衡心服其能無以酬抗士衡提緯古今總驗名實此少年亦不甚欣解既曉辭去士衡脫驂逆旅嫗曰此東數十里無村落止有山陽王家墓耳士衡怪悵還睇昨路都無民居唯空野霾雲拱木蔽日知所遇者信王輔嗣也士衡由此妙逹𤣥理或云是士龍酈道元水經注曰今尸鄉澤野負原夾郭多墳壠焉即陸士衡㑹王輔嗣處也衛叔寶甚有名理其後多病體羸母恆禁其談遇有勝日親知時請一言無不咨嗟以為入微王太尉自以論易略盡然有所未了研之終莫能通每云不知比沒當復有能通之者不虞預晉書曰王衍字夷甫琅琊臨沂人司徒戎從弟父乂平北將軍夷甫蚤知名以清虛通理稱仕至太尉為石勒所害王處仲王敦字處仲謂太尉曰阮宣子阮修已見可與言太尉曰吾亦聞之但未知其亹亹之處定何如耳及與宣子談言寡理暢王大歎服宋處宗甚有思理嘗買得一長鳴雞愛養甚至恆籠盛著窗間雞遂作人語與處宗談論極有言致宋因此𤣥功大進晉陽秋曰宋宗字處宗沛國人官兖州刺史劉殷有子七人五人各授一經餘一子授太史公記一子授漢書一門之內七業俱興北州之學殷門為盛王隱晉書曰劉殷字長盛新興人阮思曠阮裕已見不甚博學而論難甚精嘗問謝萬云未見四本論君試為言之謝叙說既畢阮以傅嘏為得於是撰數百許語精義入微聞者皆嘆味之阮千里清虛寡欲自得於懷讀書不甚研求而默識其要詣理精辨言不足而㫖有餘名士𫝊曰阮瞻字千里阮咸子瞻夷任少嗜欲不修名行自得於懷仕至太子舍人謝萬嘗作八賢論叙漁父屈原季主賈誼楚老龔勝孫登嵇康為四隱四顯其㫖以處者為優出者為劣晉中興書曰萬善屬文能談論以示孫興公孫以為體公識逺者則出處同歸時以興公義為得中興書曰孫綽字興公太原中都人少以文稱歷太學博士大著作散騎常侍時人有稱庾太尉理者庾亮已見殷光祿曰此公好舉宗本槌人殷浩别傳曰浩父羡字洪喬光祿勳殷中軍於佛經有所不了晉書曰殷浩字洪源陳郡長平人父羡豫章太守浩識度清逺弱冠有美名善𤣥言為風流談論者所宗遣人迎林公髙逸沙門𫝊曰支遁字道林河內林慮人本姓關氏任心獨往風期高亮家世奉法嘗於餘杭山沈思道行泠然獨暢年二十五始釋形入道五十三終于洛陽林虛懷欲往王右軍駐之曰淵源思致淵冨既未易為敵且已所不解上人未必能通縱復服從亦名不益髙若佻脫不合便喪十年所保可不須往林公大以為然羊愔文字志曰王羲之字逸少琅琊臨沂人父曠淮南太守羲之少朗拔為叔父廙所賞善草𨽻纍遷右軍將軍㑹稽內史鳩摩羅什雅好大乘志在敷演梁釋慧皎髙僧𫝊曰鳩摩羅什此云童夀天竺人也善經律論化行西域東遊龜兹龜兹王造金師子坐以處之符堅遣驍將吕光伐龜兹得什載與俱歸吕光死姚興迎什入關待以國師之禮什神情鍳徹慠岸出羣應機領㑹泛愛為心虛已善誘終日無倦𢎞始中卒于長安常歎曰吾若著筆作大乘阿毗曇非迦㫋子比也出經叙曰僧伽提婆罽賔人雋朗有深鍳苻堅至長安出諸經後渡江逺法師請譯阿毗曇今深識既寡將何所論唯為姚興著實相論二卷殷仲堪在都嘗往看棊從在瓦棺寺前宅中王隱晉書曰仲堪陳郡人太常融孫也車騎將軍謝𤣥請為長史孝武恱之俄為黃門侍郎于時𡊮羊𡊮喬小字與人共在窗下圍棊仲堪在裏問𡊮易義𡊮應對如流圍棊不輟意色傲然殊有餘地仲堪撰辭致難每有往復𡊮氏家傳曰喬字彥升陳郡人父瓌光祿大夫喬歷尚書郎江夏相從桓溫平蜀封湘西伯殷仲堪談理正可與韓康伯對晉陽秋曰康伯殷浩甥善言理浩甚愛之桓敬道在南郡嘗作四皓論以示仲堪桓𤣥别𫝊曰𤣥字敬道譙國龍亢人大司馬溫少子幼童中溫甚愛之臨終命以為嗣年七嵗襲封南郡公拜太子洗馬義興太守不得志少時去職歸其國與荆州刺史殷仲堪素舊情好甚隆仲堪致難往復甚有𢎞致𤣥論曰四皓來儀漢庭孝惠以立而惠帝柔弱吕后凶忌此數公者觸彼埃塵欲以救弊二家之中各有其黨奪彼與此其讐必興不知匹夫之志四公何以逃其患素履終吉隱以保生者其若是乎殷難曰隱顯默語非賢逹之心蓋所遇之時不同而所乘之途必異道無所屈而天下以之獲寧仁者之心未能無感若夫四公者養志巖阿道髙天下秦網雖虐遊之而莫懼漢祖雖雄請之而弗顧徒以一理有感泛然而應事同賔客之禮言無是非之對孝惠以之獲安莫由報其德如意以之定藩無所容其怨且爭奪滋生主非一姓則百姓生心祚無常人則人皆自賢况夫漢以劍起人未知義式遏姦邪特宜以正順為寶天下大器也茍亂亡見懼則滄海橫流原夫若人之振䇿豈為一人之廢興哉苟可以暢其仁義與夫仗節委質可榮可辱者道跡懸殊理勢不同君何疑之哉又謂諸吕强盛幾危劉氏如意若立必無此患夫禍福同門倚伏萬端又未可斷也于時天下新定權由上制髙祖分王子弟有磐石之固社稷深謀之臣森然比肩豈瑣瑣祿産所能傾奪之哉此或四公所預於今無以辨之但求古賢之心宜存之逺大耳端本存源者雖不能無危其危易持苟啓競津雖未必不安而其安難保此最有國之要道古今賢哲所同惜也陸平原天才秀逸辭藻宏麗張司空張華已見嘗謂之曰人之為文每恨才少而子更患其多晉陽秋曰陸機字士衡吳郡吳人祖遜吳丞相父抗大司馬機與弟雲並有雋才郎陸機别𫝊曰機博學善屬文非禮不動入晉仕著作平原內史葛稚川目陸平原之文如𤣥圃積玉無非夜光晉書曰葛洪字稚川丹陽句容人少好學家貧伐薪以貿紙筆夜輒寫書誦習性寡欲無所愛玩不知棊局幾道樗蒱齒名為人木訥不好榮利閉門却掃未嘗交遊於餘杭山見何幼道郭文舉目擊而已各無所言尋書問義不逺數千里崎嶇冒涉期於必得遂䆒覽典藉尤好神仙導養之法陸士衡入洛擬作三都賦聞左太冲作之臧榮緒晉書曰左思字太冲齊國人博覽史記欲作三都賦乃詣著作郎訪岷卭之事搆思十稔門庭藩溷皆著筆札遇得一句即疏之徴為祕書賦成張華見而咨歎都邑豪貴競相𫝊寫士衡撫掌大笑與弟士龍書曰此間有一傖父欲作三都賦須其成以覆酒甕耳後左賦出士衡絶嘆伏以為不能加遂輟筆焉陸雲别傳曰雲字士龍吳大司馬抗之第五子機同母弟也儒雅有俊才容貌瓌偉口敏能談博聞彊記善著述六嵗能賦詩時人以為項託楊烏之儔十八刺史周俊命為主簿纍遷太子舍人清河內史為成都王所害張司空張華已見見左太冲三都賦曰班張之流也使讀之者盡而有餘久而更新成公子安少有俊才辭賦美麗張司空每見其文歎伏以為絶倫臧榮緒晉書曰成公綏字子安東郡白馬人少有俊才而口吃張華一見甚善之時人以其貧賤不重其文仕為中臺郎楊公回少有異才初為郡鈴下威儀公事之暇輒讀五經鄉邑未之知晉書曰楊方字公回虞預以其文示賀循循遂稱方於京師司徒王導辟為掾遷司徒參軍自以地寒不願久留京華求𥙷逺郡間居著述導從之補髙梁太守在郡積年著五經鉤沉吳越春秋并雜文筆行于世以年老棄郡歸導將進之臺閣固辭還鄉里終于家諸葛道明見而奇之諸葛恢别傳曰恢字道明琅琊陽都人祖誕司空父靚亦知名恢少有令問稱為名賢避難江左中宗召𥙷主簿纍遷尚書令嘗使為文薦郡功曹時參軍虞預見而稱美晉書曰虞預字叔寧㑹稽餘姚人徴士喜之弟十二而孤好學有文章為諸葛恢參軍庾亮等薦預召為丞相行參軍所著有晉書㑹稽典録送以示賀循循報曰此子開拔有志意其文甚有奇分若果出胸臆乃是一國所推豈但牧豎中逸群耶乃荒萊之特苖鹵田之善莠姿質已良但沾染未足耳移植豐壤必成嘉榖賀循别傳曰循字彥先㑹稽山隂人本姓慶髙祖純避漢帝諱改為賀氏父劭吳中書令以忠正見害循少嬰家禍流放荒裔吳平乃還秉節髙舉元帝為安東王循為吳國內史𡊮彥伯𡊮宏已見才藻豔逸文章絶美為桓大司馬桓溫已見記室參軍桓重其文筆專綜書記後𡊮為東征賦遍稱過江諸名德而獨不載桓常侍桓彛桓溫之父譙桓彛别傳曰彛字茂倫國龍亢人漢五更桓榮十世孫也父頴有髙名彛少孤識鍳明朗避亂渡江纍遷散騎常侍時伏滔亦在桓公府晉中興書曰伏滔字𤣥度平昌安邱人少有才學舉秀才大司馬桓溫參軍領大著作掌國史宿與𡊮善苦諫之𡊮笑而不答公知之甚忿又不欲令人顯問後遊青山歸命𡊮同載衆為之懼行數里公問𡊮聞卿作東征賦多稱先賢何故不及家君𡊮答云尊公稱謂非下官敢專既未遑啓不敢顯之耳公疑不實乃曰君欲為何辭𡊮應聲曰風鍳散朗或搜或引身雖可忘道不可隕宣城之節信義為允公泫然而止王右軍少重患一二年輒發動後答許掾詩忽復惡中得二十字云取歡仁智樂寄暢山水隂清泠澗下瀨歷落松竹林既醒左右誦之誦竟右軍歎曰癲何預盛德事耶王茂世少有才藻沈約宋書曰王誕字茂世太保𢎞從兄也祖恬中軍將軍父混太常晉孝武崩詔茂世從叔東亭為哀䇿文久而未就謂茂世曰猶少叙節物一句因出本示茂世茂世便攬筆益之接其秋冬代變後云霜繁廣除風回髙殿東亭賞其清拔王司徒傳曰王珣字元琳丞相導之孫領軍洽之子也少以清秀稱大司馬桓溫辟為主簿從討𡊮真封交址望海縣東亭侯纍遷尚書令劉道光潜心𤣥易不好讀史常言讀書當味義根何為費功於浮辭之文易者義之源太𤣥者理之門能明此者即吾師也晉書曰劉敏元字道光北海人厲志修學不以險難易心永嘉之亂自齊西奔仕劉曜為中書侍郎王淮之是彪之曾孫祖父臨之納之並博聞多識練悉朝儀自是家世相𫝊諳江左舊事代有纂述緘之青箱世謂之王氏青箱學南史曰淮之字元曾琅琊人初為桓𤣥大將軍行參軍宋臺建除御史中丞卒官侍中何侍中為丹陽尹時立宅南郭外更置𤣥學招集生徒東海徐秀廬江何曇黃回潁川荀子華太原孫宗昌王延秀魯郡孔惠宣並慕道來遊謂之南學王蒨玉玉球别見嘗稱之曰尚之西河之風不墜宋書曰何尚之字彥德廬江灊人曾祖凖髙尚不仕祖恢南康太守父叔度恭謹有行業尚之雅好文義從容賞㑹甚為宋太祖所知官至侍中尚書令鴈門周續之隱居廬山儒學著稱永明中徴詣京師開館居之髙祖臨幸朝彥畢集時顔延之官列猶卑引升上席髙祖命顔問續之三義續之雅仗辭辨顔每折以簡要既連挫續之使還自敷釋言約理暢莫不稱善宋書曰周續之字道祖鴈門廣武人其先過江居豫章續之年十二從范寧受業通五經五緯號曰十經名冠同門稱為顔子武帝北伐世子居守迎續之館于安樂寺月餘還山江州刺史劉柳薦之辟太尉掾不就釋道生是法汰弟子幼便明悟十五能講經及長有異解立頓悟義時人推之釋慧皎髙僧𫝊曰竺道生巨鹿人幼頴悟若神值竺法汰遂改俗歸依雋思竒拔聞義開解王𢎞顔延之並敬挹風猷言善不受報頓悟成佛著論於世張思光張融已見𤣥義精明初無師法而神解過人白黑談論鮮能抗拒何承天與宗炳書曰冶城慧琳道人作白黑論乃為衆僧所排足下試尋二家誰為長者吾甚昧然望有以佳悟顧景怡義學明解南史曰顧歡字景怡一字𤣥平吳興鹽官人好黃老通隂陽為術數多驗隱居不仕於天台山開館聚徒受業者常百人㑹稽孔圭嘗登嶺尋景怡共論四本南齊書曰孔稚圭字德璋㑹稽人也少涉學有美譽仕至太子詹事魏志曰四本者言才性同才性異才性合才性離也尚書傅嘏論同中書令李豐論異侍郎鍾㑹論合屯騎校尉王廣論離景怡曰蘭碩危而密傅嘏宣國安而踈李豐士季似而非鍾㑹公深謬而是王廣總而言之其失則同曲而辨之其塗則異何者同昧其本而競談其末猶未識辰緯而意斷南北群迷暗爭失得無凖情長則申意短則屈所以四本互通莫能相塞夫中理唯一豈容有二四本無正失中故也於是著三名論以正之尚書劉澄臨川王常侍朱廣之並立論難與景怡往復世以為廣之才理尤為精詣南史曰廣之字處深吳郡錢唐人善清言廣𢎞明集曰朱廣之疑夷夏論以書咨顧道士曰之叩頭見於謝常侍往復夷夏論辨章同歸之義可為簡見通微清練之談也至於𥅆尚端冕之飾屏破緇衣之素申以擎跪之恭辱以跏趺之肅桎束華人杜絶外法舟車之喻雖美平恕之情未篤致㑹之源既坦筌寄之徒方壅然則三乘之悟窅望兹土六度之津於今長訣披經􅥬理悵怏良深謝生貶沒仙道褒明佛教以羽化之術為浮濫之說殘形之唱為履真之文徒知己指之為指不知彼指之無殊豈所以通方得意善同之謂乎僕夙漸法化晚味道風常以崇空貴無宗趣一也蹄網雙張義無偏取各隨曉入唯心所安耳何必龍衮可襲而瓔珞難乘者哉自貧來多務研斆沉替緘卷巾牘奄逾十載幼習前聞零落頓盡藴志空年開瞻靡階每獨慷慨遙夜輟起申旦忘寐而清心逺信纒苦彌篤若夫信不沿理則輕泛無主轉墮之賔因斯而起是以􅏣率狂管書述鄙心願重為啓誨敷導厥疑廣之叩頭顧歡黨道教𡊮粲崇佛說張融著門律言道之與佛逗極無二吾見道士與道人戰儒墨道人與道士論是非昔有鴻飛天道積逺難亮越人以為鳬楚人以為乙人自楚越鴻常一爾以示周彥倫彥倫難之曰虛無法性其寂雖同位寂之方其㫖則别論所謂逗極無二者為逗極於虛無當無二於法性邪將二塗之外更有異本足下所宗之本一物為鴻乙耳驅馳佛道無免二乖未知髙鍳緣何識本攻難數反張理如小屈周彥倫善言名理每賔客㑹集周虛席晤語辭韻如流聽者忘倦兼善老易與張思光遇輒以𤣥言相滯彌日不解周彥倫音辭辨麗出言不窮宫商朱紫發口成句泛涉百家長於佛理著三宗論立空假名立不空假名設不空假名難空假名設空假名難不空假名假名空難二宗又立假名空西凉智林道人見之遺彥倫書曰此義㫖趣似非始開妙聲中絶六七十載貧道年二十時便得此義竊每歎喜無與共之年少見長安耆老多云關中髙勝乃舊有此義當法集盛時能深得斯趣者本無多人過江東略是無一貧道捉塵尾四十餘年東西講說謬重一時餘義頗見宗録唯有此塗白黑無一人得者為之發病非意此㫖猥來入耳始是真賞行道第一功德其論見重如此釋慧皎高僧𫝊曰釋智林高昌人初出家為亮公弟子申明二諦義有三宗不同顒作三宗論既與林意相符乃致書於顒謂便宜廣宣顒因出論焉林形長八尺天姿瓌雅登坐震吼談吐若流後辭還髙昌語林卷七
