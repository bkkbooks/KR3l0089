body:
  text: 語林卷二十五明何良俊撰任誕第二十五世所謂任誕其孔門狂者之流與昔孔子傳道不得中行而思其次曰必也狂狷乎豈不以狂者志意髙逺易於入道耶自東漢尚清名好為詭激之行魏晉以來又喜言莊老一時如嵇阮輩以率情任性為得大道之本其後阮孚謝鯤之徒咸共祖述浸以成風觀其脫落禮教不持名檢固多可非然能皭然塵埃之表舉天下不足廽其顧則豈流俗所能庶幾乎奈何世無孔子莫為折中以斯人而卒於狂也惜哉第五伯魚自以久宦不達將家屬客河東變名姓自稱王伯齊載鹽往來太原上黨所過輒為糞除而去陌上號為道士親友故人莫知其處第五倫已見戴叔鸞少便誕節後漢書逸民傳曰戴良字叔鸞汝南慎陽人曽祖遵平帝時御史王莽僭位稱病歸鄉家富尚俠食客常三四百人時人為之語曰關東大豪戴子髙良少誕節母喜驢鳴常學之以娛樂焉居母喪時兄伯鸞居廬啜粥非禮不行叔鸞食肉飲酒哀至乃哭而二人俱有毁容或以問叔鸞子之居喪禮乎叔鸞曰禮所以制情佚情茍不佚何禮之論夫食㫖不甘故致毁容之實若味不存口食之可也論者不能奪晉文帝司馬子上已見大親愛阮嗣宗恆與談戲任其所欲不迫以職事阮嘗從容言曽遊東平樂其土風願得為東平太守文帝即從其意阮騎驢徑到郡至則壞府舍諸壁障使內外相望教令清當十許日便復乘驢去阮嗣宗能為青白眼見禮俗之士以白眼對之時阮有母喪嵇喜來弔阮作白眼喜不懌而退喜弟康聞之乃齎酒挾琴造焉阮大恱遂見青眼阮嗣宗任情縱誕不拘檢節時兵家女有才色未嫁而死阮初不識其父兄徑往哭之盡哀而還阮嗣宗嗜酒荒放露頭散髮裸袒箕踞其後貴游子弟阮瞻王澄謝鯤胡母輔之之徒皆祖述於籍謂得大道之本故去巾幘脫衣服宣露醜惡同於禽獸甚者名之為通次者名之為逹嵇叔夜性巧好煆宅有一栁樹甚茂乃激水環之夏月居其下煆劉伯倫以宇宙為狹常乘鹿車携一壺酒使人荷鍤隨之曰死便埋我名士傳曰劉伶字伯倫沛郡人肆意放蕩土木形骸遨遊一世竹林七賢論曰伶處天地間悠悠蕩蕩無所用心嘗與俗士相牾其人攘袂而起欲必築之伶和其色曰雞肋豈足以當尊拳其人不覺廢然而返王安豐王戎已見頴脫不持儀形好乘巴􅗬馬雖為三司率爾私行巡省田園不從一人自以手巾插腰竹林七賢論曰戎故吏多大官相逄輒下道避之王孝孫早嵗喪妻有一子貧無居宅惟畜露車有牛一頭每行輒使御之暮則共宿車上常歎曰滄海橫流處不安也王尼已見謝幼輿鄰家髙氏女有美色謝嘗挑之女投梭折其兩齒時人為之語曰任逹不已幼輿折齒謝聞之傲然長嘯曰猶不廢我嘯歌光孟祖避難渡江欲投胡母彥國初至值彥國與謝鯤阮放畢卓羊曼桓彛阮孚散髮裸袒閉室酣飲已纍日孟祖將排户守者不聽孟祖便於户外脫衣露頭於狗竇中窺之而大呌彥國驚曰他人决不能爾必我孟祖遽呼入與飲時人謂之八逹畢茂世為吏部郎常飲酒廢職比舍郎釀熟茂世因醉夜至其甕間取飲掌酒者不察執而縛之郎往視乃畢吏部也遽釋其縛茂世遂引主人宴於甕側取醉而出晉中興書曰畢卓字茂世新蔡人少傲逹為胡母輔之所知溫嶠素知愛卓請為平南長史胡母彥國至湘州爾時三伏中彥國坐正衙搖扇視事其子子光從容顧語曰彥國復何為自貽伊戚晉陽秋曰彥國子謙之字子光胡母彥國子謙之醉與父語常呼父字彥國亦不怪一日窺彥國厲聲曰彥國老年不得為爾將令我凥背東壁彥國遂呼入與共飲酒成公子安成公綏巳見妙解音律嘗當暑承風而嘯泠然成曲周伯仁正有姊喪常三日醉姑喪二日醉大損資望每醉諸公常共屯守周僕射周顗與王公及朝士共詣尚書紀瞻宅觀妓紀有愛妾能為新聲周於衆中欲通其妾露其醜穢顔無怍色周僕射在中朝時能飲酒一石及過江雖日醉每稱無對偶有舊對從北來周遇之欣然乃出酒二石共飲各大醉及周醒使視客已腐脅而死宋禕是石崇妓緑珠弟子有國色善吹笛後在晉明帝宫帝疾患危篤羣臣進諌請出宋禕時朝賢悉見帝曰卿諸人誰欲得者衆人無言阮遙集時為吏部尚書對曰願以賜臣帝即遣出與之阮遙集為安東參軍蓬髮飲酒不以王務嬰心後拜散騎常侍性既好飲頻以金貂換酒為有司所紏帝置不問王丞相辟謝仁祖謝尚己見為掾到府通謁丞相以謝有勝㑹語謝曰人謂君能作鴝鵒舞一坐盡傾寧有此理不謝言佳便著巾幘而舞丞相令坐者撫掌擊節謝俯仰在中旁若無人劉承𦙍少有淹雅之度王庾溫諸公素與周旋聞其至共載看之劉倚被囊了不與三人言神味亦不相酬俄頃賔退王庾甚怪此意溫曰承𦙍好賄新下必有珍寶當有市井事令人視之果見向囊皆珍玩正與胡父詣賈謝仁祖開率頴秀辨悟絶倫脫略細故不為流俗之事小時好著刺紋袴謝鎮西謝尚己見酒後於槃案間為洛中市肆工鴝鵒舞甚佳謝鎮西著紫羅襦據胡牀在大市佛圖門樓上彈琵琶作大道曲羅友少有美韻不持檢節好伺人祠往乞餘食雖營署市肆不以為羞時在桓公府桓責之曰君太不逮須食何不就身求乃至於此友傲然不屑答曰就公乞食今乃可得明日已復無桓大笑之晉陽秋曰羅友字它仁襄陽人好學嗜酒不持節檢在桓溫府以家貧乞祿溫以其非治民才許而不用後同府人有得郡者溫送别友至晚問之答曰昨奉教㫖首旦出門中路忽逢一鬼大見揶揄云只見汝送人作郡何不見人送汝作郡民回還以解不覺成淹緩之罪溫雖笑其滑稽心頗愧焉後以為襄陽太守舉其宏綱不存小察甚為吏民所安王中郎王坦之己見以圍棋為手談故其在哀制中祥後客來方幅㑹戲王佛大王忱己見性嗜酒醉輒經日自號上頓故今世人猶稱大飲為上頓王佛大自恃才氣放酒誕節慕王平子之為人婦翁嘗有慘王乘醉弔之婦翁慟哭王與賔客十許人連臂被髮祼身而入繞之三匝而出𡊮山松襟情秀逺妙解音樂舊有行路難曲辭頗踈質山松好之乃為文其辭句婉其節奏每因酣醉歌之聽者無不流涕顧長康矜伐過實諸年少因相稱譽以為戲弄嘗為散騎常侍與謝瞻連省夜於月下長詠自云得先賢風致謝每遙贊之長康彌自力忘倦謝將眠語槌腳人令代已長康不覺有異遂申旦而止陶淵明嘗九日無酒宅邉東籬下菊叢中摘盈把坐俄望見一白衣人至乃是王𢎞送酒得便酣飲陶靖節在家郡將候陶值其酒熟取頭上葛巾漉酒漉畢還復著之陶淵明為彭澤令公田三百畝悉令吏種秫稻妻子固請種粳乃使二頃五十畝種秫五十畝種粳顔光祿延之先為劉柳功曹在尋陽與淵明交欵後為始安郡經過日造淵明每往必酣飲致醉臨去留二萬錢與淵明淵明悉送酒家稍就取酒謝康樂因父祖之資生業甚厚奴僕既衆義故門生數百鑿山浚河功役無已尋山陟嶺必造幽峻巖嶂千重莫不遍歷登躡常著木履上山則去前齒下山去其後齒嘗自始寧南山伐木開徑直至臨海從者數百人臨海太守王琇驚駭謂是山賊徐知是靈運乃安沈約宋書曰靈運要琇更進琇不肯靈運贈詩曰邦君難地險旅客易山行靈運後在㑹稽亦多徒衆驚動縣邑劉穆之小時家貧誕節不持檢操常往妻江氏家乞食多見侵辱不以為恥一日食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常饑何忽須此及穆之為丹陽尹召江氏兄弟食令厨人以金柈貯檳榔一斛進之王敬𢎞為尚書僕射關署文案初不省讀嘗豫聽訟上問以疑獄敬𢎞不對上變色問左右何故不以訊牒副僕射敬𢎞曰臣乃得訊牒讀之政自不解王敬𢎞夫人是桓南郡女兄敬𢎞性愛山水求為天門太守及之郡南郡遣信要其過已敬𢎞至巴陵謂人曰靈寶正當欲見其姊我不能為桓氏贅壻乃遣别船送妻往江陵彌年不迎山郡無事恣其遊適顔延之好酒踈誕恆與物忤見殷景仁劉湛二人並己見專當要任意甚不平常言天下之務當與天下共之豈一人之智所能獨了辭甚激揚每犯權要常語劉曰吾名器不升當由作卿家吏南史曰延之小時經為湛父劉栁後將軍主簿顔延之不能取容當世宋文帝傳詔召之頻不肯詣常日但入酒店裸袒挽歌了不應對他日醉醒入見帝帝問以諸子才能延之曰竣得臣筆測得臣文􅎢得臣義躍得臣酒何尚之因問誰得卿狂答曰其狂不可及謝超宗恃才使酒多所凌忽嘗以應對忤㫖出為南郡王中軍司馬人問曰聞有新命定是何府謝答曰不知是司馬為是司驢既是驢府政應為司驢蕭子顯齊書曰超宗恃才使酒為齊髙帝黃門郎在省常醉上召見問北方事超宗曰虜動來二十年矣佛出亦無如之何以忤㫖出為南郡王中軍司馬𡊮尹𡊮粲己見在郡時詩酒自適不以物務經心每杖策逍遙當其意得悠然忘反郡南一家頗有竹石𡊮率爾步往不通主人直造竹所嘯詠自得主人出語笑欵洽俄車騎羽儀至方知是𡊮𡊮尹踈放好酒嘗步屧白楊郊野間道遇一士人便呼與酣飲明日此人謂被知遇詣門求通𡊮曰昨日飲酒無偶聊相邀爾勿復為煩謝長史性通脫㑹意便行嘗預樂遊苑宴不得醉而還因詣道邉酒罏停車褰幔與車前三騶對飲觀者如堵謝處之自若南史曰謝幾卿靈運之曽孫超宗子也十二補國子生齊文慧太子自臨策試謂王儉曰幾卿本長𤣥理今以經義訪之儉承㫖發問幾卿辨釋無滯文慧大稱賞焉儉謂之曰謝超宗為不死矣及長博學有文梁天監中至左光祿長史謝長史庾左丞既免官二人志意相得並肆情誕縱或乘露車歷遊郊野既醉則相與執鐸挽歌不屑物議南史曰庾仲容字子仲潁川鄢陵人祖徽之父漪仲容幼孤為叔父泳所養及長杜絶人事專精篤學晝夜手不輟卷吏部尚書徐勉擬泳子晏嬰為宫僚泳泣曰兄子幼孤人才粗可願以晏嬰所忝回用之勉許焉轉仲容太子舍人謝長史在省署時夜著犢鼻褌與門生登閣道飲酒酣呌逹曙張思光與弟寶積俱詣太祖思光於御前放氣寶積謝曰臣兄觸忤宸扆上笑而不問須臾食至思光排寶積不與同食上曰何不與賢弟共食思光曰臣不能與謝氣之口同餐張寶積己見蕭侍中蕭琛己見性通脫常自解竈事事畢餕餘便陶然致醉陳暄文才俊逸而沉湎過度兄子秀致書止之暄答曰速營糟邱吾將老焉南史曰暄兄子秀常憂暄飲酒過多致書於暄友人何胥冀其諷諫暄與秀書曰見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張公亦稱耽嗜吾見張公時已六十自言引滿大勝少年吾今所進亦勝於往日老而彌篤唯吾與張季舒耳吾方與此子交歡地下汝欲夭我此志耶昔阮咸阮籍同遊竹林宣子不明斯言王湛能𤣥言巧騎武子呼為癡叔何陳留之風不嗣太原之氣巋然翻成可怪吾既寂寥當世朽病殘年産不異於顔原名未動於卿相若不日飲醇酒復欲安歸汝以飲酒為非吾以不飲為過昔周伯仁渡江唯三日醒吾不以為少鄭康成一日三百杯吾不以為多吾嘗譬酒猶水也可以濟舟亦可以覆舟故江咨議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與論酒矣汝驚吾墜車侍中之門陷地武陵之第遍匝朝野自言憔悴丘也幸茍有過人必知之吾平生所願身沒之後題吾墓云陳故酒徒陳君之神道若斯志意豈避南征之不復賈誼之慟哭者哉何水曹眼不識杯鐺吾口不離瓢杓汝寧與何同日而醒與吾同日而醉乎政言其醒可及其醉不可及也齊神武欲用李元忠為僕射文襄言其常醉不可委以臺閣其子搔聞之請元忠節飲元忠曰我言作僕射不勝飲酒樂爾愛僕射宜勿飲酒李百藥齊書曰李元忠趙郡平棘人勸齊神武建義拜侍中雖處要任不以物務干懷唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣必留連宴賞挾彈携壺遊遨里閈每言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求太常卿以其有音樂而多美酒胡倫許胡叟己見不治産業常苦饑貧然不以為耻養子螟蛉以自給養每至貴勝之門恆乘一牸牛敝韋袴褶作布囊容三四斗飲噉醉飽便盛所餘餅肉以付螟蛉見車馬榮貴者視之蔑如不以經意王無功性簡放不喜拜揖兄通知其誕縱不嬰以家事鄉族慶弔婚冠不與也房𤣥齡嘗送葬出定鼎門際晚且饑有鬻蒸餅者與同行數人共食久之房素不持錢鬻者逼取直房曰乞你頭銜我右臺御史也可隨取直時賞其放逸崔皓有美名李雍欲一見開館待之皓至獻文首章曰十五嫁王昌雍叱起曰小兒無禮不與接而去劉晌唐書曰崔皓有俊才而無士行終司勳員外郎崔皓好蒲博飲酒及游京師娶妻擇有貌者稍不愜意即去之前後如此數四賀知章晚節尤加誕放遨嬉里巷自號四明狂客又稱祕書外監韓朝宗為山南採訪柳子厚先友記曰韓㑹字朝宗昌黎人善清言有文章名最髙然以故多謗至起居郎貶官卒謂孟浩然深間詩律置諸周行必詠穆如之頌因入奏挾與俱行先揚于朝約日引謁㑹浩然有故人至劇飲歡甚或言與韓公約不當後期浩然叱曰業已飲矣身行樂耳遑恤其他遂畢飲不赴杜司徒杜佑己見在維揚日嘗語賔幕曰我致政後著一粗布襴衫跨小馬入市看盤伶傀儡足矣後致政果如其言諌官疏言三公不合入市公曰此自吾意正欲爾陽城與二弟約凡吾所得俸入汝可度吾家有幾口月食米幾何買薪菜鹽凡用幾錢先具之餘悉以送酒家無留也元微之廉問浙東有劉采春自淮甸來容色莫比元與欵狎遂留浙河七年因醉題東武曰因循歸未得不是憶鱸魚盧侍郎簡求戲曰丞相雖不為鱸魚為好鏡湖春耳謂采春也杜牧之分務洛陽時李司徒罷鎮閒居聲妓豪侈洛中名士咸謁之李髙㑹朝客以牧之持憲不敢邀致牧之遣座客通意願預斯㑹李不得已邀之牧之獨坐南向瞪目注視引滿三巵問李云聞有紫雲者孰是李指之牧之凝睇良久曰名不虗傳宜以見惠李俯而笑諸妓亦回首破顔牧之又自飲二爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時廽意氣間逸旁若無人司空圖己見布衣鳩杖出則以女家人鸞臺自隨南唐後主頗疑北人韓熙載肆情坦率不持名檢售妓樂逮百數人日與荒樂所得月俸散與諸姬熙載弊衣芒屨作瞽者持獨絃琴俾舒雅執板挽之隨房乞食以為笑樂湘山野録曰韓熙載北人仕江南致位通顯不防間婢妾有北齊徐之才之風侍兒往往私客客賦詩有最是五更留不住向人枕畔著衣裳之句熙載亦不介意南唐李煜嘗以韓熙載盡忠直言欲用為相熙載後房妓妾數十多出外舍私侍賔客煜以此難之左授右庶子分司東都熙載盡斥諸妓單車上道煜喜留之已而諸妓稍稍復還煜曰吾亦無如此何孟蜀兵部尚書李昊常以牡丹花數枝分遺親知即以興平酥同贈且曰俟花凋謝即以酥煎食之無棄濃豔何承裕嗜酒狂逸歷盩厔咸陽二縣令醉則露首跨牛趨府為治清而不煩民頗安焉每覽牒訴必戲判以喻曲直訴者多心伏引去往往召豪吏接坐引滿吏因醉挾私白事承裕笑曰此見罔也當受杖杖訖復召與飲文苑傳曰何承裕有清才好為歌詩嗜酒狂逸初為中都主簿桑惟翰鎮兖州知其真率不責以吏事官著作佐郎出為盩厔咸陽令醉則露首跨牛趨府府尹王彥昭以其名士容之馮吉不持檢操雅好琵琶曲盡其妙教坊供奉號名手者亦莫能及父道戒令勿習言性所好亦不能改道欲辱之因家宴令吉奏琵琶為夀賜以束帛吉置於肩左抱琵琶按膝再拜如伶官狀了無怍色宋史曰馮吉字惟一河南洛陽人父道周中書令吉晉天福初任祕書省校書郎周顯德中遷太常少卿嗜學善屬文工草𨽻議者以掌誥許之然性滑稽無操行每中書舍人缺宰相即欲用吉終以佻薄而止馮惟一為太常頗不得意以杯酒自娛每朝士宴集雖不召亦常自至酒酣即彈琵琶彈罷賦詩詩成起舞時人愛其俊逸謂之三絶晏丞相晏殊已見知南京王琪張亢為幕客泛舟湖中常以諸妓自隨晏公把柁王張操篙王是南人知行舟次第至橋下故使船觸柱而橫厲聲曰晏稍使柁不正也涑水記聞曰張密學奎張客省亢母宋氏白之族其夫好黃白術宋氏伺其夫出取其書并燒煉之具悉焚之夫歸怒之宋氏曰君有二子不使就學日見君燒煉而效之他日何以興君之門夫感其言而止宋氏不愛金帛市書至數千卷親教督二子客至輒忩間聽之客與其子論文學政事則為之設酒肴或閒話諧謔則不設也僑居常州胡樞密宿有文行宋氏以為必貴亢跅弛宋氏常藏其衣冠不聽出唯胡秀才召乃給衣冠使詣之既而二子皆仕至顯官歐陽文忠公在揚州作平山堂壯麗為淮南第一堂在髙岡下臨江南數百里真潤金陵三州隱隱可見公凌晨携客往遊遣人走邵伯埭取荷花千餘朵分插百許盆與客相間遇酒行即遣妓取一花傳客以其葉盡處則飲酒往往侵夜載月而歸石曼卿以館職通判海州官滿日載私鹽兩船至夀春託知州王子野貨之時禁網踈闊曼卿亦不為人所忌市中公然賣學士鹽石曼卿喜豪飲與布衣劉潜為友嘗通判海州劉潜來訪之曼卿迎於石闥堰與潜劇飲中夜酒竭船中有醋斗餘傾入酒中併飲之明日酒醋俱盡喻明仲妙於長笛持節數郡每出按行至山水佳處馬上臨風輒快作數弄墨莊漫録曰喻陟字明仲睦州人持節數郡政績藹著雅善散𨽻尤妙長笛嘗有馬上吹笛詩張藝叟和之慎伯筠東美秋夜待潮於錢塘江沙上露坐設大酒尊及置一杯對月獨飲意象傲逸吟嘯自若顧子敦適遇之亦懷一杯就其尊對酌伯筠不問子敦亦不與語酒盡各散去張子通既貴其弟子遊好吹薤露暑月衣犢鼻納涼門廡值里巷喪車過必徑趨羣挽中聲調清壯抑遏中節或至郊外通夕而歸喪家以子通故攝至賔位常享醉飽子通雖屢戒朂終不能止劉跛子青州人常拄一拐每嵗必一至洛陽看花館范家園春盡即還為人談噱有味范家子弟多狎之李舟客都下一年無差遣後受昌州議者以去家逺改受鄂倅劉淵才聞之往謁李曰今日聞大夫欲受鄂倅有之乎李曰然淵才悵然曰誰為大夫謀昌佳郡也奈何棄之李驚問其佳淵才曰天下海棠無香昌州海棠獨香聞者傳以為笑王韶罷樞密以禮部侍郎知鄂州一日宴客出家妓奏樂入夜席客張䜋沉醉挽家妓不前遽將擁之家妓泣訴於韶坐客皆失色韶徐曰比出汝曹以娛賔而乃令坐客失歡命取大杯罰家妓容色不動談笑如故人皆伏其量米芾為書學博士一日上與蔡京論書艮嶽俄召芾至令書一大屏上指御前一端州石硯使就用之書成芾捧硯請曰此硯經賜臣芾濡染不堪復以進御上大笑因以賜之芾蹈舞以謝抱負趨出餘墨霑漬袍袖喜動顔色上顧京曰顛名不虗得京曰芾人品誠髙所謂不可無一不可有二張思光事己見陳季常龍邱子嘗自洛之蜀載二女侍以從戎裝駿馬至溪山佳處輒住終日周公謹嘗與一時好事諸人邀趙子固各携所藏書畫放舟湖上相與評賞飲酣子固脫帽以酒晞髮箕踞歌離騷旁若無人薄暮入西泠掠孤山檥櫂茂樹間指林麓最幽處瞪目絶呌曰此是洪谷子董北苑得意筆也鄰舟數十皆驚駭絶歎以為真謫仙人劉道醇五代名畫補遺曰荆浩字浩然河南沁水人業儒博通經史善屬文值五季多故隱於太行之洪谷自號洪谷子嘗畫山水樹石以自適著山水訣一卷山圖繪寶鑑曰董源江南人事南唐為後苑副使善畫水樹石幽潤峯巒清深天真爛漫意趣髙古論者謂其水墨類王維著色師李思訓兼工龍水無不臻妙語林卷二十五
