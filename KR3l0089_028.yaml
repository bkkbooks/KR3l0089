body:
  text: 語林卷二十八何良俊撰輕詆二十八或問子西孔子曰彼哉彼哉蓋厭絶之也至孟子於管晏猶或輕之則聖賢亦詆訶人耶嗚呼聖賢之心非不欲并包兼容然是非之公卒何可掩不有所貶後將安懲禰正平自荆州北遊許都書一刺懷之漫滅而無所遇或問之曰何不從陳長文司馬伯達乎禰曰卿欲使我從屠沽兒輩耶又問當今復誰可者禰曰大兒孔文舉小兒楊德祖人問禰正平荀令君趙蕩冦皆足蓋當世乎禰答曰文若可借面弔喪稚長可使監厨請客其意以荀但有貌趙健啖肉也劉荆州劉表已見嘗自作書欲與孫伯符以示禰正平正平嗤之言如是為欲使孫䇿帳下兒讀之耶將使張子布見乎管幼安少便恬靜常笑邴根矩華子魚有仕宦意及華為司徒上書讓幼安幼安聞之笑曰子魚本欲作老吏故榮之耳劉巴不與張飛語孔明問之巴曰大丈夫處世當交四海英雄何至與兵子共語虞仲翔在東吳曹公欲辟之虞聞之曰盜跖欲以餘財汙良家耶石勒治門閣至峻有醉胡乘馬徑入府門勒問門吏馮翥向走馬入門為是何人翥惶遽忘諱誤對云向有醉胡乘馬馳來即已訶問胡人難與語非小吏所制勒笑曰胡正自難可與言石虎鄴中記曰石勒字世龍上黨武鄉人胸奴之苖裔也永嘉初豪傑並起共推為主都於襄國後僭正號周僕射以雅望有海內重名後頗有酒失為僕射時略無醒日時人謂之三日僕射庾太尉曰周侯末年所謂鳳德之衰阮光祿阮裕已見聞何次道拜相歎曰我當何處生活晉陽秋曰何充字次道廬江人思韻淹通有文義才情纍遷侍中驃騎將軍揚州刺史禇公與孫興公禇裒孫綽並已見同遊曲阿後湖中流風勢猛迅舫欲傾覆禇公已醉乃曰此舫人皆無可以招天譴者唯孫興公多塵滓正當以厭天欲耳便欲捉擲水中孫遽無計唯大啼曰季野卿念我𡊮真為監軍時范玄平為吏部尚書大坐語𡊮卿此還不失為護軍𡊮曰卿何事人中作市井符朗初過江裴景仁秦書曰朗字元達符堅從兄性宏放神氣爽悟堅常曰吾家千里駒也堅為慕容沖所圍朗降謝玄用為散騎侍郎王大與兄國寶命駕詣之汰法師問朗曰安法師傳曰竺法汰者體器𢎞簡道情冥到法師友而善焉一説法汰即安公弟子見王吏部兄弟未朗曰非一狗面人心又一人面狗心者是耶蓋以忱醜而才國寶美而狠也秦書曰朗矜髙忤物不容於世衆讒而殺之劉邁劉毅之兄為殷仲堪參軍桓南郡嘗過仲堪於廳事前戲馬以矟擬仲堪劉時在坐謂南郡曰馬矟有餘精理不足會稽太守孟顗事佛精懇而為謝靈運所輕謝嘗語顗曰得道應須慧業文人卿生天當在靈運前成佛必在靈運後顗深恨此言南史曰孟顗字彥重平昌安邱人衛將軍昶弟也昶顗並美風姿時人謂之雙珠昶貴盛顗不就辟昶死後厯侍中卒於會稽太守顔延之每薄湯惠休詩謂人曰休上人制作委巷間歌謡耳方當誤後生王僧達已見性好鷹犬何尚之致仕復起嘗於宅設八關齋大集朝士行香次至僧達曰願即解於鷹犬勿復遊獵僧達答曰家養一老狗放之去已復還尚之失色謝宣映南史曰謝絢字宣映謝景重之子曾於公坐戲調其舅𡊮湛湛甚不堪之謂曰汝父昔已輕舅汝今復來加我可謂世無渭陽情也宋書曰景重是王胡之外甥與舅亦不協丘車騎嗜酒弛縱不治形儀好臧否人物嘗在沈淵坐見王文憲詩沈曰王令文章大進丘曰何如我未進丘靈鞠王儉並已見王瞻好裁貶人物小時與齊豫章王嶷為友嘗候嶷髙論武帝時在大牀寢瞻謂嶷曰帳中人物亦復隨人寢興嶷言次忽問王景文卿兄揩賢愚何如殷道矜瞻曰卿遂復言他人兄耶武帝笑語嶷曰多王嶷小名汝兄愚那得忽來王參軍此句瞻曰直恐如卿來談南史曰王瞻字明逺玄謨子負氣傲俗好裁貶人物齊建元初為永嘉太守詣闕跪拜不如儀召入東宫付廷尉殺之江左甲族向來多不居憲臺王氏以分支居烏衣者官位微減王僧虔初除御史中丞謂人曰此是烏衣諸郎坐處我亦可試為耳張忺泰為直閣校尉通涉雅俗交結多是名素每下直輒著鹿皮冠衲衣錫杖執素琴有以啓武帝者帝曰將家兒何作此舉止南史曰張忺泰字義亨竟陵人衛將軍興世子也不以武業自居好𨽻書讀子史年十餘詣禇彥回彥回問張郎弓馬多少答曰性怯畏馬無力牽弓彥回異之王元長初為司徒法曹詣王僧祐因過沈昭略元長與沈先未相識沈屢顧盼請主人曰是何年少元長殊不意因語曰僕出於扶桑入於暘谷照耀天下云誰不知沈曰不知許事且食蛤蜊元長曰方以類聚物以羣分君生長東隅居然應嗜此族張敬兒拜車騎將軍開府王敬則戲之呼為禇彥回時咸推禇彥回風度詳雅敬則以敬兒武臣粗率故以彥回為戲也敬兒曰我馬上得之終不得作華林閣勳南史曰敬則在宋與夀寂之殺後廢帝於華林園卞田居卞彬已見為平越長史嘗目禽獸云羊性淫而狠豬性卑而率鵝性頑而傲狗性險而出皆指斥貴勢其賦蝦蟆云紆青拖紫名為蛤魚世以比令僕也又云科斗唯唯羣浮暗水維朝繼夕聿役如鬼比令史咨事也文章傳於閭巷劉中郎性韻剛疏輕言肆行一日遇禇司徒淵入朝以腰扇障日中郎從側過曰作如此舉止羞面見人扇障何益禇曰寒士不遜中郎曰不能殺𡊮劉安得免寒士南史曰劉祥字顯徵穆之之曾孫少好文學性韻剛疏建元中為正員郎後為臨川王驃騎從事中郎王奐初拜僕射劉顯徵祥與奐子融同載行至中堂見路人驅驢劉曰驢汝好為之如汝人才皆已令僕矣南史曰祥著連珠十五首以寄懷其譏議者云希世之寶違時必賤偉俗之器無聖則淪是以明玉黜於楚岫章甫窮於越人王茂逺子琮為國子生尚始興王女繁昌主琮少不惠為學生所嗤遂離昏茂逺謝始興始興曰此自主意身極不願如此茂逺曰下官曾祖是謝仁祖外孫亦不藉殿下姻媾為門户沈休文常侍梁武帝宴值豫州獻栗徑寸半帝竒之問栗事多少與約各疏所憶沈少帝三事約出語人曰此公護前不讓即羞死徐常侍徐陵已見聘齊時魏收文學北朝之秀收録其文集以示徐令傳之江左徐速濟江而沉之從者以問徐曰吾為魏公藏拙庾信至北唯愛溫子升寒山寺碑後還南人問北方何如信曰唯寒山寺一片石堪共語餘若驢鳴犬吠耳何敬容為尚書令淺於學術不善作草𨽻署名敬字大作茍小為文容字大為父小為口陸倕見而戲之曰公家茍既竒大父亦不小敬容不能答江從簡是江光祿子江革已見小時有文情年十七作採荷調以刺何敬容曰欲持荷作柱荷弱不勝梁欲持荷作鏡荷暗本無光敬容不覺唯歎其工南史曰江革少子從簡少有文才作採荷調以刺何敬容為當時所賞官至司徒從事中郎侯景亂為任約所害蕭韶是梁宗室南史曰蕭韶字德茂梁長沙宣武王之孫太清中為舍人城陷西奔江陵湘東王用為郢州刺史初為幼童庾開府信愛之有斷袖之歡衣食所資皆開府所給遇有客韶為開府傳酒後為郢州開府西上江陵途經江夏韶接開府甚薄坐清油幕下引開府入宴坐開府别榻有自矜色開府稍不堪因酒酣乃徑上韶牀踐踏肴饌直視韶面語曰官今日形容大異近日時賔客滿坐韶大慙恥胡倫許胡叟已見嘗於髙允坐見中書侍郎李璨璨被服華靡倫許貧老衣褐璨頗忽之倫許謂之曰老子今若相許脫體上袴褶衣帽君欲作何計也李惕然失色楊遵彥愔典選二十餘年奬拔人倫以為己任然取士多以言貌時人為之語曰楊公用人如貧士市瓜取其大者魏佛助以溫子升全不作賦邢雖有一兩首又非所長常云文士會須作賦始成大才今人唯以章表碑志自許此外更同兒戲劉晝作六合賦自謂絶倫以呈魏收收曰賦名六合已是大愚文又愚於六合君四體又甚於文晝大忿以示邢子才子才曰君此賦正似疥駱駝伏而無嫵媚後魏書曰劉晝本大儒舉秀才入京考策不第方復緝綴詞藻言甚俚拙作賦一首以六合為名自謂絶倫崔信明嘗自矜其文謂過李百藥鄭世翼遇之江中謂信明曰嘗聞有楓落吳江冷願見其餘信明欣然多出衆篇世翼覽未終篇曰所見不逮所聞投諸水引舟徑去唐詩紀事曰鄭世翼滎陽人武德時為揚州録事參軍以言忤物貞觀中坐怨謗流死嶲州唐太宗行幸翠微宫以司農卿李緯為民部尚書會有自京師來者帝問房玄齡聞緯拜尚書謂何答曰惟稱李緯好髭鬢帝聞遽改授洛州刺史髙宗朝薑恪為左相閻立本為右相時薑以邊將立功立本最善圖畫時人為之語曰左相宣威沙漠右相馳譽丹青武后時有御史臺令史將入臺門值裏行御史數人聚立門內令史下驢衝過其間諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰御史許之此人即語驢曰汝伎藝可知精神極鈍何物驢畜敢於御史裏行於是羞而止大唐傳載曰武后初稱周恐下心不安乃令人自舉供奉官正員外多置裏行拾遺補闕御史時有車載斗量之詠楊再思呼朝士為麒麟楦或問之曰今假拚麒麟必修飾其形覆之驢上宛然異物及去其皮還是驢耳無德而朱紫何以異是狄仁傑為相有盧氏堂姨居午橋别墅未嘗入城仁傑伏臘修禮甚謹嘗雪後休暇候盧氏適見表弟挾弧矢攜雉兔歸羞味進於堂上顧揖仁傑意甚輕傲仁傑因啓曰某幸為相表弟有所欲願悉力從其請姨曰吾止有一子不欲令事女主仁傑慙而去趙仁奬住王戎墓側善歌黃麞景龍中負薪詣闕云助國調鼎即除臺官中書令姚崇曰此是黃麞耶改授當州一尉宋務光嘲之曰趙仁奬出王戎墓下入朱博臺中舍彼負薪登兹列柏行人不避驄馬坐客惟聽黃麞忽一夫負兩束薪曰此合拜殿中人問其由曰趙以一束拜監察此兩束合授殿中盧藏用初隱終南少室二山時有意當世人目為隨駕隱士晚年乃徇權利司馬承禎將還山藏用指終南曰此中大有佳處承禎徐曰以僕視之仕宦之捷徑耳盧藏用已見陸餘慶為洛州長史其子嘲之曰陸餘慶筆頭無力嘴頭硬一衙受詞訟十日判不竟置案褥下餘慶得讀之曰必是那狗遂鞭之李林甫每與同僚議及公直之事則如癡醉之人未嘗問答或語及阿徇之事則響應如流張曲江嘗謂賔客曰李林甫議事如醉者腦語王縉作相日好與人撰碑志有送潤毫者誤叩右丞門右丞曰大作家在那邊玄宗欲相蘇頲夜召蕭嵩草制其詞曰國之瓌寶帝曰朕不欲斥其父名卿當為刋削沉思久之曰國之珍寶嵩出帝曰虛有其表嵩頤大多髭故云唐詩紀事曰嵩開元初權中書舍人王丘齊浣以嵩少學術不以行輩許之獨姚崇稱其逺到嚴武以世舊待杜甫甚善甫性偏躁傲誕嘗醉登武牀瞪視曰嚴挺之乃有此兒朱泚僭逆姚令言與源休同知政事羣凶宴樂既醉令言與休論功令言自比蕭何休曰帷幄之謀成秦之業無出豫右吾比蕭何子為曹參可矣時朝士在賊庭者聞之皆笑謂休為火迫酇侯長慶中一朝士退朝詣其友人見衲衣道人在坐不懌而去他日謂友人曰公何故好毳褐之夫吾不知其賢愚且覺其臭友人應曰毳褐之臭豈勝銅乳銅乳之臭並肩而立接迹而趨公處其間曾不嫌恥反譏余與山野有道之士遊南朝髙人以蛙鳴及蒿萊勝鼓吹以吾視毳褐愈於今之朱紫逺矣韓愈嘗語李程曰某與崔丞相羣同年往還直是聰明過人李曰何處是過人者韓曰共愈往還二十餘年不曾共説著文章韓昌黎初貶之制是席舍人草詞中曰早登科第亦有聲名席既物故友人曰席無令子弟豈病隂毒傷寒而與不潔喫耶韓曰席十八喫不潔太遲人問之曰出語不是李泌謂盧杞姦邪德宗稱其小心泌對曰小心乃姦臣之態李紓侍郎好諧戲又服用華鮮嘗朝回與同列入坊門有負販者呵不避李罵云頭錢價奴兵輒衝官長負者顧而言曰八錢價措大漫作威風紓樂採異語使僕者誘之至家為設酒饌問八錢之義負者答曰只是衣短七耳同列以為破的唐詩紀事曰李紓字仲舒大厯初李季卿薦為左補闕德宗時終吏部侍郎關播盛稱李元平用為汝州别駕李希烈作逆使李克誠禽之又募亡命為內應縛致元平入見希烈遺下汙地希烈以其眇小無髯戲克誠曰使爾取元平何得將元平兒來因嫚罵曰盲宰相使汝當我何待我淺耶劉昫唐書曰關播字務元衛州汲人盧杞以其柔緩易制驟稱薦之用為吏部侍郎播乏知人之鑒好大言虛誕者李元平本宗室子敢大言好論兵播竒之纍奏以為可任將相武儒衡在中書時元稹因緣宦官得知制誥儒衡鄙厭之會食瓜蠅集其上儒衡揮扇曰適從何處來遽集於此一坐皆失色劉昫唐書曰武儒衡宰相元衡從父弟才度俊偉氣岸髙雅論事有風彩羣邪惡之尤為宰相令狐楚所忌薛昭緯嘗任祠部員外托言曰薛保遜大中朝侵侮諸叔父自起居舍人貶洗馬而卒其子昭緯有父風任祠部員外貶澄州司馬中書舍人顔蕘當制曰陵轢諸父代嗣其凶時李系任少儀王蕘任小賔正旦立仗班退昭緯吟曰左金烏而右玉兔天子旌旗蕘遽請下句昭緯應聲曰上李系而下王蕘小人行綴唐書曰王蕘祖起父龜並知名蕘苦學善屬文拜侍御史從僖宗幸山南卒鄭光業兄弟每柄文有一巨皮箱凡同人投獻詞句有可嗤者即投其中號曰苦海用資諧戲每有宴集即命二僕舁苦海於前共閲一編靡不極歡而罷韓昭仕蜀粗有文章李台嘏曰韓八座事藝如拆襪線無一條長玄武湖是金陵勝處一日諸閣老待漏朝堂語及林泉之事馮謐因舉玄宗賜賀監鏡湖信為盛事又言余非敢望此但賜後湖亦足暢平生也徐鉉徐語曰主上尊賢待士常若不及豈惜一後湖所乏者知章爾馮大有慙色韓熙載性好謔浪有投贄太荒惡者熙載使妓炷艾熏之俟來即歸之出乃嗅之曰子之卷軸何多艾氣聞者大笑郭昱狹中詭僻登顯德中進士恥赴常選獻書於宰相趙普自比巢由朝議惡其矯激故久不調後復伺普望塵自陳普笑謂人曰今日甚榮得巢由拜於馬首宋太祖嘗與趙普議事不合上曰安得宰相如桑維翰者與之謀乎普曰使維翰在陛下亦不用蓋維翰愛錢上曰茍用其長當護其短措大眼孔小賜與十萬貫則塞破屋子矣許懷德為殿帥嘗有一舉人因懷德乳姥求為門客懷德許之舉子曳欄拜於庭下懷德據坐受之或以懷德武人不知事例密謂之曰舉人無設階之禮可少降接懷德應曰我得打乳姥關節秀才只消如此待之梅侍讀與孫何盛度丁謂四人並已見俱為侍從時梅好潔衣服裒以龍麝其香數步襲人孫性落魄衣服垢汙盛體充壯居馬上前如俯後如仰丁吳人面如刻削時人為之語曰梅香孫臭盛肥丁瘦夏竦嘗統師西伐揭榜塞上云有得趙元昊頭者賞錢五百萬貫爵西平王元昊使人入市賣箔陜西荻箔甚髙倚之食肆外佯為食訖遺去至晚食肆竊喜以為有所獲徐展之乃元昊購竦之榜懸箔之端云有得夏竦頭者賞錢兩貫文竦聞之急令藏掩而已喧播逺近竦大慙阻劉貢父作給事中時鄭穆學士表請致仕狀過門下省劉謂同舍曰宏中請致仕為年若干答者曰鄭年七十三劉遽曰慎不可遂其請問其故劉曰且留取伴八十四底時潞公年八十四再起平章事或云潞公聞之甚不懌宏中穆字也劉貢父言每見介甫道字説便待打諢蘇子瞻云豫一日醉卧有魚頭鬼身者自海中來云廣利王請端明豫披褐黃冠而去亦不知身入水中但聞風雷聲有頃豁然明目疑入水晶宫其下驪目夜光文犀尺璧南金火齊不可仰視間以珊瑚琥珀廣利佩劍冠服而出從二青衣豫曰海上逐客重煩邀命有頃東華真人南溟夫人亦至出鮫綃丈餘命豫賦詩豫寫竟進廣利諸仙迎看稱妙獨廣利旁一冠簪者謂之鱉相公進言蘇軾不謹祝融字犯王諱王大怒斥出豫退而歎曰某到處被鱉相公厮壞東坡一日會客坐客舉令欲以兩卦名證一故事一人云孟嘗門下三千客大有同人一人云光武兵渡滹沱河既濟未濟一人云劉寬婢羮汙朝衣家人小過東坡云牛僧孺父子犯罪先斬小畜後斬大畜蓋指荆公父子也荆公素輕沈文通以為寡學贈之詩曰翛然一榻枕書卧直到日斜騎馬歸及作文通墓志遂云公雖不常讀書或曰渠乃狀元此語得無太過公乃改讀書作視書東都事略曰沈遘字文通錢塘人舉進士第一為人明敏通達世務以龍圖閣直學士知開封府王荆公嘗見鄭毅夫夢仙詩云授我碧簡書竒蟠丹砂讀之不可識翻身凌紫霞大笑曰此人不識字不勘自承毅夫曰不然吾用太白詩語也公又笑曰自首減等東都事略曰鄭獬字毅夫安州安陸人為人俊邁不羣舉進士第一纍官知制誥王安石參知政事不悅獬除翰林侍讀學士知杭州杜少陵宿龍門詩云天闕象緯逼王介甫改闕為閲黃山谷對衆極言其是劉貢父聞之曰直是怕他王荆公與滕甫不善又素輕鄭毅夫因目為滕屠鄭沽司馬溫公之亡當明堂大享朝廷以致齋不及奠肆赦畢蘇子瞻率同輩以往程正叔固爭引論語子於是日哭則不歌子瞻曰明堂乃吉禮不可謂歌則不哭正叔又諭司馬諸孤不得受弔子瞻戲曰頤可謂燠糟鄙俚叔孫通司馬文正公薨時程正叔以臆説斂之正如封角狀東坡嫉其怪妄因怒詆曰此豈信物一角附上閻羅大王者耶沈明逺寓簡曰程氏之學自有佳處至椎魯不學之人竄迹其中狀類有德者其實土木偶也而盜一時之名東坡譏罵略無假借人或過之不知東坡之意懼其為楊墨將率天下之人流為矯虔庸惰之習也闢之恨不力耳豈過也哉章子厚章惇與蘇子瞻小時相善一日章坦腹而卧適子瞻自外來章摩其腹以問子瞻曰公道此中何所有子瞻曰都是謀反的家事蘇子瞻云惠州市肆寥落然日殺一羊不敢與在官者爭買時囑屠者買其脊骨骨間亦有微肉熟煮熱漉隨意用酒薄點鹽炙微焦食之終日摘剔得微肉於牙綮間如食蟹螯率三五日一食甚覺有補子由三年堂庖所食芻豢滅齒而不得骨豈復知此味乎此雖戲語極可施用用此法則衆狗不悅耳張文潛耒嘗問張安道云司馬君實直言王介甫不曉事是如何安道云賢只消去看字説文潛云字説也只是二三分不合人意安道云若然則足下亦有七八分不解事矣曾鞏知襄州日朝廷遣使按水利令從官各辟三兩選人充勾當公事鞏一日宴諸使者坐客云昨夕九星墜於西南有聲甚厲又有小星隨之鞏曰小星必是天狗下勾當公事也劉元城言哲宗皇帝嘗因春日經筵講罷移坐小軒中賜茶自起折一栁枝程頤為説書遽起諫曰方春萬物生榮不可無故摧折哲宗色不平因擲棄之溫公聞之不樂謂門人曰遂使人主不欲親近儒生正為此輩章子厚為侍從時遇其生朝會客門人林特以詩為夀子厚出詩示客指其頌德處歎以為工門人頗不平忽曰昔人有令畫工傳神以其不似命别為之既又以為不似凡三四易畫工怒曰若畫得似處是甚模樣滿坐閧然曾布以翰林學士權三司坐言市易事落職知饒州舍人許將當制頗多斥詞許是曾公所引心自不安往曾許謝過曾曰君不聞宋子京之事乎昔晏元獻當國子京為翰林學士晏愛宋之才雅欲旦夕相見遂稅一第於旁近延居之遇中秋啓燕晏召宋出妓飲酒賦詩達旦方罷翌日罷相宋當草詞頗極詆斥至有廣營産以殖私多役兵而規利之語方子京揮毫之際昨日餘酲尚在左右觀者亦駭蓋此事由來逺矣何足校耶許憮然而去王元澤有心疾與妻未嘗接荆公憐而嫁之同時有工部員外郎侯叔獻再娶而悍後叔獻卒朝廷慮其虐前妻之子有旨出之不得為侯氏妻京師為之語曰王太祝生前嫁婦侯工部死後休妻王雱已見為東軒筆録曰侯叔獻汜縣令有善政初為尉嘗捕盜有功府尹李絢謂曰子之才能吾深知之可一見推官判官當同狀薦子也叔獻曰本以公事至府事畢歸邑若投謁以求薦非我志也遂不見而去蔡卞妻七夫人是荆公女頗知書能詩詞蔡每有國事先謀之牀第然後宣於廟堂時執政相語曰吾輩每日奉行者皆其咳唾之餘也蔡拜右相家宴張樂伶人揚言曰右丞今日大拜都是夫人裙帶中外傳以為笑蔡攸嘗飲禁中徽宗頻以巨觥勸之攸懇辭不任杯酌將至顛踣上曰就令灌死亦不至失一司馬光杭僧溫日觀善畫蔔萄性嗜酒唯楊總統飲以酒則不一沾唇見輒罵曰掘墳賊掘墳賊夏文彥圖繪寶鑑曰僧子溫字仲言號日觀作水墨蔔萄自成一家法人莫能測又號知歸子語林卷二十八
