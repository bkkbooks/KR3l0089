body:
  text: 語林卷二十一眀何良俊撰捷悟第十三漢世稱見事敏速者曰一日千里蓋言捷也夫有觸即悟其孔子所云耳順非耶然孔子必俟知命之後而後世小生率能及此余竊怪之嘗觀釋氏菩薩乘六度五者皆以慧為導師然定復生慧其與吾儒明則可以至于誠誠則自無不眀一道也故初地之慧謂之世諦既定之慧謂之真諦真諦則與理為一即耳順是也然初地之慧本于賦畀既定之慧假于修習賦畀必由天降修習可以力強此其難易之辨也奈何後世初地之慧與古不異而既定之慧鮮焉無聞豈人之易其所難顧難其所易耶孔子曰十室之邑必有忠信如丘者焉不如丘之好學嗚呼惜哉楊德祖楊修己見為曹操主簿操既平漢中欲討劉備而不得進欲守又難為功護軍不知進止操出教唯曰雞肋外曹莫能曉德祖曰夫雞肋食之則無所得棄之則殊可惜公歸計決矣乃令白外稍嚴俄操回師時人服其幾決魏太祖征𡊮本初有治餘數十斛竹片咸長數寸衆並謂不堪用正合燒除太祖意甚惜思所以用之謂可作竹甲而未顯其言馳使以問楊德祖德祖意懸同桓溫隂懷犯順追蜀人知星者問以國家運祚修短星人云太微紫微文昌三宫氣候如此決無憂虞五十年外不論耳由是大忤溫旨異日送絹一匹錢五千文與之星人乃馳詣習鑿齒曰家在益州被命逺下今受旨自裁無由致其骸骨緣君仁厚乞為標碣習問其故星人曰賜絹一匹令僕自裁錢五千以買棺耳習曰君幾誤死君嘗聞星宿有不覆之義乎此以絹戲君以錢供道中資聽君去耳星人大喜眀便詣溫别溫問去意以習鑿齒之言對溫笑曰鑿齒憂君誤死君定是誤活然徒三十年讀書不如一詣習主簿宋文帝時到彥之北伐甲兵資實甚盛南史曰到彥之字道豫彭城武原人楚大夫屈到後也為豫州刺史鎮厯陽元嘉七年侵魏回軍焚舟步至彭城及敗還委棄蕩盡武庫為之一空一日上與羣臣宴有荒外降人在列上問庫部郎顧琛庫中仗猶有幾許琛詭對有十萬人仗上既問而悔得琛對甚喜沈約宋書曰顧琛字𢎞瑋吳郡吳人晉司空和之曽孫祖履之父惔並為司徒左西曹掾琛謹確不尚浮華起家州從事駙馬都尉纍遷尚書庫部郎劉士章劉繪己見為南康相郡人有姓賴居穢里投刺謁士章士章嘲之曰君有何穢而居穢里此人應聲答曰未審孔丘何闕而居闕里蕭彥瑜嘗與御宴醉伏筵中蕭琛己見武帝以棗投之彥瑜取栗擲上正中面帝動色言汝那得如此豈有説也彥瑜答曰陛下投臣以赤心臣敢不報以戰栗上大恱梁時有沙門訟田武帝大署曰貞有司未辨遍問莫知劉顯曰貞文字為與上人帝忌出之梁書曰劉顯字嗣芳沛國相人父􅎦晉安內史顯幼聰敏當世號曰神童好學博涉多通仕至平西咨議參軍祖元珍祖瑩為彭城王協參軍時尚書令王肅曽于省中詠悲平城詩云悲平城驅馬入雲中隂山常晦雪荒松無罷風彭城甚嗟其美欲使肅更詠乃失語云王公吟詠情性聲律殊佳可便為誦悲彭城詩肅因戲彭城云何意悲平城為悲彭城也彭城有慙色祖在坐即云有所悲彭城王公自未見耳肅云可為誦之元珍應聲云悲彭城楚歌四面起尸積石梁亭血流雎水裏肅甚嗟賞之彭城大恱退謂元珍曰卿定是神口今日若不得卿幾為吳子所屈東魏孝文帝嘗宴羣臣酒酣歡極帝因舉巵酒屬羣臣曰三三橫兩兩縱誰能辨之賜金鍾御史中尉李彪曰沽酒老嫗甕注瓨屠兒割肉與稱同尚書左丞甄琛曰吳人浮水自云工妓兒擲袖在虛空彭城王協曰臣始解此是習字髙祖即以金鍾賜彪人服彪聰眀有智甄琛和之亦速薛道衡嘗逰鍾山開善寺謂一沙彌曰金剛何為努目菩薩何為低眉沙彌答曰金剛努目所以降伏四魔菩薩低眉所以慈悲六道道衡憮然稱善隋煬帝與唐神堯俱是獨孤外家由是神堯與煬帝每相狎侮神堯面皺帝于衆中目為阿婆面神堯忿恚不樂洎歸以告竇皇后曰某身世可悲今日更被上顯毁云阿婆面據是兒孫不免飢凍矣后欣躍曰此言可以室家相賀神堯不喻后曰公封于唐阿婆乃是堂主堂者唐也神堯大恱太行山有薛居士學總玄儒多所該覽聞釋曇延少年知道夙悟絶倫嘗一造之言謔相髙未之揖謝薛乃戲題四字方圎動靜命曇延體之延應聲曰方如方等城圎如智慧日動則識波浪靜類涅槃室居士驚異絶嘆曰由來所未見希世挺生即斯人也張説女嫁盧氏女嘗為其舅求官説不語但指搘牀龜示之歸告其夫曰舅得詹事矣令狐相令孤綯己見出鎮淮海日支使班蒙與從事俱逰大眀寺之西廊忽覩前壁題云一人堂堂二曜同光泉深尺一點去冰傍二人相連不欠一邉三梁四柱烈火然除却雙勾兩日全諸賔幕顧之駐足良久莫能辨班蒙曰一人豈非大字乎二曜者日月非明字乎尺一者十一寸非寺字乎點去冰水字二人相連天字不欠一邉下字三梁四柱而烈火無字兩日除雙勾比字得非大眀寺水天下無比乎衆皆洗然曰黃絹之竒智亦何異哉令狐公稱歎彌日詢之老僧曰頃年有客獨逰題之而去朱梁張䇿年十二父同嘗浚甘泉井得鼎耳有曰魏黃初元年春二月匠吉干造製作竒巧同甚寶之䇿時在傍徐言曰建安二十五年曹公改元為建康其年十月文帝受漢禪始號黃初元年無二月眀矣鼎文何繆與同大驚亟遣取魏志展讀果驗宗族竒之五代史記曰張策字少逸河西燉煌人父同為唐容管經略使策少通悟好學開平中拜中書侍郎以風恙罷卒于洛陽湖南馬希範唐同光中入貢莊宗問洞庭廣狹希範對曰洞庭至狹若車駕南巡止可飲馬莊宗拊背嘉之五代史楚世家曰馬希範字寶規馬殷第四子殷卒希範襲爵楚王好學善詩文士廖光圗徐仲雅李臯拓拔常等十八人皆故殷時學士也有客嘗訪青龍寺僧屬主者忽遽不暇留連翌日復至又遇要地朝客不得展敬客怒取筆題門而去詞曰龕龍東去海時日隱西斜敬文今不在碎石入流沙僧衆不能詳有一沙彌解之曰龕龍去矣有合字時日隱有寺字敬文不在茍字碎石入沙卒字此不遜之言辱我曹矣僧人大悟追前人杳無蹤由或云沙彌是懿皇帝朝文皓供奉陳恭公陳執中己見當國日曽魯公由起居注除待制恭公弟婦王冀公孫女曽出也嵗旦拜恭公公迎謂曰六新婦曽三除從官喜否王固未嘗歸外家輒答曰三舅甚荷相公收録但太夫人不樂責三舅曰汝三人及第必是全廢學丞相姻家備知之故除待制也恭公默然未幾改知制誥蓋恭公不由科舉失于夷考女子之警敏如此東都事略曰曽公亮字明仲泉州晉江人嘉祐六年拜平章事公亮精于法令多知朝廷典章臺閣故事時韓琦為上相歐陽修參知政事琦于法令典故問公亮文學人材問修百官奉法循理而朝廷治封魯國公諡宣靖王定國素為馮當世所知荆公絶不樂之一日當世力薦于神祖荆公曰此孺子耳當世忿曰王鞏庚子生安得謂之孺子蓋鞏之生與先天節同日也荆公愕然不覺退立趙魏公夫人管道升善書畫陶九成書史會要曰管夫人諱道升字仲姬吳興人趙魏公室封魏國夫人有才略聰眀過人為詞章作墨竹筆意清絶亦能書吾竹房吾衍己見嘗題其所畫竹石竹房有一私印是好嬉子三字即以此印倒用于跋尾人皆以為竹房之誤魏公見之曰此非誤也這瞎子道婦人會作畫倒好嬉子博識第十四孔子語子貢曰女以豫為多學而識之者與非也豫一以貫之則孔子果不貴博識耶及觀萍浮楚澤隼集陳庭異鳥舞郊羵羊出井茍非博識誰為辨之夫孔門見道莫過顔子顔子之有得於孔子者莫過于喟然之歎今觀其所稱髙堅前後與夫卓爾末由皆形容道體之妙若夫孔子之善誘與顔子之善學者唯博約二語而已蓋二者互相為用不可廢也不然則其告子貢者語一足矣其所貫者復何物耶後世舍博而言約此則入于釋氏頓悟之説道之不眀也夫何尤漢武帝祀甘泉至渭橋有女子浴于渭水乳長七尺上怪其異遣問之女曰帝後第七車侍中知我所來時寬在第七車對曰天星主祭祀者齋戒不嚴則女人星見漢武故事曰張寬字叔文蜀郡人武帝時為侍中武帝幸甘泉長平坂道中有蟲赤如肝頭目口齒悉具先驅馳還以報上使視之皆莫能識時東方朔在屬車中令往視焉朔曰此謂怪哉是必秦獄處也上使按圗果秦獄地上問朔何以知之朔曰夫積憂者得酒而解乃取蟲置酒中立消賜朔帛百匹後令屬車載酒漢書曰朔字曼倩平原厭次人武朔别傳曰朔南陽步廣里人帝列仙傳曰朔是楚人帝時上書説便宜拜郎中宣初棄官去共謂嵗星也竇攸舉孝亷為郎時世祖大會靈臺得鼠如豹文熒熒光澤世祖異之以問羣臣莫能知者攸對曰鼮鼠也帝問何以知攸曰見爾雅按祕書如攸言詔賜帛百匹顯宗時有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復後漢書補注曰復齊武王伯升孫北海王興之子復不能對薦賈逵己見博物多識帝召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀乃集此胡降之徵帝敇蘭臺給筆札使作神雀頌拜為郎與班固同校祕書應對左右孫權時永康有人入山遇一大龜即束之歸龜便言曰逰不量時為君所得人甚怪之載出欲上吳王夜泊越里纜船于大桑樹宵中樹呼龜曰勞乎元緒奚事爾耶龜曰我被拘縶方見烹􅌜雖盡南山之樵不能潰我樹曰諸葛元遜博識必至相苦令求如我之徒計從安出龜曰子眀無多辭禍將及爾樹寂而止既至權命煮之焚柴萬車龜語如故諸葛恪曰燃以老桑乃熟獻者仍説龜樹共語權即使伐樹煮龜立爛今烹龜猶多用桑薪諸葛恪己見諸葛恪為丹陽太守嘗出獵兩山之間有物如小兒伸手引人恪令持去故地即死參佐問之恪曰此事在白澤圗曰兩山之間有精如小兒名曰傒囊嵩髙山北有大穴晉時有人誤墮穴中見二人圍棊下有一杯白水與墮者飲之氣力十倍棊者曰汝欲停此否墮者曰不願停棊者曰從此西行有天井其中多蛟龍但投身入井自當出若飢取井中物食之墮者如言可半年乃出蜀中因至洛下問張華華曰此名仙館所飲者玉漿所食者龍穴石髓有人遺張華鮓者華見之謂客曰此龍肉鮓也以醋漬之當有五色光見試之果爾後問其主云于茅積下得白魚所作也晉武帝時吳郡臨平岸出一石鼓扣之無聲以問張華華云取蜀中桐材刻作魚形扣之則鳴矣于是如言聲聞數里晉武帝問摯虞三日曲水之義虞曰漢章帝時平原徐肇以三月初生三女至三日俱亡村人以為怪乃招携之水濵洗祓遂因水泛觴其義起此帝曰必如所談便非好事束晳進曰虞小生不足以知臣請言之昔周公成洛邑因流水以泛酒故逸詩曰羽觴隨波又秦昭王以三日置酒河曲見金人奉水心之劒曰令君制有西夏乃霸諸侯因此立為曲水二漢相沿皆為盛集帝大恱晉世有于嵩山下得竹簡一枚上有兩行科斗書衆莫能辨張司空以問束廣微束曰此漢明帝顯節陵中䇿文檢驗果然時人服其博識王隱晉書曰束晳字廣微陽平人賈謐請為著作宋孝武時青州人嘗發古冢有銘云青州世子東海女郎帝問學士鮑照徐爰蘇寶生並不能悉賈希鏡對曰此是司馬越女嫁茍晞兒檢訪果然南史曰賈希鏡平陽襄陵人祖弼之父匪之家傳譜學齊髙帝取希鏡為驃騎參軍希鏡三世傳學凡十八州士族譜合百帙七百餘卷該究精悉皆如貫珠陸常侍陸澄已見少好學博覽無所不知行坐眠食手不釋卷王僕射常自以博聞多識讀書過澄王儉已見以齊春秋曰儉四部書盈溢几閣自劉歆七略以來應更區别乃著七志上之時人以比相如封禪書澄曰僕少來無事唯以讀書為業且年已倍令君令君少便鞅掌王事雖復一覽便諳然見卷軸未必多僕儉集學士何憲等盛自商略澄俟儉語畢然後談所遺漏數百十條皆儉所未覩儉乃歎服南史曰何憲字子思廬江灊人博涉該通羣集畢覽天閣祕寶人間散逸無遺漏焉王僕射在中書省出巾箱杌案雜物服飾令學士𨽻事事多者與之人人各得一兩物陸常侍後來更出諸人所不知事復各數條并奪物將去竟陵王蕭子良已見常得古器小口方腹而底平可將七八升以問陸常侍澄陸曰此名服匿單于以與蘇武子良後詳視器底有字髣佛可識如澄所言王摛少以博學知名王僕射嘗使賔客𨽻事多者賞之齊春秋曰儉集文學之士總校虛實𨽻之謂之𨽻事𨽻事自此始也探索皆窮唯廬江何憲為勝乃賞以五色簟白團扇憲坐簟執扇意氣甚得摛後至僕射以所𨽻示摛語之曰卿能奪之不摛操筆便成事既奧僻辭亦華美舉坐擊賞僕射命左右抽憲簟摛手自掣取扇登車而去僕射笑曰所謂大力者負之而趨南史曰王摛東海郯人晉少傅雅之後以博學見知為秣陵令清直請謁不行永眀時天中忽有黃色照地衆莫能解司徒法曹上金天頌王摛曰是非金天所謂榮光武帝大恱崔慰祖好學聚書至萬卷與平原劉孝標皆以碩學被徵國子祭酒沈約吏部郎謝朓嘗于吏部省中賔友俱集各問慰祖地理中所不悉十餘事慰祖口喫無華辭而酬據精悉一座稱服之朓歎曰假使班馬復生無以過此南史曰崔慰祖字恱祖清河東武城人解褐奉朝請聚書萬卷鄰里年少來從假借日數十􅐆慰祖手自取與未嘗為辭劉士深嘗在任昉坐有人餉昉楉酒昉次及問劉曰酒有千日醉當是虛言劉曰桂陽程鄉有千里酒飲之至家而醉亦其例也昉大驚曰吾自當遺忘實不憶此劉曰出楊元鳯所撰置郡事元鳳是魏代人此書仍載其賦云三重五品商溪摖里時即檢楊記言皆不差南史曰劉杳字士深平原人父懷慰北中郎司馬杳博綜羣書沈約任昉以下每有遺忘皆訪問焉斛律士亮徴博涉羣書兼解音律初樂有錞于者近代絶無此器或有自蜀中得之皆莫之識士亮見之曰此錞于也衆弗之信士亮遂依于寶周禮注以芒筒捋之其聲極振衆乃歎服上官儀詩語中用影娥池唐詩紀事曰儀字遊韶陕州人工詩其詞綺錯婉媚時人效之曰上官體髙宗時為相麟德元年坐梁王忠事下獄死武后惡之也學士時無解其事者祭酒令狐德棻召張柬之等十餘人示之柬之對曰洞冥記漢武帝于望鶴臺西起俯月臺臺下穿影娥池每登臺眺月影入池中使宫人乘舟笑弄月影因名影娥池亦曰眺蟾臺時皆歎其博識劉昫唐書曰德棻宜州華原人博涉文史早知名大業末為藥城長太祖入關引直丞相府記室貞觀中官至國子祭酒張柬之字孟將襄陽人涉獵經史尤好三禮令狐德棻甚重之姚崇薦為宰相及誅張易之兄弟柬之首謀其事中宗即位以功擢拜天官尚書封漢陽郡王盧若虛多才博物辛怡諌為職方有獲異鼠者豹首虎臆大如拳怡諫謂之鼮鼠若虛曰非也此許慎所謂鼨鼠豹文而形小一坐驚服唐太宗立晉王為太子時有飛雉數集宫中帝問是何祥禇遂良曰昔秦文公時有侲子化為雉雌鳴陳倉雄鳴南陽侲子曰得雄者王得雌者霸文公遂雄諸侯始為寶雞祠漢光武得其雄起南陽有四海陛下本封秦故雄雌並見以告眀德帝恱曰人之立身不可無學遂良所謂多識君子哉唐文宗一日問宰臣古詩云輕衫襯跳脫跳脫是何物宰臣未對上曰即今之腕釧也真誥言安妃有斫粟金跳脫是臂飾韓定辭為鎮州王鎔書記聘燕帥劉仁恭舍于賔館命幕客馬彧延接馬有詩贈韓云遂林芳草綿綿思盡日相携陟麗譙别後巏嶅山上望羡君時復見王喬韓于座酬之曰崇霞臺上神仙客學辨癡龍藝最多盛德好將銀筆述麗辭堪與雪兒歌座賔頗疑銀筆之僻他日彧答聘常山亦命定辭接于公館彧從容問韓以雪兒銀筆之事韓曰昔梁元帝為湘東王時好學著書常紀忠臣義士及文章之美者筆有三品或以金銀雕飾或用斑竹為管忠孝全者用金管書之德行清粹者用銀筆書之文章贍麗者以斑竹書之故湘東之譽振于江表雪兒者李密之愛姬能歌舞每見賔寮文章有竒麗入意者即付雪兒叶音律歌之又問癡龍何出定辭曰洛下有洞穴曽有人誤墮穴中因行數里漸見眀曠見有宫殿人物凡九處又見有大羊羊髯有珠人取而食之後其人得出以問張華華曰此地仙九館也大羊者名曰癡龍耳定辭復問彧巏嶅山當在何處彧曰此隨郡之故事何謙光而下問由是兩相恱服結交而去梁太祖幸河北至內黃顧問李珽曰何謂內黃珽曰河南有外黃下黃故此名內黃太祖曰外黃下黃何在珽曰秦有都尉理外黃其故墉在今雍丘下黃為髙齊所廢在今陳留太祖平生不愛儒者聞珽語大喜五代史記曰李珽河西燉煌人唐末為監察御史後趙匡凝鎮襄陽辟掌書記梁太祖破匡凝得珽喜曰此真書記也除考功貟外郎知制誥後為亂兵所殺太宗時一日後苑象斃上令取膽剖腹不獲上異之以問徐鉉鉉奏曰請于前左足求之須臾果得以進亟召鉉問對曰象膽隨四時在足今方二月故臣知在左足也朝士皆歎其博識江南徐鍇嘗奉命撰文與其兄鉉共論貓事鉉疏得二十事鍇曰未也適已憶七十餘事鉉曰楚金大能記明旦云夜來復得數事鉉撫掌稱美江南徐知諤嘗得畫牛一軸晝則嚙草欄外夜則歸卧欄中知諤獻後主煜煜持貢闕下太宗張後苑以示羣臣俱無知者湘山野録曰江南徐知諤為潤州節度使溫之少子也美姿度喜畜竒玩僧録贊寧曰南倭海水或減則灘磧微露倭人拾方諸蚌臘中有餘淚數滴得之和色著物則晝隱而夜顯沃焦山時或風撓飄擊急有石落海岸得之滴水摩色染物則晝顯而夜晦諸學士皆以為無稽寧曰見張騫海外異物記後杜鎬檢三館書目果見于六朝舊本書中載之六一居士詩話曰吳僧贊寧國初為僧録讀儒書博覽強記亦自能撰述而辭辨縱橫人莫能屈劉原甫博物多聞前世無及在長安日有得古鐵刃以獻製作極巧下為大環以纏龍為之而其首類鳥人莫能識原甫曰此赫連勃勃所鑄龍雀刀所謂大夏龍雀者也鳥首蓋雀云問之乃种世衡築青澗城掘地所得正夏故疆也酈道元水經注曰赫連氏以百鍊之鐵為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷逺可以柔逋如風靡草威服九區人有獲玉印遺原甫其文曰周惡夫印原甫曰漢條侯印尚存于今耶或疑而問之曰古亞惡二字通用史記盧綰之孫他人封亞俗侯而漢書作惡谷是矣聞者大服宋末襄樊之師日急當事諸人坐視而不救金履祥進牽制搗虛之策請以重兵由海道直趨燕薊則襄樊之師將不攻自解因備敘海舶所經凡州郡聚落下至巨洋别塢難易逺近歷歷可據宋不能用後朱瑄張清獻海運之利其所經海道視履祥先所上書咫尺無異人始服其精確金履祥已見豪爽第十五夫豪爽者略于檢節故其小德或多出入然與齪齪􅏽嗇縛窄家人細務狹小者殊矣漢章帝一日臨朝命文郎居左武郎居右時方儲正住在中曰臣文武兼備在所施用帝嘉其才以繁亂絲付儲使理儲拔刀三斷之對曰反經任勢臨事宜然謝承後漢書曰方儲字聖眀丹陽人仕至郎中幼喪父事母母死負土成墳種樹千株鸞鳥集其上白兔逰其下沔水南有層臺號曰景升臺劉表盛逰于此常所止憩表性好鷹嘗登此臺歌野鷹來曲其聲韻似孟達上堵吟酈道元水經注曰堵陽有白馬山山石似馬望之逼真側水謂之白馬塞孟達為守登之而歎曰劉封申耽據金城千里而更失之乎為上堵吟音韻哀切有惻人心今水次尚歌之王右軍王羲之已見為會稽內史謝公謝安已見就乞箋紙右軍檢校庫中有九萬悉以乞謝公桓宣武聞之曰逸少不節桓宣武與殷劉談不如甚喚左右取黃皮袴褶上馬舞矟數回或向殷或擬劉意氣始得雄桓南郡桓玄已見作詩或時思不來輒作鼓吹既而思得云鳴鵠響長阜歎曰鼓吹固自來人思劉毅家在京口貧約過常嘗與州里士人往東堂共射晉書曰劉毅字希樂彭城沛人曽祖距廣陵相叔父鎮左光祿大夫毅少有大志不修家人産業桓𢎞以為中兵參軍桓玄篡位毅與劉裕何無忌魏詠之密謀討玄後宋太祖以其二于已討誅之時庾仲豫為司徒長史暫至京要府中僚佐共出東堂毅已先至遣與庾相聞曰身久躓頓營一逰集甚難君如意人無處不可為適豈能以此堂見讓庾素豪徑前不答毅語諸人並避之唯毅留射如故庾厨饌甚盛不以及毅毅既不去庾甚不歡俄頃毅又相聞曰身今年未得子鵝豈能以殘炙見惠不庾又不答後竟為毅所毁沈約宋書曰庾恱字仲豫潁川鄢陵人曽祖亮晉太尉祖義吳國內史父淮西中郎將恱少為琅琊王參軍司馬桓玄篡位徙中書侍郎髙祖定京邑武陵王遵承制以恱為寧逺將軍為劉毅挫辱疽發背而卒王太常性豪爽為吳郡太守彌不得意吳郭西臺寺多富沙門太常求須不稱意乃遣主簿顧曠率門義劫寺內沙門竺法瑶得數百萬沈約宋書曰王僧達琅琊人少好學善屬文為始興王參軍稍遷太常卿至中書令以屢犯上顔于獄中賜死齊髙祖于華林宴命諸臣各效伎王敬則脫朝服袒裸以絳紏髻奮臂拍張呌動左右上不恱曰豈聞三公如此敬則答曰臣以拍張故得三公不可忘拍張時以為名答羊髙昌初赴衡州于兩艖䒀起三間通梁水齋飾以珠玉加之錦繢盛設帷屏陳列女樂乘潮解纜臨波置酒緣塘傍水觀者填咽南史曰羊侃字祖欣太山梁父人父祉仕魏侃少而瓌偉身長七尺八寸雅好文史父使侃南歸大通中封髙昌侯孫德璉南史曰孫㻛字德璉吳郡吳人頻立武功居家富侈家庭穿築極林泉之致歌童舞女當世罕儔賔客填門軒蓋不絶出鎮郢州乃合十餘船為大舫于中立亭池植荷芰良辰美景賔僚並集泛長江而置酒一時稱為勝賞南史曰孫雖武臣常于山齋設講肄業玄儒之士冬夏資奉而處身率易不以名位驕物甚為當世所稱李白登華山落雁峯曰此處最髙呼吸之氣想通帝座恨不携謝朓驚人詩來搔首問青天爾將軍裴旻李肇國史補曰裴旻為龍華軍使出守北平嘗請吳道玄畫天宫寺壁道玄曰聞將軍善舞劒願作氣以助揮毫旻欣然為舞一曲道玄看畢奮筆立成若有神助朱景玄唐朝名畫録曰吳道玄字道子東京陽翟人少孤貧天授之性年未弱冠窮丹青之妙浪迹東洛明皇知其名召入內供奉李翰文雖宏暢而思甚苦澀劉昫唐書曰翰即李華宗人以進士知名天寶中寓居陽翟晚居陽翟常從邑令皇甫曽求音樂思涸則奏樂神逸則綴文唐詩紀事曰皇甫曽字孝常為殿中侍御史天寶中兄弟進士名相上下時比張氏景陽孟陽云于頔鎮襄陽劉昫唐書曰于頔字允元河南人貞元中為襄州刺史非法聚斂恣意虐殺専以陵上威下為務卒諡厲廬山符載齎書就于乞買山錢百萬于即時與之唐詩紀事曰符載字厚之蜀人有竒才始與楊衡宋濟習業青城山衡擢第濟老死無成唯載以王霸自許恥于常調韋臯鎮蜀辟為支使裴寬罷郡西歸見一士坐樹下甚貧與語竒之舉一船金帛盡與之此人不辭登舟奴婢偃蹇者輒鞭之乃張徐州也段文昌已見負才傲俗落拓荆楚間嘗半酣靸履于江陵大街上往來雨下泥甚街側有大宅門枕流渠文昌乘醉于渠上脫履濯足旁若無人自言我作江陵節度當買此宅住聞者皆笑後果鎮荆南遂買此宅劉叉聞韓昌黎接天下士徒步謁之後以爭語不能下賔客因持愈金數斤去曰此諛墓中人得耳不若與劉君為夀唐詩紀事曰劉叉節士也放肆為俠因酒殺人亡命會赦出更折節讀書能為歌詩然恃故時所負不能俯仰貴人嘗謁韓昌黎作冰柱雪車二詩出盧同孟郊之右樊宗師見而獨拜後歸齊魯不知所終鄭仁表豪爽有文以門閥文章自髙嘗曰天瑞有五色雲人瑞有鄭仁表唐詩紀事曰鄭仁表傲縱多所陵藉人畏薄之仕為起居郎劉鄴少時投文于仁表父洎仁表嗤鄙之鄴為相仁表貶死王智興為徐州節度一日諸從事會飲賦詩智興至從事即屏去翰墨智興言適間作詩何獨見某而罷復以箋陳席上小吏亦置箋于智興前智興引毫立成曰三十年前老健兒剛被郎官遣作詩江南花栁從君詠塞北煙塵我獨知四座驚歎監軍謂張祐曰觀兹盛事豈得無言祐乃獻詩曰十年受命鎮方隅孝節忠規兩有餘誰信將壇嘉政外李陵章句右軍書左右言書生諂辭耳智興叱曰有人道我惡汝輩又肯否張生海內名士篇什豈易得天下人聞且以為王智興樂善矣劉昫唐書曰王智興字匡諫溫縣人少驍鋭事徐州刺史李洧洧以徐州歸國智興纍官徐州刺史武寧節度使崔𢎞禮嘗過宣武從劉玄佐獵劉酒酣顧語曰崔生獨不知有此樂𢎞禮笑曰我固喜武請為公歡𢎞禮臂鷹與玄佐馳逐急緩在手一軍盡驚曰安得此竒客寇萊公有飲量每飲賔席嘗闔扉輟驂以留之未嘗點油雖溷軒馬廏必用蠟炬胡宿在郡日丁晉公為逰客見之胡待之甚厚丁因投詩索米明日胡延晉公所用樽皿悉屏但陶瓦而已丁失望以為厭已遂辭去胡即出銀一篋遺丁曰家素貧惟此飲器願以贐行丁始諭設陶器之因其後晉公極力推挽胡遂至顯位滕達道布衣時嘗為范文正客時范尹京滕少年頗不羈往往潛出狹邪縱飲范公病之一日至滕書室中因眀燭觀書以俟其至意將愧之滕夜分大醉而歸范公陽不視以觀其所為滕略無懾懼長揖問曰公所讀何書公曰漢書復問漢髙祖何如人公逡巡而入東都事略曰膝元發字達道東陽人范仲淹見而竒之神宗朝拜翰林學士性疏達在上前論事如家人父子言無文飾洞見肝膈神宗知其誠藎後力言新法之害落職知筠州或以為且有後命元發曰天知吾直上知吾忠吾何憂哉上章自訟有曰樂羊無功謗書滿篋即墨何罪毁言日聞上覽之釋然改知揚州卒諡章敏韓魏公喜營造所臨之郡必有改作皆宏壯雄深稱其度量在大名于正寢後稍西為堂五楹其間洞然不為房屋號善養堂蓋平日宴息之地蘇子美豪放不羈好飲酒在外舅杜祁公家每夕讀書以一斗為率公深以為疑使子弟密覘之聞子美讀漢書張良傳至良與客狙擊秦皇帝誤中副車遽撫掌曰惜乎擊之不中遂滿引一大白又讀至良曰始臣起下邳與上會于留此天以授陛下又撫案曰君臣相遇其難如此復舉一大白公聞之大笑曰有如此下酒物一斗不足多也宋子京宋祁已見博學能文章天資醖藉好逰宴自喜晚年知成都府帶唐書于本任刋修每宴罷盥潄畢開寢門垂簾燃二椽燭媵婢夾侍和墨伸紙逺近皆知為尚書修唐書宋子京修唐書嘗一日大雪添㡩幕然椽燭一秉燭二左右熾炭兩巨罏諸姬環侍方磨墨濡毫以澄心堂紙草一傳未成顧諸姬曰汝輩俱曽在人家頗見主人如此否皆曰無有其間一人來自宗子家子京曰汝太尉遇此天氣亦復如何對曰只是擁罏命歌舞間以雜劇引滿大醉而已如何比得內翰子京點頭曰也自不惡乃閣筆掩卷起索酒飲之幾達晨明日對賔客自言其事後每宴集必舉以為笑洪覺範至儋耳嘗謁薑唐佐唐佐不在見其母母迎笑食以檳榔覺範問母識蘇公否母曰識之然無奈其好吟詩公嘗杖而來指西木榻自坐其上問曰秀才何往我言入村落未還有包燈心紙公以手展開書滿紙祝曰秀才歸當示之今尚在覺範索讀之醉墨欹傾曰張睢陽生猶罵賊嚼齒空齦顔平原死不忘君握拳透爪歌者𡊮綯嘗從東坡與客逰金山適中秋天宇四垂一碧無際加江流傾湧月色如晝遂共登金山妙髙臺命綯歌其水調歌頭曰月明幾時有把酒問青天歌罷公自起舞范德孺喜琵琶暮年苦夜不得睡家有琵琶筝二婢每就枕即便雜奏于前至熟寢乃得去宋史曰范純粹字德孺文正公第三子沉毅有幹略與蘇軾同建募役之議軾謂純粹講此事尤為精詳仕至户部侍郎出知延州以元祐黨人奪職蔡魯公守維揚維揚特多過客日夕盈府寺一日蚤膳召客設涼餅會者八人俄報客繼至公必留偶來者不已坐客私語蔡公卒迫留客若是他食輒咄嗟為尚可如涼餅者奈何便辦請共嘗之及食時計留客已四十又冷淘皆至仍精腆時共稱之張天覺為渝州南川宰時章子厚經制夔夷狎侮州縣吏無人敢與共語部使者念獨張可亢之檄至夔會子厚詢人才使者以張告即呼入同食張著道士服長揖就坐子厚肆意大言張隨機折之落落出其上子厚大喜延為上客歸薦諸王介甫遂得召用東都事略曰張商英字天覺蜀州新津人章惇薦其才召對除光祿寺丞紹聖中遷左司諫商英觀望時政謂蘇軾論合祭天地非是指吕大防范祖禹為姦以司馬光文彥博為負國至以宣仁后比吕武商英在元祜時作嘉禾頌以文彥博吕公著比周公又作文祭司馬極其稱美至是追論其罪其詭譎不常如此喜浮圗法自號無盡居士張紫巖張浚已見屯兵秀州嘗夜坐警備甚嚴忽有客至前出一紙懷中曰此苗傅劉正彥募賊公賞格也浚問欲何如客曰僕河北人粗讀書知逆順豈以身為賊用特見為備不嚴恐有後來者耳浚下執其手問姓名不告而去浚翊日斬死囚徇于衆曰此苖劉刺客也私識其狀貌物色之終不遇張于湖知京口王宣子代之時多景樓落成于湖為書樓扁公庫送銀二百星為潤筆于湖却之但需紅羅百匹于是大宴合樂酒酣于湖製詞命諸伎合唱甚歡因以紅羅百匹賞之書史會要曰張孝祥字安國號于湖厯陽烏江人讀書過目不忘下筆頃刻數千言紹聖中廷對第一官至顯謨殿直學士書極工大字亦佳揚萬里謂安國書甚真而放揚州有一趙氏富而好客家有明月樓一時諸名公題詠多未當其意後趙子昻過揚主人知之迎至樓上盛筵相欵所用皆銀器酒半出紙筆求作春題子昂援筆書曰春風閬苑三千客明月揚州第一樓主人得之甚喜撤酒器為贈語林卷二十一
