  - {type: page-break, offset: 0, content: '', id: KR3l0089_WYG_001-1a, image: WYG1041/WYG1041-0445c.png}
body:
  text: 語林卷一眀何良俊撰德行第一上夫孔門以四科裁士首列德行之目故曰我欲載之空言不如見之行事也嗚呼夫行胡可以為偽然事變遞陳雜然泛應士有百行焉能以一槩取哉狂狷殊途均能厲聖剛柔異稟善克則中百慮一致要本于德爾矣何良俊曰觀郭有道掃除旅舍庾異行跪而授條與阮長之誤著屐自列事豈必皎皎偉絶殊行哉顧人以為易多忽之耳夫掇煤易簀亦何關于大德而孔門以為美談察微知著聖人所貴茍有心于著則雖讓千乘之國又何多焉故余所列都不遺于細小閔仲叔含菽飲水世稱節士老病家貧不能得肉日買豬肝一片屠者或不肯與安邑令聞之勑吏常給焉仲叔怪問其故歎曰閔仲叔豈以口腹纍安邑耶遂去客沛謝承後漢書曰閔貢字仲叔太原人皇甫謐髙士傳蒜曰仲叔同郡周黨貞介之士見仲叔食無菜遺之生仲叔曰我欲省煩耳今更作煩耶受而不食漢制每臘詔賜諸博士羊羊有大小肥瘦博士祭酒議欲殺羊稱分其肉時甄宇為博士獨不肯諸人又欲投鈎宇復恥之因先自取其最瘦者由是不復有爭後召會詔問瘦羊甄博士京師因以此號之東觀漢記曰甄宇北海人建武中為州從事徴拜博士杜林范曅後漢書曰杜林字伯山扶風茂陵人父鄴成哀間涼州刺史林少好學家既多書又外氏張竦父子喜文采林從竦受學博洽多聞時號通儒與馬伏波鄉里親厚後漢書曰馬援字文淵扶風茂陵人建武中拜伏波將軍伏波南方還時杜馬適死伏波令子持一匹馬遺杜曰朋友有車馬之饋可且以備乏杜受之後數月遣子奉書曰將軍內施九族外存賔客望恩者多林父子兩人食列卿祿常有盈今送錢五萬伏波受之謂子弟曰人當以此為法杜林弟成物故隗囂聽林持喪歸葬尋悔追令刺客楊賢于隴阺遮殺之賢見林身持鹿車載致弟喪乃歎曰當今之時誰能行義雖小人何忍殺義士遂亡去趙孝父普王莽時為田禾將軍任孝為郎每告歸常白衣步擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客掃灑待之孝既至不白名長不肯內因問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣于是遂去范曅後漢書曰趙孝字長平沛國蘄人州郡辟召進退必以禮顯宗聞其行詔拜諫議大夫遷衛尉弟禮為御史中丞禮恭謙行已類于孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府大官送供具令相對盡歡劉文饒嘗乘牛車出行有人失牛就文饒車中認之文饒無所言下駕步歸有頃認者得牛而送還叩頭謝曰慙負長者隨所刑罪文饒曰物有相類事容脫誤幸勞見歸何為謝之州里服其不校謝承後漢書曰劉寬字文饒𢎞農華隂人少學歐陽尚書京氏易尤明韓詩外傳星官風角算歷皆究極師法稱為通儒未嘗與人爭勢利之事也朱文季與張堪同縣張于太學中見文季甚重之接以友道把文季臂語曰欲以妻子托朱生文季以張先達舉手不敢對自後不復相見張亡後文季聞其妻子貧困自往候視厚賑贍之文季子頡怪問曰大人不與堪為友何忽如此文季曰堪嘗有知己之言吾以信於心也范曅後漢書曰朱暉字文季南陽宛人家世衣冠暉早孤有氣決朱文季與同郡陳揖交善揖早卒有遺腹子友文季嘗哀之後司徒桓虞為南陽太守召文季子駢為吏文季辭駢而薦友一時稱其義烈髙文通居鄉時鄰里有爭財持兵而鬬文通往解之不已乃脫巾叩頭請曰仁義遜讓奈何棄之爭者投兵謝罪嵇康髙士傳曰髙鳯字文通南陽葉人少為書生家以農畝為業鳯専精誦習妻常之田曝麥于庭令鳯護雞時天暴雨鳯持竿誦經不覺潦水流麥妻還怪問乃省其後遂為名儒梁伯鸞梁鴻別見少孤常獨止不與人同食比舍先炊已呼伯鸞及熱釡炊伯鸞曰童子鴻不因人熱者也滅竈更燃之第五子陵洛陽無主人鄉里無田宅寄止靈臺中或十日不炊趙岐三輔決録曰第五頡字子陵倫少子以清正為郡功曺至州從事公府辟居髙第稱病免項仲山飲馬渭水每投三錢三輔決録曰項仲山安陵人公沙穆嘗養豬有病使人賣之于市云當告買者言病賤取其直不可言無病欺人取貴價也賣豬人到市即售亦不言病其直過價穆怪問其故齎半直追以還買豬人語以豬實有病欲賤賣不圗賣者相欺乃取貴直買者言賣買定約亦復辭錢不取穆終不受錢而去范曅後漢書曰公沙穆字文又北海膠東人習韓詩公羊春秋尤鋭思推步之術居建成山舉孝亷以髙第為主事遷遼東屬國都尉陳重在郎署時有同舍郎歸寧誤持鄰舍郎褲以去主疑重所取重不自申説默市褲償之後寧喪者歸以褲還主其事乃顯范曅獨行傳曰陳重字景公豫章宜春人少與雷義為友太守舉重孝亷重以讓義前後十餘通記義後舉孝亷重與俱在郎署有同署郎負息錢數十萬責主日至重乃密以錢代還郎知厚辭謝之重曰非我之為將有同姓名者終不言惠漢時大雪積地丈餘洛陽令身出按行見民家皆除雪出至𡊮安門獨無有路謂安已死令人除雪入戶看之見安僵卧問何以不出安曰大雪人皆餓不宜干人范曅後漢書曰𡊮安字邵公汝南汝陽人祖良習孟氏易建武初官成武令安仕至司徒𡊮安為司徒每朝會憂念王室未嘗不流涕司馬少賔安貧好學隱居教授信誠行乎州里鄉人有所計爭輒令祝少賔不直者終不敢有言謝承後漢書曰司馬均字少賔東萊人范巨卿范式別見為荆州刺史友人孔仲山家貧奉親變姓名傭為新野縣阿里街卒范曅後漢書曰孔嵩字仲山南陽新野人為阿里街卒正身厲行街中子弟皆服其訓辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責讓曰孔仲山善士豈宜侵盜送馬謝之巨卿行部到新野縣選仲山為導騎迎巨卿巨卿見仲山把臂謂曰子非孔仲山耶吾昔與子俱曵長裾逰息太學吾蒙國恩致位牧伯而子懷道隱身處于卒伍不亦惜乎仲山曰侯嬴長守于賤業晨門肆志于抱關子欲居九夷不患其陋貧者士之宜豈為鄙哉巨卿勑縣代仲山仲山以先傭未竟不肯去范史雲邅黨錮推鹿車載妻子以捃拾自資兒嘗拾得五斛麥鄰人尹臺遺之一斛囑兒不得通史雲後知即令併送六斛還尹言麥已雜誓不肯受范曅後漢書曰范丹字史雲陳留外黃人從樊英馬融受經好違時絶俗為詭激之行常慕梁伯鸞閔仲叔之為人范史雲與同郡尹苞同志友善謝承後漢書曰尹苞字延博陳留人二人居貧出入共一單衣到人門外尹年長常先著衣入須臾出解與史雲范史雲所止單陋有時絶糧窮居自若言貌無改時人為之語曰甑中生塵范史雲釡中生魚范萊蕪東觀漢記曰史雲桓帝時除萊蕪長以母喪不到官後辟太尉府議者意欲以為侍御史因遁身逃命于梁沛之間徒行敝服賣卜于市何進范曅後漢書曰何進字遂髙南陽宛人靈帝何后異母兄太后臨朝與太傅𡊮隗輔政謀誅宦官為中常侍張讓等所殺嘗辟鄭康成州郡以進權戚不敢違意遂加迫脅康成勉強詣進進為設几杖禮待甚優康成不受朝服以幅巾見一宿逃去范曅後漢書曰鄭玄字康成北海髙密人八世祖崇哀帝時尚書僕射玄少為鄉嗇夫不樂為吏遂造太學師事京兆第五元通京氏易公羊春秋三統歷九章算術從東都張恭祖受周官禮記左氏春秋韓詩古文尚書以山東無足問者乃西入關因盧植得事馬融融素驕貴玄在門下三年不得見使髙業弟子傳受于玄玄日夜尋誦未嘗怠倦會融集諸生考論圗緯聞玄善算召見于樓上玄因質諸疑義問畢辭歸融謂門人曰鄭生今去吾道東矣鄭玄別傳曰玄年十一二隨母還家正臘會同列數十人皆美服盛飾語言間通玄獨漠然如不及母私督數之乃曰此非我志不在所願也黃叔度潔靜通理齊聖廣淵不矜名以詭時不抗行以矯俗論者或曰顔子復生乎漢代周斐汝南先賢傳曰黃憲字叔度汝南慎陽人家世貧賤父為牛醫世言黃叔度動則蹈規矩言則發德音郭林宗每行宿逆旅輒躬自灑掃及明去後人至見之曰此必郭有道昨宿處也徐孺子清妙髙峙超世絶俗海內先賢傳曰徐稚字孺子豫章南昌人家貧常自耕稼非其力不食恭儉義讓所居人服其德陳仲舉在郡不接賔客唯稚來特設一榻去則懸之嘗事江夏黃公太尉黃瓊先辭徴命後將出李固以書激厲之曰聞已度伊洛豈即事有漸將順王命乎君子謂伯夷隘栁下惠不恭傳曰不夷不惠可否之間蓋聖賢居身之所珍也誠欲枕山棲谷擬迹巢由斯則可矣若輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣嘗聞嶢嶢者易缺皎皎者易汙陽春之曲和者必寡盛名之下其實難副近魯陽樊君被徴朝廷設壇席猶待神眀雖無大異言行所守亦無所缺而毁謗布流應時折減豈非觀故德望深聲名太盛乎自頃徴聘之士其功業皆無可採俗論皆言處士純盜虛聲願先生𢎞此逺謨令衆人嘆服一雪此言耳後黃公亡殁孺子往會葬無資以自致齎磨鏡具自隨所在賃磨鏡取直然後得前鍾季明祖父至德著名季明髙風承世除林慮長不行人位不足天爵有餘范曅後漢書曰鍾皓字季明潁川長社人桓礹在揚州范曅後漢書曰桓礹字文林沛郡龍亢人父鸞議郎礹邅亂避地會稽移居從事屋豫人姓名未詳室中中庭橘樹一株遇實熟乃以竹籓樹四面風吹落兩實以繩繫著樹枝東觀漢記曰礹到吳刺史劉繇振給榖食衣服所乏悉不受後適會稽太守王朗餉給一無所留臨去屋中尺寸之物悉疏付主人許子將許劭別見少峻清節好人倫多所賞識徐孟玉為汝南太守署為功曺范曅後漢書曰徐璆字孟玉廣陵海西人獻帝遷都以廷尉徴道為袁術所劫授以上公之位璆嘆曰龔勝鮑宣獨何人哉守之以死術不敢逼術死璆得其傳國璽上之府中聞子將為吏莫不改操飾行同郡𡊮本初𡊮紹別見公族豪俠去濮陽令歸車從甚盛將入郡界謝遣賔客曰吾輿服豈可使許子將見遂以單車歸家鍾元常言顔子既歿能備九德不二其過唯荀令君為然魏志曰荀彧字文若潁川潁隂人父緄濟南相彧年少時南陽何顒見而異之曰王佐才也初事𡊮紹後歸太祖與語大恱曰吾子房也以為尚書令世稱荀令君德行周備其所規模以聖人為度荀彧别傳曰司馬宣王嘗稱書傳逺事吾耳目所從聞見逮百數十年賢才未有及荀令君者司馬德操盛德絶倫有人臨蠶求簇箔德操自棄其蠶而與之或言凡損已贍人謂彼急我緩今彼此正等何緣如此德操曰人未嘗求已求而不與將慙何有以財物令人慙者董正司馬徽別傳曰司馬徽字德操陽翟人時人呼為水鏡嘗有人妄認徽豬徽便推與之後數日亡豬者得豬以豬還徽叩頭自責徽又厚謝之管幼安在遼東鄰人有牛暴幼安田幼安為牽牛著涼處自與飲食過于牛主牛主得牛大慙若犯嚴刑魏志曰管寧字幼安北海朱虗人十六喪父中表愍其孤貧咸共贈賵悉辭不受稱財以送終長八尺美鬚眉與華歆邴原俱遊學異國並敬善陳仲弓天下亂聞公孫度令行海外與原及王烈至遼東度虛館候之管幼安所居屯落會井而汲男女錯雜至爭汲鬬鬩幼安多買器分置井傍汲以待之又不使知來者得而怪之問知是幼安乃各相悔責不復鬬訟邴根矩嘗行遼東魏志曰邴原字根矩北海朱虗人與管寧俱以操尚稱州府辟命皆不就避黃巾亂俱至遼東得遺錢拾以繫樹枝此錢既不見取而繫錢者多鄉民便從禱祀邴問其故答云謂之神樹邴惡其由己而成淫祀乃辨之里中遂斂其錢以為社供王叔治七嵗時喪母母以社日亡來嵗鄰里修社會叔治感念亡母哀甚初喪鄰里聞之為之罷社魏志曰王修字叔治北海營陵人孔融在北海召修為主簿後舉孝亷修以讓邴原融答教曰原之賢吾已知之昔髙陽氏有才子八人堯不能用舜實舉之原可謂不患無位之德以遺後賢不亦可乎修重辭融答曰掾清自潔已歷試諸難謀而鮮過惠訓不倦余嘉乃勳應乃懿德用升爾于王庭其可辭乎後郡中有反者修夜往奔融賊初發融謂左右曰能冒難來者唯王修耳言終而修至自是融每有難修雖休歸在家無不至融常賴以免華子魚魏志曰華歆字子魚平原髙唐人髙唐為齊名都衣冠無不遊行市里歆為吏休沐出府則歸家闔門議論持平終不毁傷人同郡陶邱洪自以眀見過歆時王芬謀廢靈帝呼歆洪共定計洪欲行歆止之曰夫廢立大事伊霍所難芬踈而不武此必無成而禍將及族芬果敗洪乃服華嶠譜敘曰歆淡于財欲前後寵賜諸公莫及然終不植産業陳羣歎曰若華公可謂通而不泰清而不介矣從會稽還都魏志曰曺公表徴歆孫權欲不遣歆謂權曰將軍交好曺公分義未固使僕得為將軍效心豈不有益今空留僕是養無用之物非良計也權乃遣歆賔客義故送者千人贈遺纍數百金子魚皆無所拒密各題識臨去悉聚諸物語衆人曰本無拒諸君之心而所受遂多念單車逺行將無以懷璧為罪願諸君為之計衆乃各留所贈咸服其德沐德信少以清介立名傳播異域魚豢魏略曰沐並字德信河間人𡊮紹時為吏有志介黃初中為成臯令校事劉肇過縣求索藁穀時蝗旱未辦肇人從入閣下詬呼罵吏並怒屣履提刀多從吏卒欲收肇肇覺奔逸具以狀聞有詔肇為牧司爪牙吏而並欲收縛無所忌憚自恃清名耶髠決減死放散十餘年吳使諸葛子瑜諸葛瑾别見朱義封吳志曰朱然字義封丹陽故鄣人仕吳為左大司馬圍樊城遣船兵于峴山東斫材牂牁兵人作食有先熟者呼後熟者云來共食後熟者答言不煩爾呼者曰汝欲作沐德信耶魏略曰並豫作終制戒其子曰告雲儀等夫禮者生民之始教百世之中庸也故力行則為君子不務者終為小人然非聖人莫能履其從容也是以富貴者有驕奢之過貧賤者譏于固陋于是養生送死茍竊非禮由斯觀之陽貨璵璠甚于暴骨桓魋石椁不如速朽此言儒學撥亂反正鳴鼓矯俗之大義未是窮理盡性陶冶變化之實論也若能原始要終以天地為一區萬物為芻狗􅔜覽玄通求形景之宗同禍福之素一生死之命吾有慕于道矣夫道之為物惟恍惟忽夀為欺魄夭為鳬沒身淪有無與神消息含恱隂陽甘夢太極奚以棺槨為牢衣裳為纒尸繫地下長幽桎梏豈不哀哉昔莊周闊達無所適莫又楊王孫裸體至夫末世緣生怨死之徒含珠鱗押玉牀象袵殺人以徇壙穴之內錮以紵絮藉以蜃炭千載僵燥託類神仙于是大教陵遲競于厚葬謂莊子為放蕩以王孫為戮尸豈復識古有衣薪之鬼而野有狐貍之胔哉吾以材質滓濁汙于清流今年過耳順奄忽無常茍得獲沒即以吾身襲于王孫矣上以贖市朝之逋罪下以親道化之靈祖顧爾幼昏未知臧否若將逐俗抑廢吾志為棄父之命誰或矜之使死而有知吾將尸視吕子義往省一友人嫌其設酒食懷乾糒而往主人盛為供饌子義出懷中乾糒求一杯冷水食之楊泉物理論曰吕子義當世清賢士也潘元茂值年荒時部曲渠帥皆服元茂重名相率贈送道路為儲以供行資元茂隨同旅多少口率均分無有尊卑優劣若所賦已盡則推己之分以周未遍父老皆為之語曰且貴且富有南山之夀吾仍得與潘元茂又曰恩不可忘無如我潘郎文章志曰潘朂字元茂陳留中牟人少有逸才獻帝時為尚書郎遷東海相未發拜尚書左丞病卒張子臺在魏以簡質聞典略曰張閣字子臺東都人官至太僕杜恕著家戒嘗稱之曰張子臺視之似鄙朴人然其心中不知天地間何者為美何者為好敦然似如與隂陽合德作人如此自可不富貴然患禍當何從而來世有髙亮如子臺者皆多力慕體之不如也魏志曰杜恕字務伯翊杜氏新書曰恕少與馮李豐俱為父任總角相善後豐砥礪名行以要世譽而恕誕節直意與豐殊趣豐竟馳名一時京師之士多為逰説當路者以豐名過其實而恕被褐懷玉由此為豐所不善恕亦任其自然不力行以合時豐顯仕朝廷恕猶居家眀帝擢拜散騎數月轉黃門侍郎董侍中蜀志曰董允字休昭南郡枝江人父和字幼宰掌軍中郎將允秉心公亮丞相亮欲任以宫省之事遷侍中允事為防制甚得匡救之理延熙中守尚書令為大將軍費禕副二華陽國志曰蜀人以諸葛亮蔣琬費禕及允為四相一號四英嘗與尚書令費禕别見典軍胡濟蜀志曰胡濟字偉度義陽人官丞相典軍主簿共期遊集嚴駕已辦郎中董恢詣侍中許修敬恢年少官微見侍中停出逡巡求去侍中不許曰本所以出者欲與同好遊談也今君已自屈方展闊積捨此之談就彼之宴非所謂也乃命解驂襄陽記曰董恢字休緒襄陽人以宣信中郎副費禕使吳孫權問禕曰楊儀魏延牧竪小人雖有鳴吠之益然既已任之勢不得輕若一朝無諸葛亮必為禍亂諸君不知防慮豈所謂貽厥孫謀乎禕愕然不能即答恢目禕曰可速言儀延之不協起于私忿無黥韓難御之心也今方掃除強賊混一區夏功以才成業由才廣若捨此不任防其後患是猶備風波而逆廢舟楫非長計也權大笑樂諸葛亮以為知言還未三日辟丞相府屬諸葛子瑜有容貌思度一時服其𢎞雅吳志曰諸葛瑾字子瑜琅琊陽都人避亂江東仕吳與魯肅並見賔待嘗使蜀與弟亮公會相見退無私面陸子璋好學篤義吳志曰陸瑁字子璋吳郡吳人丞相遜族弟官選部尚書與同郡徐原素不相識原臨死遺書託以孤弱瑁為起墳收養其子又從父績早亡一子一女皆數嵗瑁迎養至長乃别陳國陳融陳留濮陽逸沛郡蔣纂廣陵𡊮迪皆單貧有志就子璋遊處子璋割少分甘與同豐約駱公緒小時鄉里飢困遊客或多窘乏公緒為之飲食衰少其娣寡居仁愛有行見而哀之數問其故公緒曰士大夫糟粳不足我何心獨飽吳志曰駱統字公緒會稽烏傷人父俊官至陳相為𡊮術所害母改適為華歆小妻統時八嵗與親客還會稽母送之拜辭上車徑去不顧母涕泣于後御者曰夫人尚在統曰不欲增母思故不顧耳顧孝則留心下士愛好不倦吳志曰顧劭字孝則吳郡吳人父雍為丞相劭博覽書傳好樂人倫少與舅陸績齊名而陸遜張敦卜靜亞焉自州郡庶幾四方人士或言議而去或結厚而别風聲流聞逺近稱之嘗識張秉于民庶顧除豫章太守當之郡發在近路值秉疾病時送者百數顧起辭賔客曰張仲節有疾苦不能來别恨不見之暫還與别諸君幸少見待江表傳曰張秉字仲節陽羡人卓恕嘗從建康還會稽辭太傅諸葛恪恪問何當復來恕言某日當復至省覲至日恪欲為主人停不飲食以須恕至時賔客會者皆曰會稽建業相去千里道阻江湖風波難必豈得如期俄恕至一座盡驚會稽典録曰卓恕字公行上虞人為人篤性言不宿諾吳用薛綜為選曺尚書吳志曰薛綜字敬文沛郡竹邑人避地交州從劉熙學士燮既附孫權召為五官中郎除合浦太守日吳書曰權賜綜紫綬囊綜陳讓權曰太子年少涉道淺君當博之以文約之以禮茅土之封非君而誰時綜以名儒居師傅之位乃兼選舉甚為優重薛以讓顧子默曰談心精體密貫道達微才照人物德允衆望誠非愚臣所可越先吳志曰顧談字子默祖雍吳丞相父劭豫章太守談弱冠與諸葛恪等為太子四友後為全寄父子所構徙交州幽而發憤著新言二十篇陸機顧談别傳曰宣太子正位東宫天子方隆訓導之義妙簡俊彥講學左右四方之傑畢集太傅諸葛恪等雄竒蓋衆而談以清識絶倫獨見推重自太尉范慎謝景羊道之徒皆以秀稱其名悉在談下晉兵伐吳張巨先督沈瑩諸葛靚諸人逆之牛渚襄陽記曰張悌字巨先襄陽人少有名理孫休時統兵牛渚沈瑩曰晉治水軍于蜀久矣今傾國大舉浮江而下我上流諸軍無備名將皆死幼少當任恐邉江諸城盡莫能禦晉之水軍必至于此宜畜衆力待來一戰若勝之日江西自清今渡江逆戰勝不可保若或摧喪大事去矣悌曰吳之將亡賢愚所知非今日也吾恐蜀兵來至衆心必懼不可復整今渡江決勝其或敗喪同死社稷若其克勝則此敵奔走兵勢萬倍便當乘威逆之中道不憂不破若如子計恐行散盡坐待敵到君臣俱降無復一人死難不亦辱乎遂渡江戰吳軍大敗諸葛靚退走吳志曰諸葛靚字仲思魏諸葛誕之子誕據夀春反使靚求援于吳夀春破遂留吳不返過迎巨先巨先不肯去靚自往牽之曰天下存亡自有大數豈卿一人所知何故自取死辱巨先垂涕曰仲思今日是我死日也我作兒童時便為卿家丞相所拔常恐不得其死負名賢知顧今以身徇社稷復何遁耶莫牽曵之如是靚流涕放之去數百步見巨先為晉軍所殺城陽太守梁栁當之官梁是皇甫士安從姑子臧榮緒晉書曰皇甫謐字士安安定人年二十始受書得風痺疾猶手不釋卷舉孝亷不行又辟著作不應卒于家或勸士安餞之士安曰栁為布衣時過我吾送迎不出門食不過鹽菜貧者不以酒食為禮今作郡而送之是貴城陽太守而輕梁栁豈中古人之道是非吾心所安元晏春秋曰七年春余長七尺四寸矣未通史書與從姑子梁栁編荆執荻分陳相刺習兵共以為樂鬲令袁毅在政貪濁饋遺朝廷以營虛譽嘗遺山巨源絲百斤巨源不欲為異受之命懸之梁後毅事露案驗衆官吏至巨源于梁上得絲已數年塵埃封印如故虞預晉書曰山濤字巨源河內懷人父曜寃句令濤少有器量宿士猶不慢之年十七宗人謂宣帝曰濤當與景文共綱紀天下者也帝戲曰卿小族那得此快人好莊老與嵇康善為河內從事與石鑒共傳宿濤夜起踏鑒曰今何等時而眠也知太傅卧何意鑒曰宰相三日不朝與尺一令歸第君何慮焉濤曰咄石生無事馬蹄間也投傳而去果有曺爽事遂隱身不交世務纍遷吏部尚書王偉元少立操行不受致遺嘗有一門生為本縣所役告偉元求屬令王曰卿學不足以庇身吾德不足以蔭卿屬之何益乃步擔乾飯兒負鹽豉著草屩送所役生到縣生徒隨從者千人令以偉元詣已整衣出迎偉元乃下道至土牛傍磬折立自言門生為縣所役故來送别因執手涕泣而去令即放遣此生一縣皆以為恥王隱晉書曰王褒字偉元城陽營陵人祖修有名魏世褒少立操尚以父儀為晉文王所害絶世不仕立屋墓側隱居以教授為務旦夕常至墓前朝拜悲號斷絶墓前一柏褒常所攀枝葉為之枯裴叔則至性寬厚與物無忤不持檢素每逰貴勢輒取其珍玩雖車馬器服宿昔之間便以施諸窮乏虞預晉書曰裴楷字叔則父徽魏冀州刺史楷眀悟有識量弱冠知名尤精老易與王戎齊名裴叔則營新宅甚麗當移住與兄共逰牀帳儼然軒櫺踈朗兄心甚欲之而口不言叔則心知其意便推使兄住庾異行嘗與弟子樹籬跪而授條或云今在隱屏先生何恭之過異行曰幽顯易操非君子意也衮不忍為王隱晉書曰庾衮字叔褒潁川人少邅大疫二兄俱亡次兄又疫厲氣方盛諸父兄弟皆出避衮獨不出諸父強之不可曰衮獨不畏病納漿粥扶持不捨晝夜衛洗馬衛玠别見常以人有不及可以情恕非意相干可以理遣故終身不見喜愠之色阮思曠嘗以人不須廣學正應以禮讓為先故終日靜默無所修綜而物自宗焉阮光祿别傳曰阮裕字思曠陳留尉氏人祖略齊國內史父顗汝南太守裕淹通有理識纍遷侍中以疾築室會稽剡山徴金紫光祿大夫不就阮宣子君貧清靜年四十餘未有室王處仲王敦别見諸人斂錢與婚皆一時名士時有慕之者求入錢而不得名士傳曰阮修字宣子陳留尉氏人好老易能言理傲然無營家無儋石之儲晏如也琅琊王處仲為鴻臚卿謂曰鴻臚丞差有祿卿常無食能作不修曰為復可耳遂為鴻臚丞陶士行每飲酒有限常歡有餘而限已竭陶氏敘曰侃字士行其先鄱陽人後徙尋陽侃少有逺槩綱維宇宙之志察孝亷入洛張華見而謂曰後來匡主寧民君其人也劉宏鎮沔南取為長史謂侃曰昔吾為羊太傅參佐見語云君後當居身處今相觀亦復然矣纍遷湘廣荆三州刺史贈大司馬諡桓公殷洪源殷浩别見勸更少進士行悽然曰年少時嘗有酒失慈母見約故不敢過前輩忌日唯不飲酒作伎王世將以忌日送客至新亭主人欲作音樂世將便起去持彈往衛洗馬墓下彈鳥王廙别傳曰王廙字世將祖覽父正廙髙朗豪率性倨傲不合己者面拒之故為物所疾加平南將軍薨陸祖言少有清操為吳興時晉書曰陸納字祖言吳郡吳人父玩官侍中司空納少有清操貞厲絶俗太原王術雅敬重之引為建威長史遷吏部郎出為吳興太守至姑孰辭桓公桓溫别傳曰桓溫字元子譙國龍亢人漢五更桓榮後也父彛有識鑒溫豪邁有風氣為溫嶠所知纍遷征西大將軍時鄴中未平餘燼假息溫親勒郡卒建旗致討清蕩伊洛展敬園陵薨諡宣武侯祖言因問桓曰公致醉可飲幾酒食肉多少桓曰年大來飲三升便醉白肉不過十臠卿復云何祖言曰素不能飲止可二升肉亦不足言後伺桓間日白云外有微禮方守逺郡欲與公一醉以展下情桓欣然納之時王坦之刁彛在坐見祖言所進唯酒一斗鹿肉一柈坐客愕然祖言徐曰眀公近云飲酒三升納止可二升今有一斗以備杯杓餘瀝桓公諸人並歡其率素敕中厨更設精饌酣飲極歡而罷謝太傅嘗造陸祖言祖言都無供辦兄子俶密為具餐太傅既至祖言所設唯茶果而已俄而俶遂陳盛饌珍羞畢具客去祖言大怒責數俶曰汝不能光益父叔乃復穢我素業耶杖之四十羊愔文字志曰謝安字安石奕弟也世有學行安𢎞粹通逺溫雅融暢桓彛見其四嵗時稱之善行書纍遷太保録尚書事何公何充别見為揚州日親戚有葬者乞數萬錢而帳下無有揚州舊有􅑿米以賑貧寡乃有千餘萬斛虞存為治中見何公道帳下空索求糶此米付帳下何公曰次道義不共孤寡爭粒郭文舉父母服終遍逰名山歷華隂之崖以觀石室之石函步擔入吳興餘杭山窮谷中倚木于樹苫覆而居都無壁障餘杭令顧揚與葛洪共造之携與俱歸揚以文舉山行或須皮衣贈以韋袴褶一具文舉不納辭歸山中揚追遣使者置衣室中而去文舉初無言韋衣乃至爛于户內竟不服用王隱晉書曰郭文字文舉入餘杭山蘇峻未亂之前徙臨安山中臨安令萬寵迎著縣中養病及峻破餘杭臨安如故人始異之自後不復語但舉手以宣其意病甚寵問先生可復得幾日文三舉其手果以十五日終庾元規姿容雋朗好談老莊風格峻整動由禮則閨門之內不肅而成時人以為夏侯太初陳長文之倫夏侯玄陳羣已見晉陽秋曰庾亮字元規潁川鄢陵人明穆皇然后長兄也淵雅有德量侍從父琛避地會稽端拱嶷郡人嚴憚之覲接之者數人而已謝石奴請吳隱之為衛將軍主簿晉書曰謝石字石奴丞相安之弟假節大都督與兄子玄琰破苻堅隱之將嫁女謝知其貧潔遣女必當率薄乃令移厨帳助其經營使者至方見一婢牽犬賣之此外蕭然無辦鄭緝孝子傳曰吳隱之字處默少有孝行邅母喪哀毁過禮時與太常韓康伯鄰居康伯母殷浩之妹聰眀婦人也隱之每哭康伯母輒流涕悲不自勝終其喪如此謂康伯曰汝後若居銓衡當用此輩人後康伯為吏部尚書乃進用之劉子驥盛德素為當時所推百里外有孤嫗病將死語人曰唯有劉長史當埋我耳子驥親往候之值終為治棺殯鄧粲晉書曰劉驎之字子驥南陽安衆人性尚質素信義著于羣小凡厮伍之家婚娶葬送無不躬自造焉退居陽岐去道斥近人士往來必投其家驎之親自供給贈致一無所受汜育奕世儒業敦睦九族客居青州逮育七世人號其家兒無常父衣無常主晉中興書曰汜育字稚春北海廬人王恱之少厲清操為吏部郎時鄰省有會同者遺恱之餅一甌竟辭不受曰所費誠復小小然少來不欲當人之惠晉中興書曰王恱之字少眀祖獻之中書令父靖之司徒左長史恱之少厲清操亮直有風檢為吏部郎桓石秀風韻秀徹好言老莊常獨處一室簡于應接時人比之庾純晉書曰石秀幼有令名甚為簡文帝所重性放曠常弋釣林澤不以榮爵嬰心善騎射發則命中常從叔父沖獵登九井山徒旅甚盛觀者傾坐石秀未嘗屬目止嘯咏而已晉陽秋曰庾純字謀父博學有才藝為世儒宗桓南郡領平西將軍以羊敬元為主簿參預機要羊欲自踈時漏密事南郡覺其此意愈重之以為楚臺殿中郎語羊曰尚書政事之本殿中禮樂所出卿昔處股肱方此為輕也羊拜職少日稱病自免屏居里巷十年不出沈約宋書曰羊欣字敬元太山南城人少懷靜默秉操無競美姿容善言笑長于草𨽻戴仲若與兄勃並隱遁有髙名世居剡下又以桐廬地多名山復共逰之因留止居後勃疾患醫藥不給仲若謂勃曰顒隨兄得間非有心于默語兄今疾篤無可營療顒當干祿以自濟耳乃告時求海虞令事垂行而勃卒仲若便引退宋書曰戴顒字仲若譙郡銍人戴逵子也郭原平少稟至性住在會稽居宅下濕繞宅為溝以通淤水宅上種少竹春月夜有盜其筍者原平偶起見之盜者奔走墜溝原平自以不能廣施至使此人顛沛乃于所植竹處溝上立小橋令足通行又采筍置籬外鄰曲慙愧無復取者宋書曰郭原平字長泰會稽永興人父世通以孝稱原平幼稟至行養親必已力性間木工傭賃以給供養甄彬甚有行誼嘗以一束苧就長沙寺庫質錢後贖苧還于苧束中得金五兩以手巾裹之彬送還寺庫寺僧以半與甄甄拒不受曰五月披羊裘而負薪豈受遺金者耶李延夀南史曰甄彬中山人祖法崇江陵令彬有行業鄉黨稱善楊松介談藪曰彬為郫令辭太祖時同列五人上戒以亷慎至彬獨曰卿昔有還金之美故不復以此為戒王令眀兄鑒頗好聚斂廣營田業令眀意甚不同嘗謂鑒曰尊何用田為鑒曰無田何由得食令眀曰亦復何須得食南史曰王惠字令眀琅琊人祖劭車騎將軍父默左光祿大夫惠幼而夷簡為叔父司徒謐所知恬靜不妄交遊未嘗有雜事宋武帝聞其名以問其從兄誕誕曰惠後來秀令鄙宗之美也王僕射子恢之被召為祕書郎僕射為求奉朝請語恢之曰祕書有限故有競朝請無限故無競吾欲使汝處不競之地太祖嘉而許之宋書曰王敬宏琅琊臨沂人本名裕避髙祖諱故稱字曽祖廙晉驃騎將軍祖胡之司州刺史父茂之晉陵太守敬宏少有清尚起家本國左常侍歷官至僕射孔中丞在都其弟道存為江夏內史時東土旱儉都下米貴一斗將百錢道存慮中丞貧乏遣吏載五百米餉之中丞呼吏語曰我在彼三載去官之日不辦有路糧郎至彼未幾何緣得有此米可令載還吏白自古無有載米上水者都下米貴乞于此貨之中丞不聽吏載米還江夏宋書曰孔顗字思逺會稽山隂人祖琳之贈太常父邈揚州治中顗骨鯁有風力以是非為己任口吃好讀書舉秀才補主簿官至御史中丞江湛為吏部尚書不營財利餉饋盈門一無所受鮮兼衣餘食嘗為上所召遇浣衣稱疾經日衣成然後起南史曰江湛字徽深濟陽考城人父夷右僕射湛居喪以孝聞愛文義善彈棊鼓琴為彭城王主簿司空檀道濟為子求娶湛妹不許義康有命又不從時人重其立志所畜牛餓御人求草湛良久曰可與飲在選頗有刻核之譏而公平無私不受請謁論者稱焉沈道虔居五康山中以捃拾自資同捃者或爭穟道虔諫之不止悉以所得與之爭者愧謝後每事輒云勿令居士知朱百年家素貧薄母以冬月亡衣並無絮百年自此不衣綿帛嘗寒時就同縣孔思逺宿衣悉夾布飲酒醉眠思逺以卧具覆之百年初不知既覺引卧具去謂思逺曰綿定竒溫因流涕悲慟思逺亦為之感泣南史曰朱百年會稽山隂人祖凱之晉左衛將軍父濤揚州主簿百年少有髙情親亡服闋携妻孔氏入會稽南山伐􅠢採若為業以􅠢若置道頭輒為行人所取眀旦已復如此人稍怪之積久知是朱隱士所賣須者隨其多少留錢取􅠢若而去或寒雪􅠢若不售輒自榜船送妻還孔氏天晴迎之有時出山隂為妻買繒采三五尺好飲酒遇醉或失之頗言玄理為詩往往有髙勝之言與同縣孔顗友善顗亦嗜酒相得輒酣對盡歡劉凝之隱居荆州時適嵗儉衡陽王義季慮凝之飢死餉錢十萬凝之大喜持錢至市門見有飢色者悉分與之俄頃都盡酈道元水經注曰劉凝之字志安兄盛公髙尚不仕凝之慕老萊嚴子陵之為人立屋江湖非力不食妻梁州刺史郭全女亦能安貧元嘉中夫妻隱于衡山終焉不返矣南史曰凝之字隱安釋曇遷經與范蔚宗王曇首逰欵後蔚宗被誅門有十二喪交知無敢近者曇遷抽貨衣物悉營葬送宋孝武聞而歎賞語徐爰曰卿著宋書勿遺此士釋慧皎髙僧傳曰曇遷姓支本月支人寓居建康篤好玄儒遊心佛義善談莊老并注十地王僧虔為湘州及三吳並携共同逰江士清性至仁慈衣弊多蝨以綿裹置之食菜不食心以其有生意也齊春秋曰江泌字士清濟陽考城人有孝行同族有一人與泌同名世謂泌為孝泌以别之語林卷一
