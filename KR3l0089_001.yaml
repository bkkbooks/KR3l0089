body:
  text: 語林卷一眀何良俊撰徳行第一上夫孔門以四科裁士首列徳行之目故曰我欲載之空言不如見之行事也嗚呼夫行胡可以為偽然事變逓陳雜然泛應士有百行焉能以一槩取哉狂狷殊途均能厲聖剛柔異禀善克則中百慮一致要本扵徳爾矣何良俊曰觀郭有道掃除旅舎庾異行跪而授條與阮長之誤着屐自列事豈必皎皎偉絶殊行哉顧人以為易多忽之耳夫掇煤易簀亦何關扵大徳而孔門以為美談察㣲知著聖人所貴茍有心扵著則雖讓千乗之國又何多焉故余所列都不遺扵細小閔仲叔含菽飲水世稱節士老病家貧不能得肉日買猪肝一片屠者或不肯與安邑令聞之勑吏常給焉仲叔怪問其故歎曰閔仲叔豈以口腹累安邑耶遂去客沛謝承後漢書曰閔貢字仲叔太原人皇甫謐髙士𫝊蒜曰仲叔同郡周黨貞介之士見仲叔食無菜遺之生仲叔曰我欲省煩耳今更作煩耶受而不食漢制每臘詔賜諸博士羊羊有大小肥痩博士祭酒議欲殺羊稱分其肉時甄宇為博士獨不肯諸人又欲投鈎宇復恥之因先自取其最痩者由是不復有爭後召㑹詔問痩羊甄博士京師因以此號之東觀漢記曰甄宇北海人建武中為州從事徴拜博士杜林范曅後漢書曰杜林字伯山扶風茂陵人父鄴成哀間凉州刺史林少好學家既多書又外氏張竦父子喜文采林從竦受學博洽多聞時號通儒與馬伏波鄉里親厚後漢書曰馬援字文淵扶風茂陵人建武中拜伏波將軍伏波南方還時杜馬適死伏波令子持一疋馬遺杜曰朋友有車馬之饋可且以備乏杜受之後數月遣子奉書曰將軍内施九族外存賔客望恩者多林父子兩人食列卿禄常有盈今送錢五萬伏波受之謂子弟曰人當以此為法杜林弟成物故隗囂聽林持䘮歸葬尋悔追令刺客楊賢扵隴阺遮殺之賢見林身持鹿車載致弟䘮乃歎曰當今之時誰能行義雖小人何忍殺義士遂亡去趙孝父普王莽時為田禾將軍任孝為郎每告歸常白衣歩擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客掃灑待之孝既至不白名長不肯内因問曰聞田禾將軍子當從長安来何時至乎孝曰尋到矣扵是遂去范曅後漢書曰趙孝字長平沛國蘄人州郡辟召進退必以禮顯宗聞其行詔拜諫議大夫遷衛尉弟禮為御史中丞禮恭謙行已𩔖扵孝帝嘉其兄弟篤行欲寵異之詔禮十日一就衛尉府大官送供具令相對盡歡劉文饒嘗乗牛車出行有人失牛就文饒車中認之文饒無所言下駕步歸有頃認者得牛而送還叩頭謝曰慙負長者随所刑罪文饒曰物有相𩔖事容脫誤幸勞見歸何為謝之州里服其不校謝承後漢書曰劉寛字文饒𢎞農華隂人少學歐陽尚書京氏易尤明韓詩外傳星官風角筭歴皆究極師法稱為通儒未嘗與人爭勢利之事也朱文季與張堪同縣張扵太學中見文季甚重之接以友道把文季臂語曰欲以妻子托朱生文季以張先達舉手不敢對自後不復相見張亡後文季聞其妻子貧困自往候視厚賑贍之文季子頡怪問曰大人不與堪為友何忽如此文季曰堪嘗有知己之言吾以信於心也范曅後漢書曰朱暉字文季南陽宛人家世衣冠暉早孤有氣决朱文季與同郡陳揖交善揖早卒有遺腹子友文季嘗哀之後司徒桓虞為南陽太守召文季子駢為吏文季辭駢而薦友一時稱其義烈髙文通居鄉時隣里有爭財持兵而鬬文通往解之不已乃脫巾叩頭請曰仁義遜譲奈何棄之爭者投兵謝罪嵇康髙士𫝊曰髙鳯字文通南陽葉人少為書生家以農畝為業鳯専精誦習妻常之田曝麥扵庭令鳯䕶雞時天暴雨鳯持竿誦經不覺潦水流麥妻還怪問乃省其後遂為名儒梁伯鸞梁鴻別見少孤常獨止不與人同食比舍先炊已呼伯鸞及熱釡炊伯鸞曰童子鴻不因人熱者也滅竈更燃之第五子陵洛陽無主人鄉里無田宅寄止靈臺中或十日不炊趙岐三輔决録曰第五頡字子陵倫少子以清正為郡功曺至州從事公府辟居髙第稱病免項仲山飲馬渭水每投三錢三輔决録曰項仲山安陵人公沙穆嘗養猪有病使人賣之扵市云當告買者言病賤取其直不可言無病欺人取貴價也賣猪人到市即售亦不言病其直過價穆怪問其故齎半直追以還買猪人語以猪實有病欲賤賣不圗賣者相欺乃取貴直買者言賣買定約亦復辭錢不取穆終不受錢而去范曅後漢書曰公沙穆字文又北海膠東人習韓詩公羊春秋尤銳思推歩之術居建成山舉孝亷以髙第為主事遷遼東屬國都尉陳重在郎署時有同舍郎歸寜誤持隣舍郎絝以去主疑重所取重不自申說黙市絝償之後寜䘮者歸以絝還主其事乃顯范曅獨行𫝊曰陳重字景公豫章宜春人少與雷義為友太守舉重孝亷重以譲義前後十餘通記義後舉孝亷重與俱在郎署有同署郎負息錢數十萬責主日至重乃宻以錢代還郎知厚辭謝之重曰非我之為将有同姓名者終不言恵漢時大雪積地丈餘洛陽令身出按行見民家皆除雪出至𡊮安門獨無有路謂安已死令人除雪入戸看之見安僵卧問何以不出安曰大雪人皆餓不宜干人范曅後漢書曰𡊮安字邵公汝南汝陽人祖良習孟氏易建武初官成武令安仕至司徒𡊮安為司徒每朝㑹憂念王室未嘗不流涕司馬少賔安貧好學隠居教授信誠行乎州里鄉人有所計爭輙令祝少賔不直者終不敢有言謝承後漢書曰司馬均字少賔東萊人范巨卿范式別見為荆州刺史友人孔仲山家貧奉親變姓名傭為新野縣阿里街卒范曅後漢書曰孔嵩字仲山南陽新野人為阿里街卒正身厲行街中子弟皆服其訓辟公府之京師道宿下亭盜共竊其馬尋問知其嵩也乃相責讓曰孔仲山善士豈宜侵盜送馬謝之巨卿行部到新野縣選仲山為導騎迎巨卿巨卿見仲山把臂謂曰子非孔仲山耶吾昔與子俱曵長裾逰息太學吾蒙國恩致位牧伯而子懐道隱身處扵卒伍不亦惜乎仲山曰侯嬴長守扵賤業晨門肆志扵抱關子欲居九夷不患其陋貧者士之宜豈為鄙哉巨卿勑縣代仲山仲山以先傭未竟不肯去范史雲邅黨錮推鹿車載妻子以捃拾自資兒嘗拾得五斛麥隣人尹臺遺之一斛囑兒不得通史雲後知即令併送六斛還尹言麥已雜誓不肯受范曅後漢書曰范丹字史雲陳留外黄人從樊英馬融受經好違時絶俗為詭激之行常慕梁伯鸞閔仲叔之為人范史雲與同郡尹苞同志友善謝承後漢書曰尹苞字延博陳留人二人居貧出入共一單衣到人門外尹年長常先着衣入湏臾出解與史雲范史雲所止單陋有時絶糧窮居自若言貌無改時人為之語曰甑中生塵范史雲釡中生魚范莱蕪東觀漢記曰史雲桓帝時除莱蕪長以母䘮不到官後辟太尉府議者意欲以為侍御史因遁身逃命扵梁沛之間徒行敝服賣卜扵市何進范曅後漢書曰何進字遂髙南陽宛人靈帝何后異母兄太后臨朝與太傅𡊮隗輔政謀誅宦官為中常侍張譲等所殺嘗辟鄭康成州郡以進權戚不敢違意遂加迫脅康成勉強詣進進為設几杖禮待甚優康成不受朝服以幅巾見一宿逃去范曅後漢書曰鄭𤣥字康成北海髙宻人八世祖崇哀帝時尚書僕射𤣥少為鄉嗇夫不樂為吏遂造太學師事京兆第五元通京氏易公羊春秋三統歴九章筭術從東都張恭祖受周官禮記左氏春秋韓詩古文尚書以山東無足問者乃西入關因盧植得事馬融融素驕貴𤣥在門下三年不得見使髙業弟子傳受扵𤣥𤣥日夜尋誦未嘗怠倦㑹融集諸生考論圗緯聞𤣥善筭召見扵樓上𤣥因質諸疑義問畢辭歸融謂門人曰鄭生今去吾道東矣鄭𤣥別傳曰𤣥年十一二随母還家正臘㑹同列數十人皆美服盛飾語言閑通𤣥獨漠然如不及母私督數之乃曰此非我志不在所願也黄叔度潔静通理齊聖廣淵不矜名以詭時不抗行以矯俗論者或曰顔子復生乎漢代周斐汝南先賢傳曰黄憲字叔度汝南慎陽人家世貧賤父為牛醫世言黄叔度動則蹈規矩言則發徳音郭林宗每行宿逆旅輙躬自灑掃及明去後人至見之曰此必郭有道昨宿處也徐孺子清妙髙峙超世絶俗海内先賢𫝊曰徐穉字孺子豫章南昌人家貧常自耕稼非其力不食恭儉義讓所居人服其徳陳仲舉在郡不接賔客唯穉来特設一榻去則懸之嘗事江夏黄公太尉黄瓊先辭徴命後將出李固以書激厲之曰聞已度伊洛豈即事有漸將順王命乎君子謂伯夷隘栁下恵不恭𫝊曰不夷不恵可否之間盖聖賢居身之所珍也誠欲枕山棲谷擬跡巢由斯則可矣若輔政濟民今其時也自生民以来善政少而亂俗多必待堯舜之君此為志士終無時矣嘗聞嶢嶢者易缺皎皎者易汙陽春之曲和者必寡盛名之下其實難副近魯陽樊君被徴朝廷設壇席猶待神眀雖無大異言行所守亦無所缺而毁謗布流應時折減豈非觀故徳望深聲名太盛乎自頃徴聘之士其功業皆無可採俗論皆言䖏士純盜虚聲願先生𢎞此逺謨令衆人嘆服一雪此言耳後黄公亡殁孺子往㑹葬無資以自致齎磨鏡具自随所在賃磨鏡取直然後得前鍾季明祖父至徳著名季明髙風承世除林慮長不行人位不足天爵有餘范曅後漢書曰鍾皓字季明潁川長社人桓礹在揚州范曅後漢書曰桓礹字文林沛郡龍亢人父鸞議郎礹邅亂避地㑹稽移居從事屋豫人姓名未詳室中中庭橘樹一株遇實熟乃以竹籓樹四面風吹落兩實以繩繫著𣗳枝東觀漢記曰礹到吴刺史劉繇振給榖食衣服所乏悉不受後適㑹稽太守王朗餉給一無所留臨去屋中尺寸之物悉䟽付主人許子將許劭別見少峻清節好人倫多所賞識徐孟玉為汝南太守署為功曺范曅後漢書曰徐璆字孟玉廣陵海西人獻帝遷都以廷尉徴道為袁術所刼授以上公之位璆嘆曰龔勝鮑宣獨何人哉守之以死術不敢逼術死璆得其𫝊國璽上之府中聞子將為吏莫不改操飾行同郡𡊮本初𡊮紹別見公族豪俠去濮陽令歸車從甚盛將入郡界謝遣賔客曰吾輿服豈可使許子將見遂以單車歸家鍾元常言顔子既歿能備九徳不貳其過唯荀令君為然魏志曰荀彧字文若潁川潁隂人父緄濟南相彧年少時南陽何顒見而異之曰王佐才也初事𡊮紹後歸太祖與語大恱曰吾子房也以為尚書令世稱荀令君徳行周備其所規模以聖人為度荀彧别𫝊曰司馬宣王嘗稱書𫝊逺事吾耳目所從聞見逮百數十年賢才未有及荀令君者司馬徳操盛徳絶倫有人臨蠶求簇箔徳操自棄其蠶而與之或言凡損已贍人謂彼急我緩今彼此正等何縁如此徳操曰人未嘗求已求而不與將慙何有以財物令人慙者董正司馬徽別𫝊曰司馬徽字徳操陽翟人時人呼為水鏡嘗有人妄認徽猪徽便推與之後數日亡猪者得猪以猪還徽叩頭自責徽又厚謝之管㓜安在遼東隣人有牛暴㓜安田㓜安為牽牛着凉䖏自與飲食過扵牛主牛主得牛大慙若犯嚴刑魏志曰管寜字㓜安北海朱虗人十六䘮父中表愍其孤貧咸共贈賵悉辭不受稱財以送終長八尺美鬚眉與華歆邴原俱㳺學異國並敬善陳仲弓天下亂聞公孫度令行海外與原及王烈至遼東度虚館候之管㓜安所居屯落㑹井而汲男女錯雜至爭汲鬬䦧㓜安多買噐分置井傍汲以待之又不使知来者得而怪之問知是㓜安乃各相悔責不復鬬訟邴根矩嘗行遼東魏志曰邴原字根矩北海朱虗人與管寜俱以操尚稱州府辟命皆不就避黄巾亂俱至遼東得遺錢拾以繫樹枝此錢既不見取而繫錢者多鄉民便從禱祀邴問其故答云謂之神樹邴惡其由己而成淫祀乃辯之里中遂歛其錢以為社供王叔治七嵗時䘮母母以社日亡来嵗隣里脩社㑹叔治感念亡母哀甚初䘮隣里聞之為之罷社魏志曰王脩字叔治北海營陵人孔融在北海召脩為主簿後舉孝亷脩以譲邴原融答教曰原之賢吾已知之昔髙陽氏有才子八人堯不能用舜實舉之原可謂不患無位之徳以遺後賢不亦可乎脩重辭融答曰掾清自潔已歴試諸難謀而鮮過恵訓不倦余嘉乃勲應乃懿徳用升爾扵王庭其可辭乎後郡中有反者脩夜往奔融賊初發融謂左右曰能冒難来者唯王脩耳言終而脩至自是融每有難脩雖休歸在家無不至融常頼以免華子魚魏志曰華歆字子魚平原髙唐人髙唐為齊名都衣冠無不㳺行市里歆為吏休沐出府則歸家闔門議論持平終不毁傷人同郡陶邱洪自以眀見過歆時王芬謀廢靈帝呼歆洪共定計洪欲行歆止之曰夫廢立大事伊霍所難芬踈而不武此必無成而禍將及族芬果敗洪乃服華嶠譜叙曰歆淡扵財欲前後寵賜諸公莫及然終不植産業陳羣歎曰若華公可謂通而不泰清而不介矣從㑹稽還都魏志曰曺公表徴歆孫權欲不遣歆謂權曰將軍交好曺公分義未固使僕得為將軍効心豈不有益今空留僕是養無用之物非良計也權乃遣歆賔客義故送者千人贈遺累數百金子魚皆無所拒宻各題識臨去悉聚諸物語衆人曰本無拒諸君之心而所受遂多念單車逺行將無以懐璧為罪願諸君為之計衆乃各留所贈咸服其徳沐徳信少以清介立名𫝊播異域魚豢魏畧曰沐並字徳信河間人𡊮紹時為吏有志介黄初中為成臯令校事劉肇過縣求索藁穀時蝗旱未辦肇人從入閣下呴呼罵吏並怒躧履提刀多從吏卒欲收肇肇覺奔逸具以状聞有詔肇為牧司爪牙吏而並欲收縛無所忌憚自恃清名耶髠决減死放散十餘年吴使諸葛子瑜諸葛瑾别見朱義封吴志曰朱然字義封丹陽故鄣人仕吴為左大司馬圍樊城遣船兵扵峴山東斫材牂牁兵人作食有先熟者呼後熟者云来共食後熟者答言不煩爾呼者曰汝欲作沐徳信耶魏畧曰並豫作終制戒其子曰告雲儀等夫禮者生民之始教百世之中庸也故力行則為君子不務者終為小人然非聖人莫能履其從容也是以富貴者有驕奢之過貧賤者譏扵固陋扵是養生送死茍竊非禮由斯觀之陽貨璵璠甚扵暴骨桓魋石椁不如速朽此言儒學撥亂反正鳴鼔矯俗之大義未是窮理盡性陶冶變化之實論也若能原始要終以天地為一區萬物為芻狗􅔜覽𤣥通求形景之宗同禍福之素一生死之命吾有慕扵道矣夫道之為物惟恍惟忽夀為欺魄夭為鳬沒身淪有無與神消息含恱隂陽甘夢太極奚以棺槨為牢衣裳為纒屍繫地下長幽桎梏豈不哀哉昔荘周闊達無所適莫又楊王孫裸體至夫末世縁生怨死之徒含珠鱗押玉牀𧰼袵殺人以狥壙穴之内錮以紵絮藉以蜃炭千載僵燥託𩔖神仙扵是大教陵遲競扵厚葬謂荘子為放蕩以王孫為戮屍豈復識古有衣薪之鬼而野有狐貍之胔哉吾以材質滓濁汙扵清流今年過耳順奄忽無常茍得獲沒即以吾身襲扵王孫矣上以贖市朝之逋罪下以親道化之靈祖顧爾㓜昏未知臧否若將逐俗抑廢吾志為棄父之命誰或矜之使死而有知吾將屍視吕子義往省一友人嫌其設酒食懐乾糒而往主人盛為供饌子義出懐中乾糒求一杯冷水食之楊泉物理論曰吕子義當世清賢士也潘元茂值年荒時部曲渠帥皆服元茂重名相率贈送道路為儲以供行資元茂随同旅多少口率均分無有尊卑優劣若所賦已盡則推己之分以周未遍父老皆為之語曰且貴且富有南山之夀吾仍得與潘元茂又曰恩不可忘無如我潘郎文章志曰潘朂字元茂陳留中牟人少有逸才獻帝時為尚書郎遷東海相未發拜尚書左丞病卒張子臺在魏以簡質聞典畧曰張閣字子䑓東都人官至太僕杜恕著家戒嘗稱之曰張子䑓視之似鄙朴人然其心中不知天地間何者為美何者為好敦然似如與隂陽合徳作人如此自可不富貴然患禍當何從而来世有髙亮如子臺者皆多力慕體之不如也魏志曰杜恕字務伯翊杜氏新書曰恕少與馮李豐俱為父任總角相善後豐砥礪名行以要世譽而恕誕節直意與豐殊趣豐竟馳名一時京師之士多為逰說當路者以豐名過其實而恕被褐懐玉由此為豐所不善恕亦任其自然不力行以合時豐顯仕朝廷恕猶居家眀帝擢拜散騎數月轉黄門侍郎董侍中蜀志曰董允字休昭南郡枝江人父和字㓜宰掌軍中郎將允秉心公亮丞相亮欲任以宫省之事遷侍中允事為防制甚得匡救之理延熈中守尚書令為大將軍費禕副貳華陽國志曰蜀人以諸葛亮蔣琬費禕及允為四相一號四英嘗與尚書令費禕别見典軍胡濟蜀志曰胡濟字偉度義陽人官丞相典軍主簿共期遊集嚴駕已辦郎中董恢詣侍中許脩敬恢年少官㣲見侍中停出逡廵求去侍中不許曰本所以出者欲與同好㳺談也今君已自屈方展闊積捨此之談就彼之宴非所謂也乃命解驂襄陽記曰董恢字休緒襄陽人以宣信中郎副費禕使吴孫權問禕曰楊儀魏延牧竪小人雖有鳴吠之益然既已任之勢不得輕若一朝無諸葛亮必為禍亂諸君不知防慮豈所謂貽厥孫謀乎禕愕然不能即答恢目禕曰可速言儀延之不協起扵私忿無黥韓難御之心也今方掃除彊賊混一區夏功以才成業由才廣若捨此不任防其後患是猶備風波而逆廢舟楫非長計也權大笑樂諸葛亮以為知言還未三日辟丞相府屬諸葛子瑜有容貎思度一時服其𢎞雅吴志曰諸葛瑾字子瑜瑯琊陽都人避亂江東仕吴與魯肅並見賔待嘗使蜀與弟亮公㑹相見退無私面陸子璋好學篤義吴志曰陸瑁字子璋吴郡吴人丞相遜族弟官選部尚書與同郡徐原素不相識原臨死遺書託以孤弱瑁為起墳收養其子又從父績早亡一子一女皆數嵗瑁迎養至長乃别陳國陳融陳留濮陽逸沛郡蔣纂廣陵𡊮迪皆單貧有志就子璋㳺䖏子璋割少分甘與同豐約駱公緒小時鄉里饑困㳺客或多窘乏公緒為之飲食衰少其娣寡居仁愛有行見而哀之數問其故公緒曰士大夫糟糠不足我何心獨飽吴志曰駱統字公緒㑹稽烏傷人父俊官至陳相為𡊮術所害母改適為華歆小妻統時八嵗與親客還㑹稽母送之拜辭上車逕去不顧母涕泣扵後御者曰夫人尚在統曰不欲増母思故不顧耳顧孝則留心下士愛好不倦吴志曰顧劭字孝則吴郡吴人父雍為丞相劭博覽書𫝊好樂人倫少與舅陸績齊名而陸遜張敦卜靜亞焉自州郡庶幾四方人士或言議而去或結厚而别風聲流聞逺近稱之嘗識張秉扵民庶顧除豫章太守當之郡發在近路值秉疾病時送者百數顧起辭賔客曰張仲節有疾苦不能来别恨不見之暫還與别諸君幸少見待江表𫝊曰張秉字仲節陽羨人卓恕嘗從建康還㑹稽辭太傅諸葛恪恪問何當復来恕言某日當復至省覲至日恪欲為主人停不飲食以湏恕至時賔客㑹者皆曰㑹稽建業相去千里道阻江湖風波難必豈得如期俄恕至一座盡驚㑹稽典録曰卓恕字公行上虞人為人篤性言不宿諾吴用薛綜為選曺尚書吴志曰薛綜字敬文沛郡竹邑人避地交州從劉熈學士爕既附孫權召為五官中郎除合浦太守日吴書曰權賜綜紫綬嚢綜陳讓權曰太子年少渉道淺君當博之以文約之以禮茅土之封非君而誰時綜以名儒居師傅之位乃兼選舉甚為優重薛以讓顧子黙曰譚心精體宻貫道達㣲才照人物徳允衆望誠非愚臣所可越先吴志曰顧譚字子黙祖雍吴丞相父劭豫章太守譚弱冠與諸葛恪等為太子四友後為全寄父子所構徙交州幽而發憤著新言二十篇陸機顧譚别𫝊曰宣太子正位東宫天子方隆訓導之義妙簡俊彦講學左右四方之傑畢集太傅諸葛恪等雄竒葢衆而譚以清識絶倫獨見推重自太尉范慎謝景羊道之徒皆以秀稱其名悉在譚下晉兵伐吴張巨先督沈瑩諸葛靚諸人逆之牛渚襄陽記曰張悌字巨先襄陽人少有名理孫休時統兵牛渚沈瑩曰晉治水軍扵蜀久矣今傾國大舉浮江而下我上流諸軍無備名將皆死㓜少當任恐邉江諸城盡莫能禦晉之水軍必至于此宜畜衆力待来一戰若勝之日江西自清今渡江逆戰勝不可保若或摧䘮大事去矣悌曰吴之將亡賢愚所知非今日也吾恐蜀兵来至衆心必懼不可復整今渡江决勝其或敗喪同死社稷若其克勝則此敵奔走兵勢萬倍便當乗威逆之中道不憂不破若如子計恐行散盡坐待敵到君臣俱降無復一人死難不亦辱乎遂渡江戰吴軍大敗諸葛靚退走吴志曰諸葛靚字仲思魏諸葛誕之子誕據夀春反使靚求援扵吴夀春破遂留吴不返過迎巨先巨先不肯去靚自往牽之曰天下存亡自有大數豈卿一人所知何故自取死辱巨先垂涕曰仲思今日是我死日也我作兒童時便為卿家丞相所拔常恐不得其死負名賢知顧今以身狥社稷復何遁耶莫牽曵之如是靚流涕放之去數百歩見巨先為晉軍所殺城陽太守梁栁當之官梁是皇甫士安從姑子臧榮緒晉書曰皇甫謐字士安安定人年二十始受書得風痺疾猶手不釋卷舉孝亷不行又辟著作不應卒于家或勸士安餞之士安曰栁為布衣時過我吾送迎不出門食不過鹽菜貧者不以酒食為禮今作郡而送之是貴城陽太守而輕梁栁豈中古人之道是非吾心所安元晏春秋曰七年春余長七尺四寸矣未通史書與從姑子梁栁編荆執荻分陳相刺習兵共以為樂鬲令袁毅在政貪濁饋遺朝廷以營虚譽嘗遺山巨源絲百斤巨源不欲為異受之命懸之梁後毅事露案驗衆官吏至巨源扵梁上得絲已數年塵埃封印如故虞預晉書曰山濤字巨源河内懐人父曜寃句令濤少有器量宿士猶不慢之年十七宗人謂宣帝曰濤當與景文共綱紀天下者也帝戱曰卿小族那得此快人好荘老與嵇康善為河内從事與石鑒共𫝊宿濤夜起蹋鑒曰今何等時而眠也知太傅卧何意鑒曰宰相三日不朝與尺一令歸第君何慮焉濤曰咄石生無事馬蹄間也投𫝊而去果有曺爽事遂隠身不交世務累遷吏部尚書王偉元少立操行不受致遺嘗有一門生為本縣所役告偉元求屬令王曰卿學不足以庇身吾徳不足以䕃卿屬之何益乃歩擔乾飯兒負鹽豉着草屩送所役生到縣生徒隨從者千人令以偉元詣已整衣出迎偉元乃下道至土牛傍磬折立自言門生為縣所役故来送别因執手涕泣而去令即放遣此生一縣皆以為恥王隠晉書曰王褒字偉元城陽營陵人祖脩有名魏世褒少立操尚以父儀為晉文王所害絶世不仕立屋墓側隱居以教授為務旦夕常至墓前朝拜悲號斷絶墓前一柏褒常所攀枝葉為之枯裴叔則至性寛厚與物無忤不持檢素每逰貴勢輙取其珍玩雖車馬噐服宿昔之間便以施諸窮乏虞預晉書曰裴楷字叔則父徽魏冀州刺史楷眀悟有識量弱冠知名尤精老易與王戎齊名裴叔則營新宅甚麗當移住與兄共逰牀帳儼然軒櫺踈朗兄心甚欲之而口不言叔則心知其意便推使兄住庾異行嘗與弟子𣗳籬跪而授條或云今在隱屏先生何恭之過異行曰幽顯易操非君子意也衮不忍為王隱晉書曰庾衮字叔褒潁川人少邅大疫二兄俱亡次兄又疫厲氣方盛諸父兄弟皆出避衮獨不出諸父強之不可曰衮獨不畏病納漿粥扶持不捨晝夜衛洗馬衛玠别見常以人有不及可以情恕非意相干可以理遣故終身不見喜愠之色阮思曠嘗以人不湏廣學正應以禮讓為先故終日静黙無所修綜而物自宗焉阮光禄别傳曰阮裕字思曠陳留尉氏人祖畧齊國内史父顗汝南太守裕淹通有理識累遷侍中以疾築室㑹稽剡山徴金紫光禄大夫不就阮宣子君貧清静年四十餘未有室王處仲王敦别見諸人歛錢與婚皆一時名士時有慕之者求入錢而不得名士𫝊曰阮脩字宣子陳留尉氏人好老易䏻言理傲然無營家無儋石之儲晏如也瑯琊王䖏仲為鴻臚卿謂曰鴻臚丞差有禄卿常無食䏻作不脩曰為復可耳遂為鴻臚丞陶士行每飲酒有限常歡有餘而限已竭陶氏叙曰侃字士行其先鄱陽人後徙尋陽侃少有逺槩綱維宇宙之志察孝亷入洛張華見而謂曰後来匡主寜民君其人也劉宏鎮沔南取為長史謂侃曰昔吾為羊太傅參佐見語云君後當居身處今相觀亦復然矣累遷湘廣荆三州刺史贈大司馬謚桓公殷洪源殷浩别見勸更少進士行悽然曰年少時嘗有酒失慈母見約故不敢過前軰忌日唯不飲酒作伎王世將以忌日送客至新亭主人欲作音樂世將便起去持彈往衛洗馬墓下彈鳥王廙别𫝊曰王廙字世將祖覽父正廙髙朗豪率性倨傲不合己者面拒之故為物所疾加平南將軍薨陸祖言少有清操為吴興時晉書曰陸納字祖言吴郡吴人父玩官侍中司空納少有清操貞厲絶俗太原王術雅敬重之引為建威長史遷吏部郎出為吴興太守至姑孰辭桓公桓温别𫝊曰桓温字元子譙國龍亢人漢五更桓榮後也父彛有識鍳温豪邁有風氣為温嶠所知累遷征西大將軍時鄴中未平餘燼假息温親勒郡卒建旗致討清蕩伊洛展敬園陵薨謚宣武侯祖言因問桓曰公致醉可飲幾酒食肉多少桓曰年大来飲三升便醉白肉不過十臠卿復云何祖言曰素不能飲止可二升肉亦不足言後伺桓閑日白云外有㣲禮方守逺郡欲與公一醉以展下情桓欣然納之時王坦之刁彛在坐見祖言所進唯酒一斗鹿肉一柈坐客愕然祖言徐曰眀公近云飲酒三升納止可二升今有一斗以備杯杓餘瀝桓公諸人並歡其率素勅中厨更設精饌酣飲極歡而罷謝太傅嘗造陸祖言祖言都無供辦兄子俶宻為具餐太傅既至祖言所設唯茶果而已俄而俶遂陳盛饌珍羞畢具客去祖言大怒責數俶曰汝不能光益父叔乃復穢我素業耶杖之四十羊愔文字志曰謝安字安石奕弟也世有學行安𢎞粹通逺温雅融暢桓彛見其四嵗時稱之善行書累遷太保録尚書事何公何充别見為揚州日親戚有𦵏者乞數萬錢而帳下無有揚州舊有􅑿米以賑貧寡乃有千餘萬斛虞存為治中見何公道帳下空索求糶此米付帳下何公曰次道義不共孤寡争粒郭文舉父母服終遍逰名山歴華隂之崖以觀石室之石函歩擔入吴興餘杭山窮谷中倚木扵𣗳苫覆而居都無壁障餘杭令顧颺與葛洪共造之携與俱歸颺以文舉山行或湏皮衣贈以韋袴褶一具文舉不納辭歸山中颺追遣使者置衣室中而去文舉初無言韋衣乃至爛于户内竟不服用王隠晉書曰郭文字文舉入餘杭山蘓峻未亂之前徙臨安山中臨安令萬寵迎着縣中養病及峻破餘杭臨安如故人始異之自後不復語但舉手以宣其意病甚寵問先生可復得幾日文三舉其手果以十五日終庾元規姿容雋朗好談老荘風格峻整動由禮則閨門之内不肅而成時人以為夏侯太初陳長文之倫夏侯𤣥陳羣已見晉陽秋曰庾亮字元規潁川鄢陵人明穆皇然后長兄也淵雅有徳量侍從父琛避地㑹稽端拱嶷郡人嚴憚之覲接之者數人而已謝石奴請吴隱之為衛將軍主簿晉書曰謝石字石奴丞相安之弟假節大都督與兄子𤣥琰破苻堅隱之將嫁女謝知其貧潔遣女必當率薄乃令移厨帳助其經營使者至方見一婢牽犬賣之此外蕭然無辦鄭緝孝子𫝊曰吴隱之字䖏黙少有孝行邅母喪哀毁過禮時與太常韓康伯隣居康伯母殷浩之妹聰眀婦人也隱之每哭康伯母輒流涕悲不自勝終其䘮如此謂康伯曰汝後若居銓衡當用此輩人後康伯為吏部尚書乃進用之劉子驥盛徳素為當時所推百里外有孤嫗病將死語人曰唯有劉長史當埋我耳子驥親往候之值終為治棺殯鄧粲晉書曰劉驎之字子驥南陽安衆人性尚質素信義著扵羣小凡厮伍之家婚娶葬送無不躬自造焉退居陽岐去道斥近人士往来必投其家驎之親自供給贈致一無所受汜毓奕世儒業敦睦九族客居青州逮毓七世人號其家兒無常父衣無常主晉中興書曰汜毓字稚春北海廬人王恱之少厲清操為吏部郎時隣省有㑹同者遺恱之餅一甌竟辭不受曰所費誠復小小然少来不欲當人之恵晉中興書曰王恱之字少眀祖獻之中書令父靖之司徒左長史恱之少厲清操亮直有風檢為吏部郎桓石秀風韵秀澈好言老荘常獨䖏一室簡扵應接時人比之庾純晉書曰石秀㓜有令名甚為簡文帝所重性放曠常弋釣林澤不以榮爵嬰心善騎射發則命中常從叔父冲獵登九井山徒旅甚盛觀者傾坐石秀未嘗屬目止嘯咏而已晉陽秋曰庾純字謀父博學有才藝為世儒宗桓南郡領平西將軍以羊敬元為主簿參預機要羊欲自踈時漏宻事南郡覺其此意愈重之以為楚臺殿中郎語羊曰尚書政事之本殿中禮樂所出卿昔䖏股肱方此為輕也羊拜職少日稱病自免屏居里巷十年不出沈約宋書曰羊欣字敬元太山南城人少懐静黙秉操無競美姿容善言笑長扵草𨽻戴仲若與兄勃並隠遁有髙名世居剡下又以桐廬地多名山復共逰之因留止居後勃疾患醫藥不給仲若謂勃曰顒随兄得閑非有心扵黙語兄今疾篤無可營療顒當干禄以自濟耳乃告時求海虞令事垂行而勃卒仲若便引退宋書曰戴顒字仲若譙郡銍人戴逵子也郭原平少禀至性住在㑹稽居宅下濕遶宅為溝以通淤水宅上種少竹春月夜有盜其筍者原平偶起見之盜者奔走墜溝原平自以不能廣施至使此人顛沛乃扵所植竹䖏溝上立小橋令足通行又采筍置籬外隣曲慙愧無復取者宋書曰郭原平字長泰㑹稽永興人父世通以孝稱原平㓜禀至行養親必已力性閑木工傭賃以給供養甄彬甚有行誼嘗以一束苧就長沙寺庫質錢後贖苧還扵苧束中得金五兩以手巾裹之彬送還寺庫寺僧以半與甄甄拒不受曰五月披羊裘而負薪豈受遺金者耶李延夀南史曰甄彬中山人祖法崇江陵令彬有行業鄉黨稱善楊松介談藪曰彬為郫令辭太祖時同列五人上戒以亷慎至彬獨曰卿昔有還金之美故不復以此為戒王令眀兄鑒頗好聚歛廣營田業令眀意甚不同嘗謂鑒曰尊何用田為鑒曰無田何由得食令眀曰亦復何湏得食南史曰王恵字令眀瑯琊人祖劭車騎將軍父黙左光禄大夫恵㓜而夷簡為叔父司徒謐所知恬静不妄交游未嘗有雜事宋武帝聞其名以問其從兄誕誕曰恵後来秀令鄙宗之美也王僕射子恢之被召為秘書郎僕射為求奉朝請語恢之曰秘書有限故有競朝請無限故無競吾欲使汝䖏不競之地太祖嘉而許之宋書曰王敬宏瑯琊臨沂人本名裕避髙祖諱故稱字曽祖廙晉驃騎將軍祖胡之司州刺史父茂之晉陵太守敬宏少有清尚起家本國左常侍歴官至僕射孔中丞在都其弟道存為江夏内史時東土旱儉都下米貴一斗將百錢道存慮中丞貧乏遣吏載五百米餉之中丞呼吏語曰我在彼三載去官之日不辦有路糧郎至彼未幾何縁得有此米可令載還吏白自古無有載米上水者都下米貴乞扵此貨之中丞不聽吏載米還江夏宋書曰孔顗字思逺㑹稽山隂人祖琳之贈太常父邈揚州治中顗骨鯁有風力以是非為己任口吃好讀書舉秀才補主簿官至御史中丞江湛為吏部尚書不營財利餉饋盈門一無所受鮮兼衣餘食嘗為上所召遇澣衣稱疾經日衣成然後起南史曰江湛字徽深濟陽考城人父夷右僕射湛居䘮以孝聞愛文義善彈棊鼔琴為彭城王主簿司空檀道濟為子求娶湛妺不許義康有命又不從時人重其立志所畜牛餓御人求草湛良久曰可與飲在選頗有刻覈之譏而公平無私不受請謁論者稱焉沈道䖍居五康山中以捃拾自資同捃者或爭穟道䖍諫之不止悉以所得與之爭者愧謝後每事輒云勿令居士知朱百年家素貧薄母以冬月亡衣並無絮百年自此不衣綿帛嘗寒時就同縣孔思逺宿衣悉裌布飲酒醉眠思逺以卧具覆之百年初不知既覺引卧具去謂思逺曰綿定竒温因流涕悲慟思逺亦為之感泣南史曰朱百年㑹稽山隂人祖凱之晉左衛將軍父濤揚州主簿百年少有髙情親亡服闋携妻孔氏入㑹稽南山伐􅠢採若為業以􅠢若置道頭輒為行人所取眀旦已復如此人稍怪之積久知是朱隠士所賣湏者随其多少留錢取􅠢若而去或寒雪􅠢若不售輒自榜船送妻還孔氏天晴迎之有時出山隂為妻買繒采三五尺好飲酒遇醉或失之頗言𤣥理為詩往往有髙勝之言與同縣孔顗友善顗亦嗜酒相得輒酣對盡歡劉凝之隱居荆州時適嵗儉衡陽王義季慮凝之饑死餉錢十萬凝之大喜持錢至市門見有饑色者悉分與之俄頃都盡酈道元水經註曰劉凝之字志安兄盛公髙尚不仕凝之慕老莱嚴子陵之為人立屋江湖非力不食妻梁州刺史郭全女亦能安貧元嘉中夫妻隱扵衡山終焉不返矣南史曰凝之字隱安釋曇遷經與范蔚宗王曇首逰欵後蔚宗被誅門有十二䘮交知無敢近者曇遷抽貨衣物悉營葬送宋孝武聞而歎賞語徐爰曰卿著宋書勿遺此士釋慧皎髙僧𫝊曰曇遷姓支本月支人寓居建康篤好𤣥儒㳺心佛義善談荘老并注十地王僧䖍為湘州及三吴並携共同逰江士清性至仁慈衣弊多蝨以綿裹置之食菜不食心以其有生意也齊春秋曰江泌字士清濟陽考城人有孝行同族有一人與泌同名世謂泌為孝泌以别之語林卷一
