  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0089_WYG_003-1a, image: WYG1041/WYG1041-0473c.png}
body:
  text: 語林卷三眀何良俊撰徳行第一下裴晉公為門下侍郎過吏部選人謂同過給事中曰吾徒至此僥倖甚多此軰優一資半級何足問也悉與注定未曽退量劉昫唐書曰裴度字中立河東聞喜人元和中以門下侍郎充彰義軍節度使淮蔡平封晉國公王丞相再主文柄劉昫唐書曰王起字舉之王播之弟長慶中錢徽掌貢士為朝臣請託人以為濫詔起與白居易覆試覆落者多徽貶官起代徽為禮部侍郎掌貢二年得士尤精起僻扵嗜學雖官位崇重耽玩無斁夙夜孜孜殆忘寝食書無不覽經目靡遺欲以白敏中為状元唐書曰敏中字用晦居易從父弟也祖鏻揚州録事叅軍父季康溧陽令敏中少孤為諸兄之所訓厲長慶初登進士第病其人與賀㧞惎為友惎有文而落拓丞相宻令親知通意俾敏中與惎絶復約敏中為具敏中許之既而惎果造門左右紿以敏中他適惎遲留不言而去俄頃敏中躍出呼左右召惎悉以實告且曰一第何門不可致奈何輕負至交相與歡醉而寝前人来見之大怒而去具言扵丞相丞相曰我比只得白敏中今當更取賀㧞惎矣李尚書在潭州劉昫唐書曰李翺字習之凉武昭王之後父楚金貝州司法叅軍翺㓜勤儒學博雅好古為文尚氣質貞元中授校書郎累官檢校户部尚書㐮州刺史席上有舞柘枝者顔色憂悴問之是故韋左司愛姬之女唐詩紀事曰韋應物周逍遥公夐之後待價生令儀令儀生鑾鑾生應物其詩言天寳時扈從遊幸事疑為三衛建中二年由比部貟外郎出刺滁州追赴闕改左司郎中正元初歴蘓州罷守寓蘓臺永定精舍李公速命更其舞衣延入與韓夫人相見夫人韓吏部愈之姪見其言語清楚宛有冠葢風儀遂扵賔榻中選士嫁之舒侍郎聞之贈李詩曰湘江舞罷忽成悲便脫蠻靴出絳幃誰是蔡邕琴酒客魏公懐舊嫁文姬宋祁唐書曰舒元輿婺州東陽人地寒不與士齒始學即警悟去客江夏節度使郗士美異其秀特數延譽元和中舉進士李訓用事用為御史中丞月中以本官平章事桞公權善書公卿贈遺鉅萬多為主蔵豎海鷗龍安所竊别貯杯盂一笥緘縢如故其噐皆亡訊海鷗乃曰不測其故公權笑曰銀杯羽化耳不復致詰劉昫唐書曰公權字誠懸幼嗜學十二能賦詩初學王書遍閱近代筆法體勢勁媚自成一家當時公卿碑板不得公權手筆人以為不孝外夷入貢皆别署貨貝曰此購桞書上都西眀寺金剛經碑備有鍾王歐虞禇陸之體尤為得意官至太子太師楊憑有客徐晦素厚善唐書曰楊憑字虚受𢎞農人官湖南江西觀察使工文辭少負氣節與母弟凝凌相友愛皆有時名重交游尚然諾與穆質許孟容李鄘王仲舒為友稱楊穆許李之友性簡傲不能接下人多怨之及歴二鎮尤事奢侈為李夷簡所劾責授臨賀尉憑後得罪姻友憚畏無敢至者獨晦送至藍田唐書曰徐晦進士擢第登制科為楊憑所薦及憑得罪交親無敢祖送獨晦送至藍田不數日御史中丞李夷簡請為監察晦白夷簡曰生平不踐公門公何取而見奨㧞夷簡曰聞君送楊臨賀不顧犯難肯負國乎由是知名故相權徳輿言君送楊臨賀誠厚無乃為累乎晦曰晦自布衣時楊臨賀知我厚方兹流播寜忍無言而别有如公異時為姦佞譛斥晦敢自同路人乎徳輿歎其長厚唐書曰徳輿字載之天水畧陽人父臯天寳中禄山使之獻俘京師臯察禄山有異志因詐死逃逸由是名聞天下卒謚貞孝徳輿四嵗能屬詩七嵗居父䘮以孝聞十五為文數百篇名聲日大後以禮部尚書平章事徳輿自貞元至元和三十年間羽儀朝行直亮寛恕動作語言一無外飾藴藉風流為時稱嚮扵述作特盛六經百氏㳺詠漸漬其文雅正而𢎞博王侯將相洎當時名人薨歿以銘記為請者什八九時為宗匠焉錢徽在翰林日憲宗嘗獨召徽有所咨議徽從容言曰他學士皆髙選宜與聞機宻以廣叅决帝稱其長者唐書曰錢徽字蔚章吴郡人父起天寳十年進士能五言詩徽貞元初進士擢第從事戎幕元和初入朝三遷祠部貟外郎召充翰林學士錢蔚章初貶江州李宗閔楊汝士令蔚章以叚文昌李紳私書進呈上必開悟蔚章曰茍無愧心得䘮一致脩身慎行安可以私書相證耶即令子弟焚去唐書曰長慶元年錢徽為禮部侍郎宰相叚文昌出鎮蜀川文昌好學尤喜圗書古畫刑部侍郎楊憑兄弟以文學知名家多書畫鍾王張鄭之蹟在書斷畫品者兼而有之凌子渾之盡以獻文昌求進士文昌將發面託錢徽繼以私書保薦學士李紳亦託舉子周漢賔扵徽及牓出渾之漢賔皆不中選李宗閔與元稹素相厚善初稹以直道譴逐及還朝大改前志由逕以徼進達宗閔亦急扵進取二人遂有嫌隟楊汝士與徽有舊是嵗宗閔子壻蘓巢及汝士季弟殷士俱及第文昌李紳大怒赴鎮辭日内殿面奏徽所放進士鄭朗等藝薄不當在選中穆宗訪扵元稹李紳二人對與文昌同遂命中書舍人王起主客郎中白居易扵子亭重試内出題目孤竹管賦鳥散餘花落詩而十人不中選貶徽為江州刺史裴公美志操堅正童齓時兄弟同學于濟源别墅公美經年不出墅門晝講經籍夜課詩賦虞人有以鹿為贄者兄弟炰之召公美共食公美曰我等窮生菜食不充今日食肉翌日何繼無宜改饌獨不肯食劉昫唐書曰裴休字公美河内濟源人祖脩父肅肅生三子儔休俅皆登進士第休累官御史大夫同平章事性寛恵不尚皦察而吏民畏服善為文長扵書翰家世奉佛休尤深扵釋典太原鳯翔近名山多僧寺視事之隙逰踐山林與義學僧講求佛理中年後不食葷血常齋戒屏嗜慾香爐貝典不離齋中詠歌賛唄以為法樂與尚書紇于臭皆以法號相字時人重其髙潔而鄙其太過多以語嘲之休不以為忤唐語林曰裴相兄弟三人俱有盛名世謂俅不如儔儔不如休桞仲郢先為牛竒章辟客後李衛公李徳裕别見知其無私奏為京尹仲郢謝日自言不期太尉恩奨及此仰報盛徳敢不如竒章公門館衛公不以為嫌仲郢常感衛公之知大中朝李氏無禄仕者仲郢領鹽鐵特取衛公兄子從質為推官知蘓州院令以禄利贍南宅時令狐綯為宰相不恱仲郢與綯書曰任安不去嘗自愧扵昔人吴詠自裁亦何施扵今日李太尉受責既久其家已空遂絶蒸嘗誠深痛惻綯深歎美即與從質正員官牛僧孺李徳裕令狐綯並别見度劉昫唐書曰栁仲郢字諭蒙公綽之子官天平軍節使禮法自持私居未嘗不拱手内齋未嘗不束帶三為大鎮廐無名馬衣不薰香退公布卷不捨晝夜九經三史一鈔魏晉南北史再鈔手鈔分門三十卷號桞氏自備又精釋典瑜伽智度大論皆再鈔自餘佛書多手記要義小楷精謹無一字肆筆撰尚書二十四司箴韓愈栁宗元深賞之司空表聖甚為王重榮父子所重宋祁唐書曰司空圗字表聖河中虞鄉人累官中書舍人昭宗召拜兵部侍郎以疾固自乞㑹選洛陽桞璨希賊意誅天下才望助䘮王室詔圗入朝圗陽堕笏意趣野耄璨知無意扵世乃聽還圗居中條山王官谷遂隠不出王重榮父子重之數致饋遺不肯受嘗為重榮作碑贈素絹千匹表聖致虞鄉市中人得取之一日都盡劉昫唐書曰王重榮太原祁人父縱河中騎將重榮累功至河中節度使天子走鳯翔與李克用謀定王室重榮之功居多王凝清脩重徳冠絶當時每就寝息必叉手而卧慮夢寐或見先靈唐書曰王凝字致平年十五兩經擢第著京師六岡銘為文士所稱至性堅正仕至宣歙觀察使趙光逢兩登廊廟四退邱園百行五常不欺暗室縉紳咸仰以為名教主孔平仲續世說曰後唐趙光逢幼嗜典墳動循規檢弟光𦙍為平章事時謁問扵私第語及政事他日光逢署其户曰請不言中書事其端黙如此朱梁革命唐舊臣李濤朱葆光顔蕘數人挈家南渡寓于潭州每正旦與至日必序立扵南嶽祠前北望號慟殆二十年後唯李濤北歸葆光遂家衡山宋史曰李濤字信臣京兆萬年人唐敬宗子郇王十一世孫父元將作監朱梁革命元以宗室懼禍挈濤避地湖南依馬殷署濤衡陽令兆文苑𫝊曰朱葆光其先京人唐亡挈家南渡寓潭州李後主𦵏北邙故吏張佖後官河南每清眀親拜其墓哭之甚哀李氏子孫陵替佖常分俸贍給司馬文正公涑水記聞曰張洎為舉人時張佖在江南已通洎每求見稱從表姪孫既及第稱姪稍貴稱弟及秉政不復論中表以庶僚遇之佖怨洎入骨國亡俱仕中國洎作錢俶謚議云亢而無悔佖奏駮之洎廣引經𫝊自解乃得免江南李氏時有縣令鍾離君與隣縣許令為姻女將出適買一婢從嫁一日其婢執箕帚治地堂前熟視窳䖏惻然淚下鍾離君怪問之婢泣曰幼時我父扵此穴地為毬窩道我戯劇嵗久而穴䖏未改鍾離君驚問其父婢曰我父乃兩政前縣令身死家破我遂落民間更賣為婢鍾離君呼牙儈問之復咨扵老吏具得其實遽以書抵許氏曰吾買得前令之女義不可久辱當輟奩篚先求壻嫁之更一年别為吾女營辦許答書曰蘧伯玉恥獨為君子君何自専仁義願以前令之女配吾子君女當别求良配扵是前令之女遂歸許氏南唐後主薨太宗詔侍臣撰碑時有與徐鉉爭名欲中傷之因言知吴王事跡莫若徐鉉太宗詔鉉為之鉉遽請對泣曰臣舊事李煜陛下容臣存故主之義乃敢奉詔太宗許之鉉為碑但推言氣數已盡天命有歸有曰東隣遘禍南箕扇疑投杼致慈親之惑乞火無里媪之談始勞因壘之師終後塗山之㑹太宗覽讀歎賞每對宰臣稱鉉忠義馬令南唐書曰徐鉉字鼎臣三魏泰東軒筆録曰鉉嘗作吴王挽詞首其一曰倐忽千齡盡㝠茫萬事空青松洛陽陌荒草建康宫道徳遺文在興衰自古同受恩無補報反袂泣塗窮其二曰土徳承餘烈江南廣舊恩一朝人事變千古信書存哀挽周原道銘旌鄭國門此身雖未死寂寞已銷魂太宗得而覽之尤加歎異徐鼎臣歸朝後坐事出陜右栁開時為州刺史開性豪頗不加禮王聖塗澠水燕談録曰河南栁先生開以髙文苦學為世宗師後進經其題目翕然名重扵世又開事多不法朝廷命鄭文寳治罪文寳素師事鼎臣開詣鼎臣求觧鼎臣曰彼昔為鉉弟子然時異事背尚安能必其心開再拜力懇鼎臣許之頃文寳至首不見開即屏從者歩趨入巷詣鼎臣許覲省立扵庭下鼎臣徐徐下座文寳拜竟陞自西階通温凊復降拜鼎臣乃邀文寳上立談道舊且戒文寳以持節之重而鉉閑慢廢棄後勿復来文寳力詢其所欲鼎臣曰栁開甚相畏文寳黙出其事立散文寳敦尚風義世皆稱之王偁東都事畧曰鄭文寳字仲賢仕南唐為校書郎以文知名李煜歸朝舉進士卒官兵部貟外郎張齊賢為江南轉運日嘗家宴一奴竊銀噐數事于懐中文定自簾下熟視不問爾後文定三為宰相門下厮役往往皆得班行此奴竟不霑禄奴乗間自言某事相公最久凡後扵某者皆得官相公何獨遺某因泣下不止文定憫然語曰我欲不言爾乃怨我爾憶江南日盜吾銀噐數事乎我懐之三十年不以告人雖爾亦不知也吾備位宰相進退百官志在激濁揚清安敢以盜賊薦耶念汝事吾久今予汝錢三百千汝其去吾門下自擇所安奴震駭泣拜而去吴䖏厚青箱雜記曰張齊賢洛陽人少家貧父死無以𦵏有河南縣史某甲為辦棺殮公深徳之遂長兄事之雖貴不替後逍普宻薦齊賢扵太宗太宗未用普具列其事謂陛下若擢齊賢則齊賢他日感恩當過扵此太宗大恱未幾擢為相李丞相有一僕逋金十千一夕遁去其女將十嵗有美姿自繫一劵扵帶願賣宅中以償丞相祝夫人曰當如己子育之扵室訓教婦徳俟長求夫嫁之請夫人親為結縭務在眀潔夫人如所教及笄擇一壻具奩歸之女範堅白其二親後歸舊京感公刻骨丞相病夫婦刲股作羮及薨服衰三年王稱東都事畧曰李沆字太初洺州肥鄉人父炳侍御史沆好學沉厚寡言噐度宏逺咸平初拜平章事卒贈中書令謚文靖李文靖為相専以方嚴重厚鎮服浮躁尤不樂人論說短長胡祕監謫商州久未召嘗與文靖同為制誥聞其拜參政以啓賀之詆前居職罷去者云吕參政以無功為左丞新參政以酒失為少監辛參政非才謝病優拜尚書陳參政新任失㫖退歸兩省其譽文靖甚力文靖慨然不樂命小吏封置别箧曰吾豈真優扵是亦適邅遇耳乗人之後而譏其非吾所不為況欲揚一已而短四人乎終為相祕監不復用王稱東都事畧曰胡旦字周父渤海人舉進士第一後䘮明以祕書監致仕雋辯強敏少有大志退老漢上雖䘮眀猶令人讀經史憑几聽之未嘗少輟所著有漢春秋將帥要畧唐乗等書王文正以清徳事真皇上特敬重一日御宴陳設鮮華文正顧視意色不恱上覺其如此至中休命左右以舊陳設易之孔平仲談苑曰王旦字子明為翰林學士嘗奏事下殿真宗目送之曰與朕致太平者斯人也拜平章事外撫四夷内和百姓官吏得職天下富庶頌聲洋溢旦之力也王魏公有弟慠不可訓一日逼冬至祠家廟列百壺扵堂弟皆擊破之家人惶駭魏公忽自外入見酒流滿路不可行公無一言但攝衣歩入其後弟忽感悟為善西蜀亂後官府多不挈家以行張忠定知益州單騎赴任是時一府官屬憚張嚴峻莫敢蓄婢使張不欲絶人情遂自買一婢以侍巾幘自此官屬稍稍置姬張在蜀四年被召還闕呼婢父母出貲以嫁仍是䖏女朱文公五朝名臣言行録曰張詠字復之濮州人官至工部尚書謚忠定蔣侍郎家宋史曰蔣堂字希魯常州宜興人官至尚書禮部侍郎清修純飭遇事毅然不屈貧而樂施好學工文延譽晚進至老不倦尤嗜作詩有吴門集二十卷有楊文公與王魏公王旦已見一帖用半幅紙有折㾗其略云昨夜有進士蔣堂携所作文来極可喜不敢不布聞謹封拜呈蘓子瞻曰夜得一士旦而告人察其情若喜而不寐者世言文公為魏公客公經國大謀人所不知者獨文公得與觀此帖不特見文公好賢樂士之急且得一士必亟告之其補扵公者亦多矣片紙折封尤見前人至誠相與簡易平實不為虚文安得復有隠情皆可為後法王稱東都事畧曰楊億字大年建州浦城人七嵗善屬文十一以童子召對試詩賦五篇下筆立成太宗歎異以為秘書省正字歴官翰林學士謚曰文韓許公在中書日嘗見天下諸路有職司捃拾官吏小過輒顔色不懌曰今天下太平主上之心雖蟲魚草木皆欲得所夫仕者大則望為公卿次則望為侍從職司其下亦望京朝幕職奈何錮之扵聖世五朝名臣言行録曰韓億字宗魏其先真定人事仁宗官至參政封許國公孫明復年四十猶不娶東都事畧曰孫復字眀復晉州平陽人舉進士不中居泰山之陽學春秋著尊王發㣲不惑𫝊註不為曲說以亂經其言簡易得經之本義為多魯多學者自石介以下皆以弟子事之李廸知其賢欲以兄子妻之眀復初尚猶豫石介與諸弟子請曰公卿不下士久矣今丞相不以先生貧賤欲托以子宜因以成丞相之賢眀復乃聽東都事畧曰李迪字復古濮州鄄城人少從栁開學為古文開曰此公輔噐也後舉進士第一直史館真宗朝為相石介别見韓魏公為相每見文字有攻人隠惡必手自封記不令人見韓忠獻家傳曰公諱琦字穉圭相州人天聖五年仁宗臨軒試進士公名在第二時唱名第一甲方終太史奏日下五色雲見左右從官皆賀後相英宗神宗兩朝贈魏國忠獻王宋朝引試率在八月中韓魏公當國日二蘓將就試黄門忽卧病魏公輒奏上曰今嵗召制科之士惟蘓軾蘓轍最有聲望今聞蘓轍偶病未可試如此人兄弟中一人不得就試甚非衆望欲展限以俟上許之黄門病中魏公數使人問訊既聞全安方引試比常例展二十日自後試科目並在九月後相國吕㣲仲語及科目何故延及秋末東坡為吕言之吕曰韓忠獻其賢如此深可慕爾范文正在睢陽文正公年譜曰公諱仲淹字希文蘓州人仁宗朝官至參知政事謚文正遣其子堯夫扵姑蘓取麥五百斛堯夫時尚少還次丹陽見石曼卿别見問寄此久近曼卿言已兩月三䘮在淺土欲𦵏之北歸無可與謀堯夫以所載舟與之單騎自長蘆捷徑而去到家拜起侍立良久文正曰東吴見故舊乎曰曼卿為三䘮未舉留滯丹陽時無郭元振莫可告者文正曰何不以麥舟付之堯夫曰已付之矣五朝名臣言行録曰范純仁字堯夫文正公次子以恩補官相哲宗歐陽公下士後代罕比東都事畧曰歐陽脩字永叔吉州盧陵人舉進士試國子監禮部皆第一仁宗朝知制誥帝常目之曰如歐陽脩者何䖏得来後以觀文殿學士太子少師致仕作河北轉運使過滑州訪劉羲叟扵陋巷中羲叟時為布衣人未有知者曽鞏劉羲叟别𫝊曰羲叟字仲更澤州人通經史百家之學國朝典故財賦刑名兵械鍾律皆所究知舉進士不第歐陽公薦授大理評事歐陽公為翰林學士日常有空頭門状數十紙随身或見賢士大夫稱道人物必問其所居書填門状先往見之果如所言便為延譽未嘗以位貌驕人張安道與歐陽文忠素不相能安道守成都日文忠為翰林蘓眀允父子自眉州走成都將求知扵安道安道曰吾何足為重乃為作書辦装使人送至京師謁文忠文忠得明允父子所著書亦不以安道所薦為嫌大喜曰後来文章當在此即極力推挽天下髙此兩人五朝名臣言行録曰張方平字安道宋城人中茂材異等及賢良方正直言極諫科事仁宗英宗神宗位至參政卒謚文定趙叔平與歐陽公同在舘趙重厚寡言公意輕之公知制誥日韓范在中書以趙為不文除天章閣待制趙不以屑意㑹公甥女淫亂事覺語連公時疾韓范者皆欲文致公罪云與甥亂上怒獄急羣臣無敢言趙乃上言脩以文章為近臣不可以閨房曖昩之事輕加汙衊臣與脩蹤跡素踈脩之待臣亦薄所惜者朝廷大體耳書奏上不恱人皆為之懼趙澹然如平日吴䖏厚青箱雜記曰趙槩字叔平為人寛厚長者留滯内相十餘年晚始大用參二大政張文定公張方平已見平生未嘗不衣冠而食嘗暑月與其壻王鞏同飯命鞏禠帶公衫㡌自如鞏顧見不敢公曰吾自布衣諸生邅遇至此一飯皆君賜也享君之賜敢不敬乎子自食某之食雖衩衣無害也東都事畧曰王旦子素謚懿敏為吏敢擊斷時稱其才諸子中鞏知名鞏字定國從蘓軾學能為文除秘書省正字坐軾累貶賔州石守道為舉子時寓學扵南都固窮苦學世罕其比孔平仲談苑曰石介字守道兖州人文章學術天下宗師學者呼為徂徠先生王侍郎瀆聞其勤約嘗以盤餐遺之守道謝曰甘脆者亦某之願但日享之則可若止脩一餐則眀日何以復繼朝享膏粱暮厭麄糲人之情也某所以不敢當賜王大嗟重之東都事畧曰王堯臣應天府虞城人都官貟外瀆之子翰林學士洙之猶子也羅可以踈放自適嘗有竊刈其園中蔬者可適遇見因躡足避草間以俟其去又有攘殺其雞者可携壺就之其人慙悚服罪可執其手曰與子幸同里閭不能烹雞以待子我誠自愧乃設席呼其妻孥環坐盡醉而歸終不語人人由是相誡無犯墨客揮犀曰羅可沙陽之碩儒也性度寛宏辭學贍麗嘗預鄉薦見黜扵禮部遂慨然不復進取以踈放自適龎相判太原日司馬温公别見適倅并州一日被檄廵邉温公因便宜命諸將築堡扵窮鄙而不以聞後為西羌所敗殺一副將朝廷深訝龎公擅興詰責不已龎公既素重温公畧弗自言久之遂落使相以觀文殿學士罷歸龎公益黙不一語温公用是得免五朝名臣言行録曰龎籍字醇之單州人中進士第相仁宗趙清獻既謝政歸唯居髙齋不復與家人相接子弟晨昏一至以二凈人一老兵為役早不茹葷以一凈人治膳扵外日輪一僧伴食玉泉師三五日一過之晚乃畧取鮓脯扵家老兵掃除事已即去唯一凈人執事其傍暮以風罏置大鐵湯缾可貯斗水及列盥潄之具則凈人亦去公燕坐至初夜就寝雞鳴凈人治佛室香火三擊磬公乃起自以缾水頮面趨佛室暮年尚能日禮百拜誦經至辰時宋史曰趙抃字閱道衢州人官至參知政事卒謚清獻葉石林避暑録曰趙清獻在錢唐州宅之東消暑堂堂後舊據城闉為屋五間下瞰虚白堂不甚髙大而最據一州之勝謂之髙齋後治第衢州臨大溪其傍不逺數歩亦有山麓屹然而起即作别舘其上亦名髙齋既歸唯居此舘范氏自文正公貴顯以清苦儉約稱于世子孫皆守其家法忠宣范純仁已見正拜後嘗留晁美叔同匕箸美叔退謂人曰丞相變家風矣或問之晁答曰鹽䜴棊子上有肉兩簇豈非變家風乎聞者大笑朱弁曲洧舊聞曰晁端字美叔晁之道之父官秘書監司馬温公未有子清河郡君為置一妾一日使盛飾入書室中公畧不顧妾思所以動之取一帙問曰中丞此是何書公拱手正色答曰是尚書妾逡廵而退東都事畧曰司馬光字君實陕州夏縣人位至丞相忠信孝友恭儉正直出扵天性自少及老語未嘗妄其好學如饑之嗜食扵財利紛華如惡惡臭誠心自然天下信之扵學無所不通音樂律歴天文書數皆極其妙卒贈温國公謚文正陜人薛公度言小時見司馬温公自洛中来夏縣上冡鄉人皆集父老或請曰願聞資政講書以為鄉里之訓公欣然為講孝經庶人章馬大年懶真子録曰司馬君實先隴在鳴條山其地有餘慶寺一日省墳止寺中有父老五六軰上謁獻粟米菜羮既畢復請講書君實即取紙筆書庶人章講之既已復前白曰自天子章以下各有毛詩兩句此獨無有何也君實黙然少許謝曰光平生慮不及此當思所以奉答村父笑而去王荆公判金陵納節求宫觀得㑹靈觀使築第扵南門外七里去蔣山亦七里平日乗一驢從數僮逰諸山寺欲入城則乗小舫泛潮溝以行所居四無居人其宅僅蔽風雨又不設垣墻望之若逆旅之舍有勸築垣墻輒不應元豐末被疾奏捨此宅為寺有㫖賜名報寜疾愈稅城中屋以居竟不復造宅五朝名臣言行録曰王安石字介甫撫州人位至丞相左僕射封荆公追贈舒王王舒王夫人夫人姓吴氏封越國夫人好潔成疾舒王至性任率每不相合自江寜乞歸私第有官藤床吴假用未還郡吏来索左右莫敢言王一日跣而登床偃卧良久吴望見即命送還馮當世孫和叔吕晦叔薛師正同在樞宻府三人屢扵上前爭論晦叔獨黙不言上顧問之晦叔方為開析可否語簡而當上常納之三人亦不能違也出則未嘗語人當時譏晦叔循黙不副衆望晦叔亦不辯同僚或為辯之神宗實録吕正獻公𫝊曰吕公著字晦叔本河東人從祖蒙正為相因家開封父夷簡相仁宗公著㓜不好弄嗜學忘寝食夷簡尤噐之曰他日必至公輔元祐中拜司空平章事卒贈申國公謚正獻吕申公當文靖秉政時自書舗中投應舉家状弊衣蹇驢謙退如寒素見者雖愛其容止亦不甚異既去問書舗知是吕廷評乃始驚歎曽鞏吕文靖𫝊曰吕夷簡字坦夫夀州人天聖六年拜相封許公以病特進司空平章軍國重事上剪須賜以療其疾夷簡薦富弼等數人可大用以太尉致仕卒贈中書令謚文靖范正平正平字子夷忠宣公之次子勤苦學問操履甚扵貧儒與外氏子弟結課扵覺林寺去城二十里忠宣當國時正平徒歩往来人不知為范丞相子朱弁曲洧舊聞曰外氏乃城東王文正家覺林寺是文正公松楸功徳寺也蘓子瞻云予小時書室前有竹柏雜花衆鳥巢其上武陽君惡殺生婢妾不得捕取數年間鳥有巢扵低枝其􅑹可俯而窺此不忮之誠信扵異類蘓長公自儋北歸卜居陽羨時邵民瞻從公逰時時相與杖䇿過長橋訪山水為樂邵為公買一宅為緡五百公傾嚢僅能償之卜吉將入居夜與邵歩月偶至村落聞婦人哭聲極哀公徙倚聽之與邵推扉而入則一老嫗公問嫗何為哀傷至是嫗言吾有一居相𫝊百年吾子不肖舉以售人今日遷徙百年舊居一旦訣别所以泣也坡亦為之愴然問其故居所在則公以五百緍所得者因再三慰撫謂曰嫗之故居乃吾所售不必深悲當以是居還嫗即命取屋劵對嫗焚之呼其子迎母還舊居不索其值公遂還毘陵不復買地東都事畧曰蘓軾字子瞻眉州眉山人生十嵗而父洵宦學四方母程氏授以書比冠學通經史屬文日數千言中進士乙科英宗朝直史館熙寜中謫黄州團練哲宗召為翰林學士紹聖初御史論軾譏斥先朝落職恵州安置吕汲公在相位其兄進伯自外郡代還相與坐東府堂上夫人自廊下降堦趨謁以二婢掖侍而前進伯遽曰宰相夫人不湏拜㣲仲觧其意叱二婢使去夫人獨拜扵赤日中盡禮而退進伯畧不顧勞聞者歎服其家法之嚴宋史曰吕大防字㣲仲其先汲郡人祖通太常博士父蕡比部郎中從京兆藍田遂家焉大防元祐中拜中書侍郎封汲郡公兄大忠字晉伯大忠大防與弟大臨同居相切磋論道考禮冠婚䘮祭一本扵古關中言禮學者推吕氏范忠宣既薨朝廷賜碑額曰世濟忠直時唐君益知潁昌為表其居曰忠直坊正平語君益荷公厚意但上命揭扵墓隧假寵扵范氏若施之康荘以為往来之觀非朝廷意也君益言此州郡之事扵家君無與正平曰先人功名何待此而顯且十室之邑必有忠信流俗所尚識者所止異時不獨吾家為人嗤誚公亦寜逃扵指議故敢以力請時李端叔官扵許語君益曰頃胡文恭知蘓州時蔣希魯蔣堂已見致政歸文恭嘗學扵蔣乃表其第為難老坊蔣公見之不樂曰此俚俗歆㷔内不足而假之人以為夸者非所望扵故人也時營繕已畢文恭因其嘗獲芝草遂更為靈芝坊文恭退而語人曰識必因徳而後達蔣公之徳盖所畏而其識如此非吾所及也君益聞端叔言遂撤范氏之坊胡宿别見字東都事畧曰李之儀端叔姑孰人善屬文工扵尺牘蘓軾帥定武辟置幕下及范純仁卒之儀為遺表𫝊誦扵世劉道原自洛陽南歸時巳十月尚無寒具司馬文正公遺以衣襪及舊貂褥道原固辭強與之行及潁州悉封還不受宋史曰劉恕字道原筠州人父渙潁上令以剛直稱歐陽脩作廬山髙美之恕少頴悟書過目成誦重意義急然諾王安石與之有舊欲引置三司條例恕以不習金榖辭陳后山為館職當侍祠郊丘非重裘不能禦寒后山内子與趙挺之之内是姊妹乃為趙假一裘后山問所從来内以實告后山曰汝豈不知我不著他衣裳即却去之止衣一裘竟感寒疾而死東都事畧曰陳師道字無己徐州彭城人少刻苦問學元祐中蘓軾傅堯俞孫覺薦扵朝為徐州教授除太學博士師道家素貧自罷歸彭城或累日不炊妻子愠見不恤也伊喇子敬有良馬平章政事完顔元宜索之子敬以元宜為相不與後元宜罷守東京子敬乃以此馬贐行識者稱之金史曰伊喇子敬字同文本名鄂克多囉遼五院人讀書好學皇統間特進伊喇固修遼史辟為掾天徳三年入為翰林修撰沈璋以禮部侍郎知太原尹時介休人張覺聚黨亡命山谷鈔掠邑縣招之不肯降曰前嘗有降者皆殺之今以好言誘我是欲殺我耳獨得侍郎沈公一言我乃無疑扵是命璋往招之覺即日降金史曰沈璋字達之永興人為衛尉卿從伐宋汴京平衆爭趨貲貨璋載書數千卷而還太行賊䧟潞州官軍討平之命璋權知州事軍卒當緑坐者七百人帥府牒璋盡誅之璋不從帥府召璋呵責且欲殺璋璋從容對曰招亡撫存璋之職也此軰初無叛心為賊所脅故招之復来今欲殺之是殺降也茍利扵衆璋死何憾朝廷聞而嘉之知潞州百姓為之立祠改同知太原尹毛仲權知曺州日有書生投書扵仲權辭渉謗訕僚屬皆不能堪仲權延之上坐謝曰使碩常聞斯言庶乎寡過士論多之金史曰毛碩字仲權甘陵人宋末試弓馬子弟碩中選辟兵馬都監宗望軍至碩以本部迎降仕金累官南京路都轉運使唐玉潜當宋亡後時西僧嘉木揚喇勒智怙恩横肆勢焰爍人嘗帥徒役扵蕭山發趙氏諸陵殘斷支體棄骨草莽間玉潜聞之亟貨家具并行貸通得百金具酒醪市羊豕邀里中少年數十軰狎坐轟飲酒酣少年請其故玉潜慘然具以實告少年許諾乃謀取四郊暴骨易之斵文木為匱各署其表分委而散遣之各蕝地以藏俄而西僧下令裒陵骨雜置牛馬枯骸中築一塔壓之名曰鎮南然不知諸陵之骨故在也後有𫝊其事者玉潜之義風一時震動吴越羅有開唐義士𫝊曰唐珏字玉潜㑹稽山隂人家貧聚徒授經營滫髄以養其母張昉家居時有同里張氏以絲五萬兩寄昉家而他適俄而昉家被火家人惶駭走避貲用悉焚昉力完所寄絲付張氏元史曰張昉字顯卿東平汶上人父汝明金治書侍御史昉性縝宻遇事敢言確然有守以任子補吏部令史金亡還鄉里嚴實行臺東平辟為掾累官兵部尚書胡汲仲剛介有守趙文敏嘗為羅司徒奉鈔百匹求為其父作墓文汲仲曰我豈為宦豎諛墓中人耶拒而不納是日正絶糧其子以情告坐上客咸勸受之汲仲辭愈堅元史曰胡長儒字汲仲婺州永康人父居仁知台州軍從事文辭政事亦絶出扵四方至長孺其學益大振㑹宋亡退棲永康山中至元中詔下求賢有司強起之至京師待詔集賢院召見内殿拜集賢修撰與宰相議不合改教授揚州趙孟頫别見大徳中熒惑入南斗許白雲以為災在吴楚竊深憂之是嵗果大祲白雲形貌加瘠或問曰先生豈食不足耶白雲曰今公私匱竭道殣相望吾豈能獨飽元史曰許謙字益之其先京兆人後由平江徙婺之金華謙數嵗而孤稍長肆力扵學受業金履祥之門延祐初居東陽學者翕然從之逺而幽冀齊魯近而荆揚吴越皆不憚百舍来受業焉學者以其身之安否為斯道之隆替世稱為白雲先生朝廷賜謚文懿暢師文任太平路總管公田收米積之盈屋曰我家幾人能盡食此乎呼貧士及細民恣其取去硯北雜志曰暢師丈字純父雒陽人好竒尚怪胡存齋叅政能折節下士賔客至者如家焉南北士大夫有經其地無不願見者每患閽人不為通是日茍不出即懸一牌扵門曰胡存齋在家錢伯全嘗納一女鬟風姿秀雅其室勸伯全私之伯全正色答曰我所以置此者直欲侍巾櫛耳汝乃欲敗吾徳耶即具貲嫁之果是䖏子陶南村輟耕録曰錢璧字伯全松江人中至順壬申進士端重清慎語不傷氣周仁榮嘗築一室纔落成友人楊公道輿疾造門曰願假君新宅以死仁榮讓正寝居之俄而楊死箧中有遺金數錠莫有知者楊之弟詣仁榮求分之仁榮曰賢兄寄死扵我意固在是䘮事之費我自任之終不敢利其一毫乃對衆封籍自平陽呼其子来悉付之元史曰周仁榮字本心台州人少受性理之學工為文章用薦署美化書院山長官至集賢待制李仲謙亷介自持每休沐則閉户讀書奉禄不給妻紡績以益薪水之費仲謙止有一布衫或湏浣濯補紉必俟休暇日若賔客見訪則使其子致謝曰家君治衣不可出輟耕録曰李思讓字仲謙鄒縣人至元間由嘉興路吏貟補浙江按察司書吏後仕至憲官顧潤之輟耕録曰顧徳玉字潤之檇李人嘗從俞觀光先生學輟耕録曰俞長儒字觀光越之新昌人為寜國路儒學教授先生無子嘗語人曰吾昔寝疾于杭潤之侍湯藥情若父子醫為之感動弗忍受金我行且老必托之以死後訪醫吴中疾革趣舟歸潤之次尹山而卒明日至檇李潤之奉其屍歛扵家衰絰就位士人為潤之来吊者潤之拜之明年𦵏扵海鹽近顧氏先塋嵗時祭享惟謹或問歛扵家禮與潤之曰吾聞師哭諸寝又曰生扵我乎養死扵我乎殯非家歛之則將尸諸草莽生服其訓死而委諸草莽仁者弗為也聞者歎服王眉叟管領浙之開元宫時浙省都事劉時中致海内名士也既卒貧無以為𦵏眉叟親往吊哭周其遺孤舉其柩𦵏扵徳清與己之夀穴相近春秋祭掃不闕人以為難遂昌山人雜録曰杭人王溪月諱夀衍字眉叟少為道士後領開元宫曺公克明在湖廣行省日元史曰曺鑑字克眀宛平人具通五經大義為湖廣行省貟外郎累官禮部尚書麻陽主簿顧淵白致書問訊因寄辰砂一函未及啓封漫置箧中後有一憲官来訪語及製藥言苦無好辰砂公曰有一故人嘗以此見恵尋當奉送及取視乃有砂金三兩雜其内公驚歎曰淵白以我為何如人耶時淵白已歿呼其子歸之吕徽之安貧樂道常逃其名以耕漁自給一日詣富家易穀種大雪立門下聞閤中有吟哦聲乃一人分韻得滕字苦吟弗就先生不覺失笑衆詰其故先生因舉滕王蛺蝶事衆請足之先生援筆立就既敏且工問其姓字終不肯言衆驚訝曰嘗聞吕䖏士名欲一見而不得先生豈其人耶曰我農家安知吕䖏士與之穀怒曰我豈可以貨取耶不受刺船去遣人遥尾其後路甚僻逺識其所而返雪晴往訪焉惟草屋一間家徒四壁值先生不在忽米桶中有人乃先生妻也因天寒無衣故坐其中輟耕録曰吕徽之家仙居萬山中博學能詩文問無不知者倪元鎮自先世以来代雄扵貲元鎮厭棄紛華清修好義其師鞏昌王仁輔老而無嗣奉養終其身歿為制服執䘮營𦵏務致誠慤當世稱之周南老雲林先生墓誌銘曰雲林倪瓉字元鎮元䖏士也漢御史寛之裔五世祖益挈家渡江至常州無錫梅里之祗陀愛其地勝俗淳遂定居焉厥後族屬寖盛貲雄扵鄉䖏士生而俊爽稍長強學好修性雅潔敦行孝弟雖有餘財未嘗資以為俚俗紛華事倪䖏士嘗鬻産得錢百千緡㑹張伯雨至其家念伯雨老不再至推與不留一緡張伯雨别見楊鐵崖避地松江嘗有一貴逰子既破産流落海上數踵先生門一日竟持先生所購倪雲林畫去左右欲發之先生曰吾哀其困使往見一達官以書畫為介耳非盜也其務掩人過如此鐵崖先生傳曰鐵崖先生者名維楨字亷夫姓楊氏世為紹興山隂人母李氏夢金鈎自月墮于懐既寤生先生少穎悟好學登泰定進士沈仲說年四十未有子其妻為置一妾姿色美麗仲說詢其父祖名姓女泣對曰妾范復初之女也父䘮家貧老母見鬻扵此仲說惻然淚下因語其妻曰此女之父吴中名士亦吾故人豈忍以為妾當如己子視之即召其母令擇壻仲說具奩遣送郡人稱之姑蘓志曰沈右字仲說郡人語林卷三
